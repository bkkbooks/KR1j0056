body:
  text: 大廣益會玉篇卷第十三凡一部草部一百六十二一千五十四字草七老切百草揔名説文百卉今作非草同上説文音皂草斗樂實曰樣斗苬敘留切苬芝也一年三秀蓏力果切草實在地生虈許嬌切香草也萐所治切萐莆瑞草王者孝至則生於樹葉如門自扇飲食以助供養莆方禹切萋莆靈草薰許軍切香草似蘼蕪蓀息昆切香草名同上靃呼郭切豆葉之少也藿同上蘭力干切香草春蘭也蕙胡桂切香草秋蕙也蔨竒卷切鹿豆巠茞齒改切香草也虋莫溫切赤苖即今赤粱粟􅚂俗蘺力支切香草芎藭苖也蘼蘼飢亡彼二切釁冬葵渠追切菜名葵同上莥女紂切草子鹿霍實同上藥於略切白芷葉即虈也芷支視切白芷藥名名茞芞去訖切香草也苷古酣切苷草薑居良切辛而不葷也薑同上萁居疑切菜也渠疑切豆莖蓂莫丁切蓂莢又音覓薔所力切虞蓼也蘋皮明切萍也又藾蕭萍部丁切草無根浮水生䓑同上蒠私力切非息菜似蕪菁蘅胡庚切香草杜衡也薊古麗切薊芙也葪同上俗薸毗招切水草萍屬薸同上古豪切草名實似瓜食之治蘇先胡切草藥荏屬菁子丁切蕪菁也蕧扶福切草似菊藒去竭切香草藒車也藒同上茥徍切覆盆也又音睽莧胡辨切莧菜草疏也蔦都了切寄生也蘻公詣切狗毒草參所金切人參藥也蔘同上莞古桓切胡官切草可作席荏而錦切菽豆又蘇屬芥假拜切菜名蕕與周切臭草也􅙛徒合切草名莐潘也蕁同上余招切銚芅詩亦作銚芅余識切芅羊桃也藫杜含切海藻也蒳奴答切香草名菼他敢切草名藋初生也􅫠同上荷賀多切芙渠蓮也菡胡敢切菡萏荷華也菡同上莟同上花開蔤美切荷木也莖弜在泥中者苾同上蕸何加切水中生荷葉薂胡激切菂敫蓮實也萏徒敢切菡萏同上藕五後切荷根曰藕蕅同上茄古遐切荷莖又巨迦切芙附俱切芙蓉花名蓉俞鍾切芙日芍都歷切蓮子又時灼切芍藥上略切芍陂下了切􅝀茈也芡渠㰸切芡雞頭也菂上歷切蓮實亦作的芰巨寄切芰菱也茤同上説林芰從多蕮思亦切馬蕮車前同上䓈弋箠切芡也北燕謂之䓈菱力升切芰也水中生同上菱同上亦作菱芓詳餌切麻母也枲也茡同上苞博交切叢生又積也豐也蔔扶福切廬蔔菘菜也䓜諸尸切𦵔也同上芩渠炎渠今二切黃芩也菳同上藾七漬切芒也草木針也茅亡交切草也葦也䔂莊里切羮菜也青五切草履也虉魚激切小草有雜色同上芐胡古切地黃又荷嫁切葖他忽切葖草蘆也菷炙久切俗菷也范音犯草名又姓茢來桀切草名萑苕也茢同上茁久劣久滑二切草出貌菘思雄切菜名蕪菁也農奴冬切古文農菊居六切大菊蘧麥也居六切曰精也似秋華同上蘜同上治蘠也今之耿華菊薠扶藩切水草胃蘋也蒿呼豪切蒿鼓也􅺁息夷切茅秀也蓍舒夷切靈草下卦者古文是支切母草即知母也菅賈顔切菅草茅屬蘞力檢切白蘞蘞同上􅙥諸律切􅙥山薊與术同同上萉扶佛切枲實也或作黂蓷勑雷切萑蓷草名萑至維切萑蓷蔀步口切蔀覆也苽古胡切記曰魚冝苽菰同上芣伏丘切芣苡一名車前苡余止切薏苡香草也苡同上莊阻陽切草名又盛也敬也又六逹道曰莊古文芭去紀切白粱粟又菜也萯房久切小豆四月生與六切山韭也菨二葉切莕菨水草也莕何梗切菜也俗呼曰豬蓴荇同上蓑素和切草衣也又素回切蔩余紳余善二切菟瓜􅟏玉唐切菖蒲也臺雞切草名蕛苵也苵徒結切蕛苵他生草同上葶都挺切毒魚草文音亭藄勤之切草似蕨可食蘀他洛切落也同上荆景貞切木名又地名古文葹舒移切卷施草拔心不死莃欣衣切草名菟葵也莎素戈切莎草也薃胡蒿切莎草也菭徒來切草生水中緑色也苔同上茯音伏藥茯苓也又車茯兔苓郎丁切扶苓蘨與招切茂也蕍庾俱切澤㵼也蔪疾斂切書草木蔪苞同上葍甫鞠切葍葍大葉曰華葍甫又切草名葍葍也虇丘逺切蘆笥蔈芳燒切黃花藙魚既切藥名煎茱茰􅱣同上㽔汝誰切葳㽔草木實垂貌蕀居力切今逺志蒬於元切蕀蒬花為詭切華榮也茭古爻切草也又下絞切古文息移切鳧茈或從茈積豕切染草又音蕓禹軍切蕓薹菜薳為彼切姓也蒸章繩切炬也衆也君也塵也蒸同上茜此見切草名茅搜可染絩同上蒨同上青蔥之貌公幸切羊莖也卉許胃許偉二切草揔名卉同上芾方味万大二切蔽芾小貌蒚良激切山又蒲蒚蓵才市切户薕也才餘切草䓚也薻子道切水中菜也藻同上藨平表切前屬可為席􅸬苦怪切草也中為索蒯同上葒胡公切葒蘆草蘬丘非丘丘追三切大蘢古草古文萎於危於偽二切食牛也薽諸身切茢薽豕首葑匪庸切葑菜蕪菁也菲孚尾切菜名又薄也語云菲飲食又芳把切芳菲也又父未切䒷公活切䒷蔞即瓜蔞董德孔切藕根又正也因纎切菜也口羊切菜也藩輔園切蕁蕪藩又莆煩切屏也籬也莩方俱曰葭莩葭中白皮芴亡勿切菲芴土瓜也一丘切菜名𦸺仕街切草𦸺也蓼力鞠切長大貌又音了草也同上莦所交切草根也又相遙切蕦相俞切蒿蕦似羊蹄䔞吕僪切草子甲呼角切草聲諸翼切草名葉似酸漿蘵同上䓄牛斤切草又江夏有䓄亭蓯子孔切草名葑蓯也蕒母解切苦蕒菜普莫切落也芛推畢羊箠二切草木葉𥘉生也茟古文薉於吠切行之惡也又作穢茦楚革切芒茦也刺也苪袐永切明著也䒨徐雉切蒿草也䓠他市切菜生水中者古文茷符廢博賴二切草葉多也薞蘇昆切草烏薞也徒篤切古文毒䕡吕居切菴䕡也菴倚廉切蘆舍又音諳葊言文萩且留切蒿也又七肖切葎陵出切葎似葛有刺蔠音終蔠葵栯也蘣他口切好貌居包切秦藥名芁同上薋疾兹切蒺䔧也三角刺人蒺慈栗切蒺藜棘草也藜力脂切蒺藜藜旅題切蒿屬苘口頴切草也亦作檾同上蕝子帨子芮二切束茅表位蘴孚雄切蕪菁苖也薆於戴切薆隱也豆音豆豆􅞦藥也荶牛金切草似蒜生水中荶古文萆婢赤切雨衣也一曰蓑衣蔐舒王切草藥蔐遂也􅺀他盍切􅺀布也􅝀音苻􅝀茈草也菤九轉切草名菤耳也古文茸而容切亂貌而勇切不肖薛胥列切草藥莎也説文薛字芘防脂切蕃也芵古穴切芵明也花黃同上葆補道切草茂貌又羽葆也蓾來伍切杜蓾似葵香説文同上薹音臺菜名藝薹莌他活徒活二切草生江南同上薜補革切山芹又音臂薜荔荔力計切薜荔香草也香于切草華也􅞉音孚花􅞉也力振力因二切鬼火或作磷同上蔜五髙切草也尓雅蔜千古切苴草可作履逐兮切麻也萆同上藂在紅切草叢生貌藂俗菥思擊切菥又息移切菀於逺切紫菀藥名莏素和切挼莏也芒罔良切稻麥芒蘋音頻水草大萍也同上䔮思移切草生水中花可食苑於逺切苑飬獸園也得田切草頭菖尺良切菖蒲音爻黃茅根煎汁治消渴𦺔同上蔣子羊切苽蔣子兩切姓也蒟俱羽切蒟醬出蜀菾徒廉切菜名萉扶佛切果實或作黂藥征切草名菊也萾同上薖苦戈切草也又寬大貌茱時朱切茱茰藥也茰與朱切茱茰蔱所戞切似茱茰菣丘刃切草名蒿菣也同上萌麥耕切始也草木芽也芽語家切萌芽也瞥鋪悲切花盛菄得紅切東風菜音膝藥名牛也同上莖余更切枝本説文草木幹莛特丁切莖也海姑切器也葨烏回切葨草􅧚舒理切糞也亦作矢俗作屎薿言紀切荗貌又牛力切蘮居偈切蘮蒘似芹詞龍切菜也䒧音佉草器名葐扶文切葐蒀盛貌又蒲昆切西復葐草蓻子習切茅牙又草木生貌芣方扶切芣然華盛也蓯自容切古文從防無切姓也蒔石至切更種也植立也又音時芃扶戍步同二切草盛貌蘧其居切榖名麥也􅽅而勇切草毛厚􆅅側刮切切菜也萴阻力切前子藥名或楚力切菿都角切與倬同又音到蒢直居切蘧蒢草名胡利切野蘇也薺才禮切甘菜也荹蒲故切牛馬草亂藁也又音蒲蓋胡獵切苦也古害切仍也葇汝遊切香葇菜蘇也蔄方莧切姓也薇音微菜也草也荑大奚切始主茅也荑桑也又音夷莁荑也菈洛台切蘆蔔即􅫘子􅫘度合切菈􅫘蘳呼規切黃花也音寢覆也參舒􅐭切參猶苦也草自藉也或作苦茨疾資切茅茨也以茅覆屋蓈力當切草蓈莠也莠余受切草也虃子廉切百足也藴紆文切積也聚也聚草以火也蘘如章切蘘荷草名蒜蘇亂切辛菜俗作蒜葫戶都切大蒜救立切荲也荲丑力切又丑六切蕡佉云切草名多實䔿作緄切本䔿草叢生蔗之夜切甘蔗薯之余切薯蔗可食也薄丁切荓草馬帚也莫耕切苕草可為帚莫公切草可以作帚蔞力俱力侯二切蔞蒿葴至諶切馬藍又寒將何蘭切蔣草也蔡且蓋切草芥又妙萃疾醉切集也又卦名䕩來道切果名乾梅也蒙莫公切唐蒙即女蘿薵直流切菜名蕏蔥也藇徐與切酒美亦作藃呼到切耗也縮也茫莫唐切速也久逺也藣輔為彼偽二切草名苙閭及切白芷又音及答都合切小豆又當也蓶以追切菜似韭而黃葰相維切薑屬可香口蓩莫屋莫老二切毒草莫候切毒草䓮莫老切細草叢生藎疾刃切進也又草名荵如軫切似蘇有毛􅗰姑但切草莖稱也狃庚切牂可作綆藸致如切草名又五味陟隆直隆二切草名菩防誘切香草文音蒲祇堯切草名連翹蔁之羊切藥名蔁栁也然如旃切草名又藝也同上又呼旦切草也茮子消切莍也與椒同莍渠牛切也䔟弋支切草貌萎䔟也茲子支切草木多益也蕪亡孚切草云蕪薉也落郎閣切墮也又始也蔽甫制切障也隱也於營切草木萎也茀敕勿切茀蘺猶蒙蘢蔎舒列切蔎香草也席詳亦切大也草席也力計切附著亦作麗䔯康路切醋𦵔謂之䔯苪文例切連也或為綴蒪匹各切蓘何苴也蓴常倫切蓴菜水中生茵於仁切草茵蓐也苣勤侣切苣蕂胡麻也薶莫皆切瘞也與埋同苟公后切菜名又苟且萶齒允切萶萶雜也菆阻留切草也叢生也胡拜切烏飱草也茠呼豪切除田草也薅同上出説文萰落見切草名白蘝也䕇胡罪公回二切懷羊蘱閭遂切草似蒲而細薡都領切草名薡董也藆居輦切草名藆藅也藅扶發切藆藅奴結切菜似蒜生水中薌許良切穀氣亦作香莘所巾切衆也又地名薝丁敢切草名薝棘也蒀於云切葐蒀盛貌􅟏巨凶切蓂莢實也艻郎得切蘿艻香菜也芊七年切芊芊草盛貌􅞦呼候切豆蔲藥名蘩輔袁切草名白蒿也蕭蘇條切香蒿又蕭索蘥余灼切穀名雀麥也􅭚素老切蔜􅘚也􅘚力主切蔜􅘚薢古諧切庚買切薢茩茩古后切薢茩蔌桑卜切菜茹之總名苕徒雕切苕草可作帚薔音檣花名薔薇也蘠才良切虋冬草也蘢盧功切馬藻又音龍蔓忘怨切藤生蔓延也菋無貴切荎藸又五味荎雉之切草荎藸也葛功遏切蔓草根可食古勞切如葛白華芫牛袁切草芫花藥名艼秃鼎秃霝二切艼熒葋渠俱切葋艼熒也莨來唐切草也亦粱也菌慈荏切地菌謂之菌菌竒隕切草芝地菌也䓴而兖切木耳生枯木萋且嵇切萋萋草荗貌菶輔動切菶菶多實也蓁疾陳切衆也又草盛葼子公切木細枝直幹芼莫報切芼拔取菜也藥與灼切治病草揔名蕰於粉切聚也又菜也煙於去切臭草謂之煙藑巨營切草名藑茅也荋䜇之切草哆又亭名藪桑後切大澤曰藪䒹來潰切耕多草也苫舒鹽切草名茅苦也藹於蓋切腌藹樹茂也芻楚俱切茭草俗作芻蕢竒槐切草器又音塊蓧徒呌切草器名也莝且卧切斬草謂之莝蕘乳燒切芻蕘草薪也薪息秦切析木柴也艽勤牛切逺荒之野也藶力秋切葶藶藥名菉閭燭切菉蓐又菉豆茿豬鞠切萹茿亦作竹藚似玉切草名生脣也䔚時均切草也牛䔚也輔位輔婢二切鼠莞也蕼相利切草名菙也藘旅居切茹藘茅搜也芨居及切芨革草烏頭菧之履切草蒻本作底苨奴禮切草名萕苨也苻輔俱切苻草鬼目也蒫昨何祖邪二切萕實葟胡光切葟榮亦花美花呼瓜切今為華荂字菝蒲逹切瑞草名菝葀葀古活切拔葀狗脊根􅿌苦八切菝􅌝草英猗京切草木英華蕆敕展切備也敕也蕞在會切蕞尓小貌力戈切草器或作蔂蒲骨切蒡又作葧䒲竹亞切䒲葿黃芩也葿亡悲切䒲葿草也禹俱切𦵔草似韭莨力盎切莨薚藥也薚荼盎切莨薚苰胡胘切藤苰胡麻薱逹潰切草木茂之稱力豆切蘆藥也舉魚切草名直也胡鹿切菜生水中者子移切菜生水中力戈切菜生水中孚陸切子也可食求元切敗也委葾也䔷竒金切草根可緣器乙卓切英蒻謂之秸余戞切麻莖又音皆萳乃感切草長弱貌䕍余丗切逺似蘇而赤䓌諸餌切逺恙藥名莫禮切菜名子也力胡切藥名薈也且巳切即葈耳也芚徒昆切菜似莧可食菗丈牛切菗荼菜也似入切茵水草也公玄切明草也茭下校古鮑二切藕根除類切禾秀與穟同薈子登切草名菎薈也莒居吕切草也亦國名茪古黃切茪草也力鞠切蔐草藥也甫俱切藥名地䕪除格切藥名䕪蕩奴如切菜名薯蒵何雞切蘩莬蒵也莊卓切蒵附子也去用切莨薚也藝魚制切種蒔並曰藝音蒲雉有肉也茂莫遘切草木茂盛蔯音陳香菜茵蔯也萄徒勞切果名蒲萄萪苦過切莉藤生海傍莪五哥切草名似斜蒿虆力垂切蔓也又音纍􆇇祝由切草名又盛也葙酥將切青葙子藥名借清切仙草黃也語兩切草出池水䒦孚㪘切草浮出水貌稚遲至切稚草也芽也蒩資都切蒩茅藉也芤苦候切脈候又草名剃杔計切芟去草也葸胥里切畏懼曰葸苯畢衮切苯尊草生也菬之少切菬子藥名也䕀苦菅切藥名苳也蔃強兩切草也險年根可食蒼土狼切青春為蒼天與職切草名藕翹莚以扇切蔓莚草藤生胡木切水草可食者苖靡驕切田木苖也又獵名蔢傍個切草藥蔢􅿋􅿋火個切蔢􅿋蔔傍北切菜名蘆蔔菽升六切豆名亦作叔荒呼黃切荒蕪多草又年飢􅯇什耕切􅯇薴草名薴狃耕切草亂曰薴薁於六切草名櫻薁也䕉地革切草名䕉葛芮而鋭切草生貌又國名莢公叶切豆莢蓂莢也渠立切冬瓜一名䓃於及切草菜茹熟也蔋徒的切旱氣亦作滌葺七入切修補子入切茨也芬音紛草木芬芳盛也荀相倫切草名又姓也荁音桓草芝也堇類莬音問草木新生者莂彼列切種概移栽蒔也音祗繅絲鉤緒也音烏蓲即荻也寒翰二音白草也音瓊草旋貌與榮同蕊如纍切草木實莭二生蓘音衮藨蓘壅養苖也音漸麥之秀白者薯音署藥名薯蕷也蕷音預薯蕷薤胡戒切菜似非亦作苝音佩草名山也䔇音潰菜名又音豈于縛切菜名子蔧才歲切草蔧王帚也蘸側陷切以物內水之蘸蕂詩證切苣蕂胡麻也疾立切菩草名也􅰠與良切􅰠葲藥草名葲音泉􅰠葲亡泛切草木蕪蔓曰蕖音渠荷名芙蕖也茳音江茳蘺香草也著直閭切菋荎著也又中恕馳略知略三切麗也述作也苜莫六切苜蓿本作目宿蓿私六切菜名苜蓿也䔬莭記切連翹草力主切小蒿草葷呼云切禮膳有葷桃茢葷葉所以辟凶邪胡懇切草名似蓍花青白萱虛袁切令人忘戞草萱同上萱同上薄蒲各切厚薄又林薄也一曰𧖟薄蘦來丁切大苦菜或似地黃公橝公㨂二切草名蒍于委切草也荃趍緣切香草蘄居衣渠之二切草名又縣名又音芹折之烈切今作折又常列切同上出説文蒘汝豬切草名蓇古突切不實草􅣻平表毗小二切落也正作莩蔍郎谷切蔍蹄草又蔍䓤也􅫱同上又側吏切輻入轂也渠周切白芷茞時人切草名䔑弋蛇切穗也蓄積也又似嗟切䔩所革切以榖和草餧馬也蓒虛言切蓒草生水中蒁來密切草名䓞來計切紫草莤余留切水草一名軒干又所六切苞茅莤酒也蔟青木切巢也又𧖟蓐也力周切草木莖葉踈萭于矩切草名鼻􆇁切蒿似蓍苴七閭切麻也子閭切苞苴子旅切履中薦䒼丘玉切䒼菹也養𧖟器也􅫟外諸切草名魚齊也公狄切草名胥潰切草名茬在之切草盛貌濟北有茬平縣蕇丁殄切葉似芥一名狗萕葳於歸切葳㽔草貌後堅切草名荌於旦切草名菟音兔莬絲子藥名又音徒地名藺旅進切似莞而細可為席蒤逹胡切虎杖似紅草有救切草名同上藉牆亦切狼藉殘也又疾夜切搜所留切茅搜也春獵為搜桑落色責二切草名䔴義力切草名與鞠切草名䕁甫尾切江湖之間兄卒相謂之棐也蕎居妖切大戟也音橋麥也居逆切藥名木也公魂切香草菎同上􅣀卑列切蕨也紫纂也𥘉生無葉可食蕨居越切筍蕨山菜也葩普華切草木華也椹市枕切桑實薾奴禮切草盛貌蓫抽陸切詩言采其蓫牛􅪞又音逐烏尾草藬他雷切草名生頽也芭卜加切芭蕉又香草蕉子消切芭蕉蔇九利切草多貌芏徒扈他護二切似莞藺越人以為席萿古活切麋吉春生葉似舌充受切草名菝葀也蔫於焉切草煙腐蓸在勞切蓸草也蕃縛袁切息也滋也又甫煩切藩屏也荂許俱芳俱二切荂榮也䔹除季切蘧蒢亦作與周同草也説文􅘂宜居士余二切根似茅可食蓽輔密切似荆為户謂之蓽彌紹切小草細也市昭切草也雇后切草也苛賀多切小草生貌又政煩也怒也􅛧渠與切苦蕒菜也又音渠音龍草名古文字亡候切草名苳丁彤切草名藏慈郎切草名又隱匿又才浪切庫藏荼杜胡切苦菜也又除加切荈尺兖切荼荈葉老者萒惟臠切雀辨也苀胡唐切苀東蠡茇莆逹切草木根輔未切蓽茇藤逹曽切草木蔓生者揔名茗冥頂切荼茗荈也藗桑鹿切白茅芀都聊切葦花䖆女亮切菜也𦵔也説文而丈切莁武俱切莁美一名白蕢恥亮切草木盛也䓉與蛇切草名萊旅災切藜草艿音仍舊草不芟新草又生也於亦切蓋母草本作益茺齒戎切茺蔚即益母葽於燒切草也芟所嚴切除草芿而證切草芟陳者又新生者余斃切葉似竹生水中蔚烏貴於勿二切茺蔚蒥力牛切香草􅮳九出切草也菜且賚切草可食者揔名菜古畦苦畦二切鉤藈姑草菰故吳切藈菰葞亡此切春草疾來切草也居欠切草藥根可治喉痛茹而預而與而諸三切柔也菜茹也飲牛也又相牽引貌易按茅連茹蓄丑六切蓄積也災阻飢切一歲田又子來切害也荺營窘切茅根又藕根為茆閭酉切茂盛貌又亮葵也或亡絞切􅛄同上出説文菏乎哥切草也又音柯澤名菩薄胡切佛號步亥切草也薩桑葛切釋興菩薩也䓝亡庚切狼尾草俞主切草名蓪他公切藥草䓂魚鞬切草名莋才亦才各二切如草也且栗切葉似蘇葏才千切草茂貌莫侯切草也胡故切草名􅚄力當切毒草藖下間切堅也又下辨切蓲橅俱切蓲萮花貌萮庾俱切蓲萮蘛同上又音育亦同上𦶈他甘切菜蔥也䕣餘括切草似蕨生水中虂力故切草蘩虂也􅥖有貴切􅥖草也苭於皎切草長葓音洪水草名音詵地名蓊烏公切烏孔切木茂貌䔲音登草名金䔲也䔶音提䔶草也同上古治切草名音基種也􅺡以遮切枲屬皮可為索鋤邪切水草名音劬芟草也芝止而切瑞草苸火烏切草名音毛藥名苶奴結切疲也又乃莢切蕫音童草名又音董得盧切草也莫五姑切茣草也䓙古懷切䓙草也䓐食切切草名恱宣切尾草射干也􅺟力雕切􅺟草也蘹户乖切草名作才切草名菕律春切菕草古和切草也䕈思狹切草也又徒叶切蕔博蒿切蕔草也識余切草也蒢祥余切草也羽鴈切草名同上許往切􅩛又詠永切草徒兼切藥草名也渠焉切草名苦婁切草也䕱徒侯切草也莫胡戈切草名子了切草似薺菜蒖之仁切蒖草䒢也萓魚飢切草名莮奴含切草也薑居良切山草蔓莫半切草名𧀔音尨又火角切並草名昨寒切草名都昆切草名都官切草也䒟都蘭切藥草天古文天字蕠音如蕠蘆草也亦作茹音緩香辛草胡也荽同上䒘同上䕊都闌切草名荿時盈切荿草荄古菜切草根也又音皆􅔾音盲藥名貝母同上同上余舟切草䒜魚丘切䒜魚蒂都計切草木綴實本也蔲古豆切草藥名茴胡魁切茴香繭遲隆切草衰䕔胡監切草名直離切草也蘿盧多切托松而生女蘿也蓎徒郎切蓎蒙女蘿也戍江切草也時羊切草名防久切草也夕預切草也䒕私沼切䒕草逺志也蕄莫耕切蕄蕄在也􅽪同上本或作萌于矩切草名都朗切草也蓰息紫切蓰草也􅙤祥由切夜也又與糟同苦聾切心草與章切草名藢張里切火草名式止切草也九輦切草名芋或虞切草盛貌又王遇切菠博何切菜名菠薐薐勒登切草名苲阻假切草名藠胡了切草名之兩切草也櫻於盈切草名櫻薁莉力奚切藥草名息離切草名乃侯切草名滿切草也巨錦切草名子隨切草地䓴也䔀汝佳切薑倭也蕪亡夫切荒地草許俱切芋也胡降切草似葵虛鬼切草名䕒古牙切䕒是藥也徒頓切藥草名息觜切草名䔪史養切䔪草也芠無分切芠草也䒚舒小切䒚草也胡感切又胡紺切草也葔胡溝切葔草名渠救切草藥名萀呼古切萀草也􅠩奴低切草露根夕雨切草苾莆結切苾芳草名芳孚方切芬芳香氣貌七選切藥草名䒴于九切草也䒡於軫切草名葤音紂草名荐在見切重也數也再也蘆胡古切蘆葦草尸枕切草名徒罪切草也無粉切辛草也蔊胡但切草也普木切草生貌莫後切草也荱亡匪切藥草名巨矩切草名蒲杯切草名䉈蘇剪切草也蒞力至切臨蒞治也與涖同􅌣音樓土瓜􅌝􅌣也亡板切草名蘟於謹切晦也苽莊巧切藥草徒爛切草也􅞒古郎切草名岡草也葻負弓切草動貌亡典切草也蕺爼及切菜名䒛胡貫切草名萺莫報切萺草也䔺恱吹羊菙二切藍蓼秀也盧到切勞薅也莄古幸切草名煮扇切草也舒戰切草也步鉤切草爼也蓓薄亥切草名黃蓓又蓓蕾蕾落猥切蓓蕾花綻貌菍奴占切草名葃慈作切草名千歷切草名音覓草也藰六九切草名草也䔔居競切䔔草也䓭楚戞切䓭草也先結切草也蔛胡鹿切石草名莈莫勃切藥草藞力無切藞磋不中貌䕢除瓦切藞䕢莯母卜切草也甫祿切草也子昔切石草䔁力質切草也䔭奴領切寧毒草也莡粗合切行草聲藌冥栗切藌草也䔱伊立切草名䖇於律切香草殂勒切草名菪徒閬切草名可席也􅹋渠列切􅹋草也蔭於鴆切草蔭地莫卜切菜名胡眣切草也䒸許大切草名於立切草名尼立切居滑切草名赫呼歷切草盛貌薈烏會切草盛貌簉又敕切草根雜子合切又音雜草名古八切草也蒒色淄切草名音機草也苮音仙草名似莞音題説文草名蒴始卓切草名蒴有五葉仗卓切蒴音凋葫茭實也䔸音表草名尺加切草芽蓮力堅切荷實䕓𥘉戞切䕓草有毒用殺魚蘪音縻切草糜蕪也菺居賢切荗葵今蜀葵茙如終切菜名茙紫也大廣益會玉篇卷十三
