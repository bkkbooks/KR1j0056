body:
  text: 大廣益會玉篇卷第五凡十部口部五十六凡五百二十三字口苦苟切説文人所以言食也聲類古文口字嚨力公切喉也啜昌恱常恱二切茹也又音輟詩啜其泣哭啜泣貌咽於肩切咽喉也咽同上喙詡穢切曰喙左傳深曰而假喙噫乙匕乙介二切飽出息也又於其切痛傷聲也喉胡鈎切咽也嗌於亦切咽也咺呼逺切説文朝鮮謂兒㳋不止曰咺嘻虛記虛吉二切詩嘻其笑矣又大結切易不嘻人亨囓也籕文本作噲苦夬切咽也唴丘亮切秦晉謂小兒泣不止曰唴於結切飲㗧也詩中心如謂憂不能息也喗牛隕切大口也同上吮食允徂兖二切敕也史吳起為土卒吮疽囁之涉切口無節亦私罵又而涉切囁嚅多言也咀才與切咀嚼也㗱子立切噍也嚛火沃切大啜伊尹曰酸而不嚛嗾蘇走先奏二切左傳公嗾夫熬焉方言云秦晉兾隴謂使犬曰嗾使犬倉候切或嗾同吸許及切內息也詩載吸其舌吸引也喤胡彭胡光二切小兒啼聲噭吉弔切孔也呼也呌吉弔切呼也吉弔切髙聲大呼也咦弋之喜夷二切大呼也又笑貌喨力尚切唴喨啼極無聲哆處𥿄尺寫二切張口噬視制切􅲪也噍才笑切嚼也唏許几許既二切笑也一曰哀痛不泣曰唏㘈牛力牛忌二切小兒有知呱古胡切小兒啼聲嚌在細切至齒也古文呭餘丗切呭呭猶沓沓也亦作詍喑於金於井二切啼極無聲啾子修切啾啾鳴聲嚼疾略切噬也同上嘌匹遙切嘌嘌無節度詩匪車嘌嘌嗒吐合切莊嗒然似喪其禍咷徒勞切哭號咷也啖徒濫切食也哈五合切魚多貌嗑公盍切多言又音盍噬嗑卦名呼火胡切外息也又火故切咳何來切小兒笑也㗘補洛切噍貌吞他恩切咽也嘵許么切詩矛維昔之嘵嘵懼也吹齒規切出氣又齒偽切嗛胡簟苦簟二切嚙也味武沸切咨味呬火利切息也嗸五髙切詩鳴鴈于飛哀鳴嗸嗸又衆口也吟巨錦切口急又古吟切饞士咸切小也喙也喘充兖切疾息也喟丘愧切大息也哤莫江切匡語雜處則言亂貌又異言唯俞誰切獨也以水切諾也山劣山芮二切小飲噓香居切吹噓也嚏丁計切噴鼻也慨苦載切詩慨我寤歎廣雅云滿也唱充向切導也倡字同嘰居祈切唏也小食也名彌成切號也吾五都切我也嘆敕旦敕丹二切况也太息也與歎同咠七入子立二切口舌聲含户耽切食而未吞君居云切尊也問亡糞切訊也吠扶廢切詩無使尨也吠鳴也嗿他感切衆貌詩有嗿其饁哺薄路切口中嚼食也噱渠略切大笑也噱同上嚇呼駕切以口距人謂之嚇又呼格切嚋除留切誰也陟流切誑也竹滑切口滿食也咄丁骨切叱也唉於來切應聲也呀虛牙切大空貌又唅呀張口貌吐他古切口吐又他故切嘽他丹切馬喘息貌嘫女間切語聲也呷呼甲切吸呷也唲乙佳切小兒語亦作哇又音兒咈甫物切違也易咈經于丘嘳苦怪切大息亦喟同嘒許惠切小聲也嚖同上㖃呼㖃呼遘二切厚怒聲又胡口切吠也嘯蘇弔切蹙口而出聲之日切野人之言也居矣切説也喅由六切音聲也子纍切或作觜識也一曰鳥喙啻詩䜴切買賣云不啻噤巨錦巨禁二切口閉與昭切喜也嚱許羈切口聲也呿祛遮切張口貌又丘居切卧聲哇於佳切又居攜切諂聲召他廟切呼也又音邵咸胡讒切皆也吉居一切善也呶女交切喧呶也詩載㖕魚葛切言相呵拒也命靡競切教令也使也周諸由切密也嗢乙骨咽也切啐倉抉倉憒二切嘗也又子律切吮聲唪薄孔切大聲又音棒咨子祗切謀也嗟也嘾徒感切大吞也嚘於求切氣逆也唈烏台切嚘也爾萑云僾唈也哲智列切智也明哲也哲同上嚞古文嗜食利切欲也呩古文吻武粉切口吻亦作盿吻古文吒知加陟稼二切噴也又叱怒也吒同上喥同上呰祖爾切口毀也嗻之夜切遮也噉徒敢切噉食也亦作啖啖同上噧呵芥切他曷切髙氣多言叶胡牒切合也古文協硤古叶切妄語也嗙補庚切訶聲也和胡戈切可也胡過切應也和古文㕧許梨切念㕧呻也亦作屎聽魚隱切仰鼻又笑貌厹巨周切髙氣也㕤同上哯乎典切不顧而吐也咞同上吟牛今切吟詠也亦作訡古弔切聲也亦作呌叱齒逸切呵也噴普寸切鼻也唐逹當切國名代名古文吪五戈切詩或寢或吪動也噂子損切噂􅊱對談語噊余出切危也呻舒神切呻呤也吁虛于往付二切疑怪之辝古文哨且醮先焦二切言野朴􅊱徒合切噂沓亦作沓喻俞句切曉也咨子詞切也念丁見丁念二切念㕧呻吟也同上噆錯感子感子合三切銜也嗔逹堅切盛聲本作闐丑短切笑也各柯洛切異詞也啼逹奚切號也左傳豕人立而號啼同上否蒲鄙切閉也方九切不也呼火吳火故二切大聲喝乙芥切嘶聲􅯳同上噎也􅮛五葛才曷二切嘈􅮛囐同上哮呼交切豕驚聲又大怒也呈馳京切解也平也吝力進切惜也古文㗲胡麥切㗲嘖呌呼咟同上啄丁角切鳥食又丁木切啓康禮切開也本作啓哀烏來切哀傷喃女銜切小呢喃多言呢女知切呢喃小聲多言也同上唬呼交切虎聲又古伯切右禹救于九二切助也嗀許角切嘔吐貌噣竹救切喙也詩曰不儒其噣亦作咮咮同上嘐火苞切誇語古苞切雞鳴啁竹包切啁嘐雞鳴也嗼亡切靜也啍徒孫他昆二切重遲貌詩大車啍啍噋同上𠸹呼麥切於六切聲或作㰲嘲陟交切言相調也咼口淮切口戾也喎同上􅡜下刮切塞也嘷胡髙切咆也喛呼亂虛元二切呼也喛哀丁頰切吺多言也吺丁侯切吺同上喔乙角切雞鳴也嚶於耕切鳥鳴也喓於遙切聲也詩草蟲喓喓嘮丑加切嘮呶歡也喁魚凶切衆口囒吕干切聲也哰盧髙切多言也㗦盧髙切聲也嘺丘遙渠堯二切不知是誰唇之人切警也唇口嘕許連切喜也去連切歡樂貌喊呼減切聲也嚂力切貪也吂莫桑切使人問而不肯答嘖壯革切嘖嘖鳥鳴嗟則邪切歎也叵普可切不可也啌火腔切咄也唶子夜切嗚也魚艱切犬相口訟詞㘙牛衫切冝戟切呻也嘈才刀切聲也噆才割切嘈噆也局其玉切曲也咡而志切口旁也吢七浸切大吐亦作吣呝於革切雞聲亦作厄丑消切喉鳴也先榼切醜也咹一曷切吃也吨逹昆切不了也唁宜箭切弔失國曰唁唁同上又魚旰切語由也唁啀魚佳切狗欲嚙呼縷決切雞鳴也乙學切誇聲也哹匹尤切吹聲嘇山咸切口臽嘇物也前歷切嗼安靖也嚝火橫切聲也售視佑切賣物也嚊普利切喘息聲蘇曷切音變也喋所甲切喋喋鴨食亦作唼喈古崖切和聲之逺聞啅陟握切衆口貌呁尤峻切吐也呥而廉切噍貌啒古兀切憂也喋丈甲切食也徒叶切便語呦音幽鹿鳴亦作嘔乙侯切唲也歌也唼子合切咬也尺活切齧也同上噞冝檢冝艷二切魚口上出􅢕牛府切麀鹿亦作麌嘁子六切蹙咨慙也唵一感切含也五合切衆聲也㗨久佳切笑貌咻許主切痛念聲又許流切嗹閭前切嗹嘍多言也嘍力口切多言唹乙余切笑貌余輦切大笑也㗿火下切笑也􅳅子廉子艷二切不廉也嗉思故切鳥受食之處吵彌沼切雉鳴也哂式忍切笑也笑思矅切俗笑字呣莫侯切慮也嘹落蕭切嘹喨又力弔切嚃他而切嚃謂不嚼菜莫奴切古文謨默莫比切與默同吼呼垢切牛鳴也吽上同又丁今切于白切自是貌或作讗台與時切我也又音胎嚾荒旦切喚同噮於縣切食甘也咋側革切聲大也響虛丈切饗應聲叨他勞切説文與叨同貪也公以臠切山澗陷泥地嘬楚夬切一舉盡臠孚願切多言也哊禹六切吐也咍臺切笑也戶姑切與胡字同牛領垂火曷切詞也亦作喝咰所律切飲也嘪彌解切羊鳴也嗕如屬切羌别種嗤尺之切笑貌咇蒲結切芳香又毗必切呫他叶昌涉二切嘗也喌諸由切呼雞聲呞式之切牛噍也噪先到切呼噪也同上之六切或作呼雞聲嗃呼洛切嚴大之聲鳴眉兵切聲出也㕭於交切媱聲啉力耽切貪也喧許貟切大語也嚅汝俱切囁嚅多言也㕰火角切㕰嚗恚呼貌􅵤了延切噈􅵤也嚗必角切怒聲唧子力切啾唧也咆蒲茅切咆哮詬呼俱呼具三切噓吹噅許為切口不正又醜哦五哥切吟哦也㗓丁龜切口蒲貌嚬蒲民切笑貌哃徒工切妄語咬古爻切鳥聲俗亦作咬采老切無人貌盧切㘇于兄切啼㘇也呤力丁切小語啨伊青切小語唌似延切徒但切歎也唭丘吏切唭㘈無聞貌喍仕皆切啀喍也喂於韋切恐也嗺子雖切撮口也訟古紅切衆口吭戶郎户浪二切鳥嚨嘻欣基切嘻嘻和樂聲叿火紅切呵也吱指移切吱吱也㘋胡堅切難也吙許戈切呼氣􅧸火牙許下二切口􅧸􅧸㘆他亥切㘆言不正逹改切言不正噇直雙切喫貌􅥾胡垓切笑也唋他胡切吐也㗢胡冬徒弄二切多言善是闡切吉也一作譱虎佳切口戾貌噴蒲門切吐也蒲毛切鳴也許今切吽也噥女冬切多言不中也火夫乎割二切息也唩烏和切小兒啼咃吐多切出佛書咁乎井切乳也㕱胡求切犬吠唆蘇戈切㗻唆小兒相應㗻古禾切小兒應吥匹侯切吸吥也哸素回切口哸也呅莫杯切哸呅也古回切呼也咿於祗切喔咿強笑也噢乙六切噢咿內悲啡普梅切睡聲咣古橫切能言也􆉈力之切言不正唻力皆切歌聲嗊呼孔切囉嗊歌曲嘶先奚切噎也馬鳴也嗆七相切鳥食喡于歸切失聲胡公切聲也丘引切脣瘡卟吉兮羌禮二切問卜咏為命切歌吟或作詠􅺏胡孔切鳴聲也𥘉瓦切惡口喠之勇切不能言噴匹本切噴也􅫗莫者民婢二切羊鳴噈子合子陸二切嗚噈㖦丁動切多言喕彌演切不言也嚕力覩切語也居輦切吃也哻香國切殷冠名亦作吷許劣切小聲與啜同㕦胡罵切人聲也嗽桑奏切咳嗽也音㗗另別也叩苦候切叩擊啞於雅切不言烏格切笑貌呵許多切責也與訶同胡感切嘾也狙本切大口也救主切口不正吘五苟切和吘也嚙五挍切齧也正作齡哈所洽切以口歃飲也㗂色景切緘口也􆂼而尹切吮也乃等切多言唍胡扶切小笑貌呧多禮切呵呧正作詆㖢疾離切㖢嫌或作飺㖺大永切吹㖺也息寸切湓水也力凍切言也㖑許戒切喝㖑也噦火外切鳥鳴於月切逆氣呐奴骨切訥同遲鈍也㗕古侯切幼㗕也囀知戀切鳥鳴也唄薄賣切梵音也去尤切口也唳力屑切郎計切烏嗚􅚓古切和嗚或為關唾他卧切口液也㘐普貌切唎也嚫初覲切施也匹問切怒也柯猛切語為人忿疑哽柯猛切食不下喉也􅻌五弔切呌也噯烏蓋切噯氣也㖟熟臰切口受也嗄所訝切聲破喏人者切如酌切敬言嗚於胡切嗚呼歎詞也㖆去鳯切問罪也胡貢切市人嚜丑利切詐言也藏賜切口小叮都苓切可嚀囑付也嚀奴丁切可喘􅿸渠義切喫􅿸也啈許更切利害聲力泰切聲也􆉅同上噌楚耕切噌吰市人吰胡觥切噌吰徒介切嘗吠也於列切怒也囑止屬切付也㖨力篤切笑也嗡烏紅切嗡􆄵牛聲也􆄵烏撗切牛聲嗖所六切笑貌唷俞六切出聲普必切唾吡吡必切鳴吡吡杏他豆切唾也不受語也咅同上秦悉切噈疾也補密切鳴也息必切吹口貌則屑切嗚也咽於見切吞也亦作咽囈魚計切笑也亦睡語子六切口也力述切鳴也祖郭切聲也知力切鳴也哩力忌切出陀羅尼多耒切答今作對嗝古厄切雉鳴也魚隙切歐也丁盍切也阻治切豕食啃所戢切咠啃口聲也于月切辝也本作粵嗋許劫切吸嗋哫子渌切訾哫也古或切口聲也㘉側瑟切咇㘉也喇力葛切喝喇言急也呹余質切牛羊呞草貌㘍子悉切蟲鳴欻許勿切氣也吃居一切語難於八切噎聲㗫千結切小語又子細切唰所劣切鳥治毛衣也㗧知栗切咄也力葉切齧骨聲囃七盍切助舞聲唎力至切聲也喢山涉切叱涉切多言噱渠逆切嗢噱笑不止㗩先立切忍寒聲𠷑匹活切妄説也喫去擊切啖也同上咂子合切魚食又入口叭普八切匹活切口開唿呼骨切憂也哠胡告切多言也魚矩切欲笑也哵補戞切鳴也嗐胡戞切大開口又胡蓋切嗒多臘他臘二切舐也於力切快也咭巨吉許吉二切笑貌俱立切喻也哉祖才切語助􅶭渠隕切吐也谷部五十七凡五字谷渠略切口上呵亦笑貌同上他念他感二切舌貌一曰竹上皮音他感切同上古文如隴切闒不肖也舌部五十八凡十三字舌時列切在口中所以立言者􅞌通答切大食也吐盍切義同上舐神爾切以舌取物也舐同上􅜻同上䑜湯蠟切大食也􅤉渠蔭切牛舌病􅽗胡快切古文話􅨏他干切􅨏􅨵言不正􅨵他連切􅨏􅨵舑他甘切舚舑舚他兼切舚舑吐舌貌齒部五十九凡九十二字齒昌始切口齗骨古文古文齗魚斤切齒根肉齺七角初留二切無牙名説文齒搚也一曰馬口中檿齳牛忿切無齒貌同上齞研繭切口張齒見宋玉賦齞脣歷齒齯五奚切尓雅黃髮齯齒壽也謂齒墮更生細者七結切治骨也齖五加切齒不平䶥莊如莊居二切齒不正又鋤牙切䶥齖丑之式之二切尓雅牛曰齡食巳久復出嚼之同上咬五狡切齧骨此何切齒跌者又楚冝切齒參差也齵五傋牛俱二切齒不齊齱側遊切齵齒貌齰仕革切齧也齚同上齨渠柳切老大齒如曰一曰馬八歲五五偃二切齒見貌魚轄切齒缺又音在骨切齚也齮魚綺切齧也齸於亦切尓雅麋鹿曰齸食之所在齰叉革切齒相值一曰齧也􅬺牛銜魚欠二切齒差五街切齒不正同上齜仕佳切咬五狡切齧也士一切齧也説文齚齒齘何介切齽齘切齒怒丁立切齒齧齦口狠切齧也齲丘禹切齒蠧齡吕經切年齡也呼瞎胡瞎二切齧堅聲在何切齒差跌貌力錢切齒見貌䶔直離切齒齗貌卓皆切噍齧聲竹加切大齒也大結竹一二切齧堅胡夾切曲齒亦作䶝補洛切噍聲䶗客牙切大齧也䶞丘之切齧也齻丁千切牙也􅐅又渥切齒相近聲亦作齪䶙九與巨與二切齗腫力盍切齧聲䶖渠隂切舌病胡匝切食也齙步交切露齒䶤胡八切齧骨聲亦作䶛力曷切齒分骨聲莫丁切齒也必茗切齒也巨依切齒危也七良切小齒䶘吕及吕合二切噍燥物聲䶣五哀切䶣齒又音該齼初舉切齒傷錯齭同上又音所􅨭七眼切齒不正齴魚蹇切露齒貌齤渠圓切缺齒也一曰曲齒齕䀶沒下結二切齧也齫空衮切齧也魚倚切齒也􆄓初産切小兒齒丁陷切剔齒齟才與切齧也牀吕切齟齬齬牛莒切齒不相值也䶩殂詣切齒牛也五計切言齒也𪙊魚欠切好貌初夬切剔齒齛私列切羊噍草亦作詍齷於角切齷􅐅初八切齒利齧魚結切噬也䶠口治切齧也齶五各切齗也䶜古沃切胡谷切齒聲牛引切笑也齒齊也齔叉謹初靳二切盧葛切齧物聲音歷齒病胡葛切齧物聲牙部第六十凡五字牙牛加切壯齒也詩云祈父維王之瓜牙古文丘竒切虎牙丘禹切齒蠧齦口限切齧也須部六十一凡五字須思臾切靣毛也􅛂如廉切頰須也頿子移切口上須左傳靈王生而有䇓或作髭􅓄方于步侯二切短須髮貌方皮切須髮半白聲類云􅛂貌彡部六十二凡二十四字彡先廉切毛飾畫文又所銜切彬鄙陳切文質備説文古文份彰諸揚切明也説文文彰也鬒之忍切稠髮亦作鬚形戶經切象形㣎莫祿切細文於六切文章貌詩黍稷茂盛貌雕東堯切琢文書峻宇雕墻修胥遊切治也飾也􅒷徐井切清飾也力旦切鮮明也筆院切古文變七卧切形也耐如時切頰須又獸多毛影於景切形影又影響弱如藥切尫劣也余鍾切重影也彩七宰切文章也章余切古文諸㣒七孕切七曾切毛張彯匹妙切彯畫撫招切丑玉切豖絆有貌工古紅切彩也彲丑知切獸名彣部六十三凡三字彣亡分切説文也彥魚箭切美士四彥上同説文彥文部六十四凡十字文亡分切文章也力詩切畫也斐孚尾切文章貌詩有斐君子辬輔顔切駁文亦作斑斒方間切斒文也斕力塞切斕斒同上斌鄙鄰切文質貌亦作份彬他旦切無采色莫爛切髟部六十五凡一百八字髟必凋所銜二切長髮也䯽芳干芳武薄侯三切髮好也或作匹育匹宥二切周禮追師掌王后之首服為本或作髮府月切首上毛鬢卑刃切頰髮也都果徒果二切小兒剪髮又直垂切鬈渠袁丘袁二切髮好也亡先切燒煙畫眉五割切小兒髮􆇼徒合切髮也子旦切髮光澤也又子曷切多毛鬝苦間口瞎二切鬢秃䰈千河昨何二切好也鬗亡千切髮長貌髻居濟切髮結也䯰同上又古拜切簮結也䰂且代切帶摻頭又音采䯸且利切首飾為䯸䰐力甘切髮多髦莫髙切髦俊也奴禮切髮貌同上丁兼切鬑鬢踈貌􆇨莫髙切髮至眉也髳同上鬋子淺切也鬑力兼切髮長貌䯾直由切髮多鬆先凶私宗二切亂髮貌鬆同上𩯰作結切束髮髲皮寄切鬄也髢逹計切髮髲也鬄同上又先歷切孚紹切髮白貌亦作顠髺胡括古活二切潔髮鬠同上束髮也䰉薄桓切卧髻也鬕亡亞切帶結飾方五切髻也符小切又匹紹切亂髮髬普悲切被髮走貌䰎丘位切屈髮也鬣力葉切長須也䰕來都切鬣也䰃補蕩切䰃也鬖楚今切色減切亂髮子困切項上無髮䰁補牧切忽見也女卭切亂髮也鬊舒閠切髮也髧徒感切髮垂貌莫紅切馬垂也佛芳勿芳味二切髣佛髣芳往切髣佛也髼部公切髮亂貌鬃才宗切髙髻也鬐渠祗切鬣也鬞女龍切毛多又女紅切鬇士行切鬡髮亂字書或鬇字鬡女耕切鬇鬡也渠切髮亂䯹先廉切髮也鬒之忍切稠髮亦作鬒髵如時切多毛亦作􅚎他歷切剃髮也髠口朝切剃髮剃他計切削髮也字由切接髮也髹七二切漆也又音沐髽側瓜切以麻約髻也口八切秃也鬃子公切毛亂也直追切髻貌䰄先才切小髮息利切與肆同極陳孚勿切婦人首飾也鬟胡彎切結鬟䯷息隆切細髮也余封切髮長力之切髮貌髭子移切口上須本作􅎐五切秃也曲王切髮鬤如年切亂髮側下切多毛都果切髮垂必未切鬢多毛也䰆而由切馬之繁鬣都爾切髮美也胡覽切短千旦切髮光也古暗切靑也鬚息俞切亦作須髭鬚助庚切鬡亂髮髹許求切赤黑漆髤同上力六切亂髮仕切髮也髯汝占切頰須本作總子紅切馬鬣又音揔符沸切髮少䯿昨沒切髻䯿也補各切髮也女轄切細毛髫徒聊切小兒髮髿所加切髮髿垂貌大廣益會玉篇卷第五
