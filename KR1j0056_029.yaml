body:
  text: 大廣益會玉篇卷第二十九凡五十二部長部四百四十四凡十七字長直良切永也久也常也又知兩切主也又除亮切多也仧並古文肆思利切陳也緩也次也放也列也遂也恣也踞也量也䦋午刀切長大貌镺於倒於到二切镺長也猝也乃倒徒到二切亡支切長久也今作彌彌镽力小切镽長貌竒小切镽巨支切長國名髮長於身音容飾也镻大結切蝁也蛇毒長也於皎切長不徑䦊乃鳥切􅜚子邪切今作嗟憂歎也或作􅜚嗟古文匙部四百四十五凡五字匙呼罵切變也今作化真之仁切不虛假也又仙人變形古文魚其切亦作疑又古文矣化許罵切易也教化也亦變化或作匕部四百四十六凡十字匕必以切匙也矢也卓竹角切的也卓卓髙貌今作卓古文故恨切止也堅也很也今作艮布道切相次也魚兩切望也欲有所庶及也為也也尚也俯仰今作仰又五郎切卬卬君之德也丘婢丘翅二切顒貌又頃也匙卜支切匕也或作匙匙同上奴道切頭也髓也或作或作比部四百四十七凡三字比必以切類也校也並也又毗至切近也親也吉也阿黨也備也代也又步之毗吉必至三切芘古文毖彼冀切勞也也疏也又泉流貌從部四百四十八凡五字從疾龍切相聽也今作從同上篆文肄余到切習也勞也而復漸生也篆文籕文聿部四百五十六凡三字聿以出切遂也沭也自也辝也循也所以書也楚謂之聿吳謂不律燕謂之弗秦謂之筆筆碑密切不律也􅩎子仁切飾也書部四百五十七凡七字書式余切丗謂蒼頡作書即黃帝史也又著也文也説文書畫胡卦切繪也俗作畫又乎麥切分也計也䇿也界也止也古文又作劃畫説文畫晝知又切日正中籕文隸部四百五十八凡四字隸徒切余二切及也一作徒改切及也亦作逮隸力計切附著也隸同上臤部四百五十九凡五字臤口間户千口耕三切堅也緊居忍切纒絲急也紏也又作紾堅古田切固也強也豎殊主切立也竪俗文匝部四百六十凡三字匝子合切周也遍也師所飢切也教人以道者之稱也象也人也古文出部四百六十一凡十二字出尺𫐠切去也見也進也逺也又尺季切糶他弔切出榖米丘愧切里名􅝨五結切不安貌亦作隉五骨切飿也亦掘斷也􅒸口骨切亦作之芮切名山名之芮切卜問吉凶仕角切逺也麥卦切出物也也今作賣􅨝午刀切也今作敖屈丘勿切曲也亦作詘之部四百六十二凡三字之止切是也至也往也發聲也出也古文囷丘倫切倉也廪之圜者圃布五補五二切菜園園于元切園圃也圝落官切團圝也須緣切面圎也音泓空也囚女洽女立二切手取物也因於人切就也緣也圁魚巾切圁陽縣莫弓切地名圉魚舉切養馬也旨兖切囚刑圍于非切守也繞也就也囹刀丁切囹圄獄也圄魚吕切禁囚囚辝留切繫也回胡瑰切回轉又邪也古文困口鈍切窮也匱也極也圂胡困切廁也豕所居囨匹玄切唾聲圚音闠圖大乎切畫形也又何圖八卦也古文柙假狎乎甲二切亦作柙卣音酉中樽器又音由苦角切鞭聲陟栗切下入也囿于六于救二切苑有垣也籕文囦烏緣切囦水古文淵園五丸切削也亦作刓候閣切會也女洽切手動囮余周五戈二切鳥媒也囮同上陟革切硬貌圔烏合切窊聲音莫見文音縶囩于巾古元二切田十二頃又回也魚欲切古文獄字古文曰字古文國字圀古文國字圛余石切説文回行商書圜圛升雲者半有半無也貟部四百六十九凡三字貟胡拳切物數一云官數又乎軍切籕文音云又音運物數亂齊部四百七十凡四字齊在兮切齊整也亝古文且題切等也音齊病也干部四百七十一凡三字干各丹切犯也求也觸也干戈也如甚切言稱甚屰冝戟切不順今作逆幵部四百七十二凡一字幵五堅切平也又音肩片部四百七十三三十九字片普見切半也判也開拆也普逼切判也牘徒木切書版也牏之句切築牆短版又音頭版布服切戶籍也判也牑布然切牀上版榜普朗切牌也牌扶佳切牌榜扶來切版也牒徒頰切譜也札也力見切木解理也業魚劫切今作業耻格切今作坼於檢切屋雀㸢步祕切㸢摸也先吐切牒小契牉普半切半也分也胡戈切棺也普麥切或作除姚切也牊直遙切􅟜且回切􅟜屈破狀徒回切􅟜余之切步皆切妝音莊畫妝音梵窗楚江切窗牖與窗同牖余受切窗牖扶忿切力可切艫别名音受棺欃仕懴切版也箋子田切表也亦作箋㸡是朱切㸡以遏水力朱切㸡徒切仕革切杴音坎版也牀部四百七十四凡一字牀仕良切身所安也易曰巽在牀下毋部四百七十五凡三字毋武俱切莫也今作無毐於改切人無行古娭字秦皇毋與嫪毐故丗罵媱曰毐戶圭切姓也克部四百七十六凡四字克口勒切能也獲也勝也並古文部四百七十七凡五字普折切右戾也乀甫勿切左戾也乂魚廢切芟草也亦作刈弗甫勿切矯也不正也古文弗部四百七十八凡一字余制切拖身貌虒身之並從此弋部四百七十九凡四字弋夷力切撅也所以挂物也今作􅍻亦作隿子郎切繫船大弋也又戕牁郡亦作牂㢥徒棟切船左右大木各何切即牂牁也部四百八十凡三字以支切流也丂也移也也余尓余者二切辝也所以窮上成文也説文秦時刻石也字如此亅部四百八十一凡二字亅居月切鉤逆者謂之亅説文衢月切知衛切鉤識也又居月切句部四百八十二凡九字句古侯切曲也不直也又九遇切止也言語章句也又古候切説文句拘矩娛切執也止也撿也丁候切裂也亦作剅笱古後切所以捕魚古迷切則也鉤古侯切曲也所以鉤懸物也引也巨俱切也亦作朐時召切倒懸鉤丩部四百八十三凡四字丩居周切相糾繚也又瓜丩起説文丩居稠切草之相繚也糾居黝切正也舉也督也絞也戾也急也三合繩也收也繚也絲也􅡊部四百八十四凡四字􅡊於近切匿也今作隱除力切不曲也凖當也直今文矗初六切齊也草木盛也亡部四百八十五凡六字亡武方切死也去也逃也無也作亡同望無放切逺視也覬也伺也又無方切無武于切不有也古文作無同上虛九也士嫁切暫也止也乍今文匚部四百八十六凡九字匸下醴切邪溪有所挾藏也區去娛切域也藏匿也又烏侯切器名受一斗六升匿女直切隂姦也亡隱也匽於見切匿也𠥮力候切側𠥮又箕屬亦作陋匹普謐切配也四丈為匹一馬也輩也二也㔸他兮切匾㔸薄也匾補典切匾㔸醫於計切盛弓弩矢器或作部四百八十七凡一字仄林切首笄今作簪兓子心切兓兓鋭意也旡部四百八十八凡五字旡居毅切飲食逆氣不得息也古文􅮓力尚力章二切事有不善言也又􅮓薄也悲􅮓酸楚也戶果切説文逆驚辝也神不福也今作禍禍同上貌部四百八十九凡六字貌茅教切容儀也貌籕文牛逺切小貌皮彥切辨也舉也所以攀持髮也説文冕也從貌象形辨同上籀文部四百九十凡二字公扈切壅蔽也從人象左右皆蔽也當侯切説文兜音鎧也從中貌象人頭先部四百九十一凡三字先思賢思見二切前也早也兟所巾切進也又兟兟衆多貌丑鄭切覗也譯也亦作偵秃部四百九十二凡二字秃吐木切無髮也從凡上象禾黍之形穨札回切暴風亦作頽某部四百九十三凡四字某相咨切姦邪也今為私又亡后切某甲也厸力神切古鄰字近也親也五家也以九切誘也或作誘篡初患切逆而奪取曰篡單部四百九十四凡二字單時闡切大也又丁安切囅丑理丑忍二切囅然笑貌録部四百九十五凡一字録力木切刻木也玉篇二十九卷終
