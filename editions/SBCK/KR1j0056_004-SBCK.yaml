body:
  text: 大廣益㑹玉篇卷第四頁部三十六一百九十九字頁下結切􅀃文云頭也頭逹侯切􅀃文首也題逹􅀆切􅋕也楚辝彫題黒齒顔吾奸切國語天威不違顔咫尺顔謂眉靣之間也魚怨切顚也願同上思也欲也頵於倫切頭頵頵大也亦楚君名頯渠追丘􅁤二切爾雅蚆博而頯主中央廣兩頭銳䫟有衮切靣急皃碩市易切大也頒扶云切大首皃一云衆也又音班頜公荅切公羊絶其頷口也方言頥頷也􅀃文平感切也胡耽切頥也顄同上又下感切頓都鈍切下首周禮九拜下三頓頡紅結切蒼頡古造書者詩傳飛而上曰頡􅀃文直頡也䫨五髙切髙大也莫佩切昧前也顥胡暠切白皃楚辝云天白顥顥顅苦間居研二切礼注長脰皃􅀃文云頭髮少髮皃䫶防園切大首皃在姓切好皃䫔下計切伺人也又恐也又去結切額雅格切方言中夏謂之額東齊謂之顙釋名鄂也有琅鄂􅋕同上顙酥朗切額也頷户感切莊子驪龍頷下又音含字徒木切顱又徒佫切顱力胡切顱髑髏項胡講切頸後也頸吉勁切頭莖也領良郢切詩傳云頸也周礼注猶理也頥以之切養也也與􅒳同頂丁領切顚也上也籕文頑五環切鈍也苦昆苦鈍二切頭無髮也一曰甘門䪴諸甚切項也又垂頭皃顚都堅切頂也山顚吉惟切小頭皃同上頗普波切不平也偏也又匹跛切顤牛姚切五弔切髙長頭皃頞惡葛切鼻莖亦作頰居牒切靣旁也顆口火切小頭皃顑苦感呼紺二切飯不飽靣黄起行也顝口骨口回二切相抵觸䫀公典公很二切頰後頍丘婢切㪯頭皃頛力罪力頭不正頪力外切廣雅疾也􅀃文難曉一曰鮮白皃頢古活户活二切短靣皃顀直追切上髙骨也䫥五罪切頭不正顮禆仁切憤懣也顡牛旣五壞二切癡頭不聦明也莫骨烏骨二切内頭水中薄諧蒲回二切曲頥來感切靣皃䫃視均切古脣字䫤莫丁切眉目間也詩猗嗟䫤古本亦作名頫靡卷切低頭􅀃文音俯顩五檢切狹靣銳頥皃顴距貟切䪼也顠孚紹切髮白皃渠流切恭順皃詩戴弁俅俅或作俅䪼之劣切凖也又之出切䫡五咸切頭靣長皃䯪口倒切大頭也公老切廣大皃頏户郎切詩傳飛而下曰頏又苦浪切咽也䫌匹米切傾首也不正也䫞火幺切口幺切頭大䫆視盈切頸也頔徒激切好也呼憒切靣肥皃又頮同洗靣也有救切顫也病也亦作疚顒魚切頭大也仰也五柯切或作俄五舌切靣醜顯虚典切光也又見也明也覿也著也顫之扇切頭不正也又動也頎渠衣切長皃又佳也䫦公盍切頷車骨胡絹切顋後也助轉切􅀃文選貝也或作僎古作選􅈼俞注切和也書率龥衆戚五角切靣前䫂丁可切醜也顁都定切題顁也頇許安切頇五旦切頭無髪頇頟也䫏丘之切醜也今逐疫有䫏頭郎丁切靣瘦淺皃􅷯扶武切頰骨甫越切古髮字顉牛感切低頭亦作頷又音欽曲頥也蒲何切与皤同老人白也頨縁有矩二切頭妍五各切嚴敬也頽徒回切頰下頃去潁切􅀃文田百畒爲一頃户吾切与胡同牛頷垂也顗牛豈切静也謹莊皃莫􅀖切頭也五􅀌切大頭也頳丑盈切赤也本作䞓頠五罪牛毁二切静也五怪切頭蔽也䪹普眉切大靣䪳余凖切靣不平頧都雷切毋追冠名或作追頣弍恩切㪯眉視人皃頲他領切直也狹頭也䪾之忍切顔色䪾䫰愼事也亦作須䫰來軫切䪾䫰一曰頭少髮皃亦作顓諸縁切顓頊顓者專也頊者正也言能專正天之道也頊虚玉切顓頊同上又顱諸甚切低頭䫲火感切動首顧古布切瞻也回首曰顧頋同上俗之善切倨視人烏鉤切靣折奴兠切它􅈸切靣平乙欹切睇盻美容皃􅝋口本口没二切秃也頄音逵音仇靣顴䭭舒酉切人初産子䫩桑感切動頭也􅗞奴頂切頂􅗞䫖丑甚切䫖䫴愞劣皃普經普冷二切頩色許可切頭視皃昌旨切靣大尺勇切充也他頂切頭疾䫴距錦切䫖䫴又怒也䫵彌仙切􅀟也又􅀟生踈兩切醜也滿也頮荒佩切洗靣也息進切頂門同上於紅切頸毛亦作翁􅷵之延切􅀟也􅋕也頝口交切頝薄不媚也䪻薄變切冠名顂力載切􅀩也無沸切靣前顦昨焦切顦顇憂皃亦作憔顇疾醉切顦顇亦作悴預余據切宴也樂也顟力弔切顟顤頭長皃同上䪷火豆切勤也䫉孟教切容也與皃同煩扶園切憤悶煩亂也丘飲切醜皃牛飲切醜皃丘耽切醜也䫄丑滑切強皃先全切圎􅆕亦作䫒莫昆切不曉亦作惽頕丁甘切頰緩或儋字胡官切丸也渠公切靣上也呼塊切大首􅲰霍肱切惛也或作頦胡來切頥下又音改䫳逹禄切䫳䫫頭骨䫫吕侯切䫳䫫䫜於交切頭凹也口感切䫡頟丘檢切顩不平也顳仁涉切在耳前曰顳莫安切頇大靣顋息來切頰顋䫚古花切短頭也頙初眞切正也顃徒含切余占切靣長顬仁于切顳顬耳前動徒困切秃也顐五困切顐秃也䫷音愕面髙皃顎同上胡割切呼割切健皃䫢思移切䫢頭不正子廷切䫢蒲結切頰短也爭索切不正力篤切項也頖剖半切頖宫亦作泮䫛胡鉤切䫛䫗言不正䫗胡加切䫛䫗頌與恭切形容也又似用切歌頌籕文順食閏切從也䫈七錦切皃醜頻部三十七凡三字頻毗賔切詩國歩斯頻急也􅀃文作水厓也人所賔附蹙不前而止也同上顰音頻顰蹙憂愁不樂之狀易本作頻曰頻復厲无咎注謂頻蹙之皃􅔣部三十八凡二字􅔣舒酉切人頭也象形脜如由切靣和也野王案柔色以藴之是以今爲柔字􅈡部三十九凡十字􅈡舒酉切􅀃文與􅔣同古文首也方言云人之初生又書授切自首罪也首同上今文䭬苦禮切首至地今作稽諸兖切截也或剸同都冷切顚也今作頂餘之切籕文頥語間切籀文顔甫月切古文髮居牒切靣傍今作頰馘古獲切截也詩攸馘安安馘獲也不服者殺而獻其首曰馘記曰以訊馘告亦或爲聝部第四十凡二字古堯切􅀃文倒首也賈侍中曰断首倒縣也野王謂縣首於竿頭以歸大􅖄秦刑也縣胡㳙切繋也今俗作懸又胡絹切周礼四甸爲縣鄭玄曰五鄙爲縣面部四十一二十九字面彌箭切􅀃文作顔前也䩉扶矩切􅀃文頰也左傳䩉車相作亦作輔烏感切靣醦色也倉感切面皃䩋眉可切靣青皃力可切䩋䩌在遥切􅀃文面焦枯小楚辝顔色䩌顇䩇竹咸切􆁧小頭皃䩂呼咸切䩇䩂䩍力小切面白皃䩆側板切酢老也女板切䩆又慙愧或作赧䩊於逺切眉目之間美皃詩清􅀭䩊􅀆今作婉􅤇火含切面紐皃徒切習也靤蒲皃切靣瘡也音妹面皃靦他典切􅌤姡也又慙皃埤蒼同上字書􅌤字同上蠠彌吉切没勉也音溺愁面魯且切面長皃在咸切靨於恊切靨輔在頰前靧音悔洗靣与頮同䩏弥結切靣小也音活面小色部四十二凡十三字色帥力切采色也又人顔容也艴蒲没切不恱皃同上俗艵普經普冷二切縹色䒍普郎切䒍無色莫㓪切䒍䒋於丈切氣流皃䒊許奚切黃病色同上靘千定切靘䒌青黒色䒌亡定切靘䒌赩許力切大赤色艶羊念切俗􅃩字囟部四十三凡四字囟先進切􅀃文云象人頭㑹腦蓋也或作顖􅮸古文巤渉切毛巤亦作鬛􅴡婢時切􅀃文人臍也从囟从比取其氣所遍也􅒳部四十四凡三字􅒳以之切􅀃文􅒳也􅂐作頤籀作巸与之切廣􅒳也長也美也賾仕革切凼􅀷難見也易聖人有以見天地之賾亢部四十五凡五字亢户唐古郎二切人頸也又苦浪切髙也下㓪切直頸莽􅙚丘召切􅙚不安也牛召切􅙚䶳弋灼切仰也鼻部四十六凡二十七字鼻毗至切􅀃文引氣自􅂌曰虎通鼻者肺之使也齂呼介切鼻息鼾下旦切卧息也齅喜宥切以鼻就􅆨亦作嗅齃烏曷切鼻莖与頞同齆烏貢切鼻病也䶍都計切鼻噴氣䶑同上本作嚔子心切髙鼻丘救切􅡩仰鼻鼽渠牛切病寒鼻塞也或鼽字呼几切出息声齀音瓦仰鼻同上􅡩牛弔牛救二切仰鼻䶏他計切鼻䶏本作涕齇壯加切鼻上皰䶐烏切喘息也魚小切鼻折也䶌傍孝切靣瘡鋤咸切鼻髙皃􅦃呼洽切􅦃䶌鼻息也䶎同上齁火侯切􅦃齁齈奴東切鼻齈紐六切鼻血自部四十七凡五字自疾利切鼻也象形又由也從也率也古文臱眉然切不見也臭赤又切惡氣息臰同上俗目部四十八凡三百四十字目莫六切眼目也目者氣之精神也􅀃文人眠象形重瞳子也古文䁵方辨切小兒􅀄生閉目瞦虚之切目瞳子精也眩胡遍胡㳙二切目無常生書若藥物瞑眩眼五簡切目也字書眼字眥静計切目際也又才賜切矏莫縁切目旁也宻也盼普莧切黒白分也詩美目盼􅀆䀹子葉切目旁毛睫同上睅何版切丗目皃左睅其目方巾方微二切大目眊莫到莫角二切不明皃孟子眸子眊焉睒式冉切暫視皃䁺式亦切視也䁔胡切大目普又况晚切矕馬板切目矕矕也􅰮莫報莫六二切低月視也又細視盰公旦切目白皃睩盧谷切視皃睴公困切大出目又音混窅烏了烏句二切􅀷目䀛亡拜亡撥二切目冥逺視一曰乆也矔光旦切轉目視䁈口戾切窺也睔古遜切大目又盧本切䀣鄙利莫八二切直視眱与脂大奚二切􅀃文目小視南楚謂眄眤古眱字瞻諸廉切視也眅普板普班二切多白眼亡限切䁂目視皃䁂音限䁂瞞眉安切平安也户犬户觸二切目瞳子􅗻同上瞵力辰切目精又視不了矘他朗切目無精直視睨魚計切衺視也眓呼逹切視髙皃去倪胡圭二切蔽人視也一曰直視同上眮大孔大貢二切轉目視眈當含切視近而忘遠睎許機切眄望也眜莫蓋切目不明餘連切相頋視而行同上瞴亡丁亡禹二切瞜瞴微視步安切轉目視也睘瞿井切目驚視􅾛之閠切謹鈍目􅶀休俱切舉眼亦瞳子同上匹莧切小兒白眼亦視皃睹東魯切見也與覩同䁴止善切視而止同上眽莫革切相視也眽眽姦人視也眿同上瞟匹昭切瞟􅕉明察又音縹􅕉戚細切視也又音察瞤如倫切目動也矉禆身切恨張目眷古援切属也頋也睠同上敕周他狄二切失意視皃眔大合切目相及也䂄許􅅞切大視也矆同上看苦安苦案二切睎也翰同上眢於桓於元二切目無明睽枯攜切乖也目少精䀏胡絹切目摇也眴同上瞑眉田切寐也翕目又音麫眠同上睢許佳切視皃胥維切水名䀩來各來灼二切盼也睦莫六切和也古文眣丑乙逹結二切目不正古文瞀莫遘亡角二切目不明耕懴耕讒二切視也䁲莫佳切小視也瞗下􅆎切熟視也睵千才子來二切睽也同上相先羊切又先亮切相視也督都谷切正也目痛也瞋昌眞切張目也􆈟同上瞠丑庚丑郎二切直視也同上睊公縣切視皃孟睊睊胥讒盻下計吾計二切恨視睗式赤切目疾視一决切目􅀷皃古換古完二切古觀字同上睼士系徒奚二切迎視也瞥匹烈切目瞥見也瞫尸甚切􅀷視皃眙敕吏切直視也䀸丑丗切瞥也又諸裔切䀿同上䁊一活女刮二切目􅀷皃睞力代切目瞳子不正眝直旅切張目也睆華綰切出目皃睍下顯切目出皃詩睍睆黃䁙烏澗烏殄二切目相戯眲爾志切耳目不相信􅲺扶未切目不明䀟同上眕之忍切重也又目有所限而止睺胡鈎胡遘二切半盲也瞚式閠切目動也瞬同上䀢亦同上又式荏切盷徒賢切大戴礼人生三月而盷又胡消切矇莫公切有眸子無見盲莫耕切目無眸子睡殊惴切坐寐也眵充支切目傷眥䒅以證大登二切美目也大視也亦作䁝唯井胡亭二切惑也䀡敕驗切視也莫結切目眵也䁾同上俗眚所景切目病生翳也書眚災肆赦眚過也睿余芮切智也明也聖也瞪直耕切怒目直視皃䀗居􅔙切睊目眜莫逹切目不明眯莫礼切物入目中莊子眯目瞺烏外切眉目間皃眸莫侯切目瞳子䀶理尚切目病皃䁁同上眄莫見切􅀃文目偏合也一曰衺視俗作䀎眳弥頂莫井二切眳晴不恱瞳徒公切目珠子眂上支切視也眡時􅈲切古文視眎時至切語也亦作示又承矢切亦古文視睛子盈切目珠又七井切􅻂􅁃鞠切目明又望也瞷胡間切眄也䁅眉冷切䁅古冷切䁅有餘視也一曰喜也瞡葵季切視也又居悸切䀑烏哲切目也眺丑弔切望也脩㑥勞切眣也瞰苦暫切視也揚雄解嘲鬼噉其室䀬壯拳目縁二切目瞬眐之盈切獨視皃眦士介切睚眦􅻃同上睚五懈切睚眦又裂也又五皆切盯直庚切􅟑盯視皃睳呼圭切瘦皃又目瞢九小切目重瞼睇逹計切傾視䁸女紅切目不明又奴名切怒目也􅟑亡幸切視也又音萌􆉑力佳切視也亦作吕計切視也䀼之忍切眩懣也􅉩呼光切目不明又狼􅉩南夷國名瞲呼聿切目􅀷皃又呼决切並同上眇彌紹切一目小瞽公五切無目也瞭力條切目明也眒書刃切疾皃䁱烏侯口侯二切􅀷目皃口交切窅面不平􅸴蘇走切無眸子瞍同上矎呼玄切直視也瞶居畏切極視也式冉式渉二切目皃䁳莫郎切無一目䁍苦洽切目䧟也睉昨戈切小目也盿莫彬切視皃䁕同上䁩語居切馬二目白魚亦作睕一阮切小嫵媚也䀨火刮切視也弋照切眩瞎火轄切一目合同上補太普蓋二切不明皃呼換切璽國名䁓了弄切伺視也䀴五令切直視丑亮切失志皃壯立切目出淚眆芳狂切古眆佛見似不諦瞹烏蓋切隠也力末切目不正亡結切睥面也睥普計切睥睨也瞸余渉切瞼也􅱏力隄力帝二切視也瞘口侯切又音歐矌苦謗切目無睈丑郢切照視皃矀莫悲切伺視也䁷古斈切明也睟思季切視也又􅃳澤皃弋之切視也力蕩切古㓪字䁇眉力切暫視䁤且切澤眼也䂃子召切目冥也矑力都切視也亦目瞳子瞇莫俾切眇目䁿莫比切聴䁿眑於皎切幽静也睂莫飢切目上毛眉今睂字睋呉哥切公羊傳注望也眶去王切眼眶火決切瞛七恭切目光也縈歷切視也羽向切視也都侯切瞘目􅀷也之曳切目明瞔爭革切張目也䁽離怙切目暗渠句切共置也具同上今文䁤許季許癸二切恚視也匹表切視也古花切眼也䀵矢其切眗也䁧無盰切張目也睃子迅切視也都侯切眵目汁疑火貢切瞢也䁐於京切􅀷目也䁣市專切目動祖困切赤目也火麥切目病眪筆血孚血二切親也薄異切眥也􅲹莫江切目盺許斤切喜也䁗苦改切明也眰眞日切視也於顯於見二切仰視匹徑切視也古花切眼尼六切視也九羽切視也䁏於皎切逺視丘郞切眏目皃眏於郎切目不明􅮃自廉切閉目睶尺尹切大目瞜力頭切視也災葉切目睱胡駕切閑睱視也眘食刃切古文慎䁥女栗切小目眨側洽切目動䀷居業切急視眖許往切視也省思井切視也所景切署也古文盶魚逺切目視䀯卜古切視也古岳切目動息咨切姧視逹雞切視也或作眀莫兵切視也荅合切困悶眼瞌苦合切眼瞌也睲息頂切視也瞨普角切眼暗摩筆切不可測卧􅀘木切目骨許乙切視也莫卑切眇目䁘余昭切美目而縁切目垂矒莫公切黙鄧切目他田他佃二切仰視䁢詞縁切好皃䂀虚儀切目動居韋切目也徒領切目出他則切䁿欲卧也睷古言切数也子規切眭所緘切見也矃乃頂切視也矖色滓切視也丁結切惡皃眧齒沼切眧目弄人多佞切見也危委切目瞼九儉切眼瞼也瞉古例切乆視䁎丈莖切安審視也䀙七例切視也古鐙切日起瞖於計切眼疾䂁助咸切怒視䁆烏感切目也眗古于切左右視也瞱于劫切怒視火或切睡目皃耕責切目不正眭胥規切人姓又下圭切目􅀷惡皃􅸵許决切許聿切直視呼革切目赤䁻舒灼切美目􆈝七歷切也眻余向余章二切羙目又眉間曰眻聉牛乙五滑二切無知意胡骨切耳声又地名聵五怪切聾也國語聾聵不可使聽同上耷丁盍切大耳也􅫣五滑切聾甚也又無耳者聦青公切聦明也察也聡同上俗耵都領切耵聹耳垢聹乃頂切耵聹丘古切耳也聝古獲切截断耳亦作馘聽他丁他定二切耳察聙子盈切聽聦也䎼力木切䎼聽似蜥蜴先口切聦揔名䏂同上聱五苞魚幽二切不入人話䏇匹妙切聽裁聞也聭俱位切與媿同慙也子由切耳嗚古活切無知皃同上奴陸切慙也􅀃文作恧耹其林其廉二切地名聑丁篋切安也耳垂也去竒切側耳聠匹名切耳閉都郎切耳䎶如志切以牲告神欲神聽䎺諸􅒨切聞也亦作䀿聎他刀他凋二切耳鳴聕胡老切耳聞耶羊遮切俗邪字桑經切聦也䏄知力丁米二切不聽也䏆才焦才髙二切耳鳴自焦切耳鳴䎴古莖切神名古紅切耳聞􅀑聄之忍切聽也䎷之付切䎷也源也声也力彫力髙二切耳鳴匡主切目往也於檢切耳也􅅞無切望也子小切耳鳴聶如獵女陟二切附耳小語耾侯萌切聾也耳語也耺禹君切耳中聲聐儀黠切聐也烏鴈切耳戲也所切人姓聧苦圭切耳不相聽又私叶䎿才周子由二切耳鳴胡殺切耳聲之涉切耳也聻尼上切指物皃古霍切大耳他最切癡也又五刮切大廣益㑹玉篇卷第四
