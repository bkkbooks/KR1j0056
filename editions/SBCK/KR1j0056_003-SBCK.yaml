body:
  text: 大廣益㑹玉篇卷第三凡一十三部人部二十三五百二十一字人而眞切書云惟人萬物之靈孔曰天地所生惟人所貴偂則前切又音剪弔丁呌切弔死又音的至也儂奴切呉人自稱我僮徒東切幼迷荒者詩狂僮之狂也廣雅云癡也今爲童㑗式神切妊身也儅丁盎切伄儅又丁堂切伄丁呌切伄儅不常也仁而眞切鄭玄曰愛人以及物也􅀃文仁親也古文作儒如俱切柔也􅃸胡遘切伺望周礼有􅃸人傑竒哲切英俊又特立傂息移切傂祁地名亦作虒又他爾切直離切傂參差也仜胡東切大腹也仳方止切别也又防脂切侘都稼切丑家切侘傺傺敕厲子例二切侘傺失志皃楚辝云純欎邑余侘傑􅀆佳革崖切善也仲直衆切詩仲氏任只中也僴下扳切寛大又音簡俟牀史切詩􅟡􅟡俟俟獸趨行皃又候也又音祈虜復姓万俟氏俜普丁切使也倩此見切巧清七性切假倩偰相裂切人名亦作契儠理攝切長壯皃傍蒲當切近也俅渠鳩切詩載弁俅俅恭愼皃侅胡改姑來二切竒侅非常伀容切佂伀懼也佂之成切上同侶力莒切伴侶也㑨牛矩切太也詩碩人㑨㑨容皃大也份彼陳切文質備也亦作彬儇呼緣切利也又慧也伭胡田切佷也同上仕助理切􅀃文學也語學而優則仕僚旅條切官也同官曰僚保補道切安也養也􅀃文保字古文保亦作呆儼宜檢切矜莊皃詩碩大且儼佖皮筆切頻必切威儀也俊子峻切才過千人也儁同上俗作雋偆尺尹切冨也傲五到切書毋嚚象傲慢不友也僷與攝切攝乗不舒展皃偞字書僷字僖虚其切樂也儉渠儼切約也仡語訖切勇壯皃書仡仡勇夫儦被鴞切詩未儦儦盛皃健渠建切自強不息偭緜偏切面背也億於力切安也俶尺竹切厚也始也書今終有俶伴蒲滿切侣也又蒲旦切詩無然伴猶䟦扈也侚辭俊切疾也字書侚字儐卑刃切出接賔曰儐􅀃文云導也侹他頂切正直皃􅀃文長皃一曰著地一曰代也俺於劒切大也僗力告切伴僗也供居切􅀕也設也具也又居用切傭恥恭切均也直也詩昊天不傭又音賃也僁桑截切小声也字書同上偫直理切待也亦與同儲也具也任耳斟切􅀃文保也尓雅佞也又汝切委任也僟居希切精詳也俱矩俞切皆也侙恥力切惕也囯語於其心侙然息紫切小皃詩彼有屋本亦作佌音此儕仕皆切類也侔莫侯切齊等也倫力遵切輩也一曰道也書無相奪倫侗吐公敕動二切語曰侗而不愿謂未成器之人企去智切舉踵也古文企侐許域切淸浄也詩閟宫有侐或作䦗侎武俾切礼小祝掌侎烖兵安也本作彌注作敉儧子管切最也俌方輔切輔也俠胡頰切任俠以􅁠力俠輔人也侲之仁之仞二切僮子也方言云燕齊間謂養馬曰侲佮公荅切合取也仍如陵切就也時注切􅀃文作伹立也今作樹伽求迦切伽藍也又後漢書云伽倍國在車西侍時至切承也傾口營切側也假居馬切借也又非眞也又音格至也仭如震切孔安囯曰八尺曰仞鄭玄曰七尺爲仞側莊色切傍也侒鳥蘭切宴也代逹賚切更也書天工人其代之便婢仙切尔雅便便辨也書傳便辟足恭也又毗線切仰魚掌切向上也侳子過切安也倌古宦古丸二切小臣也詩命彼倌人僬子矅切曲礼庶人僬僬鄭玄曰行容止皃又昨焦切偁齒繩切與稱同微武非切賤也伸舒鄰切舒也易尺蠖之屈以求伸也儺奴何奴可二切行有節也僝士簡切見也又具也俆詞余切緩也􅥚丈吏切㑹物也倕是切重也黄帝時巧又人名同上僓他罪切長好皃又胡對切俚良子切頼也􅂓也伿弋豉切也蘇刀切驕也伊於脂切尓雅伊維也注發話詞古文佶其吉切正也詩旣佶且閑倬知角切明也大也僞魚貴切詐也仵奚古切偶敵也倓徒甘切静也恬也􅀃文云安也同上倭於爲切順皃烏禾切國名儲直於切偫也儲副也余招切役也傜同上倞渠向渠命二切強也傹同上儆羈影切戒也書浲水儆予備皮袐切預也俻同上俗古文仿方往切仿佛相似也㑂籕文僾乙賚切唈也詩亦孔之僾偓於岳切偓促拘之皃侮亡甫切慢也㑄古文侮儽力罪切垂皃力追切病也傫同上佛孚勿切仿佛又音勿音弼佺且泉切偓佺仙人㑵秦栗切賊也㑥以豉切輕也价居薤切善也詩价人維藩㑘同上偕居骸切俱也詩與子偕老㒤尺渉切心服也畏也仆方遇切傾倒皃仸乙小切旭也符歷切古文辟字同上併補郢必姓二切羅列也仢扶握切流星亦音狄儡力回切相敗也像似两切象也都田切殞也仆也倒也傎同上傅方務切太傅相夫子也依於祈切助也􅀝也􅀝於擬切依􅀝也佋時昭切佋穆也侃口旱口汗二切樂也強直也偘同上侁所臻切行聲又征夫也佴如志切貳也佽也儀語竒切度也丁退切也佚余一切豫也書無教佚欲有􅀖儃逹安逹亶二切疾也何也作子各切起也造也儥余祝切買也伋居及切子思名近列切武皃詩伯􅀆􅀆又其例切句付方務切書皇天旣付與也侵千金切漸進也傷也償市亮切報也㑮五昆切姓也傓舒繕切熾也詩艷妻傓方處佸古闊切詩􅂚其有佸㑹也瞿􅀛切左右視也傆牛萬切􅀧也僤大旦切疾也倍步乃切易近市利三倍謂一而两之也俔苦見切罄也詩俔夫之妹什時立切什物又篇什伉去浪切敵也僑渠消切髙也偏匹研切鄙也不平也書無偏無黨俗似足切習安也風俗也優郁牛切倡也俳也儷吕謂切偶也㒧字書同上伎之豉切與也詩鞠人伎忒又梁紀切仔則之切詩佛時仔肩克也㑞余證切送也與媵同偩扶九切像也偎烏回切愛也僄匹妙切輕也又僄輕迅也俾必弭切使也書有能俾又使所里切令也又去声倅倉憒切副也價古訝切價數也傞思何七何二切舞不止皃詩屢舞傞傞􅆫子念切儗也書大命不􅆫來丁切使也弄也俯弗武切下首也僨甫運切僵也僵舉良切僨也莊子惟而僵之㒄式善如善二切意急懼也傳儲專儲戀二切授也偋歩定切僻也倇於阮切勸也偃乙蹇切仆也語草上之風必偃儔直流切侣也大到切蔽也伹七閭祥閭二切拙也倰力僧切長也佐子賀切助也俘方符切軍所􅀗也在傳以爲俘馘俴才見切淺也詩小戎俴收偄而臠乃亂二切弱也倮力果切赤躰也僂力矩切尪也傴郁禹切僂也左傳再命而傴倀敕良切失道皃又狂也傿於建切引爲價也偟胡光切暇也竒􅀛切使也倠許維切倠南子嫫母仳倠醜靣也佃同年同見二切作田也呼肱切恨也迷惛也儗御理切僣也古載切假主也佾余質切列也語八佾舞于庭僻匹亦切邪也詩民之多僻侊公黃公横二切大也僸牛錦切仰頭皃侱他井切侄也渠往切遑遽皃楚辝利而南征􅀆伍呉魯切行伍􅀃文相參伍倜他激切倜儻窮變也佟太冬切姓也各唐切古岡字侑禹救切􅂆也周礼曰土以樂侑食倪魚雞吾禮二切自然之分也莊子和之以天倪傛與蛬切左傳再命而傴又音勇不安也佝公亘切楚辝直佝愗以自苦亦作怐佻敕聊切偷也詩視民不佻侈昌是式是二切㤗也􅫋力庖切盛也僐時演切作姿也倡齒羊切樂也又音唱禮一倡而三歎傷舒掦切創也尓雅憂思也佁丑利夷在二切癡皃魚肓切急也丑咸切癡也俳皮皆切􅄂戯也漢書談笑類俳倡俑于種切偶人他紅切痛也伾匹眉切有力又衆也思育切古文夙同上儳仕咸切􅀃文儳互不齊也又士鍳切伏扶腹切匿也易坎爲隠伏􅵍其虐切儌􅵍受屈也傱先鞏切走皃偡丈减切齊整皃僛丘其切醉舞皃詩屢僛僛仇渠牛切怨也書万姓􅄷予俄我多切俄傾須􅁷也仗直亮切器仗也伈悉枕切恐皃傃桑故切向也孔子曰傃隠行怪僇力救居㓜二切癡行皃俙呼旨切解也訟也俹烏訝切俹􅀝也僦子祐切賃也侀音刑記侀者成也成不可變僔子損切聚也詩僔沓背倄下交切刺也又痛声低丁泥切垂也同上俗儻他㓪切惆儻不覊又他浪切倖也倦渠眷切厭也􅀃文罷也係何計切継也又音計俰和卧切和也佊陂髮切邪也偛楚洽切偛􅰊小人一曰偛􅀑黠也傪七感切好皃又倉含切促且足切速也廹也佫下各切姓也渠往切載器也儭千刃切至也初吝切裏也或作寴何胡可切克􅀒乎哥切辝也催且回切迫也相擣也佑于䆒切助也仠何旦切衞也徒感切止也詩髡彼两髦或作值除利切持也詩值其鷺羽伐扶厥切征伐又矜伐僯力軫切慙恥也俈苦篤切􅁀也僜都鄧徒亘二切倰僜不著事也僆里剪力見二切畜􅀟産也倃公勞渠乆二切毀也甫劫切古文去遐雅切古文夏㒈許鑑切逞皃又覱㒈髙危皃莅力致切臨也詩方叔在止侂恥各切􅀉也亦作託偵恥􅂟切􅃸也女孝切與閙同偙都計切偙㒞儶下桂切偙㒞佇除吕切乆也詩佇立以泣傮子牢祀牛二切終也但逹亶切語辝偯於豈切哭餘声仱渠廉切古樂名侇與脂切夷也傖仕衡切呉謂中國人爲愴偶吾苟切合也桐人也㑦力計切怒也儈古㑹切合市也力刀切犬也許驕切傲也借子夜切假也又子亦切僊司連切長生僊去也􅀃文僊字仙声􅀋云今僊佉去茄切神名㑼力却切神名倯蘇容切謂之倯轉語也佼古爻切交也又音絞倧租宗切仙人侾天交切大皃奴回切偃也息維切偏也僢尺兖切相背也與舛同佩蒲對切大帶佩也僧悉層切師僧也傇而勇切衆也初講切衆齊也傟於項切戾也儢力莒切儢拒心不欲爲也僎土卷切具也又音遵筆委切停也㑎奴擣切姓也傊于藴切優也乃里切􅈛也傀古回切周礼大傀烖注猶怪也声類傀字傒戶禮切待也同上本亦作徯佲弥頂切佲好也同上㒅口礼切開衣領也儋丁談切任他何也㒜羊煑切謹也㒇亡甫切摱也佌七􅁓切小舞皃密彼切無麻也倒丁老切仆也書前徒倒戈他吐何切誰也亦作佗佗逹何切􅀒何也㑯思主切姓也佀祥里切像也似同上仟七堅切千人之長曰仟儴尓羊先羊二切因也估居午切估價也倣甫罔切倣學也儌居曉切儌行也㑋去仲切小皃俸補孔切小皃房用切俸禄偪鄙力切迫也與逼同例力丗切􅀋例也㐰私進切古文信倳側吏切置也㑶許氣切怒㑶也㑜夷丗切亦作䇩合板際佪胡雷切佪佪昏皃伷直宥切伷系也僅巨鎭切纔能也余證切鈍也傼呼肝切姓也㑷他代切意恣與態同儓逹該切左傳僕臣儓儾奴浪切寛儾也胡貫切臣也儙去􅀾切開也㑃乙孝切很㑃也僒求敏口窘二切肩傴皃􅚁扶形孚劒二切輕也傔去念切侍從也偌人夜切姓也子何切促也㑍力對切亜也仛丑訝切嬌逸又湯洛切􅮜渠凶切􅮜倯罵也徒混切仙遁也伳私列切伳侈也􅱗火困切老忘也㑤莫教切好皃五􅀆切㑮佯不知皃伆武粉武弗二切離也傚胡教切斈傚也常􅁉切神也傕苦角切姓也仴五切地名僰平勒切屏之逺方曰僰㒓他逹切逃也叛也俗渠戟切倦也㒂張畧切姓也風木切未復也知力切古文陟僙胡光切作力皃與趪同侼蒲没切侼強也佷也㒊師立切不及也俉五顧切迎也俒胡昆切完也仚許延切輕㪯皃儜女耕切困也弱也俛無辨切低頭亦作頫偤以周切侍也件其輦切分也儑五甘切不慧也俵彼廟切散也儯徒登切倰儯長皃仂六翼切勒也又音勒丈切惡也儚莫登切迷昏皃倔巨物切倔強咎其乆切災也佒於良於郎二切躰不伸傁思口切老也與叟同􅀃文傁㑉音夙傗㑉不伸偒他莽切直也㐴俗攀字個加賀切徧也俗呼爲个渠營切持也古㷀字倗匹肯切不也又步崩切輔也仯弥小切仯小皃又初教切僀丁計切俊也與偙同偷吐侯切盗也苟且也以余止切用也又爲也古作㠯苦􅀲切奢也又安賀切痛呼位于僞切列中庭左右住雉具徴具二切立也佹九委切戾也春秋云晋㑦佹諸僿蘇代式志二切史記小人以僿􅖶畢吉切止行也本作䟆蹕侻他活切可也輕也㒠下介切俠也楚辝何文肆而質傉奴篤切虜三字姓有庫傉官氏㒋息移切賤役也與厮同佯余章似羊二切詳也傋公項切傋􅷗不媚也􅷗母項切傋􅷗佄胡甘切佄酒與酣同儰于詭切儰仡不安也侄之栗切牢也堅也佔丁兼切佔侸輕薄也侸丁候切佔侸倖胡耿切徼倖亦作幸􆂊博堅步堅二切足不正俓午耕牛燕二切急也傌莫亞切齊大夫名僥魚彫切僬僥國名侏諸儒切侏儒短人也㒥孚公切偓僼仙人也仉之養切梁四公子姓􅰊壯救休救二切任身也偳都官他官二切人名佬力彫切侾佬也大皃㒕烏江切㒕降不伏也僪渠岀切狂也亦作獝傝他盍切傝􅼾惡也􅼾先盍切傝􅼾不謹皃倛欺忌切倛儗不行􅼽居偃切偃􅼽不伏也倥口貢切倥偬窮困也偬子貢切倥偬㒔時束切㒔㑛動頭皃㑛舒緑切㒔㑛􅿠魚俺切􅿠癡也倱戸本切倱伅四凶名伅徒損切倱伅僕薄沃切僮僕給事者傈力質切廟主本作栗佷户懇切戾也本作很㑻莫刮切㑻傄健也傄呼八切㑻傄傶宗禄切邑名亦姓偉于􅀑切大也竒也蒲倖切直也俱也摩􅁑切佅㒓事濟俖匹亥切不肯誑妄也偲七才切詩其人美且偲才㑛都聾切劣皃亦姓儸力柯切儸健而不德也之車切儸倘地朗切倘然出莊子僝仕山切僝僽惡駡也僽仕救切僝僽僋他紺切貪老無冝適也俕先紺切僋俕佽且利切利也詩次旣佽儱力用切儱僮行不止偅章用切上同偠於了切偠㒟細腰也㒟乃了切偠㒟舞皃伯􅀓陌切長也佰莫白切相干佰也伻普萌切使人也急也傰音朋音倍姓也亦作倗􅲩同上又都何切倢才獵切樂事又音接伃與居切倢伃婦官侜張牛切張狂也儿部二十四凡十字儿而真切仁人也孔子曰人在下故詰屈􅀃文古文竒字人也象形兒如支切孺子也兀五忽切髙而上平也允惟蠢切當也又信也兊徒外切􅀃也又卦名兌􅀃文兊充齒戎切行也蒲也䆓俞轉切州名亮力尚切㓪也信也免靡蹇切去也止也脫也父部二十五凡五字父扶甫切􅀃文父雉也家長率教者也爹屠可切父也又陟斜切爺以遮切俗爲父爺也爸蒲可切父也㸙之邪切父稱臣部二十六凡四字臣時人切白虎通臣者繵也属志目堅固也􅀃文曰牽也事君也廣雅堅也孔子曰仕於公曰臣臦居況切乖也臧則郎切善也籕文臧男部二十七凡四字男奴含切􅀃文云丈夫也字从田力言男力於田也夏書二百里男􅀖孔子曰男任也任王者事周禮五百里男服禮記王者制禄爵子男五十里巨九切母之兄弟也一作舅甥所庚切姊妹之子也嬲奴曉切戯相擾民部二十八凡二字民彌申切􅀃文衆氓也書后非民罔使氓莫耕切民之詩氓之􅃖􅃖夫部二十九凡四字夫甫俱切􅀃文丈夫又夫三爲屋一家田爲一夫也又音扶語助㚘蒲旱切並行也規居支切正圜之器丗本倕作規矩準繩替吐麗切廢也書弗敢替上帝命予部三十凡三字予以諸切我也又音与􅀃文推予前人也胡慢切相詐惑也今作舒式諸切叙也也舒緩也我部三十一凡四字我五可切施身自謂也古文我義魚竒切巳之威儀也又冝􅀉切仁義也羛墨翟書義字从弗身部三十二二十七字身式神切躳也軀去迂切躰也􅥟同上俗軁力句切屈巳也止移切四躰亦作肢胑只兒切上同躭丁含切俗耽也匹政切俗聘字躳居戎切身也躬同上䠸丘華切䠸以躰柔人也薄彌切上同䠿五拜切人名躱丁果切躱身也躰他礼切俗體字軆同上躴力當切躿身長皃躿口岡切上同躽於建切怒腹也䡀之善切形也軄之力切俗職字􅡭他甘切俗聃字躶力果切赤躰亦作祼䠽下哀切䠽躰長皃力登切身也蒲未切行急也躸居冝切身單皃兄部三十三凡三字兄詡榮切昆也爾雅男子先生者兢兾徴切兢兢戒愼也同上見􅀃文弟部三十四凡五字弟大禮切爾雅男子後生爲弟又大例切􅀃文韋東之次第古文第大例切今爲第幾也次第罤古昏切􅀃文周人謂兄自罤今作昆同晜同上女部三十五凡四百十八字女尼与切男女也􅀃文婦人也又尼慮切以女妻人曰女姓思正切姓氏姞渠乙切后稷元后姞氏姚俞招切舜姓也嬀矩爲切水名書云釐降二女于嬀亦姓姜居羊切炎帝居姜水以爲姓也好呼道切美也呼導切愛也妞呼道切姓也亦作􅤋嬴余征切姓也媞徒奚切安詳也􅀃文承旨切諦也一曰妍黠江淮間謂母曰媞娸去疑切姓也一云醜也婉於逺切婉媚也順也妴同上妭蒲括切天子射擊也􅀃文美婦文字指曰女妭秃无髮娙胡丁五耕二切身長好皃姌如斂切姌嫋長皃嫋奴了如酌二切上同嫇亡丁切小人皃又亡鼎切嫇奵自持也奵丁切嫇奵嫣許乾於建二切長美皃媱余針切喜也私逸也姽牛委切閑躰行皃嬛巨營切詩嬛嬛在家道未成也亦􅀌特􅑱同上㚲尺渉切輕薄又多技藝婆蒲何切婆娑又婆母娑桑多切婆娑舞皃媻蒲寒切媻也往來也􅀃文薄波切奢也孅思廉切細也㛂乃果五果二切委皃也婐烏果切婐㛂口賣切難也姕且貲子皃二切婦人小物詩屢舞姕姕妌音静静也姡胡括戸刮二切多詐也委於詭切属也又委曲㜘子庶切嬌皃􅙵莫胡切􅙵母鄙醜也亦作嫫娧它外切好皃嬥徒了徒聊二切往來皃妗許兼切􅨺妗美笑皃􅨺丑廉切􅨺妗媵以證實證二切送女從嫁也亦作􅯔作旦切好容皃嫢瞿癸娶惟二切盛也腰䶒阻皆切子奚切也佞奴定切口林也㜷莫奚莫移二切齊人呼母也亦作􅭊姛徒孔切項直皃娭虚基切戯也又婦人賤稱嫡丁歷切女謹又正也妄武况切􅲲也娀息弓切有娀氏女簡狄爲帝嚳次妃生契姂房法切婦人皃娓亡利眉鄙二切美又音尾姰息勻切狂也又音縣婞胡頂切很也㜌奴斗切妳異名又古候切取乳也嫙徐縁切好皃媕烏歛切女有心皃又音諳妓其綺切婦人小物也嫸之善切伎也姐兹也切蜀人呼母又祥預切姐也婺亡遇切婦人皃嫥之縁切専一也可愛之皃嬰一盈切頸女曰嬰娺陟切怒也姑古胡切夫母也又父之姊妹又且也魚俱切樂也如仁舒切而也往也若也妝阻良切女字又也妍吾堅切好也嬿於典於見二切女字詩嬿婉之求或作􅈺胡間切􅈺雅也嫧初革二切婩嫧鮮好媟思列切嫚也嬻也同上婧才性疾井子盈三切竦立皃媐吁基切善也娕楚角切謹也又音頼好皃同上娃烏佳切美皃失冉切不媚也前郤二然也娖側角切辯也嬐桑廉牛檢二切敏疾也􅧈之利之立二切至也妜於決切憂妬也嬙在梁切嬪嬙婦官又音色女字也㛥他台切俛伏也嫴公奴切苟且也保任也妎胡計切妒也又音害同上娩無逺亡辨二切婉娩也媚好也妟烏澗切女言也㛑青旦切三女爲又美皃同上見􅀃文㜇縈利切不恱也姘普耕普經二切漢律齊人与妻婢姦曰妌嬗時􅀾切緩也娽力谷切顓頊妻又隨從也嬖補悌切賤而􅀗幸者嫼莫勒切奴也姅匹半切愽慢切婦人又傷孕姷于救切偶也􅸸力㳘切順也孌力轉切慕也亦同上于厥切輕也􅁎居之切黃帝居􅁎水以爲姓又弋之切媛爲眷切美女也嫉慈栗切妬嫉也妒丹故切妒争色也妬同上媪烏老切女老稱又烏骨切媪妠小肥匹逕切娶也婼丑略切不從又音兒婼媢莫報切夫妬婦也㛗子戈切主也妻千􅀆切􅀃文婦与巳齊者也古文孈右尒尤卦二切愚多態媦云貴切楚人呼妹也婎呼維切醜也姺色臻切姓也春秋傳曰啇有姺妚􅺊卑益切母也婱胡連切所望也􅀃文有守嫪力髙力報二切婟也媥匹連切輕也嫷湯卧徒果二切南楚謂好曰嫷媠同上㛍丘叶切得志呼叶切少氣婟胡故切嫪也戀也嬬如殳切下妻也嫽力弔切女字也青徐稱好曰嫽􅸧所交切姊也嫖匹招匹妙二切輕嫖也嫭胡故切好皃或作嫮媅都含切樂也妉同上妖乙嬌切媚也􅯾同上婄妨走蒲回二切婦人皃妨孚方孚放二切害也孎如玉切女謹皃嬯大來切鈍劣也娎許列切喜也先千切誹也嬈奴了切苛也擾戲弄也媮他侯切巧􅀧又偷薄而切媞也媣同上見􅀃文㛪於劒切婢也姤古候切遇也許委切惡也一曰人皃娋所效切小娋侵也嬪毗民切妃嬪也古文㜮力暫切過差也嬇胡内切女字婓方肥切往來皃又大醜也㛆當果切量也揣也知密切短靣皃䆯丁滑切短靣也嬌居摇切嬌姿也嫘力追切嫘祖也嫯五髙五到二切侮慢也嫌胡謙切不平於心也㜤式祍切貪頑也嬾力但切惰也方木切昌意妻妙弥照切神妙也妯直六切妯娌敕流切擾也娌良士切妯娌嬋市然切嬋媛也姢於縁切嬋姢妦孚切容好皃㛔同上烏廉五感魚檢三切含怒娿烏何切媕娿也嬼力受切姣也媉乙角切好也婘具貟切好皃孉同上妥湯果湯回二切女字又坐嫳匹蔑切易使怒也嬚力兼切清美也媷如欲切懈惰也嬉許依切樂也㛁匹耕切急也婩魚踐切好也午漢切斉也媁於歸切姿也美也婸他㓪切戲婸也胡减切健也充之切侮也婍丘倚切好也娵子俞切少也又娵訾辰名初洽切疾言失次也㛃公節切清也嬆許急切莊嚴也莫江切女神名婽古雅切好也㜗倉含切婪㜗也又七感切婪力男切貪也㜳胡乖切和也妧五舘切好也娨下鴈切嫯娨也姴力薛切美也妠奴紺切取也奴荅切聚物婁力侯切空也婁務也婁同上出􅀃文古文婁姆音茂女師也娒同上又音􅅿孃女良切母也又如常切娘女良切少女之號媽莫補切母也於月切肥皃奸公安切亂也奻女間切訟也娝布美切姓也匹才切不肖媆如切好皃又嫩同姥莫古切老母也娾吾駭切喜樂姦古顔切姦邪也姧同上㛒丁􅃸切㛒譳話誽亦作䛠妺莫葛切妹喜桀妻也直牙切美也娻德紅切國名㛻口蛙切女也婷徒寜切和色娣徒厲切娣姒幼婦曰娣姒徐里切長婦曰姒也姱苦􅀲切姱奢皃媈牛昆切女媈也嬁得稜切美女兒妔苦庚切美女㛴奴道切有所恨痛亦作孀所莊切弧孀寡婦也㜨女皆切㜨女也博盲切謹也息遊切女名媃如舟切女名娗徒鼎逹丁二切女出病也婿思計切夫婿亦作壻㚴普布切美女媋式勻切女美㜞殂含切女㜞也妚方酉切好皃婠一丸切躰徳好也娷竹恚女恚二切飢声嫐奴好切嬈嫐也孍魚檢切好女皃㛚他重切㛚齊皃妸一何切女字音乆女字亦作甫普來二切好皃而煑切魚敗也婇七宰切婇女也㜗七感切好皃同上姨余脂切妻之妹云嬜火含切貪嬜又音歆䧪充陟切女子態㛧毋敢切郷名㛮蘇老切兄之妻嫂同上俗又作㛐婢歩弭切女之卑者媿居位切慙也亦作愧㛦郎感切好皃她同上古亦作姫章引切愼也嫤居隠切好皃嫿呼麥乎麥二切靜好女刮切小兒肥也胡告切女名娍食政切長好皃婭於訝切姻婭也㜻力切從也嬭乃弟切母也女蟹切乳也㚷同上必媚切女名也女丗切姥也􅳈疾恣切妬􅳈也姲於鴈切女字嫗烏遇切老嫗母也妃方菲切匹也又音配嫎補曠切妨嫎也㜣奴見切姓也姩奴見切美女也同上姣戶交切也又音狡妖媚婥齒約切婥約好皃舒赤切女也若危切知異也嬣女耕切妌嬣也姿子思切姿態也娥五何切堯女舜妻娥皇也姮胡登切姮娥也媸天之切媱也嫞巿切􅈸女􅄔力之切寡婦䎟之切媚也妋方無切貪皃於牛切恨皃娼齒羊切㛫也媱也􆁘於縁切美女㚣古巧切古文姣㜪色臻切有㜪國嫀同上妿古何切女師也又於何切嫜之羊切夫父母也妐之容切大之兄婋火交切女心俊㛺於甘切女不浄古華切女名㚹莫飽切好皃又力首切㚰普梅切孕也與胚同昌逸切女不謹子列切好也㛕於急切婦皃妑柏麻切女名妾七接切接也得接於君者何古切􅳻貪也女立切婦皃妰張畧切婦皃嬄於吉切嬄也息節切小皃媊子移昨于二切女媊星名㜯許冝切婦人之稱媚明秘切嫵媚也㛄於希切女字姝尺朱切好也􅩱同上見􅀃文姎烏浪一郎二切女自稱我㛹蒲緜切㛹姢美女皃嬃相俞切女字匹計切妃也嬻徒卜切媟也㜎音奚女􅀠也嫈烏莖依郎二切小心態匹遥切漢公主名媧古娃切女媧氏籕文媓胡光切母也婜口間切美也娡之侍切鯀娶有莘女曰娡孋力移切孋􅁎亦作驪婚呼昆切婦家亦作㛰籕文音鴛􅾴婏美也嬹許應切恱也於叶切好也又一鹽切媖於京切女人美稱嫄愚􅀽切姜嫄嚳元妃孁郎丁切女也婤職流切女字姶烏合切女字媒音梅謀也謀台二姓白民切顰眉本作顰媌莫交切好也媨羊乆切醜也妣必爾切田爲妣籕文始式子切女之初也㛎力與切婦人醜皃同上嬳一􅅞于故二切奴乃都切奴婢也㚢同上嫁古訝切女適人曰嫁嫵亡甫切美女又媚也娬同上娠失人之刄二切妊娠也妊汝鴆切懷孕也婀於可切婀娜美皃亦作妸奴可切上同妵他口切女字姻音因壻家女之所因曰姻婣籀文娞乃罪切㛱娞又古文綏字㛱烏罪切㛱娞好皃􅰶所省切减也妘王分切姓也祝融之後籀文仕切女子先生者妹莫背切女子後生者婦符九切服也姼是支切姼母也又音侈同上妁之若切媒妁又音杓薄切㛶無冝適㛶他旦切上同㜅丑切媚也又許六切㚤音翼婦官奼恥下竹亞二切美女也又音妬姹同上又河上姹女水銀也嬒烏㑹切女黒色威於韋切威儀也􅀃文云姓也㛅仍吏切女字婻奴紺切美皃又小肥也㜰以灼切美皃又音嫚莫晏切侮也姪徒結切又音怢昆弟子之稱㜼同上婏孚萬切産婏又兎子嬎同上生子齊均也亦同上妷弋質切滛妷也又與姪同嬩以諸切女字妲多辣切姮妀紂妃妀音紀妲妀􅀃文女字媾居候切重婚也媰仕于切又仄鳩切婦人妊身也娶七諭切取婦也嫛壹奚切人始生曰嫛婗婗五弓切上同媺音美礼媺周室婕即葉切􅀃文云婕妤婦官也妤以諸切婕妤孂居矣居幼二切竦身大廣益㑹玉篇卷第三
