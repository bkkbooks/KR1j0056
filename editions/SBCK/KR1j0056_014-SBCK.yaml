body:
  text: 大廣益㑹玉篇卷第十四蓐部一百六十三凡三字蓐乳属切厚也薦也􅀃文陳艸復生也薅呼勞切板田草也或作籕文茻部一百六十四凡六字茻莫朗切木冬生不死􅀃文衆草同上葬子良切理瘞也藏也古文􅇀無各切無也今作莫同􅀃文音慕莽莫黨切茂草可毒魚舜部一百六十五凡四字舜舒門切帝謚仁聖盛明曰舜䑞􅀃文舜字艸也古文胡光切草木榮竹部一百六十六五百七字竹知六切竹木也􅀃文作竹箭子賤切矢也笢亡忍切竹表也箘竒隕切竹名􅀃文箘簬也一曰博棊又音囷桂也䇹同上箟亦同上古切䈯之人切竹箭也䇞古酣切竹名笮仄格切狹也壓也矢箙也亦作􅪩又仄乍切笮酒也笨蒲本切竹裏也䈵於孔切竹皃䇗之恭切長節竹古斬切竹名筍先尹切竹萌竹芽也箰同上又箰律以捕鳥古又筍同上虡懸鍾鼓者簨同上䈎餘陟切䈎籥也簴其㪯切簨簴縣鍾具箁蒲侯切竹箬别名筟橅于切筳也篝古侯切籠笿也筵餘旃切席也簟徒􅀧切竹席名箋子堅切表識書亦作牋笿力各切籠笿竹器也䇨古弄切桮笿也筤力桑切也􅞊力渚切盛飯器同上節子結切竹約也又節操䈚徒改切筍皮又音臺筩徒東切竹筩箯婢連切竹輿篼丁侯切飼馬器䇬充俱切䇬䇿也筡逹胡切竹中空又丑於切䉃子兩切竹剖未去節篎亡小切小管也䉷音嚴禦也翳也丁胡切竹名箶護都切竹名等都肯都怠二切􅀋也軰也簡居限切書簡簡牒也笍陟衛切小車具笆􅀘雅切竹有刺簬力固切美竹中箭者簵同上䉛於六切炸䉛以漉米者笵音范楷式也与範同䉧力周切竹名莫耕切竹名筱先鳥切筱箭也又小竹篠同上簜徒黨切大竹揔名䇫居疑切􆁮柑具也笳古牙切卷葭葉吹之䈖口禾切竹名篰芳後蒲口二切竹牘也同上箅􅀘計切甑箅飯器也符父于切符節也契也䈛苦怪切竹葥也弋林切竹名籓甫􅀽切蔽也亦箕也䉒同上筥九吕切盛米器圎曰莒笄古切替也婦人笄冠於田切竹名如旃切竹名簏力木切竹髙篋也箓同上簁山竒所綺二切竹器管古短切楽器亦作筦筦古短切筟也徒奚切竹名筊胡交切小簫又竹索䉰同上籧距於切籧篨竹席也篨直於切􅐟篨竹席也䉑苦胡切竹名扶留切竹名箑所治切扇也自関而東謂之箑䈉同上笥思吏切竹作盛飯方器也筲所交切斗筲也竹器䈰所交切飯帚也䈈扶非切竹名􅻔才田子田二切蔽如簀又音沾汁也同上簞丁安切葦器語曰一簞食箄必匙必是二切小籠􅱥丁凡切竹名古侯切竹属笛徒的切七孔筩也篴同上箸除庶切筴也又陟慮切口各切桮也籠也􅢭徒果切竹名如琰切竹弱也簢眉隕切竹中空也同上籝弋成切竹器籃属亦作籝籃力三切大籠也筐也䉮力印切損也子含切也筨胡男切筨􅢭竹實也䈄同上䈀所間蘇干二切竹器似箱籢力塩切器名鏡籢也徒故切蚕也箵先鼎切箵笭也篷歩公切船連帳也亦軬也同上笯女家乃胡二切籠笿也子短切竹器箸筩籛子踐切老䀯姓筬時􅄹切竹名子六切笪逆搶也同上籤七尖切貫也竹籤以卜者䉴如張切漉米竹器也䈱託勞切牛筐也胡南切竹名箙扶福切盛矢器藏弩箭爲箙箴之深切戒也刺也或作鍼籚力胡切筐籃别名也簪則参切冠簪也䈍莫庚切竹也箹於卓切小籥也􅄜也又乙孝切竹節也筄餘照餘昭二切屋危也箱思羊切竹器籠属䉚莫耕切竹篾也䈂音并竹也箾山卓切以干擊人又蘇堯切舜楽簻竹􅀲切箠也亦作檛􅥺􅥺同上又徒果切竹名篘初婁切酒籠也箔蒲涸切簾也篳布質切荆竹織門也蔽也藩也亦作箄箛公都切竹名又吹鞭也笞丑之切擊也箠也􅼢詞爲切竹籠簦都滕切籉也簃余之切楼閣边小屋尓雅連謂之簃音池篍七周七召二切吹簫也筒音洞筲無底又音同篜之升切竹也䉄黎登切竹也篿之縁切楚人謂折竹卜亦圎竹器竽禹俱切三十六簧樂器也笙音生十三簧楽竹器簧户光切楽器笙中䈕上支切簧属䈗先果切竹名漢有䈗人縣亦作􅄜力大切三孔樂器又天􅄜簫先幺切楽器管也筑張六切楽器名䉕慈稜切笠也簇楚角切矢金也又七木切小竹也筝仄耕切楽似瑟十三弦䈪呼擊切竹器籮属音曹竹也籐徒稜切簬器􅡺補各切􅡺弈局戯也謂行棊也亦作博簺先岱切行棊相塞曰簊􅽇於載切隱也亦作薆笎語􅀽切竹也箮虚􅀽切竹花也篸楚金切篸差不齊又子紺切針篸䉋美秘切竹長節深根者籌除牛切筭也筴也笅胡交切管也䈺祝融切竹也􅓁息兹切竹有毒也傷人即死䇡直與切竹器織䇡亦作柠籞魚吕切籠圈别名也篽魚吕切禁􅁐也古釭切筏也筴楚革切謀籌也又古協古洽三切箸也桑管切数也擇也筭蘇亂切計筭也数也笇同上亦竹器也篢古紅切笠名笓毗利切欠也又椑之歩雞二切䈲補丹切篾也又捕魚笱籮力多切竹器籃属籊他的切竹竿皃盧冬切筐也篊胡公切竹引水戸烏切竹也䉈蘇半切葛䉈又桑葛切䈓公逹切䈓䉈桃枝竹笗都宗切竹名居希切竹也􅰣力魚切竹也􆈔五姑切竹名笈楚洽竒立二切􅀒書箱也筕胡庚切筕篖竹笪也篖徒郎切筕篖七然切竹名篈府逢切竹名箃側鳩切竹黄也簹都郎切車簹管篔簹竹名篔王分切篔簹竹相然切竹名蒲包切竹也七和切織物也䉹魯丁切竹也口鎋切柷敔也亦作楅笘丁帖切折竹箠也䉲莫箄切竹蔑也力永切竹也䈭色求切竹名丑弓切竹名􅀏私召切喜也亦作咲􅦖力鎭切竹實中也七和切竹名蒲弥切籠也箂魯台切竹名筃於人切竹也籈之人切敔背以鼔敔曰􅦶去中去龍二切姑篓又卓切軬帶也翼諸切竹名䇪尺之切䇪竹也欺求切竹也山樞切飯莒也受五升口淺切鮮戸籍也䉳先遣切蘚杜回切竹筆也筅蘇典切筅帚也力中切篁竹也笉七忍切笉笉􅀏皃䇯如鍾切竹也頭有文篬七羊切竹名篃莫悲切竹也常式切笙也余艮切竹名筐去王切􅁞筐方曰筐古禫切竹名又箱類式余切竹也䇙余軫切竹也他頂切函也而兖切竹名禹煩切篗也繹具亦作榬笰甫勿切車後笰也箒之有切俗帚也士冉切竹也䇜丘卞切竹也簅所簡切大籥也􅠚丘於切山谷遮獸又飯器箐七見切棺車上覆者自移切竹名􅳢息眷切竹縁也䈃之少切竹也王委切筍皮筀古惠切竹名傷人則死第徒計切排次第也如委切筍初生䉝魚綺切竹器名兹耳切竹也直利切竹也筣力之力􅀆二切識竹淖也􅓕莊雅切炭籠又音􅚖笖知委切竹生筍䇛脂市切竹也巨規切竹名箷翼支切衣架䇦於莽切䇦無色也䉶所江切長竿桻䉶也筠有妟切竹青古䉣先夜切笘䉣也篾亡結切竹皮􅀃文筮字篋口叶切笥也箱也箳卑星切箳篂卑篂桑經切箳篂莫伴切竹器名䇽之厲切簟也䇻亡匪切帚也箌猪效切捕具又作􅇁䇩移丗切合抜際也䇸直經切筵也􅓗干鬼切竹􅓗也徒朗切竹也所解切瑟也筏布逹切笚也又音伐䈦子公切木名枝細也笶式氏切俗矢字䉂力委切法也䈢思枲切竹也篚方尾切筐也䇧丈例切以竹􅀘缺也筌旦㳂切漁具捕魚笱䈠丁眷切断也口魯切竹名盧啓切竹也􅀄雅切竹也簿蒲各切裴古切筁也帳也篙古勞切竹刺船行也丘巳切簟也之養切竹也郎古切竹也䉏胡買切竹也篞奴結切大筦其中曰篞箖力㝷切箖箊竹名箊殃魚切箖箊箺尺尹切竹也七忍切小竹也施忍切竹名籬力支切竹垣藩籬也䇾語軒切管長一丈四尺息乱切竹器名簩力到切竹簩也七養切竹也初稅切重擣也簝力彫切􅀕宗廟盛肉器笐姑郎切似琴有弦笊仄校切笊籬也筗直衆切竹名之利切竹名其利切竹名側交切大笙有十九簧箜苦紅切箜篌楽名魚器切竹節名簉义又切衝也就也䉌似醉切竹徑名䈡七弄切竹名籥以灼切楽器以笛簷余廉切屋簷与擔同簣其貴切王籠也䉀失御切筐也䈮居遇切織具䇺音豆􅀕礼器也􅮵殂紅切籠以取魚也籦之容切器也竹爲之簿計切竹也居渇切竹生海边疾外切竹也桑豆切小竹筎汝余切竹筎以塞舟笌五加切竹􅀄生筍也䈴詰殮切籠也䉓力卧切林也胡浪切竹竿丁紺切竹也扶願切竹作器又桂晚切笏呼骨切珽也手執者府救切竹盖也䉯胡諫切枯也烏縣切竹名式􅀾切竹器䉉古胡切器也破䉉爲圜􅲵甫吠切籧篨别名䈒奴感切竹弱箞丘卞切曲竹也古政切筯竹蘇見切竹名筧古典切以竹通水笠力及切簦笠也篛笠虚誑切覓魚具篟千見切竹也滴倿切竹器子線切竹名力計切䉣也竹箠也篕胡藹切籧篨竹也其句切竹器䈣之聖切竹名竻盧得切竹根也五各切挂也乎罪切竹胅節也武粉切截竹也籋音欇箱也又音稔尼攝切竹也丑渉切竹也䇣乃恊切竹䇣也直遇切壇竹也簳各旱切箭簳竹也笴同上又公但切䈋徒合切竹名殂匝切簾也筪胡夾切竹器筫陟利切竹器又之曰切􅂐直兖切籕文書曰􅂐䈳徒盍切䆫也箿慈緝切覆也䉗伊入切杓也他卓切竹也䈇陟孝貞角二切捕魚具䈙直栁切竹易振而死玉縛切取魚具籰同上又絡絲具箤才恤切笭也笜丁律切筍也􅪩仄格切屋上板亦作笮範扶儉切􅁤範法也箼烏谷切竹密皃古木切簏也䈌七余切水澤也䈅音域竹也籀直敕切周大史造大􅂐箎呼古切大竹髙百丈籜他各切竹籜也䉢所力切篩也余織切竹索符木切竹器名䈿莫辟切䈿軬帶也籍兹昔切文籍簿籍䇶江斈切椽䇶也䇷兵列切分也􅝍土洽切竹書也古忽切刷也䈸胡谷切竹盛米器簶音禄胡簶箭室也筈口括切箭筈普未切䈇也音屐竹履也篂音星竹之别名簠方武甫娱二切黍稷圜器簋古美切黍稷方器䈏甫六切織䈏也笡七夜切逆愴也篪除竒切管有七孔也筂同上箇古賀切竹筴也又一放也籩􅀘堅切豆􅀕器也簥几妖切大管也􅀏他計切簂公誨切筐也亦作椢䈐同上籠力公切竹圈力董切箱屬􅖧徒本切篅􅖧盛穀器䉎徒郎切􅇁也之若切􅜷米具筮蒔丗切􅆱卜曰筮也簭同上篗于縛切猿也所以絡絲篅市規市專二切􅖧也篣歩庚切籠也笚都臘切竹相擊吕恤切角以射鳥箻同上筳徒丁切小破竹也小簮也徒黨切竹器可盛酒􅟳于歳切箭也􅥯丁殄切經也箝渠廉切􅃈頭也同上􅞠居渚切養蚕器亦作筥竿公安切竹幹曰竹竿猪六切古文築都揔切竹器箬而灼切竹大葉也篛同上苦郭陟角一切罩也又仕角切籱同上筁去玉切養蚕具笲蒲変切竹器匹賣切竹片也同上簍力甫切車弓籠又音樓筰才各切竹索又作笮筯直據切与箸同䇮音任單席也䉠亡非切竹名籕文笭力丁切籝也籠也舟中牀也䇘胡故切可以収繩也篹先管切器名􅑉白隹切􅑉筏也亡支切竹篾也同上笪丁但切笞也丁達切篨也簀側革切牀簀也也渠言切筯鳴也籉徒來切笠子大昆切榜也同上籣力單切竹器盛弩矢者簾力占切編竹帷也歩悲切古皮字箆方迷切釵箆也篲詳惠切掃帚也古文箠之繠市委二切擊馬笹第壯几切牀簀第也䈝息魚切竹名也䈥居勤切俗筋字籭所街所飯二切竹器簛篩同上䇿楚革切馬箠又謀也持甘切馬以刮馬篻莫遥切竹門也􅚠力彫切竹名籔先后切十六斗曰籔䈹同上簠方武甫娱二切黍稷圜器簋古美切黍稷方器䈏甫六切織䈏也笡七夜切逆愴也篪除竒切管有七孔也筂同上箇古賀切竹筴也又一放也籩􅀘堅切豆􅀕器也簥几妖切大管也􅀏他計切簂公誨切筐也亦作椢䈐同上籠力公切竹圈力董切箱屬􅖧徒本切篅􅖧盛穀器䉎徒郎切􅇁也之若切􅜷米具筮蒔丗切􅆱卜曰筮也簭同上篗于縛切猿也所以絡絲篅市規市專二切􅖧也篣歩庚切籠也笚都臘切竹相擊吕恤切角以射鳥箻同上筳徒丁切小破竹也小簮也徒黨切竹器可盛酒􅟳于歳切箭也􅥯丁殄切經也箝渠廉切􅃈頭也同上􅞠居渚切養蚕器亦作筥竿公安切竹幹曰竹竿猪六切古文築都揔切竹器箬而灼切竹大葉也篛同上苦郭陟角一切罩也又仕角切籱同上筁去玉切養蚕具笲蒲変切竹器匹賣切竹片也同上簍力甫切車弓籠又音樓筰才各切竹索又作笮筯直據切与箸同䇮音任單席也䉠亡非切竹名籕文笭力丁切籝也籠也舟中牀也䇘胡故切可以収繩也篹先管切器名􅑉白隹切􅑉筏也亡支切竹篾也同上笪丁但切笞也丁達切篨也簀側革切牀簀也也渠言切筯鳴也籉徒來切笠子大昆切榜也同上籣力單切竹器盛弩矢者簾力占切編竹帷也歩悲切古皮字箆方迷切釵箆也篲詳惠切掃帚也古文箠之繠市委二切擊馬笹第壯几切牀簀第也䈝息魚切竹名也䈥居勤切俗筋字籭所街所飯二切竹器簛篩同上䇿楚革切馬箠又謀也持甘切馬以刮馬篻莫遥切竹門也􅚠力彫切竹名籔先后切十六斗曰籔䈹同上􅥮寺林切竹長于丈生海畔劄竹洽切以針刺也徒敢切竹屬䉫力低切竹名簊居其切竹名同上篇匹連切篇章篇什也箕部一百六十七几八字箕居宜切簸箕也又姓䇧並古文籀文簸補我切揚也去糠也以獵徒拹二切簸也才部一百六十八凡一字才在來切兊文曰草木之初也又才能也市部一百六十九凡十字市甫味切蔽市小皃􅀃文普活切艸木市市象形孛歩對切彗星孛孛不明皃嗟似切止也姊姊字从此南奴含切四方正午位古文索蘇各切散也又繩索又山責切求也􅡔省未切艸木四舒疐字也同上歩背切紆紼取物曰巨宜切木别生曰乇部一百七十凡一字乇竹戹切艸葉也託宅字从此部一百七十一凡二字市規切艸木華葉象形今作垂古文􅒧部一百七十二凡二字􅒧火干芳十二切草木華禹􅀑切草木華盛皃蕐部一百七十三凡三字􅂠胡􅀲切蕐夏也今作華􅏞同上又榮皃又呼􅀲切皣于切切草木花也􅓒部一百八十一凡七字􅓒徒幺切艸木實垂􅓒􅓒也籕􅰲思錄切榖也今作粟古文又萬切䃺粟也又舂米未精也㮚力日切榛粟今作粟籕文束部一百八十二凡三字束七漬切木芒也􅀥子老切果名俗爲􅁄居力切急也􅁄箴也汖部一百八十三凡十二字汖匹刃切分枲皮也今作木子司切麻有子曰苴無子曰枲䢄籕文力到切施絞於也除利切也渠眷切縁也除栗切帆索也尺人切纑也子侯切麻屬扶善切履底也徒改切及也与迨同子由切似由切収束也堅也部一百八十四凡三字匹賣切葩之緫名今作亦与麻同先旦切分散也亦作散又音饊口頴口逈二切麻枲属麻部一百八十五凡十四字麻莫加切枲属又榖也大侯切麻一㓗也䵉同上黂扶拂甫云二切枲實􅻢先的切細布亦作緆䵈空木切未練纑㸏靡五切麻黀仄留切麻莖也古文歩本切麻麻别名麾許爲切指麾亦作摩丘良切麻也力牛切麻也音宛麻叢也尗部一百八十六凡三字尗書六切豆也叔同上又叔伯也敊市寘切以調五味今作鼓韭部一百八十七凡七字韭居有切菜名一種而乆者故謂之韭韱思廉切山韭也或作韯䪥胡戒切葷菜俗作薤􅝖子兮切以薑蒜爲之齏同上又齏菜唐對切齏􅉁也䪤扶􅀽切百合蒜也􅀲部一百八十八二十六字􅀲古華切蓏也匏瓠緫名㼎蒲卓切小􅀲也瓝同上瓣白莧力見二切􅀲中實也㼔於䰟切㼔􅀲名㼊徒門切㼔㼊戸姚切􅀲名瓞人結切小􅀲也同上瓤女良切汝陽切􅀲實也㼏乃罪切傷􅀬􅀲也渠立切冬􅀲力玷切􅀲子也㼐扶田切白㼐􅀲苦􅂝切子㼋古胡切􅀲也亦茹也瓢婢饒切瓠􅀲也㼕丁郎切􅀲中實瓟蒲包切瓟杓也魚偃切瓢也㼌弋主切勞病也公侯切􅕕王􅀲也􅕕力侯切􅕕口括切􅀲也于扄切小􅀲也􅕧落都切瓠􅕕别名瓠部一百八十九凡二字瓠胡故切匏也婢姚切蠡也或作瓢丰部一百九十凡二字柯邁切草丰也草莾也柯頟切枝柯也來部一百九十一凡三字來力該切來麰瑞麥也行來歸也又力載切勤也来俗助紀切竢也大廣益會玉篇卷第十四
