body:
  text: 大廣益㑹玉篇卷第二十七凡七部糸部四百二十五四百八十二字糸亡狄切細絲也微也幺也古文繭古殄切􅁞所作也絸古文緬弥善切微絲也思皃也輕也􅒺同上又亡結切細也繅先刀切繹繭山絲也又子老切􅄂文也繰同上又子老切帛如紺色古文納奴荅切内也或作衲䪏紙攴氏切蔡倫所作絓胡卧切止也有行礙也懸也持也絍如林女林二切機之縷也䋕同上續似録切継也連也又似屢切繀先對切繀車又鹿車縱子容切縱横也又子用切恣也故也緩也置也絶才悦切断也㓕也最也􅓟古文􅥕徐剪切昌善切偏緩也綹力九切緯十絲曰綹約於略切少也儉也薄也束也纒也又於妙切紹市沼切断也又急紏也綤古文紓式居切緩也解也或作舒纇力對切絲節不調緫子孔切合也結也聚束也皆也衆也終之戎切極也窮也死也古文纖思廉切細小也亦作纖紿徙愷切疑也欺也綢直留切綢繆也纒綿也又它刀切直轉切尓雅十羽謂之縳同上細思計切微也小也紆於于切曲也詘也繆眉鳩切綢繆也又眉救切亦謬字絢許縣切文皃又逺也同上縒且各切參縒也亦作錯几足切纒也連也纔初咸仕緘二切雀頭色微黒色又疾來切綨巨箕切又巨記切􅄂文也綦同上縮所六切退也蹙也止也綝丑林切善也止也緟除恭切增也疊也益也􅃨也或作今作重纚山綺切冠織也又颯纚長袖皃縰同上級几立切階級也又次第也紈胡端切累也結也編卑綿切繩編以次物也連也又必典切織也爲萌切冠卷維也冠飾也紭同上紾徒展切紾轉也又音軫綰烏板切貫也羂也繫古詣口奚二切約束留滯也悪絮也又胡計切綎大丁切絲綎綬也同上繯于善切于串切環也落也布各切領連亦作襮絡力各切繞也縛也所以轉篗絡車也緇仄其切黒色䊷同上䌴力卧切相足也不細也不均也絝口故切脛衣也又絆絡也緒似吕切絲端絹居掾切生繒緧七由切牛馬緧也亦作鞧䋺同上給居及切供也備也足也縭力支切介也帶也􅵭口皆切大絲呼光切絲曼延綫思箭切可以縫衣線同上縪布一布結二切止也冠縫也縿所衘切旌旗之斿纅余灼切絲色綜子宋切持絲交繩市升切索也直也度也俗䌖似接子立二切蛮夷貨也紐女九切結也束也繢丘謂切紐繢緷古本切大束緁且立切縫也亦作緝䌌同上綃思焦切生絲也素也緯也繒似陵似登二切帛也繦居兩切錢貫紡孚往切紡絲紲思列切馬韁也繫生馬皆曰紲緤同上綮苦礼切緻繒也㦸衣也絩他呌切綺絲之數纉子􅆑切継也繎如延切絲縈也縐側又切縐布也纖也俗縠胡木切細纒也紗縠也綺袪技切有文繒他丁切緩也􅮲同上紵文吕切麻属所以緝布古文縞古倒古到二切練也白色練力見切煑漚也胡冷切直也緈同上綯大刀切糾絞繩索也古文綟力計切緑也或作䓞山名繡思又切五綵備也繙扶元切􅁈也緢莫交切旄絲也紖直忍切索也絼䊶同上紑孚􅀒孚浮二切鮮絜皃繪胡檜切五綵畫也紊亡愠切乱也紼甫勿切引棺索也車索也乱麻也綍同上緂他甘切衣綵色鮮又衣皃統它綜切又音桶緫也辮歩殄切交也織之力切作帛布緫名之異切織文錦綺属綕同上緥布老切小兒衣亦作褓緶婢連切交枲縫衣也縎古忽切結不解始移切又思移切粗絲經緯不同者䌤絁同上綅思廉切綫也黒經白緯繄於􅀆切青黒繒也綴知衛切緝也繻汝俱切細密之羅又思俱切帛邊也古者過関以符書帛裂而分之若今劵也縜于貧切維持縜組細者䋨芳主切治系也絨于月切綵繐也之若切矰矢䠶也生絲縷也也纒也繳同上組子古切其小者可以爲冠􅁓丁􅀆切絲滓也纍力隹切繫也綸也得理也黒索也又力僞切延及也又力捶切十􅁰也亦作絫累同上緄古夲切織成章也繩也緌而隹切継冠纓也紻於兩切纓也紞丁敢切冠垂也纓於成切冠系絛它刀切纓飾紳式真切大帶也束也亦作􆁠繟充善切帶也寛綬也子緩切組􅀋同上絙胡官切綬也紃囚遵切絛紃也縌冝㦸切紱綬也綬絲也䌘方結切編繩也劒帶絬思列切堅也綊胡篋切綖也繐思惠切細布同上緺古華古蛙二切綬紫青色縊於豉切自縊也縋直僞切懸索也絭袪緩切玉臂繩繜子昆切布衣名絆補畔切羈絆也綸力旬公頃二切綬也緩也所兩切履中絞也䋣扶元切馬髦飾􅩕同上繮居羊切馬緤也紂除柳切馬緧也紴布何切怖靡切水紴錦紋䋀乎瓦切犀也余至切重也縻亡爲切牛縻也纆亡北切索也同上纕思羊切帶也後臂也收衣袖木紨風扶切粗紬也力乎切布縷綌去逆切粗􅁑絺丑飢切細􅁑緰大侯切布也允恚胡卦二切維紘中繩絜公節切結束也清也縗七回切喪服絰徒結切麻帶綷子内切周也紗所加切紗縠也純市均切絲也美也大也又之閠之允二切縁也又徒損切䋷亡侯切縛也九免切縮也七忽切索也紽大何切絲數紀居擬切十二年也緒也又絲别名又五紀歲月日星曆數縺力延切縷不解緅側尤切青赤色繏思縣切懸縋索縙如用切亦作䩰䋈女於切緼也塞也或作袽又女下切䋾䋈相著皃䋾竹下切䋾䋈緋甫韋切絳綀也縚敕髙切亦作韜䌯丘貟切幘也紛孚云切乱也緩也馬尾韜也繾去善切繾綣不離散綣口阮切繾綣綑口本切亦作裍緵子公切縷也子六切縮也縼夕絹切以長繩繫生馬放之繶於力切絛也或作䋟巨記切連錘也緙口革切紩也繬所力切縫也綡力羊切冠綡也絠弋宰切彈彄也弦也又解繩也􅌭匹仁切􅌭紛盛也䌥於近切䌥衣也絎行孟切縫紩也紷力丁切綼絲繐也䌪以冉切續也縆公曾切急也駃疾也或作恒綵七改切五綵備也䌐亡狄切索也山卓切緘也䋃亡到切刺也䋸自遵切繞䋸繘居律切綆也用以汲水也索也綆古杏切繘也没繩也䋁同上普賣切散絲䌟歩革切織絲為帶䌨思曷切絹縠也緍亡巾切絲緒釣繳也施也力周切旗今爲旒綩於逺切紘也綗口逈切布名大外切紬細也絧徒弄切相通皃絮思據切敝綿丑慮切調食纊若浪切細緜也絮也絖同上又十八縷緩乎卵切遲緩丘切束縛也䌫力暫切維舟也􅮗力奚切繫􅮗一曰絓􅮗䌞力冉切懸􅁞薄橫也呼骨切微緫也縲力追切縲細才咨切補也䋪烏何切細繒絘七利切績也所以緝也巨於切綵名又履縁繖思但切繖盖也綀所於切紡麄絲䌦大到切緑也繂力出切井索緝七入切績也續也亦緟也績子狄切緝也紱甫勿切綬也同上䋻乃心切䋻織也縯余忍切絟七全切又千劣切細布也􅁑也紏他口切亦作斢字絨如充切細布綿亡鞭切與緜同相俞切絆前两足紜于分切數乱也緆先狄切治麻布也亦作裼網無两切亦作罔羅也䋦法􅀽切絲乱紋音文綾紋也縴音牽惡如系繗力仁切紹也䋽方孔切枲履也小兒履也似林切續也今作尋繑去喬切絝紐也音婆岀漢書綱古郎切大䋲側耕切結縈也緉力掌切絞也履緉頭也力一切蒸綵色五侯切又隅也音頻搗衣緮扶又切又音福䌀口和切理絲絣方莖切方幸切無文綺也絽力與切絽䌎紩衣也䌎力若切紩衣䌔於侯切䌮色莊切䌅徒郎切大䋲􅖯凡例切毛布或作罽居業切䌜續縫䌜牛輙切䌜絾市征切織絾也􅶯丑人切帶也䋥力支切文也緎于力切縫也或作絯公才切挂也中約也音舟綿也糽陟夷切引也絒音酬紈也䌡音躰纒也綏先唯切止也安也􅀃文車中靶繼公䇿切續也紹也継同上俗紶去魚切束也継也縥阻近切水急絞古卯切繞也綖余戰切余旃切冕前後垂必奚切縷并也亦作陛音稚刺針縫多果切冕前垂紏飢黝切告也音擬帶也緻馳二切密也縫􅀘敝衣也縡子代切事也載也魚㪯切絲也子用切緩也繸徐醉切㓙具紁初訝切綽齒灼切寛也緩也或作緯婥䋙如止切六轡盛皃音戾綬也又音捩音䯻絲結綧之閠切乱也音歲練布縶竹立切縷也相縶也連也纋六􅀹切笄之中央髮紒户計切在心不了也縤桑故切生帛䌝音紟絲也䌁音要䌁䋲子堯切亦作焦生枲未漚絻亡運切䘮服或作􅊵於孝切亦作袎之聿切一也縖音鎋束物也䊽古邁切細絲䋱力之力才二切強毛或作緗思良切桑初生色絏音絀繫也䋖音聿長皃絉音術䋲也䋏音昨索也綼歩狄必没二切裳左幅也䌗二句切繅淹也䌵之欲切䌵帶也同上下革切生絲䌚音粟文綄乎官乎管二切􅃸風五两繵具連切約繵謂之禪緙輕革切紩也織緯也絔音百􅀘也子葉切續也同上縀乎加切履跟亦作䋗古千古兩二切左鄭伯䋗絪於仁切絪緼元氣也音臘約也音藥絲也纈胡結切綵纈縝丑仁之忍二切絲纑縷􅕒去月切􅕒狄衣也亦作闕䋿烏廻切五色絲飾繓子括切結繓也繣呼麥切乖戾絈音粕紛絈顈乎善切綴也口逈切襌也公旦切亦作衦摩展之也䋰舉禺切䌩亡結切細䌩緊居忍切縐緊音朔封也䋵於計切急也一曰不成也所除所去二切亦䟽字䋢普蔑切結也於業切子千切正作韉以貴切織餘􅬓方孔切小兒履又布茫䋂乎交切緑色也嫁者衣也系部四百二十六凡五字系下計切継也􅀃文繫也籕文作緜彌然切新絮也纒也緜緜不絶也今作綿與招切於也隨也過也又以周切由字同繇同上纛徒到切羽葆幢也亦作翿又音毒素部四百二十七凡九字素先故切白也㪯也廉也白緻繒也同上出􅀃文同上䋤弋灼切縞也又練也繛尺約切緩也今作綽力出切帛也索也或作􅛢繂乎管切綽也今作緩凡足切素属弋之切尊也又常也今作彛絲部四百二十八凡七字絲先資切􅁞所吐下計切籕文系轡碑愧切馬轡也弋之切古文彞古遹切汲也綆也亦作繘同上􅳑古環切織緝以絲貫杼也部四百二十九凡七字丁雉切紩也或作子内切㑹五綵黺方憤切黺綵也方千切緶也黼方宇切白黒相次文黻方物切黒與青相次初呂切詩衣裳今作楚率部四百三十凡一字率山律切循也將領也尊也􅀃文云捕鳥罼也象絲網上下其竿柄也又力岀切索部四百三十一凡三字索先名切尽也又紏䋲曰索又法度也又所格切求索也力各切亦作絡纒絲也􅛢力出切㪯船索也或作繂大廣益㑹玉篇卷第二十七終
