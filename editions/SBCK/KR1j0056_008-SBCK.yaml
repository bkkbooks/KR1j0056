body:
  text: 大廣益㑹玉篇卷第八凡三部心部八十七六百二十九字心思林切􅀃文火藏也􅘁同上恉之以切意也愮余招切憂皃憭力繞力彫二切意精明也性思淨切命也質也怡翼之切恱樂也忱時林切誠也㦃叉限切全徳也慔莫固切勉皃悰昨宗切楽也一曰慮也愼市振切謹愼也思也悒於急切憂悒也悗武􅁊切惑也悍胡旦切勇也怭蒲必切慢也懽呼官切恱也又公玩切尓雅懽懽愮愮憂無告也慲莫蘭切忘也憿古堯切行險也恑居毁切異也先則切實也慬渠斤居近二切憂也慤也快苦夬切可也喜也懼渠句切恐也愳古文悙丁昆切信也僕也厚也同上恂思切信也慄也温恭也愷空改切樂也可也􆇵胡圭切変異也􅁣可戴切大息也忼苦莽切忼􅁣壯士不得志慷同上懷胡乖切思也安也又心懷忻喜斤切察也喜也惏力南切貪惏也懤文又切愁毒也悟魚故切斍悟心解也古文怞文又切勆也憂恐也惲憤切謀也議也憾胡紺切恨也慟徒貢切哀極也􅞥余丗切習也明也同上悃苦本切志純一曰悃愊普力切悃愊至誠也恎徒結切惡性也憎子登切惡也悁於縁切忿也憂也古文怙胡古切恃也詩無父何怙恢苦回切恢恢大也力支切多端也同上憚徒旦切難也又畏憚􅓆同上恃時止切頼也詩無母何恃恬徒兼切安也静也恨胡艮切自怨也憍居髙切逸也悄七小切憂也心無憀也同上慕莫故切思也習也本作恭居庸切恪也今作憤扶粉切懣也忉都勞切憂心皃愜起頰切服也又快也㥦同上㥛居力切疾也一曰謹重皃悈居薤切疾也飾也忧于救切心動也惴之睡切憂懼也怪古壞切異也非常也恠俗慢莫諌切輕侮也不畏也􅤷亡斧切愛也撫也惔徒甘切憂也怦普耕切心急也㤏徒冬切憂也恎㤏惶遽也同上於報切悔也於六切貪也㥠相旅切才智之稱也悑普布切惶也怖同上恾莫郎切憂也不暇也忙同上恗虎姑切恐也憂也怯也悛且泉切改也止也㤥下代切恨苦也㤿於檢切愛也㤿憸多意氣也又甘心也􅰪同上悱孚匪切口悱悱疑辨也恤思律切憂也救也蒲戒切極也慺洛侯切謹也敬也不輕也下情也又力朱切慺同上悌徒計切孝悌徒礼切愷悌悖蒲突蒲輩二切逆也莫逹切忘也憢呼條切懼也怕普罵切恐也􅀃文匹白切無爲也㥝亡善亡婢二切屬也止也恌他彫切尓雅恌愉也憬九永切逺行皃愎蒲逼切很也􅿣去逆切疲力也又其略切勞也悴存季切憂也七没切心急愞乃乱乃過二切弱也㤝齒終切心動也􅬝胡頂切恨也惟弋隹切思也有也辝也爲也謀也伊也怍疾各切慙也顔色変也懮於九切懮受舒遟皃􅚸直勇切遲也㦜胡郭切驚也憮無斧切憮然失意皃又不動皃又荒烏切􅭛忯佳祇癸二切悸也悚也慥七到切言行相應皃愯息拱切懼也􅋏同上又所江切懜莫公切慙也不明也又武亘切懈古賣切倦也怠也憜徒果切怠也易也惰同上古文忮支豉切忮害心又不媚勁很怊敕橋切悵恨也又尺昭切怫扶勿切意不舒治也徙勆切放也慏弥并切慏悜也悝力止切憂也悲也疾也又口回切􅢯丘廉丘减二切不安皃怗池頰切服也静也惕他的切憂懼也惖同上慒昨遭切乱也殂冬切謀也又慮也又音囚㥓去竒去倚二切􅢯㥓險急惽呼昆切乱也癡也憰古穴切変詐也悸其季切心動也㥴余氏余支二切不憂事也又徒􅊠切也愅公翮切更也変也或作諽怋莫昆切悶也不明也㤱徒候切誑也胡溝切恐也恫他東切呻吟也痛也又徒弄切㤞徒各切忠也正也又他陌切􅗘同上􅴇同上又忖􅴇也懲也悿他􅀧切弱也忦古切恨也又公大切懼也又五拜切懝牛力切有所識又五漑切懫之日切止也塞也之吏切忘也憡楚革切小痛也悢力黨切懭悢不得志力尚切悢悢惆悵也忬余懅切緩也安也早也忋公在切恃也仰也懢力甘切貪懢也悏苦恊切快也懍力荏切危懼也敬也巨禁切心怯也惃古混古魂二切惽也乱也憒公對切憒憒心乱也㥆他對他没二切肆也忘也忽也怢同上同上悜丑井切慏悜意不盡也悔呼對切改也恨也慘七感切愁也痛也恨也􅀃文毒也又初錦切㦧七感切痛也怛丁割切悲也惆敕周切惆悵悲愁也悵敕亮切惆悵失志恨惜私積切吝貪也怮於蚪切憂懣也惂口感切憂困也㤦力志切憂也情疾盈切人之隂氣有欲者忸女六切忸怩慙也怩女飢切忸怩忡王中切憂也巨營切憂也恱余拙切楽也愴楚亮切悲也傷也惻楚力切悲也痛也㤤羊殊切憂也慛昨回切悲傷也公厄切智也恀尺紙切怙恃也憕直陵切心平直庚切失志懌羊石切恱也服也㦓胡典切意難也愇韋􅄦切怨恨也懶力旱切俗􅈸字愖帀任切信也恔吉了切憭也胡巧切黠也懠在細切怒也疾也愕五各切驚也懥陟利切怒恨也惿承紙切審也尺儱切恐也忯渠支是支二切敬也爱也慅蘇勞切憂心又音草慃烏項切狠戾也恟許卭切恐也慪口侯切悋惜也慱徒􅁊切憂皃恮且縁切又子眷切謹也愔於斟切安和恱皃怜魯丁切心了也慵是容切嬾也㤊胡交切快也懅巨魚切心急愃許逺切寛心息縁切語快愵奴的切思也又憂皃㤉口牙切恐懼慞之羊切慞惶也恈莫侯切貪愛也懰力尤切怨也慉丑六切恨也許六切興也憔昨遥切憔悴憂衰也寺周切慮也忴巨淹切心急也士咸切悋也惍居吟切利也憀力周力彫二切也且也憟西足切承止顔色也力尤切怨也㤃孚亡切忌也力魚切憂也憈去魚切怯也憺徒敢徒監二切安静也慽且的切視也痛也愢息台切意不合怌孚悲切恐也古巷切恨也古紅切心急也惀力迍力尹二切思也懹人向切也相畏也怶普皮切恐也徳紅切愚也方迷切通也㤚户剛切恱也忓古安切優也胡旦切抵也慴之涉切慴然懼也悓呼典切􅷅悓也尺拯切也丑拯切愚皃悎胡老切心動也懁火還切慢也古縣切心急怵恥律切悚懼也悽愴悻胡耿切怨也符彼切劣也房吻切思也㥉芳九切怒也慓匹姚蒲小二切急疾也㤨記奉切恐也恭也􅣼弥遣切想也㥏他典切慙皃㤢於六切心動也之爽切不恱也愉弋朱切恱也又羊竪切惶胡光切憂也恐也㤳布亥切市也㦐女里切快恬也息淺切慚也􅷸初卯切心􅷸也怚秦吕切驕也又子御切忝聽簟切辱也本作㤁愰胡壙切心明也怉布絞切悖也㦉乙利切古文㦤忏七典切怒也憶於力切意不足往來念也憐力田切矜之也撫也怬許異切忻也忤五故切逆也慣古患切習也孚救切怒也憧昌容切行也直巷切愚也惵徒頰切恐懼也也憓胡桂切爱羡也忕他蓋切奢也㥼於靳切依止也慖古對切心乱也怓女交切乱也詩以謹惽怓懾章渉切怏也懼也怰户絹切賣也惋烏貫切驚歎也惓巨眷切悶也懞莫奉切懞心也愾口代許氣二切太息也忳徒昆切悶也乱也力割切惡也憱初又切慼也忭皮靣切喜恱鳥定切恨也懆七刀七老二切愁不樂也恲普行切滿也忼􅁣也恦户樣切念也私箭切憐念也㦏息戀切税也子妙切急性悾苦紅切慤也苦弄切誠心力拙切少也與劣同訴到切怏性㤈七切惻也㣾初訝切不脩也古夏切不安也惝尺掌切惝怳失志不恱皃雖遂切意思􅀷也㥞同上見􅀃文余亮切恨也巨記切敬也憷􅀄去切心利也㦒力怟切㦒慢言輕易也忚呼奚切㦒忚欺慢語愧居位切慙也亦作媿㥾女力切愧也胡代切快也懀烏外切惡也憎也悶也悚息拱切悚然起敬也戃他朗切戃慌無思皃慌呼愰切慌忽怟都替切悶也㥢字秋切悒也子由切慮也愐弥兖切想也勉也憉歩行切憉惇自強也悙許庚切憉悙懎所力切恨也㤆方切惡心也急性也惗乃叶切愛也又音線愱秦栗切毒也或作􅍀戸間切戾也愉也與力切心動也憴食陵切正也或作譝憸七廉息廉二切詖也弥娌切安也或作侎㥒七海切恨也急也㦢子結切心貞皃愡七弄切愡恫不得志也愒去例切貪羡也息也㥽楚革切情也耿介也懱莫結切輕也侮也㥔與六切心動也㤴丑葉切心動皃又休也怳吁往切狂皃又怳忽惕杜朗切放也平也慯式諒切憂也痛念也恄許吉切也恒胡登切常也乆也古作愠於吻於問二切怒恨恍火廣切恍愡精想也惚呼骨切恍愡㦅徒結切不安也懻几利切強直又懻忮也孚吠普大二切怒也愲古忽切憂也心乱也忨五亂切貪也愛也他卓切心不安也懪蒲角匹角二切煩悖也㥟故皆切恚也恨怨也㥊歩行切㥊好怒也乎宏切㥊吕恤切憂悶也愩古紅切心動也又古弄切怏於兩於亮二切懟也惺桑經切惺憽了慧也憽蘇公切惺憽營隻切用心也愪王分切憂也又于敏切悽七奚切悽愴也傷也愝於典切愝惼性狹也惼方顕切不傾之皃忇盧得切思也畢民切伏也匹人切敬也憫眉殯切憫黙也憂也五故切曉也与同㤸許激切心不安也㦦同上愀在九子小二切色変也慄力質切謹敬也悚也悋力刃切鄙也俗作恡惐于屋切痛心也㤜許律切怒也㣿都了切憂也之藥切痛也㥜羽魏切怫㥜不安皃慠五告切慠慢不㳟也莫胡切受也忖倉本切思也戄許縛具縛二切驚遽皃去宮切憂皃又作􅸶况于切痛也憂也慊口玷切切齒恨也許急切心􅀬也愶許劫切以威力相恐愶也㤕竹律丑律二切憂心怲兵求切憂也懼也惙陟雪切也憂也􅫅戸甲切􅫅樂也恜恥力切從也愼也惈古火切勇勝也敢也恇曲王切怯也怖也忔許乞切喜也恰苦洽切用心也㤖竹與切知也愚也㦎呼麥切頑也垂戾也而灼切乱也又音惹悼徒到切懼也傷也㥄力升切憐也哀也恞羊脆切恱也忻也惸葵營切獨也或作煢㦗巨錦切懃也又音金恪口各切敬也謹也愙􅀃文同上悀與恐切怒也忿也巨王切進取皃古文字怔之成切怔忪懼皃悕許祈切念也願也怯去劫切懼也畏也愭喬移切敬也順也慆他刀切喜也慢也􅐞尺養切怳􅐞驚也懵牟孔切心乱迷也愋許爰切恨也忘也怐居遇切恐也苦候切愚皃忪聀容切心動不定驚也遑遽也􅙸盧董切􅙸悷悷盧帝切􅙸悷多惡又憻悷悲吟慳口切悋也悂必迷切誤也匹比􅀶計切慎也悇丑慮切憂也又他切余庻二切憛他紺切憛懷憂也愺七老切愺恅心乱也恅力造切愺恅囚歳切謹敬恐也㦚畢􅃆切急也憂也悠弋周切思悠悠皃得漢切忒也爽也悲筆眉切哀痛也愁也懟直類切怨也徒對切愚也恙余亮切憂也病也㦁力延切泣血㦁㦁也㣻魚肺切困患也懲也愈余主切勝也差也忘无方切不憶也又无放切􅢚呼介切忽也不和皃懘同上又尺制切惉懘意不和也同上尸霑切慸懣莫本亡困亡旱三切煩也同上態他戴切意美也嬌態也亦作㥋衣豈切痛声也愁仕尤切憂也恐去拱切懼也又丘用切古文恐懖古活切愚人无知􅀃文善自用之意奴的切憂皃女版切俗赧字􅱂誥計切俻也極也怖也悊知列切智也與哲同慫息勇切悚也動也敬也􅁖也怨也於牛切愁也憌巨營切􅁨也懲直陵切戒也止也畏也而眞切親也仁爱也惡於各切不善也又烏路切憎􅁖也􅁖同上俗恧女六切慙皃㤎古俄切楷也知也法也慶丘映切行賀人也恿與恐切猛也氣果也􅀃文云古勇也㦟莫皆切慧也羊季切忘也憥力髙切疾也心力乏也式六切然疾也慹之陟切不動皃又之入切怖也愗莫候切怐愗也憨火含切愚癡也憠巨月切強也直也或作惑戸國切迷也乱也愬蘇故切譛也斯革切驚皃􅀃文訴同慿皮明切投託也力牛切定意也􅜜皮筆切弼同或作怫輔也忌渠記切畏也􅁖也悹古桓公玩公緩三切悹悹􅁨无告也悺同上㦂時羊切古常字怘胡故切護同堅也常也忿孚粉切恨也怒也㦛余吕切􅃐皃又以諸切謹敬皃古文而欲切古辱字䉍古限切或作蕄又音萌怒奴古切怒恚也問也憲許建切法也制也􅀃文云敏也同上戀力絹切慕也尸界切傾心也果敢也悆余庻切豫也恱也愨空角切謹也愿也誠也志也恚於睡切恨怒也憼居影切敬也懇口狠切悲也誠也信也他得切差也失常也㤮九放切誤也詐也又巨望切恥敕理切恥辱也㤠力結切􅁨皃怤芳俱切恱也僖也樂也愆去乹切過也失也㥶􅀃文同上􅗅同上俗力之切怠也渠乆切怨也恁如針切信也如甚切念也患户慣切禍也疾也古文古文慁户困切患􅁨也㥵同上應於陵切當也又於證切慙昨酣切恥也慙愧也慚同上恣子利切縱也何堅切急也魚旣切怒也瘱於計切密也疾也静也志之吏切意也慕也古文悶莫頓切也憗魚覲切目也息思力切喘急也力之力置二切愁也􅁨也惹人者切乱也引也同上又音若直由切箸也􅊸同上見􅀃文㦌呼骨切寐熟也惌於元切惌枉也又於阮切愍眉隕切悲也痛也慜同上􅧴息廉切利口也念奴玷切思也慝他得切惡也奴歴切思也愁也或作愵怨於願切恨也恚也古文怨楚芮切謹也慾余玉切貪也􅀄力切古側字憃丑江尸容二切憃愚也於斤切懃憐皃懃巨斤切懃憊蒲拜切病也懋莫候切敏也􅐂同上㥸眉殞切傷痛也古文愍字慮力據切謀也思也崽子改山皆二切方言云江湘之閒凡言是子曰崽惢部八十九凡二字惢桑果切又才累才規二切心疑也繠如纍切聚也垂也左傳佩玉繠注繠然服節俻也
