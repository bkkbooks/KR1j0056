body:
  text: 大廣益㑹玉篇卷第二十五凡十部䑕部三百九十九凡五十八字䑕式與切穴蟲之緫名􅔺力乆切似䑕大鼸胡簟切田䑕於革切䑕名鼫市亦切形大如䑕頭似兎尾有毛青黄色見尓雅䶄歩丁切䑕如勇切䑕􅫪公切班䑕􅤜力下切􅫪属鼮徒㕔切漢武時有此䑕文如豹終軍識之賜絹百四鼶思移切䑕名鼩巨于切小鼱䑕同上鼱子盈切鼱鼩鼷下雞切小䑕也螫毒食人及鳥獸皆不痛今之甘口䑕也􅤜胡貪公含二切蜥蜴同上䶂之若切䑕􅀋􅴄人市切䑕名鼬弋救切䑕名郭璞云似䶅赤黃色大尾啖䑕江東呼爲鼣扶廢切䑕名同上徒忽切鳥䑕同穴鼭視之切䑕名父元切白䑕一名公尾底蟲胡的胡姪二切似䑕而白䶆之惟切􅀯陽呼䑕云鼪所敬切䑕名公禄切鼬䑕補木切䑕名䶅胡各切䑕出胡地皮可為裘吉役切䑕身長須鼧大河切䑕名徒當切䶈䑕名䶈布各切䑕也􅥨子狥切鼫䑕鼢扶粉切地中行者曰鼹䑕鼤亡云亡運二切班尾䑕力知切小䑕鼴於切人䑕音兒䑕也歩靈切䑕也鼲胡昆古痕二切䑕名可以為以救切似䑕亦作鼬即容切䑕也䶇除乆切䑕也普木切䑕也音晹䑕也户吾切鼠黒身白腰任緘切音雀䑕也音刃䑕也鼦丁乆切古貂也䑕也毛可爲裘子移切似雞䑕毛見即旱鼯午胡切鼯鼠飛生或爲鼨之弓切豹文䑕籕文於盖切小䑕相衘而行易部四百凡二字易余赤切家也異也轉也変也又以豉切不難也於革切䑕属或作作虫部四百一五百二十五字虫盱􅀑切一名蝮博三寸首大如璧象其卧形又介揔名雖息葵切似蜥蜴又詞两設也又推也蝮孚六切毒蛇蝮螫手則断螣徒曾真錦二切神蛇螝胡對切蠶蛹䗥子公切螉䗥螉於公切小蜂又螉䗥牛馬皮中虫也蟯如消去消二切腹中蟲蚺如塩切大蛇肉可食蛹與種切者􆁭同上俗虺呼􅀑切户虺今以注鳴者亦爲蝮蟲螼丘忍切螼螾寒蚓也螾弋忍切螼螾蚓同上蚯音丘蚯蚓蝘於甗切蝘蛵在壁曰蝘蜓在草曰蜥蜴蟫大含弋針二切白魚蟲子外所芮二切蟲也蠸巨􅀽切食􅀲蟲蜭胡感切毛蠧蜓大典切蝘蜓又音廷蟪蛄别名也蚔巨支切士蝱也亦作螟亡丁切食苖心蟲䖯口圭切蠆也蠆丑介切螫蟲或作蠲古幺古迷二切蟲也明也除也又疾也蛅如占切尓雅䘃蛅蟴蛓属蟴息移切蛅蟴蟖同上蛓七史切毛蟲螆蚝並同上蛣去􅁻切尔雅蝎蟾􅔒木中蠧虫􅔒丘勿切蛣􅔒蜨山頰切蜨蛺蛺古協切蛺蝶螳徒郎切蝼螳蜋有斧蟲一名石蜋蜋力當切螳蜋又音良莫江切蝼蝼􅀋蝚如􅀹切蝼蠣力制切属蚩尺之切蟲也又癡也􅀏也乱也才􅀆在梨二切螬亦作蠐螬祖刀切螬蟦扶非切螬蠀在資切蠀螬蟠扶元切䑕婦蟲又歩安切大也紂廻而轉曲也疾尤切蝤蝎木中蟲蝎胡􅁑切桑中蠧蟲蜀市燭切桑蟲亦作蠋螌布姦切螌蝥毒蟲也蝥莫交切螌蝥又莫侯切食木根蟲又􅢤蛛蛑􅀃文古文蝥又音牟蝤蛑蛵呼丁切負勞又蜻蛉蛶吕􅀃切蟲名􅲈蚵蛉力丁切蜻蛉蜻疾性切蚻也也又子盈切蜻蛤䗐式移式豉二切米中黒甲虫強巨羊切米中蠧小蟲蚚巨衣切強蚚蟲螰力木切螇螰螇胡雞切螇螰即蟪蛄一名蛁蟧亦蜓也蜆户千户典二切小黒蟲蜥先的切蜥蜴蠑螈也蜴羊益切蜥蜴蠑永兵切蠑螈蚖魚􅀽切螈螈同上蜰父非切蠦蜰即貟螌臭蟲蠦力胡切蠦蜰蟣居豈切蝨蟣螕􅀘兮切牛蟲蠖於縛切屈伸蟲蛾五何切􅁞蛾蠪力公切蠪虰蟲亦獸名虰丑經切蠪虰也蟶同上螻力侯切蝼蛄蛄古胡切蟪蛄蛢歩丁切甲蟲蛬吉勇切蟋蟀亦名蜻蛚又音卭同上蟋思栗切蟋蟀同上􅢊所切蟋蟲蟀同上蜙先恭切蜙蝑斯螽蚣同上又古紅切蜈蚣蟥胡光切蛢也􅛔市律切蟥也蠓亡孔切小飛蟲蠛亡結切蠛蠓蝑思閭思呂二切蚣蝑蝗胡光切記蟲蝗爲灾蝡如兖切動也同上蜌步禮切蚌長者蛂歩結切蟥蛢􅨑力約切蜉䖻渠􅨑朝生夕死蛚力結切蜻蛚蟋蟀呼鈴切乗飛皃尺戰切蝇醜􅃖丑善切蟲伸行螸弋朱切逢螸蜹汝銳切含毒蛇又蚊蜹又音先公切蛸喜子蛸所父切蛸蝁於各切蛛蝁時力切日月蝕五各切似蜥蜴蛭之吉丁結二切水蟣蛘弋掌切蛘搔又音羊蟺市􅄛切蚓蟨居月切北肩獸閩冒貧切東􅀯越蜉扶牛切蜉䖻蜎於犬於沿二切蜀皃蛻尸銳始悅二切蛇皮蜧力計切神蛇蜦同上䗡􅀝然切蟲名蛒古額切蠙螬也蛤古合切雀入水爲蛤亦作􅧳蠗文卓切小蜃或㺟字螊胡緘切小蚌可食螷扶幸歩支二切蛤也蚌歩頂切蜃也蟜居兆切毒蟲螭丑支切无角如龍而黄虯竒樛切無角龍蛟古爻切蛟龍螹才廉切螹螭也􅕪乎木切蝼蛄螲知栗切蝼蛄蝸古華切蝸牛郎螔蝓螔弋支切螔蝓螺也蝓餘味切螔蝓蟾之廉切蟾蠩䗁巨綺切蟬也䗃仕板切馬䗃蟈古麥切蝼蝈蝦蟇又音國父俱切毒蛺水蟲蚹父句切蜼蠃䘎音彎虫名蜪它刀切尓雅蝝蠖蜪蝗子未有翅又音陶蝝推舡切蟻也亦蝗予蝯子元切蝯猴或作猨以朱切虫也䖲詳遵切虫也蠜父􅀽切阜螽也即蚣蝑又免蠜蜚也蟇莫加切蝦蟇亦作蟆蝦下加切蝦蟇蟼居丙切蝦蟇䗇臣六切蟾蠩蟬市然切蜩也以旁鳴者蟬連系統之言也蜺午結午兮二切寒蟬蜩大么切蟬也同上蛥上列切蛥蚗蚗胡夬古穴二切蛥蚗亦蟪蛄也蚼呼口巨俱二切蚍蜉蛩巨恭切巨虚也又蟬蛻也螗大當切蜩螗虮居指切虫也蛆子魚切蝍蛆又且絮且余二切蝇蛆也亦作䏣蛕胡恢切人腹長蛕蚘蛔並同上􅿐音文虫名音逶水也蚑去豉切行喙息麕鹿之􅀋行也又音蟘徒得切食苗葉虫􅠀並同上螫式亦切蟲行毒同上刃畧呼各二切螫也痛也亦作蠚螘宜􅀝切蚍蜉並同上蟻同上仁余切虫名蜄市忍切大蛤也亦作蜃又市刃切螮丁計切螮蝀虹也蝃􅔼並同上蝀丁孔切螮蝀蚜火牙切虫也蟄直立切藏也和集也蟄蟄多也又赤粒切蜷竒貟切蜷局也連蜷形䗋二同音舞音張虫名音哥虫名蛫九毀切獸似白身赤首􅀃文蟹也蜼余季余救二切似猴而鼻仰尾長雨則懸於樹以尾塞鼻歩登切蟲也蚳丈飢切蟻􅆑蠻馬姦切􅀯方也蟲也慢也傷也蜏思又弋乆二切朝生暮死蟲生水上狀如􅁞蛾一名尊母蝬音㚇蛤名蟹諧買切螯八足蜮胡国切似鼈含沙射人爲害如狐也蝙布田切蝙蝠亦名蟙䘃又名仙䑕又名服翼蝠甫服切蝙蝠蜽力掌力蝄蜽或作魎蝄武兩切木石之精如小兒赤目羙人髪或作魍蜬古含胡甘二切小蠃見水中蜟余六切蝮蜟蟬皮蠟力闔切􅁡滓蟪胡相切蟪蛄􅝦於虯切􅝦虯龍皃又于糾切蚴同上蟉力幽巨二切蟉䖭居亥切䖭蠣蛸䗚䗱歩木切䗱蟲音速䗱􅨪以淺切螾􅨪同上蝹於筠於云二切蜿蝹龍皃蚆普如布加二切貝也蝍子力切蝍蛆蜒以然切蚰蜒蚰與周切蚰蜒又入耳虫蝣同上􅣒於疑切寒蜩似蟬而小巨隕去筠二切貝也􅜽子亦切貝狹小䖢亡消切蠶初生於冒切虫也螱同上蝭丁􅀆大􅀆二切蝭蟧蟬也蟧力么切蝭蟧同上杳句切子公􅁞蠵戈規切觜􅏲以蝳蝐而薄有文同上蚡扶粉切亦作伯勞所作螖胡八切似蟹而小蠌大名切螖蠌蟲大丁切􅁞二眠蝥音務蟲名又音牟同上􅫡所竒切螺也力之切蚍蜒䖡女六切蛆蚭班蛬蚭女尼切蛆蚭䗅雉良切蚰蜒虹胡公切螮蝀又音絳縣名籕文蛙胡媧切蝦蟇又烏􅀲切虴竹百切蚭蝢蟅蟲蛨亡百切蛨虴􅲈户錫切􅲈蚎音曰虫名􅒹同上蝜扶􅇲切蝜大如蜆有毒補故切蝜蚅於革切螐蠋也螐於胡切螐蠋蠋之欲切螐蠋又音蜀蠾同上蚤子老切咬人跳蟲又作䘇䗚布莫切䗚蟭蜱蛸也蟭子饒切䗚蟭蟲先狄切蝢䖤蜯歩項切蜯蛤也蚌同上蟡於爲切似蛇又音詭蚵胡多切蚵蠪蜥蜴七狄切蟾蠩蠙步田切珠名即刃切海虫䗯同上蝐亡代切蝳蝐又莫沃切蚕天殄切蜸蚕蟺也蜸口殄切蜸􅁞䘃亡北切蟙䘃蟙之力切北燕呼蝙蝠為蟙䘃同上䗘公盍切廣雅云羊䗘徒合切䗘蝂自限切䗚也蟞俾烕切亦作鼈繭古典切􅁞繭蠒俗蟓似两式亮二切桑蠶􅏑之戎切蝗也亦作螽蚞莫十切螇螰子􅢡直六切馬蚿蠁許兩切禹虫􅀃文知声虫䖮同上䖻力田切蜉䖻又弋留切蜘竹竒切蜘蛛亦作鼄蛛竹于切亦作鼄扶乆切螽也蛁丁公切蟪蛄即蛁虫虭同上蚱莊頟切蚱蟬七月生虶於于切蛈虶螠蜒也螓疾鄰切螓蜻蜈力呼切蜈蚣蝒弥縁切尓雅馬蜩中最大者同上䗗古奚切甘田切螢火蛾也螔思移切螔䗔佢蜥蜴䗔音侯螔䗔蝖許元切蠀螬蟷多郎切蟷螳蜋别名同上蠰乃郎思亮二切齧桑蟲古卧古禾二切蟷蠰式容女􅁰蜙蝑子票切蜻螵毗支切螵蛸螳蜋子又撫昭切蜱同上蛸思么切蟬蛸螳蜋􅎙丘良切􅎙蜋啖糞蟲同上又其虐切蛝乎問切馬蠲也蟅之夜切䑕婦􅀒蠜也䗪同上蟿口悌切蟿螽螇蚸似蚣䗥蚸􅃖亦力的二切螇蚸於招切毒蛇名蝛於帰切蛜蝛蛜音伊蛜蝛委􅁰也􅢤同上蚊亡云切咳人飛蟲作蟁䘇巨由切虫亦作蛷古姪切蠸䗓千公切蜻蛉古火切蠃細􅆎蜂即蠮螉蜾同上蠃力果切蜾蠃力弋切蜯属􅘾魯丁切螟􅘾桑蟲蚿胡田切馬蚿蜝巨冝切蟚蜝蟚歩庚切似蟹而小蟛同上蚢胡唐切蟲􅀋食蒿葉蝩文㳟切􅁞晩生也蜢莫梗切蟲名蚥力父切蟾蠩螢于䮐切夜飛腹下有光腐草所化同上􅨦直連切盧􅨦守宮也蝟于貴切蟲也亦作彚䗠似縁切􅵙䗠􅲇同上􅵙婢治切􅵙䗠􅍱蝨同上蜫古魂切蟲衆各亦作䖵䖪徂核子尓二切蟲也蝰口圭切蝰蠍許謁切螫人蟲於結切螉蠮同上螒胡旦切天雞也一名渉雞䗽以季切蛘也蚲也蚲皮兵切蚲䗽蜿於阮於元二切蜿蜒龍皃又蜿螾又於丸切䖤同上􅝒他敦切􅝒􅘿虫似蟬而長味辛美可食又名青蚨􅘿牛俱切􅝒􅘿蜅方武切蜅觜蟹􅖈冝列切獸禽虫蝗之怪謂之􅖈或作孽􅖆余雖切肥􅖆蛇一身二首六足四翼見則大旱湯時見陽山下蚟禹方切􅜽蠊力古切飛蠊蜚扶貴切獸如半目又蜚也又音非蚢胡唐切虫􅀋食蒿葉七由切次蜲於詭切蜲􅡂式與切蜲蟒暮黨切大蛇也又莫哽切蟅蟒也古頡切蚼似蟬而小蜊音梨蛤蜊螿子羊切寒蟬属蝪恥郎切蛈蝪蛈他結他計二切螲蟷也亦蛈蝪螯五刀切蟹螯或作􅚺蠼音瞿蠼􅢮音范蜂也力支切螏才一切蝍蛆能食蛇亦名蜈蚣午乎切似䑕大亦作䗏所由切亦作螋力竹切魁也蚍音毗蚍蜉大螘螃北郎力莖二切似蝦蟇而大螚乃多奴來二切俗態鼈属音甫虫名公戾切継蝧􅼄乃令切􅼄古逈切􅼄似蛙而小觸之腹脹害人徒登切蟲食禾葉户㳙切蟲名蛞胡括切蛞蜍与諸切蝳蜍蝳徒駕切蝳蜍形似蜘蛛又徒耐切蜡子亦切虫名又䄍同􅀕名音泉貝也蝶徒頰切胡蝶蜜弥畢切蜂所作徒酷切古文毒字害也惡也恚也蝃知劣切又音拙蜘蛛蟮是演切曲蟮蚻側轄切蜻蜻也蟂古公切水蟲䖺大公切如黃蛇魚翼見則大旱岀山海經蠞子結切又音截似蟹蛡音詡蟲名􅣁於􅀹切䑕􅣁􅪔房中切蟲窟􅠸子六切蝍􅠸尺蠖也歩屈也蜇陟列切虫螫亦作蛆且主切蟲名息弓切蟲名赨羽弓切赤蟲名䖳除嫁切形如覆笠常浮隨水亦作膾竹洽切班身小蝱䗄力禹切蟲名力貟切蟲名蚷強魚切蟲名蛦以脂切􅢡蛦虫名又􅝒蛦山雞蜐音劫石蜐似脚色江切蟲名以射切蟲名􆄥户夬切蟲名䗢音造蟲名音費蟲名虳九勿切又音的䑕也蝞眉秘切似蝦螠音縊蟲名丘貴切蟲名且利切似蜘蛛蟃無販切蝢蛉虫虵食遮切毒虫正作蛇弥民切蟲名音異又音弋虫蛠音麗蟲名䗲力刃切螢火音㵼又音冩􅗶普流切似蟹二足蟩居月切井中虫􅡻大西切蟲名莫格切小蚊虫􅚣五忽切以蟹䖩毗必切黒蜂苦紅切蟬脫皮也蚇音尺蚗蠖虫乆力切蟲食䗷於力切小蜂音賊食禾虫音見蟲名䗛音蕭又音脩虫名營􅃗切蟲音色蟲名音禄似蜥蜴蛐音曲蛐蟮蜶索没切蟲名蝌苦禾切蝌蚪蛞子蚪當口切蜊蚪螺音騾蜯􅀋大西切蟲名􅧅古牙切米中蟲蚶火其切蜯属􅰏昨仙切方言云鳴蟬也䗝自含切俗􅁞字䗵記良切䗵蚕䖱去王切大蟲螂魯當切蟲也䗧音康蜻蛉也呼典切蟲名䖟陌庚切蟲名􅒕火咸切似蛤蝚音柔蟲名音雷蟲名音叢蟲名側尢切蟲名䗼許云切蟲也而容切蟲名音枝蟲名蝔古諧切蟲名胡求切古杏切蟲名蚽薄碑切蟲名音難蟲也音刑蟲音袴虫名步如切蟲虸即李切蟲名鳥合切蟲名䗜音流蟲名音該蟲名力之切蟲名蚾薄碑切蟲名蚷音巨又音渠䘂子廉切蟲名息淺切蟲名􅮤音尹蟲名䗆音官又音綰佗典切蟲也䗂呼古切蟲也蟢許紀切蟢子蛃兵永切蟲職以切蟲螞莫下切蟲音野蟲也䖧奴􅁑切痛也蠚也􅶎居表切又音告音養蟲名音弩蟲名先名切蟲􅶗音畧蟲名䘆許偃切寒䘆即蚯蚓胡􅀲切大蛇尺尚切俗蠰字芳伏切蟲名音同蟲也蟽音逹蟲名䖵部四百二凡四十二字䖵古魂切蟲之緫名亦作蜫五何切􅁞亦作哦知蹇蟲名蠡力􅀆力底二切蠡蠡行列皃薄之扁欲破也飄也又力戈切􅁞在含切吐絲者􆇲於甗切蜒或作蝘蝱莫庚切蟁也俗作蝱音巴蟲也栘切蟲蛸亦作蜱子老切蝨亦作蚤螽之戎切蝑屬古文手列切蜩似而小俗謂茅蠽小蜩巨午切多足蟲亦作蟊亡侯切螣也或作䖥之悅切蟊乃丁切蟲也蝨所乙切淮南子曰陽沐旣貝蟣蟊相弔蠢尺尹切動也作也或作偆在刀切今作螬戸瞎切螻蛄螶巨於切螶􅨑也蠭孚容切螫人飛虫今作蜂􅑣古文䘅乃北乃代二切似蝱而小父􅀹切亦作蜉大子兖切蟲食於力切小蠭亡吉切勉也又􅑣目飴今作蜜􅼼同上徒何切狀如人羊角虎爪􅜹時忍切亦作蜃大蛤於貴切飛螘䘌女乙切小蟲蟁亡云切齧人飛蟲今作蚊同上蠯歩幸切蚌蛤也或作蠯􅪓䘍丑介切毒蟲或作蠆䗣胡監切􅀲蟲􅤊牛􅀽切晚蠶蠹丁護切才中虫又白魚螙古文蟲部四百三凡七字蟲除中切有足曰蟲無足曰豸婢脂切蜉大蟻或作蚍同上莫侯切与䖥蟊同扶畏切大或作蜚蠱公戸切事也毒也或曰榖乆積変爲飛蟲力刃切蟁也它部四百四凡三字它恥何切蛇也上古草居畏它故相問无它乎又非也異也今作佗蛇同上今市􅃒切又弋支切詩云蛇蛇碩言恥支切今作螭􅀛部四百五凡五字􅀛居逵切文也進也外骨内肉天无雄以蛇爲雄又貨之寳也古文而三切􅀛甲邊或作䶱之戎徒冬二切䶱􅀛烏郎切臨海水吐氣觜似鵝指􅀲黽部四百六凡十八字黽眉耿切蝦蟇屬似青蛙而大腹又多士籕文蠅余陵切青蠅􅖚七由七狄二切蟾蠩似蝦蟇鼈卑㓕切􅀛属或作蟞鼉徒何切江水多似蜥蜴天者有鱗采皮可爲鼓鼅音知鼅鼄或作鼄音株或作鼃胡媧切蝦蟇今作蛙䵷同上鼇牛髙切傳曰有神靈之鼇皆負蓬萊山在海中黿魚表切似鼈大胡雞切水虫鼂中橋切蝘鼂虫名古文鼊音壁􅔢鼊似􅀛而大文如瑇􅈘可飾物其拘切屬又音鈎􅔢同上􅆑部四百七凡五字􅆑力管切凡物无乳者邜生口木切􅆑空芳子切􅆑化徒木切􅆑内敗也大亂切不成子曰貝部四百八凡百四十四字貝布外切海介虫大貝如車渠肉如科斗但有頭尾又貝甲也古貨貝宝􅀛􅩏先果切貝声賀何佐切以礼物相􅂟賀贏余成切利也有餘也贅之銳切賣人子与人爲贅子又以物質錢也最也得也聚也定也属也貺詡誰切賜也贛古送切賜也古禪切縣名賝丑林切宝色亦作琛賢下田切有善行也多也益也能也持心也又下見切義見考工記臤古文賁彼􅀉切飾也徵也又布門切虎賁勇士又扶非切人姓賑之忍切冨也䝩同上䞈凡僞切賭也亦古貨字􅣢同上齎子􅀆切行道所用也持也備也給與也付也子期切歎辝賷俗財在來切貨也賂也賄呼罪切贈送財也同上貸他代切施也假也借盈也以物与人更還生也貣他得切從人求買亡蟹切市買也賣余六切衒也或作粥鬻古文􅀒浮九切擔也置之於皆也違恩忘德也或作偩賂力故切遺也賻扶句切以財助䘮也賵孚鳯切凡贈䘮曰賵同上質之逸切信也主也平也璞也軀也又知異切賮才忍切財貨貱悲僞切益也賧吐濫切蛮夷以財贖罪同上費孚味切損也用也惠也耗也又扶味切姓也責壯革切求也古文贖市燭切又市注切質也以財拔罪也贎忘怨切又力制切貨也貨呼卧切賣金玉曰貨貿亡侯切中賣貧皮旻切之財賈公户切商賈也聚也又古雅切姓也戸羊切賈亦作商資子夷切取也用也貶碑撿切减損也賃女禁切借傭也貳而志切副也代也疑也並也離也畔也貦牛亂切亦作玩好也弋證切以物相贈送賭丁古切䞈也䞁於獻切物相當賚力代切与也賜也勞賚爲勑字今作顂賞戸掌切賞賜有功也賜思漬切惠也施也貾除基切余眡貝竹几切當也贈在鄧切以玩好相送又助生送死賤才箭切價少也卑也不貴也貤余豉切貱也益也贇於倫切美也汝兖切小有財貲子離切小罰以財曰贖也財也貨也賖始􅃒切貰也不交賣也貰侍夜切賖也貸也䝮胡狷切今作衒賆歩田切益也賕巨留切以財在法相謝也質也請也購古􅃸切以財有所求償貪他含切欲也惏也思徇切益也都勒切今作得賅乎改古才二切竒也非常也亦作侅賛子旦切佐也遵也助也也贊􅀃文賛婢丗切今作弊䝶力章切䝶賦也􅚲力艶切市先入賥思醉切亦作粹賔卑民切敬也客也服也從也賓􅀃文賔古文於兩切無訾貹山敬切財也䝻姜魚切賣也賦方務切稅也布也量也使吕切以賣財問卜贓作郎切藏也賳子才切貨也䝭古候切廪紿音綿䞁也貢公送切通也献也稅也賜也賨在宗切蛮賦也稅也􅵊疾盈切賜也賰式尹切賱賰冨有也賱於尹切賱賰䩀皮秘切壯䩀賙之由切給也贍也收也䞀呼日切龍目岀江海䝫才惡切貨也賟他典切冨也贔米袐切贔屓有力也屓虚器切贔屓貴居謂切髙也尊也多價也䝿􅀃文貴贉徒感切預入錢販方万切賤買貴買力侯切貪也䞆先卧切骨貽弋之切玄貝亦作詒遺也贍市艶切周也假助也贚良用切貧也又龍皃賏於敬於庚二切節也瞰火監切有賄也而晋切牢也贆卑遥切貝居陸賧也䝹烏欵切䝹小財皃乎管切䝹䞋音襯䞋錢刃政切賣不得䝬音註財䝬䝰直凡切或作痔古作畤賲布老切有也亦作宲賶七浪切積貨音林取也巨律切䝱音協財也䝺古玩切穿也今作貫贀于閑切㛪挐或作䜜䝧眉巾切本作譄筭稅貼天叶切以物取錢賉先筆切分賑亦䘏字烏邁切貯也力賑切貪也也或作遴徒䧟切錯也重賣也賊昨則切刧人賽先再切報也市肺賦歛贗吾安切不直貯知吕切盛也積也収也藏也贄脂利切執玉帛亦作摯火营切貨也䞄方廟切散匹帛与三軍或字大廣益㑹玉篇卷第二十五
