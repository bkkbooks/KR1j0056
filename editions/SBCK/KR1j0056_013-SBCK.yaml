body:
  text: 大廣益㑹玉篇卷第十三凡一部艸部一百六十二一千五十四字艸七老切百艸揔名􅀃文百卉今作非草同上􅀃文音皁草斗㦡实曰様斗苬叙留切苬芝也一年三秀蓏力果切草实在地生虈許嬌切香草也萐所治切萐莆瑞草王者孝至則生於樹葉如門自扇飲食以助供養莆方禹切萋莆灵艸薫許軍切香草似蘼芜蓀息昆切香草名同上􅓂呼郭切豆葉之少也藿同上蘭力干切香草春蘭也蕙胡桂切香草秋蕙也蔨竒卷切鹿豆巠􅊉齒改切香草也虋莫温切赤苖即今赤粱粟􅚂俗蘺力支切香草芎藭苖也蘼蘼飢亡彼二切釁冬葵渠追切菜名葵同上莥女紂切草子鹿霍实同上葯於略切白芷葉即虈也芷支視切白芷薬名名􅊉芞去訖切香草也苷古酣切苷草䕬居良切辛而不葷也薑同上萁居疑切菜也渠疑切豆莖蓂莫丁切蓂莢又音覓薔所力切虞蓼也苹皮明切萍也又藾蕭萍部丁切草无根浮水生䓑同上蒠私力切非息菜似芜菁蘅胡庚切香草杜衡也薊古䴡切薊芙也葪同上俗薸毗招切水草萍属䕯同上古豪切草名实似􅀲食之治蘇先胡切草薬荏属菁子丁切芜菁也蕧扶福切草似菊䔾去竭切香草䔾車也藒同上茥徍切覆盆也又音睽莧胡辨切莧菜草䟽也蔦都了切􅀉生也蘻公詣切狗毒草薓所金切人薓薬也蔘同上莞古桓切胡官切草可作席荏而錦切菽豆又蘇属芥假拜切菜名蕕与周切臭草也􅙛徒合切草名莐潘也蕁同上余招切銚芅詩亦作銚芅余識切芅羊桃也藫杜含切海藻也蒳奴荅切香草名菼他敢切草名藋初生也􅫠同上荷賀多切芙渠蓮也菡胡敢切菡萏荷華也䓿同上莟同上花開蔤美切荷木也莖弜在泥中者苾同上蕸何加切水中生荷葉薂胡激切菂敫蓮实也萏徒敢切菡萏同上藕五後切荷根曰藕蕅同上茄古遐切荷莖又巨迦切芙附俱切芙蓉花名蓉俞鍾切芙日芍都歴切蓮子又時灼切芍薬上略切芍陂下了切􅝀茈也芡渠㰸切芡雞頭也菂上歷切蓮实亦作的芰巨􅀉切芰䔖也茤同上􅀃林芰从多蕮思亦切馬蕮車前同上䓈弋箠切芡也北燕謂之䓈蔆力升切芰也水中生同上䔖同上亦作菱芓詳餌切麻母也枲也茡同上苞博交切叢生又積也豐也菔扶福切庐菔菘菜也䓜諸尸切􅉁也同上芩渠炎渠今二切黄芩也菳同上䓶七漬切芒也草木針也茅亡交切草也葦也䔂荘里切羮菜也青五切草履也虉魚激切小草有雜色同上芐胡古切地黃又荷嫁切葖他忽切葖草蘆也菷炙乆切俗菷也范音犯草名又姓茢來桀切艸名萑苕也䓟同上茁乆劣乆滑二切艸出皃菘思雄切菜名蕪菁也莀奴冬切古文農菊居六切大菊蘧麥也居六切曰精也似秋華同上蘜同上治蘠也今之耿華菊薠扶藩切水草胃蘋也蒿呼豪切蒿鼓也􅺁息夷切茅秀也蓍舒夷切靈草下卦者古文是支切母草即知母也菅賈顔切菅草茅屬薟力検切白薟蘞同上􅙥諸律切􅙥山薊与术同同上萉扶佛切枲实也或作黂蓷勑雷切萑蓷草名萑至維切萑蓷蔀歩口切蔀覆也苽古胡切記曰魚冝苽菰同上芣伏丘切芣苡一名車前苡余止切薏苡香草也苢同上莊阻陽切草名又盛也敬也又六逹道曰荘古文􅉮去紀切白粱粟又菜也萯房乆切小豆四月生与六切山韭也菨二葉切莕菨水艸也莕何梗切菜也俗呼曰猪蓴荇同上蓑素和切草衣也又素回切蔩余紳余善二切菟􅀲􅟏玉唐切菖蒲也䑓雞切草名蕛苵也苵徒結切蕛苵他生草同上葶都挺切毒魚草文音亭藄勤之切草似蕨可食蘀他洛切落也同上荆景貞切木名又地名古文葹舒移切卷施草抜心不死莃欣衣切草名菟葵也莎素戈切莎草也薃胡蒿切莎草也菭徒來切艸生水中緑色也苔同上茯音伏薬茯苓也又車茯兎苓郎丁切扶苓蘨与招切茂也蕍􅁃俱切澤㵼也蔪疾斂切書草木蔪苞同上葍甫鞠切葍葍大葉曰華䔰甫又切草名䔰䔰也虇丘逺切蘆笥蔈芳燒切黄花藙魚旣切薬名煎茱茰􅱣同上㽔汝誰切葳㽔草木实垂皃蕀居力切今逺志蒬於元切蕀蒬蘤爲詭切華榮也茭古爻切草也又下絞切古文息移切鳧茈或从茈積豕切染草又音蕓禹軍切蕓薹菜薳爲彼切姓也蒸章繩切炬也衆也君也塵也䒱同上茜此見切草名茅蒐可染絩同上蒨同上青葱之皃公幸切羊莖也芔許胃許偉二切草揔名卉同上芾方味万大二切蔽芾小皃蒚良激切山又蒲蒚䕹才市切户薕也才餘切草䓚也薻子道切水中菜也藻同上藨平表切前屬可爲席􅸬苦怪切草也中爲索蒯同上葒胡公切葒蘆草蘬丘非丘丘追三切大蘢古艸古文萎於危於僞二切食牛也薽諸身切茢薽豕首葑匪庸切葑菜芜菁也菲孚尾切菜名又薄也語云菲飲食又芳把切芳菲也又父未切䒷公活切䒷蒌即􅀲蒌董德孔切藕根又正也因纎切菜也口羊切菜也藩輔園切蕁芜藩又莆煩切屏也籬也莩方俱曰葭莩葭中白皮芴亡勿切菲芴土􅀲也一丘切菜名䓱仕街切草䓱也蓼力鞠切長大皃又音了艸也同上莦所交切艸根也又相遥切蕦相俞切蒿蕦似羊蹄䔞吕僪切草子甲呼角切艸声諸翼切草名葉似酸漿蘵同上䓄牛斤切草又江夏有䓄亭蓯子孔切草名葑蓯也蕒母解切苦蕒菜普莫切落也芛推畢羊箠二切草木葉􅀄生也茟古文薉於吠切行之􅁖也又作穢茦楚革切芒茦也刺也苪袐永切明著也䒨徐雉切蒿艸也䓠他市切菜生水中者古文茷符廢博頼二切草葉多也薞蘇昆切草烏薞也徒篤切古文毒䕡吕居切菴䕡也菴􅀝廉切蘆舎又音諳葊言文萩且留切蒿也又七肖切葎陵出切葎似葛有刺蔠音終蔠葵栯也蘣他口切好皃居包切秦薬名芁同上薋疾兹切蒺䔧也三角刺人蒺慈栗切蒺藜棘草也蔾力脂切蒺蔾藜旅題切蒿属苘口頴切艸也亦作䔛同上蕝子帨子芮二切束茅表位蘴孚雄切芜菁苖也薆於戴切薆隠也荳音豆荳􅞦薬也荶牛金切艸似蒜生水中䕾古文萆婢赤切雨衣也一曰蓑衣蔐舒王切草薬蔐遂也􅺀他盍切􅺀布也􅝀音苻􅝀茈艸也菤九轉切草名菤耳也古文茸而容切乱皃而勇切不肖薛胥列切草薬莎也􅀃文薛字芘防脂切蕃也芵古穴切芵明也花黄同上葆補道切草茂皃又羽葆也蓾来伍切杜蓾似葵香􅀃文同上薹音䑓菜名芸薹莌他活徒活二切艸生江南同上薜補革切山芹又音臂薜荔茘力計切薜茘香草也香于切草華也􅞉音孚花􅞉也力振力因二切鬼火或作燐同上蔜五髙切艸也尓雅蔜千古切苴草可作履逐􅀆切麻也蓖同上䕺在紅切草叢生皃藂俗菥思擊切菥又息移切菀於逺切紫菀薬名莏素和切挼莏也芒罔良切稻麥芒蘋音頻水艸大萍也同上䔮思移切草生水中花可食苑於逺切苑飬獸園也得田切草頭菖尺良切菖蒲音爻黄茅根煎汁治消渴䒝同上蔣子羊切􅋎􅃽子兩切姓也蒟俱羽切蒟醬出蜀菾徒廉切菜名萉扶佛切果实或作黂藥征切草名菊也萾同上薖苦戈切草也又寛大皃茱时朱切茱茰薬也茰与朱切茱茰蔱所戞切似茱茰菣丘刃切草名蒿菣也同上萌麥耕切始也草木芽也芽語家切萌芽也苤鋪悲切花盛菄得紅切東風菜音􅂰薬名牛也同上莖余更切枝本說文草木􅆬莛特丁切莖也海姑切噐也葨烏回切葨艸􅧚舒理切糞也亦作矢俗作屎薿言紀切荗皃又牛力切蘮居偈切蘮蒘似芹詞龍切菜也䒧音佉草噐名葐扶文切葐蒀盛皃又蒲昆切西復葐草蓻子習切茅牙又草木生皃䓏方扶切䓏然華盛也苁自容切古文􅀙防無切姓也蒔石至切更種也植立也又音時芃扶戍歩同二切艸盛皃蘧其居切榖名麥也􅽅而勇切草毛厚􆅅側刮切切菜也萴阻力切前子薬名或楚力切菿都角切与倬同又音到蒢直居切蘧蒢草名胡利切野蘇也薺才礼切甘菜也荹蒲故切牛馬草乱藁也又音蒲蓋胡獵切苦也古害切仍也葇汝游切香葇菜蘇也蔄方莧切姓也薇音微菜也草也荑大奚切始主茅也荑桑也又音夷莁荑也菈洛台切芦菔即􅫘子􅫘度合切菈􅫘蘳呼規切黃花也音寢覆也葠舒􅐭切葠猶苦也草自藉也或作苦茨疾資切茅茨也以茅覆屋蓈力當切草蓈莠也莠余受切草也虃子廉切百足也藴紆文切積也聚也聚草以火也蘘如章切蘘荷草名蒜蘇乱切辛菜俗作䔉葫戸都切大蒜救立切荲也荲丑力切又丑六切蕡佉云切草名多实䔿作緄切本䔿草叢生蔗之夜切甘蔗藷之余切藷蔗可食也薄丁切荓草馬帚也莫耕切苕草可爲帚莫公切草可以作帚蔞力俱力侯二切蒌蒿葴至諶切馬藍又寒􅀅何蘭切􅃽草也蔡且蓋切草芥又妙萃疾酔切集也又卦名䕩来道切果名乾梅也蒙莫公切唐􅀩即女蘿薵直流切菜名蕏葱也藇徐与切酒美亦作藃呼到切耗也縮也茫莫唐切速也乆逺也藣􅀘為彼偽二切草名苙閭及切白芷又音及荅都合切小豆又當也蓶以追切菜似韭而黃葰相維切薑属可香口蓩莫屋莫老二切毒草莫􅃸切毒草䓮莫老切細草叢生藎疾刃切進也又草名荵如軫切似蘇有毛􅗰姑但切草莖称也狃庚切牂可作綆藸致如切草名又五味陟隆直隆二切草名菩防誘切香草文音蒲祇堯切草名連翹蔁之羊切薬名蔁栁也䕼如旃切草名又藝也同上又呼旦切草也茮子消切莍也与椒同莍渠牛切也䔟弋支切草皃萎䔟也茲子支切草木多益也蕪亡孚切草云芜薉也落郎閣切墮也又始也蔽甫制切障也隱也於營切草木萎也茀敕勿切茀蘺猶蒙蘢蔎舒列切蔎香草也蓆詳亦切大也草蓆也力計切附著亦作䴡䔯康路切醋􅉁謂之䔯苪文例切連也或爲綴蒪匹各切蓘何苴也蓴常倫切蓴菜水中生茵於仁切草茵蓐也苣勤侣切苣蕂胡麻也薶莫皆切瘞也与埋同苟公后切菜名又苟且萶齒允切萶萶雜也菆阻留切草也叢生也胡拜切烏飱草也茠呼豪切除田草也薅同上出􅀃文萰落見切草名白蘝也䕇胡罪公回二切懷羊蘱閭遂切草似蒲而細薡都領切艸名薡董也藆居輦切草名藆藅也藅扶發切藆藅奴結切菜似蒜生水中薌許良切穀氣亦作香莘所巾切衆也又地名薝丁敢切草名薝􅁄也蒀於云切葐蒀盛皃􅟏巨凶切蓂莢实也艻郎得切蘿艻香菜也芊七年切芊芊艸盛皃􅞦呼候切荳蔲薬名蘩輔􅀽切草名白蒿也蕭蘇條切香蒿又蕭索蘥余灼切穀名雀麥也􅭚素老切蔜􅘚也􅘚力主切蔜􅘚薢古諧切庚買切薢茩茩古后切薢茩蔌桑卜切菜茹之緫名苕徒彫切苕草可作帚薔音檣花名薔薇也蘠才良切虋冬草也蘢盧功切馬藻又音龍蔓忘怨切藤生蔓延也菋無貴切荎藸又五味荎雉之切草荎藸也􅁑功遏切蔓草根可食古勞切如􅁑白華芫牛􅀽切草芫花薬名艼秃鼎秃霝二切艼荧葋渠俱切葋艼荧也莨來唐切草也亦粱也蕈慈荏切地菌謂之蕈菌竒隕切草芝地菌也䓴而兖切木耳生枯木萋且嵇切萋萋草荗皃菶􅀘動切菶菶多实也蓁疾陳切衆也又草盛葼子公切木細枝直幹芼莫报切芼拔取菜也藥与灼切治病草揔名蕰於粉切聚也又菜也菸於去切􅆨艸謂之菸藑巨營切草名藑茅也荋䜇之切艸哆又亭名藪桑後切大澤曰薮䒹来潰切耕多草也苫舒鹽切草名茅苦也藹於蓋切腌藹樹􅌗也芻楚俱切茭草俗作芻蕢竒槐切草器又音塊莜徒呌切草器名也莝且卧切斬草謂之莝蕘乳燒切芻蕘草薪也薪息秦切析木柴也艽勤牛切逺荒之野也藶力秋切葶藶薬名菉閭燭切菉蓐又菉荳茿猪鞠切萹茿亦作竹藚似玉切草名生脣也䔚时均切草也牛䔚也􅀘位􅀘婢二切䑕莞也蕼相利切草名菙也藘旅居切茹藘茅蒐也芨居及切芨革草烏頭菧之履切草蒻本作底苨奴礼切草名萕苨也苻輔俱切苻草􅄦目也蒫昨何祖邪二切萕实葟胡光切葟榮亦花美花呼􅀲切今爲華荂字菝蒲逹切瑞艸名菝葀葀古活切拔葀狗脊根􅿌苦八切菝􅌝草英猗京切草木英華蕆敕展切備也敕也蕞在㑹切蕞尓小皃力戈切草器或作蔂蒲骨切蒡又作葧䒲竹亞切䒲葿黄芩也葿亡悲切䒲葿草也禹俱切􅉁草似韭䕞力盎切䕞薚薬也薚荼盎切䕞薚苰胡胘切藤苰胡麻薱逹潰切艸木茂之称力豆切蘆薬也㪯魚切草名直也胡鹿切菜生水中者子移切菜生水中力戈切菜生水中孚陸切子也可食求元切敗也委葾也䔷竒金切草根可縁器乙卓切英蒻謂之䕸余戞切麻莖又音皆萳乃感切艸長弱皃䕍余丗切逺似蘇而赤䓌諸餌切逺恙薬名莫礼切菜名子也力胡切薬名薈也且巳切即葈耳也芚徒昆切菜似莧可食菗丈牛切菗荼菜也似入切茵水草也公玄切明草也䕧下校古鮑二切藕根除􅀋切禾秀与穟同薈子登切草名菎薈也莒居吕切草也亦囯名茪古黄切茪艸也力鞠切蔐艸薬也甫俱切薬名地䕪除格切薬名䕪蕩奴如切菜名藷蒵何雞切蘩莬蒵也荘卓切蒵附子也去用切䕞薚也蓺魚制切種蒔並曰蓺音蒲雉有肉也茂莫遘切艸木茂盛蔯音陳香菜茵蔯也萄徒勞切果名蒲萄萪苦過切莉藤生海傍莪五哥切艸名似斜蒿虆力垂切蔓也又音累􆇇祝由切艸名又盛也葙酥􅀅切青葙子薬名借清切仙草黄也語两切草出池水䒦孚㪘切草浮出水皃䕌遲至切䕌草也芽也蒩資都切蒩茅藉也芤苦􅃸切脉􅃸又艸名薙杔計切芟去草也葸胥里切畏懼曰葸苯畢衮切苯尊艸生也菬之少切菬子薬名也䕀苦菅切薬名苳也蔃強两切艸也險年根可食蒼土狼切青春爲蒼天与職切艸名藕翹莚以扇切蔓莚草藤生胡木切水草可食者苖靡驕切田木苖也又獵名蔢傍个切草薬蔢􅿋􅿋火个切蔢􅿋蔔傍北切菜名蘆蔔菽升六切豆名亦作尗荒呼黄切荒蕪多艸又年飢􅯇什耕切􅯇薴草名薴狃耕切草乱曰薴薁於六切草名蘡薁也䕉地革切草名䕉􅁑芮而銳切艸生皃又囯名莢公叶切豆莢蓂莢也渠立切冬􅀲一名䓃於及切草菜茹熟也蔋徒的切旱氣亦作滌葺七入切修補子入切茨也芬音紛草木芬芳盛也荀相倫切草名又姓也荁音桓草芝也堇􅀋莬音問草木新生者莂彼列切種槪移㘽莳也音祗繰絲鉤緒也音烏蓲即荻也寒翰二音白草也音瓊草旋皃与榮同蕊如累切艸木实莭二生蓘音衮藨蓘壅養苖也音漸麥之秀白者薯音署薬名薯蕷也蕷音預薯蕷薤胡戒切菜似非亦作苝音佩草名山也䔇音潰菜名又音豈于縛切菜名子蔧才歳切草蔧王帚也蘸側䧟切以物内水之蘸蕂詩證切苣蕂胡麻也疾立切菩草名也􅰠与良切􅰠葲薬草名葲音泉􅰠葲亡泛切艸木芜蔓曰蕖音渠荷名芙蕖也茳音江茳蘺香艸也著直閭切菋荎著也又中恕馳畧知畧三切䴡也述作也苜莫六切苜蓿本作目􅀫蓿私六切菜名苜蓿也䔬莭記切連翹草力主切小蒿草葷呼云切礼膳有葷桃茢葷葉所以辟凶邪胡懇切草名似蓍花青白蕿虚􅀽切令人忘戞草藼同上萱同上薄蒲各切厚薄又林薄也一曰􅁞薄蘦来丁切大苦菜或似地黄公橝公㨂二切草名蔿于委切草也荃趍縁切香草蘄居衣渠之二切草名又縣名又音芹㪿之烈切今作折又常列切同上出說文蒘汝猪切草名蓇古突切不实草􅣻平表毗小二切落也正作莩蔍郎谷切蔍蹄草又蔍䓤也􅫱同上又側吏切輻入轂也渠周切白芷茞时人切草名䔑弋蛇切穗也蓄積也又似嗟切䔩所革切以榖和草餧馬也蓒虚言切蓒艸生水中蒁来密切草名䓞来計切紫草莤余留切水草一名軒干又所六切苞茅莤酒也蔟青木切巢也又􅁞蓐也力周切艸木莖葉踈萭于矩切草名鼻􆇁切蒿似􅆱苴七閭切麻也子閭切苞苴子旅切履中薦䒼丘玉切䒼菹也養􅁞器也􅫟外諸切草名魚斉也公狄切草名胥潰切草名茬在之切艸盛皃済北有茬平縣蕇丁殄切葉似芥一名狗萕葳於㱕切葳㽔草皃後堅切草名荌於旦切草名菟音兎莬絲子薬名又音徒地名藺旅進切似莞而細可為席蒤逹胡切虎杖似紅草有救切草名同上藉牆亦切狼藉殘也又疾夜切蒐所留切茅蒐也春獵為蒐桑落色責二切草名䔴义力切草名与鞠切草名䕁甫尾切江湖之間兄卒相謂之棐也蕎居妖切大㦸也音橋麥也居逆切薬名木也公魂切香草菎同上􅣀卑列切蕨也紫􅛞也􅀄生无葉可食蕨居越切筍蕨山菜也葩普華切草木華也葚市枕切桑实薾奴礼切草盛皃蓫抽陸切詩言采其蓫牛􅪞又音逐烏尾草藬他雷切草名生頽也芭卜加切芭蕉又香草蕉子消切芭蕉蔇九利切草多皃芏徒扈他護二切似莞藺越人以爲席萿古活切麋吉春生葉似舌充受切草名菝葀也蔫於焉切草菸腐蓸在勞切蓸草也蕃縛􅀽切息也滋也又甫煩切藩屏也荂許俱芳俱二切荂榮也䔹除季切蘧蒢亦作与周同草也􅀃文􅘂宜居士余二切根似茅可食蓽􅀘密切似荆爲户謂之蓽弥紹切小草細也市昭切草也雇后切草也苛賀多切小艸生皃又政煩也怒也􅛧渠与切苦蕒菜也又音渠音龍艸名古文字亡􅃸切草名苳丁彤切草名藏慈郎切草名又隠匿又才浪切庫藏荼杜胡切苦菜也又除加切荈尺兖切荼荈葉老者萒惟脔切雀弁也苀胡唐切苀東蠡茇莆逹切艸木根􅀘未切蓽茇藤逹曽切艸木蔓生者揔名茗􅁳頂切荼茗荈也藗桑鹿切白茅芀都聊切葦花䖆女亮切菜也􅉁也􅀃文而丈切莁武俱切莁羙一名白蕢恥亮切草木盛也䓉与蛇切草名萊旅災切藜草艿音仍舊艸不芟新艸又生也於亦切葢母草本作益茺齒戎切茺蔚即益母葽於燒切草也芟所􅃊切除草芿而証切艸芟陳者又新生者余斃切葉似竹生水中蔚烏貴於勿二切茺蔚蒥力牛切香草􅮳九岀切草也菜且賚切草可食者揔名菜古畦苦畦二切鉤藈姑艸菇故呉切藈菇葞亡此切春草疾来切草也居欠切草薬根可治喉痛茹而預而与而諸三切柔也菜茹也飲牛也又相牽引皃易按茅連茹蓄丑六切蓄積也菑阻飢切一歲田又子来切害也荺營窘切茅根又藕根爲茆閭酉切茂盛皃又亮葵也或亡絞切􅛄同上出􅀃文菏乎哥切艸也又音柯澤名菩薄胡切佛號歩亥切艸也薩桑􅁑切釋興菩薩也䓝亡庚切狼尾草俞主切草名蓪他公切薬草䓂魚鞬切草名莋才亦才各二切如艸也且栗切葉似蘇葏才千切草茂皃莫侯切草也胡故切草名􅚄力當切毒艸藖下間切堅也又下辨切䓵橅俱切䓵萮花皃萮􅁃俱切䓵萮蘛同上又音育亦同上䔜他甘切菜葱也䕣餘括切草似蕨生水中虂力故切草蘩虂也􅥖有貴切􅥖草也苭於皎切草長葓音洪水艸名音詵地名蓊烏公切烏孔切木茂皃䔲音登草名金䔲也䔶音提䔶草也同上古治切草名音基種也􅺡以遮切枲属皮可爲索鋤邪切水草名音劬芟草也芝止而切瑞草苸火烏切草名音毛薬名苶奴結切疲也又乃莢切蕫音童草名又音董得盧切草也莫五姑切茣草也䓙古懷切䓙草也䓐食切切草名恱宣切尾艸射干也􅺟力彫切􅺟草也蘹户乖切草名作才切草名菕律春切菕草古和切草也䕈思狹切艸也又徒叶切蕔愽蒿切蕔草也識余切艸也蒢祥余切艸也羽鴈切草名同上許往切􅩛又詠永切艸徒兼切薬草名也渠焉切草名苦婁切草也䕱徒侯切草也䒩胡戈切草名子了切草似薺菜蒖之仁切蒖草䒢也萓魚飢切草名莮奴含切草也葁居良切山草䕕莫半切草名䓼音尨又火角切並草名昨寒切草名都昆切草名都官切草也䒟都蘭切薬艸䒶古文天字蕠音如蕠蘆艸也亦作茹音緩香辛草胡也荽同上䒘同上䕊都闌切草名荿時盈切荿草荄古菜切艸根也又音皆􅔾音盲薬名貝母同上同上余舟切草䒜魚丘切䒜魚蔕都計切艸木綴实本也蔲古豆切草薬名茴胡魁切茴香茧遲隆切草衰䕔胡監切草名直離切草也蘿盧多切托松而生女蘿也蓎徒郎切蓎蒙女蘿也戍江切草也時羊切草名防乆切草也夕預切草也䒕私沼切䒕草逺志也蕄莫耕切蕄蕄在也􅽪同上本或作萌于矩切草名都朗切草也蓰息紫切蓰草也􅙤祥由切夜也又与糟同苦聾切心草与章切草名藢張里切火草名式止切草也九輦切草名芋或虞切草盛皃又王遇切菠博何切菜名菠薐薐勒登切艸名苲阻假切草名藠胡了切草名之两切草也蘡於􅄹切草名蘡薁莉力奚切薬草名息離切草名乃侯切草名滿切草也巨錦切草名子隨切草地䓴也䔀汝佳切薑倭也蕪亡夫切荒地草許俱切芋也胡降切草似葵虚􅄦切草名䕒古牙切䕒是薬也徒頓切薬草名息觜切草名䔪史養切䔪草也芠無分切芠草也䒚舒小切䒚草也胡感切又胡紺切草也葔胡溝切葔草名渠救切草薬名萀呼古切萀草也􅠩奴低切草露根夕雨切草苾莆結切苾芳草名芳孚方切芬芳香氣皃七選切薬草名䒴于九切草也䒡於軫切草名葤音紂草名荐在見切重也数也再也芦胡古切芦葦草尸枕切草名徒罪切草也無粉切辛草也䓍胡但切草也普木切草生皃莫後切草也荱亡匪切薬草名巨矩切草名蒲桮切草名䉈蘇剪切草也莅力至切臨莅治也与涖同􅌣音楼土􅀲􅌝􅌣也亡板切草名蘟於謹切晦也􅋎荘巧切薬草徒爛切草也􅞒古郎切草名岡草也葻􅀒弓切草動皃亡典切草也蕺爼及切菜名䒛胡貫切草名萺莫报切萺草也䔺恱吹羊菙二切藍蓼秀也盧到切勞薅也莄古幸切草名煑扇切草也舒戰切艸也歩鉤切草爼也蓓薄亥切草名黄蓓又蓓蕾蕾落猥切蓓蕾花綻皃菍奴佔切草名葃慈作切草名千歷切草名音覓草也藰六九切草名草也䔔居競切䔔草也䓭楚戞切䓭草也先結切草也蔛胡鹿切石草名莈莫勃切薬草藞力无切藞磋不中皃䕢除瓦切藞䕢莯母卜切草也甫禄切草也子昔切石草䔁力質切草也䔭奴領切寗毒草也莡粗合切行草声藌冥栗切藌草也䔱伊立切草名䖇於律切香草殂勒切草名菪徒閬切草名可席也􅹋渠列切􅹋草也䕃於鴆切草䕃地莫卜切菜名胡眣切草也䒸許大切草名於立切草名尼立切居滑切草名䓇呼歷切草盛皃薈烏會切草盛皃䔏又敕切草根雜子合切又音雜草名古八切艸也蒒色淄切草名音機草也苮音仙草名似莞音題􅀃文草名蒴始卓切草名蒴有五葉仗卓切蒴音凋葫茭实也䔸音表草名尺加切草芽蓮力堅切荷实䕓􅀄戞切䕓艸有毒用殺魚蘪音縻切草糜芜也菺居賢切荗葵今蜀葵茙如終切菜名茙紫也大廣益㑹玉篇卷十三
