body:
  text: 大廣益㑹玉篇卷第五凡十部口部五十六凡五百二十三字口苦苟切􅀃文人所以言食也聲􅀋古文口字嚨力公切喉也啜昌恱常恱二切茹也又音輟詩啜其泣哭啜泣皃咽於肩切咽喉也㖶同上喙詡穢切曰喙左傳深曰而假喙噫乙匕乙介二切飽出息也又於其切痛傷声也喉胡鈎切咽也嗌於亦切咽也咺呼逺切􅀃文朝鮮謂兒㳋不止曰咺咥虚記虚吉二切詩咥其笑矣又大結切易不咥人亨囓也籕文本作噲苦夬切咽也唴丘亮切秦晉謂小兒泣不止曰唴於結切飲㗧也詩中心如謂憂不能息也喗牛隕切大口也同上吮食允徂兖二切敕也史呉起爲土卒吮疽囁之渉切口無節亦私罵又而渉切囁嚅多言也咀才與切咀嚼也㗱子立切噍也嚛火沃切大啜伊尹曰酸而不嚛嗾蘇走先奏二切左傳公嗾夫􅆈焉方言云秦晉兾隴謂使犬曰嗾使犬倉候切或嗾同吸許及切内息也詩載吸其舌吸引也喤胡彭胡光二切小兒啼声噭吉弔切孔也呼也呌吉弔切呼也􅁻弔切髙声大呼也咦弋之喜夷二切大呼也又笑皃哴力尚切唴哴啼極無声哆處􅁓尺冩二切張口噬視制切􅲪也噍才􅀏切嚼也唏許几許旣二切笑也一曰哀痛不泣曰唏㘈牛力牛忌二切小兒有知呱古胡切小兒啼声嚌在細切至齒也古文呭餘丗切呭呭猶沓沓也亦作㖂喑於金於􅅴二切啼極無声啾子修切啾啾鳴声嚼疾略切噬也同上嘌匹遥切嘌嘌無節度詩匪車嘌嘌嗒吐合切莊嗒然似䘮其禍咷徒勞切哭號咷也啗徒濫切食也哈五合切魚多皃嗑公盍切多言又音盍噬嗑卦名呼火胡切外息也又火故切咳何來切小兒笑也㗘補洛切噍皃呑他恩切咽也嘵許幺切詩矛維昔之嘵嘵懼也吹齒規切岀氣又齒僞切嗛胡簟苦簟二切嚙也味武沸切嗞味呬火利切息也嗸五髙切詩鳴鴈于飛哀鳴嗸嗸又衆口也唫巨錦切口急又古吟切嚵士咸切小也喙也喘充兖切疾息也喟丘愧切大息也哤莫江切匡語雜處則言乱皃又異言唯俞誰切獨也以水切諾也山劣山芮二切小飲嘘香居切吹嘘也嚏丁計切噴鼻也嘅苦載切詩嘅我寤歎廣雅云滿也唱充向切導也倡字同嘰居祈切唏也小食也名彌成切號也吾五都切我也嘆敕旦敕丹二切况也太息也與歎同咠七入子立二切口舌声含户耽切食而未吞君居云切尊也問亡糞切訊也吠扶廢切詩無使尨也吠鳴也嗿他感切衆皃詩有嗿其饁哺薄路切口中嚼食也噱渠畧切大笑也㖸同上嚇呼駕切以口距人謂之嚇又呼格切嚋除留切誰也陟流切誑也竹滑切口滿食也咄丁骨切叱也唉於來切應声也呀虚牙切大空皃又唅呀張口皃吐他古切口吐又他故切嘽他丹切馬喘息皃嘫女間切語声也呷呼甲切吸呷也唲乙佳切小兒語亦作哇又音兒咈甫物切違也易咈經于丘嘳苦怪切大息亦喟同嘒許惠切小声也嚖同上㖃呼㖃呼遘二切厚怒声又胡口切吠也嘯蘇弔切蹙口而出声之日切野人之言也居矣切􅀃也喅由六切音声也子累切或作觜識也一曰鳥喙啻詩䜴切買賣云不啻噤巨錦巨禁二切口閉與昭切喜也嚱許羈切口声也呿祛遮切張口皃又丘居切卧声哇於佳切又居􅂝切諂声召他廟切呼也又音邵咸胡讒切皆也吉居一切善也呶女交切喧呶也詩載㖕魚􅁑切言相呵拒也命靡競切教令也使也周諸由切密也嗢乙骨咽也切啐倉抉倉憒二切甞也又子律切吮声唪薄孔切大声又音棒咨子祗切謀也嗟也嘾徒感切大呑也嚘於求切氣逆也唈烏台切嚘也尔萑云僾唈也哲智列切智也明哲也喆同上嚞古文􅄝食利切欲也呩古文吻武粉切口吻亦作䁕㖧古文吒知加陟稼二切噴也又叱怒也咤同上喥同上呰祖爾切口毀也嗻之夜切􅃒也噉徒敢切噉食也亦作啖啖同上噧呵芥切他􅂚切髙氣多言叶胡牒切合也古文協唊古叶切妄語也嗙補庚切訶声也和胡戈切可也胡過切應也咊古文㕧許棃切唸㕧呻也亦作屎听魚􅀮切仰鼻又笑皃叴巨周切髙氣也㕤同上哯乎典切不顧而吐也咞同上吟牛今切吟詠也亦作訡古弔切声也亦作呌叱齒逸切呵也噴普寸切鼻也唐逹當切国名代名古文吪五戈切詩或寢或吪動也噂子損切噂􅊱對談語噊余出切危也呻舒神切呻呤也吁虚于往付二切疑怪之辝古文哨且醮先焦二切言野朴􅊱徒合切噂沓亦作沓喻俞句切曉也嗞子詞切也唸丁見丁念二切唸㕧呻吟也同上噆錯感子感子合三切衘也嗔逹堅切盛声本作闐丑短切􅀏也各柯洛切異詞也嗁逹奚切號也左傳豕人立而號啼同上否蒲鄙切閉也方九切不也嘑火呉火故二切大声喝乙芥切嘶声􅯳同上噎也􅮛五葛才曷二切嘈􅮛囐同上哮呼交切豕驚声又大怒也呈馳京切解也平也吝力進切惜也古文㗲胡麥切㗲嘖呌呼咟同上啄丁角切鳥食又丁木切启康禮切開也本作啓哀烏來切哀傷喃女銜切小呢喃多言呢女知切呢喃小声多言也同上唬呼交切虎声又古伯切右禹救于九二切助也嗀許角切嘔吐皃噣竹救切喙也詩曰不儒其噣亦作咮咮同上嘐火苞切誇語古苞切鷄鳴啁竹包切啁嘐雞鳴也嗼亡切静也啍徒孫他昆二切重遲皃詩大車啍啍噋同上㖪呼麥切於六切声或作㰲嘲陟交切言相調也咼口淮切口戾也喎同上􅡜下刮切塞也嘷胡髙切咆也喛呼乱虚元二切呼也喛哀丁頰切吺多言也吺丁侯切吺同上喔乙角切雞鳴也嚶於耕切鳥鳴也喓於遥切声也詩草蟲喓喓嘮丑加切嘮呶讙也喁魚凶切衆口囒吕干切声也哰盧髙切多言也㗦盧髙切声也嘺丘遥渠堯二切不知是誰唇之人切警也唇口嘕許連切喜也去連切􅂬樂皃喊呼减切声也嚂力切貪也吂莫桑切使人問而不肯荅嘖壯革切嘖嘖鳥鳴嗟則邪切歎也叵普可切不可也啌火腔切咄也唶子夜切嗚也魚艱切犬相口訟詞㘙牛衫切冝㦸切呻也嘈才刀切声也􅓐才割切嘈􅓐也局其玉切曲也咡而志切口旁也吢七浸切大吐亦作吣呝於革切雞声亦作呃丑消切喉鳴也先榼切醜也咹一曷切吃也吨逹昆切不了也唁宜箭切弔失囯曰唁喭同上又魚旰切語由也喭啀魚佳切狗欲嚙呼縷決切雞鳴也乙學切誇声也哹匹尤切吹声嘇山咸切口臽嘇物也前歷切嗼安靖也嚝火横切声也售視佑切賣物也嚊普利切喘息声蘇曷切音變也啑所甲切啑喋鴨食亦作唼喈古崖切和声之逺聞啅陟握切衆口皃呁尤峻切吐也呥而廉切噍皃啒古兀切憂也喋丈甲切食也徒叶切便語呦音幽鹿鳴亦作嘔乙侯切唲也歌也唼子合切咬也尺活切齧也同上噞冝檢冝艶二切魚口上出􅢕牛府切麀鹿亦作麌㗤子六切蹙咨慙也唵一感切含也五合切衆声也㗨乆佳切􅀏皃咻許主切痛念声又許流切嗹閭前切嗹嘍多言也嘍力口切多言唹乙余切􅀏皃余輦切大􅀏也㗿火下切􅀏也􅳅子廉子艶二切不廉也嗉思故切鳥受食之処吵弥沼切雉鳴也哂式忍切􅀏也㗛思矅切俗􅀏字呣莫侯切慮也嘹落蕭切嘹喨又力弔切嚃他而切嚃謂不嚼菜莫奴切古文謨嘿莫比切與默同吼呼垢切牛鳴也吽上同又丁今切于白切自是皃或作讗台與時切我也又音胎嚾荒旦切喚同噮於縣切食甘也咋側革切声大也㗽虚丈切饗應声叨他勞切􅀃文與饕同貪也㕣以臠切山澗䧟泥地嘬楚夬切一㪯盡臠孚願切多言也哊禹六切吐也咍臺切􅀏也戸姑切與胡字同牛領垂火􅂚切詞也亦作喝咰所律切飲也嘪弥解切羊鳴也嗕如属切羌别種嗤尺之切􅀏皃咇蒲結切芳香又毗必切呫他叶昌涉二切甞也㖄諸由切呼雞声呞式之切牛噍也噪先到切呼噪也同上之六切或作呼雞声嗃呼洛切嚴大之声鳴眉兵切声出也㕭於交切媱声啉力耽切貪也喧許貟切大語也嚅汝俱切囁嚅多言也㕰火角切㕰嚗恚呼皃􅵤了延切噈􅵤也嚗必角切怒声唧子力切啾唧也咆蒲茅切咆哮呴呼俱呼具三切嘘吹噅許爲切口不正又醜哦五哥切吟哦也㗓丁􅀛切口蒲皃嚬蒲民切􅀏皃哃徒工切妄語咬古爻切鳥声俗亦作齩采老切無人皃盧切㘇于兄切啼㘇也呤力丁切小語啨伊青切小語唌似延切徒但切歎也唭丘吏切唭㘈無聞皃喍仕皆切啀喍也喂於韋切恐也嗺子雖切撮口也㕬古紅切衆口吭戸郎户浪二切鳥嚨嘻欣基切嘻嘻和樂声叿火紅切呵也吱指移切吱吱也㘋胡堅切難也吙許戈切呼氣􅧸火牙許下二切口􅧸􅧸㘆他亥切㘆言不正逹改切言不正噇直􅀟切喫皃􅥾胡垓切􅀏也唋他胡切吐也㗢胡冬徒弄二切多言善是闡切􅁻也一作譱虎佳切口戾皃㖹蒲門切吐也蒲毛切鳴也許今切吽也噥女冬切多言不中也火夫乎割二切息也唩烏和切小兒啼咃吐多切出佛書咁乎􅅴切乳也㕱胡求切犬吠唆蘇戈切㗻唆小兒相應㗻古禾切小兒應吥匹侯切吸吥也哸素回切口哸也呅莫杯切哸呅也古回切呼也咿於祗切喔咿強􅀏也噢乙六切噢咿内悲啡普梅切睡声咣古横切能言也􆉈力之切言不正唻力皆切歌声嗊呼孔切囉嗊歌曲嘶先奚切噎也馬鳴也嗆七相切鳥食喡于歸切失声胡公切声也丘引切脣瘡卟吉兮羌礼二切問卜咏爲命切歌吟或作詠􅺏胡孔切鳴声也􅀄瓦切惡口喠之勇切不能言呠匹本切噴也􅫗莫者民婢二切羊鳴噈子合子陸二切嗚噈㖦丁動切多言喕弥演切不言也嚕力覩切語也居輦切吃也哻香囯切殷冠名亦作吷許劣切小声与歠同㕦胡罵切人声也嗽桑奏切咳嗽也音㗗另別也叩苦候切叩擊啞於雅切不言烏格切􅀏皃呵許多切責也与訶同胡感切嘾也狙本切大口也救主切口不正吘五苟切和吘也嚙五挍切齧也正作齡哈所洽切以口歃飲也㗂色景切緘口也􆂼而尹切吮也乃等切多言唍胡扶切小􅀏皃呧多礼切呵呧正作詆㖢疾離切㖢嫌或作飺㖺大永切吹㖺也息寸切湓水也力凍切言也㖑許戒切喝㖑也噦火外切鳥鳴於月切逆氣呐奴骨切訥同遲鈍也㗕古侯切幼㗕也囀知戀切鳥鳴也唄薄賣切梵音也去尤切口也唳力屑切郎計切烏嗚􅚓古切和嗚或爲関唾他卧切口液也㘐普皃切唎也嚫初覲切施也匹問切怒也柯猛切語爲人忿疑哽柯猛切食不下喉也􅻌五弔切呌也噯烏蓋切噯氣也㖟熟臰切口受也嗄所訝切声破喏人者切如酌切敬言嗚於胡切嗚呼歎詞也㖆去鳯切問罪也胡貢切市人嚜丑利切詐言也藏賜切口小叮都苓切可嚀嘱付也嚀奴丁切可喘􅿸渠義切喫􅿸也啈許更切利害声力㤗切声也􆉅同上噌楚耕切噌吰市人吰胡觥切噌吰徒介切嘗吠也於列切怒也囑止属切付也㖨力篤切􅀏也嗡烏紅切嗡􆄵牛声也􆄵烏撗切牛声嗖所六切􅀏皃唷俞六切出声普必切唾吡吡必切鳴吡吡杏他豆切唾也不受語也咅同上秦悉切噈疾也補密切鳴也息必切吹口皃則屑切嗚也嚥於見切吞也亦作咽囈魚計切􅀏也亦睡語子六切口也力述切鳴也祖郭切声也知力切鳴也哩力忌切出陀羅尼多耒切荅今作對嗝古厄切雉鳴也魚􅂩切歐也丁盍切也阻治切豕食啃所戢切咠啃口声也于月切辝也本作粵嗋許刼切吸嗋哫子渌切訾哫也古或切口声也㘉側瑟切咇㘉也喇力􅁑切喝喇言急也呹余質切牛羊呞草皃㘍子悉切蟲鳴㗵許勿切氣也吃居一切語難於八切噎声㗫千結切小語又子細切唰所劣切鳥治毛衣也㗧知栗切咄也力葉切齧骨声囃七盍切助舞声唎力至切声也喢山渉切叱渉切多言㘌渠逆切嗢㘌􅀏不止㗩先立切忍寒声㗶匹活切妄􅀃也喫去擊切啖也同上􅖾子合切魚食又入口叭普八切匹活切口開唿呼骨切憂也哠胡告切多言也魚矩切欲􅀏也哵補戞切鳴也嗐胡戞切大開口又胡盖切嗒多臘他臘二切舐也於力切快也咭巨吉許􅁻二切􅀏皃俱立切喻也哉祖才切語助􅶭渠隕切吐也谷部五十七凡五字谷渠略切口上呵亦􅀏皃同上他念他感二切舌皃一曰竹上皮音他感切同上古文如隴切闒不肖也舌部五十八凡十三字舌時列切在口中所以立言者􅞌通荅切大食也吐盍切義同上舓神爾切以舌取物也舐同上􅜻同上䑜湯蠟切大食也􅤉渠䕃切牛舌病􅽗胡快切古文話􅨏他干切􅨏􅨵言不正􅨵他連切􅨏􅨵舑他甘切舚舑舚他兼切舚舑吐舌皃齒部五十九凡九十二字齒昌始切口齗骨古文古文齗魚斤切齒根肉齺七角初留二切無牙名􅀃文齒搚也一曰馬口中檿齳牛忿切無齒皃同上齞研繭切口張齒見宋玉賦齞脣歷齒齯五奚切尓雅黃髮齯齒壽也謂齒墮更生細者七結切治骨也齖五加切齒不平䶥莊如莊居二切齒不正又鋤牙切䶥齖丑之式之二切尓雅牛曰齡食巳乆復出嚼之同上齩五狡切齧骨此何切齒跌者又楚冝切齒參差也齵五傋牛俱二切齒不齊齱側游切齵齒皃齰仕革切齧也齚同上齨渠柳切老大齒如曰一曰馬八歳五五偃二切齒見皃魚轄切齒缺又音在骨切齚也齮魚綺切齧也齸於亦切尓雅麋鹿曰齸食之所在䶦叉革切齒相值一曰齧也􅬺牛銜魚欠二切齒差五街切齒不正同上齜仕佳切䶧五狡切齧也士一切齧也􅀃文齚齒齘何介切齽齘切齒怒丁立切齒齧齦口狠切齧也齲丘禹切齒蠧齡吕經切年齡也呼瞎胡瞎二切齧堅声在何切齒差跌皃力錢切齒見皃䶔直离切齒齗皃卓皆切噍齧声竹加切大齒也大結竹壹二切齧堅胡夾切曲齒亦作䶝補洛切噍声䶗客牙切大齧也䶞丘之切齧也齻丁千切牙也􅐅又渥切齒相近声亦作齪䶙九與巨與二切齗腫力盍切齧声䶖渠隂切舌病胡帀切食也齙歩交切露齒䶤胡八切齧骨声亦作䶛力曷切齒分骨声莫丁切齒也必茗切齒也巨依切齒危也七良切小齒䶘吕及吕合二切噍燥物声䶣五哀切䶣齒又音該齼初舉切齒傷錯齭同上又音所􅨭七眼切齒不正齴魚蹇切露齒皃齤渠圓切缺齒也一曰曲齒齕㾗没下結二切齧也齫空衮切齧也魚􅀝切齒也􆄓初産切小兒齒丁䧟切剔齒齟才與切齧也牀吕切齟齬齬牛莒切齒不相值也䶩殂詣切齒牛也五計切言齒也䶫魚欠切好皃初夬切剔齒齛私列切羊噍草亦作㖂齷於角切齷􅐅初八切齒利齧魚結切噬也䶢口治切齧也齶五各切齗也䶜古沃切胡谷切齒声牛引切􅀏也齒齊也齔叉謹初靳二切盧葛切齧物声音歷齒病胡葛切齧物声牙部第六十凡五字牙牛加切壯齒也詩云祈父維王之􅀲牙古文丘竒切虎牙丘禹切齒蠧㸧口限切齧也須部六十一凡五字須思􅁷切靣毛也􅛂如廉切頰須也頿子移切口上須左傳靈王生而有䇓或作髭􅓄方于步侯二切短須髮皃方皮切須髮半白声􅀋云􅛂皃彡部六十二凡二十四字彡先廉切毛飾畫文又所銜切彬鄙陳切文質備􅀃文古文份彰諸揚切明也􅀃文文彰也㐱之忍切稠髮亦作䰅形戸經切象形㣎莫禄切細文於六切文章皃詩􅁰稷茂盛皃彫東堯切琢文書峻宇彫墻修胥遊切治也飾也􅒷徐井切清飾也力旦切鮮明也筆院切古文變七卧切形也耏如時切頰須又獸多毛影於景切形影又影響弱如藥切尫劣也余鍾切重影也彩七宰切文章也章余切古文諸㣒七孕切七曾切毛張彯匹妙切彯畫撫招切丑玉切豖絆有皃㣉古紅切彩也彲丑知切獸名彣部六十三凡三字彣亡分切􅀃文也彦魚箭切美士四彦上同􅀃文彦文部六十四凡十字文亡分切文章也力詩切畫也斐孚尾切文章皃詩有斐君子辬􅀘顔切駁文亦作斑斒方間切斒文也斕力塞切斕斒同上斌鄙鄰切文質皃亦作份彬他旦切無采色莫爛切髟部六十五凡一百八字髟必凋所銜二切長髮也䯽芳干芳武薄侯三切髪好也或作匹育匹宥二切周礼追師掌王后之首服爲本或作髮府月切首上毛􅁂卑刃切頰髮也都果徒果二切小兒剪髮又直垂切鬈渠􅀽丘􅀽二切髪好也亡先切燒煙畫眉五割切小兒髮􆇼徒合切髮也子旦切髮光澤也又子曷切多毛鬝苦閑口瞎二切􅁂秃䰈千河昨何二切好也鬗亡千切髮長皃髻居濟切髮結也䯰同上又古拜切簮結也䰂且代切帶摻頭又音采䯸且利切首飾爲䯸䰐力甘切髮多髦莫髙切髦俊也奴禮切髮皃同上丁兼切鬑􅁂踈皃􆇨莫髙切髮至眉也髳同上鬋子淺切也鬑力兼切髮長皃䯾直由切髮多鬆先凶私宗二切乱髮皃䯳同上䰏作結切束髮髲皮􅀉切鬄也髢逹計切髮髲也鬄同上又先歷切孚紹切髮白皃亦作顠髺胡括古活二切絜髮鬠同上束髮也䰉薄桓切卧髻也鬕亡亞切帶結飾方五切髻也符小切又匹紹切乱髮髬普悲切被髮走皃䰎丘位切屈髮也鬣力葉切長須也䰕來都切鬣也䰃補蕩切䰃也鬖楚今切色减切乱髮子困切項上無髮䰁補牧切忽見也女卭切乱髮也鬊舒閠切髮也髧徒感切髮垂皃莫紅切馬垂也髴芳勿芳味二切髣髴髣芳往切髣髴也髼部公切髮乱皃鬃才宗切髙髻也鬐渠祗切鬣也鬞女龍切毛多又女紅切鬇士行切鬡髮乱字書或鬇字鬡女耕切鬇鬡也渠切髮乱䯹先廉切髮也鬒之忍切稠髮亦作㐱髵如時切多毛亦作􅚎他歷切鬀髮也髠口晁切鬀髮鬀他計切削髮也字由切接髮也䰍七二切漆也又音沐髽側􅀲切以麻約髻也口八切秃也鬉子公切毛乱也直追切䯻皃䰄先才切小髮息利切與肆同極陳孚勿切婦人首飾也鬟胡弯切結鬟䯷息隆切細髮也余封切髮長力之切髮皃髭子移切口上須本作􅎐五切秃也曲王切髮鬤如年切乱髮側下切多毛都果切髮垂必未切鬢多毛也䰆而由切馬之繁鬣都爾切髮美也胡覽切短千旦切髮光也古暗切靑也鬚息俞切亦作須髭鬚助庚切鬡乱髮髹許求切赤黑漆髤同上力六切乱髮仕切髮也髯汝占切頰須本作􅙎子紅切馬鬣又音揔符沸切髮少䯿昨没切䯻䯿也補各切髮也女轄切細毛髫徒聊切小兒髮髿所加切髮髿垂皃大廣益㑹玉篇卷第五
