front:
  text: 大廣益㑹玉篇卷第十凡十九部彳部一百十九一百十字彳丑亦切小歩也徑古定切小路也女九切復也習也休也正也或與狃同德都勒切福也升也惠也徎力整丈井二切徑也孚逢切使也徧甫見切周匝也徼古么切要也求也古弔切邊也復符六切扶救切重也返復古文復字􅛕柯􅋕切至也大奚切乆也先荅且立二切行皃與馺趿同忂居遇渠虞二切行皃彶居及切急行也很胡懇切很戻也徝竹志切施也㣫之勇切相迹也亦作踵又古動字徐似居切威儀也安行也彼補靡切對此稱彼也彴之約切徛渡也甫晚切還歸也忀先羊切忀徉也楚辝聊逍遥以忀徉循似遵切次序也因也微無非切細也不明也甫遥切行也直知切行也詞峻切師宣令也說文行示也徇似閏切順也亦同字徥丈爾切徥徥行皃徒淍切獨行也徭余招切徭役也徠力哀切就也還也今爲來又力代切勞也徦柯􅋕公雅二切至也來也􅜃與而切行平易也役營隻切使役也羊朱切行皃迷彼切猶遲遲也今作靡後胡苟切遲也對前之稱㣤疾淺切跡也履也羽任切急行也諸膺切行不正亍恥録切彳亍􅀃文步止也從反彳徯胡啓切待也亦作待徒改切擬也俟也士咸切不齊也徆息兮也行也㣙除又切與宙同􅀃文徒歷切行㣙㣙也徛丘竒居義二切舉足渡也得都勒切􅀗也對稱德紅切行皃相然切行兒往禹倣切行也古往昔時也古文徬蒲郎蒲盎二切附行也征之盈切行也又征伐七介切行皃巨往切扇也他對切古文退字同上徉余章切彷徉自得彷薄光切彷徨不忍去徨胡光切彷徨湯果切行也四丁切使也同上俗彽除飢切彽徊猶徘徊也徙思爾切移也避也古禮切行也于習切古歩字徖紅切安也職救切行也方示切使也與俾字同徒逹胡切歩行也黨也彵他可切安行也巨小切行皃松贖切行不往彿皮律切止也㣭子紅切數也詩越以㣭邁徊胡􅁅切徘徊猶彷徨徘歩回切徘徊尺主切行也􅏍䟽聿切行也􆃾于屈切行也徜食羊切徜徍猶徘徊也余箴切行皃亦作冘火䧟切匿也於劒切匿也七殺切小行皃巨畧切倦也先恭切小行恐皃五丸切儧失途也昨丸切失途皃彾力郢切雨後徑與力切行也山洽切行皃從在蹤才用二切隨也任也徂在胡切往也征也蘇合切行皃㣛他合切行皃㣬七入切㣬㣬行皃相焦切二行皃律力出切律吕也法也正也徸昌容切徸徸行皃於尤切游暇也巨夭切行皃古犯字侵也以周切行也御魚據切治也君也侍也徿良用切徿徸行不正行部一百二十二十一字行下庚切􅀃文人之歩趍也又胡岡切行伍也又乎孟切行迹也又乎浪切次第也語子路行行如也剛強之皃術食聿切法也說文邑中道街古膎切四通道也衢近虞切四逹道衟徒老切古文道􅓘齒龍切交道也向也突也動也衝同上衕徒東切下也亦通街又徒弄切衎口曰切衎衎樂也疾演切蹈也䡓古縣切車檐也􅸹胡絹切􅀃文行目賣也衒同上所律切循也導也今作率衛韋檅切護也又國名衑魯丁切道也户經切行皃衙魚加切衙叅也又牛居魚舉二切行皃赴匹遇切告也奔也或作訃趛牛欽切低頭行疾趨且俞切疾也趍直離切走也越也䞚渠支切䴢鹿走皃縁太不也行皃也趫去屩切善縁木工又舉足趙除小切趍趙又國名趮子到切疾也趯㕔歷切跳踊也越于厥切踰也又胡括切左傳大路越席﨣居栁切﨣﨣武力夫也超恥驕切超越超起也􅺻居越切跳起也同上䟅才濫才冉二切不乆也超忽而騰疾也趁除珍切履也丑刃切從也趂同上俗胡千切急走也􅴦渠俱切走顧皃䞤同上又丘甫切使也治也近也健也千尺千私二切倉卒也除連張連二切移也芳消切輕行也公節切走意也趞且藥切說文趬趞也一曰行皃趥目仲千牛二切行皃去忍巨人二切行皃丘忿切走意􅞚許建切走皃趬牽遥切丘照切說文行輕皃又舉足䞗千才楚皆二切僕也走也䟉之玉切小兒行皃於杜切走輕也䞥于救切走也䞨丘弭切半歩也舉一足也與跬字同起丘紀切立也興也發也䞿丘言虛言二切走皃雌􅁓切淺渡也弋偖切安行也趪胡光切西京賦虡趪趪謂作力皃趠丑孝切行皃丑角切跳也䟑弋約切趠䟑也􆄜乎來切留意也􅸱香仲切行也䞳蒲比孚豆二切僵也或作踣趚子亦切小行皃今作蹐趌起逸切趌􅨤怒走也􅨤起遏切􅨤趌呼泉切疾行䞣尺夜切怒也又丑格切半歩也趉渠詘九勿二切卒起走也丑丗切渡也超特也同上凡縛切大歩也趜九六切窮困也求閭切小走也趗且足也迫也速也或作促余律居聿二切狂走䟇居依切走也䞞扶勿切走皃去虔切蹇行也䟒巨貟切曲也趢力足切趢趗小兒皃䟂莫頑莫官二切行遲赶渠言切舉尾走䞵九劣切小跳方孟切走也同上䞾直知切䞾隲輕薄也趑七私切趑䞡行不進趄七余切趑趄才結切傍出前居語切行皃且雷切進兒䟏令的切動也或作䞷渠月切行疾越䞷也丑律切走也時曳切踰也丑足切小兒行􅦇式句切馬跳趡且水切動也走也又地名􅧱禹煩切􅧱田易居也力登切越也直連切移也七回切逼也趖先過切走皃䟆卑逸切止行也與蹕同􅠆都年切􅀃文走蝢也之陽切走也䞪慈様切行皃五和切蹉行也䞶他郎切前走也余腫切䘮躃踊也與踊同力的切趚行皃䟐同上直知切走也􆆴胡該切走也巨詭切奔也趧都奚切趧鞻氏四夷之樂䟀􅀄緇切七才切走也趭子妙切走皃䞡他早切行也䞻與恐切行也赾丘謹切行謹皃趒他弔徒聊二切雀行也落迢切脚長行皃子礼切走也孚句切到也祀傳切走也趝他念切疾行也補胡切䞮匍匐也䞮他胡切䞮伏地也趆都替切走皃䞧胡遘切蹇行也他闘切走也􅸚弋􅀏切走皃䞦胡百切狂走又䞦䞽僵仆䞽山格切䞦䞽􅚼許聿切走也踰也所六切走也䞝魚玉切跛也户八切走也䞴竹交竹教二切䞴趟踉䟫也趟竹庚竹孟二切䞴趟韋筆切走也䞢則各切走皃䟁許交切起也莫百切走行皃䟎藏但子旦一切散走也䟃七含切䟃􅑗驅步也徒含切䟃􅑗䞙子合切走皃趇私立切走皃䞘其乞切行皃䞯孚務切及期也亦作赴赹巨營切赹然獨行皃趐許劣切進也飛也所留切欲跳皃􅽔相活切走皃䟄子昔切立歩也揆扄九聿呼衒三切走意赺古監牛錦二切走也趩丑力切走皃赽居劣切走也胡谷切走言也􅿉山狎切行皃遣去善切送也又去戰切逆魚㦸切迎也不順也遭祖勞切遇也遘古侯切遇也遂詞􅀋切叶也稱也古文􅼛竹句切不行也又丑凶切迎冝京切逢迎又奉迎逛具往切走皃适古活切疾也逺于阮切遐也于􅂆切離也古文遹以丗切循也述也避也逢扶恭切遇也迎也迫補格切逼也急也逼碑􅁄切迫也迒胡郎切迹也長道也䢚同上䢑丁計切驚不進也向不及也迻餘之切遷也今作移逃徒勞切逃亡也逐除六切追也遁徒頓徒昆二切退還也隱也遯同上达他計切迭也亦與逹同遷且錢切徙也易也迀古寒切進也􅫝胡厥切走散也遊余周切遨遊與游同古文逯力谷力属二切行也衆也運于愠切轉也動也遼力條切逺也迥胡頂切逺也邈亡卓切邈曠逺也􅥞同上連力前切合也牽也及也返甫晚切還也復也邍魚􅀽切亦作原迄呼乙切至也以周切疾行也又音遥邎同上知栗切近也重也至也邌力奚切遲也小皃遐乎家切逺也迨徒改切及也􅵫斯子切移也今作徙同同上近其謹切不逺其靳切附也遰徒計切迢遰也往也遃魚偃切行皃遫丑力切張也遞徒禮切逺也又徒戾切递同上遺余佳切亡也余志切貽也遲除梨切晚也舒行皃遟籕文迡同上又奴計切近也邇而􅁓切近也同上迣之丗切超踰也古文例字􅲖丘戟切􅲖曲行也丘致切避也胡苟切古文後逖託歷切逺也逷古文迁且堅切徙也又行進也逗徒闘切留也住也遛力周切逗遛不行􅙝丘紀切古文起迕呉故切遇也遌同上䢡口􅀧竹季切前頓也逶於危切逶迆行皃􅉨禹兩切古文往他逹切古文撻退他潰切郤也去也古文逍思遥切逍遥淸暇也遾時丗切逮也逺也邀於堯切遮也招也遪于合切裹遪也迶于救切行也殊句切走也透他􅃸切通也式六切驚也迴胡雷切轉也迴避也􅁁補眠切畔也塞也遢吐盍切穩行皃逽女畧切走逽也迠叱渉切行也邂胡澥切邂逅不期而㑹逅胡遘切邂逅也迢徒遼切迢遰逺也時職切行也而渉切行皃丑六切行皃逨力才切至也又力代切逡且旬切逡廵退也迼居列切跳也疾接切疾走䢌博未切急走以斫切逴也無弗切逺也又呼骨切邅張連除連二切轉也逕吉定切路逕也近也陟栗切近也迌他没切詆䛢皃逫吉穴切逺也䢖余述切分布也又行皃迿思俊切出表詞也􆁣足合切􆁣行皃士洽切行書皃布千切行不絶孚武切逃走遑胡光切急也乂暇也䢝烏詐切次也或作亞週職由切廻也尸制切遊步也䢋居忌切行也􅀄側切古文測居祐切恭謹行皃補耕補幸二切出也􅊇與章切進退皃逵竒歸切九逵道也廴部一百二十八凡六字廴余忍切長行也今作引廷徒㕔徒聽二切朝廷也諸盈切行也㢟丑延切㢟㢟安歩也延余旃切進也長也建居偃切竪立也癶部一百二十九凡四字癶􅀘􅁑切􅀃文作足有所刺也癹匹􅁑扶􅁑二切以足蹋夷草也登都稜切升也進也古文登歩部一百三十凡二字歩蒲故切步行也六尺爲歩歲思惠切載名􅀃文木星越歷二十八􅀫宣徧隂陽十二月一次止部一百三十一凡三十字止之市切息也住也容止也他逹切說文蹈也直庚切也歫渠吕切違也戾也至也􅀃文止也搶也一曰超歫充祝切至也疌詞接切疾也􅨞良與切古文旅巨謹切古文近歱之隴切􅀃文足跟也今作踵歭直里切止不行前也古恩切足歱也㱖疾醉切待也山立切不滑歧趐移切歧路也歬在先切先也今作前歷郎的切過也歷練也七旬切舞也㱗香幽切息也徒沃切不止皃符逼切止也補赤切人不能行也女切機下足履者子淺切古文剪之膳切古文戰胡古切古文户陂義切被也歸居揮切還也􅀃文女嫁也㱕籀文㱒呼多切古文詞武放切谷名在京西處部一百三十二凡三字處充與切居也充據切處分胡計切子孫相係􅀃文与系同古胡切息也立部一百三十三四十九字立力急切住不行也建立也䇐力季力至二切臨也從也䟽也竲子登仕耕二切巢也􅀃文北地髙楼無屋者靖疾郢切謀也竫同上亭安也竦息隴切敬也嬴力卧切痿也䇑普支切行不止也􅀃文傍下切短人立皃竱旨兖切等齊也竵呼鼃切不正也􅔲魚竒切古儀字竴七旬切喜皃竑胡萌切廣也量度又古弘切䇏下罪切磊䇏重聚也居委切載也掎也於卧切嬴也䇓相􅁷切待也䇕並同上端都丸切緒也正也竘丘垢丘甫二切健也古薤切極也䇍又六切等也徒凍切鍾声竜力鍾切起也竢事紀切待也亦作俟同䇃同上㚡居綺切立正也竬丘主切立也他􅀧切恭也竌昌御切正也竭巨列切竭力盡力也竣且旬切止也退伏也竎方又切登也􆈙匹馬切短皃七雀切恐懼魚逺切􅀝也䇎且畧切踈也驚也竛力丁切竛竮行不正竮扶丁切竛竮胡改胡代二切起也䇅房越切竚也房六切邪也摩筆扶福二切見􅀑皃力渉切䇔行不正胡啓切待也亦作徯直􅁃直句二切俟也匹没切按物声亦作竚除吕切企也乆也今作佇竝部一百三十四凡四字竝毗茗切竝坐也又縣名並同上暜他計切廢也今作替暜同上亦作㬱此部一百三十五凡四字此七爾切止也啙子亦子爾二切史記啙偷生謂苟且也子累切口也鳥喙也說文也一曰藏也些息計切此也辝也又息箇切正部一百三十六凡六字正之盛切不邪也是也又音征㱏古文古文五扶法切無資也今作之整之郢切整頓整齊也助革切􅀷也隱也亦作是部一百三十七凡四字是時􅁓切是非也􅀃文直也古文韙于匪切是也尟思踐切􅀃文是少也俱存也
