body:
  text: 新加偏旁正俗不同例丠丘同几人同􅔣􅈡皆首同􅚀􅋄皆􅀹同辵辶同肉月同鬥􅃲同􅀋隔更音和切嘆敕旦切今他旦切啄丁角切今中角切膘扶小孚小二切今頻小疋小二切大廣益㑹玉篇卷第十
