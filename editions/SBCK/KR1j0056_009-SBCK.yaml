body:
  text: 大廣益㑹玉篇卷第九凡二十九部言部第九十四百八十二字言魚鞬切言辝也問也我也古文古文談徒甘切論言也戯調也謁於歇切告也白也語魚巨切言說也譬匹臂切喻也請且井疾盈二切問也求也乞也又疾性切謂烏沸切云也道也報也讖楚䕃切讖言也驗也譻於耕切声也謦枯鼎切声也詯胡内切瞻􅂔蒲声在人之上也又胡市也諒力尚切信也相也助也諷方鳯切誦也譬喻也詩舒之切詩書也誦徐用切暗誦也訌胡東切敗也潰也諍訟相䧟人之言詵所陳切衆多也又致言也訰之閏之純二切乱也讀徒鹿切誦也誨呼繢切教示也䛄於万於阮二切慰也从也亦作婉許虚語切進也從也聽也詻魚格切教令嚴也謜魚園切徐語也誎且録切從也呼歷切私訟也恨也内悔也亦作䦧諾那各切荅也說文應言也諮子詞切問也謀也謨莫胡切議謀也謩同上譩於熈切不平之声也恨辝也作噫同詇於竟於仗二切早知也訪孚望切問也謀也詢息遵切咨問也同上譜布魯切屬也牒也布列見其事也譔仕卷切又此專切專教也謹居隱切敬也也誥古到切誥告也詧楚黠切与察同詪古恨古很二切難語皃又乎典切訂他丁唐頂二切平議也詁姑五切訓故言也謄逹曽切傳寫也䛢他鹿切詆䛢狡猾詆他狄切詆䛢狡猾也又音底訶也論力昆力困二切言議也諗尸枕切念也告也詥胡答切諧詥也証之盛切諫也謏蘇口切小也又思了切亦作議魚􅀉切論也法有八議諫柯鴈切正也諍也䚻与周切從也謐莫橘切静也誯􅀄障切導也發􅁔句亦作唱謷五勞五交二切不肖人一曰哭不止悲声謷謷譞呼縁切慧也謡与招切徒􅁔也讃子旦切解也哀也發揚美德也說始恱切言也釋也又音稅談說也又余輟切懌也訒而振切言難也訥奴骨切言難也誧滂古切大言也又匹布切謀也諏子須切問正事也聚謀也警居影切戒也敕也􅨜火呉切喚也諄之閠之淳二切佐也可􅁖也告曉之熟也同上詳似良切審也又音羊詐也謙苦嫌切遜讓也卦名諦都計切審也䛕與朱切諂也訓許運切教也誡也古文識時力切知也始志切記也計居詣切㑹也筭謀也讇丑冉切佞也諂同上誾魚巾切誾誾中正皃又和敬皃訔同上䚮如陵切厚也就也重也諓疾箭疾剪二切巧言訹思聿切訹誘也謺之陟切拾也訊思進切問也辝也古文訦時林市荏二切亦與諶同諶恃林切信也誠也仕亞切蹔語也謰力前切繁拏也話胡卦切善言也調也䛡同上誠是征切審也信也敬也信思刃切明也敬也䚱古文又作扣謱洛由切謰謱也謝詞夜切辝也去也􅒜說文誡居拜切警也命也告也􅢽且送切􅢽詷言急也詷徒貢也􅢽詷也譏居依切嫌也誃舒􅁓直移二切離也脫也謻同上譣虚儉息廉二切問也詖也諰思理切思之意也誑俱放切誑惑也古罵切欺也誖補潰歩没二切乱也逆也同上誓時丗切命也謹也約束也䜋胡退切中止也譯也􅉲莊賃切譛愬也訕所晏切毀語也訿子尓切不善也毀也訾同上譪於害切止也臣盡力也託他各切􅀉也依慿也誣武虞切欺罔也誹甫尾切誹謗也䛬道刀切小兒未能正語也䛌同上譮許戒切怒声也籀文作諙記居意切録也識也詛側助切盟詛也䛆丈又切祝也訇呼宏切駭言声也籕文諈竹恚切託也又諈諉累也諉女恚切諈諉誤牛故切誤謬也詿古賣切詿誤也䜕火界切怒皃又音邁同上誼冝􅀉切理也人所冝也訖居迄切畢也止也詍余丗切多言也䛖同上譌五戈切爲也妖言曰譌訛同上詡虚甫切普也偏也人語也謳於侯切齊歌也吟也讗胡麥切疾言皃􅧢空後切扣也子邪切咨也樂􅀋辝也同上設尸􅀬切置也陳也合也諍側迸切諫也止也譄子恒切加也諅渠記切忌也讋章葉切言不止也同上訝魚稼切相迎也與迓同詠爲命切長言亦作咏呼㑹切声也諠虚􅀽切諠譁也訟似縱切辝爭訟也古文子斜切也側雅切訶皃諺魚建切俗傳言也譁呼􅀲切諠也同上訴蘇故切訟也告訴冤枉亦作愬􅬫同上謘直梨直利二切語諄謘詣魚計切往也到也諣呼卦切疾言也徒回切譟也讕落于力但二切誣言相加被也同上詒與支切遺也相欺詒也講古項切習也論也訆公弔切妄言也符眞切多言也診除刃之忍二切視驗也􅐷俗謗補浪切誹也人道其􅁖也讎視周切匹也用也譎公穴切詐也之耳切計也讄力水切累功德以祈福也同上諐祛言切過失也籕文愆字下啓切待也讘之渉切多言也䜆同上謑胡啓切謑詬恥辱也同上詶時遊切荅也職又切詛也譥古弔切大呼痛呼也勿放切相責也訧有求切過也訞於嬌切灾也又巧言皃說文謧力支力泥二切慢言也謍余瓊切小声往來皃詘丘物切枉曲也誳同上譿胡桂切材智也察也譓同上詜他刀切䛬詜言語不節也譊女交切爭也恚呼也諲之神切敬也謖山六切起皃諳烏含切記也知也或作喑同上訮呼田切訶也五閑切訟也譟桑到切羣呼煩擾也諻呼撗切音也詅力丁切衒也譅色立切言甚多也同上諞歩連符善二切巧言也謲千紺切相怒使也譝視陵切譽也誕徒旱徒旦二切大也天子生曰降誕籀文䜚逹合切䜚誻語相及誻徒合切䜚誻妄語也讜丁勆切直言也譡丁浪切言中也誘余手切引也相􅂆動也亦作䛻同上丑脂丑利二切不知也誺同上又切代切誤也讑羊照切誤言也䛟古恊切妄語也譀户濫切誕也火鑑切叫怒同上誽女佳切詁誽言不正也諼許圜切忘也詐也䜜以醉切恨言也許亮切不乆也諸至如切非一也皆言也又助語詄徒結切天門開詄蕩也謾莫般馬諫二切欺也詝知與切智也必奚切誤也詖彼􅀉切佞謟也辯論也慧也讙虚元呼丸二切讙嚻声譺魚記五界二切欺也䛿公核切智慧也䛎呼决切怒訶也課枯過切議也試也又苦訛切誂徒了切弄也說文相呼誘譸竹尤切譸張誑也訄去牛渠牛二切迫也誔逹鼎切詭言也諧胡皆切和也合也調也偶也或作訬楚交切擾也疾也健也誒虛冝切可􅁖之辝也譆許其切悲恨声也䜃丁回切謫也譽余怒切􅁛也声美也又音余諆居疑切謀也又去其切謔虚虐切喜樂也戲言謈蒲剥切大呼自冤也􅮮力足切謔也詑湯何逹可二切詑謾而不疑訏况俱切大也張口鳴也虚光呼晃二切夢言謬靡㓜切誤也乱也譫之閻切多言也謵叱渉丑渉二切謵讋言不正也訐居竭切攻人之隂私也誋渠記切禁也戒也䜐虚規切言相毀也諵女函切語声也􅒋力官力全二切乱也理也不絶也諯尺絹至縁二切相讓也謓昌仁切怒也今作嗔譴詰戰切責也謫問也昌脂切訶怒也詀陟咸切多言又知䧟尺占二切詎其吕渠遽二切止也至也諊居六切窮也治罪也􅨣大計切􅰾􅨣審諦􅰾於計切􅰾􅨣䛘女林切多言讒仕銜切佞也讞魚列牛箭二切議罪也䛠丁逅切䛠詀誽作㛒同譳奴言切䛠譳也誴殂冬切謀也宅江切質也􅧘普布切諫也詨許教切大叫噑又呼交切謉居位切慙恥與愧同附夫切詞也諃五林切善言也息移切諒也􅠗如詹切多言訃芳付切告䘮也又至也讆爲歳切夢言不譓也䛏奴奚切呼人声䛣匹丁切言也方凡切言急也訸胡戈切平也卑宻切止行也本作䟆蹕諤五各切正直之言也宜巾切頑也五駭切謹也陟由切多言也謅􅀄卯切弄人言譈徒對切怨也惡也亦作憝譵直類切怨也或作懟譯余石切傳言也疾歷切静也䚵他口切䚵誘也䛞何蒲切多言䜈楚交切代人說文與勦同謮側革切怒也譲也誢乎典切諍語也詃古犬切誘也誷无紡切誣也䛰戸衮切謀也謞火角火各二切䜛慝也􅦔居宥切禁也助也丑利切􅀏也之􅀔切語不正諢五困切弄言也子就切吏也火内切休市也與詯同䚴魚刮切怒也訶也䜗火禁切祝也子禁切怒言也䚿同上啼不止也魚向切止也渠竟切強争也古文競䚹匹示切具也今作它胡切言皃火个切譀也莫駕切多言也詐之訝切詐僞也古蛙五華二切􅈸也不正奴力切喜也也司夜切話也諎七个切䜆也䛍府味也多言也䛾先護切諧䛾也詴烏回切呼人也又户罪切以端切􅀏皃入善言䚸胡介切善也誎七賜切数諫也七賜切謀也誌之吏切記也詉女加切譇詉言不可解也讉以加切譯惡言也謎米閉切隱言也諕火訝切誑也同上􅀄稼切異言也認而振而證二切識認也䚳之豉切不知也快也讌烏見切讌設也胡到切相欺也誆巨妄切狂言也誜所化切俊言也誏郎宕切閑言也與勆同訠式忍切况也或作矧詺名聘切詺讜也誟許交切声也詋職救切詋詚也􅲳力制切言美也諹與章切譽也又余亮切訜筆云切入不知也護胡故切救護也􅏺扶泛切多言訣古穴切死别也兵列切分契也誐五􅁔切吟也又牛可切訑弋支切訑訑自得也諿七入切和也􅙅許及切疾言許縛切妄言居力切訥言諭揚樹切譬也他口切誘也譒補過切敷也謡也䛛戸對切胡市也蘇奚切声振也䛩烏古切相毀皃䚷於礼切譍声諟水􅁓切審也諦也訅渠留切安也謀也􅲲蘇戈切佞也動也試始志切用也謼荒烏切人叫也䛮巨九切毀也俄寒切山形出皃誗直嚴切言利美也諝相吕切才智之稱詮七全切具也評也訢許殷切樂也喜也訨諸是切訏也謋虎伯切恐也亦作諕䜅以隹子惟二切就也譭許委切謗也怒言也時志切者行之跡謚同上又伊昔切􅀏皃諡􅀃文胡故切誌也認也譇知加切譇拏羞窮也調徒聊切和合大弔切選也誩部九十一凡七字誩䖍仰切競言也譶徒荅切疾言也讟徒木切謗讟也痛怨也左傳民无怨讟渠􅂟切強語也逐也競同上又爭也敵也譱是闡切大也吉也􅵗同上今作善曰部九十二凡十二字曰禹月切言詞也語端也楚革切告也同上籕文㬱且感切曽也又音潜沓徒荅切重疊也多言曷何葛切何也盍也􅔟昨勞切輩羣也曹同上今文暹思廉切進也長也喿部一百五凡三字喿先到切鳥羣鳴又七俏切臿属今作鐰才心切掘地也又臿属今作鈂部巧切鈍刀也龠部一百六凡八字龠余酌切樂管五孔以和衆声今作籥充垂充瑞二切樂人以吹管中氣今作吹龣古斈切東方音今作角充尚切導也今作唱䶵直離切或作篪龢胡戈切今作和胡皆切今作諧思條切今作簫􅁽部一百七凡五字􅁽楚責切立也簡也􅀃文符命也諸侯進受於王也古文嗣似利切續也習也力丁切空也扁補淺切署門戸之文也又音篇音辮㗊部一百八凡一十一字㗊壯立切衆口也噩魚各切驚也囂許朝切喧也又五髙切思唐切亡也古文喪荒貫切呼也与喚同嚚彦陳切愚也古文古弔切大呼也髙声也荒旦切呼也或作喚器祛記切器皿也噐同上俗只部一百九凡二字只之移之􅈛二切語巳辝也从口象气下引之形􅠒乎丁切声也部一百十凡六字奴没切又女滑如劣二切下声也言不出口也矞余出切出也况出切飛皃商舒羊切五音又囯名籕文古文古文欠部一百十一一百四十八字欠江劒切張口氣悟也欽去金切欽敬也欨泥娯吁禹二切吹欨又􅀏意也次且吏切叙也近也第也歛呼濫呼甘二切欲也歖欣疑切樂也欮居月切掘也丁錬切呻也同上弞式忍切􅀏不壞顔又音引㰳於雅切欭㰳馿鳴也丘凡切多智也􅩃子合才六二切嗚也亦作噈又爼敢切菖蒲􅉁也歈大侯切歌也又羊朱切㰥呼丗切欨㰥􅀏意也許角切嘔吐也㱊於牛切逆氣也㰭虚娯切喜樂也㰢口莖切咳也㰯他走他豆二切㰯唾也㰰呼洽切㰰㰨氣逆也㰨呼飢切㰰㰨客加切出氣也㰿呼􅀆切歎息也􅸅尺脂切笑也㰪於佳切㰪声又居􅂝切㰤丘睱切大張口􅀏也戸甘切沆湘人言也助咸切􅀏也胡沼切丗氣也㰧許來切飲也歅一辛切人名方歅相馬者呼昆切不可知也烏口切吐也於逞切怒氣也㱃一錦切古飲字㰴普口切苦言也歄古蛙切歄猶歄􅶩也五瓜切歄居委切疲極也㰝余耳切欬也欳口怪切大息也㱁思萃切問也五困切又竒逆切氣逆也舒臣切吟也亦作呻詡政切含􅀏皃去劒切古欠字㰡呼介切声也㰼苦叶切欲也歠昌恱甞恱二切大欱也㰫恥南切欣也惏也秦力切汁錯也余六切驚詞㰵子律切吮也欰私律切鳴也丑歷切痛也又知力切欹於宜切欹歎詞也於伯胡陌二切吐声毗必切吹也古勿切飲声缼輕歷切吹声許勿虚記二切急怒声㰬息均切信也逆氣也許狄切出鼻涕子六切欻悲皃於六切愁皃赥許迪切􅀏皃歏去靳切又丘云切氣盛去斤切口孕切嚏也年支切匹婢切声也秦力切錯喉与同火盍切啜也㱌於業切取也歂視專視兖二切口氣引也欴來當切欴㰠貪皃㰠火郎切欣㰠歕普門普悶二切歕氣也食部一百十二凡二百二十字食是力切飯食飲食也􅀃文食􅧮思流切饙也􆁟同上養余掌切育也守也樂也畜也長也又弋尚切供養也飴翼之切􅄳也同上籀文䬮古文饙甫云切半蒸飯也餴並同上飪如甚切大熟食餁同上饘之延切饘粥糜也􅊡同上飯扶晚切餐飯符萬切食也􅽁飰並同上俗饔於㳟切熟食也女又切雜飯也饎充志切酒食也黍稷也同上於革切飽声也􅰝並同上􅴱式掌切晝食也同上子旦切以羹澆飯䬤古文飽補挍切食充飽蒲也並古文餫于問切野饋也䬼於縣切猒也餬户吾切􅀉食也或作糊䊀同上餔補胡切甲時食亦作脯餱胡溝切乾食曰餱糧飻他結切貪食也餮同上饕敕髙切貪食貪財也籀文䭑力冉切嘰也一曰廉累餳徒當切飴和饊也饊先但切饊飯也餅卑井切麫餈也饐於利切臭味変也䬥古文饟式尚式章二切饋食也饛莫東切盛器蒲皃饁爲輙切餉田食餉式亮切饋也䬽始銳切小餟也又力外切䭨同上饗許掌切設盛礼以飯賔也䭓五恨五寸二切饐也飢几夷切餓也古文飢䬷尸野切䬼飫䬷飽也同上飵在各族故二切食麥也餞自剪切送行設宴也餀呼帶切食臭也䭒胥弋切氣息也餐七安切吞也食也湌同上䬯女兼切相謁而食麥也館古換切舎也逆旅名饉竒振切􅂼不熟䬴莫逹切馬食穀䭔丁回切蜀呼蒸餅曰䭔同上䭡於寸於恨二切食欲飽也餤弋廉徒甘二切進也饑紀衣切穀不熟餓五賀切飢也饌士卷切飯饌飯食也籑同上飶蒲結蒲必二切食香也餌如至切食也餅也飤夕恣切食也飼同上飾舒弋切修飾粧飾也餝俗餥甫􅀑切餱也又甫違切餾力救切氣蒸也䭐余障切餌也􅦑於勿於月二切䭉也飴和豆也亦作同上餘与居切殘也剰也多也䬵古來切飴曰䬵􅦑餗思榖切鼎實也力丁切餌也饒如燒切多也飽也豐也厚也餘也餲於利於介二切飯臭也䭞余石切􅀕之明日也餣於劫切餈也餭戸光切乾飴也餟張芮切􅀕酹也餽也亦作醊䭕子敢切无味也又慙濫切飩徒昆切餛飩食也餛戸昆切餛飩餦猪良切餌也力甑力烝二切馬食穀多氣流四下也䭉思累弋累二切豆屑雜糖餹徒當切餹䬾餌也䬾徒􅀆切餹䬾普力切飽也餧奴罪切飢也一曰魚敗又於僞切飼也䭢奴耕切又内充實女江切䭢強食也餄公洽切餌也餼虚氣切饋餉也䭈記言切粥也飦同上子荏切餂也或作䭤去善切噍也乾麫餅䬧五丸切餌也䬫徒奚切䬫餬也蒲突切饇也䬬於仰切也䭇於結切食不下或作噎力拾切糝也古文粒䭘乙錦切飽蒲也䭊同上飬金媛切祭也餂逹兼切古文䀨餽居位求位二切遺食也視利切貪欲与嗜同䭖之庶切呼豕食餪奴管切餽女也胡郭切无味也飷子也切无味也饍時􅀾切食也与膳同飲於錦切咽水亦歠也古文飲亦作㱃思敢切羹也苦到切勞也䬿亡􅀑切微也飳竹句之句二切祀也饀杜刀切他刀切食也居六切饘也餩於北切噎也餕子殉切熟食也䭂􅀝及切䭂濕也魚據切以酒食送人䭁之例切臭敗味也視􅃩切亦贍也飺疾移切嫌食皃飫於據切食過多􅷩同上飧蘇昆切水和飯也莫彼切哺小兒也於元切貪也􅪪莫波切􅪪食也餈疾資切餈糕也同上烏告切妬食也餻古刀切餻糜餻餅也餚胡交切饌也止盈切煑食也䭅戸烏切餅也餇徒紅切食也饋渠位切餉也饞士咸切食不嫌也蜀容切饞也都滕切飽也色求切飯壞也餿同上尺志切酒食多也都獵切食皃奴盍切䬲古侯切牛飽也􅡤杜刀切餌也饇於遇切飽也饆卑吉切饆饠修食也饠洛河切饆饠素回切飯也直知切飴也餜古火切餅子也􅳗口敢切飢也餺浦各切餺飥米食也飥他各切餺飥古迴切飽也餒奴罪切飢餓也丑善切長味也郞外切門祭名飣丁定切貯食也餖徒􅃸切飣餖也􅝚於外切飽也饚火蓋切食臭也鋤吏切嗜食也䭄同上饜於艶切飽也䬨九右切飽也􆇾居戀切饌也奴倒切熟食也古卧切食也􅿲人又切餾也䬣去毅切食怒也許氣切食怒也䬶五良切餒也而至切祭也力谷切食也􅝚徒屋切粥也直六切食皃胡瞎切飽也䭦蒲莫切餅也餑蒲没切麫餅也飭恥力切謹皃昨結切食也䭆女厄切炙餅餌也􅝽昨糟切食䧟也而勇切食也䭃如枕切飽也古洽切餅也􅥪同上䬳方蒲切屑米餅也饏徒敢切无味也甘部一百十三凡十二字甘古藍切甘心快意也楽也􅀃文美也說文甘甛徒兼切甘美也猒於􅃩於塩二切足也飽也又方冉於甲於渉三切同上甚市荏切孔也劇也古文徒戴切甘也古三紅談二切和也甞市揚切試也又􅀕名㽑徒紺徒含二切長味也或作醰㽐呼兼切香也或作馦旨部一百十四凡四字旨支耳切美味也意也古文古文嘗市羊切口味之也与甞同㳄部一百十五凡五字㳄徐仙切說文慕欲口液也亦作涎􅧔􆇊籕文弋之切歠也盜徒到切逃也私利物也羨徐箭切饒也貪欲也部一百十六凡八字女涉切盗不止也所以驚人也一曰大声也今作幸􅀘到切酧荅也余石切同人也捕罪也生也楽也好也張流切引擊也文盩厔縣名之入切持也守也結也魚距切養馬者又垂也退也禁也使也居六切窮治罪人也同上夲部一百十七凡九字夲丑髙切往來見貌也􅀃文進趣也同上歩到切耗也猝也今作暴呼物呼貴二切疾也皋古刀切澤也皐同上􅣡余凖切進也或作允奏子漏切進奏也書也􅀃文奏夰部一百十八凡六字夰公道切放也昦乎老切昦天元氣廣大也昊同上俗居遇切㪯自驚然也奡午到切慢也亦作傲臩俱永切驚走也又往來皃大廣益㑹玉篇卷第九終
