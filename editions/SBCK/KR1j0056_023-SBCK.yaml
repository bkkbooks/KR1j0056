body:
  text: 大廣益㑹玉篇卷第二十三凡二十九部馬部三百五十七二百七十九字馬莫切切武獸也怒也籀文古文􅦩布戞切馬八歳騭之逸切壯馬也定也升也乎間切馬一目白也騏巨基切馬文駹莫江切馬黒白靣馵之喻切馬縣足駒几于切馬二歳䭴乎関切又爲萌切馬一歳驪力攴切盗驪千里馬驠於見切馬白州亡云切馬不純騜胡先切馬黃白騂思营切馬赤黄駣徒髙丈小二切馬四歲駵力田切赤馬黒鬛驥居致切千里馬􅚮同上駝大何切駱駝駞同上俗騩京媚切馬淺黒色又山名騅之誰切馬蒼白雜色騵魚􅀽切駵馬白腹騇尺夜切騲馬駽胡見切青驪馬今之鉄騘又火許衒二切騢胡加切赭白色似鰕魚騘千公切靑白􅄂毛色騴於諫切尾本白驎力振切馬黒脣驃毗召四妙二切驍勇也漢有驃將軍駰一人於巾二切泥馬也䮗五旦切馬白額至脣驩火丸切馬名七爾切馬名騽似立切驪馬黄脊又馬豪骭驖徒結他結二切馬赤黒色驔徒􅀧切驪馬黄脊䮤五角切馬白額􅻡力􅀆切駣􅻡馬驁午刀切駿馬以壬申日死乗馬忌此日馰丁狄切馰顙白額或作的騛不韋切騛兎古駿馬驀明白切上馬也乎皆切馬和也騯百庚歩庚二切騯騯馬行皃今作彭乎旦切馬尾長又音寒驓才陵切馬四駮皆白騚才田切四蹄白居遏切馬疾走䭹五唐切馬怒皃又五浪五朗切馬揺頭也駿子狥切馬之美稱也速也騝竒連切駵馬黃脊它刀切馬行皃騤巨追切馬強行騑孚微切驂馬也騑騑行不正也疾也騋力才切馬髙七尺以上騋騄力足切騄駬八駿馬駬如始切騄駬馺先合切馬行皃駸七林子心二切行疾皃駸駸驟皃驍古幺切勇急捷也良馬也驌思六切驌騻古良馬騻所良切驌騻驟仕救切奔也馮皮氷切乗也相視也也登也又扶風切姓驕几妖切壯皃又野馬也逸也䮌許牛切馬名也駿也篤丁毒切馬行頓遲它外切馬行皃颿扶泛扶嚴二切馬歩疾也風吹舡進也亦作駂布老切驪白􅄂毛今之烏騘褭奴了切騕褭亦作䮍呼光切馬奔也騺竹列切馬狼也駐丈具竹具二切馬立止也或作住􅰹駩七全才縁二切白馬黒脣驊下􅀲切驊騮駿馬巨六切馬曲脊同上駗章忍知鄰二切駗驙馬載重難行馻唯臠切又余凖切馬毛逆駫古熒切馬肥壯盛皃駉同上又収馬苑騬市陵切馬也騶側留切騶虞義獸之属又飬馬人名駥而弓切馬八尺也雄也駊布可切駊騀馬摇頭騀五可切駊騀􅧊古拜切結馬尾駱力各切白馬黒鬣同上驗牛窆切馬名又徵也證也女頰切馬行也疾也驡音龍野馬也䮝胡昆切獸名驈余橘切馬白跨䮇同上駁布角切馬色不純今作駮騖亡句切奔也疾也馹而逸切傳也同上騧假華切黄馬黒喙同上驤思良切駕也超也低卭也馴似均切從也善也駭胡騃切驚起也駎除救切競馳也駓普悲歩悲二切黄白色又堅走皃􅛖同上駕格訝切乗也行也上也陵也驙知連切白馬黒脊駛山吏切疾也土東切驢子䮔子垂之累二切馬小皃籕文弋魚弋庻二切馬行徐疾􅕁竹扇切馬轉卧土中驜魚刼切壯皃胡圭切騏􅂹騕於皎切騕􅙂良馬同上騃午駭切馬行也又无知也馽知立切絆也今作縶􅳟力竹切健馬䮹於吠切馬怒駜皮筆切馬肥壯皃䮡同上䮋力丗切次第馳也奔走也騷先刀切動也愁也駧大貢切馬疾走䮭音覓馬多惡也驘力戈切驢馬母所生䯁同上䭿大結弋􅁻二切馬疾走也駑乃乎切駘最下馬也駻何旦切馬突也馯同上驝也閣切驝駝有肉同上驚居英切懼也馬駭也逸也驛余石切譯也道也􅗬丁年切馬白額布昆切今作奔騔音􅁑馬行皃同上騫丘焉切馬腹縶也􅃜也或作騝􅖃歩忽切馬牛尾一角仄亮切古壯字騲千老切壯馬徒谷切馬行皃䮷同上駘大來切駑也又大宰切駴胡楷切雷擊破也德紅切馬也驅丘于切逐也隨後也驟也奔馳也古作􅛷又丘遇切駈俗馳文知切走奔也天子道也騁丑領切驅也走也在古切猶麄也又子朗切駿馬也㑹两家之買賣如今之度市吕氏春秋叚干木晉之大駮甫角切獸似馬亦作駮驢力余切似馬長耳驂倉含切驂馬也音蔡馬名音瞿馬行皃駍平悲馬名駪所巾切馬衆皃又作􅢲騥而丘切青驪繁鬛馬力魚切又音慮騮音留紫騮馬騟羊朱切紫色馬䮄胡涓切馬一歳馭魚據切古御字使馬也盆故切馬今作歩䭾徒賀切馬􅀒皃烏髙切馬行皃呼光切馬少皃音咸縣名駃古穴切馬生七日超其母騠丁奚切駃騠又音啼音䃜黒色馬􅬼户雷切馬名駨相倫切又音旬百昆切馬走皃騊大刀切騊駼獸如良馬也駼同都切騊駼户安切馬多皃直耕切馬住皃騆音周神馬􆇝音羊馬名驒大何丁年二切驒騱騣馬属騱下雞切驒騱也䮫音婁馬􅀋䮞音春鈍馬也駯音誅馬口黒時俱切朱色扶元切駤止也或作樊駤竹利切駤音腔馬行皃音卭獸似馬音冝馬名駀音尤馬名騉古䰟切騉蹄馬名秦有騉蹄苑䮻丁老切馬􅀕亦作禂靡京切汗馬䮊音夷馬名騦息兹切馬行音离驢子䮸於角切馬腹下聲也力渉切馬也亦作躐䮞尺尹切馬文匹可切馬行皃􅯵毗兩切人姓南賁切馬走䮾步公切䮾䮾充實皃䮴徒亘切又大登切䭺五黨切馬頭髙䮨作亥切馬名駺力唐切馬尾白音騁古文騣子公切金騣馬冠也馬鬛也仕洽切也音馬名䭸音父牡馬也音者馬名騳徒鹿切馬走䮚力旦切䮚䮴馬病也馬傷榖也魚容切大皃亦作顒音姥馬行皃音馬行皃􅦢莫百切馲􅦢五豆切又合麥切風幽香幽二切走皃於塊切驪駿馬騙匹扇切上馬也力際切馬馳音步馬名音䧟馬走駏音巨駏驉獸似騾驉音虚駏驉也馸音釁馬重也䮎音餼馬走許力切馬走䮕音䮕白額馬馶巨支切勁也居企切強馬䯂所臻切衆馬行皃莫割切馬走皃䮰陟革切獸也䮜上甲切馬行䮱音逐獸名音劬馬後足皆白亦作朐䭵音凡馬行皃反音梵音質馬名䮓竹角切馬行區勿切産良馬􅤻房八切馬名􅀐巨義切乗也又巨宜切博慢切䮗馬行夫吉切馬名䮬亡各切馬名火麥切行不正䮠音逼駝䮠䮙干逼切馬名文音洫駙扶遇切駙馬官也􆄔力薛切馬名駟悉利切四馬一乗諧間切今作閑先郎切馬尾白驋北未切馬走又音驋䮩古忽切䮩獸出北海都忽切䮩騰大登切上躍也奔也巨希切馬也􅷪与􅻡字同吐盍切馬行不進􅤥徒合切䮂􅤥馬行皃䮂音跋䮂蕃中馬也馲陟格切馲馿父牛母牛部三百五十八凡百四十四字牛魚留切大牲也黃帝服牛乗馬犢徒木切牛子㹁力薑切牻牛牡莫右切飛曰雌雄走曰牝牡犅古郎切特牛赤色也㸹力拙切牛白脊五角切白牛同上又五沃切㹔居良切自牛牝毗忍脾死二切牝牡也畜母也犗加敗切騥牛也騰也他刀切牛徐行牷疾縁切躰完也牿古督切牢也凡綴切牛蹄特徒得切牡牛又獨也犆同上又他力切見礼記犧欣宜切純色牛犘陌􅀲切牛名犦歩角切封牛也犣力渉切牛名布外切牛躰長又二歳牛牻莫江切亂也雜牛也牰徐救切牛眼黒犚於貴切牛名犌古瑕切牛有力㹎力追切求子牛犙山含切又且含切三歳牛犃歩后切雄也短頭牛㸪似訓切牛行遲奴多切獸似牛犎甫容切野牛㸰徒和切或作力􅀔力大二切牛白脊達胡切黄牛虎文㹍徒的切特牛牟亡侯切牛鳴又姓也大也爱也取也奪也退也倍也進也首也犓則俱切養牛羊也今作芻犖力角切駁牛又卓犖㹒普角切特牛而小而照二切牛柔謹也徙也安也馴也晝而字如此同上苦到切餉軍与同普耕切牛駁如星也牸疾利切母牛犐苦戈切无角牛牭思二切四歳牛又牛狠也㹑籕文㹗徒刀充刀二切牛羊無子犉而純切黃牛黒脣如腫切水中牛牥甫防切良牛名犍居言切似豹人首一目同上牼胡耕口耕二切牛膝下骨古訝切輅車籕文駕犇補門切牛驚書尤切牛也呼今切出呪同上巨禁切牛舌病也或作􅤉㹌史簡切畜牲㹌也犜音敦牛名音秦牛名犫尺由切牛息声又牛名出也犨同上犀先􅀆切獸似牛堅也亦作牲史京切三牲牛羊豕徒郎切牛名同上犥普沼扶表昔槀三切牛色不美澤又牛黃白色􅣕眉隕切獸似牛蒼黒㹃甫胃切两壁耕也犂力􅀆切耕具㹆音揮犂牛頭也牴丁礼切觸也略也角牴􅄂設樂也或作觝犤平爲平媧二切牛名又音陂牣而振切滿也益也音繒牛也赤唯切牛也牢來刀切牲備也廪倉也又堅也犑公覓切牛名見尔雅㸲子各切牛肉重千斤牨古郎切水牛七岡切牛名牽口田切引也前也挽也速也犩牛威牛畏二切牛名􅥠余鍾切牛胅領也牞居求切牛大力音牛角皃五殄胡結二切牛很不從又火皃犈竒貟居辨二切牛耳黒方韋切獸似牛一目音嬰牛也音㝷牛也物亡屈切生天地間謂物也事也􅀋也爲乖切獸似牛四角人目式夜切馬名亦作直􅀷切水牛㸳郎丁切牛名巨六切牛也音骨牛也示勢切一角仰或作觢㹏凡隠切善也柔也㸼音峯牛也音初牛角也音􅁷黒牛也呼乖切獸名思營切赤牛亦作騂呼口切牛鳴亦作呴符悲切使牛声音浮牛黒脣七古切使牛㸻音俟牛也烏口切特牛也又去句切㸸烏后切又烏遘切同上又音口牳莫厚切牛也㹙烏猛切喚牛声於􅄦切牛也㹉魚􅀽切獸似牛三足牶苦夅切牛鼻捲也牯姑户切牡牛音究牛也㸵同上牛声音秩人姓也犝徒東切牛無角亦作䮵他見切餧牛草也音去牛行皃牪牛眷切牛􅟢也音譬牛具也四計切牛也㹓魚小切獸名又音鐃犬果切又音岳古侯切取牛乳犔音餼牛病也音介牛四歲也音叶牛健也犕皮祕切以安革裝馬也又牛六歳觕昌欲切牴人也音特牛也音牛牴也音厥牛也犛部三百五十九凡三字犛莫交切獸如牛而尾長名曰犛牛又力之切又牛黒色羌去央切西方囯也楚語辝也卿也反也幸也強也音厥羊也紀力切羊行走羴部三百六十一凡二字羴式延切羊氣􅆨亦作羶羼初莧切羊相厠也相岀前也􅯉部三百六十二凡四字􅯉垂買公瓦二切羊角也􅯉􅯉两角皃古懷切戾也睽也邪也背也差也離也今作乖苦蛙切不正也亡殄切相當也又亡延亡衰二切莧部三百六十三凡一字莧胡官切山羊細角也寛字從此犬部三百六十四二百六十三字犬苦汝切狗之有懸蹄狗古后切家蓄以吠守㺜音農多毛犬也又乃刀女交二切許謁切獢犬短喙也又許􅂚切相迫懼也亦作猲獢許驕切獢也猈歩買切狗短脰狡古卯切獸名少狗也猾也疾也徤也獪也獎子飬切助也成也欲也也嗾犬吠之也今作狵莫江切犬多毛尨同上猗於宜切歎詞也大也又猗氏縣名猝且没切犬从草中􅁀出也言倉猝暴疾也突也今作卒狊呼􅞔切犬視所姦切惡徤犬㺌胡斬切又胡忝切犬吠不出也两犬爭也臭尺又切香臭揔稱也犬逐獸走而知其跡故字作大猲呼艾切犬􅆨也獳乃侯切犬怒也㺑山監山林二切賊也犬容頭進也賊也獨大卜切犬相得而閻也並古又獨􅜧古卜余玉二切獸名獝許必巨筆二切狂也獡式畧切驚也獡獡犬不附人而驚皃獫力蟾切犬長喙又力儉虛檢二切㹥之句切黃犬黒頭竹厄切犬張耳狠五間切大􅃲声狋魚肌切犬怒两犬争也又狋氏孫又音㩲􅰉於䧟於咸二切竇巾犬声㺖胡鑑切小犬又卿名犯扶切抵觸也古文狃女乆切習也就也復也又狐狸䓁獸跡黙亡北切大暫逐也亦爲嘿㹽又板切齧也犬食也獵力渉切犬取獸狩式又切冬田也獲爲麥切得也辱也婢之賤稱也旌也猥於隗切犬生三子又犬声獷鉤猛切犬不可附也狂具王切癲癡也狄徒的切北狄也獻許建切奉也進也上也聖也奏也㺒呼交呼狡二切大獶駭也猱乃刀切獸名獿同上又女交切猴乎溝切猕猴猇胡包切虎欲齧人声又許交切㺕扶元皮眷二切犬􅃲声狀仕亮切形也又書狀􅦺余支切獸名犳之薬切獸豹文獋胡刀切犬呼也鳴也咆也或作獔獒牛刀切犬四尺如人心可使者阻良阻亮二切狂犬獖扶粉切羊名􅳎音母猦􅳎猦府隆切猦􅳎獸有尾小打即死因風更生戾力計切來也至也待也勢也止也立也法也定也利也虐也古文㺗允山切噬也所留切犬名又秋獵也亦作蒐獀同上猜千才切疑也恨也懼也他蠟切犬食亦作䑜同上狧亦同上猩所更切似人能言又音星狌同上狎下甲切易也近也習也狹同上今爲闊狹玃居縛切狙也同上㹞牛隹語斤二切犬声狺同上獜力丁力仁二切声也亦作鏻獪古邁切狡獪又音澮㺧許苖切大黄色􅭬余成切似狐也獧古懸切跳也急也狷同上狟乎官切武皃也威也今作狟犺口盎切徤也猬也古毁切玃也狤居乙切狂也思淺切秋曰亦作獮獮同上猛麻擴切徤也嚴也惡也害也㹤去業切多畏今作怯猋卑遥切犬走皃犬丁切猱也猨于元切似􅃸能嘯亦作蝯猿俗牛􅁻切犬怒歩内切犬過猌牛僅切犬張齗怒皃狍歩交切獸也猖尺章切狂駭也㹿音獨猛犬音力犬爭皃犮歩末切犬走皃與跋同猙疾井側耕二切獸名狨如充切猛也㹫音夷獸也㹳五胡切獸名狴邊􅀆切獸名獠力弔切宵田力道切夷名猵普年布眠二切􅆩属獼武移切猕猴猕同上音窮似虎㺋音翁猪也午見午晏二切逐虎之犬獟雅弔切狾狗狂狗也狾居丗切狂犬古文狸音离似猫音纎獸名獘婢出切獸名也頓仕也俗作弊猎秦亦切獸名或作獡㺏力朱切豬求子猍力開切狸也德紅切犬名犲音柴犲狼類律位切獸名種类也法也􅏈胡昆切獸似犬人靣猯音湍野猪狑郎丁切犬名同上􆈵音衰犬名狻先丸切狻猊獅子亦作䝜猊午􅀆切狻猊亦作貎麑猽莫屏切小豕猧烏和切犬名㹻同上直闔切獸走皃狙且余切玃属犬暫齧人㺛之喻切郷名又亭名狼來當切獸似犬獾犬丸切壯狼犿同上獥公弔切狼子獥呼木切似犬上黄下黒獦古􅂚切獦狚獸名狚丁旦切獦狚狛白駕切獸如狼同上㹲火交切犬驚獌莫旦切大獸狼属或作䝢犽午亞切獸名似獾獚胡光切犬也呼光切狼也火交切犬壯也獅音師猛獸狐戸吾切媚獸又狐疑猶豫㺎弋恭切猛獸或作狳與魚切獸似兎音開獸也丑珍切狂也音胥猨属獺他逹切如猫居水食魚獱婢賔切􅆩属㺂古禫切犬吠甚音乎犬吠声猻思昆切猴猻音鞮犬也猫眉嬌切夏田也食䑕也或作貓􅧝於結切獒􅧝獸名音奚犬戎也音獸名猄九卿切獸名音抵犬㺟除卓切似猕猴而黃又作􅨓時爾切獸如狐白尾七何切大狂也㺈音􅃖狩也㺥七衘切犬声音當獸名獹來胡切韓獹天下踆犬㹱且薬切宋良犬也音彭大壯皃狓音彼皮也㹹音庚獸名於止切䝤姓猰公八切雜犬烏八切猰㺄㹾巨表切獪也才癸切雌狢也音邪㹺獸名㹺他合切犬食犼音吼似犬也猾爲八切黠也小兒多詐也猓古火切猓􅛊獸也㺝音檻虎声狕於絞切獸名以觜切獸名􅓥音葸犬名力延切猭兎走又直山切猭丑船切㺝猭音婢似豕音凡似兎力爲切水三切音葵又音悸狒父沸切似人形被髪迅走猣子公切犬生三子獬何買切獬力弔切老獶奴巧切犬驚皃魯紅切獸也猶以周切猨屬也猶豫尚也可也詐也言也又以救切猷余周切圖也与猶同􅚧子宋切犬生一子猔同上皮恋切犬爭皃㺞音余歎聲又猪兒声玂巨衣切犬生一子􅜦許器切獸也㹬牛仕切狗名猬音胃毛刺也猘音制犬悪名玁喜検切玁狁北狄也狁余凖切玁狁狖羊就切黒猿同上犹􅀹豆切丁角切音羕獸也獑士咸切獑猢獸名似猨猢戸吾切獑猢桑故切獸也尺丗切狂犬音據獸名音豆犬吠声猚音壘又音袖似猕猴獂音丸豕屬又音元㹟音决狂也㺘阻纎切犬小皃音遁道犬也㹿猪孝切狩也五間切又音簡犬爭皃狶音喜楚人呼猪声音頼狂也獁音馬獸名獍居命切獸名音即犬生三子狿丑延切又音延獸名也􅚦力爲切又力水切狘許月切獸走皃音厄豕也所甲切豕母㹼居六切獸名烏江切犬不伏牽音降音揷犬食皃音弗犬皃獯許云切獯鬻狽布蓋切狼狽直買切又音雅俗豸字㚟田略切犬似兎亦作狣雉獢切絶有力狢下各切狐狢􅽌思焦切狂病猆匪肥切獸名犾部三百六十五凡三字犾牛斤切两犬相齧獄牛欲切二王始有獄殷曰羑里周曰囹圄又謂之牢又謂圜土㺇息利息犂二切辨獄官也察也今作伺覗豕部三百六十六七十九字豕式爾切猪豨之揔名也古文豬徴居切亦作䐗豤口殄口狠二切豕齧地豝布家切牲豕音尤豕也息干切豕也公田切豕一歳􅢢同上他丁他定二切豕皃䝐羊捶切豕俗呼豶豬同上豶扶云切犗也豭古叚切牡豕豛營􅃗切齧豕也􅘻胡來古來二切豕四足白豷於計切豕息也豢乎串切養豕豠才余切豕屬豟於隔切豕五尺同上􅡁力人切似豕身黄岀泰山豲乎官切豕屬又縣名􆄚同上莫丁切小豚䝏力俱切求子豬午蓋切老豬力物衢物二切豕地也豙牛旣切豕怒毛竪山甲切老母豕䝒士俱切小母豬同上䝕之陟切良豬􅩸許十切􅆛子或作榖䖶呼回切豕䖶地豞呼逅切豕鳴莫公切似豕也䝋子宋切牡豕猣同上豯下雞切豕生三月豩火􅀋切两豕䝅呼恢切豕也䝎音端豬也􅼞音雄豕狩音牽豕也豵子公切豕生三子古懷切又丘愧切犬䝔呼丸切野豬豘徒昆切豬兒音便豬也音倫獸也芳干芳又二切豕息音先豕也爲委切豕也莫厚切豕也豨火豈切豕也音旱豕奔皃豱於昆切豕名見尔雅空旱切豕皃􅺞許氣切豕壯犬音孝豕也音衞豕也䝍音捃又九云切􅻝徒公切似豕出泰山音卓龍車也音雹小豕女滑切豕也音閔豬名䝌己劣切豕也亡狄切白豕黒頭音役獸似豕䝆音忽豕名徒郎切急行豦竭於居御二切封豦豕属䝓力涉切長毛或作鬛豪戸刀切猪毛如笄而端黒又俊也帥也籕文小􅂐作髙豳古文邠字章移切豕髙五尺也又丁角切山也䝑丑㐫切􅁟豬􅾠部三百六十七凡四字􅾠徒昆切豕子或謂豯豚籕文爲罽切豚屬同上部三百六十八凡八字徒計余利二切貍子也脩豪獸也又也古文呼骨切豕屬相利切豕声俗作古文胡貴切蟲似豪豬或作蝟又􅀋也茂皃也彚同上胡刀切亦作豪􅵡部三百六十九凡三字􅵡居例切彚􅀋也􅇾除厲切豬也􅂏他乱切才也豕走恱也嘼部三百七十凡二字嘼救又切六嘼牛馬羊犬雞豕也養之曰嘼用之曰牲今作畜又許又許六二切獸式又切四足有毛走者謂之獸􅞧部三百七十一凡五字􅞧直倚宅買二切解􅞧獸似牛一角古決訟令觸不直或作杜捉切連也交孝呼教二切解􅞧之属灋方業切則也今作法薦子見切獸所食草其進献也陳也鹿部三百七十二五十六字鹿力木切麞屬麚古瑕切牲鹿麀於􅀹切牝鹿古文兔部三百七十五凡九字兔他故切毛可爲筆菟同士又音圖地逸以一切過去也奔也縱也逃也理也冤於元切屈也不理也枉曲也芳句切急疾今作䞯㕙子徇且倫二切狡兔䨲乃侯切婏也婏四也兔子五丸切兔子􅚵部三百七十六凡十二字􅚵仁丸切􅀃文獸足蹂地或作狃又女丸切禸同上禽其林切二足而羽亦鳥揔名萬亡顔切十千也又蟲名㸘古文扶沸切獸亦作佛离丑支切山神也猛獸也或作螭又力支切禹于矩切蟲也舒也夏禹也同上亦同上禼思列切蟲名古文部三百七十七凡三字兕徐姊切兕似牛見爾雅􅴩同上兕古文象部三百七十八凡三字象似養切獸中最大也象胥官名亦与像同􅨆古文豫弋庻切怠也安也我也秩也早也逆備也或作預又獸名象屬能部三百七十九凡二字能奴登切多技藝也工也善也又奴臺切三足鼈㔮乃何切獸似鼠食之明目熊部三百八十凡五字熊于弓切􅀃文獸似豕山居冬蟄古文羆鄙爲切似熊黄白色古文亦古文龍部三百八十一凡九字龍力恭切能幽明大小登天潜水也又寵也和也君也萌也􅶱音龍圭爲龍文龕苦含切龍皃也受也声也盛也古田丁篋二切龍同上龗力丁切龍也又作靈神也善也或作靇同上龖達荅切飛龍皃龘音沓龍行也虍部三百八十二凡十五字虍火乎切虎也虐魚約切殘也同上古文虙浮福切虎皃又虙戲大皡虞牛俱切有也助也楽也望也度也專也備也誤也安也又掌山澤官名虨􅀘間切或作坋虑房七切愁皃䖒昨何才都二切虎不柔也䖍竒連切虎行皃又殺也惠也欺也端正皃也固也敬也也強取也少也虖烏切孝虖又地名胡甲切今作狎渠吕切鍾磬之附以猛獸爲飾也亦作鐻􅶅同上古文虎部三百八十三凡三十字虎呼古切惡獸古文甝胡甘切白虎䖑亡狄切白虎虒思移切委虒虎有角者䖔虚暫切甝屬又虎怒彪悲蚪切虎文䖊魚廢切虎皃牛乙切虎皃䖐牛斤切虎声􅊒許􅂩切恐懼也又蝇虎蟲虥士板昨閑二切貓也虓許交切虎声公厄切虎声音覓俗字去良切虎􅀋䖚音烏楚人呼虎皃烏莵俗􅀙虎大乎切烏即虎也虣歩到切今作􅁀虠音姣虎声古呼切息也䖕昨古切生虎虪式六切黒虎又音育號音豪哭声又与号同䖎音狎虎也䖓女滑切虎行皃織牛切虎習皃䖛音索虎皃徒登切黒虎亦作又音彤所禄切虎行入林虤部三百八十四凡三字虤胡大切又五間切虎贙乎大切有力見尔雅䖜雉栗牛巾二切二虎爭也豸部三百八十五六十六字豸直尔切无足屬緫謂之豸又獸之長豸然也䝤張絞切夷别名与獠字同又盧皓切貒它丸切似豕靣它畔切貗力朱切貒子貔步尸切猛獸豼同上貚大丹切貙屬豺仕皆切似狗豻午旦午諫二切胡狗亦作犴䝢亡旦切大獸亦作獌豹布孝切似虎貜九縛切獸名貘莫格切白豹貁與呪切猨屬􅧯乙郎切江東呼貉曰􅧯􅤘貙敕朱切似貍又惷也貈何各切似狐同上同上貆胡官切貈子與恭切猛獸亦作㺎貎五􅀆切䝜貎或作猊貍力之切似貓貛火丸切野豚貂丁切鼠如犬它公切獸名貉莫格切蠻貉又貈同貖於格切䑕屬亦作貅况牛切猛獸力才切貍别名豾倍悲切貍屬貓眉朝切亦作猫貀女猾切似豹无前足豽同上䝜息丸切或作狻音丘獸名音似猨八子䝣音渠獸名都宗切獸似豹有角豿音狗熊虎之子歩紅切獸也魚容切獸似豕音惟獸也作可切獸也平表切似狐善睡市照切又音鄒獸名此觜切獸也音帚猛獸䝖側马切豸也音嚴獸名平表切似羊善睡云貴切毛刺也中板切豸也張皃切豸也􅡐余至切貍子貊育百切蠻貊䝦織戎切獸似豹也􅤘山吏切􅧯􅤘或作音鶻獸名音秃獸名博末切豸也貏皮􅀉切獸名䝟烏黠切䝟貐似貙貐翼乳切䝟貐相邀切見史記貋河滿切猛獸大廣益㑹玉篇卷之二十三
