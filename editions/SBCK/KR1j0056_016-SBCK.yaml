body:
  text: 大廣益㑹玉篇卷第十六凡二十四部琴部二百三十一凡八字琴巨林切􅀃文及新論云神農造也琴之言禁也君子守以自禁也風俗通曰琴七絃法七星也琴操云長三尺六寸法象三百六十六日廣六寸象六合也􅂐文䥅並古文瑟所櫛切苞儀造弦多至五十黄帝使素女鼔瑟哀不自勝破爲二十五弦古文琶歩巴切琵琶也琵房脂切風俗通云琵琶近代樂家所造長三尺五寸象三才五行四弦象四時釋名推手前曰琵引手部曰琶琵琶本胡家馬上彈也喜部二百三十二凡四字喜欣里切樂也恱也古文歖古文岀􅀃文嚭普鄙切大也吳有大宰嚭壴部二百三十三凡六字壴竹句切陳樂也他郎切大声也􅿏且的切夜戒守鼔也又作鼜彭蒲衡切多皃又盛也嘉柯遐切美也善也尌雉具竹具二切立也又作駐鼓部二百三十四二十一字鼓姑戸切瓦爲控革爲靣可以擊也籕文鼖扶云切大鼔也音帖鼓無声也鼛公刀切大鼔也鼙步􅀆切騎鼔也鼞他堂切鼔声鼘於巾切又於玄切鼔声也鼔節也七立切又他叶切鼓無声徒名切鼔声或作鼕口盍切鼔声他登切鼔声他盍切鼓鼙声或作􅸪䵿音帖寛也䶁音錔鼔寛力弓切鼔声鼚丑良切鼔声鼗徒刀切似鼓而小亦作鞀鼜音戚守夜鼔也䥢同上俗䵽七盍切鼔声豈部二百三十五凡三字豈羌顗切安也焉也書云怨豈在明􅠟巨衣切且也欲也危也託事之樂也凱空改切凱樂亦作愷豆部二百三十六二十五字豆徒闘切量名􅀃文云古食肉器古文梪同上木豆謂之梪薦羞􅉁􅊽也於物於月二切豆餄也居􅀮切合瓢也䜼莫卜切豆萁名􅀄六切小豆名䝁力刀切豆名同上九免九媛二切豆之属豍方迷切豍䝀豆也䝀力周切見上注䜾於林切䜷豆也音兠豆小裂䜺又白切磨豆䜴市寘切豆豉亦作敊䜷七林切豆名野生者豏胡斬切豆半生䜽弋朱切豆名渠飢切豆䜸莫猥切碎箕豌於丸切豆名夏收者䜶胡江切䜶䝄胡豆名所江切見上注都騰切豆名豊部二百三十七凡二字豊力弟切行礼之器豑雉栗切爵之次第也豐部二百三十八凡三字豐芳焦切大也俗作豊古文豔弋贍切美也好色也俗作艷䖒部二百三十九凡三字䖒欣冝切古器胡道切士釡也除渚切器也或作㿾重部二百四十凡三字重直隴切不輕也厚也又直龍切量力姜力尚二切􅀃文稱輕重也古文鼎部二百四十一凡五字鼎丁冷切器也所以熟食者又鼎炉也又新也又易卦名䵼式羊切煑也亦作鼐奴代切大鼎也鼒子思切小鼎名鼏亡狄切覆巾也又鼎盖也瓦部二百四十二凡一百五字瓦午寡切土器也瓻丑希切酒器名甄居延切陶人作瓦器謂之甄才又至神切甗牛偃切無底甑名瓿蒲後切瓿甊小甖也甊力口切上注瓵余之切小甖名㼛胡經切酒器似鍾而項長同上瓶蒲井切汲器又甖揔名瓴力丁切瓴甋甓属甋丁歷切上注甌於侯切椀小者甍眉耕切屋棟同上瓬方往切周礼瓬人爲簋㼾力木切㼾甎甓也甎之縁切上注瓽丁盎切盆别名瓮於貢切大甖甕同上瓷在思切瓦器㧾名亦作㼬胡梗切㼬瓶名有耳者㼳山梗切上注瓨戸江切長項瓶甈丘滯切瓠壷也坡甖也同上㼝烏緩切器也亦作盌㼡是朱切小甕别名㼥丑口切瓶名㽀除政切甖别名甃側胃切井甃也易井甃修井也㼙古文甂􅀘玄切小盆大口而卑下㼲力頰切甄㼲蹋瓦声㼻仕江切甖别名㼶与朱切瓶别名㼽所兩切半瓦也同上􅺮丘劒切又胡躭切瓶有耳㼚古郎切甖也大瓮也㽈牛志切大甖名甔丁甘切小甖名口郎切瓠也同上􅷢桑對切􅀃文破也亦作碎除向除香二切瓶名㼴牛口切盎小名㽄思移切瓶名女刮切也同上甒無甫切盛五升小甖㼤若結切瓶受一斗者㼵徒啓切小盆名㼦居隴切缾名胡圭古畦二切甑下空亦作窐同上瓹古縣切瓮底孔下取酒也㼣補格切㼿㼣井甃也甐力震切器堅也㽅都滕切瓦豆名㼸音容甖也同上㽃普安切㽃瓳大㼾甎也丁昆切器似甌也􅫈力胡切酒器名㼫胡寡切大口也㼺徒郎切瓷也五合切瓷器力公切築土礳今作礱㽁力的切瓦器今作鬲瓪伯限切牡瓦名㼠徒河切瓦盌名􅛩五化切器也扶汎切瓦名甓立的切剸也瓴也㼾也㼯丁弄切㼯器也初鑑切上注力救切屋穩名許􅏇切器也五姑切甌也甖烏茎切也又瓶楤名甇於耕切長項瓶也㼧徒公切牡瓦也甉胡監切瓦屋也㽋力華切瓦名㽇胡谷切坯也甑子孕切甗也以炊飯者㼜於浪切器也亦作盎古諧切牡瓦也瓳戸徒切㽃瓳㽉胡監切大盆㼗徒丁切甎也徒果切甌也甀池爲切甖别名㼢余之切瓶名㼮七許切甃也􅒤徒古切瓶别名勒當切器也時扇切器縁也㼪子協切半瓦也㽆丁桑切匙瓦徒奚切瓷也呼光切器也瓭丁感切瓦属缶部二百四十三四十三字缶方􅀒切盎也詩坎其擊缶缻同上音帚器成也䍉知駭切缺也在咨切亦作瓷瓦器揔名罌於庚切瓷瓦器揔名是規文睡二切小口罌也古文革鞋切器好也畢裴切缶别名匋徒刀切作瓦器今作陶罋於貢切凡瓶无觜耳者􅜍同上䍃余周切瓦器名蘇回切器名罏力胡切罍也􆁓力丁切瓦器似瓶有耳者罐古叚切小瓶㧾名䍍苦谷切未燒瓦器罊口計切器中尽羌吕切藏器􅧲戸暫切净器缺祛決切虧也破也亦作㩾罇子昆切与樽同酒器䍎七鈍先見二切瓦器䍊公的切吹缺也禹逼切瓦器名五鎋切缺也䍇他盍切下平缶也缾也罍力回切酒樽别名􅪖籕文罃於耕切長頸缻罅呼嫁切裂也䍄都簟切缺也胡經切酒器似鍾而項長時扇切器縁亦作缸胡江切器也与􅒤同側板切小酒器䍌歩侯切小缶也亦作瓿又歩後切罄可定切尽也器中空也缾蒲丁切汲水器瓷也徒啓切器也亦作㼵缿胡講切如􅒤可受板書筩令密事亦受錢器也又大口切鬲部二百四十四二十三字鬲郎的切鼎足曲􅀃文作云鼎属实五􅷴斗二計曰􅷴又音革平原有鬲縣亦作鬲䰛同上鬹居垂切三足釡名鬳牛建切鬲别名許朝切炊氣皃􅲒公禾切秦名士釡曰􅲒亦作鬵似林才心二切釡别名鬴扶甫切属或作釡鬷子公切釡属䰙魚􅀝切釡名胡圭古攜二切甑于空也䰝子孕切鬵属亦作甑柯竹切煑羹亦作羮䰚亡分切摩也蒲悶切起也融余終切長也説文炊氣上出籕文如之切熟也亦作􅳺􅘺方未切煑熟亦作沸􆄿工定切隔也􅱊楚狡切熬也式羊切煑也亦作䵼鬺同上􅦧部二百四十五二十一字􅦧郎的切也亦作鬲之六切糜也又以六切或作粥同上􅻶音速鼎實也或作餗楚絞切熬也或作煼諸延切粥也如燭切大鼎䰞之与切煎也或作煑同上以林切器名釡属戸徒切也或作糊歩忽切釡湯溢側皆切敬也古行切煑也同上如至切粉餅或作飷居言切粥也或爲䭈亡逹亡結二切凉州謂粥爲或作鬻羊六切鬻賣也又音祝􅀃文又音糜余灼切内􅁏及菜於湯中子孕切炊器亦作斗部二百四十六二十二字斗丁口切量器也十升曰斗㪷俗文􅝁他幺切􅝁疀古田器也亦音鍫料力弔切数也理也又音寮斡烏活切轉也柄也又音􅃹斞余甫切量也今作􅁃斠古琢切量也今作斣丁豆切物等也力競走也斜徐嗟切抒也散也不正也斟止任切取也計也酌也㪺九娯切挹也酌也斛胡榖切十斗曰斛匹郎切又薄郎切量溢也戽乎古火故二切抒水器也㪵􅀘叛切量物分半也㪻九万切抒也量也枓之􅁃多後二切有柄形如北斗星用以斟酌詩維北有斗亦飲水器升舒承切升斗也十合爲升呼活切又烏活切杼也丁狄切量也斚古雅切爵也公治切入也亦音恰勺部二百四十七凡二字勺時灼切飲器也十勺爲升亦作杓与羊㪯切賜也許也予也亦作與几部二百四十八凡五字几居履切案也亦作机凭皮氷切依几也又皮證切凥㪯魚切処也与居同処充与切止也与處同焭瞿營切單獨也与煢同且部二百四十九凢五字且七也子余二切語辝也始然也又七序切詩曰有萋有且古文亹亡匪切亹亹猶微微也才布切且往也俎莊吕切断木四足也􅁏􅉁也匚部二百五十凢三十九字匚甫王切受物之器籕文匛渠救切棺也亦作籀文匴先􅃹切器名􅜷米䉤也匰丁安切宗廟盛王器匜弋支切沃盥器胡耽切船没也􅀘堅切竹豆也亦作籩籕文似沿切器名􅜷米䉛也匧口頰切緘也或作篋㔶公棟切器小桮且縁切竹器匭古鮪切匱匣也函也㔳同上匬余主切噐名受十六斗者徒弔切田器名也匫呼骨切古器名匥皮変切冠器又作笄匳力占切盛香器也亦作籢匲同上匯胡罪切垂一切回也器也匣胡甲切匱匣匭属匱渠愧切匱匱藴玉匣匵徒鹿切見上注布迴切籕文桮字古文􅔆方娯弗武二切祭器今作簠㔴羊式切大鼎又田器此郎切古器也匡公王切方正也飯器也筥也語二王天下亦作筐匩同上大廣益㑹玉篇卷之十六
