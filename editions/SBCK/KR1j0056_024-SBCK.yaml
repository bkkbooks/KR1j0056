body:
  text: 大廣益㑹玉篇卷第二十四凡一十三部烏部三百八十六凡四字烏於乎切孝鳥又語声古文舄七雀切鵲也又思亦切今爲履鳥字焉於連切鳥名也安也疑也又矣連切語巳之詞也是也几部三百八十七凡四字几是俞切鳥短羽而飛之忍切新生羽飛也㐱同上今文鳧父俱切鳥名乙部三百八十八凡三字乙於秩切玄鳥或作鳦孔口董切商姓又嘉也甚也竅也通也空也乳如􅁃切以養子也生也字也鳥之生子曰乳燕部三百八十九凡二字燕於見切乙也白脰鴉也又於先切囯名鷰俗燕字鳥部三百九十凡四百二十字鳥丁了切飛禽揔名􅀃文長尾禽緫名鶴何各切水鳥鷖烏􅀆切鳧属鳯俘諷切靈鳥雄曰鳯雌曰凰有五采栖梧桐食竹實鶠於獻切鶠鳯也鵬歩崩切大鵬鳥鶖七由切水鳥同上鸞力丸切似雉見則天下安鸑午角切鸑鷟鵉鳯属鷟仕角切鸑鷟鵰丁幺切鷲也鶚五角切鵰鶚鶪公覓切伯勞鷺來故切白鷺頭有長毛亦音鷺䳀余日切餔鼓鳥鳶以專切鴟􅀋􅧭同上鷮居苖切似雉鵠胡篤切黄鵠仙人所乗鷫思六切鷫鷞西方神鳥同上鷞所良切鷫鷞鳪音卜婎也步丁切烏臼鷚莫彪巨幽二切鷚天鸙鵾古魂切似雞而大於鳥切魚也鴸音朱鳥似雞鴖音珉鳥名同上鴈五諫切大曰鴻小曰鴈鳫同上鴻户工切鴻鴈鸉与章切白鷢似鴈鷢巨月切似鴈尾白鵸竒輢二音鳥名鶩亡附切鴨属又音目鴨烏甲切水鳥亦作同上鵪古文鸛古亂切鵲属䳔公六切鳥名鶌九勿切似鵲而小黒色也鴶古􅃛切鴶鵴即布􅂖鵴居六切鴶鵴同上鷙之利切猛鳥也同上鶻乎忽切鷹属又音骨斑鳩鵃止遥丁交二切鶻鵃􅫁音域戴鵀也鸁力戈切飛桑也鷲似又切鳥名同上鳩九牛切鳥名或作勼鴿古合切似鳩而大鳲音尸鳲鳩鴀甫鳩切鳲鳩䳫巨惟切小鳩䳕音浮䳕鳩鸇之然切鷂属􅜑並同上鷣以箴切鷂属鷐市眞切鷐鸇䳳思律切鳥名子列切小雞鴚古俄切鴈属鴚鵝鳥也􅛥鴐並同上鵞牛何切鴚属亦作鵝次栗切鳥名烏道切鳥名􅸭九彼切布榖鵯音匹鵯鶋也亦名鵯烏又音卑鸒羊慮切鴍斯鵯鶋也鷽倚角切山鵲弋拙切水鳥鶽思尹切祝鳩也急疾之鳥也或作隼鵽知刮切鵽鳩一名冠雉􅖂布族切􅖂水鳥也同上鴠音旦䳚鴠䳚苦汗苦曷二切䳚鴠似雞晝夜鳴名倒懸鴛於元切鴛鴦匹鳥也鴦烏郎切鴛鴦亦作央鷗烏侯切水鳥䳁皮逹切大鳥鴂古穴切寕鴂一名飛桑一名巧婦奴丹切􅀃文鳥也与同力竹切野鵞也力俱切又音婁鶘戸徒切鵜鶘鵜徒􅀆切鵜鴮鸅好食魚名陶何鳥鸄古的切似鳥一名唐屠鸊步覓切鸊鷉水鳥鷉天􅀆切鸊鷉鴧以出切飛疾皃鶡何葛切鳥似雉而大青色有毛角闘死止鷧郁秘於計二切鸕鷀鸕力乎切鸕鶿水鳥鶿才兹切鸕鶿鷀同上􅯝五俱切似梟人靣四目有耳見則大旱鸍式之亡支二切似而小鳵布老切鳵性不止樹􅬪同上鶯於耕切鳥有又䴅必昆切鳥如鵲白身赤尾六足出太行山鴗力及切天狗亦名水狗鴺徒􅀆切鷩鴺山雞也􅝣唯辟切小鳩步昆切鳩鳥􅠯徒頼切鳥似烏三目音如豕食之亡􅀬也鷔五髙切有鴜集即大荒国亡鶬千唐切鶬鴰亦作鴰公活切鶬鴰鴳於諫切鶬鴳䳩於遥切鳥如山雞尾長赤身其鳴自呼巨貟切鵒亦鴝鵒鴠且余切于鴡亦作雎鴝具愚切鴝鵒鸜同上古文鵒音浴鴝鵒鸚於耕切記鸚鵡能言不离飛鳥鵡亡禹切鸚鵡鳥䳇同上又亡后切鷕以沼切雉鳴余周切䑕鵵大胡切鳥名􅖥巨於切雝􅖥亦作渠子席切鴒雝􅖥鶺同上鴒力丁切䳭鴒鸗力恭切梟也鸙弋灼切天鸙鸀徒角切嶌又音燭鸀鳿鳥鳿牛欲切鸀鳿巨六切鳩􅟇力唐切鸅鳩千頼切鳩也音婦雀也䳅居是切鳥如烏赤足名䳅鵌鷆大堅切尓雅母也鵐亡俱切雀也古刀切􅟇鳥䳝匹部切鳥名鵺音夜鳥名鵌大吾切鳥䑕同穴又音餘鴷音列斵木也口如錐莫括切鴨也鴄音匹鴨也丑力切溪鷘同上鶤古魂切雞三尺或作鵾䳋徒冬切鳥如雞赤足鶥莫飢切鶥鴰鳺方于切鳺鳩鵂許牛切鵂鶹鸎於耕切黄鳥鷓之夜切鷓鴣常南飛似雉鴣古乎切鴣􅨊􅨊似立切鴣􅨊鶜莫交切鴟也􅣽莫切鴟也鶊古行切鶬鶊鳥鷤逹詣切布榖也又逹􅀆切䳏古惠古穴二切鷤䳏鷹於陵切鷙鳥鴔皮及切鴔􅟇􅟇北及北渉二切鴔􅟇戴鵀今呼戴勝鵫竹教切白鵫一名曰雉䳑于九切白鵫鴟充尸切鳶属鵄同上鳽五革五田二切鵁鳽似鳧脚高毛冠鶹力牛切鶹鷅鳥又名鶹􅾶鸝力知切鸝黄又楚雀鵹同上鴜子竒切􅰌鴜􅰌止􅀷切􅰌鴜水鳥似魚虎黒色鷦子姚切巧婦也又鷦鷯亦作鳭鷯力幺切鷦鷯小鳥亡消切鷦鷯音原鳥也鷂以招切五色雉也又以照切鷹鷂鶨丑弁徒頓徒困三切癡鳥鴲至几切鳥鷇未生毛鶆力才切鶆鳩也鵚天谷切鵚鶖也鷩必列切鷩雉可為冕又立冬入水化為蛤他口天口二切水鳥黒也䴌莫公切水鳥亦䝉鳩䳻才三切鵰也鵏布乎切鵏鶆鳩也鵔思俊切鳥狀如鴟赤足直喙黄文見則旱柯額切䫏又音洛烏􅤛古屑切􅤛􅧗鳧属同上􅧗古鎋切􅤛􅧗鴆除禁切毒鳥食蛇其羽畫酒飲之即死鶭芳往切鶭澤虞常在澤見人輙鳴不去象主守之官見尓雅鴋同上􅠍音冒􅜥􅠍􅜥歩千切􅜥􅠍鳥形人靣宵飛晝伏丁幺作幺二切鷯剖葦似雀靑斑居葦又竹交切鷝比吉切鷝鴋鳥鴱五大切巧婦也鴾莫侯切鴾母即也郭璞云青州呼鴾母鶂午的切水鳥善髙飛又五􅀆切並同上鷁同上鶗大戾大􅀆二切鶗鵳應仲春化為鳩鶙同上羊恭切􅖥似鳬一名􅝄􅖥鷇苦亘切鳥母哺子食鶼音兼比翼鳥鷸餘律時律二切鷸似燕生􅊊林知天􅀅雨故知天文者冠鷸同上鵁古爻切曰鵁尾如雌雞又鵁鶄鶄子􅄹切鵁鶄似鴨䳧户溝切雕也鵩扶服切鳥似鶄而大鸓力追切鼯鼠名飛生又力切籕文知革切雉属贛鳥也鷼乎間切白鷼亦作鷴䲽市亦切䲽鳥精列也鶟徒忽切鶟胡鳥文留切􅀯方雉名同上鶾何千何旦二切雞肥皃今爲翰火丸切鷒鶝鶔鵍同上鷒徒丸切鷒鶇德紅切鵍名美形也同上鳴莫兵切嘷也声相命也鶢于元切鶢鶋海鳥鶋㪯魚切鶢鶋鶱許元切飛㪯也鳨音力鳥似鳧而小也同上鳻扶云切鳻雀似鴞同上又鳥衆皃飛皃鶞丑倫切鳻鶞春也鴽汝居切鴿也鳸乎古切北鳸鳥名同上鶅壯其壯吏二切東方雉名鷷音遵音迻西方雉名鵗許衣切切方雉名䲬巨支切雉别名鷨胡􅀲切雉别名鳥光切雉名䴑大頰切如鵲赤黒色兩首四足䳤方列切䳤􅝐鳥也􅝐方于切䳤􅝐大侯切也䳯雉容切䳯鳥市羊切䳯䳐子次切鳥青黄色即鵂鶹􅦵多敢切鳥青黄也􅽑力周切􅽑飛也除切􅽑鳹求炎切鳥啄食䲪乎利切鳥也􅬡才亮切女􅬡巧婦也又名􅬡雀亡結切雀亦巧婦眉筆切􅽑肌継鶧也鶧於京切鳥名鵲七雀切或作鳷之移切鳥名午胡切䑕或作鼯鷶眉解切鷶􅸭子雋也烏含切鶉鶕同上鶉音淳也䳉大冬切鳥名鶈于􅀆切鶈鸎東夷鳥名鵀女林切戴勝又音壬鶝方六切戴勝力灼切鳥也烏而切鳥鳴䳟靡京切鳥似鳯􅬹魯甘切􅬹鳥今之郭公音縷􅬹鳥古隨切鳥也式容切鳥名鶲烏紅切鳥也鷭府􅀽切又音煩􅫫音商􅫫鴹舞則天大雨鴹与章切􅫫鴹時眞切風鳥鶓音苗鳥名鶍与章切鳥名居希切鳥也鴘四免切鷹鷂二年色鷾於記切鷾鴯玄鳥也鴯汝施切鷾鴯鵟巨王切鳥有冠鵨失余切鳥也音臾鳥名䴃女交切鳴䴃黄鳥也鵋其記切鵋䳢鳥也䳢去其切鵋䳢亦作鷡音無鷡鴽鳥也弋支切鳥名䳷在容切鳥名亡奔亡奸二切比翼鳥也鶶徒郎切鶶鷵鳥也鷵大乎切鶶鷵鵓歩忽切鵓鳥先兀切鵓女冬切鳥也匹仁切飛皃或作䎙鶷胡逹切鶷􅗾伯勞也􅗾午鎋切鶷􅗾鴑音奴鳥名音苔鳥名䳿音然鳥名堆戸工切庸也鳥肥大也䧲古丹切䧲鵲也難奴丹切不易之称􅀃文亦作􅴥鳥也並古文古文竹教切覆鳥者或作􅇁䧿七畧切䧲仁眷切鷚雞雉直理切野雞又城一丈三尺為雉又陳也理也古文雋徂兖切肥􅁏又長沙縣名􅨼居彌切子􅨼子䲽鳥子心切雞也䍜古迷切谷名古覓切或作弋属切或作鵒千郎切庚或作鶬集秦立切合也余招切鳥名徳紅切鳥名􅵁昌耳切鳥􅀋徐立切鳥名弋去切斯或作鸒􅃗之石切竒也一枚也五名切禽名䨈音賔小雀也胡廣切田器䧳似垂切又音隹雒力各切鵋鵋鳥也奞部三百九十二凡三字奞先進切鳥張羽自􅁬奞也奪徒活切取也不与也易也怒也諍也􅁬方愠切翬也飛也動也朋也􅁬奞也振也舒也萑部三百九十三凡六字萑後官切老􅈷似鵂鶹有角夜飛食雞鳴人有禍舊巨又切故也又許流切舊鶹今作鵂蒦紆縛於白居莫三切髙視也蘧視皃也度也彠同上呼九切化也雚公換切水鳥今作􅔏瞿部三百九十四凡二字瞿忌俱居遇二切鷹隼之視瞿儉驚懼之皃矍九縛切視而无所依之也鷹隼得逸志也雔部三百九十五凡三字雔市由切双鳥也又除尤切􅀟所江切兩也偶也又飛鳥二枚靃呼郭切飛声又綏被切靃草随風皃亦作霍雥部三百九十六凡三字雥才市切群鳥也又走合切雧秦立切聚也今作集䨊於蠲切羣魚魚部三百九十七三百二十一字魚語居切水中䖝鮞人之切魚子䲊大果弋水二切魚子巳生籕文魼丘於切魚也亦作又它臘切鱏徐林弋林二切鮪也鰈它臘切比目魚鮙同上才枕才箴二切大爲鮓小爲䰼䰼同上鰥古頑切魚名又老无妻曰鰥􅺗奴荅切魚似鼈无甲魶奴臘切鯨也鱒慈損切赤目魚鱦弋證切小魚䱆同上鯢大􅀆切大魚似鮎四足声如人鱨市羊切黄鱨魚也力因切魚名鰫弋恭切魚名魴扶方切赤尾魚也鰟籕文鯇戸本切魚似鱒而大鰌七由切如鯉而小䱬思於切魚名鮪爲􅀑切鮥魚名䱅莫括莫結二切海中魚似鮑鱴同上䱎公登公繒二切䱎鱧鮪也䲛武登武亘二切䱎鱧􅀃文䲛鯀古本切大魚鱺力􅀆切魚似蛇无鱗甲其氣辟蠧䖝也䱤公念切魚也又一音䧟鮆前啓切刀魚也短也鯉力耳切今作鯶鱄市脔切魚名鮮思連切生也善也好也思淺切少也鱣知連切鯉也大魚也頷下无鱗同上籕文鮍匹皮切名鰩与照切魚身翼常從西海飛來東海䲚力大切他逹切魚名鰜公嫌胡兼二切也䱾力侯切大青魚䱂於堯切魚䱱大􅀆切魚四足音如兒食之无疾鱖居月切魚大口細鱗班彩鱀巨旣切魚名似鱏鯾卑連切魴魚鯿同上鯥力竹切魚似牛陵居蛇尾有翼出山海經鱻思連切鳥獸新殺亦作鮮魛丁髙切蔑魛魚也鱮似吕切魚名魣同上鱝防吻切盤尾毒魚也口在腹下鱅与恭市恭二切魚似鰱鱲力渉切魚名鮬蒲故切鱖鯞鯞之酉切鱖鯞鱊古八切尓雅鱊鮬鱖婦小魚似鮒子而黒鰒歩角切海魚又音伏䱲与專切魚名鮦直壟切鱧魚力啓切鮦也鱧同上䱏它口切魚名鮫古爻切䱜属皮有文鯧齒楊切魚名鮒扶句切鰿魚巨成切魚名鰱里然切魚名鰼似立切泥鰌鮑歩巧切漬魚今謂裛魚鱗力因切魚龍之鱗魠他各切名黄頰鮎乃兼切鰋魚鰋於幰切魚名同上儵徒堯切白鯈魚也似雞赤尾六足四目也又直流切鮷大􅀆切大鮎鯷大計切鮎也􅱆徐垢切白魚鮸眉辯切魚名魮父脂切魮魚状如覆銚鳥首魚尾音如磬石出山海經魵逢粉切魚名䲐力古切魚名鰸於于切魚名鯜七援切魚名鱟胡遘切山海經形如車青黒色十二足長五六尺似蟹雌常􅀒雄漁者必得其双子如麻子南人爲醤䱇市演切魚似蛇鱓同上魿力巾力丁二切魚連行也䲌口換切魚撞􅇁也布頼切魚名魦所加切魚名䱡居六切魚也同上魧乎郎切魚名又音剛䱋記􅃁切魚也鱳力各切魿魚鰅娱容切魚名鮊手亞切海魚鮐它才切魚也鱯乎花切似鮎而大鰞音烏鰞鰂魚本作烏鰂疾得切鰞鰂鱡同上鯨渠京切巨魚䲔同上魾歩悲切大鱯又敷悲切鱐思六切鮯母鯁古杏切魚骨鮏先丁切魚臭鯹同上鱢先刀切鮏鱢也于貴切魚似蛇四足鮨巨􅀺切魚名又鮓属鰭同上䱈古文更白切海魚􅪓歩梗切蚌也鮯公市切状如鯉六足鳥尾下切藏魚也鮓同上籕文鮚巨栗切魚也鰻莫安切魚也鰧大曽切魚似蒼文赤尾鰕何加切魵也長須虫鰝乎老切大鰕􅠧子亦切鮒魚鰿同上鯽同上鱁雉六切鱁鮧也又魚名鮧音夷鱁鮧􅫛乎瓦切鱧也鱬而朱切鳥似魚鰠先刀切魚似鱣䲃祖道切魚名鯤古門切大魚又魚子䰴居乞切断魚鮡治矯切大鱯鱵之􅀷切魚名徒括切小鮦䱻胡八切魚如鳥􅱈方娱切􅱈鯕魚也鯕巨基切􅱈鯕鱤公禫切黄魚鰦子夷切黒鰦也鯩力均切魚也䲀之利切魚名鱍市活普活二切尾長皃䱣子律切鯈也鮤才結切鮆魚也䰲於八切魚名逹丁切魚也􅱛所巾切魚尾長鯪力承切鯉有四足鯼子公切石首魚魟呼工切魚名䱢壯耕切魚名鯆夫禹切大魚魺尸多切魚名鮩歩杏切白魚又音並尺尸切鮪也鮛户六切鮪也䱝歩唯切黒鯉也􅭡方韋切魚似鮒鰑与章切赤鱺也鮋直留市由二切魚名鰲午刀切魚名鱎竒兆切白魚鰹古田切大鮦􅧖於报切小鰌鯔壮其切魚名􅡈普乎切􅡈䱐一名江豚扶各切魚似鯉䱐覆浮切􅡈䱐也鯅式延切魚醬鰬巨連切魚也鮹思么切魚名力當切䱺雄也䱺胡哀切䱺力的切魚名􅱚同上鯛丁么切魚名鮭古迷切魚名鯸胡溝切鯸䱌食其汗殺人䱌亦之切鯸䱌􅷼大當切魚名人用切鮐魚䲒胡買切鮦也鮾奴罪切魚敗力戈切魚有翼見則大水鰪於臘切鰪鱂魚也鱂子羊切鰪鱂鱷午各切魚名鰐同上鰶子裔切魚名鮈記于切􅾾鮈魚名􅾾牛胡切魚名􅈄語居切捕魚䰻同上漁亦同上又作鱸洛乎切魚名􅥸火嬀切大魚又音爲鮠午戈午回二切魚名鰊洛見切魚名鯬音犂魚名鮀大何切魚名䰿同上俗鮿竹渉切膞魚也塩漬魚也魤五回切魚属鮃音平魚名鰍七由切与鰌同鰷音條魚名无非切魚名魽呼􅅴切似蛤有文如瓦屋户岩切魚也䱵烏紅切魚也莫侯切魚也音求魚名音癸魚名魳徒合切又所其切魚也鰤音師魚名鰓相來切魚頰音讎魚也鱑户光切魚名鰡音留魚名䲓魚檢切䲓鰅魚也鰅魚容切䲓鰅于匡切魚也於􅀑切魚名上同又音牛鯄音求魚名魡丁呌切亦作釣餌取魚也鱕甫煩切又音煩魚名魨音豚魚名鮼七尋切魚名鱃音羞魚名音乎魚名魪假賣切两魪比目魚音呼又音无鮶音君虫似魚也以周切魚名鰄於非切魚也䲑義竒切魚名鰾毗眇切魚鰾可爲膠士咸切又音䧟子林切魚名魜而眞切魚也鮢諸如切魚也鮽与魚切魚也鰴火韋切鰴魚絶有力鯖倉經切魚名又音征旴􅀑切魚也莫六切魚名居偃切魚也鰢莫下切魚也魚怯切与四魚同呼以水切又音唯鱌音象魚名魢疾里切魚也音巽魚名􅵐音小魚名營􅃗切魚也音耶魚似蛇長一丈音宁魚名鰖音妥魚名音唯魚名鱭音斉魚属䱜倉合切又音錯魵府吻切魚名鰵音慜魚名鮌音鯀魚名魬音販魚名先顕切魚也䱮音額又音頡魚也之利切魚名䱰直勇切魚也時正切魚也魱音互魚名力際切鮣一刃切魚如印也匹亘切大魚音化魚也䱿初䧟切魚也鮄音佛海魚音尉魚名鱉并㓕切俗鼈字鯡音沸魚子胡幹切魚也􅷀音罽魚名於䧟切魚也音柰魚名䱒於業切塩漬魚居六切魚也音歩魚名布宻切魚也鮥音洛大魚鯠洛該切魚也鰏彼力切魚名鮜胡闘切魚也親悉切魚也䱚力玉切魚也䲜音業魚盛也鮅卑吉切魚也鯟德紅切魚似鯉也直律切魚也䱅音末魚名䱕莫浮切魚也先了切魚也呼蓋切魚名魮父脂切鳥首魚尾音如磬鮂似由切魚也又作鮋音舟魚名鯶乎衮切魚也都郎都浪二切魚也􅦏部三百九十八凡二字􅦏語居切􅀃文二魚也言居切捕魚也与漁􅈄同大廣益㑹玉篇卷之二十四
