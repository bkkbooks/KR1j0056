body:
  text: 大廣益㑹玉篇卷第二凡一十四部土部第九三百五十六字土他户逹戸二切􅀃文地之吐生物也堣遇俱切堣夷地名自所出書作嵎坤苦魂切从土申土位在申墍虚旣切仰􅂗又音洎堛普逼切土塊也壘力癸切軍壁也塙口交切土堅不可拔又口角切壤如掌切地之緩肥曰壤垝居毁切毀垣亦作陒垶息營切赤埾上㙚同上出􅀃文堄魚礼魚計二切城上小垣廣雅女牆圪語訖切牆髙皃亦作仡堵都魯切垣也五版爲堵墉余鍾切牆也垣禹煩切垣墻城視盈切丗本鯀作城公羊百雉而城㙩力彫切周垣也又力召切塒視之切鑿垣而栖也堊烏洛切白飾牆壁補歷切垣也塾殊鞠切門側之堂記黨有庠家有塾坫都念切反爵之坫又屏也埽蘇道蘇悼二切埽洒墣普角切塊也圤同上墊都念切書下民昏墊溺困水災或作蓻壚力都切書下土墳壚䟽也墽口教口交二切磽也坡匹波切坂也垍期致切堅土也墼居的切􅀃文瓴適也一曰未者埴時力切書厥土埴墳土黏墝口交切墝埆􅇤地也埾秦喻切土積也摩鉢切塵壤也蒲京切地平也亦作坪又音病墐竒鎮切塗也又溝上之道基居期切始也謀也址諸耳切基也初力切遏塵也壐昔紫切􅀃文王者之印以主土籕文從玉㙙力奉切塗也又木貢切型戸經切鑄器之法模垤徒結切螘􅃁也堢補道切隄也塞蘇代切隔也蘇得切實也滿也蔽也埝乃頰都念二切下也䧟也壓於甲切塞補又鎮也埩仕耕切耕治也堟除兖切耕台也墇止讓止楊二切隔塞也亦作障圣口骨切汝頴間致力於地坅丘錦切坎也坑也堀求物切突也坌蒲頓切塵也壇徒闌切封土􅀕祀壇猶坦也明坦皃塡徒堅切塞也滿也又作窴坦他􅈸切寛皃又平也埯於坎切泥坑也力陳切隴也塓莫歷切左圬人塓館􅂗也杜預曰塓􅂗也坴力竹切土塊坴也又坴梁増作登切加也益也壄亦者切古文野􅘖蒲忽切塵皃圭古畦切六十四􅁰爲圭亦瑞玉也墺於報於六二切四方之土可居書四旣宅亦作隩古文古文胡昆切洛陽有大里堚同上地題利切􅀃文元氣初分重濁隂爲地萬物所陳列也墬籕文坲扶物切塵起皃徒頰切城上女牆也堞同上垓古苔切國語天子之田九垓風俗通云十經曰垓垕胡苟切古厚字力哲切塍也塹七􅃩切溝塹字書云城隍壍同上均居迍切平也等也編也董仲舒曰五帝學曰成均埌力盎切􅃁也齒志切赤土也墀除飢切以丹􅂗地也同上視陵切隄也埓也畔也􅀃文云稻田畦也亦作塖水埒亦同上壏音檻強壏堅大坶莫六切坶野地名書作牧㙁同上坻直飢切水中可居方言坻􅂣也又音底坂也俗作坘同上㚀虚竒切毀也塊口潰口回二切堛也莊子大塊凷同上封甫龍切大也厚也鄭玄起土界大戴礼五十里爲封古文封或作堗徒忽切竈堗坄壁切塊竈亦作垼炈垼同上埤避移切附也補也増也詩政事一埤益我埤厚也㘨乃篋切㘨莫也塷音魯温地也埻之允之閠二切猶隄也同上垷古典切􅂗也蒼頡云大坂在墍西山又胡典切墱都凌切小坎也㙂烏弄切牆也毀麾詭切壞也􅃜也破也古文垔於仁切書鯀垔洪水塞也杜預曰土山亦作陻堙同上古文垔壞胡怪切毀也籕文作􅭔古文坺扶厥切一曰臿土詩曰武王載坺一曰塵皃又音跋墢與坺同亦耕土􅒤時夜切􅒤器也垢古偶切不㓗也塵也坸同上坋扶粉切書厥土黒墳注色黒如墳起坋與墳同􅀃文塵也一曰大防也堆都回切聚土也塠同上又塠落也垖亦同上坎苦感切易曰坎䧟也尓雅小罍謂之坎詩坎坎伐檀斫木聲也或作埳苦感切䧟也亦與坎同楚辝云塪軻不遇埂古杏切小坑也堂徒當切土爲屋基又容也坣並古文甫問切除埽也古文塏口亥切髙燥也左傳云更諸爽塏呼園切樂器燒土爲之上有六孔塤同上坃古文壦古文垎胡格切土乾也堅也廣雅曰啓索枉也圯皮美切毀也書方命圯守壙苦謗切空也墼穴也㙻遲連切居也与廛同塼煑縁切甄甎亦作塼堤常支多礼二切又音低与隄同垐才資才即二切土増大道塗逹乎切路也經也㙴之豔切蔽也壈力感切壈坎也堪苦含切勝也書西伯堪黎又堪任也墨莫北切書墨也又墨刑埵丁果切埆也堅土也埥七盈切青精土堶徒果切飛塼也墠常演切書壇除地也􅀃文野土坿復俱扶付二切白石英也堫子公切楚双切種也垟余章切土精也垀火烏切垺垀也坷口哿切坎坷不平梁國寕陵有坷亭㙤呼嫁切坼也本亦作鏬埐才心子心二切地也埦於阮切烏管切㙰戸買切地名堥亡勞莫柔二切前髙後平丘也在存改切存也􅀕也居也垺盧拙切封道曰垺塘徒郎切隄塘也壆降角切土堅也呼各切􅀷也阬也塹也尓雅虚也溪也㙠於奚切塵㙠也又於計切堁苦卧切塵也又地名口交切土也圵徒㓪切髙田扶福切地窟又音覆亦作􅠈坒毗利毗栗二切相次坒也垑充是切治土地名壕胡髙切城壕㙎於切决塘埍胡犬切徒􅀠所居又女牢一曰亭部堨於割切壁間􅂩又擁堨也㙪於計切天隂塵起也墭食正切塩器塉情迪切薄土墳扶云切尓雅云天防方言曰􅃁埱充叔切氣出土也或作淑壝欲癸切欲追切壇也坬古罵切土埵也塵除仁切塵埃坳烏交切不平也莊覆杯水於􅉾堂之上垠五五巾二切垠厓也岸也㙬古文與圻同塢烏古切村塢埡同上堋補鄧切下棺也或作亦破遏垽五靳切殿今江東呼垽壔下老切髙土也堡也境羈影切界也疆居良切境也界也邊陲也又作畺壃同上坥且余且絮二切螾􅂣曰坥口忽切掘地爲室也博厖切土精也􅄟􅀝厲切幽也藏也薶也尓雅􅀕地曰瘞薶同上􅂣亦尺切疆􅂣亦道之别名域爲逼切居也封也㙡咨容切土菌也坊扶方切障也甫良切坊巷也亦州名埅扶方切与防同圯弋之切橋也史圯土老人㙀力救切壣也畋也坹而勇切地名堬􅁃俱切秦晉間􅃁或謂之堬􅩵側六切塞也坑苦庚切塹也壑也亦作阬壟力竦切􅃁也亦作壠鉗减切兆名堭胡光切尓雅無室曰榭即今堂堭也塣文井切通也㘲居六切涯也水外爲㘲墲莫胡切規度墓地也祛輦切小塠也墦扶貟普安二切􅃁也劉盟曰壁之方大也塸烏侯切墓也墆徒計徒結二切􅀮蔽皃塋余切塋域葬地也堉音育地土肥也才山切埤蒼曰門聚在睢陽􅤎去竭切界也墥敕􅃹切鹿踐地亦作疃墟許于切居也大丘也埁才心切山形也塔他盍切字書塔物声􅀃文云西域屠也墏次養切墏基也徒古切填也塞也或作􅖏古獲切國名端烏弄切牆也㙱胡道切土釡􅀃文作土堥也垕乎苟切古文厚埰且載切有采地者葬因名堜力見切堜墟在塼平垻必駕切蜀人云平川垛徒果切射垜􅀃文堂塾也亦作垜壒於蓋切塵也垘扶目切漢書川塞谿垘孟康云垘崩也如淳曰填塞不通墌之亦切基址墅余者切田也又食与切村也田庐也墜直􅀋切落也培薄回切益也記墳墓不培猶治也又音部方言􅃁或謂培坨羊之切地名壡干贅切智也明也聖也古睿字圼与㘿字同堲在力切疾也書堲讒􅀃殄行又音唧火熟曰唧檀弓曰夏后氏堲周又古文垐字墤徒雷切落也壞也与憒同墰徒含切地名坉徒混切水不通不可别流埿蒲鍳奴􅀆二切埿塗也埫丑􅃁切埫塎不安也塎餘􅃁切埫塎埆口角切墝埆不平也埈思俊切陗髙也與陖同埋莫階切藏瘞与薶同坂甫晩蒲板二切坡也圬於姑切泥墁一作杇垺抚俱切郭也正作郛力果切古文祼或作祼埢羈􅂐切曲也亦作觠奴結切塞也埭徒切以土竭也圱且田切三里曰圱甫問切草土薉本作堠胡遘切牌堠五里一堠塲始羊切封塲又耕塲堈古昂切器也亦作􅕜初戢切􅕜累土也塿力狗切小􅃁又培塿小阜堝古和切甘堝以烹煉金銀埪苦公切土埪龕也㘺扶滑切耕也亦作垡㙳口感苦紺二切㙳坷胡八口没二切囚突出也坰圭營切郊外曰坰古作冂􅎬辝􅀋切墓道正作隧墡時闡切白堊名白墡計堯切㐲土爲􅆑也坹呼决切􅀷也空也亦作䆷㙇五玉切牛馬所蹈之處墻疾羊切垣墻正作牆㘱它藍切水衝岸壞也埇於隴切淮泗地名􅳖壯交仕交二切地名􅳖陽堰於幰切壅水又於建切之􅀷切鄩古國名塕烏孔烏公二切塵也塚知隴切墓也正作􅃁垚部第十凡三字垚五幺切土髙也堯五彫切善行徳義曰堯古文部第十一凡九字居隠切草也􅀃文又巨巾切黏土也堇同上䒺古文奴安切不易之􅁛又乃旦切易曰蹇難也又畏憚也難同上居顔切阻艱難艱同上籕文里部第十二凡三字里力擬切邑里也周禮五鄰爲里國語五家爲􅁤十􅁤爲里野余者切郊外也又常渚切􅁵力之切書傳云理也方言云貪也蒼云賜也亦􅀕餘肉也又音禧田部第十三八十一字田徒堅切土也地也􅀃文陳也樹榖田田畔蒲半切田界也㽨在河切殘田也略力灼切用功少曰畧又強取也要也法也利也求也􅕨仁縁切奴過切城下田一曰􅕨􅁍也又城外隍内地也㽭同上俗當都郎切任也敵也直也又都浪切主當也底也畹於逺於萬二切王逸曰田十二畒秦孝公三十歩爲㽜同上田三十歩也疇直流切書九疇孔安國曰九􅀋也杜預曰並畔爲疇􅀃文疇耕治之田也畬與居切田三歳曰畬亦作畭古文畬畜許六切養也容也􅀃文曰畜也又許又丑六二切􅀃文同土益也畛諸引諸鄰二切十天之道􅀃文井田間陌􅷂古文疁力周切田不耕燒種也除了切田中穴也㽥如由切和田也畎古泫切隴中曰畎孔傳曰􅀷尺廣尺曰畎甽古文畦胡圭切田五十畒又隴也畿渠衣切天子千里地甸徒見切畿甸也畇蘇均徐均羊倫三切詩畇畇原隰注墾辟􅵆同上畮莫走切司馬法歩百爲畮􅅿同上畎􅅿也畞􅀃文與畮同畷猪衞切􅀃文兩階間道廣六君又陟劣切畊古文耕字町徒頂他頂他典三切田處界耕薤切疆界垂也畍同上畸居羲切数畸亦作竒􅀃文殘田也㽩千紺切十也他典切餉田皃亦鹿跡力才切田今爲萊疃吐管切鹿跡也畽同上又他本切畼敕向切不生也㽤九陸切韭畦也疄力振切轢田也本或作直里切諸或作庤畉防無切耕田㽡音碑㽡田也都籠切地名居容切㽤也丠部第十六凡五字丠去留切虚也聚也􅃁也土髙曰丘又丘居㐀同上丘同上虚丘居切大丘也今作墟又許魚切空也屔奴􅀆切尓雅水潦所止屔丘亦作泥京部第十七凡四字京居英切尓雅絶髙爲之京郭璞云人力所作公羊傳云京者何大也音薄也就才救切成也即也乆也郭璞云成就以終也籀文冂部第十八凡八字冂古螢切林外曰冂象逺界坰同上􅀃文冋古文冂从口象囯邑市時止切丗本云祝融作市冘余針切行皃从人出冂央於良切中央一曰乆也詩傳央且也冊音琮冊孔也隺乎沃切髙至也部第十九凡八字古穫切今作郭大也度也苦宂切缺也于元切籕文垣毗離切女垣也籕文陴于㳟切古文墉亦作都可切廣也又垂下皃今作嚲時征切籕文城都戸切籕文堵邑部第二十二百七十八字邑於急切國也四井爲邑􅀖補江切大曰􅀖小曰國亦界也鄼子管切百家爲鄼鄼聚也又子旦切南陽有鄼縣在丸切䣊丁莽切居也曰五百家爲今作黨鄢於巘切鄢陵縣名又於乾切郡求愠切郡縣秦三十六郡鄰力臣切五家爲鄰郛方俱切左鄭人入其郛杜預郛郭也鄙補美切小國又陋也不慧也䣝杜胡切馮翊有䣝陽亭郊古爻切邑外曰郊鄗許各切常山縣光武即位改爲髙邑邙莫旁切河南洛陽北土山上邑邮與鳩切長安邮亭又音笛都當烏切都采地也郣蒲突切勃海郡曰地起曰者郣邰土䑓切姜嫄邑帝嚳元妃邰氏女也鄏如蜀切成王定鼎於郟鄏郵音尤境土行書舎也邪以遮切郡名又音斜語曰思無邪􅑢渠離切縣名亦作岐古作㟚郤去㦸切晉大夫叔虎邑所教切大夫食邑鄯時戰切鄯善西域國又時演切郇相倫切郇伯文王子今河東有郇城郁於六切有扶風郁夷縣渠雄切書有后羿鄭直政切國名郔與旃切鄭北地邺去牛切地名邱同上郖徒透切弘農􅁃地又音兠􅠥姑戾切地名今作薊呼古切地名邳蒲悲切地名汝諸切地名鄝來鳥切地名祁渠夷切太原縣又多也郿莫悲切縣名又音娟酆孚弓切地名䣡魚竒切徐地名女九切地名䢳居里切地名鄃􅁃娯切清河縣名又音輸邠補珉切國名亦作􅃎鄻力􅄛切周邑鄣之羊切莒邑名希及切地名始居切縣名郾於献切頴川縣又於㦥切鄠胡古切右扶風縣名鄆爲愠切魯地名午姑切魯下邑呼土切魯地名邩呼果切地名那奴多切縣名又何也多也扈胡古切國名在鄠側界切周邑名郲里該切城名邖所間切地名􅥇胡臘切地名䣂力對切䣂陽縣亦作耒䢸此諸切右扶風郷名鄐許六切􅀳邑酅胡圭切紀邑名居大切地名公安切地名邴彼景彼命二切宋下邑郝呼各舒石二切郷名邵是照切晉邑邽公􅂝切縣名與金切地名欣陵切地名􅗪上留除留二切蜀縣名奴經奴顚二切郷名鄍莫丁切晉邑胡光切古國名鄀如灼切國名邥舒甚切地名鄶光㑹切祝融之後國名扶園切京兆郷名邲蒲必切晉邑酀於田切地名邤許斤切地名鄵七到切鄭地邧牛逺切邧新城􅀃文鄭邑方朱切縣在溤翊鄜同上鄸莫中切曹邑䣔胥果切河南亭䣎莊􅁵切郷名䣄似諸逹胡二切魯城名叩音口京兆藍田郷名巨諸切聚名才含切貝丘亭胡􅁅切郷名子移切谷口酄虎官切魯下邑蛇丘縣也郗刺􅀺切周邑在河内郱蒲經切地名􅙉户光切古縣名䣅時眞切姓也烏昆切蜀郷名䢴古寒戸安二切呉城名鄩似林切河南地名貟弓切國名蒲故切亭名人丘切郷名徒紅切郷名郮之由切國名黃帝後所封邶蒲内切紂城北曰邶鄁同上鄌徒郎切國名無沸切地名􆅁􅀉魚切國名於盈於井二切地名邘禹俱切河内有邘城郹古􅞔切蔡邑郃侯各切縣名郩胡交切地名九􅅞切地名鄬爲彼切鄭地也亦作􅧰力奚切書西伯戡􅧰鄾於牛切鄧地名徒東切古國名如舟切邑名此栗切齊地邨且孫切地名亦作村音豚鄇胡豆切晉地又音侯如羊切南陽縣七課切山名阻生切國名􅧬丁玉切縣名鄟諸縁徒􅁊二切邾婁之邑巨焉切聚名在河東䢵有軍切地名唐盧切地名古熬切郷名毗聊切地名鄈渠惟切汾上地漢祠后土鄔於古切晉邑又音烏鄘與恭切南夷國苦昻切地名胡遘切縣名䣐於京切地名邢胡丁切國名輕干切地名同上鄖有軍切國名子思切谷名呼光切縣名扶岩切地名䣤苦􅅞貝􅅞二切郷名鄴魚怯切魏郡有鄴縣力追切地名䣋七海切地名胡老切邑名􅛿才孫切縣名邯何安胡甘二切趙邯鄲縣鄲都闌切上同邡音方廣漢縣名䣕莫霸切又音馬知升切國名余舟切郷名胡絳切門外道與巷同輕彫切縣名在鉅鹿鄨俾逝切縣名所間切地名古喚切亭名䣙薄梅切郷名鄽直連切巿也俗作䣑鄡苦么切豫章鄡陽縣詩沼切魯地名郕食盈切縣名於亦切地名語其切郷名邸都礼切邸舎又邑名郅諸逸切郁郅縣名仕咸切宋地名􅼜昨焦切地名邼去王切邑名去虐切地名所留切狄國夏爲防風氏鄋同上邟口盎口行二切縣名鄦欣吕切國名在潁川邒徒苓切郷名郟古洽切洛地又縣名郪七􅀆千私二切縣名苦怪切汝南郷名郙方禹方殊二切亭名具孫切郷名郢以井切故楚都南郡江陵同上郋胡雞切汝南地名鄧徒亘切縣在南陽力之切郷名蒲當切汝南亭名鄎思力切汝南新鄎縣胡髙切南陽郷名酈郎的切縣名又音蹢五俱切地名鄛助交切南陽郷名䣚力兠切郷名在南陽公逹切縣在南陽䣁于矩切南陽舞隂亭祖浩切築陽邑名力止切南陽亭名邔丘紀渠記二切縣名鄂五各切西鄂在南陽鄳亡庚切縣在江夏􅻬九小切國名郫薄糜切蜀郡又音脾亡願切廣漢郷名鄱薄波切鄱陽縣也百交百勞二切地名息俊切地名酃郎丁切長沙縣名郘力語切鼈縣亭名鄮莫候切㑹稽縣名鄞五斤切㑹稽縣名䢾息典切國名補大切郡名亦音沛䣜􅍈柯切沛縣亦作鄼鄑子斯切縣名在北海郜故到切済隂城名􅌏皮変切邑名鄄故縣切東郡鄄城名䢻時眞之刃二切地名邛渠㳟切蜀臨邛縣郠古杏切琅琊邑名子省切地名鄒仄牛切魯縣俗作鄹同上又音聚亭名俗郰側牛切魯邑語作鄹䢼居顒切邑名又亭名鄅記甫有甫二切國名邿式時切任城有邿亭郕時盈切東平郕郷䣍烏歛切周伐啇奄也余之切地名郞力當切魯邑又官名郈胡走切東平无塩郷古切大也城郭音郭郭同上䣢慈夕切蜀地名郳五奚切東海郳城􅢬徒切地名在済南郯徒甘切東海縣名子代切故國在陳留邾中􅌮切國名鄫在陵切今琅邪縣邞方無切琅邪縣邭巨俱居住二切地名郂古哀切陳留郷名􅿭音迁地名部傍口切分判也部曲也䣇渠留切郷名在陳留䣘徒郎切邑在廣陵同上􅥧徒紅切地名又姓也郆居一切地名又郆成山䣀渠詭切山名又音詭䣆胡經切髙宻郷名䢿於于切當陽里名力脂切國名郼於畿切殷都讀如衣莫郞切郷在藍田􅘌步回切聞喜郷名渠今切亭名在重安口􅀌切秦地在河南鄺音荒姓出盧江縣􅬬知盈直盈二切地名郴丑呤切桂陽縣名􅞣彼兾切邑名語作費或作鄪鄪同上鄕許良切五黨名亦作郷鄚亡各切􅃰郡鄚縣司部二十一凡四字司胥兹切司者主也􅀃文臣司事於外者也伺胥咨司志二切候也察也又作覗詞似兹切意内而言外也籕文士部二十二凡四字士事几切事也傳曰通古今辯不然謂之仕數始於一終於十孔子曰推一合十曰壻思計切女子之夫或作婿壯阻亮切健也大也墫七旬切詩云墫墫舞我爾惟喜也或作鐏亦作蹲大廣益㑹玉篇卷第二
