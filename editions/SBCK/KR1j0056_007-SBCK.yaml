body:
  text: 大廣益㑹玉篇卷第七凡十一部足部七十六二百九十一字足子欲切􅀃文人之足也在體下从止口蹏徒奚切足蹏也蹄同上踧逹的切行平易又子六切跟柯恩切足踵亦作跪渠委丘委二切拜也渠類切跽也踝胡瓦切足踝也躣渠俱切行皃跖之五切􅀃文云足下也蹠同上又楚人謂跳踦居綺丘竒二切踦曲迂避也䟠詡月切急走皃蹐子亦切小歩也䠪他􅆑切踐處也又行速也跽竒凡切擎跽曲拳也踽九禹區禹二切獨行皃詩獨行踽踽跾舒育切疾忽也躋子􅀆切登也踰與俱切越也詩無踰我里踄蒲故蒲名二切蹈也跧莊攣切􅀃文蹴也一曰卑也豢也䟗時􅁓切尌也䠛余昭切跳也蹻渠略居略二切舉足行髙踖子石切踧踖行顧也踶徒計切蹋也莊馬怒則分背相踶跌徒結切仆跌也踼徒郎切行跌踼躩丘􅅞居􅅞二切足躩也躤在亦切踐也亦作踖蹷渠月居月居衛三切僵也又跳也蹶同上􅀃文同上跇翼丗丑丗二切超踰也躡女涉切登也蹈也踞記恕切蹲踞也大戴禮獨處而踞蹲在昆切踞也蹇羈演切跛也踣蒲北匹豆二切僵尸也䟔方付切趨赴亦作赴蹯輔􅀽切熊掌也左傳宰夫胹態蹯不熟􅫯同上蹁蒲堅切足不正踊俞􅃁切跳也在曲踊三百躍余灼切跳躍踊躍跗方俱切足蹯上也儀禮棊結下跗趺同上趼魚見切蹄徤也跛布火切跛足又碑􅀉切躨渠追切躨跜跜女時切躨跜龍動皃出雪光殿賦距梁吕切雞距也趹古穴切疾也䟸渠追切脛􅁏也又曲脛踵之勇切足後曰踵􅐅測角切齒相近声又初六切謹皃躗禹袂切衞足也䟷丑厲切踰也跔渠俱居劬二切不伸也躑丈􅃗切躅不能行蹢丈􅃗切蹢躅行不進又都歷切蹄也躅馳禄切蹢躅䠱同上趽蒲亡蒲庚二切曲脛馬蹛都頼直例二切踶也蹌七羊切􅀃文動也書鳥獸蹌蹌相率舞也􅭣亡遇切長跪也蹪徒雷切仆也蹙子六切浞也詩政事愈蹙踤財律切觸也駭也跣蘇殄切跣赤足書若跣不視也踕才叶切足疾也躐口涉切踐也踳姝允尺轉二切色雜不同䟴之仁之刄二切動也蹼􅀘木切爾雅鳬鴈醜其足蹼踆且遵切踆退也趾諸市切足趾也躟仁羊仁養二切行疾皃䠧徒加切䠧跱行不前蹜所陸切論語足蹜蹜如有循跡子昔切蹤跡也跱除几切行止也閭切古履字踐也礼也蹎丁千切行蹎跋也蹩蒲結切蹩􅍷旋行皃一曰跛也􅍷私列切蹩􅍷䠟大叶切䠟足也蹔徂濫切不乆也與暫同七羊切行皃蹡同上相俞切足行也蹊遐雞切蹊徑也躒令的切動也蹵七六子六二切蹴蹋也蹴同上蹋徒闔切踐也蹈徒到切踐也􅄤直連切踐也躂他逹切足跌也跳徒彫切並足起也踐慈剪切行蹋蹋也徒頰切行走声趵方車切足擊声踾普力切蹋地声䟹吕絶切踰也跕都牒切他叶切跕屣也踔敕卓切踸踔跛行也踸丑甚切踸踔􅞶同上跈乃殄切蹈跈也阻流切獸足也趿先荅切進足有所拾也􅨬他合切􅨬趿也踏他帀切足著地䟘公朗切伸脛也芳昭切輕行也䠐丘役切踞皃踹都館兖二切足跟也跲渠劫居業二切躓也䟧逹堅切蹋地声蹖舒庸切蹋也䟡丁戾切䟡蹋也子采切走皃跢丁泰切倒也丁佐切行也踒於卧切行足跌也䠆仗良切拜跪也踃先聊切跳踃也躝六安切踰也䠘普計切偶也跂豉切跂踵行不正口衮切􅏿足不行也䠍何加切足所履䠇渠勿切足多力躧所倚所買二切舞履也蹝同上䠊扶謂切刖足刑也亦作剕字書云亦䠊字躄俾亦切跛甚者蹃如藥切蹈足皃跀五刮五厥二切斷足亦作刖􅞨同上躁子到切動也易震爲决躁路吕故切道路途也跙才與切行不進蹍女展切足蹈也跬羌捶切舉一足行也蹞同上蹟子亦切不蹟不循道也踇莫后切踇偶山名丑丗切度也䟾徴劣切跳行也䠡才他切足蹋声也同上䟣禇律切獸跡又獸名蹕比栗切謂止行者蹤子龍切蹤跡也跆逹來切蹋也蹸吕振切轢也車踐也躙同上踂女􅂺切兩足不相過䠯余灼切登也拔也􅛤去俱切跛行也舉虞切足冷痛蹗力谷力玉二切行也䟿同上才含才合二切上出躊直留切躊躇猶豫也躇直於切躊躇踚力迍切行也􅩚歩般切􅩚跚也跘歩般切足跘也跑蒲篤蒲包二切蹴也跦陟俱切跦跦行皃踈色魚切慢也不密䠕千來切踐升也口交切足也曲王切足也蹉采何切蹉跎過也跎逹何切蹉跎不及也􅿆他􅀆切􅿆蹋踐也䟕䇿渉切䟕踏也䠓七由切足病也他紅切走皃跐祖解子爾二切蹋也蹀徒篋切􅉜蹀足也􅉜蘇叶切􅉜蹀也􅹿布眠切行不正􅓷相然切行也􅢶在䰟切跡也跟吕唐切跟䠙欲行皃䠙蒲唐切行踉䠙也􅽃上今切足履峻也式延切行也蹺去堯切舉足也跠羊脂切跠踞也蹮酥田切蹁躚猶蹣跚也蹣薄安切蹣跚旋行皃跚先安切蹣跚踜魯登切蹶也歩登切走也巨皎切行也䟟且欲切迫速也或作促趗蹨乃殄切蹨蹀跡也跏古牙切結跏蟠足坐都婁切跌也􅟸寺羊切趨行也魯甘切急行也跰補孟切散走或作􅘠普胡切馬蹀跡也䠑去弭切勿足開皃烏賈切行不正蒲郎切也跓直主切勇足也踥日獵切䠙踥往來也跁蒲瓦切跁跒不肯前跒口瓦切跁跒丑狎切跂足也䠀尺兩切踞也􅡑莫后切大􅡑指躘吕㳟切躘蹱小兒行皃蹱職容切小兒行皃䟨宻云切行踔跛也踠於阮切生曲䠏蒲淚切足行也初産切􅀐馬也踓千水切蹵也亦作趡跉力呈切跉䟓行皃䟓丑丁切跉䟓躓知利切躓跲也趶口故切踏也胡困切行也跮丑利丑力二切跮踱也踱丑略切田各切跮踱跥都果他果二切行皃則候切蹋也盧候切蹋也牛㓜切跛行也䠋補爾切古髀字股外也踡具貟切踡跼不伸也跼渠足切踡跼䠨昌占切馬急行户愛切行正也甫味切急行皃何諌切脛骨也與骭同跤苦交切脛也亦作骹他殄切行皃古狎切然行声徒故切足不履七外切行皃䠣先卷切􅆯獸足罔也踟直知切踟蹰行不淮蹰直朱切踟蹰他各切弛亦作跅落帶切跛行也徒律切走皃踁何定切腳踁與脛同䠗丘幼切足䠗也渠㓜切也多則切行也䟯苦活切蹵也蹘力交切走也蹭七亘切蹭蹬無能也餘斂切行疾趨也䠈他忽切蹂䠈踐也九六切足也魚曲切行不正徒沃切行不正時兖切腓腸也正作腨䠢莫仲切足疲行皃於合切足跛也踛力竹切翹踛行也初角切行也許言切行也踘九六其六二切踘躡也胡庚切獸跡與迒同蹂仁柳切蹂踐蹋也跫苦紅切跫然蹋足声直列切癡列切足也蹫圭律切跛皃匹貝蒲未二切急行皃􅀘艾切歩行獵跋也􅚢丘盛切一足行皃子力切蹙走也女六切行也蹳普未切行也跨苦瓦苦化二切越也蹬徒亘切蹭蹬不能行跋歩未切跋􅍷行皃䟮父六切行皃疋部七十七凡四字疋山居山慮二切足也一曰記也山於切門户青䟽䆫也山於切通也逹也月令其器以逹今作䟽之丗切姓也王莽時有惲部七十八凡四字公懷切背吕今作乖子亦切背亦作苦媧切斜也傘音散蓋也骨部七十九凡八十六字骨古没切􅀃文云肉之覈也骲蒲交平剥二切骨骲也又蒲校切骲擊也前賜切死人骨也作骴同髊前賜切腐骨也声類云此亦字骿歩田切骿脅也骰􅀌魯切或股字脛本也俗又音投骭遐諫切脛也亦作居岸切與骭同左傳拉公而殺之渠月切骨也骹苦交切脛也體他礼切形體也髃牛口切􅀃文曰肩前也髑徒木切髑髏頭骨也髏力侯切髑髏䯏光末切骨端也髍亡何切㾫病也䯠於老切􅆎骨髀補爾切又歩米切股也髆補各切􅀃文曰肩甲五髙切蟹鈐也髎力條切髖也骺下溝切䯏骺也䯋薄葛切肩髆也髁口卧口禾胡瓦三切髁骨髖苦官苦昆二切髀上䯓口圭切六畜頭中骨蒲益切弓弭髇呼交切髇箭骽他罪切骽股也􅩋蒲忍切人生朞而􅂰端生䯣丘貴切􅂰脛間骨􅕐公本切夏禹王父名徒昆切与臋同髗力胡切頭髗也䯌口髙切䯌骨也骸何皆切骨也左析骸而爨骾柯杏切食骨留嗌中髈浦朗切股也又音旁髐火交切髐箭也户經也骨也去俱切身也骶丁計切背曰骶又臀也髓先委切骨中脂也􅾸同上出􅀃文式車切骨也五加切髂也䯟徒對切骨也胡骨切􅂰病又骨差也䯜丗切骨黄汁也口㑹切愚皃也巨綺切小骨也􅧥百罵切刀􅧥也府貢切匈也於仍切􅇩也受也亦作􅈾骼柯頟切禽獸骨曰骼䯈五丸切骼䯈也胡代切骨也骮與力切小骨也匹角切骨箭也苦紅切又口江切骨也䯤公外切五采束髮也骻口化口瓦二切腰骻七没切小骨也髉此角切骨也知劣切續骨也􅐳胡葛切􅐳􅚯肩骨􅚯羽俱切􅐳􅚯缺盆骨䯊口亞切􅆎骨也髂同上同上乙吕切肩骨也􅒸都骨切鳥鳴豫知吉凶䯦亡八切䯦骱小骨骱古八切䯦骱胡郭切骨声也於力切骨也䯇口骨切用力也於力切􅇩亦作臆䯞口􅀲切䯞髂上骨五􅀲切䯞骯口朗切髒體盤髒子朗切骯髒骫都詭切骨曲也虚玉切顱亦作頊䯑苦光切䯑䯖股骨也䯖魯唐切䯑䯖血部第八十凡二十三字血呼穴切􅀕所薦牲血衈如志切耳血醓吐感切礼醢人堂醓醢醓肉汁同上衃匹尤匹才二切疑血也逹零切􅀃文定息也􅎺呼黄切血也左傳土封羊亦無􅎺爼於切礼人掌供七􅉁酢清菜同上奴冬切腫血也亦作膿衄女鞠切鼻出血也􅤀居衣切􅀃文以血有所別塗􅀕也䘓空紺切羊疑血也同上捕胡切申時食籒文餔字子仁切氣液也衋許力切傷痛也書民罔不衋傷心乎獵切覆也又何不也盍同上䘏思律切憂也亦作恤衊莫結切汗血也衅虚鎭切牲血塗器􅀕亦作釁䕄之承切􅉁也臠力兖切肉臠力官切脊骨膀步方切脅也亦作髈胱古黄切膀胱也脬普交切膀胱也胻户當切脛腨也肖先醮切似也脫徒活吐活二切肉去骨肥扶非切身肉多也腓扶非切脛腨也腨時兖切腓腸也胤余振切嗣也古文䏖余忍切脊肉也又丈忍切肒胡玩切搔生瘡曰肒胄直又切裔也膻徒亶切肉膻也䏌呼乞切振眸也䑋如掌切肥也胼歩田切胼胝皮厚也胝竹尼切手胼足胝也膌才亦切􅋯也臞渠駒切少肉也脀之仍切騃也胗章忍切脣瘍也隋他果切裂􅁏徒果切下也膢力侯切飲食􅀕也肬羽流切贅也胅大結切骨差也脪香蘄切腫起也腫之勇切廱也胡護徒切何也又牛頷垂也朓通堯他召二切􅀕也胙在故切􅀕福􅁏脤時忍切脤膰也腆他殄切腆厚也䐌古文朐渠俱切脯也記左朐右未肴户交切爼實又啖􅁏腬尓中切肥美也膳時扇切具食也䏟巷結切肥肉也胘何千切牛百葉腒巨於記於二切乾雉也腯徒骨切豕曰腯肥也胵充脂切烏胃也䐹所流切乾魚也膍脾脂切鳥膍胵肶同上膊普各切殺賊去衣磔之也􅿤字書同上脯方武切腊脯也腊思亦切乾􅁏出膋力彫切脂膏也膫同上膷虚羊切今肉中生息肉也臐呼雲切􅌜也羊曰臐胥思餘切蟹醢也胹􅈛之切煑熟也膹扶吻切􅌜也膮呼么切豕􅁏也腌於瞻於劫二切醋腌肉也䐞如灼切肉表革裏奴雞切醢也肍渠留切熟􅁏醬脠始蟬切生􅁏醬䏽蒲侯切豕􅁏醬腏知劣切挑取骨間肉也脼良仰切膎脼脯也腥桑丁切豕息肉胜桑丁切犬膏􅆨臊蘇刀切豕膏臭同上脹猪亮切膨也字書亦作痮䐄胡監切食肉不厭脂之伊切脂膏也膩女致切垢肥也膜密各切肉間膜胾側吏切大臠也肎口等切􅀃文骨無肉詩曰惠然肯來可也今作肯肯同上􅌜呼各切羮􅌜也膚府隅切皮也易噬膚㓕鼻肤同上脕無阮無怨二切色肥澤也又音問新生草也䐑治􅂺切薄切肉蘇旦切雜肉也胑至移切四肢手足也肢同上脃青歳切小耎易断曰脆脆同上俗同上又七絶切膎户皆切脯也脙呼尤渠尤二切瘠也同上胔疾移七移二切人子腸也䏙他感切肉汁滓也䐜充人切引起也腐抉甫切爛也膟力述切膟膋腸間指同上䐿於六於吿二切烏胃也膠古爻切皮煎黏者脡敕鼎切脯朐也臚力居切陳也肰而旃切犬肉也然字从此古文膱之力切油敗也又膱脡也䏍烏衒切小蟲也空也腍如甚切熟也臅齒欲切臆中膏朦莫孔切大也豊也䏵同上腡力戈古華二切手理也􅢓郎戈郎果二切獸名䐆千代切大腹也肱古薨切臂也腱渠言渠建二切筋本也同上胞􅀘交切匹交切胞胎也膂力佇切脊骨古呂字䏪如志切筋徤也腠倉奏切膚奏也􅮸先恣先進二切肉􅮸腦蓋䏤同上䐲直入切治􅂺切生熟半也胖普半切牲之半體也膉於亦切脰肉也䐀居義切四䐀也脈莫革切血理也一曰筋脈脉同上臉七廉切􅌜也力减切臉䑎䑎初咸切臉䑎羮也膒於侯切乆脂也䐨胡木切足跗也䏼在安切獸食之餘也㱚同上脮乃罪切魚脮他罪切腲脮腲烏罪切腲脮肥皃腩奴坎切煑肉也同上䑂羊汝切肥也又音與同上肨普江普降二切肨脹也肵渠衣切爼也敬也􅏬余之切猪􅏬也胋徒兼切大羮也䐣桑衮切熟肉内於血中和也匹遙甫遥二切也徐廉切沈肉於湯中䑄匹備切盛肥也􅶘相力切􅶘肉也臏毗忍切臏骨也又去膝蓋刑名膆息兎切肥也亦與嗉同直基切理也古治字腖都弄切􅁏腖也䏧女下切肥皃䐢側䆒切䐢脯也之曳切魚醬縷迦切腸胃也逹冬切古疼字痛也腪于郡切膜也于貴切皮也胡灌切肥也普宻切吹肉也脩息流切脯也又長也䐾大各切肫䐾無檢限􅆄許訖切􅆄蠁也肐許訖切身振也苦骨切臀也䏱居六切身也䐤楚加切䐤腵脯腊也力賄切腫皃䏘普栗切􅁏多􅦭丑一切滑皃腟丑一切肉生下革切肉也䑇之日切䑇䏷也刀箭瘡藥腧式注切五藏腧也女治切􅁏消也叱渉切􅁏動䐂力嘱切脂也膈古額切􅇩膈膛他郎切膛膛肥皃膅徒郎切肥也䏦古滑切脂也脻慈叶切接也􅀄夾切肉腤􅧐肷許律切牛肉脘古卵切胃脘也朊同上又人隂異呼也䑈比角切祀􅁏炙之腋切炙􅁏側里切脯有骨同上又食所遺腄竹垂切瘢也馳僞切縣名烏切膪肥也膪陟嫁切膪膞旨衮切􅁏片筋部八十二凡三字筋居勤切􅁏之力者周礼醫以辛飬筋伯角切手足指節鳴或作肑䇟渠建巨言二切筋也本亦作腱力部八十三凡八十五字力吕職切勲也強也􅀃文筋也象人筋形助鉏據切佐也劼苦八切固也功古同切以勞定囯曰功勲許軍切能成王功也勛古文勑力代切勞也吕庶切助也同上勝舒陵切任也舒證切強也務亡句切強也事務也勱莫夬切勉也渠月切強力也勍渠京切強也勁吉聖切彊也勠吕竹切陳力於人也勶儲例切發也劭上召切勉也勉弥辨切強也勗呼玉切勉也勸丘萬切勉也動徒孔切振也作也劣力拙切劣弱也勮渠據切務也勊枯勒切勝也勩與制切勞也同上勨餘掌切繇緩也勉也劵巨眷切勞也勤渠斤切勞也募莫故切求也加古瑕切益也㔡方結切大力也㔣力對切推也又懷也􅭍吾髙切健也勇俞種切果决也勃蒲没切卒也勡匹照切劫也飭丑力切正也勦楚交子小二切勞也劫居業切強取也勵吕􅀔切􅂆也勢舒曳切形勢也勘苦紺切覆定也勔弥淺切勉也劬渠俱切劬勞病也方萌切大也劮余質切豫也劤居僅切多力也劺莫侯切􅂆勵也䯇苦兀切勤也勬九貟九緩二切勤也㔝吕繦切勥也扐疾來切古材字㔞苦乖切劥也劥口庚切㔞也勣子亦切功也居偃切難也或作􅟌㔗符沸切勇壯也皮筆切古弼字勜於孔切屈強也劜猗􅃛切勜劜也劷與章切􅂆也力徵切侵也俗陵字勌居貟切力勌也勆魯當切強力也㔦於兩切􅂆也何滿切勤也竹甚切用力也祖賀切助也副也劾胡蓋胡勒二切推劾㔠胡割切勤力也勒盧得切抑勒也勎力竹切勎力也何切用力也㔧力御切又力胡切助也劻曲王切劻勷遽也勷如羊切走皃劰莫角切勤也勥巨兩切廹也同上勞力刀切劇也又力到切古文㘞户卧切牽船声効胡孝切俗效字劦部八十四凡三字劦胡頰切同力也山海經惟號之山風風若劦急也
