body:
  text: 大廣益㑹玉篇卷第二十一凡三十部􅁳部三百十三凡二字􅁳莫庭莫定二切窈也夜也郭璞曰幼稚者􅄀昧鼆亡映切杜預曰魯邑又冥也又亡庚切夕部三百十四十二字夕詞積切暮也邪也亦作穸夜余柘切夜暮也􅀃文夜舎也大下休舎也夤弋人切進也大也又楊也籀文夝疾􅄹切􅀃文雨而夜除星見亦作晴夢莫忠切乱也不明也又莫貢切今想字外午會切􅀃文表也逺也夘古文㱳亡客切寂也於逺切轉卧也夙思六切早也且也敬也古作􅀃文夙多部三百十五二十六字多且何切大有也衆也古文􅢲所陳切姓也多也或作騂兟甡􅳉奴孔切郺􅳉盛多皃郺於孔切大多或作古壞切大也於果切多也㗬丑加切說文厚辱皃又暖口也㚊口才切多也大也亦作奓㚉公戸切多積利也夡丘二切多也奴多切哆也夠苦侯切多也丁含切多也㚋丁幺切多也大也亦作奝余章切多也亦作洋昌占切多及也女切冗多皃音均因也力口切多也卶尺豉切大有􅂟也㚌胡果切楚人謂多也㷇苦回切大也􅾬扶留切多也㩼章移之䜴二切多㚍口罪切多也小部三百十六凡六字小思悄切物之微也細也少戸沼切不多也又始曜切㓜也予列切小也少也尖子廉切銳也乃口切小皃㝻其靳切對也或作僅廑幺部三百十七凡七字幺於條切㓜也郭璞云後生也力計切背也􅀃文戾也亦作戾乙例切􅀃文不成遂急戾乙肖切急戾又小皃幼伊謬切稚少也麼亡河亡波二切小也思此七紫二切亦作小皃􅖨部三百十八凡四字􅖨伊蚪切微也巨乙切埤蒼云􅠟也􅠟音幽伊蚪切不明也深逺也微也古作幾居衣切動之微也吉凶之先見也期也危也尚也又居扆切㡬多也又巨衣切玄部三百十九凡五字玄胡澖切幽逺也妙也又黒色􅏏古文玈來乎切黒也或作黸玅弥詔切今作妙精也兹子貍切濁也黒也或作滋丏部三百二十凡一字丏亡殄切不見也賔麫字􅀙此大部三百二十一五十六字大逹頼切易曰大哉乾元万物資始老子曰道大天大地大王亦大夸苦華切奢或作姱字奯許活切空也大目也公胡切大也奅普教切大也夾古洽切近西廂也又古恊切奃丁計丁奚二切大也視均切􅀃文大也夽魚吻切大也􅴨飢􅝳切大也奄猗檢切大也覆也大有餘也息也㚠火幺匹幺二切長大也方結切大也亦字四万切上大也奜孚􅀑切大也禹安禹晚二切奢也大口也才邪切大口也䯨口大切擊也今作㪡奒口才切大皃也奝丁幺切大多也掅紫切直大也􅀃文火介切瞋大声也火計切奢盛埤蒼云肥大㚜麾城切方也大也丸磚切健皃奚下雞切大腹也夷弋脂切平也敬也滅也易也蛮夷或字奕弋石切大皃美容也行也仕下切夸自大也太它大切甚也奇巨冝切今作竒契口計切劵也大約也又口給切奰皮秘切不醉而怒也壯也耎而兖切又作柔也古文与軍字同乙獻切大皃㚖公老昌石二切大白澤也古文以為澤也奓竹加切下大又邪切奘昨朗切大也盛也尖子廉切小細也音奚獸跡也奫猗切木皃吳都賦泓澄奫潫奈奴太切正作柰字奆求阮切甚大也㪯朱切邪視皃奩力切香奩也分勿切又扶勿切大也同上雉慄切􅀃文大也音兹不正也蒲罪切大也他皓切長也奪徒活切取也同上多又切取也子隨切大也奦音務人也奢部三百二十二凡二字奢式邪切侈也泰也張也亦作奓奲丁可切充者切大寛也火部三百二十三二百九十三字火呼果切􅛚也燧人造火火者化也煩古迴苦迴二切火光也或作耿然加旋切燒也言如是也燃辱延切俗燒燃字烝之承切火氣上也進也冬􅀕也又之孕切燋子薬子消二切炬火也所以燃火也焌予閏子寸倉聿三切然火燒户遥切火焚揔名燎力弔切火在門内曰庭燎又放火也灼之薬切灼灼花盛皃又􅀬也明也炪丑出許出二切鬱也火光力弔切祡􅀕天炟丁逹切爆也燹先踐切野火也爆歩角布角二切落也灼也又比教切火声熮力酒切火皃燒也爛也徒甘切燎也小􅀬也燔扶藩切燒焚也炥扶勿切火皃焞徒門切无光耀皃他雷切盛皃又它門切爼下切才和切束炭也齌子奚才焍二切炊釡熛必堯切火飛也力振切火皃炯公迴戸頂二切明察也光也炦歩結切氣上又歩􅁑切甫勿切火盛皃􅀃文炭它旦切燒木也爚弋灼式灼二切光也電光也熚卑出切熚熚火声也炱大来切炱煤煙塵也煤莫杯切煤也灰呼回切死火也煦吁句切烝也赤色也温潤也􅀬也亦作昫熇許皓切熇熇火熾也烓口􅅆烏圭二切堪也煁市林切也烘許公切燒燎也烈力折切火猛也􅀬也威也業也餘也煨烏回切盆中火爊也熄相力切畜火滅想也燀尺善切炊也炊尺垂切㸑也烋火虯切美也福禄也慶善也又火交切􅛚麾詭切火也烈火也燬並同上烰音浮火氣盛皃㶴充尔切盛也􅋹而恱切燒也􅌊同上烄公巧切交木然以燎祡天並同上焠青對切堅刀刃熑力兼切絶也在陵子稜二切魚筒中炙熷同上煏皮逼切火乾也㷶並同上熾尺示切火盛也同上於根切炮炙以微火温􅁏煾同上焚父云切燒也燌炃並同上爓與廉切火焰也烜况逺切火盛皃炮白交切炙􅁏也炰同上㷅初絞切火乾也􅵇炒並同上炔古惠切煙岀皃炅同上又古逈切煪自留切煪熮火燒也同上燧似醉切以取火於日亦作鐆㸂並同上煓它丸切火熾也㷰丑知切火焱也㷷子規切火熾亦作同上㷭孚逢切㷭燧表邊有急則熯而善切火盛乾也㷳五旦切火㷳也炵它冬切火焱也子姚切火燒黒又炙也焦同上煎子連切火乾火去汁熬五髙切乾煎物也胡沃切火灼也戸沃切猛火灼照之曜切明照也烛也炤同上煬余尚切炙也對火也灸居又居有二切灼也燂似廉似林二切􅁅燖同上又火􅀬也煜余六切火焰又盛皃焴同上炖徒昆切風与火也又赤色焮許勤許靳二切炙也炘同上又􅀬也煝亡利切焃也煈非鳯切焚也中吕切熏也熸子廉切火滅熸也煆許嫁切􅀬也乾也炑莫十切火熾也熽蘇弔切火熾也爈力魚切燒也烊亦章切炙也烳怖古切把火行也煽尺戰切使火熾也㷆乆切熾也熦咨略切灼也熆胡臘切燒也烯欣衣切亦晞字燫力兼切燫熪火不絶熪以支切上同烗口戒切熾也勲許云切功勲也子悉切虚計切焪丘仲切尽也乾也灱許交切乾也爆也焷毗支切缹也熻許及切􅀬也爖魯紅切火皃灴户公切火盛也㸎女渉切煗也或作焇思遥切乾也亦作銷缹音缶火熟也􅇏戸東切􅇏火也爐洛乎切火爐也烐職由切火行也力善切火小然也焟思亦切乾也亦惜同熰烏侯切火炮熰熧子從切火行也弋支切火燒也煘徒廉切鉗也爡丑伐切􅝏焥燒起也焥於活於伐二切上同熡勒侯切火炎也㶯力又切火㶯也灯的庭切火也炷之戍切燈炷也爌苦謗切光明亦作曠炴乙井乙丈二切火光爙如飬切火皃也熩呼古切火皃烶徒頂切火也炓落嘯切火光皃炬其吕切火炬亦作苣爁力蹔切火焱行也燇子巽切火也熃武遇切主火也㷬慕各切火也爅莫北切光皃也㸅子日子力二切火也烼許勿切烼火煨也炢丈出切上同爩於勿切煙出皃熼與力切火也爀呼格切火色也燩口角切火乾物也㶼烏來切炫也􅀬也燉徒昆切火盛皃燏餘律切光皃㶿蒲没切煙起皃炠胡甲切火熟也煠弋渉丑渉二切爚也炈唯辟切陶􅍳怱也煑之與切亦作鬻燆去堯切火行也爔許其切火也炣口我切火也炶胡甘切火上行皃亦作煔燈都騰切灯火也燭也煃去弭切火皃㷃丑水切火乆也署與切野火也口蓋切火也焄詡云切火上岀也亦作熏如之切煑熟亦作胹焝火困切火也烇七選切火皃焰以贍切光也力熖切火也㷤火各切日出赤皃亦作燘呼回莫賄二切爛也灷士倦切火種也焀火哭切火皃亡結切不明也煂下革切煂燒也煍子了慈乆二切変色也爍式灼切灼爍又銷爍㷿火嚴切火皃也孚訓切火乾物莫割切不明也㶡呼果切火發声煥乎換切明盛亦作奐爞徒冬直中二切熏也煄之龍切火燒起煩父􅀽切煩也燒也燐力刃切􅀑火亦作粦􅯢丑渉切火燒殘熟市六切火変物也炎部三百二十四凡十字炎于詹切􅀬也焚也暑日也􅀃文火光上也㷠力仁力振二切􅀑火也煔胡甘切又大念切火光也燄弋贍切火行火生皃胡甘切火行皃欻許勿切􅁀起也力甚切火起皃古文光字以灼切火氣也燅似廉切温也湯中瀹􅁏也亦作焱部三百二十五凡三字焱弋贍呼昊二切􅀃文火華也熒胡坰切灯之光熒熒猶灼灼也亦熒陽縣燊所臻切炎盛和皃炙部三百二十六凡七字炙之亦切􅀬也之夜切膾也籀文㸋父園切􅀬肉或作似廉切湯瀹􅁏也爒力照切炙也同上乎濫切􅁏也亦作䐄㸑部三百二十七凡四字爨千乱切竈也齊曰炊籀文釁許靳切以血􅀕也瑕隙也動也罪也兆也或作巨容切所以支曰鬲也又方奉切囱部三百二十八凡六字囱楚江切􅀃文在墻曰牖在屋曰囱又千公切通孔又竈突窗同上囦古文怱千公切怱怱多遽也忩同上俗悤古文黒部三百二十九八十八字黒訶得切韓康伯云北方隂色􅀃文火所熏色􅲂多逹切白而黒也漢書五原郡有莫􅲂縣黤烏敢烏檻二切靑黒也黸力胡切齊人呼黒也䵮式羊切赤黒色黗他孫切黄濁色之林切􅀃文晳而黒古子晳名又音緘黚巨炎切淺黄也又音琴黝於紏切玄黒微青色干殄切黒皴也䵱許極切赤黒色黲千敢切淺靑黒色今謂物􅀅敗時顔色也黔巨炎切黔色黑色也䵵又刮切黄黒又短皃黥巨京切墨刑也䵞同上黨丁朗切朋也周礼五族爲黨五百家也黕丁感丁甚二切黕點垢濁記林切黄黑如金也䵨莫江切㝠暗也黰之忍切美髪也黜丑律切退也貶也下也去也放也絶也黷徒卜切數也垢也黑也黠閑八切慧也堅也亡姦切畫車輪百昆切黒也儵他大的尸育三切靑黒繒也急疾也黵丁敢切太汚也又黑冠黒歩安切姍下色皃䵴余證切靣黒也力煩切竹􅂨黒黓余力切太歳在丑曰玄黓黮敕感都甚二切不明净也􅱙徒見切亦作垽也烏圭切汗也五凶切黒穴也黫於顔於仁二切黒也亦作黭於􅅴於敢二切黭黯也黟郁咨切黒木又縣名巨今切黄色也黶烏忝切黒子也亡狄切草木叢也亦作覭同上部三百三十二凡八字壯力切傾頭也今並作側公莭切􅀃文頭傾也蒼頡云仡仡也胡結切頭裹態也力結切上同吳午胡切姓也亦郡也古文具眉切顧也左右視俾折切今作彌弓戻也夭部三百三十三凡四字夭􅀝苗切少長也舒和也於僑切屈也又折也喬巨嬌切髙也又喬木又居橋切奔布昆切走也以罪走出他國曰奔今作奔戸耿切遇也亡口而免凶曰又天子所至也或作今作幸交部三百三十四凡五字交古肴切合也共也更也道也或作詨于非切􅀃文也絞古夘切絇絞䋲索也又縊也又乎交切殺也火于切古盰字許維切恣也或為睢尢部三百三十五三十三字尢烏光切跛曲脛也又也短小也俗作兀尪同上尳乎没切膝疾也㞁余昭弋照二切行不正也㝿布左切塞也今作跛㝼於于切股㝼也㝾子賀切行不正尲佳咸公炎二切行不正也尬公拜公鎋二切尲尬刀卧力爲二切􅔂尯丘僞切㝿也都􅀆切也戸圭切不能行人所也㞇烏潰切㞇㞂病䨾也尰市腫切足尰亦作瘇同上在果切尤坐也逹奚切不能行人所引也㞂他潰切冘然坐定皃丑孝切蹇也或作踔㞄烏感切蹇也立委切􅀹立皃尥平交力弔二切牛行後脛相交也㞆飢蟻切一足也今爲踦呼恢切尵馬病也尵徒隈切病馬也同上歩臥切仆也又歩􅃸切㞅郎卧切㞅不止也呼恢切猪地也巨逆切倦也尮丁卧切尮尢也於千切辛苦行不得皃壹部三百三十六凡三字壹伊日切專壹也聚也合也皆也誠也亄􅀝秩於旣二切貪也懿於兾切專乆而美也叀部三百三十七凡六字叀職縁切自是也小謹也擅也獨也業也壹也今作專文竹利切跲也仆也礙不行也或作躓一本作惠玄桂切愛也仁也賜也慈也恩也賙之衣食曰惠又作古文部三百二十八凡五字知柱切􅀧也有記而識之卞皮變切法也又地名主之乳切家長也典也領也君也守也天子女曰公主㕻妨走他豆二切相與語唾而不受也咅同上丹部三百三十九凡七字丹多安切朱色也同􅶑並古文雘於縳切山海經雞也下多丹雘􅀃文美丹彤徒東切丹飾也赤色蚒同上􅶤補姦切古班字賦也靑部三百四十凡四字靑千丁切東方色也四時春爲靑陽古文䨼呼故切青也又青䨼山名静疾井切審也謀也息也氏部三百四十一凡二字氏承紙切蜀呼山岸欲墮曰氏崩声又姓氏居月切木本也今作厥氐部三百四十二凡四字氐丁􅀆切至也又丁礼切於進切又竹四切仆也㲳知栗大結二切觸也乎孝切声􅀋云誤也大廣益㑹玉篇卷第二十一終
