body:
  text: 大廣益㑹玉篇卷第二十八凡一十二部巾部四百三十二一百七十二字巾凡銀切佩巾也本以拭物後人著之於頭且勇職茸二切裩也同上火光莫郎二切也隔也幋歩丸切覆衣大巾􅜳孚云切拭物中帉同上幎亡狄切大巾也幔簾也覆也幂同上㡇丁兼丁頰二切衣領端或作帤女於切大巾又幣巾之利切礼巾而震切枕巾幧七消切幧頭也歛髪也㡑同上㡋於劫切幧頭也橐也幅甫六切布皂廣狹幣婢制切帛也幘測革切覆髻竹与切䘾衣亦作褚同上常市羊切也下帬也今作裳㡓古䰟切也又作褌帶多大切紳也㡏思俱切正端列幟尺志切巾也又始志切同上􅯋力甘切无縁衣亦作襤㡜先列切殘帛又音雪㠲皮鄙切㡜裂也帨始銳切巾也帥同上今爲將帥字即山律山􅀋二切帗布逹切一幅巾又方勿切飾尸食切著也章表也帖他頰切帛書署力未切拂也帔披僞切在肩背也又普皮切披也帴所㸃思冝二切帬也帔也帚之酉切掃除糞穢子廉切拭也幝充善切車敝皃帙除乙切小橐也書衣也或作幕亡各切覆上曰幕亦作幙幃呼韋切香囊又音韋帣居瑗切囊也席似赤切床席幐大亘切囊也两頭有物謂幐擔又大登切子田切蟠幟也或作㮍牋幖俾消切幟也幡也㠾於元切㠾幡也幑火韋切幟也幡也扶忿切以囊盛榖太滿折裂也又弓筯起莫紅切衣巾也覆也蓋衣也㡉公田切布也出東萊幩扶云切飾也幏公亞切蠻布㡔亡遇莫乎二切布也覆車衡衣也幭亡結切帊幞也蓋幭也襌被也帪之仁切囊也馬兠也俾移切今作裨亡教切帼也幗古誨切也覆髮上也或作簂又古獲切㡘力沾切帳也施之户外也帳知亮切帷也張也幬也帷于眉切幕也帳也幔亡旦切帳幔也幬直流切褌帳也同上幠火胡切大也有也覆也張也尺占切車或作裧㡅乃可切􅍲也㡞力宇切古姓也口妖切袴也巨炎切絹也㡒丈旬褚旬二切載米也㡙方迷切車㡙又車帷幞扶足切巾幞也帊匹嫁切幞帊也帾丁古切幡也􅰸武俱切欲空也奴回奴昆二切著也塗也似廉切覆也巾也芳勿切韜髪呼麥切裂帛声匹仁切乱皃纤螢切覆也帑乃胡切金布所藏之府又音儻許偃切又音幹布袋力制切帛餘也㡂同上尹勢切㡂也㠿子移切㠿布也布本故切織也陳列也帙方于切衣帙亦作衭口􅃸切指沓也㠵呼光切巾也幰許偃切車幰尸力切亦作帟余石切平帳也又承塵也㡚古候切甲衣或作褠帽莫到切頭巾子内切五繒帋之尓切亦作􅁓帍乎古切婦人巾乎坎切壅耳也或作䘶父畏切隠也亦作厞㡟早刀切籍也子小切拭也㠽徒冬切巾㠽也他紅切丁皎切􅔮繒頭也􅔮思俱切也亦作繻幯子結切拭也􅻋酥甘切衫破皃房脂切布也丑朝切細絲徒亶切衣不束也亦作袒㡥於靳切韏也裏也帬音羣与裙同㠺音沙細絲􅳄苦工切巾也幊古紅切㡈亡辨切亦作絻括髮也公了切脛行縢也羊脂切音牟切人衣巾音巾也幁思于切於乎口􅀌切投也亦作帿胡鈎切射帿古作侯側巧切音是巾也音揆幜居永切帛也幍口洽切帽也絹幘或作􅝊帢並同上戸犬切都子切絹也音擬巾也音扇㡗大􅀆切􅩴㡗又㡗帷也􅩴許格切􅩴㡗赤紙㠷古合切以席載榖㠹音介幘也同上㡝音俸巾也帺巨基巨記二切巾也亦作幢直江切翳也或作帓亡撥莫瞎二切帓巾虞樹切幌戸廣切帷幔也此芮切巾也幨尺占切帷也亦作襜裧􅱄七旦七見二切幧頭也㡋也火或切巾被風他紅切帒徒戴切盛物囊音昨㡗帆扶嚴扶汎二切船上帆与舧同帹所甲切帹㒾面衣也幦莫狄切布幄於角切帳也帞莫格切絡頭也人質切枕巾五伯切又音客紩也亦作緙粗冬切帛又布名音决他合切帳上音託也弥兖切幕也市部四百三十三凡二字巿甫勿切韠也亦作韍帢古洽古沓二切巾也或作韐帛部四百三十四凡六字帛歩百切繒帛也錦九飲切錦綺也下刮切細也亡孝切綵􅄂文􅢹他敢切青黒繒亦作裧力足切今作緑衣部四百三十五二百九十四字衣於祈切上曰衣下曰裳衣者􅀮也又依也又於氣切以衣被人也裏力耳切衣内也袼力各切毉袼䙔也即小兒次衣又古洛切腋不縫也褕余招切畫雉於王后之服又弋朱切葉褕短度絹也又襜褕直裾也衯孚云切長衣襣毗二切犢鼻褌三尺在作形如牛鼻相如所著也襲以立切左衽袍也入也重衣也因也還也掩其不備也古文作㦻籕文袒大亶切絻衣也肉袒也或作襢又除鴈切縫解也衰先和切雨衣也今作蓑又史追切微也又初危切等衰也裓古㝵切衣裓也裨補移切接也益也又婢移切副將也亦姓或作䘚作没切衆也􅀠人給事也行鞭也又千忽切急也又子律切終也今作卒卒同上複方復切重衣也厚也衣有著也又複除不役税也襳所衘所炎二切圭表飾也小襦也襌襦也又襳纚毛羽皃衫同上裔余制切裾也表也蛮夷之揔名也邊地也古文襺公殄切袍也褘許韋切畫翬雉於王后之服也蔽膝也袽女居切所以搴舟漏也袾袽敝衣也袽牀也亦作䘫褋徒頰切褌衣也􅵄同上褚丑吕切又張吕切市官也卒也裝衣也䙏歩各切襌衣也媮也約也儉也磷也非也沽也大也今為薄襘公外切領會也袛丁􅀆切袛裯襜褕也裯丁勞切袛裯又文流切襌被也牀帳也裁在來切制衣也裂也衮古本切衣畫爲龍文襛女容切厚衣也丁了切短也衸戸界古拜二切衣裾也刺膝也又衣長皃知彦切丹縠衣又王后衣襢同上又与袒同袳尺􅈛切長衣皃袲同上袉大可切裾也又大何切袉袉羙也俗作袘褗於幰切衱也䙔也隠被也袋徒戴切囊也亦作帒襐似丈切首飾䙝思列切私服襗余石除革二切袴也􅀃文大各切襮布各切領也衣表亦作襤力三切衣无縁也襦人朱切短也同上俗被皮彼切衾也幰也又皮僞切加也及也裺於劒於撿二切縁也被也袥他各切廣大也衸也袷古洽切衣無絮裌同上衵女秩切近身衣也日日所著衣也衭方于切襲袴或作㠸袑市兆切襠也袴上也䙗敕細切褓也女加切敝衣裎除貞切袒也衣揚也又敕領切襌衣也衽而甚切裳際也衣䘳也褆時􅈛切衣服端正皃褽於貴切袵衣也襞卜役切襞衣也襭下結切袵也以衣扱物也亦作擷襁居兩切襁保負兒衣也裴歩回切長衣皃又姓補布古切治故也竹几切紩衣也袊力并切衣袊也宜袊婦人初嫁所著上衣褸力侯切衣䘳裳際也衣壊也􅀽宇元切衣長皃又姓裝爼良切束也褁也􅸩七入切襟褖也衿巨禁巨今二切今作今褌衣綴也結帶也表碑矯切衣外也上衣也書也威儀也明也標也同上古文袗之忍之刃二切玄服也裖同上袤莫􅃸莫侯二切南北曰袤帶以上也廣也籕文褵力支切衣帶襋几力切衣領也衣衿也同上褶徒頰切衣有表裏而無絮也又似立切袴褶也音煨垢衣衾丘林切大被也䘳居吟切交䘳衣領也襟同上褧古迥切衣无裏也詩衣錦褧衣􅸩且立切裙縁上也尤夫切衣袍衧同上䙃他卧切徒卧切衣无袂也同上袪丘於切袂也衣裏也㪯也襌多安切衣不重也袕胡决切􅀑衣袢扶元切衣無色褰起焉切袴也又褰衣也䙭同上裻先鵠切新衣声又都梏切衺似嗟切姦思也圍也褌古䰟切或作惲裱方妙切人領巾䙱市欲切長襦也連腰衣也襩同上襑似林他敢二切衣博大也襚似醉切綬也死人衣袸疾見切褰脬衣􅰁古穴切袖也襱除龍力公二切袴襠也踦袴也同上裾姜魚切被也袿也衣也裞式芮切贈終者衣被䘹子憒切襌衣褹牛􅀔切袂也襄思良切上也除也駕也成也古文褍丁丸丁火二切正幅衣也䘺除莧切解也或作袒䙢子孕切汗襦襓如招切劒衣裕瑜句切物饒也寛也道也同上襃布刀切揚美也衣愽裾也褖他乱切褖衣見周礼䘪尺終切襌衣䘿渠物切䘪䘿力果切袒也亦作倮躶裸同上褢爲乖切苞也胷袊藏物也並同上袂弥銳切袖也裂力折切拆破䄢子梨切裳下緝也疾也鞭也􅒥同上襜尺占切蔽膝又襜揺動皃襝裧並同上袧口豆切䘮服䘯山交切袑也裋市主切裋褕也竪所衣布長襦同上都鵠切衣背縫也並同上衪與支切縁也衣袖也䙄叉入切重縁也袚芳末切蔽膝也又蛮衣襏同上襡大口上局二切短衣也人衣袖襬彼皮切􅀜東人呼裙袨胡絢切黒衣壯􅀉切襦縐也丁兼丁頰二切領耑也亦作㡇袩同上多木切衣至地也補也襆布木切裳削幅也褯才夜切小兒衣褠古侯切襌衣似又切袂也又余乆切進也袖同上褊卑善切急也狹也衣小也力賀切女人上衣䙇仁全切褐也褓布老切小兒衣袜亡月切腳衣袍薄襃切長襦袌同上又歩報切衣前䘳䘶胡坎切壅耳或作袠除失切亦作帙袟同上裀於人切衣身禋同上衷知冲切當也善也正也此見切衣亦作菁輤于歸切袖也古裓切衣上羅􅗩同上䘾公緩切袴襱也袾尺朱竹采二切佳好也裿丘螘切好也亦作婍力狄切急纒裗力牛切衣縷袔何个切䘸袖也同上袓似與切事好子邪切縣名䙯子六切好也鮮明也䙎戸佳切袖也褾必了切衣袂同上䘢竹與切敝衣力􅀕切殘也繒餘或作褈除恭切複也增益也䙕子蒙切褌衣匹末切衣袂袏子賀切衣包囊襀子亦切襞襀也褫直尓刺尓二切奪衣也繖也且勇切褌也或作戸孤切衣䘸也衩差賣切衣衩袣弋􅀔切衣長皃礿之若切襌衣裼先的切袒也脫衣見躰也襉公限切暈衣又君八襇衴丁敢切衱縁也襴音闌衫也音遲又音知况于切大袑衣袺公曰古頡二切執衽也且席切膝裙衸也衳音鍾小褌䘴同上又音悚小袴也子絲切音江衣帶褿七刀才刀二切帴也袵也於可切弱皃亦作旖䙅烏消切䙅襻也䙉音旬古登切又音亘裶方非切衣長皃裹古火切苞也又古卧切袲奴可切袲衣好皃音横褡小􅀍褡都盍切褡襙千到切衣也䙩莫紅切衣也褹女介切布襦牛􅀕切複襦衧公但切摩展衣或作紆褺徒頰切重衣又縣名襹所冝切􅗒襹毛羽皃衶直勇切袴也於琰切襊且栝切衣領也冠也衣游縫也䘽牛迷五細二切衣裗裛於瞱切囊也衣帊也衼章移切衹衼胡衣也方未切服切祻音故􅥗市容尸容二切􅥗褣襜襬褣以恭切􅥗褣襵之渉切詘也幕也袴口護切脛衣亦作絝落蓋切金倒切裳市羊切障也所以自障蔽亡報切小兒頭衣本作曰製之丗切作也裁也䙈户溝切䙈衫小衫也襯初覲切近身衣褟丁塔切衣也襎扶元切裷襎韈也也裷九逺於元二切裷襎䘨古鳥切䘨􅤨小袴也􅤨力鳥切䘨􅤨襈仕眷切重繒也裮尺羊切披衣不帶䙔於侯於部二切頭衣也次衣也袡加廉切縁也婦人上服袀居純切戎服也純也䙤音朶好也䘷方結切袂也敝衣也裐居縁切褊也褐何􅁑切袍也馬被袒衣也䘰式然切車韞䘰帑也衲奴荅切補也或作納當口切衫袖所拜切衣􆁫縫襻普患切帥下系褮胡坰於營二切衣開孔又畏衣襠多郎切裲襠也又袴襠也䙐口革切裘裏或作襖烏老切袍襖也䘻輿六切車覆䙬烏迸切裠襇也烏幺切衣又蛮夷衣也褑爲眷切佩䘳也佩絞也袛之移切又音􅄮音據衣也䘝以力切衫也褥而欲切氊褥袿古􅀆切裾也婦人上服也袪也袈古牙切袈裟胡衣裟所加切亦作毠㲚音受衣也古莧切衣也䘼於阮切襪也作旦切亦作好也妍也扶溝切歩尤切減也裠巨云切裳也亦作裙䘸之赤切衣掖下也袖也又音亦衱居業切裾也又衣領裘部四百三十六凡四字裘巨留切索也招也終也務也又皮衣也同上求同上用也見也索也口革切裘也裏也或爲䙐卩部四百三十七凡十三字卩子結切瑞信也今作節牛果牛戈二切科厄木節也厄果也无肉骨也仕轉切二目也巽字从此子候切􅀃文云闞令力政切命也發號也皮筆切今作弼寋羈展切難也蹇産屈曲也又其偃切卶充豉式鼓二切有大度也思栗切脛頭卩或作膝卲市招市照二切髙也卷九免九媛二切収也或作韏又作捲又渠貟切曲也膝曲也卸先夜切舎車也又馬解也卻去畧切又居略切節卻也俗作却印部四百三十八凡二字印伊刃切執政所特又信也印謂之璽於直切按也亦作抑夘部四百三十九凡二字夘子兮切事之制也􅀃文音卿卿去京切置正卿九辟部第四百四十凡三字辟婢亦切法也理也歴也又卑益切君也䢃魚吠切理也亦作又必益切治也苟部四百四十一凡三字苟居力切急也自急救也亦作亟古文敬居慶切恭也愼也肅也勹部四百四十二凡三十五字勹布交切裹也且烏切伏行匃古􅂚古害二切乞也行請也取也丐同上巨六丘六二切曲脊也匍歩乎切匍匐伏也手行尽力也顛蹶也匐歩北切伏也路也旬似均切十日也徧也均也古文勻弋旬居旬二切少也齊也匈盱容切膺也匈奴玁狁也匈匈沸撓声或作胷胷力古切匐也扶又扶福二切重也今作復同上勼居流切聚也解也今作鳩口怪切大急也或作㕟喟於交切深目皃音女人名􆂄居又乙庶二切飽也猒也謀也同上匑丘六丘弓二切匑謹敬皃巨弓切匑伊誘切古文音州又音􅂬居先切又音瓊孤獨也敬拜也㝁同上
