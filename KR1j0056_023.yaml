body:
  text: 大廣益會玉篇卷第二十三凡二十九部馬部三百五十七二百七十九字馬莫切切武獸也怒也籀文古文􅦩布戞切馬八歲騭之逸切壯馬也定也升也乎間切馬一目白也騏巨基切馬文駹莫江切馬黑白靣馵之喻切馬縣足駒几于切馬二歲𩡧乎關切又為萌切馬一歲驪力攴切盜驪千里馬驠於見切馬白州亡云切馬不純騜胡先切馬黃白騂思營切馬赤黃駣徒髙丈小二切馬四歲駵力田切赤馬黑鬛驥居致切千里馬􅚮同上駝大何切駱駝駝同上俗騩京媚切馬淺黑色又山名騅之誰切馬蒼白雜色騵魚袁切駵馬白腹騇尺夜切騲馬駽胡見切青驪馬今之鐵驄又火許衒二切騢胡加切赭白色似蝦魚驄千公切靑白雜毛色騴於諫切尾本白驎力振切馬黑脣驃毗召四妙二切驍勇也漢有驃將軍駰一人於巾二切泥馬也䮗五旦切馬白額至脣歡火丸切馬名七爾切馬名騽似立切驪馬黃脊又馬豪骭驖徒結他結二切馬赤黑色驔徒點切驪馬黃脊䮤五角切馬白額􅻡力兮切駣􅻡馬驁午刀切駿馬以壬申日死乘馬忌此日馰丁狄切馰顙白額或作的騛不韋切騛兔古駿馬驀明白切上馬也乎皆切馬和也騯百庚步庚二切騯騯馬行貌今作彭乎旦切馬尾長又音寒驓才陵切馬四駮皆白騚才田切四蹄白居遏切馬疾走䭹五唐切馬怒貌又五浪五朗切馬搖頭也駿子徇切馬之美稱也速也騝竒連切駵馬黃脊它刀切馬行貌騤巨追切馬強行騑孚微切驂馬也騑騑行不正也疾也騋力才切馬髙七尺以上騋騄力足切騄駬八駿馬駬如始切騄駬馺先合切馬行貌駸七林子心二切行疾貌駸駸驟貌驍古么切勇急捷也良馬也驌思六切驌騻古良馬騻所良切驌騻驟仕救切奔也馮皮氷切乘也相視也也登也又扶風切姓驕几妖切壯貌又野馬也逸也𩢮許牛切馬名也駿也篤丁毒切馬行頓遲它外切馬行貌帆扶泛扶嚴二切馬步疾也風吹船進也亦作駂布老切驪白雜毛今之烏驄裊奴了切騕裊亦作裊呼光切馬奔也騺竹列切馬狼也駐丈具竹具二切馬立止也或作住􅰹駩七全才緣二切白馬黑脣驊下瓜切驊騮駿馬巨六切馬曲脊同上駗章忍知鄰二切駗驙馬載重難行馻唯臠切又余凖切馬毛逆駫古熒切馬肥壯盛貌駉同上又收馬苑騬市陵切馬也騶側留切騶虞義獸之屬又飬馬人名駥而弓切馬八尺也雄也駊布可切駊騀馬搖頭騀五可切駊騀􅧊古拜切結馬尾駱力各切白馬黑鬣同上驗牛窆切馬名又徵也證也女頰切馬行也疾也驡音龍野馬也䮝胡昆切獸名驈余橘切馬白跨驈同上駁布角切馬色不純今作駮騖亡句切奔也疾也馹而逸切傳也同上騧假華切黃馬黑喙同上驤思良切駕也超也低卭也馴似均切從也善也駭胡騃切驚起也駎除救切競馳也駓普悲步悲二切黃白色又堅走貌􅛖同上駕格訝切乘也行也上也陵也驙知連切白馬黑脊駛山吏切疾也土東切驢子䮔子垂之纍二切馬小貌籕文弋魚弋庶二切馬行徐疾𩥇竹扇切馬轉卧土中驜魚劫切壯貌胡圭切騏驥騕於皎切騕裊良馬同上騃午駭切馬行也又無知也馽知立切絆也今作縶􅳟力竹切健馬䮹於吠切馬怒駜皮筆切馬肥壯貌䮡同上䮋力丗切次第馳也奔走也騷先刀切動也愁也駧大貢切馬疾走䮭音覓馬多惡也騾力戈切驢馬母所生騾同上䭿大結弋吉二切馬疾走也駑乃乎切駘最下馬也駻何旦切馬突也馯同上驝也閣切驝駝有肉同上驚居英切懼也馬駭也逸也驛余石切譯也道也􅗬丁年切馬白額布昆切今作奔騔音葛馬行貌同上騫丘焉切馬腹縶也虧也或作騝􅖃步忽切馬牛尾一角仄亮切古壯字騲千老切壯馬徒谷切馬行貌䮷同上駘大來切駑也又大宰切駴胡楷切雷擊破也德紅切馬也驅丘于切逐也隨後也驟也奔馳也古作􅛷又丘遇切驅俗馳文知切走奔也天子道也騁丑領切驅也走也在古切猶粗也又子朗切駿馬也會兩家之買賣如今之度市吕氏春秋假干木晉之大駮甫角切獸似馬亦作駮驢力余切似馬長耳驂倉含切驂馬也音蔡馬名音瞿馬行貌駍平悲馬名侁所巾切馬衆貌又作􅢲騥而丘切青驪繁鬛馬力魚切又音慮騮音留紫騮馬騟羊朱切紫色馬䮄胡涓切馬一歲馭魚據切古御字使馬也盆故切馬今作步馱徒賀切馬負貌烏髙切馬行貌呼光切馬少貌音咸縣名駃古穴切馬生七日超其母騠丁奚切駃騠又音啼音醫黑色馬􅬼户雷切馬名駨相倫切又音旬百昆切馬走貌騊大刀切騊駼獸如良馬也駼同都切騊駼户安切馬多貌直耕切馬住貌騆音周神馬􆇝音羊馬名驒大何丁年二切驒騱騣馬屬騱下雞切驒騱也驢音婁馬類𩥫音春鈍馬也駯音誅馬口黑時俱切朱色扶元切駤止也或作樊駤竹利切駤音腔馬行貌音卭獸似馬音冝馬名駀音尤馬名騉古魂切騉蹄馬名秦有騉蹄苑禱丁老切馬祭亦作禱靡京切汗馬䮊音夷馬名騦息兹切馬行音離驢子䮸於角切馬腹下聲也力涉切馬也亦作躐𩥫尺尹切馬文匹可切馬行貌􅯵毗兩切人姓南賁切馬走龐步公切龐龐充實貌䮴徒亘切又大登切䭹五黨切馬頭髙䮨作亥切馬名駺力唐切馬尾白音騁古文騣子公切金騣馬冠也馬鬛也仕洽切也音馬名䭸音父牡馬也音者馬名騳徒鹿切馬走䮚力旦切䮚䮴馬病也馬傷榖也魚容切大貌亦作顒音姥馬行貌音馬行貌􅦢莫百切馲􅦢五豆切又合麥切風幽香幽二切走貌於塊切驪駿馬騙匹扇切上馬也力際切馬馳音步馬名音陷馬走駏音巨駏驉獸似騾驉音虛駏驉也馸音釁馬重也䮎音餼馬走許力切馬走䮕音䮕白額馬馶巨支切徑也居企切強馬䯂所臻切衆馬行貌莫割切馬走貌䮰陟革切獸也䮜上甲切馬行䮱音逐獸名音劬馬後足皆白亦作朐帆音凡馬行貌反音梵音質馬名䮓竹角切馬行區勿切産良馬􅤻房八切馬名騎巨義切乘也又巨宜切博慢切䮗馬行夫吉切馬名䮬亡各切馬名火麥切行不正䮠音逼駝䮠䮙干逼切馬名文音洫駙扶遇切駙馬官也􆄔力薛切馬名駟悉利切四馬一乘諧間切今作間先郎切馬尾白驋北未切馬走又音驋䮩古忽切䮩獸出北海都忽切䮩騰大登切上躍也奔也巨希切馬也􅷪與􅻡字同吐盍切馬行不進􅤥徒合切䮂􅤥馬行貌䮂音跋䮂蕃中馬也馲陟格切馲驢父牛母牛部三百五十八凡百四十四字牛魚留切大牲也黃帝服牛乘馬犢徒木切牛子㹁力薑切牻牛牡莫右切飛曰雌雄走曰牝牡犅古郎切特牛赤色也㸹力拙切牛白脊五角切白牛同上又五沃切㹔居良切自牛牝毗忍脾死二切牝牡也畜母也犗加敗切騥牛也騰也他刀切牛徐行牷疾緣切躰完也牿古督切牢也凡綴切牛蹄特徒得切牡牛又獨也犆同上又他力切見禮記犧欣宜切純色牛犘陌瓜切牛名犦步角切封牛也犣力涉切牛名布外切牛躰長又二歲牛牻莫江切亂也雜牛也牰徐救切牛眼黑犚於貴切牛名犌古瑕切牛有力㹎力追切求子牛犙山含切又且含切三歲牛犃步后切雄也短頭牛㸪似訓切牛行遲奴多切獸似牛犎甫容切野牛犐徒和切或作力勢力大二切牛白脊達胡切黃牛虎文㹍徒的切特牛牟亡侯切牛鳴又姓也大也愛也取也奪也退也倍也進也首也犓則俱切養牛羊也今作芻犖力角切駁牛又卓犖㹒普角切特牛而小而照二切牛柔謹也徙也安也馴也晝而字如此同上苦到切餉軍與同普耕切牛駁如星也牸疾利切母牛犐苦戈切無角牛牭思二切四歲牛又牛狠也牭籕文㹗徒刀充刀二切牛羊無子犉而純切黃牛黑脣如腫切水中牛牥甫防切良牛名犍居言切似豹人首一目同上牼胡耕口耕二切牛膝下骨古訝切輅車籕文駕奔補門切牛驚書尤切牛也呼今切出呪同上巨禁切牛舌病也或作􅤉㹌史簡切畜牲㹌也犜音敦牛名音秦牛名犫尺由切牛息聲又牛名出也犨同上犀先兮切獸似牛堅也亦作牲史京切三牲牛羊豕徒郎切牛名同上犥普沼扶表昔稿三切牛色不美澤又牛黃白色􅣕眉隕切獸似牛蒼黑㹃甫胃切兩壁耕也犂力兮切耕具㹆音揮犂牛頭也抵丁禮切觸也略也角抵雜設樂也或作抵犤平為平媧二切牛名又音陂牣而振切滿也益也音繒牛也赤唯切牛也牢來刀切牲備也廪倉也又堅也犑公覓切牛名見爾雅㸲子各切牛肉重千斤牨古郎切水牛七岡切牛名牽口田切引也前也挽也速也犩牛威牛畏二切牛名􅥠余鍾切牛胅領也牞居求切牛大力音牛角貌五殄胡結二切牛很不從又火貌犈竒貟居辨二切牛耳黑方韋切獸似牛一目音嬰牛也音尋牛也物亡屈切生天地間謂物也事也類也為乖切獸似牛四角人目式夜切馬名亦作直深切水牛㸳郎丁切牛名巨六切牛也音骨牛也示勢切一角仰或作觢㹏凡隱切善也柔也犎音峯牛也音初牛角也音臾黑牛也呼乖切獸名思營切赤牛亦作騂呼口切牛鳴亦作詬符悲切使牛聲音浮牛黑脣七古切使牛㸻音俟牛也烏口切特牛也又去句切㸸烏后切又烏遘切同上又音口牳莫厚切牛也㹙烏猛切喚牛聲於鬼切牛也㹉魚袁切獸似牛三足牶苦降切牛鼻捲也牯姑户切牡牛音究牛也𤘧同上牛聲音秩人姓也犝徒東切牛無角亦作䮵他見切餧牛草也音去牛行貌牪牛眷切牛􅟢也音譬牛具也四計切牛也㹓魚小切獸名又音鐃犬果切又音嶽古侯切取牛乳犔音餼牛病也音介牛四歲也音叶牛健也犕皮祕切以安革裝馬也又牛六歲粗昌欲切抵人也音特牛也音牛抵也音厥牛也犛部三百五十九凡三字犛莫交切獸如牛而尾長名曰犛牛又力之切又牛黑色羌去央切西方國也楚語辝也卿也反也幸也強也音厥羊也紀力切羊行走羶部三百六十一凡二字羶式延切羊氣臭亦作羶羼初莧切羊相厠也相出前也􅯉部三百六十二凡四字􅯉垂買公瓦二切羊角也􅯉􅯉兩角貌古懷切戾也睽也邪也背也差也離也今作乖苦蛙切不正也亡殄切相當也又亡延亡衰二切莧部三百六十三凡一字莧胡官切山羊細角也寬字從此犬部三百六十四二百六十三字犬苦汝切狗之有懸蹄狗古后切家蓄以吠守㺜音農多毛犬也又乃刀女交二切許謁切獢犬短喙也又許曷切相迫懼也亦作猲獢許驕切獢也猈步買切狗短脰狡古卯切獸名少狗也猾也疾也健也獪也獎子飬切助也成也欲也也嗾犬吠之也今作尨莫江切犬多毛尨同上猗於宜切歎詞也大也又猗氏縣名猝且沒切犬從草中暴出也言倉猝暴疾也突也今作卒狊呼􅞔切犬視所姦切惡健犬㺌胡斬切又胡忝切犬吠不出也兩犬爭也臭尺又切香臭揔稱也犬逐獸走而知其迹故字作大猲呼艾切犬臭也獳乃侯切犬怒也㺑山監山林二切賊也犬容頭進也賊也獨大卜切犬相得而閻也並古又獨𤞞古卜余玉二切獸名獝許必巨筆二切狂也獡式略切驚也獡獡犬不附人而驚貌獫力蟾切犬長喙又力儉虛檢二切狂之句切黃犬黑頭竹厄切犬張耳狠五間切大鬪聲狋魚肌切犬怒兩犬爭也又狋氏孫又音㩲􅰉於陷於咸二切竇巾犬聲㺖胡鑑切小犬又卿名犯扶切抵觸也古文狃女久切習也就也復也又狐狸等獸迹默亡北切大暫逐也亦為默㹽又板切齧也犬食也獵力涉切犬取獸狩式又切冬田也獲為麥切得也辱也婢之賤稱也旌也猥於隗切犬生三子又犬聲獷鉤猛切犬不可附也狂具王切癲癡也狄徒的切北狄也獻許建切奉也進也上也聖也奏也㺒呼交呼狡二切大獶駭也猱乃刀切獸名獿同上又女交切猴乎溝切獼猴猇胡包切虎欲齧人聲又許交切㺕扶元皮眷二切犬鬪聲狀仕亮切形也又書狀􅦺余支切獸名犳之藥切獸豹文嗥胡刀切犬呼也鳴也咆也或作獔獒牛刀切犬四尺如人心可使者阻良阻亮二切狂犬獖扶粉切羊名􅳎音母猦􅳎猦府隆切猦􅳎獸有尾小打即死因風更生戾力計切來也至也待也勢也止也立也法也定也利也虐也古文㺗允山切噬也所留切犬名又秋獵也亦作搜獀同上猜千才切疑也恨也懼也他蠟切犬食亦作䑜同上狧亦同上猩所更切似人能言又音星狌同上狎下甲切易也近也習也狹同上今為闊狹玃居縛切狙也同上㹞牛隹語斤二切犬聲狺同上獜力丁力仁二切聲也亦作鏻獪古邁切狡獪又音澮㺧許苖切大黃色􅭬余成切似狐也狷古懸切跳也急也狷同上狟乎官切武貌也威也今作狟犺口盎切健也猬也古毁切玃也狤居乙切狂也思淺切秋曰亦作獮獮同上猛麻擴切健也嚴也惡也害也怯去業切多畏今作怯猋卑遙切犬走貌犬丁切猱也猿于元切似候能嘯亦作猿猿俗牛吉切犬怒步內切犬過猌牛僅切犬張齗怒貌狍步交切獸也猖尺章切狂駭也㹿音獨猛犬音力犬爭貌犮步末切犬走貌與跋同猙疾井側耕二切獸名狨如充切猛也㹫音夷獸也㹳五胡切獸名狴邊兮切獸名獠力弔切宵田力道切夷名猵普年布眠二切獺屬獼武移切獼猴獼同上音窮似虎㺋音翁豬也午見午晏二切逐虎之犬獟雅弔切狾狗狂狗也狾居丗切狂犬古文狸音離似貓音纎獸名斃婢出切獸名也頓仕也俗作弊獵秦亦切獸名或作獡䝏力朱切豬求子猍力開切狸也德紅切犬名豺音柴豺狼類律位切獸名種類也法也􅏈胡昆切獸似犬人靣猯音湍野豬狑郎丁切犬名同上􆈵音衰犬名狻先丸切狻猊獅子亦作狻猊午兮切狻猊亦作貌麑猽莫屏切小豕猧烏和切犬名猧同上直闔切獸走貌狙且余切玃屬犬暫齧人㺛之喻切鄉名又亭名狼來當切獸似犬獾犬丸切壯狼犿同上獥公弔切狼子獥呼木切似犬上黃下黑獦古曷切獦狚獸名狚丁旦切獦狚狛白駕切獸如狼同上哮火交切犬驚獌莫旦切大獸狼屬或作獌犽午亞切獸名似獾獚胡光切犬也呼光切狼也火交切犬壯也獅音師猛獸狐戶吾切媚獸又狐疑猶豫㺎弋恭切猛獸或作狳與魚切獸似兔音開獸也丑珍切狂也音胥猿屬獺他逹切如貓居水食魚獱婢賔切獺屬㺂古禫切犬吠甚音乎犬吠聲猻思昆切猴猻音鞮犬也貓眉嬌切夏田也食鼠也或作貓􅧝於結切獒􅧝獸名音奚犬戎也音獸名猄九卿切獸名音抵犬㺟除卓切似獼猴而黃又作􅨓時爾切獸如狐白尾七何切大狂也㺈音蚩狩也㺥七銜切犬聲音當獸名獹來胡切韓獹天下踆犬㹱且藥切宋良犬也音彭大壯貌狓音彼皮也㹹音庚獸名於止切獠姓猰公八切雜犬烏八切猰㺄㹾巨表切獪也才癸切雌狢也音邪狧獸名狧他合切犬食犼音吼似犬也猾為八切黠也小兒多詐也猓古火切猓􅛊獸也㺝音檻虎聲狕於絞切獸名以觜切獸名􅓥音葸犬名力延切猭兔走又直山切猭丑船切㺝猭音婢似豕音凡似兔力為切水三切音葵又音悸狒父沸切似人形被髮迅走猣子公切犬生三子獬何買切獬力弔切老獶奴巧切犬驚貌魯紅切獸也猶以周切猿屬也猶豫尚也可也詐也言也又以救切猷余周切圖也與猶同􅚧子宋切犬生一子猔同上皮戀切犬爭貌㺞音余歎聲又豬兒聲玂巨衣切犬生一子􅜦許器切獸也𧳅牛仕切狗名猬音胃毛刺也猘音制犬惡名玁喜檢切玁狁北狄也狁余凖切玁狁狖羊就切黑猿同上猶尤豆切丁角切音羕獸也獑士咸切獑猢獸名似猿猢戶吾切獑猢桑故切獸也尺丗切狂犬音據獸名音豆犬吠聲猚音壘又音袖似獼猴獂音丸豕屬又音元獪音決狂也㺘阻纎切犬小貌音遁道犬也㹿豬孝切狩也五間切又音簡犬爭貌狶音喜楚人呼豬聲音賴狂也獁音馬獸名獍居命切獸名音即犬生三子狿丑延切又音延獸名也􅚦力為切又力水切狘許月切獸走貌音厄豕也所甲切豕母㹼居六切獸名烏江切犬不伏牽音降音插犬食貌音弗犬貌獯許云切獯鬻狽布蓋切狼狽直買切又音雅俗豸字㲋田略切犬似兔亦作狣雉獢切絶有力狢下各切狐狢􅽌思焦切狂病猆匪肥切獸名犾部三百六十五凡三字犾牛斤切兩犬相齧獄牛欲切二王始有獄殷曰羑里周曰囹圄又謂之牢又謂圜土㺇息利息犂二切辨獄官也察也今作伺覗豕部三百六十六七十九字豕式爾切豬豨之揔名也古文豬徴居切亦作䐗豤口殄口狠二切豕齧地豝布家切牲豕音尤豕也息干切豕也公田切豕一歲􅢢同上他丁他定二切豕貌䝐羊捶切豕俗呼豶豬同上豶扶云切犗也豭古假切牡豕豛營隻切齧豕也􅘻胡來古來二切豕四足白豷於計切豕息也豢乎串切養豕豠才余切豕屬豟於隔切豕五尺同上􅡁力人切似豕身黃出泰山豲乎官切豕屬又縣名􆄚同上莫丁切小豚䝏力俱切求子豬午蓋切老豬力物衢物二切豕地也豙牛既切豕怒毛竪山甲切老母豕䝒士俱切小母豬同上䝕之陟切良豬􅩸許十切貔子或作榖䖶呼回切豕䖶地豞呼逅切豕鳴莫公切似豕也豵子宋切牡豕猣同上豯下雞切豕生三月豩火類切兩豕䖶呼恢切豕也貒音端豬也􅼞音雄豕狩音牽豕也豵子公切豕生三子古懷切又丘愧切犬獾呼丸切野豬豚徒昆切豬兒音便豬也音倫獸也芳干芳又二切豕息音先豕也為委切豕也莫厚切豕也豨火豈切豕也音旱豕奔貌豱於昆切豕名見爾雅空旱切豕貌􅺞許氣切豕壯犬音孝豕也音衛豕也䝍音捃又九云切􅻝徒公切似豕出泰山音卓龍車也音雹小豕女滑切豕也音閔豬名𧱝己劣切豕也亡狄切白豕黑頭音役獸似豕𢑢音忽豕名徒郎切急行豦竭於居御二切封豦豕屬鬣力涉切長毛或作鬛豪戶刀切豬毛如笄而端黑又俊也帥也籕文小篆作髙豳古文邠字章移切豕髙五尺也又丁角切山也䝑丑凶切土豬􅾠部三百六十七凡四字􅾠徒昆切豕子或謂豯豚籕文為罽切豚屬同上部三百六十八凡八字徒計余利二切貍子也修豪獸也又也古文呼骨切豕屬相利切豕聲俗作古文胡貴切蟲似豪豬或作蝟又類也茂貌也彚同上胡刀切亦作豪􅵡部三百六十九凡三字􅵡居例切彚類也彘除厲切豬也彖他亂切才也豕走恱也嘼部三百七十凡二字嘼救又切六嘼牛馬羊犬雞豕也養之曰嘼用之曰牲今作畜又許又許六二切獸式又切四足有毛走者謂之獸􅞧部三百七十一凡五字􅞧直倚宅買二切解􅞧獸似牛一角古決訟令觸不直或作杜捉切連也交孝呼教二切解􅞧之屬法方業切則也今作法薦子見切獸所食草其進獻也陳也鹿部三百七十二五十六字鹿力木切麞屬麚古瑕切牲鹿麀於尤切牝鹿古文兔部三百七十五凡九字兔他故切毛可為筆菟同士又音圖地逸以一切過去也奔也縱也逃也理也冤於元切屈也不理也枉曲也芳句切急疾今作䞯㕙子徇且倫二切狡兔䨲乃侯切婏也婏四也兔子五丸切兔子􅚵部三百七十六凡十二字􅚵仁丸切説文獸足蹂地或作狃又女丸切禸同上禽其林切二足而羽亦鳥揔名萬亡顔切十千也又蟲名萬古文扶沸切獸亦作佛離丑支切山神也猛獸也或作螭又力支切禹于矩切蟲也舒也夏禹也同上亦同上禼思列切蟲名古文部三百七十七凡三字兕徐姊切兕似牛見爾雅􅴩同上兕古文象部三百七十八凡三字象似養切獸中最大也象胥官名亦與像同象古文豫弋庶切怠也安也我也秩也早也逆備也或作預又獸名象屬能部三百七十九凡二字能奴登切多技藝也工也善也又奴臺切三足鱉㔮乃何切獸似鼠食之明目熊部三百八十凡五字熊于弓切説文獸似豕山居冬蟄古文羆鄙為切似熊黃白色古文亦古文龍部三百八十一凡九字龍力恭切能幽明大小登天潛水也又寵也和也君也萌也􅶱音龍圭為龍文龕苦含切龍貌也受也聲也盛也古田丁篋二切龍同上龗力丁切龍也又作靈神也善也或作靇同上龖達答切飛龍貌龘音沓龍行也虍部三百八十二凡十五字虍火乎切虎也虐魚約切殘也同上古文虙浮福切虎貌又虙戲大皡虞牛俱切有也助也樂也望也度也專也備也誤也安也又掌山澤官名虨輔間切或作坌慮房七切愁貌䖒昨何才都二切虎不柔也虔竒連切虎行貌又殺也惠也欺也端正貌也固也敬也也強取也少也呼烏切孝呼又地名胡甲切今作狎渠吕切鍾磬之附以猛獸為飾也亦作鐻􅶅同上古文虎部三百八十三凡三十字虎呼古切惡獸古文甝胡甘切白虎䖑亡狄切白虎虒思移切委虒虎有角者䖔虛暫切甝屬又虎怒彪悲蚪切虎文䖊魚廢切虎貌牛乙切虎貌䖐牛斤切虎聲􅊒許隙切恐懼也又蠅虎蟲虥士板昨間二切貓也虓許交切虎聲公厄切虎聲音覓俗字去良切虎類䖚音烏楚人呼虎貌烏莵俗從虎大乎切烏即虎也暴步到切今作暴虠音姣虎聲古呼切息也虘昨古切生虎虪式六切黑虎又音育號音豪哭聲又與號同䖎音狎虎也䖓女滑切虎行貌織牛切虎習貌䖛音索虎貌徒登切黑虎亦作又音彤所祿切虎行入林虤部三百八十四凡三字虤胡大切又五間切虎贙乎大切有力見爾雅䖜雉栗牛巾二切二虎爭也豸部三百八十五六十六字豸直爾切無足屬總謂之豸又獸之長豸然也獠張絞切夷别名與獠字同又盧皓切貒它丸切似豕靣它畔切貗力朱切貒子貔步尸切猛獸豼同上貚大丹切貙屬豺仕皆切似狗犴午旦午諫二切胡狗亦作犴獌亡旦切大獸亦作獌豹布孝切似虎貜九縛切獸名貘莫格切白豹貁與呪切猿屬􅧯乙郎切江東呼貉曰􅧯􅤘貙敕朱切似貍又蠢也貈何各切似狐同上同上貆胡官切貈子與恭切猛獸亦作㺎貌五兮切狻貌或作猊貍力之切似貓貛火丸切野豚貂丁切鼠如犬它公切獸名貉莫格切蠻貉又貈同貖於格切鼠屬亦作貅况牛切猛獸力才切貍别名豾倍悲切貍屬貓眉朝切亦作貓貀女猾切似豹無前足豽同上狻息丸切或作狻音丘獸名音似猿八子䝣音渠獸名都宗切獸似豹有角豿音狗熊虎之子步紅切獸也魚容切獸似豕音惟獸也作可切獸也平表切似狐善睡市照切又音鄒獸名此觜切獸也音帚猛獸䝖側馬切豸也音嚴獸名平表切似羊善睡云貴切毛刺也中板切豸也張貌切豸也􅡐余至切貍子貊育百切蠻貊䝦織戎切獸似豹也􅤘山吏切􅧯􅤘或作音鶻獸名音秃獸名博末切豸也貏皮寄切獸名猰烏黠切猰貐似貙貐翼乳切猰貐相邀切見史記貋河滿切猛獸大廣益會玉篇卷之二十三
