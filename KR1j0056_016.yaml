body:
  text: 大廣益會玉篇卷第十六凡二十四部琴部二百三十一凡八字琴巨林切説文及新論云神農造也琴之言禁也君子守以自禁也風俗通曰琴七絃法七星也琴操云長三尺六寸法象三百六十六日廣六寸象六合也篆文琴並古文瑟所櫛切苞儀造弦多至五十黃帝使素女鼓瑟哀不自勝破為二十五弦古文琶步巴切琵琶也琵房脂切風俗通云琵琶近代樂家所造長三尺五寸象三才五行四弦象四時釋名推手前曰琵引手部曰琶琵琶本胡家馬上彈也喜部二百三十二凡四字喜欣里切樂也恱也古文歖古文出説文嚭普鄙切大也吳有大宰嚭壴部二百三十三凡六字壴竹句切陳樂也他郎切大聲也􅿏且的切夜戒守鼓也又作鼜彭蒲衡切多貌又盛也嘉柯遐切美也善也尌雉具竹具二切立也又作駐鼓部二百三十四二十一字鼓姑戶切瓦為控革為靣可以擊也籕文鼖扶云切大鼓也音帖鼓無聲也鼛公刀切大鼓也鼙步兮切騎鼓也鼞他堂切鼓聲鼘於巾切又於玄切鼓聲也鼓節也七立切又他叶切鼓無聲徒名切鼓聲或作鼕口盍切鼓聲他登切鼓聲他盍切鼓鼙聲或作􅸪𪔪音帖寬也䶁音錔鼓寬力弓切鼓聲鼚丑良切鼓聲鼗徒刀切似鼓而小亦作鞀鼜音戚守夜鼓也䥢同上俗䵽七盍切鼓聲豈部二百三十五凡三字豈羌顗切安也焉也書云怨豈在明􅠟巨衣切且也欲也危也託事之樂也凱空改切凱樂亦作愷豆部二百三十六二十五字豆徒鬪切量名説文云古食肉器古文梪同上木豆謂之梪薦羞𦵔醢也於物於月二切豆餄也居隱切合瓢也䜼莫卜切豆萁名𥘉六切小豆名䝁力刀切豆名同上九免九媛二切豆之屬豍方迷切豍䝀豆也䝀力周切見上注䜾於林切䜷豆也音兜豆小裂䜺又白切磨豆䜴市置切豆豉亦作敊䜷七林切豆名野生者豏胡斬切豆半生䜽弋朱切豆名渠飢切豆䜸莫猥切碎箕豌於丸切豆名夏收者豇胡江切豇䝄胡豆名所江切見上注都騰切豆名豐部二百三十七凡二字豐力弟切行禮之器豑雉栗切爵之次第也豐部二百三十八凡三字豐芳焦切大也俗作豐古文豔弋贍切美也好色也俗作艷䖒部二百三十九凡三字䖒欣冝切古器胡道切士釡也除渚切器也或作㿾重部二百四十凡三字重直隴切不輕也厚也又直龍切量力薑力尚二切説文稱輕重也古文鼎部二百四十一凡五字鼎丁冷切器也所以熟食者又鼎爐也又新也又易卦名鬺式羊切煮也亦作鼐奴代切大鼎也鼒子思切小鼎名冪亡狄切覆巾也又鼎蓋也瓦部二百四十二凡一百五字瓦午寡切土器也瓻丑希切酒器名甄居延切陶人作瓦器謂之甄才又至神切甗牛偃切無底甑名瓿蒲後切瓿甊小罌也甊力口切上注瓵余之切小罌名鈃胡經切酒器似鍾而項長同上瓶蒲井切汲器又罌揔名瓴力丁切瓴甋甓屬甋丁歷切上注甌於侯切碗小者甍眉耕切屋棟同上瓬方往切周禮瓬人為簋㼾力木切㼾甎甓也甎之緣切上注瓽丁盎切盆别名甕於貢切大罌甕同上瓷在思切瓦器㧾名亦作㼬胡梗切㼬瓶名有耳者㼳山梗切上注瓨戶江切長項瓶甈丘滯切瓠壷也坡罌也同上碗烏緩切器也亦作碗㼡是朱切小甕别名㼥丑口切瓶名㽀除政切罌别名甃側胃切井甃也易井甃修井也甃古文甂輔玄切小盆大口而卑下㼲力頰切甄㼲踏瓦聲㼻仕江切罌别名㼶與朱切瓶别名㼽所兩切半瓦也同上􅺮丘劒切又胡耽切瓶有耳缸古郎切罌也大甕也㽈牛志切大罌名甔丁甘切小罌名口郎切瓠也同上􅷢桑對切説文破也亦作碎除向除香二切瓶名㼴牛口切盎小名㽄思移切瓶名女刮切也同上甒無甫切盛五升小罌㼤若結切瓶受一斗者㼵徒啓切小盆名㼦居隴切瓶名胡圭古畦二切甑下空亦作窐同上瓹古縣切甕底孔下取酒也㼣補格切㼿㼣井甃也甐力震切器堅也㽅都滕切瓦豆名㼸音容罌也同上㽃普安切㽃瓳大㼾甎也丁昆切器似甌也􅫈力胡切酒器名㼫胡寡切大口也㼺徒郎切瓷也五合切瓷器力公切築土礳今作礱鬲力的切瓦器今作鬲瓪伯限切牡瓦名瓵徒河切瓦碗名􅛩五化切器也扶泛切瓦名甓立的切剸也瓴也㼾也㼯丁弄切㼯器也初鑑切上注力救切屋穩名許飢切器也五姑切甌也罌烏莖切也又瓶楤名甇於耕切長項瓶也㼧徒公切牡瓦也甉胡監切瓦屋也㽋力華切瓦名㽇胡谷切坯也甑子孕切甗也以炊飯者盎於浪切器也亦作盎古諧切牡瓦也瓳戶徒切㽃瓳㽉胡監切大盆㼗徒丁切甎也徒果切甌也甀池為切罌别名㼢余之切瓶名㼮七許切甃也瓨徒古切瓶别名勒當切器也時扇切器緣也㼪子協切半瓦也㽆丁桑切匙瓦徒奚切瓷也呼光切器也瓭丁感切瓦屬缶部二百四十三四十三字缶方負切盎也詩坎其擊缶缶同上音帚器成也䍉知駭切缺也在咨切亦作瓷瓦器揔名罌於庚切瓷瓦器揔名是規文睡二切小口罌也古文革鞋切器好也畢裴切缶别名陶徒刀切作瓦器今作陶甕於貢切凡瓶無觜耳者􅜍同上䍃余周切瓦器名蘇回切器名罏力胡切罍也􆁓力丁切瓦器似瓶有耳者罐古假切小瓶㧾名䍍苦谷切未燒瓦器罊口計切器中盡羌吕切藏器􅧲戶暫切淨器缺祛決切虧也破也亦作㩾樽子昆切與樽同酒器䍎七鈍先見二切瓦器䍊公的切吹缺也禹逼切瓦器名五轄切缺也䍇他盍切下平缶也瓶也罍力回切酒樽别名􅪖籕文罃於耕切長頸缶罅呼嫁切裂也䍄都簟切缺也胡經切酒器似鍾而項長時扇切器緣亦作缸胡江切器也與瓨同側板切小酒器瓿步侯切小缶也亦作瓿又步後切罄可定切盡也器中空也瓶蒲丁切汲水器瓷也徒啓切器也亦作㼵缿胡講切如瓨可受板書筒令密事亦受錢器也又大口切鬲部二百四十四二十三字鬲郎的切鼎足曲説文作云鼎屬實五􅷴斗二計曰􅷴又音革平原有鬲縣亦作鬲鬲同上鬹居垂切三足釡名鬳牛建切鬲别名許朝切炊氣貌􅲒公禾切秦名士釡曰􅲒亦作鬵似林才心二切釡别名釜扶甫切屬或作釡鬷子公切釡屬䰙魚倚切釡名胡圭古攜二切甑于空也甑子孕切鬵屬亦作甑柯竹切煮羹亦作羮䰚亡分切摩也蒲悶切起也融余終切長也説文炊氣上出籕文如之切熟也亦作􅳺􅘺方未切煮熟亦作沸􆄿工定切隔也􅱊楚狡切熬也式羊切煮也亦作鬺鬺同上􅦧部二百四十五二十一字􅦧郎的切也亦作鬲之六切糜也又以六切或作粥同上􅻶音速鼎實也或作餗楚絞切熬也或作煼諸延切粥也如燭切大鼎煮之與切煎也或作煮同上以林切器名釡屬戶徒切也或作糊步忽切釡湯溢側皆切敬也古行切煮也同上如至切粉餅或作飷居言切粥也或為饘亡逹亡結二切涼州謂粥為或作鬻羊六切鬻賣也又音祝説文又音糜余灼切內肉及菜於湯中子孕切炊器亦作斗部二百四十六二十二字斗丁口切量器也十升曰斗斗俗文􅝁他么切􅝁疀古田器也亦音鍬料力弔切數也理也又音寮斡烏活切轉也柄也又音𬋩庾余甫切量也今作庾斠古琢切量也今作斣丁豆切物等也力競走也斜徐嗟切抒也散也不正也斟止任切取也計也酌也㪺九娛切挹也酌也斛胡榖切十斗曰斛匹郎切又薄郎切量溢也戽乎古火故二切抒水器也㪵輔叛切量物分半也㪻九万切抒也量也枓之庾多後二切有柄形如北斗星用以斟酌詩維北有斗亦飲水器升舒承切升斗也十合為升呼活切又烏活切杼也丁狄切量也斚古雅切爵也公治切入也亦音恰勺部二百四十七凡二字勺時灼切飲器也十勺為升亦作杓與羊舉切賜也許也豫也亦作與几部二百四十八凡五字几居履切案也亦作機憑皮氷切依几也又皮證切凥舉魚切處也與居同處充與切止也與處同焭瞿營切單獨也與煢同且部二百四十九凡五字且七也子余二切語辝也始然也又七序切詩曰有萋有且古文亹亡匪切亹亹猶微微也才布切且往也俎莊吕切斷木四足也肉𦵔也匚部二百五十凡三十九字匚甫王切受物之器籕文匛渠救切棺也亦作籀文匴先𬋩切器名􅜷米䉤也匰丁安切宗廟盛王器匜弋支切沃盥器胡耽切船沒也輔堅切竹豆也亦作籩籕文似沿切器名􅜷米䉛也篋口頰切緘也或作篋㔶公棟切器小杯且緣切竹器匭古鮪切匱匣也函也簋同上匬余主切器名受十六斗者徒弔切田器名也匫呼骨切古器名匥皮變切冠器又作笄奩力占切盛香器也亦作籢奩同上匯胡罪切垂一切回也器也匣胡甲切匱匣匭屬匱渠愧切匱匱藴玉匣櫝徒鹿切見上注布回切籕文杯字古文􅔆方娛弗武二切祭器今作簠㔴羊式切大鼎又田器此郎切古器也匡公王切方正也飯器也筥也語二王天下亦作筐匩同上大廣益會玉篇卷之十六
