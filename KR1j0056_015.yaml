body:
  text: 大廣益會玉篇卷第十五凡三十九部麥部一百九十二五十三字麥莫革切有芒之榖秋種夏熟麥同上俗古鹿切餅麴䴾昨柯切靡麥也一曰搗也熬午刀切亦熬字煎也麵亡見切麥細屑蜀以桄榔木屑為麵麵同上先果切粗麥屑麷芳充芳鳯二切熬麥也􅢑力堅切􅢑􅞻餅也􅞻力口切􅢑􅞻䵂徒赤切麥屑麮丘舉切煮麥䴳禹八切麴麥名麧下汲切堅麥粳中不破者麴丘竹切米麥糵揔名同上麯俗麴字䴽鼻支切細餅麴古額切麥碎也䴷胡昆切麥麴也又戶版切麩妨娛切麥皮之細者麱同上先忽切麥屑也􅲄同上所諫切也䤓莫公切有衣麴也女麴也牟莫侯切㫪麥亦作􅓿同上婢之切䴻䴻力尸切䴻䴹胡瓦切麴别名䴺蒲口蒲毆二切䴺􅲑餅也􅲑池口切䴺麧餅也同上麲余諫切陳麥也麩芳無切俗字􅭢戶姑切俗黏字䴲莫逹切麵也今呼米屑也力該切小麥也麳同上䴭殂來切麴別名力尸切麥酒也胡關切餅也䴼初簡𥘉鴈二切䴼麥充小切糗也麨同上餅博領切索餅也􅜿古猛切大麥也䵃同上䴰與力切麥䴰也呼谷切麥别名乃帖切頭也黍部一百九十三二十三字黍式與切黍稷禾屬許羊切香芳也今作香䵖口見口殄二切􅓱穄也黏女廉切相黏著也户都切揔名䵒女栗切黏也䵒同上張俱切也秨徐各徐故二切禾搖貌稃妨俱切也甲也稰相吕切食也秿扶甫切禾積也在官切又在管切禾補也同上公用公外二切粗粳也兹里切壅禾本也􅿕普胡切曰􅿕也䅜時偽切小積也之閩切緣也又束得也稕同上稅戶鋭切租稅又音脫放置租子乎切田賦謂之租秎扶問切秎穧也䅻力攴切禾把也力科切積穀謂之嬴同上穧子計才計二切穧穫也稇口個切禾成熟之稱穫胡郭切刈禾也秕卑几切榖不成䆏扶畏扶非二切稻紫莖不黏也稿公道切禾程也又稿草也䅭步唐切䅭䅣穄黍也䅣胡光切䅭䅣秬渠與切黑黍也䅵之弱古督二切禾皮也又齊地名䄶蒲骨切䄶稡禾秀向上貌稡子骨切䄶稡也案於旦切轢禾也䅑息唯切禾四把秸公八切秸藁也去其皮祭天以為席稈口和切程也局也目也秩除室切積也品也䆄之善切禾束也壯力切䆄也穰如羊切黍穰也豐也衆多也又如掌切榖古祿切禾麥揔名又善也秳胡括切春粟不漬也丑向切穧也䅾土林切禾欲秀稚除致切幼禾也稚稊並同上呼光切凶年也今作荒秧於兩切禾苖秧穰也秪竹尸切穀始熟穚羇遙切禾長也䅀良計切黍穰也並同上䆃徒到切一莖六穗瑞禾也秦疾津切國名又禾也􅮘曰篤切禾大熟䅃巨恭切稰也䅳七于切稷穰也穭力與切自生稻穌先乎切穌息也死而更生稔如枕切年熟曰稔秛普陂切禾租也䅢直就女稅也稸抽陸切聚也秷竹栗切桎穫也秋且周切禾榖稔也又四時秋同上籕文穁如勇切稻䅌也秣莫葛切秣養也同上稱齒證切遂也齒陵切銓也程除京切法也式也秱徒聾切禾盛貌穠而容切花木盛紆云切香也𦓯古檇切田器种直中切姓也又种稚也秭咨李切數億至万也稜盧登切俗稜字秥女占切禾也稝蒲庚切禾密也汝魚切臭草也䄷視亦切百二十斤謂之䄷䅂胡各切榖似黍而小渠元切禾黃也丑江切禾不秀䅑汝雖切禾也秓章移切稈也秅丁故切禾四百秉為秅穙蒲木切羸積一名撲䄨羽俱切不秀也䅔側移切禾死也秵於鄰切花也力周切秞也稘居之切稈也周年亦作期秈息延切粳稻亦曰秈䅡先生切草主禾中息咨切治禾也人久切粟也祖弄切禾束也種之勇切類也之用切稙也秞余周切禾黍盈盛側買切禾也支用切古種字䄸匹各切木也苦婉切禾䆍也䆍力公切儱穧也禾病也穩於本切持榖聚也方尾切禾穗貌䅚丘院切相近也䄼他點切鄉名火貫切禾名䆀亡禾切黑也禾傷雨也粳口郎切粃也米皮也直利切稠也密也祖殿切草也䅰安狠切草名䅙户衮切䅙草也蒲本切穩榖未也䅝口東切稻稈别名秺得路切䆉束也䬿勿利切饘䬿也秙口故切秙稴也稧羌列切禾稈穱仄角切早熟也亦作穛稂力當切禾秀不成也䅄力帝切長禾也子計切穫也䅷時預切草名稒古護切縣名博眠切蘺上豆又方顯切𢆚古殄切十杷謂之𢆚稄息俊切咀力切草也􅧎子笑切物縮小徂悶切禾積也秡蒲活切禾傷也胡戈戶卧二切棺頭也穢於吠切凡不淨之稱䅮七浪切禾䅮頃也徒引切積也式聿切呪字􅰨余力切蕃蕪也䄮方無切冉生稻謂之䄮秢力經切年也與齡同𦔔莫半切不蒔之田也力出切粗米也秴古蠟切秴𦓯也子入切稠也穛仄角切禾之先熟又穗也秲時至切亦作蒔字同烏祿切芒也𥘉乙切稠也苦谷切禾熟也阻瑟切生稻也粞桑來切碎米也又音西匹願切粉謂之也酶莫柸切酶麴酒母也糯奴過切黏米俗􅟙字䊧孚謂切矢氣也糫音環餅也亡畏切粥粖也䬿同上又米乳也籺也䉻渠黎切赤米謂䉻米糙七竈切米去殼未㫪心媚切惡米也􅬒莫片切屑米也䉺胡同切陳臭米也或作紅䊟亡原切糒塗粉澤也糤先旱切糤米餅屬迪寧切米食也仕革切白米也之亦切營也籸山人切粉凝也又粉滓也力的切雜拌糅食也粄補滿切米餅别名蒲鶻切米粗䬿也糏先結切米也胡逹切白米也粳柯彭切不粘稻亦作粳糖徒郎切餄也又蜜食糞大問切穢也壤也徒類切米也糰徒丸切糰糭也籷竹革切黏也粿古火切淨米又米食糔息酉切糕屬又音修籺胡骨切粳籺米粖也力逹切粗飯曰飯䭔得回切米食也毇部二百一凡二字毇許委切米一斛㫪為八斗糳子各切左傳粢食不糳精也一斛㫪為九斗也臼部二百二凡二十一字臼渠九切㫪也古者掘地為臼其後穿木石象形中米芊少切臼也函胡耽切鎧也胡緘切函書䑔孚穢切㫪穢暘也舂舒庸切黃帝臣雍父作㫪又搗也臿楚冾切㫪麥也同上普名切齊人謂㫪為才何切㫪搗亦曰舀翼珠弋周二切杼臼也亦作榆又以沼切之睡切杵擊也同上𥘉夾切米去皮也俗作臿丁老切㫪也亦作搗移鄰切古文垔𥘉眼切小㫪也臽音陷坑也同上七漏切半㫪也匹各切㫪暷也䑗徒黨切晹㫪也倉部二百三凡三字倉且郎切倉庾貯也古文牄七羊切鳥獸食榖聲廩部二百四凡四字廩力甚切藏米屋也亦作亶都但切誠也信也厚也多榖也稟蒲錦切惕也啚逼几切啚嗇也嗇部二百五凡六字嗇使力切愛也慳貪也又嗇夫農夫也古文牆疾將切牆且也庸也牆同上􆇛籕文古文集部二百六凡八字集疾立切説文三合也僉且廉切皆也侖力旬切思也籕文舍舒夜切宮也處也又音捨合胡答切同也又古答切今居材切古今是時也畣都合切對也然也今作答會部二百七凡五字會胡外切歲計會也對也合也又古外切古文會古文朇婢支切增益也又作埤䢈時真切今作辰日月會也又音會享部二百八凡七字享虛掌切覲也當也獻也孝紀曰祭則鬼享之今作享亨同上俗作享又許庚匹庚二切籕文市倫切熟也􅙯同上余鍾切今作庸䈞都沃切厚又作笁篤􅳀部二百九凡三字􅳀胡苟切厚也大切長味也今為覃篆文畐部二百十凡四字畐普逼扶六二切􅴰蒲謂之涌腸滿謂之畐良力張切良善也美也古文同上入部二百十一凡八字入如立切出入也納也進也力掌切説文二入也兩字從此糴徒的切入米也買榖也㞥土林切入山谷之深內奴對切裏也中也全疾緣切具也完也同同上古文坰部二百十二凡五字坰亡狄切覆也以巾覆物今作幕冠古完切冠冕也又古亂切記二十曰弱冠徒籠切圎蓋也息纍切並頸也㓃丁故丁嫁二切書曰王宿三祭三孔安國曰王三進爵三祭酒三奠爵本或作吒􅜪部二百十三凡四字􅜪亡保亡救二切重覆也同徒東切共也合同也口江口屋二切搗悵也冡莫公切覆也冃部二百十四凡十五字亡報切小兒蠻夷頭衣也或作帽冔兄羽切覆也又殷冕口洽切帽也亦作幍杲則狡切果盛生朵也胄除救切甲胃兜鍪也最子會切聚也勝也冒莫得切前也市𥿄切古字同上冕靡璉切冠冕首服也冒亡到切覆也食巾也古文冒􅼹翌句切􅼹面衣也㒾餘豉切上同㒽丘權切小兒帽兩部二百十五凡三字兩力掌切再也今作兩兩同上又匹偶也又二十四銖為兩也亡殄亡安二切平也當也欲明也㡀部二百十六凡三字㡀脾丗切敗衣也敬也敝同上又極也賴仆也或作斃弊俗西部二百十七凡八字西於嫁切覆也又許下切覂方腫切漢書大命將覂謂覆也或作芝覆孚六切反覆也又敷救也蓋也交扶冨切伏兵也􅤵蒲北切農夫之賤稱也南楚罵賤謂之􅤵䙵穴鞮切鄙也􆉜莫靈切同也垔昆注徒候二切塞也核胡革切孝實事也网部二百十八凡九十三字网無故切羅罟揔名同上今作罔同上籕文古文罟故户切魚罔或為罨烏答於檢二切罕也以罔魚也罘縛謀切兔罟也同上罳昔兹切罘罳屏樹門外也釋名曰罘復也罳思也臣將入請事於此復思之也先卷切罔也罕呼旱切罔也旌旗也又稀踈也俗作罕罺壯交切罟也又𥘉教切罽居切魚罔亦作𦋡亡乳切雉罔名罯於感切罯覆也罧力金切積柴於水中取魚又所禁切䍤子禮切手出其汁亦作擠冞亡支切罟也置也同上補革切罿也罬竹劣巳劣二切連也幡車上覆罔亡娛亡矩二切牖中罔也罪祚傀切犯法得罰也罩都教切取魚具罝子邪切張兔罔同上籕文羈居猗切旅也又馬絡頭説文同上罿尺容切幡車羇居冝切寄也䍔公肓切索也與切罟也罷皮解切休也又音極也詈力翅切罵詈惡言也罵莫霸切上同所羇切也羉力官切彘罟也式忍切俗龜字署當恕切書檢也部署也他領切小空貌力頂切上同罤徒黎切兔罔也􅧡落槌切罾也古吳切舟上罔罭為逼切九罭魚罔也罾子登切取魚巨罔也罠亡巾切釣也居廉切罔也古橫切罔滿也徒黎切罔繩也罶力九切詩魚麗于罶曲梁同上同上㒿力之切羃也𦌬無魯切窗也罱女感切夾魚具罼卑密切罔小而長柄罣徒木切罜䍡魚罔也䍡力卜切上同罥元絹切罥挂也罣古晝切罣擬也莫厚切張罔罹力之切憂貌不遭也公縣切罔也綰也罻於貴切小罔䍓音牙兔罔也郎據切重罔奴旦切罹也罩丁孝切覆鳥今不得飛羅力多切罔也鳥罟也胡故切罔名息臠切罔也所禁切罔也􅙏丁歷切繫也蒲持切罔衣人所著也罦扶遊切覆也車罔也罦同上徒榖切魚罔同上羄知校切小罔罞莫聾莫交二切糜罟置竹利切立也又安置羃莫歷切蓋食巾䍥郎的切上同普革切罔也房背切篝笭也罥古泫切桂也繫取也羂同上又罔張獻也千面切魚罔别名部二百十九凡五字華俾密切箕屬棄糞器又方千切方問切除也物汚穢也畢俾謐切弋也掩免具又星名畢説文棄丘至切遺也古作棄冓部二百二十凡三字冓右侯切交積財也再子代切兩也重也仍也爯齒陵切舉也又尺證切與同某部二百二十一凡一字某丘於切飯器名去部二百二十二凡六字去羌據切除也違也行也又丘與切去之也説文去居力切又力繩切去也朅丘列切朅去也方丹切郤也方爾切羇客也北部二百二十三凡四字北布墨切方名軍敗走曰北乖古懷切揆也戻也異也背也冀居致也北方州名故從北兾同上西部二百二十四凡五字西先兮切方名説文鹵古文卤籕文栖音西鳥栖也又作棲鹵部二百二十五二十六字鹵力古切鹹也車駕出有鹵簿滷昌石切苦地書海濵廣滷本作斥又音虜鹹乎緘切苦也尓雅注苦即大鹹在河切鹹也亦作公陷切鹹味竹減切鹹也鹼公斬切鹵也鹻同上於昆切戎狄之鹽胡乖切上同𪊉同上䴛思遙切煎􅐭音投鹵地名同上䴝七決切南方呼醬且豆切夷狄􅐭名􅴴扶殄切􅐭也乙乖切煎鹵也音昌鹵漬也㔪力古切鹵同才計切鹹也鹶凡陵切苦也䴚各黨切􅐭澤也音魯沙也􅲃工暫切鹹也巨聿切醬也鹽部二百二十六凡四字鹽弋占切宿沙煮海為也同上鹽俗盬公户切鹽也不堅固也蒼猝也壬部二百二十七凡八字壬他井切善也證也召也成也驗也潘也虛也徵陟陵切召也又陟里切宫徴也望無放切對見也説文月蒲與日相望似朝君也古文重直冡切不輕也又直容切疊也現胡殄切大坂也亦作現無昉切誣也今作罔㸒余針切濫貪也皿部二百二十八七十一字皿明天切説文飯食之器用也䀇公户切器也同上䀁余救余九二切小甌也杼水器同上盧力胡切當盧酒肆也以士壘酒甕四邊為盧也同上亦飯器也盆步魂切盎也盛時正切多也時征切貯也盂羽俱切飯器也碗屬盥公緩切洗物曰盥又澡手也又公玩切㿾除與切器也盨山縷切戴器也碗於卯切小盂也亦作齍子犁切黍稷在器也䀀扶掩孚楚二切杯也盕並同上盄諸姚切器也盉户戈胡卧二切今作和䀊胡尺公切二切器也同上盎於浪切盆也盅除隆切器虛也盈余成切滿盈也蕩徒黨切搖動也滌器也益於亦切加也又卦名盦於含切復蓋也盞壯限切杯也㿿魚干切杯也五田切碗也盡疾引切終也又即認切同上䀉渠嬌切碗也􅦝餘章切杯也博胡切籕文餔之搖切器也䀈渠既切獸似蝟毛赤昷於魂切和也或作溫古文昷丘拳切盂也䀃徒回切器似盂黃孤切器也盤薄干切器名又盤鑮􅡸莫加莫多二切杯也盂公安切盤也盆許奚切小盆器盔苦回切鉢也杯補梅切盞也力回切器名亦作櫑䀂於干切䀂大盂也才丹切上同火牙切盂也䀅神夜切器也盀音起器也徒弔切草器與蓧同饛莫公切豐饛滿也同上呼改切以器盛酒力制切器也䀍空紺切器也盩張流切盩厔縣名盝力瀆切歷也竭也􅜷同上盍胡獵切何不也䀌許力切痛甚也彌必切械器盩魯帝切緑色綬也蓋故大切掩也覆也蓋同上臥部二百二十九凡七字臥魚過切器也息也女厄切楚人謂小懶曰臨力針切尊適卑也視也監公衫公陷二切視也古文監他兮切卧也同上部二百三十凡二字㐆所斤切歸也從反身殷乙斤切樂之盛稱殷易曰殷薦之上帝又乙山切左傳曰左輪宋殷杜預云今人謂赤黑為殷色玉篇卷第十五
