body:
  text: 大廣益會玉篇卷第十一宀部一百三十八一百三十二字宀彌仙切交覆深屋也家古牙切居也家室也䆥古文室舒逸切屋室也説文實也寏户官切周垣或作院宸時真切賈逵曰室之奧者説文屋宇宅除格切人之居舍曰宅古文向許亮切窗也舒尚切地名宖户萌切安也説文室響㝰亡田切冥不見一曰不省人宣思元切布也通也説文天子宣室古文宧亦之切尓雅室東北隅宬是征切屋所容受居毀居偽二切毁也一作垝寴且仁切至也又且僅切同上奧於報切尓雅室西南隅㝩苦郎切空也虛也恥價切㝞嬌態貌又宅加切宇于甫切四方上下又屋宇宇籀文宭九文仇文二切羣居也寧奴廷切安也今作寧宔之庾切廟宔祐也今為主又砫字宰子殆切治也宰判也古文宛於阮切屈草自覆尓雅宛中宛丘注中央隆髙又於原切縣名惌説文同上又周禮注小孔貌宿思六切夜止也思宙切星也宿古文􅓦前的切無聲也又作寂同上同上宏胡萌切廣大也寷孚雄切大屋寪胡彼切屋貌實時弋切止也於弔於鳥二切尓雅室東南隅窔同上宎俗富甫霤切豐於財穴如勇切穴散也實時質切不虛也古文宜魚竒切當也安也今作冝宜同上古文古文宜􅳃莫見切冥合也容俞鍾切容儀也容古文宄古洧切姦宄外曰盜內曰宄古文古文守舒售舒酉二切護也宵思搖切夜也寢且審切亦作寢籕文宓明筆切止也靜也今作密定徒聽切安也息也寬苦完切緩也大也五故切寤也寡古瓦切少也丑院切與篆同宦胡患切仕也又閹人稱安於寒切定也不危也寇古候切賤寇亦姓寯子峻切才雋也寧奴定切姓也寧説文􅑔寫思也切除也置物也書也㝣於細切蒼頡而安也古姓切樓也火訝切隙也㝑步忙切古文房􅳃卑民切古文賔㝌居舊切疾㝌説文貧病也宴於見切安也宴間也𡨢寄魚切𡨢舍也㝝力針切深也宲食質切古文實莫儦切古文苖害何賴切殘也利害俗作察楚黠切覆也或作察寲魚基切察也力豆切地也凹口合切合凹也徂曽切室也㝪丁念丁田二切下也亦作完户端切全也保守也户官切周邦地名置支義切置也寭穴桂切察也宑積省切舍井也宲輔道切藏也或作賲寶補道切貨珍也王也寶古文寒何丹切冬時霜氣也寄居義切託也㝮千外切塞也宙除霤切往古來今一作胄宥禹究切寬也恕也寥力雕切寂也廓也宕逹浪切過也洞屋也僑具嬌切寄也與僑同㝏羈切畜無偶官古丸切官宦也又官治也寵丑冡切説文尊安宷户枕切察也古文審居陸切窮也或作㝤古候切夜也亦作冓􅧫無鞅切古文罔􅧞式白切入家也亦作索渠留切􅧞也與求同客口格切賔也客旅宗子彤切祖宗又宗師支彬切古文貧於田切古文煙寰胡絹胡關二切畿內縣㝞烏價切懸貌又於加切寓愚向切寄也亦作􅸳宋蘇洞切居也亦國名居宥切古文究寀七改切寮寀㝗力蕩切空也又音廊屋也寮力雕切官寮與僚同寠瞿庾切貧陋也空也吒晃切㝗也廣也䢓禹俱切窗䢓也寁子感切速也宫部一百三十九凡二字宫居雄切室也人所居也營弋瓊切度也市居也寧部一百四十凡二字寧治旅治居二切爾雅門屏間也竹與切説文㡒也所以盛米同上門部一百四十一一百三十字門莫昆切人所出入也在堂房曰戶在區域曰門説文開也從二户象形古文闕祛月切少也又仇月切閣公答切小閨謂之閣闒徒臘切樓上戶也敕臘切定意也下意也閾雨逼况域二切門限也古文閻余占切若也説文中門也閎胡觥切巷頭門也閈胡旦切垣也閭也左傳髙其用閈開口該切開闢也説文作開古文闔户臘切門扇也一曰閉閶户羊切閭闔天門也閼於逹切遮擁也又於虔切閼氏單于妻間居間切隙也又音諫厠也古文䦏胡計胡介切門扇也闉於神切城油重門闖敕蔭切馬出門貌何休云出頭貌亦作閉必計切闔也塞也閇俗閜呼雅切説文大開大杯闑魚列切門闑亦門梱闥他曷切門內也飛闥突出方木關古鐶切以木橫持門户也扄也關同上闛徒郎切盛貌他郎切鼓聲閨古攜切宫中門小者䦔他但切鬩也門傍切所以止扉䦩亡云切低目視又地名閿俗之羡止兖二切門閉户利閟鄙兾切愼也間也閭旅居切里門禮五比為閭侣也船首之閭閦初六切衆也釋典有阿閦同上闃苦壁古覔二切靜無人也閞皮變切門欂櫨也閘乙甲切開閉也闈户歸切宫中門䦲余占切廟門也除刃切登也闍市遮當胡二切城門臺闓苦亥切開也又音開閣公鄂切樓也闠胡對切市門外闢步役切開也古文間駭山切遮也防也暇切闌力安切遮也散也於可切門傾也䦪於轄切門聲闙口躰切與啓同閹於撿切官人也暗於紺切閉門也幽也與暗同閡五載切止也與同閫苦本切門限也于救切古文祐閮徒丁切門閮也䦒徒浪切門不開門籥余酌切固關令不可開一作籥闐徒堅切盛貌亦作闤胡關切市垣先合切閉也􅰚所進切守門也在切門次也窺立規切相視也與窺同闋苦穴切止也終也而腫切內入也呼瓜切開門他胡切地名余腫切門木也閽呼昆切司門者曰閽人閲余説切簡軍實也博古切門也式旨切門也苦乖切門不正夕醉切門偏闞口濫切臨也呼減切聲也闊口活切疏也大也徒昆切闐門也叱終切也圭熒切不開𨵦羊朱切窺也閍補行切宫中門亦巷門䦖胡結切䦖關鄭城門徒結切䦖也烏古切門也故敢切門也語居切門名閔眉隕切病也傷痛也又姓閌恪浪切髙門亦作伉許勿切小門闆匹限切門中視余支切門曰也覘側銜切立待也其偃切門木也古文鍵孚微切門火氣也丑占切獲也閕火加切門閉所景切水府䦡胡官切閽也女九切門關又女狎切閬户簡切俗為門限字先㧾切門曰祛王切門䦫於迎切門中於鮪切門髙閥扶月切左曰閥右曰閲古子切喪之降殺也䦮敕尹切中門闟呼急切戟名直連切市門胡慣切古文患力安切無符傳出入今作闌闡昌善切明也開也徒郎切門髙䦌丑住切直開也䦐他頂切䦐上關音孰與孰同閃式斂切窺頭門中或作睒古穴切䆷無門户䆷呼決切䆷䦝呼麥切門聲于委切闢也普耕切門扇聲䦳許尚切門頭也説文門響閬盧宕切髙門又地名在蜀七羊切門聲户部一百四十二二十一字户胡古切所以出入也一扉曰户兩扉曰門㦿古文扉甫違切戶扇㧁羌璩公答二切閉户聲房扶方切室在房也戾徒泰他厲二切説文輜車旁推也亦作軑弋之切外也士明切屋上扊余染切扅扊户壯也扂同上又徒忝切閉門扇尸戰切扉也又箑也用以取風㧀渠立切户壯也扄書掌切戶耳也厄倚革切災也亦作扅余之切扊扅户壯也同上肁治矯切始也也戺牀巳切也亦作尼􅱩苦合切閉􅱩也扃古熒切外閉之關扆於義切鄭玄生禮義扆如綈素屏風畫斧文以示威亦天子所居尸部一百四十三五十二字尸式脂切主也説文陳也象卧之形㞒詐介切卧息也博美切臀也尼奴啓女飢二切安也止也和也居舉魚切處也安也居古文苦永切穴徒昆切與臀同同上屒時仁切重脣竹忍切伏貌屓許器切贔屓作力也屆居切至也極也屇徒連切穴也弋之切踞也力諸切居也展知演切轉也由也適也説文展尻苦髙切脽也髖也孱士連切不肖屙烏何切上厠同上屑先結切潔也勞也碎也屑説文屑屠南胡切殺也刳也火天切尻也屁四避切泄氣都谷切俗豚字㞚楚立𥘉甲二切從後躡也㞏直立切㞚㞏也尸弛祗切在牀曰尸此踞切與同屖先啼切遲也今作栖亦作犀層自登子登二切重也纍也㞋儒兊切弱也或作耎余隻切交易㞋兹力切理也屟先篋切履中薦也或作屧古巷切差也今作降下也㞟上建大練二切重也屢良遇切數也屝扶弗切草屩此咨切盜視也與同屋於鹿切舍也又士屋山名籀文羼𥘉簡切又𥘉見切出釋典口卧口外二切臀骨也亦作髁去罽切心息也今作㞓詰地口奚二切尻也子雷切赤子隂也亦作脧􅊂余脂切古文夷字説文古文仁字屎施視切糞與矢同俗作屎屎許夷切呻也屏蒲冥切障也必郢切屏蔽也爾雅屏營猶倣徨又卑營切尾部一百四十四凡七字尾無匪切鳥獸蟲魚皆有又未後稍又星名尾古文尾孕切𥘉孕也􆀕乃弔切人小便今作尿微曳切尾長也屬時欲之欲二切連也附也俗作屬豆律切短尾也尺部一百四十五凡二字尺齒亦切尺寸也十寸為尺咫之爾切中婦人手長八寸也履部一百四十六凡十七字履力几切皮也履又踐也祿也詩福履將之説文履屨居羊切麻履也余去除吕二切履屬盱戈切或作靴同同上屐渠戟切履屐也令的切履下也屩居略切草履也渠虞切履頭飾亦作絇屜他厲切履中薦也􅦘同上履居倚切赤靴他回切履也同上屧先叶切履中薦也屣所倚所解二切履也亦作屣􅨌老部一百四十七凡十四字老力道切壽也年髙也徒到切七年曰也今作悼耇皆後切老人面凍梨若垢莫報切邁也九十曰耄同上亦作耄者之也切助語也耋逹結切人弔八十曰耋亦作耊孝呼教切善事父母曰孝壽食呪食酉二切久也古文耆渠伊切長老也考口老切壽考延年也釋名父死曰考􅹀視句切老人行財相逮也􅫎都忝切老人靣如墨點疒部一百四十八二百七十二字疒女厄切倚也人疾病也又音牀疔籀文肛古紅切下病也痯古緩切病也詩四牡痯二罷貌瘌力逹切辛也痛也癆力到切癆瘌也㿎扶吻切㿎悶病㾭莊救切縮也􅍙渠軍切痺也㿉呼向切馬病不能行癡丑之切癡騃不慧也膇直為切重病與膇同㾍女木切㾍病也治兩切病也痆女黠切瘡也癠在細切病物生不長也㽹孚萬切惡也吐㽹也弋㿌切瘡也病走也疳居切小兒疳疾􅢌武巾切病也䀶戶恩切瘢䀶也􅿔於歇切亦作暍􅿔又音渴火聊切腫欲進才兖切大癢癢甚也慈剪切小癢也癀胡光切疽病也㿉徒回切下腫病􅱵山革切瘮􅱵寒病瘮山錦切瘮瘮寒病㾕同上癏古頑切病也恥也􅓠都旱切病也􅭩渠貟切手屈病癖四辟切食不消留肚中也癵力貟切癵曲身曲也同上桑孤切病也痗莫隊切病也詩使我心痗又音侮痠先丸切手足痠疼也㾷思移思兮二切痠㾷痊七緣切病可瘳痊也余針切病也帶竹丗切半頭瘡又赤白痢音帶帶下病也㿓古洽苦洽二切羊蹄間疾癡丑之切癡𤶠不逹也㾋許尤切㾋息下痢也㿘役征切病作也痷於劫切痷殜半起半卧病也亦作殗步結切不能飛又枯病啞於假切􅿜啞不言也瘑古禾切疽瘡也瘊胡鉤切疣病也披盤切病極死都雷切腫也㾰戶徒切物咀咽中不下也乎郭切喉咀也㿌呼兼切㾰㿌喉阻也㾂呼來切病也息邪切癢也渠吟切寒也㾦匹杯切痂也瘡也弱也脹知釀切脹滿亦作脹補回切徵結痛於幾切弱也都稜切病甚直髙切疾也扶又切勞也冉病亦作復􅦤許機切困極亦作喙瘴之亮切瘧也疫也知有切腸痛也㽷户類切病也眉隕切癎病也脪向期切創肉又腫起亦作睎痌救公切痛也亦作洞火域火麥二切頭痛式與切熱病也烏古切疾也古咬切痛也痃胡堅切痃癖小腹下病㾄徒木切怨痛亦作讀癨呼郭切病癨吐㵼也疺符法切瘦疺也許偃切病疑也思醉切風也癥知陵切腹內癥結病也瘡楚羊切瘡痍古作創痢力地切㵼痢下也疶思烈切疶痢也巨右切病也疱薄教切疱瘡也瘑古禾切瘡也又古花切悁烏玄切骨節悁疼也痟思樵切痟渴病薄寐切病手冷㾒而於切㾒病也癐古會切病甚痭比騰切婦人癥血不止痄仕加切痄疨病甚也疨五加切疨口蓋切咽喉疾㾧苦卧切秃㾧病㿚力個切病也㾏五圭切癡貌五皆切病也痱甫未切熱生小瘡廢方吠切痼病病重也祛叶切病少氣時夜切病多力竹切病也五才切癡本又作呆思將息奬二切疾也瘲子用切瘲小兒病㾑五合切寒病癔於識切心意病疕輔履切頭瘍也㿇私習切小痛也又詞什切癗力罪切癗癗皮起病瘍以章切頭瘡謂之瘍都勒切病也于彼切口咼也㾇莫六切病也尼夜女下二切病也㾣口金切疾瘧惡寒振也疝所間山諫二切病也尳古忽切膝病與同呼骨切多睡病㾺莫怕切牛馬病􅯂部一百四十九凡七字在安切殘穿也同上睿以苪切明也聖也智也與同㕢居載切深堅意也偶也壑呼各切溝也與壑同㕟苦怪切大息也才正切坑也一曰礔也又作穽歹部一百五十一百七字歹午逹切􅍌骨之殘穿地捕獸歹同上古文殰徒木切胎敗鄭玄云肉敗􅖖於為切病也又作痿殊時未切死也廣雅殊斷蒼頡云殊異也㱯午哀公哀二切殺羊出其胎殛居力切殊也書殛于羽山子律切死也終也殘昨安切惡也賊義也食餘也又作㱚㱚同上禽獸食餘又作㱚殁莫骨切死也盡也今作沒歾同上殖時力切長也種也詩殖殖其庭言平正也殉詞峻切用人送死也亦求也營也肂思利切理也亦假葬道側殔羊至切説文也㱥力升切㱥殑鬼出貌又曽蹬切子牢紀牛二切終也亦作䄚殲子廉切盡也死也又作殱㱙虛九切腐也亦作朽漢書云稽侯應劭音訕李竒又音山㱻力外力卧二切畜産疫病殬都路同故二切又作斁殈况壁呼臭二切裂也殙乎溫切瞀也殤詩羊切不成人殨胡對切爛也殪於計切死也㱦丘知切棄也又居綺也㱳亡各切死宗㱳也同上殯俾刃切殯斂也殣竒吝切路冢也殠齒售切物傷氣殕方九切敗也步比切斃也之戍切殁也今作終殃於良切凶咎也殫多安切盡極也殄徒典切絶也古文㱴才賜切病也獸死與胔同殏渠猶切終也又作求許劣切盡也殎苦甲切㱠殎也㱠苦胡切㱠乾也古文辜字殍撫俱切餓死又平表切㱸莆狄切㱸㱤欲死貌㱤先狄切㱸㱤也殧千六切也􅦹子邪切小疫也㱟孚波切㱟折也􅿗力各切零也亦作落古鹿切死貌殐思祿切殊殜余褶切病也於劫切殜病殗同上居希居對二切古文刉壯殺切夭𣧖又癘病㱵方問切殨也㱞冝力切危也􅷕徐羊切女鬼也於太切死也殅色爭切死而更生也夭倚兆切短折亦作夭慈詈切今作胔力祭切病也殞為閔切殁也胡果切與禍同殑巨升切殑㱡掣縮也㱡色兢切殑㱡欲死貌㱶蒲行切死人時蒲盲切也呼庚切也􅓇虛顒切古文凶死丁故切死敗也又死病也徒亘切㱥困病貌殝側詵切死也盡也詞由切殘也於舉切㱠也奴到切佷也㱬於罪切㱬不知人丑利切鬼魅亦作䰡㱱胡罪切㱱㱣不平也㱣士罪切㱱力會切病也巨幼切殭同殭居良居亮二切死不朽殢火計天計二切極困先外切瘦病也力箇切瘦病也丁卧切貧殞也㱹力的切殫㱹也它計切喘也殃困極也公惠切殃殟烏殁切胎敗又音溫􅡅呼檅切困極或作􅦤息次切死盡又作殆徒改切危也殮力贍切殯也入棺也力翰切敗也又作爛奴沒切殟心亂也殂在乎切死也今作徂古文古文死部一百五十一凡八字死息姊切神盡也窮也説文斯也古文於計切古殪字𣧸資利切七四切説文戰見血曰傷或為死而復生曰𣧸薧呼勞切薧里黃泉也死人里也薨呼肱切亡也同上斃卑丗切什也頓也死也敗壞也另部一百五十二凡四字另古瓦切剔人肉置其骨咼同上㗗輔解切别也别蒲列切離也又彼列切分别也凶部一百五十三凡二字凶許恭切短折也惡也咎也凶許鞏切懼聲也又音凶穴部一百五十四百一十字穴胡決切孔穴也亦土室也家墳也􅠈扶福切也室或作㙏亦作復竇徒遘切水道也決也空也窹牛故切楚呼竈曰窹窐胡圭切古攜切甑孔也亦作竈子到切炊竈同上口定切空也又作罄䆷於決切穴貌也空也䆷於穴呼穴二切空也穿也又作䏐䆷窯余招切燒瓦竈式林切竈突也䆷呼穴切深貌或作坈竅口弔切穴也空也窞徒敢切旁入也次中小次也穿允緣切通穴也窖古孝切地藏也窵都料切窵窅深也空口公切盡也亦竅也窖普孝切窖藏也又力救切地名窡竹刮切穴中見穹丘弓切髙也窬羊朱徒溝二切穿木户穵乙八切深也空也窋知律切物在穴中貌空也周不窋后稷子窒知粟切塞也竀丑庚切正視也窗𥘉雙切明也在屋曰窗窗同上俗突徒骨它骨二切犬從穴中暫出也曰滑也窔於弔切幽深也穾同上俗窗丘垂切小視亦作窺窨一鴧切説文地室胡霸切橫木不入也寬也亦作瓠窮渠弓切極也窮同上填徒堅切塞也今作䆸竹萌切䆸宏闊大貌宏胡泓切宏䆵大屋也又屋深響也䆵杜萌切宏䆵窾口簷切空也窳俞知切邪也器中空説文汚窬同上烏皎切逺望合也冥也亦作杳窅窈七居切亦作岨口典切不動也窣酥骨切勃窣穴中出窊一瓜切沔下也窠口和切説文空也穴中曰窠樹上曰巢䆑除耕切小突也凹口答切凹合也竄蔥坃切匿也逃藏也窘羣尹切困也急也窆保驗切下棺也陟厄切兔窟也由心切深也胡萌切屋聲窈於鳥切窈窕幽間深逺也窕徒鳥切深感也窚時聲切屋所受弋質切穴也窪烏瓜切深貌㝩苦郎切空也窱它弔它了二切杳也深也邃思類切窮也深逺也䆚徒東切通䆚又音洞㝗力唐切穴也䆽巨魚切空也那胡切窒也竁充芮充絹二切穿地也究居宥切深也窮盡也竂落宵切寮穿也舍也䆰於吁切山穴也莫氷切土穴也胡官切與垣同窀豬倫切窀穸長夜也穸詞亦切左傳窀穸事䆹昌容切空也穻羽俱切也徒形切筳穴也䇁息咨切䇁穴也
