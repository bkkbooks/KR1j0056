body:
  text: 大廣益會玉篇卷第二十一凡三十部冥部三百十三凡二字冥莫庭莫定二切窈也夜也郭璞曰幼稚者冥昧鼆亡映切杜預曰魯邑又冥也又亡庚切夕部三百十四十二字夕詞積切暮也邪也亦作穸夜余柘切夜暮也説文夜舍也大下休舍也夤弋人切進也大也又楊也籀文夝疾盈切説文雨而夜除星見亦作晴夢莫忠切亂也不明也又莫貢切今想字外午會切説文表也逺也卯古文㱳亡客切寂也於逺切轉卧也夙思六切早也且也敬也古作説文夙多部三百十五二十六字多且何切大有也衆也古文􅢲所陳切姓也多也或作騂兟甡􅳉奴孔切郺􅳉盛多貌郺於孔切大多或作古壞切大也於果切多也㗬丑加切説文厚辱貌又暖口也㚊口才切多也大也亦作奓㚉公戶切多積利也夡丘二切多也奴多切哆也夠苦侯切多也丁含切多也㚋丁么切多也大也亦作奝余章切多也亦作洋昌占切多及也女切冗多貌音均因也力口切多也卶尺豉切大有慶也夥胡果切楚人謂多也㷇苦回切大也􅾬扶留切多也㩼章移之䜴二切多㚍口罪切多也小部三百十六凡六字小思悄切物之微也細也少戶沼切不多也又始曜切幼也豫列切小也少也尖子廉切鋭也乃口切小貌㝻其靳切對也或作僅廑么部三百十七凡七字么於條切幼也郭璞云後生也力計切背也説文戾也亦作戾乙例切説文不成遂急戾乙肖切急戾又小貌幼伊謬切稚少也麼亡河亡波二切小也思此七紫二切亦作小貌􅖨部三百十八凡四字􅖨伊蚪切微也巨乙切埤蒼云􅠟也􅠟音幽伊蚪切不明也深逺也微也古作幾居衣切動之微也吉凶之先見也期也危也尚也又居扆切幾多也又巨衣切玄部三百十九凡五字玄胡澖切幽逺也妙也又黑色􅏏古文玈來乎切黑也或作黸妙彌詔切今作妙精也兹子貍切濁也黑也或作滋丏部三百二十凡一字丏亡殄切不見也賔麵字從此大部三百二十一五十六字大逹賴切易曰大哉乾元万物資始老子曰道大天大地大王亦大夸苦華切奢或作姱字奯許活切空也大目也公胡切大也奅普教切大也夾古洽切近西廂也又古協切奃丁計丁奚二切大也視均切説文大也夽魚吻切大也􅴨飢􅝳切大也奄猗檢切大也覆也大有餘也息也㚠火么匹么二切長大也方結切大也亦字四万切上大也奜孚鬼切大也禹安禹晚二切奢也大口也才邪切大口也敲口大切擊也今作㪡奒口才切大貌也奝丁么切大多也掅紫切直大也説文火介切瞋大聲也火計切奢盛埤蒼云肥大㚜麾城切方也大也丸磚切健貌奚下雞切大腹也夷弋脂切平也敬也滅也易也蠻夷或字奕弋石切大貌美容也行也仕下切夸自大也太它大切甚也奇巨冝切今作竒契口計切劵也大約也又口給切奰皮祕切不醉而怒也壯也耎而兖切又作柔也古文與軍字同乙獻切大貌澤公老昌石二切大白澤也古文以為澤也奓竹加切下大又邪切奘昨朗切大也盛也尖子廉切小細也音奚獸迹也奫猗切木貌吳都賦泓澄奫潫奈奴太切正作奈字奆求阮切甚大也舉朱切邪視貌奩力切香奩也分勿切又扶勿切大也同上雉栗切説文大也音兹不正也蒲罪切大也他皓切長也奪徒活切取也同上多又切取也子隨切大也奦音務人也奢部三百二十二凡二字奢式邪切侈也泰也張也亦作奓奲丁可切充者切大寬也火部三百二十三二百九十三字火呼果切􅛚也燧人造火火者化也煩古回苦回二切火光也或作耿然加旋切燒也言如是也燃辱延切俗燒燃字蒸之承切火氣上也進也冬祭也又之孕切燋子藥子消二切炬火也所以燃火也焌豫閏子寸倉聿三切然火燒户遙切火焚揔名燎力弔切火在門內曰庭燎又放火也灼之藥切灼灼花盛貌又熱也明也炪丑出許出二切鬱也火光力弔切祡祭天炟丁逹切爆也燹先踐切野火也爆步角布角二切落也灼也又比教切火聲熮力酒切火貌燒也爛也徒甘切燎也小熱也燔扶藩切燒焚也炥扶勿切火貌焞徒門切無光耀貌他雷切盛貌又它門切爼下切才和切束炭也齌子奚才焍二切炊釡熛必堯切火飛也力振切火貌炯公回戶頂二切明察也光也炦步結切氣上又步葛切甫勿切火盛貌説文炭它旦切燒木也爚弋灼式灼二切光也電光也熚卑出切熚熚火聲也炱大來切炱煤煙塵也煤莫杯切煤也灰呼回切死火也煦吁句切蒸也赤色也溫潤也熱也亦作昫熇許皓切熇熇火熾也烓口回烏圭二切堪也煁市林切也烘許公切燒燎也烈力折切火猛也熱也威也業也餘也煨烏回切盆中火爊也熄相力切畜火滅想也燀尺善切炊也炊尺垂切㸑也烋火虯切美也福祿也慶善也又火交切􅛚麾詭切火也烈火也燬並同上烰音浮火氣盛貌㶴充爾切盛也爇而恱切燒也􅌊同上烄公巧切交木然以燎祡天並同上焠青對切堅刀刃熑力兼切絶也在陵子稜二切魚筒中炙熷同上煏皮逼切火乾也𤐧並同上熾尺示切火盛也同上於根切炮炙以微火溫肉煾同上焚父云切燒也燌炃並同上爓與廉切火焰也烜况逺切火盛貌炮白交切炙肉也炮同上炒初絞切火乾也􅵇炒並同上炔古惠切煙出貌炅同上又古逈切煪自留切煪熮火燒也同上燧似醉切以取火於日亦作鐆燧並同上煓它丸切火熾也㷰丑知切火焱也㷷子規切火熾亦作同上烽孚逢切烽燧表邊有急則熯而善切火盛乾也㷳五旦切火㷳也炵它冬切火焱也子姚切火燒黑又炙也焦同上煎子連切火乾火去汁熬五髙切乾煎物也胡沃切火灼也戶沃切猛火灼照之曜切明照也燭也照同上煬余尚切炙也對火也灸居又居有二切灼也燂似廉似林二切灰燖同上又火熱也煜余六切火焰又盛貌焴同上炖徒昆切風與火也又赤色焮許勤許靳二切炙也炘同上又熱也煝亡利切焃也煈非鳯切焚也中吕切熏也熸子廉切火滅熸也煆許嫁切熱也乾也炑莫十切火熾也熽蘇弔切火熾也爈力魚切燒也煬亦章切炙也烳怖古切把火行也煽尺戰切使火熾也㷆久切熾也熦咨略切灼也熆胡臘切燒也烯欣衣切亦晞字燫力兼切燫熪火不絶熪以支切上同烗口戒切熾也勳許云切功勳也子悉切虛計切焪丘仲切盡也乾也灱許交切乾也爆也焷毗支切缹也熻許及切熱也爖魯紅切火貌烘户公切火盛也㸎女涉切暖也或作焇思遙切乾也亦作銷缹音缶火熟也𤇺戶東切𤇺火也爐洛乎切火爐也烐職由切火行也力善切火小然也焟思亦切乾也亦惜同熰烏侯切火炮熰熧子從切火行也弋支切火燒也煘徒廉切鉗也爡丑伐切􅝏焥燒起也焥於活於伐二切上同熡勒侯切火炎也㶯力又切火㶯也燈的庭切火也炷之戍切燈炷也爌苦謗切光明亦作曠炴乙井乙丈二切火光爙如飬切火貌也熩呼古切火貌烶徒頂切火也炓落嘯切火光貌炬其吕切火炬亦作苣爁力暫切火焱行也燇子巽切火也熃武遇切主火也㷬慕各切火也爅莫北切光貌也㸅子日子力二切火也烼許勿切烼火煨也炢丈出切上同爩於勿切煙出貌熼與力切火也爀呼格切火色也燩口角切火乾物也㶼烏來切炫也熱也燉徒昆切火盛貌燏餘律切光貌㶿蒲沒切煙起貌炠胡甲切火熟也煠弋涉丑涉二切爚也炈唯辟切陶竈匆也煮之與切亦作鬻燆去堯切火行也爔許其切火也炣口我切火也炶胡甘切火上行貌亦作煔燈都騰切燈火也燭也煃去弭切火貌㷃丑水切火久也署與切野火也口蓋切火也焄詡云切火上出也亦作熏如之切煮熟亦作胹焝火困切火也烇七選切火貌焰以贍切光也力熖切火也𧹲火各切日出赤貌亦作燘呼回莫賄二切爛也灷士倦切火種也焀火哭切火貌亡結切不明也煂下革切煂燒也煍子了慈久二切變色也爍式灼切灼爍又銷爍㷿火嚴切火貌也孚訓切火乾物莫割切不明也火呼果切火發聲煥乎換切明盛亦作奐爞徒冬直中二切熏也煄之龍切火燒起煩父袁切煩也燒也磷力刃切鬼火亦作粦􅯢丑涉切火燒殘熟市六切火變物也炎部三百二十四凡十字炎于詹切熱也焚也暑日也説文火光上也粦力仁力振二切鬼火也煔胡甘切又大念切火光也焰弋贍切火行火生貌胡甘切火行貌欻許勿切暴起也力甚切火起貌古文光字以灼切火氣也燅似廉切溫也湯中瀹肉也亦作焱部三百二十五凡三字焱弋贍呼昊二切説文火華也熒胡坰切燈之光熒熒猶灼灼也亦熒陽縣燊所臻切炎盛和貌炙部三百二十六凡七字炙之亦切熱也之夜切膾也籀文膰父園切熱肉或作似廉切湯瀹肉也爒力照切炙也同上乎濫切肉也亦作䐄㸑部三百二十七凡四字爨千亂切竈也齊曰炊籀文釁許靳切以血祭也瑕隙也動也罪也兆也或作巨容切所以支曰鬲也又方奉切囱部三百二十八凡六字囱楚江切説文在墻曰牖在屋曰囱又千公切通孔又竈突窗同上囦古文匆千公切匆匆多遽也忩同上俗匆古文黑部三百二十九八十八字黑訶得切韓康伯云北方隂色説文火所熏色􅲂多逹切白而黑也漢書五原郡有莫􅲂縣黤烏敢烏檻二切靑黑也黸力胡切齊人呼黑也䵮式羊切赤黑色黗他孫切黃濁色之林切説文晳而黑古子晳名又音緘黚巨炎切淺黃也又音琴黝於紏切玄黑微青色干殄切黑皴也䵱許極切赤黑色黲千敢切淺靑黑色今謂物將敗時顔色也黔巨炎切黔色黑色也䵵又刮切黃黑又短貌黥巨京切墨刑也黥同上黨丁朗切朋也周禮五族為黨五百家也黕丁感丁甚二切黕點垢濁記林切黃黑如金也䵨莫江切冥暗也黰之忍切美髮也黜丑律切退也貶也下也去也放也絶也黷徒卜切數也垢也黑也黠間八切慧也堅也亡姦切畫車輪百昆切黑也倏他大的尸育三切靑黑繒也急疾也黵丁敢切太汚也又黑冠黑步安切姍下色貌𪒟余證切靣黑也力煩切竹衷黑黓余力切太歲在丑曰玄黓黮敕感都甚二切不明淨也􅱙徒見切亦作垽也烏圭切汗也五凶切黑穴也黫於顔於仁二切黑也亦作黭於井於敢二切黭黯也黟郁咨切黑木又縣名巨今切黃色也黶烏忝切黑子也亡狄切草木叢也亦作覭同上部三百三十二凡八字壯力切傾頭也今並作側公莭切説文頭傾也蒼頡云仡仡也胡結切頭裹態也力結切上同吳午胡切姓也亦郡也古文具眉切顧也左右視俾折切今作彌弓戻也夭部三百三十三凡四字夭倚苗切少長也舒和也於僑切屈也又折也喬巨嬌切髙也又喬木又居橋切奔布昆切走也以罪走出他國曰奔今作奔戶耿切遇也亡口而免凶曰又天子所至也或作今作幸交部三百三十四凡五字交古肴切合也共也更也道也或作詨于非切説文也絞古卯切絇絞繩索也又縊也又乎交切殺也火于切古盰字許維切恣也或為睢尢部三百三十五三十三字尢烏光切跛曲脛也又也短小也俗作兀尪同上尳乎沒切膝疾也㞁余昭弋照二切行不正也跛布左切塞也今作跛㝼於于切股㝼也㝾子賀切行不正尲佳咸公炎二切行不正也尬公拜公轄二切尲尬刀卧力為二切􅔂尯丘偽切跛也都兮切也戶圭切不能行人所也㞇烏潰切㞇㞂病䨾也腫市腫切足腫亦作瘇同上在果切尤坐也逹奚切不能行人所引也㞂他潰切冘然坐定貌丑孝切蹇也或作踔㞄烏感切蹇也立委切尤立貌尥平交力弔二切牛行後脛相交也㞆飢蟻切一足也今為踦呼恢切尵馬病也尵徒隈切病馬也同上步臥切仆也又步候切㞅郎卧切㞅不止也呼恢切豬地也巨逆切倦也尮丁卧切尮尢也於千切辛苦行不得貌一部三百三十六凡三字一伊日切專一也聚也合也皆也誠也亄倚秩於既二切貪也懿於兾切專久而美也叀部三百三十七凡六字叀職緣切自是也小謹也擅也獨也業也一也今作專文竹利切跲也仆也礙不行也或作躓一本作惠玄桂切愛也仁也賜也慈也恩也賙之衣食曰惠又作古文部三百二十八凡五字知柱切點也有記而識之卞皮變切法也又地名主之乳切家長也典也領也君也守也天子女曰公主㕻妨走他豆二切相與語唾而不受也咅同上丹部三百三十九凡七字丹多安切朱色也同􅶑並古文雘於縳切山海經雞也下多丹雘説文美丹彤徒東切丹飾也赤色蚒同上􅶤補姦切古班字賦也靑部三百四十凡四字靑千丁切東方色也四時春為靑陽古文䨼呼故切青也又青䨼山名靜疾井切審也謀也息也氏部三百四十一凡二字氏承紙切蜀呼山岸欲墮曰氏崩聲又姓氏居月切木本也今作厥氐部三百四十二凡四字氐丁兮切至也又丁禮切於進切又竹四切仆也㲳知栗大結二切觸也乎孝切聲類云誤也大廣益會玉篇卷第二十一終
