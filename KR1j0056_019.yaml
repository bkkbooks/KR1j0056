body:
  text: 大廣益㑹玉篇卷第十九凡一部水部二百八十五九百五十七字水户癸切流津也記水曰清滌仪礼所謂玄酒也汃彼銀切西方極逺国名尓雅西至於汃国河戸柯切河水出崐崘山􅥻且於切水出直路縣湯他郎切热水也又始陽切湯湯水盛皃涪扶鳩切水名出徼外南入漢又縣名江古双切山海經水出㟭山湳乃感切水出西河滇丁田切滇他又徒年他見二切潼大紅切水岀廣漢梓潼北界南入墊江池除知切渟水池溏又差池渽子來切渽水出蜀郡湔子田切水出玉壘山又浣也又子賤切水湔也浙之列切江也發源東陽至錢塘入海浩胡道切浩二水盛也大也沅牛袁切水出蜀郡涂逹胡切水出益州又涂涂露厚皃沫亡活莫盖二切水名又水流沫也潝虚及於夾二切水疾声汪烏光切水深廣也濊呼活切水声又於衛於外二切多水皃温於魂切水名又顔色和也善也漸热也澐禹軍切說文江水大波泚且礼切水清泚也漻胡巧力彫二切浩漻清水也灊似林切水又昨塩切出巴郡岩渠漣力纒切詩泣涕漣漣淚下皃渢扶弓切水声汎同上說文浮皃今爲汎濫字孚梵切淹於炎切水出醎巂徼外東南入弱水乆也漬也激公的切感激也說文水礙沄有軍切沄沄轉流也泬古穴呼决二切泬寥天氣清也沮七余切水名出房陵又才与子預二切洌力折切水清易井洌寒泉沆何黨切漭沆廣皃潏古穴切流皃又潏水在京兆又音聿波博何切水起大波爲瀾小波爲淪渾后昆後衮二切水漬涌声濞普秘切水暴至声汜孚劒切普溥也氾濫也亦作泛又扶嚴切滕大登切詩百川沸滕水上涌也潣莫殞切說文流皃又音浼瀺仕减切瀺爵水声洞逹貢徒董二切疾流皃又深逺也湁丑入切上林賦湁潗鼎沸謂水微細涌瀾力安切大波日瀾灡士旦切潘也亦同上瀏力周切深皃況吁放切寒水也涳口江口東二切直流也又女江切姓也澹徒濫余贍二切水動皃淙在宗切說文水声沖除隆切冲虚也灂任角切瀺灂溷胡困切濁也楚辝丗溷濁而不分兮乱也滿莫卵切实也盈也溢也漂芳妙切流也浮也潐子召切水尽也淪力均切没也淈古没切說文濁也一曰滒泥一曰水出皃汩字滑戸八切滑利古忽切滑稽浮扶尤切水上曰浮泓於絃切水流也洸古皇切水皃滋子怡切水名又長也益也液也泆余只切說文水所蕩泆也測楚力切度也廣深也𥘉瓦切泥也漏力豆切漏泄也潢後光切汙也說文積水池又胡曠切染潢也澤直格切氷渟曰澤又光潤溶俞種切水皃又音容潿音韋濁不流皃滓壮里切澱也瀆徒鹿反尓雅水注澮又江河淮済爲四瀆滛余箴切浸潤潤也又乆雨淑時六切說文淸湛也􅡶孚袁切大波㳬似沿切回泉也澗古鴈切澗水出弘農又山夾水曰澗淺七切水淺則前切水流清且盈切澄也潔也滲色䕃切滲漉也潯寺林切旁深也㶇胡觥切方舟謂之㶇航說文小津一曰以船渡也瀰莫尓奴礼二切深也盛也亡尓切亦弥字泙白明切谷名泏知律切水出皃渡徒故切說文済也廣雅去也過也渻所景切减也一曰水門名瀳才寸在見二切水至洊同上又仍也濇所力切不滑也瀧力公切方言瀧涿謂之沾漬又音双潪直赤直謫二切土得水也同上見說文溽如属切􅊜暑也瀸作廉切潰也潦郎道切田水盛也亦作澇又利皓切濢且遂切下􅊜遵累切汁漬淖女教切泥也溺也潰胡對切乱也濘奴定切泥也溟莫經切溟濛小雨荘子溟者天也涅奴結切染也又水中黒土派普賣切水分别曰派瀶力金切寒也洐胡庚切溝水也濃乃東女容二切露多也亦作瀨力大切說文水流沙上濆扶文扶刎二切湧泉涘仕几切水涯也淦古南切說文水入船中又泥也淺也又古暗切新淦縣名氿居洧切側出水曰氿泉湀口决口㒞二切流泉沼支紹切池沼也漘視均切河涯也潨在宗在公二切水㑹說文小水入大水浦配戸切水源枝注江海边􆄭巨知之移二切水流湖戸徒切大陂也泛孚劒切流皃澨視裔也水名也水边地也涯也沚之以切小渚也亦作洔洔同上水暫益且止未减也浞仕角切浞漬也淊胡感切淊泥也濳慈廉切水名又水中行也藏也漥烏華切牛蹄跡水亦窊同洼同上又烏佳切汙也濯直角切澣濯也湆去及切煑肉汁泱於黨於良二切水深廣皃又弘大声洫呼域切溝廣八尺曰洫溝古侯切廣四尺深四尺曰溝渠強魚切溝渠也瀋充甚切汁也汧苦田切水出扶風汧縣又水不流皃汕所諌切說文魚游水皃湊青豆切聚也競進也且罪切新也液余右切津液也浪力唐切滄浪水名又力宕切波浪也澳於六切隈也又於报切㳻七故切所以壅水㵾且定切寒冷也漬疾賜切浸也沔弥善切水出武都沮縣東南入江決公穴切判也又呼抉切灓力桓切沃也清也澒胡動切水銀也滂普方切滂沱也深式針切水名又邃也逺也又式鴆切注之𥙿徴孺二切灌也㵼也泳為命切遊泳潜行也瀼而章切露盛皃潟鹵亦切或滷字瀷余力昌力二切水岀河南宻縣淜備矜切徒渉也今馮字洄胡雷切逆流曰泝洄溾於回切溾没也沍胡故切閉塞也沁先林七鴆二切漢書水出上黨榖縣㳂余穿切从流而下亦作沿泝蘇故切逆流而上或作遡滅弥絶切尽也沌徒損切混沌也澮古會切水出平陽絳縣西尓雅水注溝也游以周切浮也旌旗之遊也淒且溪切寒風雨極也瀈許韋切竭也澽巨庶切乾澽也蕩逹朗切漢書水出河内隂縣又音湯廣皃㲻奴的切沉没於水今作溺湮於神切没也落也没莫实切溺也灩以冉切㶑灩也溠仄架千河二切水名又溠浙也渨於回切水渨曲也亦作隈滃於孔切川谷吐氣皃才代切測也泊歩各切止舟也洭墟狂切含洭縣洭水所出澍之樹切時雨澍生万物湒子立切雨下也沸也􅐹居况切往也㵐丘月切囯名潓胡桂切說文水出盧江入淮澬字私子私二切雨也水名瀑蒲到切疾風也沬也所革切細雨落㵧一例切清也濼力谷力各二切水在済南又音粕波濼也涿猪角切涿鹿縣亦作泔古三切米汁謂之泔滫思酒切米泔也力涕切滴也渮古河切河澤水在山陽湖陵縣渿奴大切渿沛波皃又水声泂乎頂切逺也与逈同子小切釃酒也漀口冷切出酒也淨仕耕切魯比城門池也又求性切漊力主切雨主又飲酒不醉消思遥切消息也尽也湎亡兖切沈湎也淡徒敢切薄味也漯通合切水在東都東武陽說文亦作􅊜溦亡非切小雨又亡悲切洅予雷切雷声震也古文字澉古淡切薄味也泡普交薄交二切水出山陽又流皃浽先悲切小雨也又奴罪切濛莫公莫孔二切微雨滖先悲切小雨余廉切進也洋以凉切水出崑崙山比又音祥涵户男切水澤多也或作涵涵同上又下䧟切没也㵦思累切滑也匹至切敗皃濁直角切水出斉郡廣縣又不清也㴶口角公渥二切霑也漬也洽胡夾切合也霑也漝時及切影也澋户猛切影也漑柯賚切水出東海桑瀆覆甑山又灌注瀁余掌切无涯際也古文漾淅桑激之舌二切淅洗㶕剛限切淅也㵊女狎切影動也湡魚俱切水出襄囯縣東今作虞沾知廉切益也說文他兼切澱徒見切垽也或作瀡息切滑也涂直都切塗也治除之除旣二切水又脩治也岀曲城陽縣曲山湟胡光切水出金城臨羌縣汾扶云切汾水出太原沶亦之切水名㲽乃見切水石也汳芳萬切水出浚縣北說文音沐澇力髙切水名廣雅洗也潞力故切水岀上黨派音孤水出鴈門溑酥果切水名洨胡交切水出常山石邑縣井涇山東滻所簡切水出京兆又出涕淇渠箕切水出林慮山淔恥力切水名涺京於切水名渚之与切水出中丘縣逢山又小洲洛力各切水出西山東北注河沇惟沔切水名亦作流渠致切水名沋禹牛切水名沽公奴切水岀漁陽塞外又音故潩夷記切水岀河南至宻縣泲子礼切水名今作済涃苦頓切水名浝莫江切水名沛傅盖普頼二切水出遼東塞外又縣名又滂沛汝如雨切山海經水岀天恩山灌古換切水岀庐江㳶乃口切水名泈之戎切水名瀤乎乖切山海經獄法山瀤澤之水出焉洈牛爲切漢書水岀髙城縣湞音貞湞陽縣又水名汘青田切水名㵚扶甫切水名淶吕開切水出代郡東南入河漳至裳切水出南郡臨沮縣溱仄銀切水岀桂陽浢音豆水名滬胡古切水名泥奴雞切水出郁郅縣又奴礼切濃露皃㵋莫解切漢書水岀豫章湘思量切水岀零陵淄仄其切水名􅬖直連切水名涶吐過切与唾同又土禾切水出西河溧理吉切溧陽縣又水名溜力救切水出欎林澠市陵切水名沘音比水名澥户買切渤澥海之别名又澥谷油以周切水名又麻子汗也潭徒耽切水出武陵􅻴父于切水名㶆之余切水名濥余刃切洪水演天說文水行地中瀙且進切水出南陽隂滶牛刀切水出南陽力盎切水名子盈切水名漦力之仕緇二切水名又涎沬也潧仄銀切水岀囯亦作溱滍直里切水出魯陽縣濋音楚水名潙音爲水名演弋展切計也長也延也長流也又水門也漷括鑊切水岀合郷縣淮胡乖切水岀桐柏山山吏切水名莫髙切水名潖蒲巴切水名􅞜胡戈切水名泗思至切水名州名又涕泗灃孚雄切水岀右扶風布堅切水名汒亡谷切水名灞布罵切水名渣助訝切水名澶視然切澶渊在頓丘縣南澧力邸切水出衡山潶呼得切水名濠户刀切水名慈忍切水名濾力預切水名沭時聿切今海州沭湯縣溳干墳切水岀蔡陽縣洢一移切水名濰夷隹切水名他六切水名汌尺恋切水名洙時俱切水出泰山澺於力切水出汝南瀘力呉切水名洇於鄰切水名㴒盈歴切水名灙多切水名沂魚衣切水出泰山琅玡縣思計切水也新郪縣思焦切水名㶀古爻切水名淯余熟切水名㳀古卧切水名㶟力進切水出鴈門潁余頃切水岀陽城縣虚冝切水名音斜水名湨古壁切水名沎呼卧切水名浯才都切水出琅邪縣洧爲軌切水岀陽城山㳋可求切水名浵徒冬切水名滁直余切水名渘而舟切水名汶亡運切水出朱虚山東㶏於謹切水出少室山澦音預灩澦水名滆下革切水名濲古禄切水名汱音畎水名㴲胡移切水出襄囯縣濄古訛切水出扶溝縣古外切水名濎的領切水名澊七昆切水名泘虎孤切水名泜丈指切水中丘也俗作沍汴皮恋切水出又州名􅦎力舒切水名湤式之切水名􅖐余灼切水名湋音韋水名灅力水切水岀倰靡縣南淩力徴切水岀臨淮汜詳子切水名音軌水名託藍切水名􅡰同上濡音儒水出涿郡又潤也濮𥙷禄切水出東郡地果切水名瀚音汗海名淞似龍切江名漟徒郎切溪也泠郎丁切水清泠也渹虚觥切水浪声也匹制切水声洀之游切水文沺徒蓮切大水淀徒練切淺水也潾力眞力刃二切水清皃漴柴融切漴漴水声也􅝞秃聾切水声灛赤善切水文涱陟兩切大水也浘音尾水流皃弋支切水文又徒羅切淠匹備切水声又匹計切􅪋呼肱切水声汐詞歴切水也溎於見切水大也潡徒損切大水也㲺資悉切又音莭水出也氻郎得切氻切泉声濍先公切水声渼莫彼切水波湠吐旦切大水也濗莫歴切淺水也瀿扶元切波也水暴益也㴐莫見切滇㴐大水皃泃古侯切水声濤徒刀切大波也滐巨列切大水皃涗始銳切温水也烏感於錦切大水至沜匹半切沜沜水流也㵗蒲氷切水声湍他端切急瀬也㳹於晃切大水皃渟逹丁切水正也乎冷切水盛皃亦作涬㴽思列切瀎悉水流也􅘶音馮水声户工切大波也漡式草切水流皃瀯音營水洄也湃普拜切滂湃水勢也沏𥘉乙切沏沏流皃渱胡公切水声七肖切浚波也溒于暄切水流皃渦古禾切渦水也汫口冷切汫涏小水皃又漂流滔士牢切書洪水滔天音聚水声皮恋切氷波也音䀨水流也洴毗名切水澼也湓丕寸切水声又音盆濆也流吕州切說文水行也􅲜火界切水声溭七力切波也㳁音側㳁汳流也泞直与切水停皃湢音逼湢㳁水驚涌皃溘口合切水也奄也匹芮切水墳声淌音唱大波也浟余周切水流皃港古項切水派也漫莫半切水平逺皃又散也溗市陵切水不流也湱火麥切水声㵹音桓波也呼逼切疾流皃滷音魯鹹水也潗七立子入二切湁潗水轉灕力支切水滲入也穀胡谷切水声火活切水声淲皮留切水流皃滮同上浤音宏浤浤汩汩海水騰涌皃泀音移又音司水名源語袁切水本也滭俾逸切泉出皃泩朔耕切水張也涐吾哥切水名灆力甘切水清力敢切𦵔也㳅力周切古文流字瀦音猪水所渟也洤古文泉字㳜虚尤切水去皃泖音柳泖泖水㒵濜助謹切水勢又慈忍切滉胡廣切滉瀁波也涯五佳切水際也户斬切泉也㶞奴郎切不流皃潑蒲末切水漏也汀他丁切水際平沙也洲也浛户紺切水和泥也漈莭例也水涯也灠盧瞰切湧泉也切輦切水流也補木切水也浼亡旦切汗也亡罪切水流泇音加水也又各遐切渺亡少切水長也漜余瓦切泥水皃濔莫比切水流皃溯音朔水也㳧丑渉切㳧湜纔有水􅟫子葉切上注火孔切水風也溪口兮切溪澗也灖文彼切流也洁音吉水也音述水名任緒釣魚処汯音宏深馮无舟涉也湕居偃切湕水㵢力堆切㵢澤也湴蒲監切水泛也淂都勒切水也渝弋朱切変也汙也又水名漎所蓊切又色講切溴尺又切水氣也渤蒲没切渤海也􅞎匹眇切水流也虚劫切水也漕才到切水轉運也又才刀切瀛与成切海也奴候切水漚濖常預切溝也善含切流也火麥切流也洱亡尓而至二切水出罷谷山㳙古玄切小流皃㶁古伯切水裂也澈直列切水澄也音水流皃澓防斛切澓流也潬大亶切江南呼水中沙堆漨扶龍切也也澤也漮苦郎切水虚也瀊蒲漫切洄也㵿户了切流皃莫百切水流皃子昔子結子未三切水岀溏逹郎切池也汔許訖切水涸也㵁呼光切水廣也羊水切流皃㶠羊隻切水流皃涹於禾切山名也溾涹濁也泑伊紏切又音幽山名瀱居义切井水也漪於冝切波動皃滵莫筆切流皃㵫女立切水動皃溓里兼里忝二切薄也大水中絶小水出也又含鑒切濂同上􅺈户式切露光也澂直陵切清也瀓澄並同上瀲离冉切瀲灔水溢皃又水波皃亦作儉又力驗切澰同上亦清也𥘉委切北方也漼靑罪切深皃㵏同上洒先礼先殄二切濯也深也滌也今爲洗又所賣切洗見上注先典切浴余玉切洗浴也如庶切漸温也洳同上瀵甫問切汾隂有水口如車輪濆沸涌出其深无限同上見說文力章切古文梁泦居六切水文也淗同上潎孚切波浪皃今作漂又匹袂普結二切漂潎也濩胡郭切煑也七海切淸也涎似連切口液也􅧔同上亦作攸汨莫歴切說文長沙汨羅渊也屈平所沉之水漞同上淏音昊清皃潷音筆笮去汁也同上漢呼岸切漢書水岀漢陽縣東又傳曰天河也㵄古文澯七旰切清也漿子羊切飲也古文涷先侯切濯生練也又洗候切与潄同又先卜切滀仲六切滯也音粲水淸皃淚力季切涕也㴃同上俗漆且栗切說文水出右扶風杜陵岐山東入渭古文茫莫郎切倉茫也液余石切津液也湭才周切液也汁之入切液也又時入切濈壯立切和也汗出也涰音輟注也詞林切深也漧古乾字猶燥也灢奴朗切於候切冬月疊草水中泣去急切无声出涕淚㵤矢甲切溢也㴀匹凡切深也予御切􅊜也澃居詠切淸也涷都聾切水名都弄切露皃沷府伐切寒也又音弗力定切銖淆户交切渾也溻他盍切􅊜也濣鳥活切取水也漙徒桓切詩零露漙兮㴼𥘉六思六二切􅊜也音渡過江也瀞􅔂姓切无姤也竹洽切􅊜也淴音怱汲也浥於立切􅊜潤詩厭行露洶許棋切洶湧水勢盛涌俞種切水騰波湧同上澀所立切不骨也澁俗同上漸慈斂切進也又子廉切洵相均切過水中也濺子賤切濺水也添他兼切益也下刮切不浄也丑刮切也洪胡工切大也說文洚也潚桑郁切水深淸也渙呼換切水盛皃海呼改切大也受百川万谷流入同上洚胡江胡公二切水不遵道瀌扶彪切雨雪又音鑣㵡音雹水激也沙所加切說文水散石也又素何切􅫤說文同上活户括古未二切詩北流活二同上見說文􅣇同上澩胡角切呼䔍切尓雅夏有水冬无水㶅同上溥怖古切大也徧也普也泐力得切石散泐也㵠口没切水深皃津子鄰切潤也梁也又水渡也古作同上出說文潒徒黨切水像漾也今作湯混胡本切大也又混濁桑没切没也汓似流余周二切人浮水上也泅同上又從也湝户皆古諧二切詩風雨湝二汦之是切氏著止也滌音迪洗也普計匹賣二切說文水在丹陽渒同上瀀於留切渥也清也又作渥烏角切厚也沾濡也七雜切沸皃子賃切水出武安縣東又寖漬浸同上洏音而不塾而煑又涕流皃渜奴管奴館二切湯也洝於旦切渜水也泄弋逝切水名在九江又思列切漏也洩同上汏徒蓋切洗也較逹切過也涫古乱胡乱二切沸也涾徒荅切沸溢也灉紆用切尔雅水自何出又音雍㴩澭並同上漉力木切竭也涸也渗漉也􅜷同上渌同上又音緑水也濟子計子礼二切水出常山又渡也㴉古文俗滰巨仰切乾漬米也􅜷也渉是葉切徒行渡水也濵俌辰切涯也瀕蒲民切說文本作頻水臣也又所賔附頻蹙不前而止亦同上泯弥忍弥賔二切㓕也乱也澡子老切洗子也治也火管切弄水也汲涺及切引水也涔字廉切魚寒入水又仕林切涔陽地名漽大兮切研米槌亦作澣乎管切濯也浣同上亦同上出說文瀎莫結切㓕也又莫割切浾仄加切滓也又棠木汁涷力見切煑絲熟絹也涭音受水皃方免切水皃㳚桑結切㳚瀎也又呼括許月二切㵼思野切傾也又相夜切􅮙魚列切議也與讞同瀠烏逈切大水也沰他各切茖也磓也沑仁乆切水吏也又女六女九二切泥也灝公道公禫二切煑豆汁減佳斬切少也輕也浨力感切棃汁也準之尹切平也俗作准渴口遏切頻飲也說文尽也亦作㵣渳亡俾切飲也去汁又水皃浹子叶切通也洽也胡咸切又音溓浧弋井切泥也澱也湫子由切水名在周地又子小切溢也又疾乆切潘孚袁切米汁普寒切姓也㵞仕留切腹中有水氣音鼻涕也㵩以丗切葱㵩也漭莫朗切平也廣也野也滯直厉切凝也淹也亦作滞洿放徒切黄洿行潦也汙同上又一故切浰力是切浰疾皃瀣乎代乎介二切沆瀣氣也沐莫卜切濯髪也斬樹皮也􅏰所班所板二切出涕涕恥礼切目汁出洬先䔍切洬雨声沕亡弗切没也􅌭紛軋沕不可分子也頮火内切洒靣也沫同上又莫貝切水名湏古文沐濧大内切淸也濡也瀢弋水切瀢瀢魚行相隨又水流皃淬七内切深也染也寒也濽子旦切相􅴟灑也㶄余廉切相汙也甫休切水声洟弋之他計二切鼻液也古作淤於去切水中泥草又濁也溢弋質切盈也餘也汰音太汰過也㴓山佳切漉米也潤如舜切水閏下也滋也又州名滒公娥士雅二切多汁也呼狄切遑遽也所患切洗馬也音鐓舵也泭方无切編木以渡又防无切水上漚涼力匠切薄也力將切寒也淟他殄切淟涊垢濁也㴦居隆切縣名淕力鞫切凝雨也漱所又思候二切盪也亦作涑涒他昆切歳在申曰涒灘涊乃殄切淟涊惡醉皃㵬音盈魯大夫名漁語居切捕魚也瀹弋灼余召二切煑也内菜湯中而出渫息列切除去也又仕洽切淍之由切帀也或作周􅏮力甚切寒也溛烏瓜切渦也溹所格切水名又溹溹雨下又桑各切湩都貢切江南呼乳爲湩汞户孔切鈆汞水銀滓泰托頼切侈也驕也又滑也汗何旦切小液也又占寒切餘汗縣名染如切染色又如艶切泬呼决切泬寥空皃漚於侯地漚麻也乆漬也又音謳淋力金切水堯也又雨下皃溼尸及切不燥也水流就溼濕同上說文他合切湑思吕切清也美皃也溢也又零露皃淰奴感切濁也水无波也又式稔切渰音奄雲雨皃詩有渰淒淒仄亮切米入甑也溔弋沼切浩溔滉瀁水无際也汛思見所賣二切洒掃也涆古旦切乾也又胡肝切漺初兩切净也泠也息靣湏芮二切飲也歃也又吮也灑所買切汛也大瑟也又所綺切泟恥京切赤也亦作䞓㵍亡本切懣也又音閔潠酥困切噴水也又先絹切力兊力活二切以酒祭地或作酹涏徒冷切洴涏徒切好皃􅶛乎三切或也声轉也澻似類切所以通水廣二尺深二尺也浚思閏切深也濬同上古文溞先勞切淅米声又思酒切潲山教切臭汁也潘也􅘞踈有切􅘞麫也又所留切小便也溲同上洎巨計居器二切肉汁溥各切潗也又徒檀切烏錦切古文飲字之純是倫二切沃也淸也淑也淳同上漶胡館切漫漶不可知也涖力二力計二切水聲澆公堯切薄也沃也又五弔切寒浞子􅞏同上十五卷終
