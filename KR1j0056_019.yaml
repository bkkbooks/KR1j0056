body:
  text: 大廣益會玉篇卷第十九凡一部水部二百八十五九百五十七字水户癸切流津也記水曰清滌儀禮所謂玄酒也汃彼銀切西方極逺國名尓雅西至於汃國河戶柯切河水出昆崘山􅥻且於切水出直路縣湯他郎切熱水也又始陽切湯湯水盛貌涪扶鳩切水名出徼外南入漢又縣名江古雙切山海經水出岫山湳乃感切水出西河滇丁田切滇他又徒年他見二切潼大紅切水出廣漢梓潼北界南入墊江池除知切渟水池溏又差池渽子來切渽水出蜀郡湔子田切水出玉壘山又浣也又子賤切水湔也浙之列切江也發源東陽至錢塘入海浩胡道切浩二水盛也大也沅牛袁切水出蜀郡塗逹胡切水出益州又塗塗露厚貌沫亡活莫蓋二切水名又水流沫也潝虛及於夾二切水疾聲汪烏光切水深廣也濊呼活切水聲又於衛於外二切多水貌溫於魂切水名又顔色和也善也漸熱也澐禹軍切説文江水大波泚且禮切水清泚也漻胡巧力雕二切浩漻清水也灊似林切水又昨鹽切出巴郡岩渠漣力纒切詩泣涕漣漣淚下貌渢扶弓切水聲泛同上説文浮貌今為泛濫字孚梵切淹於炎切水出醎巂徼外東南入弱水久也漬也激公的切感激也説文水礙沄有軍切沄沄轉流也泬古穴呼決二切泬寥天氣清也沮七余切水名出房陵又才與子預二切洌力折切水清易井洌寒泉沆何黨切漭沆廣貌潏古穴切流貌又潏水在京兆又音聿波博何切水起大波為瀾小波為淪渾后昆後衮二切水漬涌聲濞普祕切水暴至聲汜孚劒切普溥也泛濫也亦作泛又扶嚴切滕大登切詩百川沸滕水上涌也浼莫殞切説文流貌又音浼瀺仕減切瀺爵水聲洞逹貢徒董二切疾流貌又深逺也湁丑入切上林賦湁潗鼎沸謂水微細涌瀾力安切大波日瀾灡士旦切潘也亦同上瀏力周切深貌況吁放切寒水也涳口江口東二切直流也又女江切姓也淡徒濫余贍二切水動貌淙在宗切説文水聲沖除隆切沖虛也灂任角切瀺灂溷胡困切濁也楚辝丗溷濁而不分兮亂也滿莫卵切實也盈也溢也漂芳妙切流也浮也潐子召切水盡也淪力均切沒也淈古沒切説文濁也一曰滒泥一曰水出貌汩字滑戶八切滑利古忽切滑稽浮扶尤切水上曰浮泓於絃切水流也洸古皇切水貌滋子怡切水名又長也益也液也泆余只切説文水所蕩泆也測楚力切度也廣深也𥘉瓦切泥也漏力豆切漏泄也潢後光切汙也説文積水池又胡曠切染潢也澤直格切氷渟曰澤又光潤溶俞種切水貌又音容潿音韋濁不流貌滓壯里切澱也瀆徒鹿反尓雅水注澮又江河淮濟為四瀆淫余針切浸潤潤也又久雨淑時六切説文淸湛也􅡶孚袁切大波漩似沿切回泉也澗古鴈切澗水出弘農又山夾水曰澗淺七切水淺則前切水流清且盈切澄也潔也滲色蔭切滲漉也潯寺林切旁深也㶇胡觥切方舟謂之㶇航説文小津一曰以船渡也瀰莫尓奴禮二切深也盛也亡尓切亦彌字泙白明切谷名泏知律切水出貌渡徒故切説文濟也廣雅去也過也渻所景切減也一曰水門名瀳才寸在見二切水至洊同上又仍也澀所力切不滑也瀧力公切方言瀧涿謂之沾漬又音雙潪直赤直謫二切土得水也同上見説文溽如屬切􅊜暑也瀸作廉切潰也潦郎道切田水盛也亦作潦又利皓切濢且遂切下􅊜遵纍切汁漬淖女教切泥也溺也潰胡對切亂也濘奴定切泥也溟莫經切溟濛小雨莊子溟者天也涅奴結切染也又水中黑土派普賣切水分别曰派瀶力金切寒也洐胡庚切溝水也濃乃東女容二切露多也亦作瀨力大切説文水流沙上濆扶文扶刎二切湧泉涘仕几切水涯也淦古南切説文水入船中又泥也淺也又古暗切新淦縣名氿居洧切側出水曰氿泉湀口決口俊二切流泉沼支紹切池沼也漘視均切河涯也潨在宗在公二切水會説文小水入大水浦配戶切水源枝注江海邊􆄭巨知之移二切水流湖戶徒切大陂也泛孚劒切流貌澨視裔也水名也水邊地也涯也沚之以切小渚也亦作洔洔同上水暫益且止未減也浞仕角切浞漬也淹胡感切淹泥也濳慈廉切水名又水中行也藏也漥烏華切牛蹄迹水亦窊同窪同上又烏佳切汙也濯直角切浣濯也湆去及切煮肉汁泱於黨於良二切水深廣貌又弘大聲洫呼域切溝廣八尺曰洫溝古侯切廣四尺深四尺曰溝渠強魚切溝渠也瀋充甚切汁也汧苦田切水出扶風汧縣又水不流貌汕所諌切説文魚遊水貌湊青豆切聚也競進也且罪切新也液余右切津液也浪力唐切滄浪水名又力宕切波浪也澳於六切隈也又於報切㳻七故切所以壅水淨且定切寒冷也漬疾賜切浸也沔彌善切水出武都沮縣東南入江決公穴切判也又呼抉切灓力桓切沃也清也澒胡動切水銀也滂普方切滂沱也深式針切水名又邃也逺也又式鴆切注之𥙿徴孺二切灌也㵼也泳為命切遊泳潛行也瀼而章切露盛貌潟鹵亦切或滷字瀷余力昌力二切水出河南密縣淜備矜切徒涉也今馮字洄胡雷切逆流曰泝洄溾於回切溾沒也沍胡故切閉塞也沁先林七鴆二切漢書水出上黨榖縣沿余穿切從流而下亦作沿泝蘇故切逆流而上或作遡滅彌絶切盡也沌徒損切混沌也澮古會切水出平陽絳縣西尓雅水注溝也遊以周切浮也旌旗之遊也淒且溪切寒風雨極也瀈許韋切竭也澽巨庶切乾澽也蕩逹朗切漢書水出河內隂縣又音湯廣貌溺奴的切沉沒於水今作溺湮於神切沒也落也沒莫實切溺也灩以冉切瀲灩也溠仄架千河二切水名又溠浙也偎於回切水偎曲也亦作隈滃於孔切川谷吐氣貌才代切測也泊步各切止舟也洭墟狂切含洭縣洭水所出澍之樹切時雨澍生万物湒子立切雨下也沸也􅐹居况切往也㵐丘月切國名潓胡桂切説文水出盧江入淮澬字私子私二切雨也水名瀑蒲到切疾風也沫也所革切細雨落㵧一例切清也濼力谷力各二切水在濟南又音粕波濼也涿豬角切涿鹿縣亦作泔古三切米汁謂之泔滫思酒切米泔也力涕切滴也渮古河切河澤水在山陽湖陵縣渿奴大切渿沛波貌又水聲泂乎頂切逺也與逈同子小切釃酒也漀口冷切出酒也淨仕耕切魯比城門池也又求性切漊力主切雨主又飲酒不醉消思遙切消息也盡也湎亡兖切沈湎也淡徒敢切薄味也漯通合切水在東都東武陽説文亦作􅊜溦亡非切小雨又亡悲切洅豫雷切雷聲震也古文字澉古淡切薄味也泡普交薄交二切水出山陽又流貌浽先悲切小雨也又奴罪切濛莫公莫孔二切微雨滖先悲切小雨余廉切進也洋以涼切水出崑崙山比又音祥涵户男切水澤多也或作涵涵同上又下陷切沒也瀡思纍切滑也匹至切敗貌濁直角切水出齊郡廣縣又不清也㴶口角公渥二切霑也漬也洽胡夾切合也霑也漝時及切影也澋户猛切影也溉柯賚切水出東海桑瀆覆甑山又灌注漾余掌切無涯際也古文漾淅桑激之舌二切淅洗㶕剛限切淅也㵊女狎切影動也湡魚俱切水出襄國縣東今作虞沾知廉切益也説文他兼切澱徒見切垽也或作瀡息切滑也塗直都切塗也治除之除既二切水又修治也出曲城陽縣曲山湟胡光切水出金城臨羌縣汾扶云切汾水出太原沶亦之切水名涊乃見切水石也汳芳萬切水出浚縣北説文音沐潦力髙切水名廣雅洗也潞力故切水出上黨派音孤水出鴈門溑酥果切水名洨胡交切水出常山石邑縣井涇山東滻所簡切水出京兆又出涕淇渠箕切水出林慮山淔恥力切水名涺京於切水名渚之與切水出中丘縣逢山又小洲洛力各切水出西山東北注河沇惟沔切水名亦作流渠致切水名沋禹牛切水名沽公奴切水出漁陽塞外又音故潩夷記切水出河南至密縣泲子禮切水名今作濟涃苦頓切水名浝莫江切水名沛傅蓋普賴二切水出遼東塞外又縣名又滂沛汝如雨切山海經水出天恩山灌古換切水出廬江㳶乃口切水名泈之戎切水名瀤乎乖切山海經獄法山瀤澤之水出焉洈牛為切漢書水出髙城縣湞音貞湞陽縣又水名汘青田切水名㵚扶甫切水名淶吕開切水出代郡東南入河漳至裳切水出南郡臨沮縣溱仄銀切水出桂陽浢音豆水名滬胡古切水名泥奴雞切水出郁郅縣又奴禮切濃露貌汨莫解切漢書水出豫章湘思量切水出零陵淄仄其切水名􅬖直連切水名唾吐過切與唾同又土禾切水出西河溧理吉切溧陽縣又水名溜力救切水出欎林澠市陵切水名沘音比水名澥户買切渤澥海之别名又澥谷油以周切水名又麻子汗也潭徒耽切水出武陵􅻴父于切水名㶆之余切水名濥余刃切洪水演天説文水行地中瀙且進切水出南陽隂滶牛刀切水出南陽力盎切水名子盈切水名漦力之仕緇二切水名又涎沫也潧仄銀切水出國亦作溱滍直里切水出魯陽縣濋音楚水名溈音為水名演弋展切計也長也延也長流也又水門也漷括鑊切水出合鄉縣淮胡乖切水出桐柏山山吏切水名莫髙切水名潖蒲巴切水名􅞜胡戈切水名泗思至切水名州名又涕泗灃孚雄切水出右扶風布堅切水名汒亡谷切水名灞布罵切水名渣助訝切水名澶視然切澶淵在頓丘縣南澧力邸切水出衡山潶呼得切水名濠户刀切水名慈忍切水名濾力預切水名沭時聿切今海州沭湯縣溳干墳切水出蔡陽縣洢一移切水名濰夷隹切水名他六切水名汌尺戀切水名洙時俱切水出泰山澺於力切水出汝南瀘力吳切水名洇於鄰切水名㴒盈歷切水名灙多切水名沂魚衣切水出泰山琅玡縣思計切水也新郪縣思焦切水名㶀古爻切水名淯余熟切水名㳀古卧切水名㶟力進切水出鴈門潁余頃切水出陽城縣虛冝切水名音斜水名湨古壁切水名沎呼卧切水名浯才都切水出琅邪縣洧為軌切水出陽城山㳋可求切水名浵徒冬切水名滁直余切水名渘而舟切水名汶亡運切水出朱虛山東濦於謹切水出少室山澦音預灩澦水名滆下革切水名濲古祿切水名汱音畎水名㴲胡移切水出襄國縣濄古訛切水出扶溝縣古外切水名濎的領切水名澊七昆切水名泘虎孤切水名泜丈指切水中丘也俗作沍汴皮戀切水出又州名􅦎力舒切水名湤式之切水名􅖐余灼切水名湋音韋水名灅力水切水出倰靡縣南淩力徴切水出臨淮汜詳子切水名音軌水名託藍切水名􅡰同上濡音儒水出涿郡又潤也濮輔祿切水出東郡地果切水名瀚音汗海名淞似龍切江名漟徒郎切溪也泠郎丁切水清泠也訇虛觥切水浪聲也匹制切水聲洀之遊切水文沺徒蓮切大水淀徒練切淺水也潾力真力刃二切水清貌漴柴融切漴漴水聲也􅝞秃聾切水聲灛赤善切水文涱陟兩切大水也浘音尾水流貌弋支切水文又徒羅切淠匹備切水聲又匹計切􅪋呼肱切水聲汐詞歷切水也溎於見切水大也潡徒損切大水也㲺資悉切又音莭水出也氻郎得切氻切泉聲濍先公切水聲渼莫彼切水波湠吐旦切大水也濗莫歷切淺水也瀿扶元切波也水暴益也㴐莫見切滇㴐大水貌泃古侯切水聲濤徒刀切大波也滐巨列切大水貌涗始鋭切溫水也烏感於錦切大水至沜匹半切沜沜水流也㵗蒲氷切水聲湍他端切急瀨也㳹於晃切大水貌渟逹丁切水正也乎冷切水盛貌亦作涬㴽思列切瀎悉水流也􅘶音馮水聲户工切大波也漡式草切水流貌瀯音營水洄也湃普拜切滂湃水勢也沏𥘉乙切沏沏流貌渱胡公切水聲七肖切浚波也溒于暄切水流貌渦古禾切渦水也阱口冷切阱涏小水貌又漂流滔士牢切書洪水滔天音聚水聲皮戀切氷波也音䀨水流也洴毗名切水澼也湓丕寸切水聲又音盆濆也流吕州切説文水行也􅲜火界切水聲溭七力切波也㳁音側㳁汳流也濘直與切水停貌湢音逼湢㳁水驚涌貌溘口合切水也奄也匹芮切水墳聲淌音唱大波也浟余周切水流貌港古項切水派也漫莫半切水平逺貌又散也溗市陵切水不流也湱火麥切水聲㵹音桓波也呼逼切疾流貌滷音魯鹹水也潗七立子入二切湁潗水轉灕力支切水滲入也穀胡谷切水聲火活切水聲淲皮留切水流貌滮同上浤音宏浤浤汩汩海水騰涌貌泀音移又音司水名源語袁切水本也滭俾逸切泉出貌泩朔耕切水張也涐吾哥切水名灆力甘切水清力敢切𦵔也㳅力周切古文流字瀦音豬水所渟也泉古文泉字㳜虛尤切水去貌泖音柳泖泖水貌濜助謹切水勢又慈忍切滉胡廣切滉漾波也涯五佳切水際也户斬切泉也瀼奴郎切不流貌潑蒲末切水漏也汀他丁切水際平沙也洲也浛户紺切水和泥也漈莭例也水涯也灠盧瞰切湧泉也切輦切水流也補木切水也浼亡旦切汗也亡罪切水流泇音加水也又各遐切渺亡少切水長也漜余瓦切泥水貌濔莫比切水流貌溯音朔水也㳧丑涉切㳧湜才有水􅟫子葉切上注火孔切水風也溪口兮切溪澗也灖文彼切流也潔音吉水也音述水名任緒釣魚處汯音宏深馮無舟涉也湕居偃切湕水㵢力堆切㵢澤也湴蒲監切水泛也淂都勒切水也渝弋朱切變也汙也又水名漎所蓊切又色講切溴尺又切水氣也渤蒲沒切渤海也􅞎匹眇切水流也虛劫切水也漕才到切水轉運也又才刀切瀛與成切海也奴候切水漚濖常預切溝也善含切流也火麥切流也洱亡尓而至二切水出罷谷山涓古玄切小流貌㶁古伯切水裂也徹直列切水澄也音水流貌澓防斛切澓流也灘大亶切江南呼水中沙堆漨扶龍切也也澤也漮苦郎切水虛也瀊蒲漫切洄也㵿户了切流貌莫百切水流貌子昔子結子未三切水出溏逹郎切池也汔許訖切水涸也巟呼光切水廣也羊水切流貌㶠羊隻切水流貌涹於禾切山名也溾涹濁也泑伊紏切又音幽山名瀱居義切井水也漪於冝切波動貌滵莫筆切流貌㵫女立切水動貌溓里兼里忝二切薄也大水中絶小水出也又含鑒切濂同上􅺈户式切露光也澄直陵切清也瀓澄並同上瀲離冉切瀲灔水溢貌又水波貌亦作儉又力驗切澰同上亦清也𥘉委切北方也漼靑罪切深貌漼同上灑先禮先殄二切濯也深也滌也今為洗又所賣切洗見上注先典切浴余玉切洗浴也如庶切漸溫也洳同上瀵甫問切汾隂有水口如車輪濆沸涌出其深無限同上見説文力章切古文梁泦居六切水文也淗同上潎孚切波浪貌今作漂又匹袂普結二切漂潎也濩胡郭切煮也七海切淸也涎似連切口液也􅧔同上亦作攸汨莫歷切説文長沙汨羅淵也屈平所沉之水漞同上淏音昊清貌潷音筆笮去汁也同上漢呼岸切漢書水出漢陽縣東又傳曰天河也漢古文澯七旰切清也漿子羊切飲也古文涷先侯切濯生練也又洗候切與潄同又先卜切滀仲六切滯也音粲水淸貌淚力季切涕也淚同上俗漆且栗切説文水出右扶風杜陵岐山東入渭古文茫莫郎切倉茫也液余石切津液也湭才周切液也汁之入切液也又時入切濈壯立切和也汗出也涰音輟注也詞林切深也漧古乾字猶燥也灢奴朗切於候切冬月疊草水中泣去急切無聲出涕淚㵤矢甲切溢也㴀匹凡切深也豫御切􅊜也澃居詠切淸也涷都聾切水名都弄切露貌沷府伐切寒也又音弗力定切銖淆户交切渾也溻他盍切􅊜也濣鳥活切取水也漙徒桓切詩零露漙兮㴼𥘉六思六二切􅊜也音渡過江也瀞􅔂姓切無姤也竹洽切􅊜也淴音匆汲也浥於立切􅊜潤詩厭行露洶許棋切洶湧水勢盛涌俞種切水騰波湧同上澀所立切不骨也澀俗同上漸慈斂切進也又子廉切洵相均切過水中也濺子賤切濺水也添他兼切益也下刮切不淨也丑刮切也洪胡工切大也説文洚也潚桑郁切水深淸也渙呼換切水盛貌海呼改切大也受百川万谷流入同上洚胡江胡公二切水不遵道瀌扶彪切雨雪又音鑣㵡音雹水激也沙所加切説文水散石也又素何切􅫤説文同上活户括古未二切詩北流活二同上見説文􅣇同上澩胡角切呼篤切尓雅夏有水冬無水澩同上溥怖古切大也遍也普也泐力得切石散泐也㵠口沒切水深貌津子鄰切潤也梁也又水渡也古作同上出説文潒徒黨切水像漾也今作湯混胡本切大也又混濁桑沒切沒也汓似流余周二切人浮水上也泅同上又從也湝户皆古諧二切詩風雨湝二汦之是切氏著止也滌音迪洗也普計匹賣二切説文水在丹陽渒同上瀀於留切渥也清也又作渥烏角切厚也沾濡也七雜切沸貌子賃切水出武安縣東又寖漬浸同上洏音而不孰而煮又涕流貌渜奴管奴館二切湯也洝於旦切渜水也泄弋逝切水名在九江又思列切漏也泄同上汏徒蓋切洗也較逹切過也涫古亂胡亂二切沸也涾徒答切沸溢也灉紆用切爾雅水自何出又音雍灉澭並同上漉力木切竭也涸也滲漉也􅜷同上渌同上又音緑水也濟子計子禮二切水出常山又渡也濟古文俗滰巨仰切乾漬米也􅜷也涉是葉切徒行渡水也濵俌辰切涯也瀕蒲民切説文本作頻水臣也又所賔附頻蹙不前而止亦同上泯彌忍彌賔二切滅也亂也澡子老切洗子也治也火管切弄水也汲涺及切引水也涔字廉切魚寒入水又仕林切涔陽地名漽大兮切研米槌亦作浣乎管切濯也浣同上亦同上出説文瀎莫結切滅也又莫割切浾仄加切滓也又棠木汁涷力見切煮絲熟絹也涭音受水貌方免切水貌泧桑結切泧瀎也又呼括許月二切㵼思野切傾也又相夜切􅮙魚列切議也與讞同瀠烏逈切大水也沰他各切茖也磓也沑仁久切水吏也又女六女九二切泥也灝公道公禫二切煮豆汁減佳斬切少也輕也浨力感切梨汁也準之尹切平也俗作準渴口遏切頻飲也説文盡也亦作渴渳亡俾切飲也去汁又水貌浹子叶切通也洽也胡咸切又音溓浧弋井切泥也澱也湫子由切水名在周地又子小切溢也又疾久切潘孚袁切米汁普寒切姓也㵞仕留切腹中有水氣音鼻涕也㵩以丗切蔥㵩也漭莫朗切平也廣也野也滯直厲切凝也淹也亦作滯汙放徒切黃汙行潦也汙同上又一故切浰力是切浰疾貌瀣乎代乎介二切沆瀣氣也沐莫卜切濯髮也斬樹皮也􅏰所班所板二切出涕涕恥禮切目汁出洬先篤切洬雨聲沕亡弗切沒也􅌭紛軋沕不可分子也頮火內切灑靣也沫同上又莫貝切水名須古文沐濧大內切淸也濡也瀢弋水切瀢瀢魚行相隨又水流貌淬七內切深也染也寒也濽子旦切相􅴟灑也㶄余廉切相汙也甫休切水聲洟弋之他計二切鼻液也古作淤於去切水中泥草又濁也溢弋質切盈也餘也汰音太汰過也濾山佳切漉米也潤如舜切水閏下也滋也又州名滒公娥士雅二切多汁也呼狄切遑遽也所患切洗馬也音鐓舵也泭方無切編木以渡又防無切水上漚涼力匠切薄也力將切寒也淟他殄切淟涊垢濁也涫居隆切縣名淕力鞫切凝雨也漱所又思候二切蕩也亦作涑涒他昆切歲在申曰涒灘涊乃殄切淟涊惡醉貌㵬音盈魯大夫名漁語居切捕魚也瀹弋灼余召二切煮也內菜湯中而出泄息列切除去也又仕洽切淍之由切匝也或作周􅏮力甚切寒也溛烏瓜切渦也溹所格切水名又溹溹雨下又桑各切湩都貢切江南呼乳為湩汞户孔切鉛汞水銀滓泰托賴切侈也驕也又滑也汗何旦切小液也又占寒切餘汗縣名染如切染色又如艷切泬呼決切泬寥空貌漚於侯地漚麻也久漬也又音謳淋力金切水堯也又雨下貌溼尸及切不燥也水流就溼濕同上説文他合切湑思吕切清也美貌也溢也又零露貌淰奴感切濁也水無波也又式稔切淹音奄雲雨貌詩有淹淒淒仄亮切米入甑也溔弋沼切浩溔滉漾水無際也汛思見所賣二切灑掃也涆古旦切乾也又胡肝切漺初兩切淨也泠也息靣須芮二切飲也歃也又吮也灑所買切汛也大瑟也又所綺切泟恥京切赤也亦作赬㵍亡本切悶也又音閔潠酥困切噴水也又先絹切力兊力活二切以酒祭地或作酹涏徒冷切洴涏徒切好貌􅶛乎三切或也聲轉也澻似類切所以通水廣二尺深二尺也浚思閏切深也濬同上古文溞先勞切淅米聲又思酒切潲山教切臭汁也潘也􅘞踈有切􅘞麵也又所留切小便也溲同上洎巨計居器二切肉汁溥各切潗也又徒檀切烏錦切古文飲字之純是倫二切沃也淸也淑也淳同上漶胡館切漫漶不可知也涖力二力計二切水聲澆公堯切薄也沃也又五弔切寒浞子􅞏同上十五卷終
