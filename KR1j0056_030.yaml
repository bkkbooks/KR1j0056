body:
  text: 大廣益㑹玉篇卷第三十凡四十七部四部四百九十六凡三字四思利切數也次三也古文亖籕文叕部四百九十七凡三字叕知劣切連也􅵌同上吳人呼短物也則律切雞兒声部四百九十八凡六字於訝切次也就也配也凹烏合切又烏交切凹凸也烏訝切姓也凸徒結切起也他骨切起皃宨古文絡字五部四百九十九凡二字五呉古切數也次四也古文六部五百凡一字六力竹切數也五之次也七部五百一凡一字七親吉切數也八部五百二凡十四字八博拔切數也分甫墳切隔也半也拖也别也又扶問切限也意深也又刈禾分斉也公古紅切方平也正也通也屈也㒸似醉切從意也今作遂介居􅝳切甲也大也紹也助也說文畫也尒而紙切語助也别也詞之畢也亦作尓詹之塩切至也詹詹多言皃補徹切分也古作别必俾吉切拯也果也然也敇也專也尚時様切上也庻幾也且也曽也髙也加也曽子登切則也才登切經也个柯賀切枚也亦作箇余弋諸切身也我也語之舒也同上釆部五百三凡七字釆蒲莧切辨别也象獸指爪古文悉思栗切尽也詳也審也和也番扶元切獸足或作蹯又普丹切番禹縣名又歩丹切番和縣名宷尸甚切定也詳也諦也審同上釋式亦切廢也解也除也半部五百四凡二字半布旦切物中分叛歩旦切離也去也不与也背也别也背邑曰叛九部五百五凡三字九居有切數也馗巨眉切九逵道也亦作逵古文丸部五百六凡四字丸胡官切圜也假而轉也於訛切鳥食巳吐其毛如丸也胡官切又如之切丸屬奿芳万切說文云其義闕也十部五百七凡八字十是執切天九地十數之具卄如拾切二十并也今直爲二十字卙子入充入二切卙卙蚕盛又㑹聚肸許乞切布也今爲肹博布各切廣通也千且田切十百爲千慈立切辝之集㔹力德切十人也卅部五百八凡三字卅先闔切三十也􅞀先入切四十也丗户制切父子相継也三十年曰丗古部五百九凡二字古公户切古乆之言伏羲上古文王中古孔子後古人始也嘏加下切大也固也長也寸部五百十凡十字寸千鈍切十分也尉於貴切武官稱㝷似林切繹也理也重也用也遂也射市柘切矢也又作䠶以近窮逺也又以柘羊益二切專之船切六寸簿也又紡專亦爲專尃撫俱切徧也布也或作敷導徒到切通也引也教也須全切修也將子羊切行也欲也或也送也奉也大也助也養也扶侍爲將又子匠切帥也又七羊切寺似吏切司也嗣也官也丈部五百十一凡三字丈除兩切十尺也丈夫也長也扶父長扶万姓也丁報切姓也他禮切横首杖皕部五百十二凡二字皕彼利切二百也又音逼奭式亦切盛也驚視皃也甲部五百十三凡五字甲古狎切六甲也太歳在甲曰閼逢豆戴切也亦作瑇蝳莫代切亦作蝐下甲切相著也如甘切甲邊乙部五百十四凡六字乙猗室切甲乙也太歳在乙曰栴蒙尤于留切過也怪異也責也多也怨也亂力貫切理也冦也或作􅜆書以切今作始乩古奚切今作稽乾巨焉柯丹二切竭也燥也燋也丙部五百十五凡一字丙兵皿切辰名太歳在丙曰柔兆又光明也丁部五百十六凡二字丁多庭切強也壯也太歳在丁曰强圉又竹耕切丁丁伐木声也他丁切亦作戊部五百十七凡三字戊亡冦切茂也太歳在戊曰著雍成市征切平也畢就也古文己部五百十八凡四字己居喜切身也太歲在己曰屠維古文㠱竒己切長跪也或作巹居隱切舒也敬身有所承也巴部五百十九凡二字巴布加切國名又巴蛇吞象三年而後吐其骨服之無心腹病市招切擊也庚部五百二十凡一字庚假衡切庚猶更也太歳在庚曰上章辛部五百二十一凡八字辛思人切辢也太歳在辛曰重光辥婢亦切死刑也罪也說文私列切辠在磊切犯公法也今作罪辜古胡切罪也古作辤似咨切不受也别也去也辝籕文辭亦同上理獄爭訟之辭也辢力逹切辛辢也痛也辡部五百二十二凡三字辡皮免切辡罪相與訟之言又方免切辯皮免切慧也正也理也㸤普靣切尓雅革中絶謂之辨車轡勒也􅌰部五百二十三凡四字􅌰綺䖍切􅌰􅓧也亦作愆過也失也又作愆妾七接切不娉也字從􅌰童徒東切男有罪爲奴曰童使也獨也又童童盛皃今用憧籕文桀部五百二十四凡五字桀竒列切磔也或作賊民多累曰桀磔竹格切張也尓雅祭風曰磔椉是升是證二切勝也罵也升理也計也覆也守也一也古文乗今文壬部五百二十五凡一字壬而林切太歳在壬曰玄􅘬癸部五百二十六凡三字癸古揆切太歳在癸曰昭陽籕文癸古文子部五百二十七凡四十字子咨似切兒也滋也爱也男子之通稱也㜽古文籕文字疾恣切愛也養生也養也飾也㝃靡辯切生子㝃身也孕弋證切妊子也含實也古文作孠似利切今作嗣孩胡來切㓜稚也㝅奴豆切又公豆切乳也慤也季居悸切稚也少也小稱也孖子詞切亦作滋蕃長也亦作或詞恣切孷孖孛薄背切星也又音勃孜音滋厚也孿嗇患力貟二切変也双産也孟莫更切長也子也始也疑魚其切嫌也恐也不定也亦作􅳼音矩孤也古文好字孼魚列切憂也孼孼盛飾皃孥怒乎切子也亦作帑學爲角切受教也斍也也㝂之列切皇也音粲二女也孤古乎切特也少无親父也獨也孷刀辝切孷孖双生也音體小兒皃丑證切川也孺如喻切稚也少也乳子也孑焉正俗存在昆切恤問也有也察也在也􅥽公孝切效也說文又音交音李古文孢乎切孳疾利子思二切孳産也籕文孝呼效切說文善事父母者孡敕來切孕也亦作胎古文字㜿音叙孾音纓孩也了部五百二十八凡四字了力鳥切訖也慧也說文也丁了切懸物皃也居折切遺也餘也後也短也无右臂也子九月九勿二切短也無左臂也孨部五百二十九凡四字孨莊卷㫖兖二切謹也孤鬼也孱仕連切不齊也愞弱也又仕限切孴牛起切盛皃又衆多皃籕文又竒字晉子刃切部五百三十凡五字徒骨切不順忽出亦作突說文他骨切古文今作突育余六切長也養也生也養子从善也撫也上同䟽所居切稀也闊也逺也通也理也分也非親也又所去切檢書也丑部五百三十一凡四字丑敕九切丑猶紐也羞思留切進也熟食也進也辱也恥也䤁余心才心二切熟麴也幽也即狄切也漉酒也酒咨有切杜康所作礼云祭宗廟酒曰清酌莫公切麴生衣也細屑也亦作䵆芳萬切酒熟也釀一宿也公縣切以孔下酒也釃所宜所綺二切下酒也醇也或作醆仄限切酒濁微清也一曰爵也酴大乎切麥酒不去滓飲醪力刀切滓酒也酤胡古切一宿酒又古胡古護二切賣酒也醊竹芮切今作餟祭酹也亦作醴力弟切甜酒醴泉狀如酒力暫切泛齊行酒釀女帳切作酒醖於運切釀酒余振切少飲酳同上醇時均切粹也不澆酒也酎除又切醇也釀也醹如庾切厚酒莫公切濁酒釂子切飲酒尽酖都含切樂酒也䤗古禫余瞻二切酒味苦䣧徒戴與職二切酒色也醲女容切厚酒䣵汝吏切重釀酸先丸切酢也古文酷口梏切酒味厚也亦作酌之若切挹也斟也猪冝切酒厚普未切酒色醩子刀切籕文槽同上亦作􅙤酓於忝火含二切酒苦也醮子肖切婚祭或作醬子匠切醯也同上見說文古文籕文醰徒紺切酒味不長又音覃醧於據切私也酒羙也醢訶改切醬也􅛙亡侯切􅛙䤅醬䤅大侯切􅛙䤅醬䤎巨岀切䤉醬配普對切匹也嫓也合也醺許軍切醉也和皃蒲桂切檮榆醬醙使鄒切白酒醂力感切藏梯也䤕許角切酢也醋才各切客荅主人今音䄍酏余支切米酒也甜也醝在河切白酒醠烏浪切濁酒下衮切醨相沃醦所檻切酢也䤉亡二切飲酒俱盡亦作䤔昨冉切䤔䣸味薄也䣸而琰切䤔䣸䣼力醬切雜味也似由切酒色䤍亡兮亡安二切酣胡甘切樂酒也或作佄醳夷石尸石二切莤酒醛义劣切鹹𦵔也酮徒董切酢欲壞視利切亦作䤒巨氣切米酒色酺歩胡蒲故二切大飲酒也奴敢切煑也亦作醯呼啼切酸味俗酘徒鬪切酘酒也醨力支切薄酒醉子遂切卒也度也不至乱亡狄切酪滓䤙力的切䤙醎音咸俗醎字音嘗醚音濔醉也醅匹才切醉飽也未䍤酒也莫割切醏醬也醏當孤切醏䣩士倫切羙也䤃於今於南二切户茅切酲陳身切病酒也醉未斍酭于敕切報也或作侑醿無悲切酴醿酒􅬙音醫酬市周切勸也報也厚也醻同上莤所六切酒去滓又搕上塞醔自流切亦作酉酒莒醽魯丁切渌酒醁力玉切醵其庻其虐二切合錢沽酒䣰同上䤘且冉切酢也又初减切似吕切羙皃亦作藇酑音于飲也醟于命切酗也䣱許貝切兇酒曰䣱醟酗同上酨昨戴祖代二切酢漿也􆁧於林於琰二切酒也酥音蘇酪也醐戸吾切醍醐醍他礼切酒紅色一音提䣽同上酢且故切酸也今音昨酬酢䣻音諳又音含酒色也音征錯煑魚同上􅶻側射切造酒醡同上酹力昧切餟祭也以酒祭地音离乳腐名音祇音搊出酒酡徒和切飲酒味顔皃􅋳俗􅟍在計切五􅟍或作齊又醬音覧䤘醋味􆄽音桑乳酒酐火朗切苦酒與乆切酒名酠口下切苦酒醷於力切又於里切梅醬也酪力各切漿也乳汁作旨善切苦酒醜尺乆切皃惡䤏皮羙切酒色醑相呂切羙酒醒思廷思領二切醉除也音了醥清酒也醥匹妙切醥醓音毯酷也酸也韽於切音抽酒名䤄弥兖切飲酒失度或作湎酩莫逈切酩酊醉甚也酊多領切酩酊音簡鹹也醼於見切設也􆁦平孝切面上瘡大廣益㑹玉篇卷之三十終
