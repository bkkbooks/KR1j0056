body:
  text: 大廣益㑹玉篇卷第十二凡五部木部一百五十七八百二十二字木莫穀切位居東方甲乙也燧人氏鑚出火也說文冒也冒地而生東方之行从􅋄下象其根㮕而兖切紅藍一曰棗似杮橙除耕切木果橘属橪於堅切橪皮香艸又而善切酸卜棗也楷口駭切木名又楷式也又音皆樤徒彫切柚樤亦作條條徒彫切枝條小枝也枸俱禹切其子可作醬出蜀中亦作蒟字柅女几奴礼二切木名又絡絲具栵力制力薛二切栵栭也􅏄鋤几切赤实果也楇古和切車缸盛膏者又枋車收絲具末莫曷切端也盡也木上曰未棪餘冉切赤实似柰可食槅居責切大車軛也權具貟切黃英木也又稱鍾亦作榑附俱切榑桑神木日所岀也李力子切果也左傳行李也杍古文李又音子木工果古禍切草木實也又果敢也信也朸旅得切木理也平原有朸縣梒胡諳切櫻桃亦作含櫻於耕切含桃曰櫻桃榦柯旦切柘也又楨㯤築垣版也又柄也栭如之切栭栗也又屋枅上標也桃逹髙切桃李毛果也榹息移切山桃似桃小標俾饒切木未也又標㪯也又卑小切楨知京切堅木又楨幹築垣版也桂古惠切木名桂枝薬名桋余脂切木名𣏌桋也欃仕杉切木蘭也又楚咸切說也同上又音托落也與籜同榝所黠切木名子似茱茰蘽力軌切木名櫐同上籀文栲苦道切木名山㯉也同上似荀切木名可爲鉏柄柀碑詭切杉木埋不腐檆所咸切木名杉同上梓啓里切木名桐梓琴材榟同上栘余支成兮二切棠棣也栟俾名切木名耕櫚也榛仕銀切木叢生子賤切木名檟柯雅切山楸木也榎同上枳居𥿄諸氏二切果似橘楸且留切木名梓属欏力多切檖木也橞胡桂切木名様辛兩切相木實也橡同上楝來見切木也子可浣衣椅於冝切椅桐木楸也㭁如陵切木也樲如至切酸棗也楮丑吕切楮木可造𥿄柠同上槆相倫切杶也又丑倫切椿丑倫切木名出莊子杶敕倫切木似㯉櫄同上檴胡覇胡郭二切木名樗同上檜古㑹切木名栢葉松身於力切木名梓属栺至而切木名栢補白切松栢也松徐容切木名松栢也㮤古文樅子庸七恭二切松葉栢身棫胡逼切棫木白桵也㰋婢賔切木名里計切木名某莫目切酸果又音母我也槑古文榮爲明切榮華也又桐木丘貴切木也可爲杖㮿俾質切木名楋力逹切木名本𥙷衮切始也說文木下果㮺古文梔之移切木生黄實可染時渚切柔栩今作杼㭪革切黃木名榶徒郎切棣木也口寒切書隨山木栞同上栯餘六禹九二切木葉如梨杙余力切果名又橜也榖古斛切惡木也檀逹丹切香名欇時葉切豆名虎櫐也同上榣餘招切木名又樹動皃枇婢脂切果名枇杷也梂渠鳩切檪实徐㳂切稔棗也樛居秋切木下曲曰樛朻同上梗柯杏切梗直也又桔梗桔居屑切桔梗薬名梧午徒切梧桐木桐徒東切梓木也槸魚制切木相摩也同上樜之夜舒預二切大木也柞才落子各二切木名梇力棟切木名杒如振切木名槀苦道切木枯槀也槁同上㭕去諸切㭕极馿上負版㭩力說力活二切木名杈楚加切枝也梃逹頂切梃木也􅢎他洛切擊木又作析柝同上槭子六切木名可作車䡦楛胡古切木中作矢笴杏胡梗切果名橚息六切木長皃模莫奴切法也規也橅同上朱之瑜切赤心木松栢屬櫟來的切木名又舒灼余灼二切櫟陽縣名植時職切根生之属又種也又除吏切養蠶氣也㯰同上㮨子力切木名似松有刺杝直𥿄切詩析薪杝矣謂隨其理也又音移木名思野切案别名樹時注切木緦名曰樹籕文枊五浪五郎二切繫馬柱楂側加切水中浮木也柴門也亦作查櫍之逸切椹也朵都果切木上垂又枝朶也朶同上枵許朝切玄枵十二辰名枕之稔切卧頭所薦也又車後横木又之賃切栻丑力切局也柄必命切柯柄可把又權也棅同上橈奴教切曲木如昭切小楫欘知録切枝上曲一曰斤柄又斫也或作斸力桃切木名梁音良梁棟又水橋也渿古文枎輔虞切扶踈木四布也櫎胡廣切所以支器也一曰惟櫎屏風屬樇息流切木名牀仕良切几安身及坐具也床俗格柯額切式也量也至也棈才見切木名亦作䯂所臻切衆盛皃橺下板切大木皃樘逹郎丑庚二切柱也又音橖橕同上樸普角切木素普卜切叢木梢所交切木未小柴也㭂子了切木忽髙㮝何格切角械也檐余曕切屋檐前也櫩同上柔如周切軟弱而不剛也椇俱禹切木名枳椇也呼骨切髙也同上榍先結切木名說文限也同上杲公老切杲杲明也白也枌扶云切枌木白榆也杕徒計切木盛皃槏去咸切户也櫝徒穀切匱也木名又小棺樚同上杳於鳥切深也杳冥也枋甫亡切木可作車櫙於侯切木名樓落侯切重屋也櫛側瑟切梳枇之緫名楖同上楊余章切楊栁枝直不垂柳力酒切楊柳垂條木桺說文柳字檉敕貞切說文河柳㭒詳里切重也與耜曰梩同上􅚰武官莫昆二切木名又音朗欒魯官切木名似欄槈奴遘切器也楃烏角切木帳也枱弋之切耒端木也亦作鈶籕文栽子來切築牆版又昨代切棣徒計切唐棣栘也檵故詣切檵枸相也欀人向切道木也桮愽回切㔶也桮棬也杯同上檥義竒儀倚二切整舟也杫思漬切肉几名㮐同上又思井切同上槃歩干切器也或作盤鎜柈同上㰍力同切房室之疏亦作櫳柘之夜切桑柘亦作樜檿於簟切山桑朽虚柳切腐也椷古咸胡緘二切木名杯也篋也同上楔革鎋切門房木又先結切千栗切木也可為杖桊居媛切牛鼻桊㮲楚愁切牛桊也楥吁萬切履法楥履具楦俗桓胡端切木名又桓柦武皃橎甫袁甫逺二切木名去狂切棺椁門櫒先葛切櫒声也栒思尹切縣鍾横者亦作簨同上桯户經它丁二切牀前几也榆庾朱切榆木白枌也棻妨云切香木也村千昆切坊市也先刀切舡名或作艘㮴同上楲於帰切决溏木又䉅器也樵昨焦切木薪燔火者占逈切篋也上支切確衡也杻敕九切杻械獄具也杽同上㭘居業公荅渠業三切劒柙机飢雉切木出蜀中欋具俱切四齒杞𣔻待骨植也椁古莫切内棺謂之椁槨同上櫺力庭切屋招也楯間子也楰俞主切耕器楸属桭之仁切屋梠也栕同上椒子姚切􅴸也薬椒也同上榙胡荅切果名又音荅􅳏杜荅切榙􅳏木似李㮙五各切穽也柍於兩切木實了枻余丗切枻柁楫也栧同上案於旦切几屬又食器也櫾余舟切木名可為器檈似宣切圜案也梜公洽切検柙也櫁亡質切香木斫乆乃香出榓同上梋古玄切盂属詞玄切木名柢丁計切柢木根也􅳒口頓切古文困榰之移切材也杴計嚴切耕士具鍬屬同上柱雉縷切楹也株主切塞也檼於靳切棼也棟也棟都貢切屋極也楹余成切柱也􆁽古祀乖買二切老人杖也柺同上株陟俱切根株木根也根柯恩切木根生入地􅚰皮祕切木名岀蜀中㯷補木普木二切堅也苞也又歩卜切㯷􅈪小木亦作樸又縣名枝之移切木枝枝梢也朴普角普木二切本也枚莫回切枝也又箇也枒魚嫁切木名又丈賖切木岀交髙数千丈葉在其末也栠如甚切栠栠木皃枖於嬌切枖枖木盛皃桹力唐切桹然髙木也槮所錦切木實作罧同㭪取魚者又楚今史今二切木長皃柚羊宙切果似橘而大柖時昭切柖柖樹相皃枉紆往切裏曲又冤枉桴方無扶留二切屋隱也又語乗桴浮于海注編竹木小者曰桴梴丑連切梴梴木長皃築徴六切檮也古作構古候切架屋也造也極渠億切棟也皇極極中也又至也盡也逺也髙也楶子結切欂櫨属也梀山革切赤梀木也莫到切門樞横梁也檹於冝切木長賈侍中說㯀郎椅也又檹柂不正皃欂補各弼㦸二切枂也楗渠偃切関楗與鍵同㰇子廉切偰也或作殱槶古誨切筐也枰皮兵皮柄二切枰仲木名又博局也柵楚洛切編竪木為欄徒紅切竿也或作憧杠古厖切長杠旗竿也􅯗所銀切杠也柮當骨切榾柮木頭又五滑切断也榻恥獵切床狹而長梳所於切可理髪具也􅽍胡的胡革二切燒麥柭蒲葛切矢箭未樏力追切山行所乗又力詭切扁榼也柶思至切柶角匕也杵齒與切杵揷舂具也桱公定切桯也又木名㭑武頼切木名㭓皮変切門柱上欂櫨亦作閞櫑力回切木器亦作椑薄雞切斧柯又圓榼俱錄切器舉食者楟徒丁切柰果名杓甫遥都歴二切斗柄又市若切檕公悌切繘耑木也槌紂愧切植也𧖟槌也样余章于郎二切槌也椓都角切擊㭬也橢敕果切狹長也車笒中橢器也梯它奚切竹木階也棖宅行切門西傍木也椎直追切木器椎也㯊户恩切平量也橇丘喬切行泥乗者亦作又子絶切楱且豆切果木也橘属杭胡剛切州名又槽属胡懶切以輔木轉也棉弥羶切木名同上㮌同上椵大館切瑕木似楊㯫距於切藩落篱也棴扶木切木名出崑崙楓甫紅切香木㯲居䕃切格也㯸子忍切盂也檣才羊切舡檣帆枉也附俱切草木子房樢丁了切木也與蔦同椈居六切栢椈也槹古刀切桔橰也梑徒的切梑橰也椀於管切小盂亦甆器楺如酉切楺屈木也樟之楊切木名豫樟也櫫竹余切楬也􅹭女閭切杷􅹭也梈普庚切木弩也棝公路切㮌斗可射䑕榏牛狄切榏舟亦作艗於可切橠木盛皃橠乃可切橠㰊因廉切木細葉㭺倚儉切柰也桄古黄切桄楖木名朾徒丁切橦也又音汀橫胡觥胡孟二切閑木槳子两切楫屬櫂馳效切檝也棹同上㰎遵爲子遂二切地名槎仕雅切斫也與查同榾古忽切枸榾木中箭榽遐雞切橀木名橀呼溪切榽橀同上俗柧古胡切柧棱木名棱力増切柧棱木也梡口管胡管二切木名欓多朗切茱茰也栓山全切木釘也巨列切木釘也㮯胡本切木未破也古部切竟也今作旦樔仕交切澤中守草楼椊昨骨切柱頭内槦余鍾切木名杔丁格切杔櫨也休虚鳩切休息也養也棲思奚切鳥棲亦作栖櫪力狄切櫪㯕柙指也㯕先奚切櫪㯕也㮍子田切古文牋午載切與礙同械亥誡切器仗也桎梏桎之實切在足曰桎梏古篤切在手曰梏他力切古文直且接切飯臿也逹感切木名櫳力東切檻也牢也柙胡里切木柙檻也檻下黑敢切闌也檻楯也枔才心切木葉杬魚袁切木名㮶所角切木名櫬楚鎭切親身棺也楬渠列切有耒識之稱㮪瞿龍切小舟亦作􆉛橏之善切木榴也櫗立結切木索也㮖公八切㮖鼓也櫨來都切木名又柱上柎也楣母悲切屋聮櫋也終栗切也椽馳宣切榱椽也桷古斈切榱也橑梁道切榱也枅結奚結賢二切方木也弥聖切屋櫋聮也椳郁囬切戸樞也榱所龜切桷椽也弼㦸切壁柱也榼苦閣切酒噐㮰婢脂椑抵二切屋梠也梠力語切梠楣持也楤七紅切尖頭檐㭋歩項切㭋棒也棒同上棓同上又枷連也橝大玷切梠也大切木名樀都歴切檐屋梠也棦义耕切木束也力追切木實也檭魚巾切木名榕余鍾切木名杗武方莫當二切屋大梁樞齒朱切户樞又機也棡古郎切髙木也槻吉雖切木名㯾作蒿也木名必厖切木名梀丑足七足二切短椽又木名楯時允切欄槛亦作盾橗莫耕切木心橩巨營切木名棈七精切木名則此切木名槾莫干莫旦二切杆槾也杵於胡切杆槾塗也橒于軍切木文也主營切木名樳詞林切木名椼余闡切木名楎呼帰切栻也又犂轅頭也梱苦本切門橛梱也栦時㳺切栦木也力舟切木名息邪切木名樉色飬切木名㭉胡瓜切两刃臿也亦作鏵柌似咨切柌鎌柄也句娯切㭉臿也枮思尖切木名朷都勞切木名㰂式荏切木名櫌於求切摩田噐也椎也柫甫物切連枷打穀者杷歩牙切取麥噐胡昆切木名桍苦胡切木名櫕昨官切木叢槩柯爱切乎斗解也又梗槩杚同上又古没切平也栚直荏切横槌也栶於眞切木名時春切木名如累切木名㭙陟革切槌横木関西謂之㭙棏同上古文桇而諸切木名檯徒來切木名椔側師切木枯死檷奴底切木也絡絲柎也㮁下交切㮁桃梔子也棯而審切果木名竹旨切枝也檑力推切木名􅗚所還切木􅗚機居衣切弩平又樞機機權先和切織具亦作梭槽徂毫切馬槽也楮丑吕切穀也檋紀録切山行所乗以鐡施屐下又丘喬切榺詩證切機持經者杼持吕切機㭙緯者椱扶冨切機持繪者􅧇力掌切松脂也棑皮拜切舡後棑木又歩街切筏也棚皮莖部登二切閣棧也檓欣詭切大椒謂之檓枓都口切栱枓戸巧切噐名樺胡化切木名皮可爲燭又户瓜切核爲革戸骨二切果實中也榭詞夜切臺有木曰榭柁徒可切上舡木柅与支切舡名槱於宙切燎木以祭天也與楢同栫在見切木也柴木壅水也櫔力制切木名子如栗橖徒郎切車橖也呼改切酒噐名棸直流側鳩二切姓也又士乆切木名樴之力徒得二切係牛杙也橜巨月居身二切門梱柧側孝切木刺名椸音移衣架也棿魚稽切車轅持衡木也與䡚字同棧仕板切棚也一曰竹木車梐蒲礼切梐枑牢具枑胡故切梐枑㰁盧可切㰁椏椏於加切木椏杈又烏可切㰁椏樹斜槿渠巾切柄也居隱切木名思計切陽山名楘音木車歴録也檢居險切書署也桲蒲骨切令連枷打榖者又榅桲果名梎乙交切相也皆鎌柄也枘而銳切柄也枘鑿也㮃於皮切田噐榤音桀杙也椹猪金切鉄椹斫木櫍或作㪛時枕切桑子棤思亦切棤皵皮甲錯也樎所六切櫪也飼馬具㦿丑利切蒦柄也同上又女几切棬去權切屈木盂又居媛切拘牛鼻亦作桊㯮時燭切木名大葉似栁㭈古穴切椀也亦盂也宋說切栭也檮徒勞切断木杌五骨切樹無枝又傳曰檮杌棢無两切車棢也與輞同㯽卑民切木名㯽榔也椺戸狄切鐘椺也徂活切木錐也欐力底力計二切小舡又梁棟名又所冝切弋周切木更生也與由同楩鼻綿切木名似豫樟寨柴夬切軍宿処棐方尾切輔也㭟居奉居辱二切两手同㭟亦作拲术時聿切穀也直律切薬名棜於據切棜噐也几属柛始神切木自斃蘖魚割切餘也􅤁㮆枿並同上橋巨嬌切梁也又居召切榷吉斈切水上横木渡梌丈加切刺木也杆公旦切檀木也㯿力葉弋渉二切柶大端也橃𥙷逹切海中木舡亦作㮛是支切匕名今作匙㯆色盞切木名吉忍切木也欄力寒切欄檻以木為之欚力底切江中大舡又作􅿍檡舒亦切徒革切棗也檖夕醉切木名同上桅具彼切木名五回切舡竿楫才立子葉二切行舟具也㭸逹胡切木枝四布㭄息進切木名槵胡貫切木名檛竹華切䇿也椎也與簻同析思狄切分也破木曰析薪橨扶云切枰仲木别名檔都郎切床也又木名㰄子眠切小栗名樌古換切木叢生也今作權棷側尤义垢二切木也柴也㰏古勞切所以進舡梫亡任予禁二切木名㯠口練切木名樾禹月切两樹交隂之下楪余陟切牖也又楪榆縣名枼同上又与渉切薄也榪莫覇切床頭横木烏縣切木曲栺五計切枍栺又音脂栭木楄扶田切楄柎也又方木也樽子昆切酒噐亦作罇側吏切木名式志切木名力戈切木也材中箭笴楅甫六切持牛木又音逼㯛户孤切棗也亦作壷㮇他念切木杖也栝說文同上橛渠月切橛株山名亦作橜榬禹煩切絡絲具或作弋之切舡戽斗曰㯞言戀切木也皮似絹􅺉郎卧切木名榅於渾切柱也於勃切果也校胡教切械也古效切檢也㯯公棟切小柸亦作㯝力度切桐木也椂力篤切木名杺思林切木名又車鉤心木采且在切色也采取也事也㮧於胡切㮧槦木中箭笴薄計切木名橓式閏切木名楞力登切木楞也亦作稜柿蒲㑹孚吠二切枝附也㭚力煑切木中箭笴者榒尼革切木名杪彌紹切木未也棎時占切果名似奈而酸棺古丸切棺椁古乱切歛也樍子狄切檉木別名栿符目切木梁栿椌口江切楽器杋扶嚴切此木皮俗呼水桴槄他刀他活二切山榎也橔大囬切棺椁覆也他禄切杖指也柎方无切花蕚足椶祖東切椶櫚也一曰蒲葵橭古胡切木名木四布也枃子吝切織者梳絲具棊音其博弈棊也栙下江切栙雙也櫚力居切椶櫚木耕櫚也櫰古回户乖二切與槐同檞佳買切松椾木也胡甲切檻也㯙直舌切棗也樁陟江切橛也書容切橦也栱居冡渠恭二切杙大者於兮切弩楔木也檅息銳切小棺朳兵抜切無齒杷檰彌連切木也有子似栗橧才陵切豕所寝又子登切榯是之切樹木立也榨側嫁切打油具柆力合切木也析木也槇多連切木梢之忍切木宻㮥歩本切軬車也亦車弓也子移切㰎榪木实可食欈俞規切欈檎其吟切林檎果􅦻居言切􅦻子樗蒲采也板補簡切木片也與版同橄古覽切果木橄㰖也欖盧敢切橄欖朹渠鳩切果名朹繫梅枹縛謀切鼓槌又百交切柩渠救切只在棺其棺曰柩都憒切車亦作柲筆媚切㦸柄也􅟒丈加切苦􅟒名也榜蒲萌切輪弩又北孟切槤力前切木名又横関木也櫖力預切似葛而麄大槪古㑹切杖也榠亡零切榠果木也材昨來切木梃也又材幹也槍千羊切岠也木两頭銳也柢也又楚庚切欃槍星櫡陟略切斫也柉扶嚴切木皮可爲索吉口切𣏌薬名本作枸槥爲綴木芮二切漢書槥師古云小棺又音歲櫽於謹切櫽栝也朲如神切屋上間朲也橉力進力盡二切木名又門限桾居云切桾櫏木出交趾櫏且連切木名桾櫏同上栴章延切梅檀香木也樶子回切木樶節也桁下庚切屋桁胡剛切大械桗都和切木之未也㮮公節切㮮槹以汲水槐戸灰戸乖二切槐木􅪚虚竒切杓也蟸爲􅪚也㭠息典切木也俗曰雷鳴子櫧之餘切木冬不凋者檽乃豆切木名皮可染㭨余遮切㭨子木名也櫯先胡切櫯木可染緋以整切棗也似柿而小櫞尹全切果木似橘者楉如灼切木名楉榴也枕于牛切枕木樟屬􅼻力舟切扶􅼻藤名枤唐左切船尾小梢與柁同榴力周切果木石榴也檬亡公切木名似槐也欞朗丁切長木杊詞倫切木名亦柄柴仕皆切小木散材可燔者桸虚衣切木名汁可食枌於計切枍栺宫名榩渠言切椹也廪也子回切節木亦作樶㯅扶支切㯅㯕木下枝又方奚切㯕斯兮切㯅㯕弋占切木膠可作香欆踈牎切棹舡羽也息咨切木析爲柴也棨音啓兵也又傳信也才戈切櫖李亦作㭫奴多切或作郍同㯺呼覽切胡黤切彊也榘居羽切與矩同方器杖音杖木竹可撑持者揔名桶它董切木桶器也桻芳容切木上謂之桻櫸居語切櫸柳木也栐于丙切栐木可爲笏槧才敢切櫝也七艶切垣也极其輙切驢上負版也橿寄良切柌橿鉏柄也㰌苦角切枳木实似柚榥胡廣切讀書床櫓力覩切城樓說文大盾也樐力古切彭棑又同上楒自茲切相楒木也櫃巨位切櫃篋盛物者栛力帝切木果似枇杷栝古活切木也柏葉松身桰上同說文櫽也枯苦胡切乾也藁也枷音加囚具又持榖者柯音哥枝也又斧柄檄户狄切符檄二尺書也柷昌六切柷敔楽器也杰渠薛切梁四公子名椄子捷切椄木續木也橘規述切果木又果名柣馳栗切門限也又音切梄音酉柞木梄木也樈渠京切鑿柄木也榞魚袁切木皮可食者梮居錄切食器也又士文車也梣昨今切木名青皮木也橬並同上亦同上又音岑檍於力切木名樝側加切似梨而酸柤同上椯市專切木名又丁果切並同上槢似立切堅木也樆力枝切山梨也棃力之切果名梨同上桬所加切果木名桬棠也棠逹郎切棠梨果木也樿之善切木名芳味切木名柟奴含而塩而剡三切尓雅梅柟楠俗椐京於正於二切樻木也杜徒古切赤棠又塞也棆埋均切木名楧椅明切楧梅也梅莫回切說文柟也楳同上栩可羽切柔木又栩木實椲禹鬼切木名皮如韋楈先吕切木名㯉敕於切惡木也柰那頼切果名亦柰何也㮏同上楢以周赤沼二切柔木也枊渠容切柜枊栁木也柜居旅切柜栁也𣏌祛己切薬苟杞側詵切果似小䍒榛同上柃力丁力井二切木名可染柊之戎切柊楑椎也楑渠惟切柊楑桵如佳切小木名㮘莫刀切冬桃也枆同上椵加馬切木也可作床凡棶力才切棶木椋也公道切木名椆之㓜切木名􅫩疾貲切無􅫩木名同上櫅子兮切白棗木也椋力将切材中車輪也棌于代切木採檞也槲胡木切槲㯈木㯈桑屋切樸樕小木也樕同上梭且泉切木名蘇和切織具楀俱禹于矩二切木名㰘余脂切木名胡勞切木名棳之恱切梁上楹也梲同上東部一百五十八凡二字東德紅切四方春方也㯥昨遭切說又曰二東也曹字則从此林部一百五十九凡十八字林力金切說文平士有叢木曰林森所今切長木皃或作槮又衆也楚𥘉㪯切叢木也又囯名鬱於屈切木叢生茂皃欝俗埜移者切古文野烏候切地名又市由切棼扶云切複屋棟又地名㭝巨尤切荆㭝亭名檒甫弓切古文風且頼切古文蔡文甫切繁豐盛也今作无為有無字楙音茂木盛又木瓜亦作茂棽敕林切枝條棽􅎈皃㯄指皃切木盛也梵扶風扶乏二切木得風皃麓力木切山足又守山林吏㯟古文巢部一百六十凡二字巢仕交切鳥在木上曰巢􅵘悲儉切貶損也與貶同叒部一百六十一凡五字叒而灼切說文曰日出東方晹谷登桑叒木也籕文桑思郎切𧖟所食葉俗作桒丑利切𧖟䡦力見切䉛𧖟大廣益㑹玉篇卷第十二
