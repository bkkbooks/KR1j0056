body:
  text: 大廣益㑹玉篇卷第十七凡十四部部二百五十五三十八字於蹇切說文旌旗之斿㫃蹇之皃又㫃蹇舞皃今爲偃旚匹遥切旍旗旚摇之皃旖於我於蟻二切旖旎旗皃旎女綺切上注旇普皮切旗靡也旞似醉切周礼至羽爲旞同上旐除矯切周礼龜蛇爲旐旆蒲具切尓雅継旐曰旆居起切失容也於險切旗也旅力与切衆也五百人爲旅古文旟弋於切周礼馬集爲旟於業於嚴二切掩光也㫎許非切動也亦作揮㫏於了切旗别名旃之延切周礼通帛爲􅏧旜同上㫍与昭切旌旗之旒名旒力周切旌旗上綴垂者旛妨園切旌旗捴名於决閭切居也又倚乎切歎辝古文古文旄莫力切旄牛尾也者持旝胡外切左傳旝動而鼔旓所交切旌旗輄斿施舒移切施張也又弋鼓切施予也以枝切施二自得也必姚切旌旗飛揚皃旌子盈切周礼析羽爲旌旍同上見礼記旗巨基切熊虎爲之旗也又旗亭市門楼表也􅻥文屈切切里所建旗亦作勿旋徐縁切周旋无虧也族徂鹿切類也又宗族旂渠衣切縣旌於竿斿弋周切旌旗之未垂一作游勿部二百五十六凡三字勿无弗切非也又旗也昜弋章切飛也吕至切銛也快也古文利矢部二百五十七凡三十字矢尸視切箭也古者牟夷作矢同上俗䠶時祜時益二切射弓也今作射又亦夜切短丁緩切長短也不長曰短口羊且羊二切傷也孚法切矢也於巳切短也矩枸羽切法也貟曰規方曰矩榘同上矯凡兆切強也詐也揉也丘吠切嫁短小皃䂕呼吠切上注侯胡鉤切公侯爵也又射侯古文矦同上矰子登切結繳於矢也必兮切䂑短小皃子兮切上注矤尸忍切侃也矧同上同上䂐職劣切䂐䂐短也矣諧凡切矣巳語辝呼官切短也矨牙冷切小皃知豬移切識也斍也豬至切心術也矬才戈切矬然短也矲蒲楷切矲短也䂏丁幺切犬短尾徒了切矢名弓部二百五十八七十五字弓居雄切兵器黄帝臣楎作弓乎計午悌二切語善射亦作羿弴丁幺丁昆二切天子弓名弤同上畫弓也又丁礼切舜弓名弲火玄切角弓名弨尺遥切弓弛皃彉古鑊切張也說文滿弩也彍同上弧戸都切弓别名又木弓渠貟切切曲也弋招切弓利便㢯弥賔切施也㢼卑結卑計二切弓戾也同上彄苦侯切弓弩端弦所居也引余忍以振二切開弓也援也羊忍切挽弓也与魚切弓也平忙切弦急也同上張陟良切開也施弓絃也彎於関切引也曲也㢾居掾切也弦奚堅切弓弦繩弛尺𥿄切去離也弓解也同上弘胡肱切大也語人能弘道㢰皮爲切㢰㢻所以張弩也㢻女恚切上注彌亡支切大也徧也甚也瓕同上同上彀古豆切張弓弩也弓滿也彏九縛切張弓急也彃比溢切射也彈逹旦切又逹丹二切糾也擊也同上同上弸悲矜切弓強也又普耕切㢵虚葉切弓弽别名去堯切引也弭亡爾切息也忘也止也安也㓕也切弓無縁也同上􅋶他刀切弓衣所以藏弓也弩奴戸切弓有臂者徒東切弓飾彊巨章切弓堅也又其兩切勉彊也說文弓有力強同上彋禹萌切弸彋帷帳趐皃弰山交切弓使箭也同俊切彇也弝必罵切弓弝也發甫越切明也進也駕車也生也􅱯於玄切弓上下曲中普庚切又作絣義同弫之忍切弓強也㣂五責切束弓弩弮居阮切又去圎切古縣名彇先幺切弭頭謂之彇弶巨尚切施置於道也余章切弓曲也切兩切弓曲也弽戸渉切佩袋囊或作韘㢨胡旦切史記拒㢨関之口㣄巨魚切弓力強皃古穴切矢發也弡巨勿切強勇也弣孚主芳夫二切弓名也猪吏切青州謂弹為吝女切弓衣必耕切弓也㣅殂敢切弓弝也㢩都狄切射中㢩又作的弙於孤口孤二切弓蒲也持也指麾也引也張也亦作陟迸切引榜也弜部二百五十九凡六字弜渠良切彊也又巨兩切勉也弋粥切育也又扶袁切養生也􅱶皮密切捕弼也正也助也同上㢸古文弼今文斤部二百六十凡三十一字斤居珢切斫木也又十六兩為斤斵竹角切斫也雕也同上斧方禹切兵利器刀斧也斨且羊切方銎斧也力可切擊也博稜切斸也斯思移切析也此也古文斫之若切刀斫斬截也斪巨俱切器名鋤属斦魚斤切二斤也其愚切斫也又刮又芮二切断也簛同上斮側畧切斬也断也削也斸竹足切斫也或作钃他彫切斫也斷丁𬋩徒𬋩二切截也又丁乱切决也古文断俗用斬爼减切断也伐也斫也思的切破也分也釿牛引切剤也枯婁切也所師吕切伐木声也又処所俗作所新思人切初也新鮮也美也古額切殺也亦作時丗切古文誓字􅺸如略切破也知朔切刻也截也彫也矛部二百六十一二十八字矛莫侯切酋矛長二丈建兵車古文矠又白側白二切兵器矛属力當切兵器矛属口大切兵器矛属䂇女六切刺也几偃切矛别名􅗋千喚切兵器鋋属同上􅚙渠巾切矛柄也矜同上又居陵切自賢也呼的切長矛名􅧿呼役切矛别名扶容切􅪕矛有二柄同上􅪕如容切􅪕見上注文買切矛名矟山卓切矛柄名䂈犬冬切刺矛也時奢切短矛也亦作鍦子心切錐别名矡居縛切鉏别名尺鍾切短矛名楚雙切矛名䂉胡鉤切矛属也式之切矛也說迸切矛也䂆去的切矛也戈部二百六十二五十一字戈古禾切平頭㦸長六尺六寸戎如終切兵也說文作􅞯􅞯同上戛古礼切㦸也常也擊也戣渠佳切兵器㦸属古寒切盾别名㦸居逆切三刃㦸也雄也說文作㦸有枝兵也同上戍舒樹切守也遏也人荷戈戰之膳切以兵闘謂之戰之力切歛也賊在則切盗也傷害人也說文作賊敗也同上戕在良七良二切殘也殺也肈他矯切長也始也􅨹苦耽切殺也賊安切多也戜徒結切利也常也囯名也在三苗東戩子踐切福也又伐㓕也或胡囯切有疑之辝㦴古額切鬪也与章切戈也戲折義切兵也又戲笑又虚竒切古獲字割耳也与馘同􅥘子來切說文傷也㦺如欲切㦸也戙徒弄切船杈木􅎒在節切齊也治也断也今作截戔在安切傷也賊也多也莫侯切古文矛字㦵音誅戈也各何切戮也㦻詞立切古襲字輕師不備也一㓡孚至切刀握也或爲弣㓵五各切鋒也刀劒刃也削思略切刻治也又思妙切所以貯乃劔刃則子得切法也古文􅋿同上刈魚廢切獲也殺也取也刌怱混切以刀切断也釗之姚切逺也剽也又周康王名又古堯切剞名蟻切刃曲也同上利力至切銛也善也得財也剆力可切擊也亦作切妻結切治骨也断也急也又七計切一切也􅕻九勿九月二切剞􅕻也劂同上㓼楚乙切傷割又割声㔇普未切刺也斫也古花切割也􅿦下千切剄也刻苦則切鏤也怠也割也古文剸徒官切截也旨衮切切片􅰙子本切减也断也刔古穴切剔也於景切刺也割柯曷切截也㓣古文剃他計切除髪亦作鬀㔂力珍切削也刮也他彫切剔也㓴而兖切刺也列力泄切說文作􅍌分解也􅍌同上􅗇俗列切尺律切割也断也剜於丸切削也於嚴切刑名也剈於玄切桃也剜也古文刉九祈切刺也公外切断也剰時正切餘也不啻也㓮丁幺切琢也㓺居言切剔也剺力咨切剥也剓同上劉力牛切鉞殺也陳也又姓楚佳切刺也所鑑切刀也㔄思錄切細切也劃手麥切以刀劃破物也劃古文刋口干切削也定也除也刮古猾切麾也削也㓲匹銳切鉤也㓢力各切剔也刲口圭切屠也刺也􅩿同上刎亡粉切割也自刑也剄也剠力向切奪也亦作掠刓五九切削也剴多九切齊也劋子小切絶也剿同上刡莫忍切草賔切刡削也尺庸切刺也亦作種劌居衛切利傷也刹𥘉八切刹柱也制之丗切法度也裁也折也断也古文刜扶弗孚弗二切斫也擊也剛古郎切不柔也強也刋七見切切也劁才焦切刈穫也劓魚器切割也五刑截鼻者㓷同上判普半切分散也書判也𥘉治切刀切物声㔋音監㔋聚細切力計切割也刑户丁切法也罰揔名也㓝同上刖五欮五刮二切断足徂感切也刺也􅽳力渉切减削也㓚古紅切銍也力一切断也削也同上所刮切剪也剃也又拭也㔍又乱又芮二切断也􅜩古火切割也剳丁盍切剳􅧉也􅒠口號口郭二切解也分割籀文剫逹各切治木也分剫也劑才細切剪斉也合匀而切削也剾於溝切剜也剥比角切削也說文裂也又卦名忉同上北角切与剥字同􅱅魚劫七葉二切接續七鳩切剋也􅱰先活切割也丁幺切断取也刟同上劊古活切断也又古㑹切剋口得切勝也除也㔊之善切伐擊也劇巨㦸切甚也副普逼切拆也破也芳冨切二也疈籀文刺目利切殺也七亦切針刺剄古今切以刀割頸也􅤏乙牙切刎也劐呼鑊切裂也剒且落切尓雅治犀謂之剒亦作錯剌力逹切戾也恥也刴丁卧切細切斫也􅧠匹迷切削也魚乙切断也􅯴仕鎋切􅯴草刀也又直吐切剡以冉切削也又剡剡光皃㔒胡圭切减也削也㓱徒溝切剾剜也朷莫鹿切𥘉桑也剽孚妙切史記行剽殺人也削也􅎒也㓹唯芮切籕文銳字剶丑全切削也去枝也力之切直破也􅸺盧兠切穿也匹奚匹計二切斫也又方蔑切創楚良切傷也楚亮切始也劙力支切解也分割也劘莫何切削也刨薄茅切刨削也划公臥公禍二切鐮也又刈􅧉剴公哀五哀二切摩也切也剗楚簡切削也除也力九切割也所罵切刺也刳口孤力破腹也空物腸也易刳木爲舟魝山俱公節二切刀割也劀公八切去血也割也初楚居切始𥘉也旨善切攻也􅗴子踐子九二切剃髮也减也切也或作揃罰扶發切刑罰罪罰也剔他狄切解骨也刮也同上屠也㓟符碑切剥也刕歷低切姓氏又力脂切割也刪所奸切削也定也剟也㓠都忝切缺也或作坫􅺶烏玄切与渊同𥙷護切裁刀也􅯑户関切地理志􅡼􅯑縣在武威刵而至切五刑耳曰慈牋切古文前字剭乙角切刑也剕符沸切刖也剮古瓦切刀剔肉值骨也說文作咼劍居欠切籀文剱字都𬋩切古文断字北朋切斫也剅丁侯切小裂也辨皮莧切具也亦辨論又音片尓雅革中絶辨劈普辟切裂破也析也㔎先列魚乙二切断也㓳下奚切剅也口怪切断也剖普后切破也中分也又析也五骨切船在水不安曰㔏郎石切劙開也分割􅽒力活切削也剟竹劣切削也剉子卧士卧二切斫也去芒角也古滑切去惡肉也俗劀字㔌才侯切断也細切也㓤口八切与劫同劵丘万切契書劅貞角切刑也剪俗文翦字劖士咸切断也㓽仕弓切器名鍤屬􅧉古侯切鐮􅧉也刐得草切割也剹力竹切削也音瑣切也􅩊义丈切􅩊皮也魚弔切削也去近切削也㓾素奚切皮也丁盍切著也所流切刈也部二百六十七凡四字口八切佳也巧也栔苦結切開也别也其約即作契力灼切今作略籀文㓵公八切骱刷刮也刃部二百六十八凡六字刃如振切刀刃尖銛者徒木切刀傷也劒居欠切軍器所帶兵也楚良切刀傷未合或作創㣼布角切古文剥字刅楚良切說文傷也玉篇十七卷終
