body:
  text: 大廣益會玉篇卷第八凡三部心部八十七六百二十九字心思林切説文火藏也􅘁同上恉之以切意也愮余招切憂貌憭力繞力雕二切意精明也性思淨切命也質也怡翼之切恱樂也忱時林切誠也㦃叉限切全德也慔莫固切勉貌悰昨宗切樂也一曰慮也愼市振切謹愼也思也悒於急切憂悒也悗武桓切惑也悍胡旦切勇也怭蒲必切慢也歡呼官切恱也又公玩切尓雅歡歡愮愮憂無告也慲莫蘭切忘也憿古堯切行險也恑居毁切異也先則切實也慬渠斤居近二切憂也慤也快苦夬切可也喜也懼渠句切恐也愳古文悙丁昆切信也僕也厚也同上恂思切信也栗也溫恭也愷空改切樂也可也􆇵胡圭切變異也慨可戴切大息也慷苦莽切慷慨壯士不得志慷同上懷胡乖切思也安也又心懷欣喜斤切察也喜也婪力南切貪婪也懤文又切愁毒也悟魚故切覺悟心解也古文怞文又切勆也憂恐也惲憤切謀也議也憾胡紺切恨也慟徒貢切哀極也􅞥余丗切習也明也同上悃苦本切志純一曰悃愊普力切悃愊至誠也恎徒結切惡性也憎子登切惡也悁於緣切忿也憂也古文怙胡古切恃也詩無父何怙恢苦回切恢恢大也力支切多端也同上憚徒旦切難也又畏憚􅓆同上恃時止切賴也詩無母何恃恬徒兼切安也靜也恨胡艮切自怨也憍居髙切逸也悄七小切憂也心無憀也同上慕莫故切思也習也本作恭居庸切恪也今作憤扶粉切悶也忉都勞切憂心貌愜起頰切服也又快也愜同上㥛居力切疾也一曰謹重貌悈居薤切疾也飾也憂于救切心動也惴之睡切憂懼也怪古壞切異也非常也怪俗慢莫諌切輕侮也不畏也􅤷亡斧切愛也撫也惔徒甘切憂也怦普耕切心急也㤏徒冬切憂也恎㤏惶遽也同上於報切悔也於六切貪也諝相旅切才智之稱也悑普布切惶也怖同上恾莫郎切憂也不暇也忙同上恗虎姑切恐也憂也怯也悛且泉切改也止也㤥下代切恨苦也㤿於檢切愛也㤿憸多意氣也又甘心也􅰪同上悱孚匪切口悱悱疑辨也恤思律切憂也救也蒲戒切極也慺洛侯切謹也敬也不輕也下情也又力朱切慺同上悌徒計切孝悌徒禮切愷悌悖蒲突蒲輩二切逆也莫逹切忘也憢呼條切懼也怕普罵切恐也説文匹白切無為也㥝亡善亡婢二切屬也止也恌他雕切尓雅恌愈也憬九永切逺行貌愎蒲逼切很也􅿣去逆切疲力也又其略切勞也悴存季切憂也七沒切心急愞乃亂乃過二切弱也㤝齒終切心動也􅬝胡頂切恨也惟弋隹切思也有也辝也為也謀也伊也怍疾各切慙也顔色變也懮於九切懮受舒遲貌􅚸直勇切遲也戄胡郭切驚也憮無斧切憮然失意貌又不動貌又荒烏切􅭛忯佳祇癸二切悸也悚也慥七到切言行相應貌愯息拱切懼也􅋏同上又所江切懵莫公切慙也不明也又武亘切懈古賣切倦也怠也憜徒果切怠也易也惰同上古文忮支豉切忮害心又不媚徑很怊敕橋切悵恨也又尺昭切怫扶勿切意不舒治也徙勆切放也慏彌并切慏悜也悝力止切憂也悲也疾也又口回切􅢯丘廉丘減二切不安貌怗池頰切服也靜也惕他的切憂懼也惖同上慒昨遭切亂也殂冬切謀也又慮也又音囚㥓去竒去倚二切􅢯㥓險急惛呼昆切亂也癡也譎古穴切變詐也悸其季切心動也㥴余氏余支二切不憂事也又徒低切也愅公翮切更也變也或作諽怋莫昆切悶也不明也𢠲徒候切誑也胡溝切恐也恫他東切呻吟也痛也又徒弄切㤞徒各切忠也正也又他陌切􅗘同上􅴇同上又忖􅴇也懲也悿他點切弱也忦古切恨也又公大切懼也又五拜切懝牛力切有所識又五溉切懫之日切止也塞也之吏切忘也憡楚革切小痛也悢力黨切懭悢不得志力尚切悢悢惆悵也忬余懅切緩也安也早也忋公在切恃也仰也懢力甘切貪懢也悏苦協切快也懍力荏切危懼也敬也巨禁切心怯也惃古混古魂二切惛也亂也憒公對切憒憒心亂也怢他對他沒二切肆也忘也忽也怢同上同上悜丑井切慏悜意不盡也悔呼對切改也恨也慘七感切愁也痛也恨也説文毒也又初錦切憯七感切痛也怛丁割切悲也惆敕周切惆悵悲愁也悵敕亮切惆悵失志恨惜私積切吝貪也怮於蚪切憂悶也惂口感切憂困也㤦力志切憂也情疾盈切人之隂氣有欲者忸女六切忸怩慙也怩女飢切忸怩忡王中切憂也巨營切憂也恱余拙切樂也愴楚亮切悲也傷也惻楚力切悲也痛也㥚羊殊切憂也慛昨回切悲傷也公厄切智也恀尺紙切怙恃也憕直陵切心平直庚切失志懌羊石切恱也服也㒄胡典切意難也愇韋鬼切怨恨也懶力旱切俗懶字愖匝任切信也恔吉了切憭也胡巧切黠也懠在細切怒也疾也愕五各切驚也懥陟利切怒恨也惿承紙切審也尺儱切恐也忯渠支是支二切敬也愛也慅蘇勞切憂心又音草慃烏項切狠戾也恟許卭切恐也慪口侯切吝惜也慱徒桓切憂貌恮且緣切又子眷切謹也愔於斟切安和恱貌憐魯丁切心了也慵是容切懶也恔胡交切快也懅巨魚切心急愃許逺切寬心息緣切語快愵奴的切思也又憂貌㤉口牙切恐懼慞之羊切慞惶也恈莫侯切貪愛也懰力尤切怨也慉丑六切恨也許六切興也憔昨遙切憔悴憂衰也寺周切慮也忴巨淹切心急也士咸切吝也惍居吟切利也憀力周力雕二切也且也憟西足切承止顔色也力尤切怨也妨孚亡切忌也力魚切憂也憈去魚切怯也憺徒敢徒監二切安靜也戚且的切視也痛也愢息台切意不合懷孚悲切恐也古巷切恨也古紅切心急也惀力迍力尹二切思也懹人向切也相畏也怶普皮切恐也德紅切愚也方迷切通也㤚户剛切恱也忓古安切優也胡旦切抵也懾之涉切懾然懼也悓呼典切􅷅悓也尺拯切也丑拯切愚貌悎胡老切心動也悁火還切慢也古縣切心急怵恥律切悚懼也悽愴悻胡耿切怨也符彼切劣也房吻切思也𢜳芳九切怒也慓匹姚蒲小二切急疾也㤨記奉切恐也恭也􅣼彌遣切想也㥏他典切慙貌㤢於六切心動也之爽切不恱也愈弋朱切恱也又羊竪切惶胡光切憂也恐也㤳布亥切市也㦐女里切快恬也息淺切慚也􅷸初卯切心􅷸也怚秦吕切驕也又子御切忝聽簟切辱也本作忝愰胡壙切心明也怉布絞切悖也懿乙利切古文懿懺七典切怒也憶於力切意不足往來念也憐力田切矜之也撫也怬許異切欣也忤五故切逆也慣古患切習也孚救切怒也憧昌容切行也直巷切愚也惵徒頰切恐懼也也憓胡桂切愛羡也忕他蓋切奢也㥼於靳切依止也慖古對切心亂也怓女交切亂也詩以謹惛怓懾章涉切怏也懼也怰户絹切賣也惋烏貫切驚歎也惓巨眷切悶也懞莫奉切懞心也愾口代許氣二切太息也忳徒昆切悶也亂也力割切惡也憱初又切戚也忭皮靣切喜恱鳥定切恨也懆七刀七老二切愁不樂也恲普行切滿也慷慨也恦户樣切念也私箭切憐念也㦏息戀切稅也子妙切急性悾苦紅切慤也苦弄切誠心力拙切少也與劣同訴到切怏性㤈七切惻也㣾初訝切不修也古夏切不安也惝尺掌切惝恍失志不恱貌雖遂切意思深也邃同上見説文余亮切恨也巨記切敬也憷𥘉去切心利也謧力怟切謧慢言輕易也忚呼奚切謧忚欺慢語愧居位切慙也亦作愧㥾女力切愧也胡代切快也懀烏外切惡也憎也悶也悚息拱切悚然起敬也戃他朗切戃慌無思貌慌呼愰切慌忽怟都替切悶也㥢字秋切悒也子由切慮也愐彌兖切想也勉也憉步行切憉惇自強也悙許庚切憉悙懎所力切恨也㤆方切惡心也急性也惗乃叶切愛也又音線愱秦栗切毒也或作􅍀戶間切戾也愈也與力切心動也憴食陵切正也或作譝憸七廉息廉二切詖也彌娌切安也或作侎猜七海切恨也急也㦢子結切心貞貌愡七弄切愡恫不得志也愒去例切貪羡也息也㥽楚革切情也耿介也懱莫結切輕也侮也㥔與六切心動也㤴丑葉切心動貌又休也恍吁往切狂貌又恍忽惕杜朗切放也平也慯式諒切憂也痛念也恄許吉切也恆胡登切常也久也古作愠於吻於問二切怒恨恍火廣切恍愡精想也惚呼骨切恍愡㦅徒結切不安也懻几利切強直又懻忮也孚吠普大二切怒也愲古忽切憂也心亂也忨五亂切貪也愛也他卓切心不安也懪蒲角匹角二切煩悖也㥟故皆切恚也恨怨也恲步行切恲好怒也乎宏切恲吕恤切憂悶也愩古紅切心動也又古弄切怏於兩於亮二切懟也惺桑經切惺憽了慧也憽蘇公切惺憽營隻切用心也愪王分切憂也又于敏切悽七奚切悽愴也傷也愝於典切愝惼性狹也惼方顯切不傾之貌忇盧得切思也畢民切伏也匹人切敬也憫眉殯切憫默也憂也五故切曉也與同㦦許激切心不安也㦦同上愀在九子小二切色變也栗力質切謹敬也悚也吝力刃切鄙也俗作吝惐于屋切痛心也㤜許律切怒也㣿都了切憂也之藥切痛也㥜羽魏切怫㥜不安貌慠五告切慠慢不恭也莫胡切受也忖倉本切思也戄許縛具縛二切驚遽貌去宮切憂貌又作􅸶况于切痛也憂也慊口玷切切齒恨也許急切心熱也愶許劫切以威力相恐愶也㤕竹律丑律二切憂心怲兵求切憂也懼也惙陟雪切也憂也􅫅戶甲切􅫅樂也恜恥力切從也愼也惈古火切勇勝也敢也恇曲王切怯也怖也忔許乞切喜也恰苦洽切用心也㤖竹與切知也愚也㦎呼麥切頑也垂戾也而灼切亂也又音惹悼徒到切懼也傷也㥄力升切憐也哀也恞羊脆切恱也欣也惸葵營切獨也或作煢𢙿巨錦切勤也又音金恪口各切敬也謹也愙説文同上悀與恐切怒也忿也巨王切進取貌古文字怔之成切怔忪懼貌悕許祈切念也願也怯去劫切懼也畏也愭喬移切敬也順也慆他刀切喜也慢也敞尺養切恍敞驚也懵牟孔切心亂迷也愋許爰切恨也忘也怐居遇切恐也苦候切愚貌忪聀容切心動不定驚也遑遽也𢤱盧董切𢤱悷悷盧帝切𢤱悷多惡又憻悷悲吟慳口切吝也悂必迷切誤也匹比博計切慎也悇丑慮切憂也又他切余庶二切憛他紺切憛懷憂也愺七老切愺恅心亂也恅力造切愺恅囚歲切謹敬恐也㦚畢沔切急也憂也悠弋周切思悠悠貌得漢切忒也爽也悲筆眉切哀痛也愁也懟直類切怨也徒對切愚也恙余亮切憂也病也㦁力延切泣血㦁㦁也乂魚肺切困患也懲也愈余主切勝也差也忘無方切不憶也又無放切􅢚呼介切忽也不和貌懘同上又尺制切惉懘意不和也同上尸霑切慸悶莫本亡困亡旱三切煩也同上態他戴切意美也嬌態也亦作㥋衣豈切痛聲也愁仕尤切憂也恐去拱切懼也又丘用切古文恐懖古活切愚人無知説文善自用之意奴的切憂貌女版切俗赧字􅱂誥計切備也極也怖也哲知列切智也與哲同慫息勇切悚也動也敬也惡也怨也於牛切愁也憌巨營切憂也懲直陵切戒也止也畏也而真切親也仁愛也惡於各切不善也又烏路切憎惡也惡同上俗恧女六切慙貌㤎古俄切楷也知也法也慶丘映切行賀人也恿與恐切猛也氣果也説文云古勇也㦟莫皆切慧也羊季切忘也憥力髙切疾也心力乏也式六切然疾也慹之陟切不動貌又之入切怖也愗莫候切怐愗也憨火含切愚癡也憠巨月切強也直也或作惑戶國切迷也亂也訴蘇故切譛也斯革切驚貌説文訴同慿皮明切投託也力牛切定意也􅜜皮筆切弼同或作怫輔也忌渠記切畏也惡也悹古桓公玩公緩三切悹悹憂無告也悺同上常時羊切古常字怘胡故切護同堅也常也忿孚粉切恨也怒也㦛余吕切趣貌又以諸切謹敬貌古文而欲切古辱字蕄古限切或作蕄又音萌怒奴古切怒恚也問也憲許建切法也制也説文云敏也同上戀力絹切慕也尸界切傾心也果敢也悆余庶切豫也恱也愨空角切謹也願也誠也志也恚於睡切恨怒也憼居影切敬也懇口狠切悲也誠也信也他得切差也失常也㤮九放切誤也詐也又巨望切恥敕理切恥辱也㤡力結切憂貌怤芳俱切恱也僖也樂也愆去乾切過也失也㥶説文同上愆同上俗力之切怠也渠久切怨也恁如針切信也如甚切念也患户慣切禍也疾也古文古文慁户困切患憂也慁同上應於陵切當也又於證切慙昨酣切恥也慙愧也慚同上恣子利切縱也何堅切急也魚既切怒也瘱於計切密也疾也靜也志之吏切意也慕也古文悶莫頓切也憗魚覲切目也息思力切喘急也力之力置二切愁也憂也惹人者切亂也引也同上又音若直由切箸也􅊸同上見説文㦌呼骨切寐熟也惌於元切惌枉也又於阮切愍眉隕切悲也痛也慜同上􅧴息廉切利口也念奴玷切思也慝他得切惡也奴歷切思也愁也或作愵怨於願切恨也恚也古文怨楚芮切謹也欲余玉切貪也𥘉力切古側字憃丑江尸容二切憃愚也於斤切勤憐貌勤巨斤切勤憊蒲拜切病也懋莫候切敏也􅐂同上㥸眉殞切傷痛也古文愍字慮力據切謀也思也崽子改山皆二切方言云江湘之間凡言是子曰崽惢部八十九凡二字惢桑果切又才纍才規二切心疑也繠如纍切聚也垂也左傳佩玉繠注繠然服節備也
