body:
  text: 大廣益㑹玉篇卷第二十凡二十七部沝部二百八十六凡四字沝之水切二水也淼彌沼切淼溔大水也力周切水行也篆文作市葉切行水也篆文作渉􅖱部二百八十七凡二字􅖱公泫切水小流皃深尺廣尺曰􅖱古文作篆文作巜部二百八十八凡二字巜古㑹切水流皃亦作澮粼力因力刃二切獸名又粼粼清徹也水在石也巛部二百八十九凡十三字巛齒縁切注瀆曰川也流也貫穿也通也古爲坤字侃可旦切和楽皃古文作偘又苦旱切呼光切及也至也力徹切水流皃子來切天反時爲巛今作灾災巠古庭後鼎二切水脉也一曰水冥巠也州止虫切九州也時也宮也居也夙古文同上万乙切水流也胡國切水流皃邕於龍切四方有水自邕城他者􅳓籀文井部二百九十凡六字井子郢切穿地取水伯益造之因井爲市也法也楚向切造法業今作創於逈切澤地也者線切古文載阱才性切穿地爲阱以䧟獸亦作穽汬古文泉部一百九十一凡三字泉自縁切山水之原也瀪扶萬切泉水也厡魚袁切泉水今作源灥部二百九十二凡二字灥似均切三泉也魚袁切水原木也永部二百九十三凡二字永于内切長逺也引也羕弋上切長也昶恥兩切通也􅏨部二百九十四凡五字􅏨匹賣切說文水之表流引也莫革切血也或作衇籀文亡革切說文莫狄切邪視也籀文谷部二百九十五二十九字谷古木切水注谿也又余王切豁呼活切通谷空也大度量􅣲同上谾呼紅切深山之谾谾空也䜱莫丸切䜱􅒵亭名􅒵巨由切上同谹胡萌切谷空也谸且見且田二切望山谷谸谸青也或作阡䜭思閏切深通川也古文濬呼勞切䜮深谷名䜮力刀切上同豂力乆切空谷也豅力公切大長谷直流切谷名㕡呼各切溝㕡也與壑同䜲力葉切䜲餘聚名下溝切谷名䜯渠六切谷名谼胡東切大谷名􅒵側洗切谷名豄徒鹿切通溝也與􅭖瀆同谽火含切谽訝谷空也谺火加切谽谺於京切谷名士諫切谷名豃呼檻切谷名􅢋呼含切􅢋呀澗谷也谿語雞切与溪同扶云切欲谷在臨汾冫部二百九十六五十二字冫鄙陵切冬寒水結仌同上古逈切冷也凇相龍切乗落也凛力甚力凛凛寒也凊七性切寒也冷也徒頰切浹也凗昨回切霜雪皃巨井切寒也凔楚亮切寒也凓力質切凓冽寒皃冽力㓕切寒氣也他領切水皃他典切典也奴典切惡酒也凄上西切寒也胡頰切水凍相著也凒五哀切凒凒雪白皃冭他大切今作㤗㓈彼孕切飛声也㓓奴含切氷薄也㓖卑吉切寒也冰卑膺切水堅也今筆凌切凝魚膺切成也堅也凙大洛切氷也盧帝切水也冹方勿切寒冰皃㓐力竹切寒皃凍都洞切孟冬地始凍又音東㓅他丁切又盧打切㓗公節切俗㓗字音嚴俗凝字凋丁聊切力盡也㓉胡括切冰也冬都農切冬終也亦作冷力頂切寒又力丁切凚渠錦切寒極也准之允切俗凖字凘先兮切解氷也又息移切古文冶余者切公冶復姓又妖冶冱胡故切寒也俗作牙况許誑切俗况字冲直中切俗冲字凌力丞切氷室也又力證切同上四孕切石飛声之日切寒身動皃决古穴切俗决字减古斬切俗减字􅏖下各切􅏖澤氷皃凉力張切俗凉也雨部二百九十七百五十字雨于矩切雲雨也並古文霅文治切又胡甲切霅霅電皃一曰衆言䨣何覈匹各二切雨也霩呼郭切雨止雲罷也霄思姚切雲氣也靁力回切隂陽薄動雷雨生物者也雷同上古文雷亦古文籀文霣爲閔切雷起出雨也齊人謂雷爲霣䨶籀文太令太丁二切電也霹靂霝力丁切落也零同上又除雨也所咸切微雨也又漬也又子廉切同上力各切雨或作落霡亡馘切小雨曰霡霂霂音木上同􅨽子夷切雨声亦作澬又才私切同上􅬆子廉力艶二切小雨也􅷰牛皆牛林二切霖雨先丸切小雨也霚武公武賦二切天氣下地氣不應也雺同上露力固切天之津液下潤万物者也又露見霃雉金切隂也尤句切雨皃武賦切地氣發天不應也霧同上霜所張切露疑也霑知廉切濡也漬也如琰切濡也霽子計切雨止也電大見切隂陽敫燿也古文屚力豆切屋穿水入与漏同霤力救切雨屋水流下雴丑立切雴霫䨐胡夾切与治同震之刃切動也籀文􅟔宇俱切請雨祭也或作䨨豬惟切隱也雷也䨤徒的切雨皃雰孚雲切霧氣也䨮思悅切凝雨也雪同上霾眉垂美拜二切風而雨也霶普郎切霶霈大雨皃胡溝切雨也力古切乆雨也霰思見切暴雪䨘同上思移切小雨亦霰同雭山立切雭雭雨声職隆切小雨也徒昆切大雨也雹歩角切說文雨氷也古文霓五奚五結二切雲色似龍霫先立切雴霫大雨也所感切小雨也霌職由切雲雨皃胡耽切多雨也䨡同上丁頰丁念二切寒也早霜丑渉切霎小雨盧冬切雨声因于切雨皃霏孚非切雪皃䬠同上需息俱切須也不進又卦名霎子葉所治二切霎所江切雨皃􅜾都宗切雨也雱普唐切雪盛皃䨦同上䨒古注切說文水音也上林切雨声也胡郭切又音營隻切大雨也側立切又士立切雨下也霵同上而章切露成亦作乃東切露濃皃徒丸切露多也靊孚隆切雲厚皃䨛色麥切雨又山責切同上靃息委切露也呼郭切飛声莫公切雨皃亦作濛霞下加切東方赤霠於今切沈雲皃霈匹昧切大雨也霔之戈切霍霖也霙於京切雨雪雜下雵於黨於良二切雲皃䨗扶尤切雪皃烏感切雲暗皃雸古三切霜也䨝七精切女神也䨳苦顔許器二切見雨止息䨜比朋切大雨也霹普的切霹靂也靂郎的切雷擊声許鬼切雷震霦碧倫切玉光色霳力中切豐隆雷師俗從雨敕庚切雨也巨殞切雨也霍呼郭切揮霍非尾切雲皃霛魯丁切古文靈䨏疾移切大雨又七資切息佳切小雨皃霪余林切乆雨也所板切雨濕皃芳酉芳賦二切霷与章切古文䨢徒感切䨢䨴雲皃䨴徒對切䨢䨴阻懴切水也胡卦切海船也七鴆切雲行也補孟切雷也靄於蓋於曷二切雲狀古候切大雨也胡内切雨也直各切雲也於罽切大露也於刃切氣也霨乙位切起也䨵徒紺切乆雨也䨫莫獲切雨也􅻫力谷切大風也直卓切大雨也私盍切雨下也乃監切泥也土甲切大雨也䨰匹各切雨也􅱠匹各切大雨也䨑大兮切霽雲霯他鄧切大雨也霋千兮切雲行皃又霽霖力今切雨不止雲部二百九十八凡十一字雲于君切山川之氣也古文作云䨺徒罪切雲皃靅芳味切雲皃靉於代切靉靆又於切靆徒載切不明皃雲皃霼虚豈切雲皃霒於林切今作隂古文亦古文􅞝徒敢徒紺二切曇徒含切西域呼丗尊瞿曇風部二百九十九九十八字風甫融切以動万物也風者萌也告也声也凮飌並古文父娯切風白上下爲颻颻餘招切上同力章切比風也又力讓切亦作䬅力計切急風也思六切風皃飄婢遥切旋風又孚遥切飆俾遥切暴風也颮同上颯思合切風声也􆄇力周切髙風也䬟力周切風行声颺弋章弋尚二切風飛䬑于貴切大風也颶子筆切大風也䬍呼没切疾風也同上古文同上䬆力吉切暴風又力志切䬄呼出切風也颼所流切風声皃颾同上飉力幺切風皃於回切風低皃尹轉切小風也胡盲切暴風也䬝同上颸楚飢切風也竹庚切風起也䬘呼交切䫸䬘䬌匹周切風吹皃匹召切颿􅱟古諧切疾風也甫勿切風也飁似立切風也颬呼加切風声䫾怖結布結二切小風也䬞文流切風大声飋所乙切秋風也於栁切風声奴多切古文巨尤切小風也䫸丑交切䫸䬘吹皃飍香幽切驚走皃颵所交切風声􅮠酥凋切北風也似縁切風轉也呼肱切風皃颰蒲活切甫月切疾風楚交切風起也䫹户工切風声户冬切風声颹于帰于委二切寺林切姓也蒲公切大風声也羊脂切風收也於京切風也歩迷切風也䫺户萌切大風也杜回切風皃飀力尤切飀風也坎巖切古文古藍切風也息流切風也呼觥切風声䬋魯登切大風也香公香幽二切風声徒郎切風起也力丁切寒風徒㑹切風入也䬏裴負切風也職救切風皃思兖切又祖縁切奴罪切風動也户紺切風声䬕可降可講二切力質切風也􅠞余律切急風苦海切南風亦作凱颽同上思六切風吼也䬛賔栗切風吼祛律切風也同丨又呼律切㶡呼果切又徒泰切於貴切又於帰切水力切風也蒲没切風驟也䫼呼决切風声䬉呼獲切熱風也呼劣切小風皃楚持切風也颲力哲切惡風也許勿切風起皃䬎古獲切䬎赤風熱氣之怪气部三百凡八字气去乙切求也說文去旣切以爲雲氣字㡮巨迄切危也切磨也氣去旣切候也息也六氣謂隂陽風雨明又二十四氣古文与氣字同氛孚云切氣也祥也先見或爲雰又扶云切俗上同氲於云切氛氲祥氣也氤於人切氤氲元氣也鬼部三百一凡六十九字鬼居尾切天曰神地曰祗人曰鬼鬼之言帰也又慧也古文桑目切鬼也䰰汝瑜切䰰䰰鬼声也􅷛居依切鬼俗亦作機魖許居切耗鬼也魃歩末切旱神也䰡丑利切魑鬽之類也厲鬼也亦作必人扶人二切鬼皃魋杜回切如小熊也灰乎切鬼皃呼罵切鬼变也魂胡昆切陽游氣也人始生曰化亦作䰟魊乎北切短狐含沙射人飲䰤德洪切鬼殺人也䰯牛翼切懼也􅛗力丁切神名魄普格切人之精爽說又隂神又普各切䰫士交切剽輕爲害鬼去拱切地名魚丘切鬼也魑丑知切鬼也乃多切驚敺疫厲之鬼也又見鬼驚也魗視由齒由二切惡也􆄉眉袐切又無弗切武棱切鬼也鬿巨希切星名魍亡兩切魍魎水神如三歳小児赤黒色魎音两魎古悟切神名䰠始人切山神也即委切鬼名魏魚貴切象魏闕也大名也髙也渠猗渠寄二切小児鬼鬽莫覬切老精物也同上魅亦同上古文籀文魁口回切師也又北斗名丑吏切厲鬼也五姑切神名魔莫何切魔鬼也魒匹姚切星也火郎切鬼也皮彼切鬼衣服也力刃切鬼名扶方切星名于嬀切神名力丁切鬼名䰦匹米切鬼名䰢胡硬切鬼又斗星名五孝切醜皃徒歴切醜也巨聿切無頭鬼陟目切醜頭也五交切鬼名初八切罗國名䰩尺者切醜䰩悪也士甲切醜也于目切皃也羊益切鬼使也縳尤切星名訶惜切又之石切魙側咸切鬼名呼官切斗星名醜昌九切可惡也魓音畢斗星名音甫斗星名部三百二凡四字甫勿切鬼頭也畏於貴切懼也驚也忌也難也悪也古文禹牛具切獸似猴也目赤尾長又母猴属也白部三百三凡四十三字白歩陌切西方色也明也告語也白屋茅屋古文皎公鳥切月白也皢火了切明也日白也皅普加切草華之白也晢先的切白色也皔何旦切白皃皠且罪切髙峻皃皖華板切白净也㿥乎殻切白也又乎沃切􅽘去逆切壁見白也皫孚沼切白色也爲委切華也皁才老切色黒也皂同上皚牛哀切霜雪白亦作溰㿣呼曷切淺薄色也毗照切白色皧烏代切净也普白切白也傍伯切麻白也皭在爵子笑二切争白皃皪來的切的皪明珠也丁歷切白也皗直流切明也昌尹切白也多肯切白也皉且礼切色鮮絜或作玼的丁激切明見也射質也皣于輒切明也皟側革切深白也皤布何歩何二切老人白也皤皤衆良士也皛胡了切胡灼切明也顯也㿩池朗切明也或作黨扶力切髮白皃力各切白也皦公了切白也又珠玉白皃亦皎字同㿟傍伯切白色又古了切皜胡髙切皜皜白色也皥皓並同上㿧直流切父没名皏普幸切皏㿣白皃又淺薄色也日部三百四凡二百四十字日如逸切陽之精也廣雅云朱明曜靈東君並日名月實也君象也羲和日御也時市之切四時也是春夏秋冬也峕古文早子老切晨也昒亡屈切旦明也旻眉巾切秋天也仁覆愍下謂之旻天曙市據切東方明也昧莫潰切㝠也晣之逝切明也晢並同上曉火了切說文明也曙也知也慧也旭呼玉切日始出昕旦之时晵康礼切雨而晝晴也晃乎廣切光也晄同上昭之遥切明也光也又市遥切昭穆也昫欣句許宇二切亦同暘弋章切明也日乾也晤五故切欲明也曠苦浪切廣逺也曍何老切太曍蒼精之君代羲氏明也旰也晧户老切日出也明也晏於諫切晚天清也㬜子刃切進也晉同上映於敬切明也又於朗切映㬒不明也晛奴見切日氣戸顯切明也㬗同上又奥也昏呼昆切日冥也昬同上晞許衣切明不明之際又燥也或作烯暆余支切日行也又縣名暉呼韋切光也亦作輝景箕影切光景也㬫於見切日出也昋古惠古迴二切見也亦作炅曄爲切曄曄震電皃曅同上見說文旰古旦切晚也昪皮変切明也昔思亦切往也古也昨也㫺說文暗於紺切不明也日無光也居羙切以表度日也壯力切日昳也昃同上昌尺羊切盛也美言也籀文曀於計切隂而風也晩莫逺切後也暮也晻於感切不明也晦呼潰切昧也丁宗切古文冬字同上􅧵奴代切日無光也曫力完切日昏时也旱何但切不雨也昴莫絞切星名也暒似盈切雨止也晴明也晴同上㫐於了切望逺也或作杳邕曏許兩切不乆也曩奴朗切乆也昨才各切一宵也暾他昆切日欲出也旽同上昄歩板切大也善也暫才監切不乆或作蹔昱由切日明也暀于况切羙也暱女栗切親近也同上㫱女版切温濕也赤也暑戌與切熱也暍於歇切中熱也晫都角切明盛皃暏丁古切旦明也暠古老切白也㬮奴旦切奴達切温也呼殄切微妙今作㬎昈乎古切文彩也曤呼郭切明也曒公了切明也暞同上㫘亡乙切不見也或作舀㬥歩下切又蒲報切暴同上晞也曬也古文暴曝俗文暴曭他朗切不明也暬息列切侍也或作媟暖奴卵切溢也亦㬉同暮謨故切日入也暵乎但切熱氣也晲牛礼切日跌也同上晐古才切備也兼也成也㬉奴卵切温也亦作煗晥乎綰切明星也子感切姓也昲孚未切乾物也暅古鄧切乾燥也晜音昆兄也与昆同亦作昆古魂切同也兄弟也暳呼惠切衆星皃暶似縁切羙皃㫓去旣切古氣字思遥切古文宵曈徒東切日欲明皃曨力東切曈職也㬤丘立切欲乾也女渉切小煗也晟是政切明也晈公鳥切明也暟口亥切羙也照也力渉切日欲入也昩莫蓋切斗柄也昉甫往切明也曛許云切黄昏时晡布胡切中时也昻五郎切㪯也君之得也暲之羊切明也與章同􅌔古限切明也昢滂佩切向時也曇徒含切黒雲皃昇式陵切或作升㬒莫朗切日无光也呼晃切旱熱也㫝都黎切日也㫵府微切日色晭織由切日光七林切日光暡於孔切天氣不明暡曚也暈有温切日月旁氣也㫷居其切後也昐府文切日光曦許宜切日色直韋切地名曖於代切晻曖暗皃曃陀愛切曖曃不明皃㫙附夫切日也色㾕切明也古杏切日髙煚乆永切日光曆力的切象星辰分節亭四時之逆從也又数也本作歷古本作厤古文㫜徒旦切旦日也暛思可切明朗也曜余照切照也亦作耀暿許巳切盛皃又多皃五果切明也㫰力黨切明也昑丘錦切明也曮魚險切日行也星先丁切列宿也古爲巨基切古文期字亦古文字㬊胡𬋩切明也杲古老切日出也晼於阮切明乆也昊胡老切元氣廣大也春尺均切四時之首也說文同上昀羊倫切日光㬙于鬼切日光暐同上昺碑景切明也亦作昞昚市刃切古文慎字暌去圭切逹也曥力魚切日色以專切日行也旫他調切日晦也晁除喬切明也又姓也旲徒來切於景切大也附夫切暄許圎切春晚旼莫貧切和也必民切古文晅許逺古鄧二切明也与章子郎二切焦暚余招切日光晗胡南切欲明也焸於京切明也暰匕恭切電光也暊孚武思主二切明也暋弥賔切眉㜏切強也丁含切日晚色暪莫本切暗也匹表切日暖皃旰吾古切明也來卦切日不到也許驗許嚴二切妨也昶丑兩切明乆也㫥匹頂切曉色㫒俱冬切扶也晲乎誑切陽明也曘奴侯切日朱切日色㫲防晦切又没切許詠切日中風職救切光也曕以贍切曬也所御切暖也曚莫紅切曚朧亡孔切時也暣乞義切日也昪皮彦切喜楽皃昛其女切暗也晙子峻切旱也各汗切半乾也㬓匹妙切置風日中令乾也烏蓋切日色也布蓋切星也㬇胡貫切古囯名烏訝切姓也莫候切亂也曬所賣切暴乾物也亦作䵘晬子對切周年也昮才用切功人也旺王放切日暈也以證切日暉也暝亡定切夜也昫香羽香句二切日光也㝵五爱切佛書字曔巨命切明也㬭子肖切小明也昧莫割切星名昳徒結切日昃也曞力制力逹二切日甚昷於没切晦皃奴骨切日入色㫽力玉切日暗也惖呼骨切明也古穴切日食色楚治切日照水也旵丑减切日光照也昅其劫切乾也昕許斤切旦明也暇何嫁切閑暇也普丕古切徧也晊之日切人也旦部三百五凡二字旦多爛切早也曉也詩信誓旦旦曁其器切與也至也武也又曁不及也䢅部三百六凡七字䢅是人切早也明也昧爽也晨同上奴冬切耕夫也厚也農同上古文辳亦古文並古文倝部三百七凡六字倝公旦切日光出也用也乾竒焉切健也天也君也又居寒切燥也幹柯旦切躰也強也知驕切早也旦也朝同上又除驕切各汗切晶部三百八凡五字晶子丁切精光也曑所今切或作先丁切列宿也亦作星曟市人切宿也亦作辰曡徒類切古理官也亦作疊月部三百九凡二十五字月魚厥切太隂之精也月御謂之望辰可朓敕了切疾皃又晦而月見西方也霸普怕切書哉生霸今作魄又布駕切霸王也同上俗古文霸朏芳尾普乃普骨三切說文月未盛明朒女六切縮朒不寛舒皃說文日月見東方謂之縮朒期巨基切㑹也當也要也時也契約也古文􅴙寺林切姓也朔所角切月一日也又此方朗力儻切明也亦作朋脼古文朗古鄧切月去也臘盧蓋切臘蜡也臈同上俗徐兖切短也便小皃䏙直逺切月落有明也朦莫公切朦朧也朧魯紅切月色不明朎魯小切朎朧也㬿他敦切月光也腄胡水切縣名又直瑞切朊虞逺切月光微也朠於京切月色也有部三百十凡三字有于乆切不無也得也果也取也質也宷也戫於六切文章也亦作或龓力公切馬龓頭也囧部三百十一凡三字囧俱永切大明也彰也同上􅰀靡京切與盟同明部三百十二凡三字明靡兵切察也清也審也朙古文盟靡京眉景二切諸侯􅊩牲曰盟又音孟津也大璞益㑹王篇卷第二十
