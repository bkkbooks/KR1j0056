body:
  text: 大廣益會玉篇卷第二十凡二十七部沝部二百八十六凡四字沝之水切二水也渺彌沼切渺溔大水也力周切水行也篆文作市葉切行水也篆文作涉􅖱部二百八十七凡二字􅖱公泫切水小流貌深尺廣尺曰􅖱古文作篆文作巜部二百八十八凡二字巜古會切水流貌亦作澮粼力因力刃二切獸名又粼粼清徹也水在石也川部二百八十九凡十三字川齒緣切注瀆曰川也流也貫穿也通也古為坤字侃可旦切和樂貌古文作侃又苦旱切呼光切及也至也力徹切水流貌子來切天反時為川今作災災巠古庭後鼎二切水脈也一曰水冥巠也州止蟲切九州也時也宮也居也夙古文同上万乙切水流也胡國切水流貌雍於龍切四方有水自雍城他者􅳓籀文井部二百九十凡六字井子郢切穿地取水伯益造之因井為市也法也楚向切造法業今作創於逈切澤地也者線切古文載阱才性切穿地為阱以陷獸亦作穽汬古文泉部一百九十一凡三字泉自緣切山水之原也瀪扶萬切泉水也厡魚袁切泉水今作源灥部二百九十二凡二字灥似均切三泉也魚袁切水原木也永部二百九十三凡二字永于內切長逺也引也羕弋上切長也昶恥兩切通也􅏨部二百九十四凡五字􅏨匹賣切説文水之表流引也莫革切血也或作脈籀文亡革切説文莫狄切邪視也籀文谷部二百九十五二十九字谷古木切水注溪也又余王切豁呼活切通谷空也大度量􅣲同上谾呼紅切深山之谾谾空也䜱莫丸切䜱􅒵亭名􅒵巨由切上同谹胡萌切谷空也谸且見且田二切望山谷谸谸青也或作阡濬思閏切深通川也古文濬呼勞切䜮深谷名䜮力刀切上同豂力久切空谷也豅力公切大長谷直流切谷名壑呼各切溝壑也與壑同䜲力葉切䜲餘聚名下溝切谷名䜯渠六切谷名谼胡東切大谷名􅒵側洗切谷名豄徒鹿切通溝也與􅭖瀆同谽火含切谽訝谷空也谺火加切谽谺於京切谷名士諫切谷名豃呼檻切谷名􅢋呼含切􅢋呀澗谷也溪語雞切與溪同扶云切欲谷在臨汾冰部二百九十六五十二字冰鄙陵切冬寒水結仌同上古逈切冷也凇相龍切乘落也凛力甚力凛凛寒也凊七性切寒也冷也徒頰切浹也漼昨回切霜雪貌巨井切寒也滄楚亮切寒也溧力質切溧冽寒貌冽力滅切寒氣也他領切水貌他典切典也奴典切惡酒也凄上西切寒也胡頰切水凍相著也溰五哀切溰溰雪白貌冭他大切今作泰㓈彼孕切飛聲也湳奴含切氷薄也滭卑吉切寒也冰卑膺切水堅也今筆凌切凝魚膺切成也堅也澤大洛切氷也盧帝切水也冹方勿切寒冰貌㓐力竹切寒貌凍都洞切孟冬地始凍又音東㓅他丁切又盧打切潔公節切俗潔字音嚴俗凝字凋丁聊切力盡也活胡括切冰也冬都農切冬終也亦作冷力頂切寒又力丁切凚渠錦切寒極也準之允切俗凖字澌先兮切解氷也又息移切古文冶余者切公冶復姓又妖冶沍胡故切寒也俗作牙况許誑切俗况字沖直中切俗沖字凌力丞切氷室也又力證切同上四孕切石飛聲之日切寒身動貌決古穴切俗決字減古斬切俗減字􅏖下各切􅏖澤氷貌涼力張切俗涼也雨部二百九十七百五十字雨于矩切雲雨也並古文霅文治切又胡甲切霅霅電貌一曰衆言䨣何核匹各二切雨也霩呼郭切雨止雲罷也霄思姚切雲氣也靁力回切隂陽薄動雷雨生物者也雷同上古文雷亦古文籀文霣為閔切雷起出雨也齊人謂雷為霣霣籀文太令太丁二切電也霹靂霝力丁切落也零同上又除雨也所咸切微雨也又漬也又子廉切同上力各切雨或作落霡亡馘切小雨曰霡霂霂音木上同􅨽子夷切雨聲亦作澬又才私切同上􅬆子廉力艷二切小雨也􅷰牛皆牛林二切霖雨先丸切小雨也霚武公武賦二切天氣下地氣不應也雺同上露力固切天之津液下潤万物者也又露見霃雉金切隂也尤句切雨貌武賦切地氣發天不應也霧同上霜所張切露疑也霑知廉切濡也漬也如琰切濡也霽子計切雨止也電大見切隂陽敫耀也古文屚力豆切屋穿水入與漏同霤力救切雨屋水流下雴丑立切雴霫洽胡夾切與治同震之刃切動也籀文􅟔宇俱切請雨祭也或作䨨豬惟切隱也雷也䨤徒的切雨貌氛孚雲切霧氣也雪思悅切凝雨也雪同上霾眉垂美拜二切風而雨也雱普郎切雱霈大雨貌胡溝切雨也力古切久雨也霰思見切暴雪霰同上思移切小雨亦霰同雭山立切雭雭雨聲職隆切小雨也徒昆切大雨也雹步角切説文雨氷也古文霓五奚五結二切雲色似龍霫先立切雴霫大雨也所感切小雨也霌職由切雲雨貌胡耽切多雨也䨡同上丁頰丁念二切寒也早霜丑涉切霎小雨盧冬切雨聲因于切雨貌霏孚非切雪貌霏同上需息俱切須也不進又卦名霎子葉所治二切霎所江切雨貌􅜾都宗切雨也雱普唐切雪盛貌䨦同上䨒古注切説文水音也上林切雨聲也胡郭切又音營隻切大雨也側立切又士立切雨下也霵同上而章切露成亦作乃東切露濃貌徒丸切露多也靊孚隆切雲厚貌䨛色麥切雨又山責切同上靃息委切露也呼郭切飛聲莫公切雨貌亦作濛霞下加切東方赤霠於今切沈雲貌霈匹昧切大雨也霔之戈切霍霖也霙於京切雨雪雜下雵於黨於良二切雲貌䨗扶尤切雪貌烏感切雲暗貌雸古三切霜也䨝七精切女神也䨳苦顔許器二切見雨止息䨜比朋切大雨也霹普的切霹靂也靂郎的切雷擊聲許鬼切雷震霦碧倫切玉光色霳力中切豐隆雷師俗從雨敕庚切雨也巨殞切雨也霍呼郭切揮霍非尾切雲貌霛魯丁切古文靈䨏疾移切大雨又七資切息佳切小雨貌霪余林切久雨也所板切雨濕貌芳酉芳賦二切霷與章切古文霮徒感切霮䨴雲貌䨴徒對切霮䨴阻懴切水也胡卦切海船也七鴆切雲行也補孟切雷也靄於蓋於曷二切雲狀古候切大雨也胡內切雨也直各切雲也於罽切大露也於刃切氣也霨乙位切起也䨵徒紺切久雨也霢莫獲切雨也􅻫力谷切大風也直卓切大雨也私盍切雨下也乃監切泥也土甲切大雨也䨰匹各切雨也􅱠匹各切大雨也䨑大兮切霽雲霯他鄧切大雨也霋千兮切雲行貌又霽霖力今切雨不止雲部二百九十八凡十一字雲于君切山川之氣也古文作云䨺徒罪切雲貌靅芳味切雲貌靉於代切靉靆又於切靆徒載切不明貌雲貌霼虛豈切雲貌霒於林切今作隂古文亦古文􅞝徒敢徒紺二切曇徒含切西域呼丗尊瞿曇風部二百九十九九十八字風甫融切以動万物也風者萌也告也聲也凮飌並古文父娛切風白上下為颻颻餘招切上同力章切比風也又力讓切亦作䬅力計切急風也思六切風貌飄婢遙切旋風又孚遙切飆俾遙切暴風也猋同上颯思合切風聲也􆄇力周切髙風也飀力周切風行聲揚弋章弋尚二切風飛䬑于貴切大風也颶子筆切大風也䬍呼沒切疾風也同上古文同上䬆力吉切暴風又力志切䬄呼出切風也颼所流切風聲貌颾同上飉力么切風貌於回切風低貌尹轉切小風也胡盲切暴風也䬝同上颸楚飢切風也竹庚切風起也䬘呼交切䫸䬘䬌匹周切風吹貌匹召切帆􅱟古諧切疾風也甫勿切風也飁似立切風也颬呼加切風聲䫾怖結布結二切小風也䬞文流切風大聲飋所乙切秋風也於栁切風聲奴多切古文巨尤切小風也䫸丑交切䫸䬘吹貌飍香幽切驚走貌颵所交切風聲􅮠酥凋切北風也似緣切風轉也呼肱切風貌颰蒲活切甫月切疾風楚交切風起也𩘎户工切風聲户冬切風聲颹于歸于委二切寺林切姓也蒲公切大風聲也羊脂切風收也於京切風也步迷切風也䫺户萌切大風也杜回切風貌飀力尤切飀風也坎巖切古文古藍切風也息流切風也呼觥切風聲䬋魯登切大風也香公香幽二切風聲徒郎切風起也力丁切寒風徒會切風入也䬏裴負切風也職救切風貌思兖切又祖緣切奴罪切風動也户紺切風聲䬕可降可講二切力質切風也􅠞余律切急風苦海切南風亦作凱颽同上思六切風吼也䬛賔栗切風吼祛律切風也同丨又呼律切火呼果切又徒泰切於貴切又於歸切水力切風也蒲沒切風驟也𩖶呼決切風聲䬉呼獲切熱風也呼劣切小風貌楚持切風也颲力哲切惡風也許勿切風起貌䬎古獲切䬎赤風熱氣之怪氣部三百凡八字氣去乙切求也説文去既切以為雲氣字㡮巨迄切危也切磨也氣去既切候也息也六氣謂隂陽風雨明又二十四氣古文與氣字同氛孚云切氣也祥也先見或為氛又扶云切俗上同氲於云切氛氲祥氣也氤於人切氤氲元氣也鬼部三百一凡六十九字鬼居尾切天曰神地曰祗人曰鬼鬼之言歸也又慧也古文桑目切鬼也䰰汝瑜切䰰䰰鬼聲也􅷛居依切鬼俗亦作機魖許居切耗鬼也魃步末切旱神也䰡丑利切魑魅之類也厲鬼也亦作必人扶人二切鬼貌魋杜回切如小熊也灰乎切鬼貌呼罵切鬼變也魂胡昆切陽遊氣也人始生曰化亦作魂魊乎北切短狐含沙射人飲䰤德洪切鬼殺人也䰯牛翼切懼也􅛗力丁切神名魄普格切人之精爽説又隂神又普各切䰫士交切剽輕為害鬼去拱切地名魚丘切鬼也魑丑知切鬼也乃多切驚驅疫厲之鬼也又見鬼驚也魗視由齒由二切惡也􆄉眉袐切又無弗切武稜切鬼也鬿巨希切星名魍亡兩切魍魎水神如三歲小兒赤黑色魎音兩魎古悟切神名神始人切山神也即委切鬼名魏魚貴切象魏闕也大名也髙也渠猗渠寄二切小兒鬼魅莫覬切老精物也同上魅亦同上古文籀文魁口回切師也又北斗名丑吏切厲鬼也五姑切神名魔莫何切魔鬼也魒匹姚切星也火郎切鬼也皮彼切鬼衣服也力刃切鬼名扶方切星名于媯切神名力丁切鬼名䰦匹米切鬼名䰢胡硬切鬼又斗星名五孝切醜貌徒歷切醜也巨聿切無頭鬼陟目切醜頭也五交切鬼名初八切羅國名䰩尺者切醜䰩惡也士甲切醜也于目切貌也羊益切鬼使也縳尤切星名訶惜切又之石切聻側咸切鬼名呼官切斗星名醜昌九切可惡也魓音畢斗星名音甫斗星名部三百二凡四字甫勿切鬼頭也畏於貴切懼也驚也忌也難也惡也古文禹牛具切獸似猴也目赤尾長又母猴屬也白部三百三凡四十三字白步陌切西方色也明也告語也白屋茅屋古文皎公鳥切月白也皢火了切明也日白也皅普加切草華之白也晢先的切白色也皔何旦切白貌皠且罪切髙峻貌皖華板切白淨也㿥乎殼切白也又乎沃切􅽘去逆切壁見白也皫孚沼切白色也為委切華也皂才老切色黑也皂同上皚牛哀切霜雪白亦作溰㿣呼曷切淺薄色也毗照切白色皧烏代切淨也普白切白也傍伯切麻白也皭在爵子笑二切爭白貌皪來的切的皪明珠也丁歷切白也皗直流切明也昌尹切白也多肯切白也皉且禮切色鮮潔或作玼的丁激切明見也射質也皣于輒切明也皟側革切深白也皤布何步何二切老人白也皤皤衆良士也皛胡了切胡灼切明也顯也㿩池朗切明也或作黨扶力切髮白貌力各切白也皎公了切白也又珠玉白貌亦皎字同皎傍伯切白色又古了切皓胡髙切皓皓白色也皥皓並同上㿧直流切父沒名皏普幸切皏㿣白貌又淺薄色也日部三百四凡二百四十字日如逸切陽之精也廣雅云朱明曜靈東君並日名月實也君象也羲和日御也時市之切四時也是春夏秋冬也峕古文早子老切晨也曶亡屈切旦明也旻眉巾切秋天也仁覆愍下謂之旻天曙市據切東方明也昧莫潰切冥也晣之逝切明也晢並同上曉火了切説文明也曙也知也慧也旭呼玉切日始出昕旦之時晵康禮切雨而晝晴也晃乎廣切光也晄同上昭之遙切明也光也又市遙切昭穆也昫欣句許宇二切亦同暘弋章切明也日乾也晤五故切欲明也曠苦浪切廣逺也曍何老切太曍蒼精之君代羲氏明也旰也晧户老切日出也明也晏於諫切晚天清也晉子刃切進也晉同上映於敬切明也又於朗切映㬒不明也晛奴見切日氣戶顯切明也㬗同上又奧也昏呼昆切日冥也昏同上晞許衣切明不明之際又燥也或作烯暆余支切日行也又縣名暉呼韋切光也亦作輝景箕影切光景也曣於見切日出也昋古惠古回二切見也亦作炅曄為切曄曄震電貌曅同上見説文旰古旦切晚也忭皮變切明也昔思亦切往也古也昨也昔説文暗於紺切不明也日無光也居美切以表度日也壯力切日昳也昃同上昌尺羊切盛也美言也籀文曀於計切隂而風也晚莫逺切後也暮也暗於感切不明也晦呼潰切昧也丁宗切古文冬字同上􅧵奴代切日無光也曫力完切日昏時也旱何但切不雨也昴莫絞切星名也暒似盈切雨止也晴明也晴同上㫐於了切望逺也或作杳雍嚮許兩切不久也曩奴朗切久也昨才各切一宵也暾他昆切日欲出也旽同上昄步板切大也善也暫才監切不久或作暫昱由切日明也暀于况切美也昵女栗切親近也同上㫱女版切溫濕也赤也暑戌與切熱也暍於歇切中熱也晫都角切明盛貌暏丁古切旦明也皓古老切白也㬮奴旦切奴達切溫也呼殄切微妙今作顯昈乎古切文彩也曤呼郭切明也曒公了切明也暞同上㫘亡乙切不見也或作舀暴步下切又蒲報切暴同上晞也曬也古文暴曝俗文暴曭他朗切不明也暬息列切侍也或作媟暖奴卵切溢也亦暖同暮謨故切日入也暵乎但切熱氣也晲牛禮切日跌也同上晐古才切備也兼也成也暖奴卵切溫也亦作暖晥乎綰切明星也子感切姓也昲孚未切乾物也暅古鄧切乾燥也晜音昆兄也與昆同亦作昆古魂切同也兄弟也暳呼惠切衆星貌暶似緣切美貌氣去既切古氣字思遙切古文宵曈徒東切日欲明貌曨力東切曈職也㬤丘立切欲乾也女涉切小暖也晟是政切明也晈公鳥切明也暟口亥切美也照也力涉切日欲入也昧莫蓋切斗柄也昉甫往切明也曛許云切黃昏時晡布胡切中時也昻五郎切舉也君之得也暲之羊切明也與章同􅌔古限切明也昢滂佩切向時也曇徒含切黑雲貌升式陵切或作升㬒莫朗切日無光也呼晃切旱熱也㫝都黎切日也㫵府微切日色晭織由切日光七林切日光暡於孔切天氣不明暡曚也暈有溫切日月旁氣也期居其切後也昐府文切日光曦許宜切日色直韋切地名曖於代切暗曖暗貌曃陀愛切曖曃不明貌㫙附夫切日也色㾕切明也古杏切日髙煚久永切日光曆力的切象星辰分節亭四時之逆從也又數也本作歷古本作曆古文旦徒旦切旦日也暛思可切明朗也曜余照切照也亦作耀暿許巳切盛貌又多貌五果切明也朗力黨切明也昑丘錦切明也曮魚險切日行也星先丁切列宿也古為巨基切古文期字亦古文字㬊胡𬋩切明也杲古老切日出也晼於阮切明久也昊胡老切元氣廣大也春尺均切四時之首也説文同上昀羊倫切日光暐于鬼切日光暐同上昺碑景切明也亦作昞慎市刃切古文慎字暌去圭切逹也曥力魚切日色以專切日行也旫他調切日晦也朝除喬切明也又姓也旲徒來切於景切大也附夫切暄許圎切春晚旻莫貧切和也必民切古文烜許逺古鄧二切明也與章子郎二切焦暚余招切日光晗胡南切欲明也焸於京切明也暰匕恭切電光也暊孚武思主二切明也暋彌賔切眉妘切強也丁含切日晚色暪莫本切暗也匹表切日暖貌旰吾古切明也來卦切日不到也許驗許嚴二切妨也昶丑兩切明久也㫥匹頂切曉色廾俱冬切扶也晲乎誑切陽明也曘奴侯切日朱切日色㫲防晦切又沒切許詠切日中風職救切光也曕以贍切曬也所御切暖也曚莫紅切曚朧亡孔切時也暣乞義切日也忭皮彥切喜樂貌昛其女切暗也晙子峻切旱也各汗切半乾也㬓匹妙切置風日中令乾也烏蓋切日色也布蓋切星也㬇胡貫切古國名烏訝切姓也莫候切亂也曬所賣切暴乾物也亦作晒晬子對切周年也昮才用切功人也旺王放切日暈也以證切日暉也暝亡定切夜也昫香羽香句二切日光也得五愛切佛書字曔巨命切明也皭子肖切小明也昧莫割切星名昳徒結切日昃也曞力制力逹二切日甚昷於沒切晦貌奴骨切日入色㫽力玉切日暗也惖呼骨切明也古穴切日食色楚治切日照水也旵丑減切日光照也昅其劫切乾也昕許斤切旦明也暇何嫁切間暇也普丕古切遍也晊之日切人也旦部三百五凡二字旦多爛切早也曉也詩信誓旦旦暨其器切與也至也武也又暨不及也䢅部三百六凡七字䢅是人切早也明也昧爽也晨同上奴冬切耕夫也厚也農同上古文農亦古文並古文倝部三百七凡六字倝公旦切日光出也用也乾竒焉切健也天也君也又居寒切燥也幹柯旦切躰也強也知驕切早也旦也朝同上又除驕切各汗切晶部三百八凡五字晶子丁切精光也曑所今切或作先丁切列宿也亦作星曟市人切宿也亦作辰疊徒類切古理官也亦作疊月部三百九凡二十五字月魚厥切太隂之精也月御謂之望辰可朓敕了切疾貌又晦而月見西方也霸普怕切書哉生霸今作魄又布駕切霸王也同上俗古文霸朏芳尾普乃普骨三切説文月未盛明朒女六切縮朒不寬舒貌説文日月見東方謂之縮朒期巨基切會也當也要也時也契約也古文􅴙寺林切姓也朔所角切月一日也又此方朗力儻切明也亦作朋脼古文朗古鄧切月去也臘盧蓋切臘蠟也臘同上俗徐兖切短也便小貌醓直逺切月落有明也朦莫公切朦朧也朧魯紅切月色不明朎魯小切朎朧也㬿他敦切月光也腄胡水切縣名又直瑞切朊虞逺切月光微也朠於京切月色也有部三百十凡三字有于久切不無也得也果也取也質也宷也戫於六切文章也亦作或龓力公切馬龓頭也囧部三百十一凡三字囧俱永切大明也彰也同上􅰀靡京切與盟同明部三百十二凡三字明靡兵切察也清也審也明古文盟靡京眉景二切諸侯􅊩牲曰盟又音孟津也大璞益會王篇卷第二十
