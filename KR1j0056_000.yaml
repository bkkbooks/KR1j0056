front:
  text: 玉篇緫目偏旁篆書之法
  hash: sha256:b80b0a7196bcd20f2d3469ca5c67392b715a66dd4d8592c7206dd71092c1c635
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0056_SBCK_000-1a}
body:
  text: 自書契造於伏羲而文字之耑始見文字之形始立其後也曰大篆曰小篆皆倣古法而爲之變易者也丗之知書者謂字學者矣然所曉者訓讀楷書而徒見其勾畫之委蛇而不知字之偏旁有定偏旁之有定體則觸類而長辨章析記若綉工之觀畫耳豈特施於文字哉此予於玉篇緫目五百四一二字必引篆書偏旁以冠之也博雅君子幸毋面色臣亢鼻自目盾䀠􅡚見覞苜耳口舌齒牙須彡彣文髟手􆅆舁臼爪丮鬥􅋄又足疋骨血肉筋力劦吕㝱心思惢言誩曰乃丂可兮号亐云音告凵吅品喿龠冊㗊只欠食甘旨㳄夲夰彳行冘攵乆夂舛走辵廴癶歩止處立竝此正是宀宫宁門戸尸尾尺履老疒􅯂歹死另凶穴丨屮木東林巢叒草蓐舜竹箕市乇􅑰􅒧蕐禾稽桼菐􅱮􅓒束􅜨􅾧麻卡韭瓜瓠丰來麥黍禾秝耒香皀鬯米毇􅍫倉㐭嗇亼㑹亯畐入冖􅜪冃兩㡀覀网冓厶去北西鹵鹽壬皿臥㐆琴喜壴鼔豈豆豊豐䖒重鼎瓦缶鬲􅦧斗勺几且亡曲壷巵􅤓於勿矢弓弜斤矛戈殳殺戉刀㓞刃金攴放丌左工㠭巫卜兆用爻㸚車舟方水沝􅖱巜巛井泉灥永􅏨谷冫雨雲風气鬼甶白日旦晨倝晶月有明囧冥夕多小幺􅖨玄丏大奢火炎焱炙爨囱黒赤亦夨交尤壹叀丹靑氏氐山屾嵬屵广厂髙危石磬􅎧阜􅤦厽馬牛犛羊羴􅘲莧犬犾豕豚􅵡嘼􅞧鹿麤㲋兔􅚵兕象能熊龍虍虎虤豸烏几乙燕鳥隹奞萑瞿雔雥魚􅦏䑕易虫䖵蟲它龜黽卵貝羽飛習卂非不至毛毳冉而角皮㼱革韋糸系素絲率索巾巿帛衣裘卩印夘辟辛辡䇂桀壬癸子了孨云丑寅卯辰巳午未申酉酋戌亥右字之音切已具緫目此不重載玉篇刊本從無載篆文者吾友宗子岱有宋本目録題玉篇搃目偏旁篆書之法列八行雖宋時坊肆所為要尚存野王比附许書之意借印扵元本玉篇之後云壬戌九月孫毓修識大廣益㑹玉篇一部并序凡三十卷准大中祥符六年九月二十八日勑都大提舉玉篇所狀先奉勑命指揮差官校勘玉篇一部三十卷近方了畢遂裝冩淨本進呈其進呈本今欲雕印頒行伏乞特降指揮事并據翰林學士右諌議大夫知制誥兼龍圖閣學士祕書監同修國史集賢殿修撰陳彭年等狀昨據屯田郎中史館校勘呉鈗主客貟外郎直集賢院丘雍校勘玉篇一部三十卷再看詳别無差誤並得允當者竊以篇訓之文歳月滋乆雖據經而垂範終練字之未精肅奉詔條俾從詳閱訛謬者悉加刋定敷淺者仍事討論式就編聮頗爲愜當儻頒行於普率庶上助於欽明事牒奉勑冝依牒至准勑故牒梁大同九年三月二十八日黃門侍郎兼太學博士顧野王撰本唐上元元年甲戍歳四月十三日南國處士富春孫強増加字三十卷凡五百四十二部舊一十五萬八千六百四十一言新五萬一千一百二十九言新舊緫二十萬九千七百七十言注四十萬七千五百有三十字戊辰二月桐鄉勞健觀扵周氏自莊嚴堪大廣益㑹玉篇序昔在庖犧始成八卦曁乎蒼頡肈創六爻政罷結繩敎興書契天粟晝零市妖夜哭由來尚矣爰至玄龜龍馬負河洛之圖赤雀素鱗摽受終之命鳯羽爲字掌理成書豈但人功亦猶天授故能傳流奥典鈎探至賾揚顯聖謨耀光洪範文遺百代則禮樂可知驛宣萬里則心言可述授民軌物則縣方象魏興功命衆則誓威師旅律存三尺政仰八成聽稱責於附别執士師於兩造勒功名於鍾鼎頌美德於神祇故百官以治萬民以察雕金鏤玉升崧岳而告平汗竹裁縑冩憲章而授政莫不以版牘施於經緯文字表於無窮者矣所以埀帷閉户而覿遐年之丗藏形晦跡而識逺方之風遵覽篆素以測九垓則靡差膚寸詳觀記録以游八裔則不謬毫釐鑒水鏡於徃謨遺元龜於今體仰瞻景行式備昔文戒愼荒邪用存古典故設敎施法無以尚兹經丗治俗豈先乎此但微言旣絶大㫖亦乖故五典三墳競開異義六書八體今古殊形或字各而訓同或文均而釋異百家所談差互不少字書卷軸舛錯尤多難用尋求易生疑惑猥承明命預纉過庭緫㑹衆篇校讎群籍以成一家之製文字之訓備矣而學慙精愽聞見尤寡才非通敏理辭彌躓旣謬先蹤且乖聖旨謹當端笏擁篲以俟嘉猷進玉篇啓竊聞兩儀俶啓九皇始君情性初動有巢肇制三聖代立十紀遞興龍牒浮河龜書起洛八卦旣陳六爻攸叙篆素之流是焉而出至於精課源妙求其本始末學敷淺誠所未詳雖復研考六經校讎百氏殊非庸菲所能與奪謹依條例同異具以上呈伏惟聖皇馭㝢膺籙受圖德尚昊軒功超嬀姒通妙廣運乃聖乃神經天曰文止戈爲武百工維理庶績咸熈勸以九歌撝之八柄修文德以來要服舞于戚以格有苖是故仁風所扇九服䝉靈正朔可班四荒懐德取衣雒樹則肅愼識受命之興夷波海水則越裳知聖人之德豈但中和樂職近播岷峨德廣所覃旁流江漢殿下天縱岳峙叡哲淵凝三善自然匪須勤學六行前哲寜以勞喻是以聲覃八表譽决九垓規範百司陶鈞萬品猶復留心圖籍俛情篆素紏先民之積繆振徃古之重疑簡冊所傳莫令北盛野王沾濡聖道沐浴康衢不揆愚淺妄陳狂狷徒夢收膓終當覆空思朱墨懼必無傳悚悸交心罔知攸錯謹啓光緒乙酉春王正月長洲葉昌熾觀新編正誤足註玉篇廣韻指南字有六書一曰象形象物之形作字日月之字是也二曰㑹意比類爲字止戈爲武人言爲信是也三曰形聲取譬相成河之是也四曰指事指事爲字上下之字是也五曰假借本無其字依聲託事令長之字是也六曰轉註左轉爲者右轉爲老是也字有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隷書切字要法一因煙如入聲十六屑韻噎字一結切一丨丨噎餘皆倣此二人然三新鮮四餳涎五迎妍六零連七清千八賔邊九經堅十神禪秦前如下半四宵韻樵字慈消切慈丨丨樵寧年寅延眞氊娉偏亭田陳纒平便擎䖍輕牽稱煇丁顚興掀汀天精箋民眠聲羶刑賢四字無文丨丨如上平一東韻風字方中切方丨丨風丨丨如上平八微韻微字無非切無丨丨微右七十字廼切字之要訣也上字喉聲下二字即以喉聲應之如歌字居何切居經堅歌上字脣音下二字即以脣音接之如邦字悲江切悲賔邊邦因煙與一字同元人然與二字同出學者苟能口誦心惟顚倒熟記雖無文四字亦皆隨口而成所謂五聲八音之别輕清重濁之分與夫羅紋反紅皆不待停思而自明矣辨字五音法一脣聲并餅脣聲清也二舌聲靈歷舌聲清也三齒聲陟珍齒聲濁也四牙聲迦佉牙聲濁也五喉聲綱各喉聲濁也凡呼吸文字即有五音脣聲舌聲齒聲牙聲喉聲辨十四聲法一開口聲阿哥河等並開口聲二合口聲菴甘堪諳並合口聲三蹴口聲憂丘鳩休能所俱重四撮脣聲烏姑乎枯能所俱重五開脣聲波坡摩婆能所俱輕六隨鼻聲灼蒿考好能所俱重七舌根聲奚雞溪等能所俱重八蹴舌下卷聲併酌等能所重九垂舌聲遮重奢者能所俱重多官多丁傎端他候他汀天透徒徑徒廷田定年題年寧年泥珍離珍珍邅知敕列敕侲㢟徹持陵持陳㕓澄女良女紉孃博旁博賔邊幫普郎普􅌭偏滂部逈部頻蠙並眉兵眉民綿明匪微匪分蕃非芳蕪芳芬番敷父勇父墳煩奉無非無文樠微子盈子津煎精七倩七親千清牆容牆秦錢從思尋思新仙心徐嗟徐餳涎邪之笑之征氊照昌緣昌嗔昌穿仕莊仕榛潺床式荏式身羶審時連時辰常禪於境於殷焉影馨烏馨馨祅曉轄甲轄礥賢匣俞戍俞勻縁喻郎才郎隣連來入質入仁然日切韻内字釋音樠武官切晩字平聲祅馨煙切胡謂神爲祅顯字平聲此不是字有声無形借用女聮爲形又借女聮爲切呐字平声呐女劣切榛鋤臻切木叢生傎音㒹倒也礥下珍切難也侲癡鄰切欲仆也與聮同音趂字同音㢟抽延切安步㢟㢟徹字平声切韻之法以音和爲正若廣韻玉篇中切脚容易反切便得其字分明者謂之音和切又有互用切如明字韻略中作眉兵切則是音和廣韻中作武兵切則是互用蓋武字合歸微字母下也其他類隔往還等切各以此推之辨四聲輕淸重濁緫例上平輕清璡將鄰切美石也珍陟鄰切丨寳也眞尺人切丨正也椿勑倫切丨木也之職而切丨往也龜居追切黿丨也春昌倫切丨陽也禋於鄰也祭敬也孚撫夫切丨信也鄰力珍切丨近也朱之余切丨赤也峯敷容切山丨也飛問腮切丨附也風方隆切丨化也妃芳菲切丨后也伊於之切丨因也微無非切丨妙也家古牙切丨舎也施式支切丨設也上平重濁弘戸扻切丨大也陳直鄰切丨說也辰食鄰切丨巳也貟玉權切丨位也洪戸公切丨人也諄章倫功丨正也從疾容切依丨也殷於斤切丨大也倫力迎切丨理也降下江切丨伏也松詳容切丨栢也江吉雙切丨海也夫甫于切丨妻也分府文切丨布也其巨之切丨辭也杭户郎切丨州也衣於機切丨服也眉武悲切丨日也無武夫切有丨也下平輕清清十情切丨濁也仙相然切丨騰也砧知林切丨杵也孃女良切爺丨也綿彌鞭切丨絮也朝知遥切丨旦也靑倉經切丨也先蘇前切丨後也針職妊切丨線也箋則前切丨注也愆夫乾切丨過也衫所叅切丨衣也川昌専切山丨也并𥙷盈切丨合也輕去盈切丨重也傾去營切丨盡也徼古堯切丨幸也昭止遥切丨明也嬌舉喬切女字也下平重濁翹渠遥切丨舉也璿似縁切美玉也晴疾精切丨明也瓤汝羊切瓜子也眠莫邊切丨卧也幽於虬㓛丨㝠也詶市州切丨荅也牆疾羊切丨壁也詳似羊切丨審也坊府良切巷也憂於牛切丨愁也紬直流切丨布也鈆與專切丨錫也三蘇甘切丨数也明武兵切光丨也兵𥙷縈切軍丨也卿去京切公丨也餳徐盈切丨請也泉聚縁切水丨也上聲輕清比卑里切丨校也餅必茗切丨果也冢知勇切丨宅也昌校切丨脯也耿古幸切丨憂也倣方兩切丨學也炅乆永切丨明也豕式是切丨猪也鄙𥙷美切丨陋也邇兒氏切丨近也敢古覽切丨厚也梗古杏切丨直也豈氣幾切丨安也起虚里切丨發也旨職雉切丨美也緊居忍切丨堅也畎古泫切丨畒也免無兖切丨止也始詩止切終始也上聲重濁甫方主切丨姓也引余軫切延丨也䑕舒吕切䖝丨也尾無匪切首丨也皿武永切器血也謹居隱切丨愼也汝如與切丨爾也卷居轉切丨書也晚無遠切早丨也姊將巳切丨妺也杏何梗切丨里也幸何耿切丨甚也猛莫幸切丨勇也鋤里切果木也丑敕柳切乙丨也昶敕兩切豁丨也丈直兩切丨夫也止諸市切停丨也里鄰已切良丨也去聲輕清魅美祕切精丨也快苦夬切丨心也避婢義切迴丨也譬疋義切丨喻也臂卑義切手丨也赴撫遇切丨奔也賦府遇切詩丨也弊毗計切丨固也脨芳昧切丨腑也浚私潤切水名也絹古面切綾丨也宋蘇統切人姓也送蘇弄切丨到也怪古壞切丨異也替他計切丨廢也至之利切丨到也廢方𬒮切丨止也甑子孕切盆丨也濟子計㓛丨定也去聲重濁味無沸切五丨也蒯苦壞切丨姓也瑞是僞切祥丨也志之利切丨望也吏力值切公丨也惠胡桂切丨仁也衛羽制切丨護也誓時制切丨謹也字疾四切反丨也舜舒閠切堯丨也眷几倦切丨属也壞懷怪切毀丨也會胡外切集㑹也膾古兊切魚丨也縣玄絹切州丨也廟苖召切神丨也釧川絹切釵丨也再昨代切丨又也寺祥臾切丨司也入聲輕清格古陌切丨令也角古岳切丨芒也閣古洛切樓丨也邈莫角切丨逺也博補各切丨斈也疋譬吉切丨偶也必卑吉切丨審也訖居乙切丨畢也古穴切丨明也薛思列切人姓也岀尺律切丨入也悉息七切丨來也一於質切丨数也入聲重濁穴胡決切窟丨也籍秦昔切典籍也鄂五各切丨國名莫忙各切人姓也鶴下各切靈鶴也學户角切丨習也擲直炙切抛丨也四聲五音九弄