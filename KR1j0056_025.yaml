body:
  text: 大廣益會玉篇卷第二十五凡十部鼠部三百九十九凡五十八字鼠式與切穴蟲之總名􅔺力久切似鼠大鼸胡簟切田鼠於革切鼠名鼫市亦切形大如鼠頭似兔尾有毛青黃色見尓雅䶄步丁切鼠如勇切鼠􅫪公切班鼠􅤜力下切􅫪屬鼮徒廳切漢武時有此鼠文如豹終軍識之賜絹百四鼶思移切鼠名鼩巨于切小鼱鼠同上鼱子盈切鼱鼩鼷下雞切小鼠也螫毒食人及鳥獸皆不痛今之甘口鼠也􅤜胡貪公含二切蜥蜴同上䶂之若切鼠類􅴄人市切鼠名鼬弋救切鼠名郭璞云似䶅赤黃色大尾啖鼠江東呼為鼣扶廢切鼠名同上徒忽切鳥鼠同穴鼭視之切鼠名父元切白鼠一名公尾底蟲胡的胡姪二切似鼠而白䶆之惟切南陽呼鼠云鼪所敬切鼠名公祿切鼬鼠補木切鼠名䶅胡各切鼠出胡地皮可為裘吉役切鼠身長須鼧大河切鼠名徒當切䶈鼠名䶈布各切鼠也􅥨子徇切鼫鼠蚡扶粉切地中行者曰鼹鼠鼤亡云亡運二切班尾鼠力知切小鼠鼴於切人鼠音兒鼠也步靈切鼠也鼲胡昆古痕二切鼠名可以為以救切似鼠亦作鼬即容切鼠也鼬除久切鼠也普木切鼠也音晹鼠也户吾切鼠黑身白腰任緘切音雀鼠也音刃鼠也鼦丁久切古貂也鼠也毛可為裘子移切似雞鼠毛見即旱鼯午胡切鼯鼠飛生或為鼨之弓切豹文鼠籕文於蓋切小鼠相銜而行易部四百凡二字易余赤切家也異也轉也變也又以豉切不難也於革切鼠屬或作作蟲部四百一五百二十五字蟲盱鬼切一名蝮博三寸首大如璧象其卧形又介揔名雖息葵切似蜥蜴又詞兩設也又推也蝮孚六切毒蛇蝮螫手則斷螣徒曾真錦二切神蛇螝胡對切蠶蛹䗥子公切螉䗥螉於公切小蜂又螉䗥牛馬皮中蟲也蟯如消去消二切腹中蟲蚺如鹽切大蛇肉可食蛹與種切者􆁭同上俗虺呼鬼切户虺今以注鳴者亦為蝮蟲螼丘忍切螼蚓寒蚓也蚓弋忍切螼蚓蚓同上蚯音丘蚯蚓蝘於甗切蝘蛵在壁曰蝘蜓在草曰蜥蜴蟫大含弋針二切白魚蟲子外所芮二切蟲也蠸巨袁切食瓜蟲蜭胡感切毛蠧蜓大典切蝘蜓又音廷蟪蛄别名也蚔巨支切士虻也亦作螟亡丁切食苖心蟲䖯口圭切蠆也蠆丑介切螫蟲或作蠲古么古迷二切蟲也明也除也又疾也蛅如占切尓雅蟔蛅蟴蠔屬蟴息移切蛅蟴蟖同上蠔七史切毛蟲蠔蚝並同上蛣去吉切爾雅蝎蟾􅔒木中蠧蟲􅔒丘勿切蛣􅔒蝶山頰切蝶蛺蛺古協切蛺蝶螳徒郎切螻螳蜋有斧蟲一名石蜋蜋力當切螳蜋又音良莫江切螻螻類蝚如尤切螻蠣力制切屬蚩尺之切蟲也又癡也笑也亂也才兮在梨二切螬亦作蠐螬祖刀切螬蟦扶非切螬蠀在資切蠀螬蟠扶元切鼠婦蟲又步安切大也紂回而轉曲也疾尤切蝤蝎木中蟲蝎胡葛切桑中蠧蟲蜀市燭切桑蟲亦作蠋螌布姦切螌蝥毒蟲也蝥莫交切螌蝥又莫侯切食木根蟲又􅢤蛛蛑説文古文蝥又音牟蝤蛑蛵呼丁切負勞又蜻蛉蛶吕説切蟲名􅲈蚵蛉力丁切蜻蛉蜻疾性切蚻也也又子盈切蜻蛤䗐式移式豉二切米中黑甲蟲強巨羊切米中蠧小蟲蚚巨衣切強蚚蟲螰力木切螇螰螇胡雞切螇螰即蟪蛄一名蛁蟧亦蜓也蜆户千户典二切小黑蟲蜥先的切蜥蜴蠑螈也蜴羊益切蜥蜴蠑永兵切蠑螈蚖魚袁切螈螈同上蜰父非切蠦蜰即貟螌臭蟲蠦力胡切蠦蜰蟣居豈切蝨蟣螕輔兮切牛蟲蠖於縛切屈伸蟲蛾五何切𧖟蛾蠪力公切蠪虰蟲亦獸名虰丑經切蠪虰也蟶同上螻力侯切螻蛄蛄古胡切蟪蛄蛢步丁切甲蟲蛬吉勇切蟋蟀亦名蜻蛚又音卭同上蟋思栗切蟋蟀同上􅢊所切蟋蟲蟀同上蜙先恭切蜙蝑斯螽蚣同上又古紅切蜈蚣蟥胡光切蛢也􅛔市律切蟥也蠓亡孔切小飛蟲蠛亡結切蠛蠓蝑思閭思呂二切蚣蝑蝗胡光切記蟲蝗為災蠕如兖切動也同上蜌步禮切蚌長者蛂步結切蟥蛢􅨑力約切蜉䖻渠􅨑朝生夕死蛚力結切蜻蛚蟋蟀呼鈴切乘飛貌尺戰切蠅醜蚩丑善切蟲伸行螸弋朱切逢螸蚋汝鋭切含毒蛇又蚊蚋又音先公切蛸喜子蛸所父切蛸蝁於各切蛛蝁時力切日月蝕五各切似蜥蜴蛭之吉丁結二切水蟣蛘弋掌切蛘搔又音羊蟺市衍切蚓蟨居月切北肩獸閩冒貧切東南越蜉扶牛切蜉䖻蜎於犬於沿二切蜀貌蛻尸鋭始悅二切蛇皮蜧力計切神蛇蜦同上䗡倚然切蟲名蛒古額切蠙螬也蛤古合切雀入水為蛤亦作􅧳蠗文卓切小蜃或㺟字螊胡緘切小蚌可食螷扶幸步支二切蛤也蚌步頂切蜃也蟜居兆切毒蟲螭丑支切無角如龍而黃虯竒樛切無角龍蛟古爻切蛟龍螹才廉切螹螭也􅕪乎木切螻蛄螲知栗切螻蛄蝸古華切蝸牛郎螔蝓螔弋支切螔蝓螺也蝓餘味切螔蝓蟾之廉切蟾蜍䗁巨綺切蟬也䗃仕板切馬䗃蟈古麥切螻蟈蝦蟇又音國父俱切毒蛺水蟲蚹父句切蜼螺䘎音彎蟲名蜪它刀切尓雅蝝蠖蜪蝗子未有翅又音陶蝝推船切蟻也亦蝗豫猿子元切猿猴或作猿以朱切蟲也䖲詳遵切蟲也蠜父袁切阜螽也即蚣蝑又免蠜蜚也蟇莫加切蝦蟇亦作蟆蝦下加切蝦蟇蟼居丙切蝦蟇䗇臣六切蟾蜍蟬市然切蜩也以旁鳴者蟬連系統之言也霓午結午兮二切寒蟬蜩大么切蟬也同上蛥上列切蛥蚗蚗胡夬古穴二切蛥蚗亦蟪蛄也蚼呼口巨俱二切蚍蜉蛩巨恭切巨虛也又蟬蛻也螳大當切蜩螳蟣居指切蟲也蛆子魚切蝍蛆又且絮且余二切蠅蛆也亦作䏣蛔胡恢切人腹長蛔蛔蛔並同上􅿐音文蟲名音逶水也蚑去豉切行喙息麕鹿之類行也又音蟘徒得切食苗葉蟲􅠀並同上螫式亦切蟲行毒同上刃略呼各二切螫也痛也亦作蠚蟻宜倚切蚍蜉並同上蟻同上仁余切蟲名蜄市忍切大蛤也亦作蜃又市刃切螮丁計切螮蝀虹也蝃􅔼並同上蝀丁孔切螮蝀蚜火牙切蟲也蟄直立切藏也和集也蟄蟄多也又赤粒切蜷竒貟切蜷局也連蜷形蛑二同音舞音張蟲名音哥蟲名蛫九毀切獸似白身赤首説文蟹也蜼余季余救二切似猴而鼻仰尾長雨則懸於樹以尾塞鼻步登切蟲也蚳丈飢切蟻卵蠻馬姦切南方也蟲也慢也傷也蜏思又弋久二切朝生暮死蟲生水上狀如𧖟蛾一名尊母蝬音㚇蛤名蟹諧買切螯八足蜮胡國切似鱉含沙射人為害如狐也蝙布田切蝙蝠亦名蟙蟔又名仙鼠又名服翼蝠甫服切蝙蝠蜽力掌力蝄蜽或作魎蝄武兩切木石之精如小兒赤目美人髮或作魍蜬古含胡甘二切小螺見水中蜟余六切蝮蜟蟬皮蠟力闔切蜜滓蟪胡相切蟪蛄􅝦於虯切􅝦虯龍貌又于糾切蚴同上蟉力幽巨二切蟉䖭居亥切䖭蠣蛸䗚䗱步木切䗱蟲音速䗱􅨪以淺切蚓􅨪同上蝹於筠於云二切蜿蝹龍貌蚆普如布加二切貝也蝍子力切蝍蛆蜒以然切蚰蜒蚰與周切蚰蜒又入耳蟲蝣同上􅣒於疑切寒蜩似蟬而小巨隕去筠二切貝也􅜽子亦切貝狹小䖢亡消切蠶初生於冒切蟲也螱同上蝭丁兮大兮二切蝭蟧蟬也蟧力么切蝭蟧同上杳句切子公𧖟蠵戈規切觜􅏲以蝳蝐而薄有文同上蚡扶粉切亦作伯勞所作螖胡八切似蟹而小蠌大名切螖蠌蟲大丁切𧖟二眠蝥音務蟲名又音牟同上􅫡所竒切螺也力之切蚍蜒䖡女六切蛆蚭班蛬蚭女尼切蛆蚭䗅雉良切蚰蜒虹胡公切螮蝀又音絳縣名籕文蛙胡媧切蝦蟇又烏瓜切虴竹百切蚭蝢蟅蟲蛨亡百切蛨虴􅲈户錫切􅲈蚎音曰蟲名􅒹同上蝜扶缶切蝜大如蜆有毒補故切蝜蚅於革切螐蠋也螐於胡切螐蠋蠋之欲切螐蠋又音蜀蠾同上蚤子老切咬人跳蟲又作蚊䗚布莫切䗚蟭蜱蛸也蟭子饒切䗚蟭蟲先狄切蝢蜿蚌步項切蚌蛤也蚌同上蟡於為切似蛇又音詭蚵胡多切蚵蠪蜥蜴七狄切蟾蜍蠙步田切珠名即刃切海蟲䗯同上蝐亡代切蝳蝐又莫沃切蠶天殄切蜸蠶蟺也蜸口殄切蜸𧖟蟔亡北切蟙蟔蟙之力切北燕呼蝙蝠為蟙蟔同上䗘公盍切廣雅云羊䗘徒合切䗘蝂自限切䗚也蟞俾滅切亦作鱉繭古典切𧖟繭繭俗蟓似兩式亮二切桑蠶􅏑之戎切蝗也亦作螽蚞莫十切螇螰子􅢡直六切馬蚿蠁許兩切禹蟲説文知聲蟲蠁同上䖻力田切蜉䖻又弋留切蜘竹竒切蜘蛛亦作蛛蛛竹于切亦作蛛扶久切螽也蛁丁公切蟪蛄即蛁蟲虭同上蚱莊額切蚱蟬七月生虶於于切蛈虶螠蜒也螓疾鄰切螓蜻蜈力呼切蜈蚣蝒彌緣切尓雅馬蜩中最大者同上䗗古奚切甘田切螢火蛾也螔思移切螔䗔佢蜥蜴䗔音侯螔䗔蝖許元切蠀螬蟷多郎切蟷螳蜋别名同上蠰乃郎思亮二切齧桑蟲古卧古禾二切蟷蠰式容女黍蜙蝑子票切蜻螵毗支切螵蛸螳蜋子又撫昭切蜱同上蛸思么切蟬蛸螳蜋蜣丘良切蜣蜋啖糞蟲同上又其虐切蛝乎問切馬蠲也蟅之夜切鼠婦負蠜也蟅同上蟿口悌切蟿螽螇蚸似蚣䗥蚸蚩亦力的二切螇蚸於招切毒蛇名蝛於歸切蛜蝛蛜音伊蛜蝛委黍也􅢤同上蚊亡云切咳人飛蟲作蚊蚊巨由切蟲亦作蛷古姪切蠸蟌千公切蜻蛉古火切螺細腰蜂即蠮螉蜾同上螺力果切蜾螺力弋切蚌屬􅘾魯丁切螟􅘾桑蟲蚿胡田切馬蚿蜞巨冝切蟛蜞蟛步庚切似蟹而小蟛同上蚢胡唐切蟲類食蒿葉蝩文恭切𧖟晚生也蜢莫梗切蟲名蚥力父切蟾蜍螢于駉切夜飛腹下有光腐草所化同上􅨦直連切盧􅨦守宮也蝟于貴切蟲也亦作彚䗠似緣切􅵙䗠􅲇同上􅵙婢治切􅵙䗠􅍱蝨同上蜫古魂切蟲衆各亦作䖵𪕊徂核子尓二切蟲也蝰口圭切蝰蠍許謁切螫人蟲於結切螉蠮同上螒胡旦切天雞也一名涉雞䗽以季切蛘也蚲也蚲皮兵切蚲䗽蜿於阮於元二切蜿蜒龍貌又蜿蚓又於丸切蜿同上􅝒他敦切􅝒􅘿蟲似蟬而長味辛美可食又名青蚨􅘿牛俱切􅝒􅘿蜅方武切蜅觜蟹􅖈冝列切獸禽蟲蝗之怪謂之􅖈或作孽􅖆余雖切肥􅖆蛇一身二首六足四翼見則大旱湯時見陽山下蚟禹方切􅜽蠊力古切飛蠊蜚扶貴切獸如半目又蜚也又音非蚢胡唐切蟲類食蒿葉七由切次蜲於詭切蜲􅡂式與切蜲蟒暮黨切大蛇也又莫哽切蟅蟒也古頡切蚼似蟬而小蜊音梨蛤蜊螿子羊切寒蟬屬蝪恥郎切蛈蝪蛈他結他計二切螲蟷也亦蛈蝪螯五刀切蟹螯或作􅚺蠼音瞿蠼􅢮音范蜂也力支切螏才一切蝍蛆能食蛇亦名蜈蚣午乎切似鼠大亦作螋所由切亦作螋力竹切魁也蚍音毗蚍蜉大蟻螃北郎力莖二切似蝦蟇而大螚乃多奴來二切俗態鱉屬音甫蟲名公戾切繼蝧􅼄乃令切􅼄古逈切􅼄似蛙而小觸之腹脹害人徒登切蟲食禾葉户涓切蟲名蛞胡括切蛞蜍與諸切蝳蜍蝳徒駕切蝳蜍形似蜘蛛又徒耐切蠟子亦切蟲名又䄍同祭名音泉貝也蝶徒頰切胡蝶蜜彌畢切蜂所作徒酷切古文毒字害也惡也恚也蝃知劣切又音拙蜘蛛蟺是演切曲蟺蚻側轄切蜻蜻也蟂古公切水蟲䖺大公切如黃蛇魚翼見則大旱出山海經蠞子結切又音截似蟹蛡音詡蟲名􅣁於尤切鼠􅣁􅪔房中切蟲窟􅠸子六切蝍􅠸尺蠖也步屈也蜇陟列切蟲螫亦作蛆且主切蟲名息弓切蟲名赨羽弓切赤蟲名虴除嫁切形如覆笠常浮隨水亦作膾竹洽切班身小虻䗄力禹切蟲名力貟切蟲名蚷強魚切蟲名蛦以脂切􅢡蛦蟲名又􅝒蛦山雞蜐音劫石蜐似腳色江切蟲名以射切蟲名􆄥户夬切蟲名蚤音造蟲名音費蟲名虳九勿切又音的鼠也蝞眉祕切似蝦螠音縊蟲名丘貴切蟲名且利切似蜘蛛蟃無販切蝢蛉蟲蛇食遮切毒蟲正作蛇彌民切蟲名音異又音弋蟲蛠音麗蟲名䗲力刃切螢火音㵼又音寫􅗶普流切似蟹二足蟩居月切井中蟲􅡻大西切蟲名莫格切小蚊蟲􅚣五忽切以蟹䖩毗必切黑蜂苦紅切蟬脫皮也蚇音尺蚗蠖蟲久力切蟲食䗷於力切小蜂音賊食禾蟲音見蟲名䗛音蕭又音修蟲名營隻切蟲音色蟲名音祿似蜥蜴蛐音曲蛐蟺蟀索沒切蟲名蝌苦禾切蝌蚪蛞子蚪當口切蜊蚪螺音騾蚌類大西切蟲名加蟲古牙切米中蟲蚶火其切蚌屬􅰏昨仙切方言云鳴蟬也蠶自含切俗𧖟字䗵記良切䗵蠶䖱去王切大蟲螂魯當切蟲也䗧音康蜻蛉也呼典切蟲名虻陌庚切蟲名􅒕火咸切似蛤蝚音柔蟲名音雷蟲名音叢蟲名側尢切蟲名䗼許云切蟲也而容切蟲名音枝蟲名蝔古諧切蟲名胡求切古杏切蟲名蚽薄碑切蟲名音難蟲也音刑蟲音袴蟲名步如切蟲虸即李切蟲名鳥合切蟲名䖻音流蟲名音該蟲名力之切蟲名蚾薄碑切蟲名蚷音巨又音渠䘋子廉切蟲名息淺切蟲名􅮤音尹蟲名䗆音官又音綰他典切蟲也䗂呼古切蟲也蟢許紀切蟢子蛃兵永切蟲職以切蟲螞莫下切蟲音野蟲也蜇奴葛切痛也蠚也􅶎居表切又音告音養蟲名音弩蟲名先名切蟲􅶗音略蟲名蜸許偃切寒蜸即蚯蚓胡瓜切大蛇尺尚切俗蠰字芳伏切蟲名音同蟲也蟽音逹蟲名䖵部四百二凡四十二字䖵古魂切蟲之總名亦作蜫五何切𧖟亦作哦知蹇蟲名蠡力兮力底二切蠡蠡行列貌薄之扁欲破也飄也又力戈切𧖟在含切吐絲者􆇲於甗切蜒或作蝘虻莫庚切蚊也俗作虻音巴蟲也栘切蟲蛸亦作蜱子老切蝨亦作蚤螽之戎切蝑屬古文手列切蜩似而小俗謂茅蠽小蜩巨午切多足蟲亦作蟊亡侯切螣也或作蟊之悅切蟊乃丁切蟲也蝨所乙切淮南子曰陽沐既貝蟣蟊相弔蠢尺尹切動也作也或作偆在刀切今作螬戶瞎切螻蛄螶巨於切螶􅨑也蜂孚容切螫人飛蟲今作蜂􅑣古文螚乃北乃代二切似虻而小父尤切亦作蜉大子兖切蟲食於力切小蜂亡吉切勉也又􅑣目飴今作蜜􅼼同上徒何切狀如人羊角虎爪􅜹時忍切亦作蜃大蛤於貴切飛蟻𧈟女乙切小蟲蚊亡云切齧人飛蟲今作蚊同上蠯步幸切蚌蛤也或作蠯􅪓蠆丑介切毒蟲或作蠆蚶胡監切瓜蟲蠢春原牛袁切晚蠶蠹丁護切才中蟲又白魚螙古文蟲部四百三凡七字蟲除中切有足曰蟲無足曰豸婢脂切蜉大蟻或作蚍同上莫侯切與蟊蟊同扶畏切大或作蜚蠱公戶切事也毒也或曰榖久積變為飛蟲力刃切蚊也它部四百四凡三字它恥何切蛇也上古草居畏它故相問無它乎又非也異也今作他蛇同上今市遮切又弋支切詩云蛇蛇碩言恥支切今作螭龜部四百五凡五字龜居逵切文也進也外骨內肉天無雄以蛇為雄又貨之寶也古文而三切龜甲邊或作䶱之戎徒冬二切䶱龜烏郎切臨海水吐氣觜似鵝指瓜黽部四百六凡十八字黽眉耿切蝦蟇屬似青蛙而大腹又多士籕文蠅余陵切青蠅􅖚七由七狄二切蟾蜍似蝦蟇鱉卑滅切龜屬或作蟞鼉徒何切江水多似蜥蜴天者有鱗采皮可為鼓鼅音知鼅蛛或作蛛音株或作蛙胡媧切蝦蟇今作蛙蛙同上鼇牛髙切傳曰有神靈之鼇皆負蓬萊山在海中黿魚表切似鱉大胡雞切水蟲鼂中橋切蝘鼂蟲名古文鼊音壁􅔢鼊似龜而大文如玳瑁可飾物其拘切屬又音鈎􅔢同上卵部四百七凡五字卵力管切凡物無乳者邜生口木切卵空芳子切卵化徒木切卵內敗也大亂切不成子曰貝部四百八凡百四十四字貝布外切海介蟲大貝如車渠肉如科斗但有頭尾又貝甲也古貨貝寶龜􅩏先果切貝聲賀何佐切以禮物相慶賀贏余成切利也有餘也贅之鋭切賣人子與人為贅子又以物質錢也最也得也聚也定也屬也貺詡誰切賜也贛古送切賜也古禪切縣名賝丑林切寶色亦作琛賢下田切有善行也多也益也能也持心也又下見切義見考工記臤古文賁彼寄切飾也徵也又布門切虎賁勇士又扶非切人姓賑之忍切冨也賑同上䞈凡偽切賭也亦古貨字􅣢同上齎子兮切行道所用也持也備也給與也付也子期切歎辝賫俗財在來切貨也賂也賄呼罪切贈送財也同上貸他代切施也假也借盈也以物與人更還生也貣他得切從人求買亡蟹切市買也賣余六切衒也或作粥鬻古文負浮九切擔也置之於皆也違恩忘德也或作偩賂力故切遺也賻扶句切以財助喪也賵孚鳯切凡贈喪曰賵同上質之逸切信也主也平也璞也軀也又知異切賮才忍切財貨貱悲偽切益也賧吐濫切蠻夷以財贖罪同上費孚味切損也用也惠也耗也又扶味切姓也責壯革切求也古文贖市燭切又市注切質也以財拔罪也贎忘怨切又力制切貨也貨呼卧切賣金玉曰貨貿亡侯切中賣貧皮旻切之財賈公户切商賈也聚也又古雅切姓也戶羊切賈亦作商資子夷切取也用也貶碑撿切減損也賃女禁切借傭也二而志切副也代也疑也並也離也畔也貦牛亂切亦作玩好也弋證切以物相贈送賭丁古切䞈也䞁於獻切物相當賚力代切與也賜也勞賚為勑字今作顂賞戶掌切賞賜有功也賜思漬切惠也施也貾除基切余視貝竹几切當也贈在鄧切以玩好相送又助生送死賤才箭切價少也卑也不貴也貤余豉切貱也益也贇於倫切美也汝兖切小有財資子離切小罰以財曰贖也財也貨也賖始遮切貰也不交賣也貰侍夜切賖也貸也衒胡狷切今作衒賆步田切益也賕巨留切以財在法相謝也質也請也購古候切以財有所求償貪他含切欲也婪也思徇切益也都勒切今作得賅乎改古才二切竒也非常也亦作賅贊子旦切佐也遵也助也也贊説文贊婢丗切今作弊䝶力章切䝶賦也􅚲力艷切市先入賥思醉切亦作粹賔卑民切敬也客也服也從也賓説文賔古文於兩切無訾貹山敬切財也䝻薑魚切賣也賦方務切稅也布也量也使吕切以賣財問卜贓作郎切藏也賳子才切貨也䝭古候切廪紿音綿䞁也貢公送切通也獻也稅也賜也賨在宗切蠻賦也稅也􅵊疾盈切賜也賰式尹切賱賰冨有也賱於尹切賱賰䩀皮祕切壯䩀賙之由切給也贍也收也䞀呼日切龍目出江海䝫才惡切貨也賟他典切冨也贔米袐切贔屓有力也屓虛器切贔屓貴居謂切髙也尊也多價也貴説文貴贉徒感切預入錢販方万切賤買貴買力侯切貪也䞆先卧切骨貽弋之切玄貝亦作詒遺也贍市艷切周也假助也贚良用切貧也又龍貌賏於敬於庚二切節也瞰火監切有賄也而晉切牢也贆卑遙切貝居陸賧也䝹烏欵切䝹小財貌乎管切䝹嚫音襯嚫錢刃政切賣不得䝬音注財䝬䝰直凡切或作痔古作畤賲布老切有也亦作宲賶七浪切積貨音林取也巨律切䝱音協財也貫古玩切穿也今作貫贀于間切㛪拿或作䜜錉眉巾切本作譄算稅貼天叶切以物取錢恤先筆切分賑亦恤字烏邁切貯也力賑切貪也也或作遴徒陷切錯也重賣也賊昨則切劫人賽先再切報也市肺賦斂贋吾安切不直貯知吕切盛也積也收也藏也贄脂利切執玉帛亦作摯火營切貨也俵方廟切散匹帛與三軍或字大廣益會玉篇卷第二十五
