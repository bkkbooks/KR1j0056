body:
  text: 大廣益㑹玉篇卷第二十二凡十四部山部三百四十三二百九十六字山所姦切髙大有石曰山山宣也産也散氣以生万物也岱徒載切泰山㠀丁了多老二切海中山可居嶽牛角切五嶽也王者廵守所至山岳同上同上古文出說文嶧余石切山在魯囯鄒縣嶷魚其魚力二切九嶷山舜所葬在零陵管道縣亦作㠜奴刀切山名又大也巙同上嶩同上午刀切山多小石亦作㠂嶨苦卓切山多大磐石亦作礐又音斈岷武巾切山名江水所出㟭同上同上崵余章切首崵山在遼西嵎牛俱切山在呉越嵉音霆山在鴈門㞦居擬切女㞦山嵕子公切山名嵏同上才結切髙陵也又才葛切嶭五結切嶭山髙也崟宜金切髙也􅴀口沃切山皃嶘士眼切危髙皃㟞同上岫似又切山有岩穴岵胡古切山多草木它果切山皃巁力制切巍也峻思俊切嶮峻也􅤆同上嶞天果切小山又徒果切岨七居切石山載土也嶼似與切海中洲􅠌口耕切石谷岪扶勿切山皃峑七全切山巔崛魚勿切山短髙皃又特起岡古郎切山脊俗作崗嶟子昆切山皃仕力切嶷也㟎它罪切山長􅧓乎古切山廣皃岊子結才結二切髙山皃岑土今切山小而髙􅦂下圭切姓也㠅父六切山覆也崧思融切中岳也嵩同上嶃仕咸切山石峻高或作漸崒才律切峯品崒也崨才接切山皃岌魚及切山髙皃嶫魚怯切岌嶫崌音居山名嵍亡刀切丘也或作堥密眉筆切山形如堂􅣊同上峘户官切大也嶢午乆切髙峻皃嶜子心切山髙皃㠑才賄切􅪾㠑山皃􅪾力罪切山形又力水切𡻭同上岻直夷切山名崳弋朱切山名丘利切髙皃巖午衫切積石皃也峯也嵒冝咸切山巖岟於兩切山足嵆戸雞切山名嵣徒郎切山名嶑似两切山名岬古狎切山旁亦作碑嵯才何切嵯峨髙皃峨五何切嵯峨㞰虚語切山也嵀直主切山名㟇子卧切山動崆口公口江二切山皃崝仕耕切崝嶸髙峻皃崢同上峎五狠切山名㠕於鬼切山形峴戸顯切山也㠐巨苗切峻也形似矯嶸戸萌切崝嶸嵤同上峙直里切峻峙啟口山水愛切又音啓􅵣与支切山名比吉切南山道也岣古后切岣嵝衡山也嶁力后切山頂嵿丁冷切山名㞳當口切山名嶝都鄧切小坂巇許竒切嶮巇巔危也嶚力幺切嶚􅥲山髙􅥲士交切嶚􅥲岠其吕切大山峼乎老切山名音父山名五虧切在髙山上今作危同上㞺才卜切古族字音蘚山名巒力丸切山峯也楚辝登石以逺望兮豳悲貧切周邑名峭七肖切嶮也亦作陗於巳切山也无匪切山皃峞牛罪切又牛回切髙皃亦作嵬峗崤戸交切晉地要塞㟚巨彼切山名古􅑢字岐同上踈土切山也嶙力因切嶙峋深崖皃又力忍切亦作􅸊峋思遵切嶙峋深崖古刀切㟉亭也㟉力刀切㟉㠚徒對切山皃嵁五男苦男五感二切嵁崿見魏都賦嵐力含切大風又岢嵐山名崴烏乖切崴㠢不平也㠢户乖切崴㠢也徒外切山也山弇衣廉衣撿二切山海經山弇嵫山崦同上嵫音兹山弇嵫山日入処㠆丁安切㠆孤山也七計切山名崽山皆切山名崇士隆切重也尊也衆也序丘也同上崋戸瓜切西岳又戸化切㠔方賣切阸㠔山形古文倉字崍魯台切山也嵦五來切山也􆀘巨角切山名㟍力唐切冬至日所入峻㟍之山屺去几切山无草木崠得紅切山名㟒丘貧切山名􅛜戸經切山也㟏火含切大谷岭力丁切岭营山深小皃崥方尓切岟崥山足也紀力切山名峐古來切山名岯符悲切山再成嶈七良切山聳巉士杉切巉嵒髙危岝士百切岝峉山皃峉五百切岝峵戸萌切山也嵾楚岑切山势岓巨希切山傍石嵃魚蹇切殿䑓之势崐古魂切崐崘山名崘力昆切崐崘㠠力魚切山名嵢千郎切山势峸示征切山也巃力孔力空二切巃嵸嵯峨皃嵸即孔即空二切巃嵸峿五乎切嶇峿山􅰗古含切山也於縁切山曲岹徒聊切山也岈火加切嵢岈山深状嶓布佐布何二切山名㟘徒凋切山也嶗力刀切山也􅼏冝今巨今二切岍口弦切山名峛力尔切峛崺或作邐迤崺弋尔切峛崺山卑長胡溝切山名巔多田切山頂㠓莫紅切山也㠦孚隆切山名﨑去竒切﨑岖山路不平嶇音區﨑嶇岴同上嵱与封切山名嵭布庚切崩嵭也嶆昨遭切山名子于切嵎髙崖也山石相向巋江追切山小而衆也􅾉五咸切山髙㟿莫郎切山也􅜗知勇切山也崼成𥿄切山也㠝在丸切㠝岏銳上也髙也岏牛丸切㠝岏㠖冝﨑切山名嵄眉否切山也㞨即李切山也魚㪯切山也嵔於鬼切嵔嶉髙也山髙下凹曲皃嶉子誄切嵔嶉所凡切古使字托卧切又音朶力罪切山也􅐑同上㟅五江五東二切山名嶔綺金切嶔崟山势嵰丘撿切嵰嶮也嶮魚撿切山嶮岲詡誑切山也苦謗切山也嵽徒結切嵽嵲小而不安皃嵲牛結切嵽嵲嵹巨亮切山也巏古乱切山也牛仲切山也之義切山名姑戸切又古胡切嶊子罪切山林崇積皃无沸切山名力御切山名去智切山也子于切山也崩布朋切壞也毁也厚也亦字崚口升切崚嶒山皃嶒疾陵切崚嶒也㠍子入切太白山名音晋山也􅔩音介山名嵌口衘切坎傍孔也又山巖􅿪仕皆切山在平林崹大兮切崥崹山皃岞仕革切山也崿五各切山名音直山名力么切又洛包切山名嶕昨焦切嶕嶢山髙也嶣同上峪余蜀切山也㟳音栗山名岄魚厥切山名􅑬其展切􅑬嵼山屈曲又九輦切嵼所簡切􅑬嵼㠉徒紅切山无木皃兹錦切又音審山名嵑苦葛切山名嶱同上㞥仕今切說文入山之深也屼五骨切屼秃山苦忽切屼也㞽許月切山也口骨切山也屹魚乙切山皃峒逹貢切又徒董切山名嶰胡買切山不相連也岦力入切岦岌山皃崞音郭山名峇口合切山窟同上嵅古暗切又音緘音咸嵐嵅山名嶺力井切坂也或作阾於元於阮二切山名冝合切兩山向㞱倉龍切日欲夜㞧古文㑹字嵋武悲切峨嵋山名􅦾河蒲切山在南陽縣􅾊音昳􅾊山皃魚結切􅾊􅝝同上亦同上嵠戸佳切溪名亦溪同㟽必小切又彼矯切峯孚容切山髙尖㠙户刀切山戸巊烏頂切山名㟰亡頂切巊㟰山名崔才回切崔嵬髙皃又音催嶠巨肖切山銳而髙崱仕力切山名巐丑小切山㟐莫郎切山名音泛山名嶾於謹切嶾􅸊山髙亦作崷疾由切崷崪山皃巘魚偃切尔雅重隒謂山形如累兩甑皃莫波切山也㠧莫彼切山也仚許延切人在山上崶府容切山名一名龙門山在封州大魚上即化爲龙上不得點頟流血屾部三百四十四凡四字屾所因切說文二山古文路字嵞逹胡切今作塗音疑古文嵬部三百四十五凡三字嵬午回切崔嵬髙也不平也或作峞又五罪切公回切大皃又美也威也偉也怪異也巍牛威切髙大也屵部三百四十六凡八字屵牛桀切又牛割切說文岸髙也嶏晋昧切崩声又皮鄙切毁也或作圯􅢏力幺切􅢏廊空也今作寥岸午旦切水涯而髙者嵟徒罪切髙也亦作陮崖牛佳切髙邊也女交切悴也􆀚午旦切厚也广部三百四十七凡百六十七字广冝檢切說文因广爲屋廙余力切行屋下声又謹敬也亦作翼庉大本切楼牆也屯聚之処廬力於切寄也屋舎也㢏古文逾又徒楼切行圊也木槽也庭大丁切堂階前也礼閽人掌掃門庭廣古晃切大也又古曠切㢚力古切府也庵也廉力沾切清也堂廉也稜也又箭有三廉也府方禹切本也聚也又書也取也藏貨也廦布覓切屋牆也垣也今作壁庢知栗切礙也止也序似吕切斈也舒也東西牆也又長㓜也庠徐章切記有虞氏餋囯老於上庠太斈也庾俞主切大曰倉小曰庾廮於井切安止又縣名龐步公歩江二切髙屋也又力容切縣名廢方吠切退也域也止也放置也大屋傾也廁側吏切圖溷也雜也女也側也庳音婢短也卑下屋也廑竒斳切少劣之居也廕也或作覲庾所留切隱匿也求也索也隈也亦作搜庰卑并切蔽也薄也或作帡庰廔力侯切屋蠡也春也亡江亡頂二切豊也有也厚也廇力又切中庭也屋廇也又作霤廯思淺切倉也廪也㡵魯丁切懸通皃音壬下也音倚庪也庎古拜切獨也庩音荼􅦟也廘力木切庾也倉也作郎切壯立皃音离慶也於其切急也七侯切崩声庀匹婢切具也廕於禁切庇也亦作䕃廪力荏切倉也廠尺兩切馬屋王委切羙也牀史切遲也魚錦切大屋廈胡假切今之門庑也廊力唐切庑下也离与切衆也㡸十雅切屋未成㢔子孔切衆也古丸切玩也廜大胡切廜蘇庵也㢝息胡切廜㢝方登切崩也魚掩切卑皃火大切穴也廆胡罪切廦廆也庛七漬切耕具也長尺一寸居吻切積也所近切屋斜音亶偏舎也之氏切居卑也㡷布忖切戎姓庵烏含切舎也也郎古切直皃㢃力當切髙也庙音佃平也庡於豈切俳佪也色倚切移也庱恥拯切亭名見吳志廨居賣切公廨也弋势切食庑也綏醉切顚也尸位切下屋也所訝切賤也庨許交切庨豁宫殿形狀廗都蓋切邪廗也音布烈也㢄徒候切器名㢛魚欠切小皃㡺得案切小舎也廅安盍切山旁穴也䨾符沸切小隱也㡹七賜切屋也口合切市音弋屋頭也音或區也庯布吾切屋上平也度唐故切法度文過也音捻壓也庍方卦切到别也先見切舎也䵇同上作惟切姿也又許惟切庴秦切縣名在清河座才貨切位也厂部三百四十八凡五十六字厂呼旦切說文山石之厓岩人可居厈籕文㕋其禁切石地也􅫏五敢五今二切山石下也厓五佳切水邊或作涯㕆胡古切羙石也厬居鮪切水尽厥居月切其也短也發石也或作斥欮厜是規切厜㕒也又姊冝切㕒不竒切厜㕒也弋里切石利也厝千故切厉石也厎之視切致也至也均也平也又石声厗徒尼切唐厗石又古字㕇力合切石声亦拉字午的切石地也厖莫江切石大也厭於冉於葉二切合也伏也又於豔切飫也厒口合切山夾有岸也厇竹格切亦作磔開也㕈於豈切藏也夾切􅷘也厃之嚴切仰也屋梠也又顔監魚軌二切厧丁田切止也亦作顚厞浮沸切隱也陋也歩項切周邑也厲力丗切虐也附也近也危也作也髙也上也磨石也􅝏同上㕊芳俱切石文見也􅷘匹亦切仄也陋也似亦切古席字胡苟切不薄也重也山陵之也厚同上口合切又苦後切閉口声厙尺夜切姓又尺舎切乃乎切古孥字仄壯力切陋也傾側也同上古文㕌音礙張幕也又石名徒乱切古文叚㕍都回切亦推字㕂冝今切古文吟以周子由二切㕃音溪倒地也厱來甘切厱玉或作此芮切地名所栁切老人也古文猛字徒到切古文㓹居例切地名厤力的切理也亦作秝㕐司夜切又音冩㕅古洽切大也厔式質切室也厄於革切俗戹字髙部三百四十九凡九字髙古刀切崇也上也逺也長也髙空井切小堂也亳歩莫切殷地名髝來到切髝髙皃亭大丁切民所安定之爲除害也漢有里亭長髞先到切髙也仕交切髙足也髛苦高切明也莫告切氉也危部三百五十凡四字危牛為切不安皃㩻丘知切碩低不正亦作卼午忽切危臬卼也危臬午結切危臬不安亦作􅯜石部三百五十一二百九十二字石市亦切山石又厚也斛也磺古猛切強也也銅鐵璞礦同上碝而兖切石次玉也亦作碭大浪切文石又縣名礐口角切石声也山多大石也亦作嶨碣具列切特立石也又碣石山名古文磧千的切水諸石水淺石見砮乃乎切石中矢鏃磍苦轄切輵磍揺目吐舌也盛怒也确胡角切磽确亦作埆同上硠力唐切硠磕石声又力蕩切弋庻切石出隂山碏七昔七畧二切敬也左衛大夫名碏硏午田切摩也亦作研幵血􅒍同上磕苦蓋切硠磕也又苦闔切碑彼皮切銘石又臥石磷力鎮切薄也雲母别名又音鄰䃺莫卧切磑也所以磨麥磨同上砢力可切磊砢衆小石皃磿力的切磨歴石小声磑午對居衣公哀三切堅石也磨也磻補左補何二切以石維繳碆同上礒冝綺切嶔崟﨑礒石巖也仕咸切礹山皃礛力甘切治玉之石也青砺也或作􅺧􅱧甫廉切刺也以石刺病也砭同上碎先潰切散也破也亦作礹五咸切礹亦作巖山指切石墮声磒尤粉切落也碨烏罪切碨不平也同上破普餓切解離也碎也壞也碞牛咸牛令二切僣差硞苦角切石声硻口耕切堅也􅓓力罪切碨􅓓亦山名同上硩夭歴切列二切石中矢也礙五代切止也亦作閡硈口黠切堅也矻同上確口角切堅固也亦作擕碻同上砠且居切土山有石亦作岨礱力公切磨穀為礱磊力罪切磊砢也磥同上礫力的切小石同上硌力各切山上大石又石次玉硟思煎切以石衦緭也磽苦交切堅硬也知略切研也磋千何切治象牙先果切小石䃤思六切黒砥石又先鳥切碓丁潰切所以春也力兼切赤砺石碬都乱切砺石也䃀且對切磑也砬力執切石藥礪力勢切崦嵫山多砺石可磨刃䂿徒荅徒感二切再春䂬居勇切水边石䃍徒對切墮也砡牛六切齊也磅匹庚切石声磯居衣切水中磧也摩也硯午見切石器以研墨磭赤畧切大脣皃硐大公切摩也礬扶袁切石也礥下妍切难皃硾丈僞切鎭也笮也亦作縋䃒下革切石也埆也磁疾兹切石似鐵礎初吕切柱磶也磶思亦切柱礩也乃結切礬石也礩之逸切柱下石又音致砥之視切磨石亦作底􅪗思䝨切石次玉思移切磨也礓居良切礫石也磐歩安切大石也磌之仁切礩也音響也又大堅也砌千計切危也喈砌也磝午交切或作嶅古拜切石次玉碉音周石室也砊口唐切硠砊也碥方顕切將登車履石也亦作扃䃫丁敢切石䃫岀蜀中力皎切烏垂砫之缕切石室同磂力牛切亦作鐂硍諧眼切石声磼才合才盍二切磼礏髙也硫力尤切硫黃藥名硥歩項切亦作䂦之人切石名砎下瞎切石皃䃷弋成切翫習也礏午合于闔二切磼礏也磫于龍切磫􅮍砺石也砰披萌切大声硑同上如充切石也於宫切又音雄䃛力煎切亦作鏈鈆属䃴之余切礛䃴青砺也䃜於兮切黒石礊口革切堅也碪知林切擣石砧同上碊予田似千二切也移也磓丁回切亦作凖矺竹格切磓也丁狄切磓也矸呼旦切磓也音搥石也磟力竹切磟碡平田器碡徒篤切又音逐音磻石也磎音磎石也硡音宏石也䃶胡乖切石也碕巨衣切曲岸頭也方宇切䃊磑也䃊子吕切䃊磴丁鄧切巖磴磞普耕切擊石䃁烏加切石名碬下加切磍碬髙下也碌力木切碌䃚多砂石䃚千木切碌䃚碖音輪石也硼匹耕切石名同上􅙓人文切惡雌黃也䂳义瓦切好雌黄也巨焉切碩也䃢去金切石名䂚音爻石不平也􅮥音康石声磤衣謹切雷声亦作􅨴䃓古侯切罰也碥也士邪切石也硄口光切石声􅗟呼宏切石声音篤落石也䃧力中力冬二切䃧䃔石声硨尺遮切硨磲石似玉磲矩於切硨磲魚兼切山也礯於京切石也碤音英水中石䃔丘中切䃧䃔又戸冬切碼音馬碼碯石似玉乃老切碼呼宏切石皃同上石也苦扄切石声磃四貲切宫名或作虒礣莫轄切礣砎堅也砱魯工切石也碽古紅切擊声䂫戸工切崩声祖琮切石也磾丁泥切有金曰磾古狎切山側亦作岬矼古双切石橋䃑音班石鋪皃亦殊切石也䃋同上䃂故本切周礼凢声髙声䃂硭无方切硭硝藥名硝思焦切硭硝䂘音釵石名䃈音皆山名䃌音眞石山也䃸子林先念二切䃸磹電光磹徒念切䃸磹硢與魚切石也砂魚加切俗沙也碒宜今切石也䂟居麻切石也硊牛委切磈硊足曲也硿苦東戸宋二切石声䃡子林切石也碀仕耕切破声音浮破声也之由切石也硱口本口氷二切硱磳右皃磳子登仕米二切硱磳硧音硧磨石也䂢多動切墜石居飲切石名碔音武浮石也硂士泉切度也亦作銓量也次也乃子切䂪石也䃬五罪切石也丘仰切石也䂽音掉石名䂪同上砉呼覓切砉然見壮子竹甚切用石力也䂹斫㦸切石落声砋音止砺石也磣初甚切食有沙砐五合切砐硪苦耕切吳有臨山磉先曩切柱下石也砪音母藥名音史石名磵古晏切水磵硋五蓋切正石硜口耕切小人皃又口定切矴丁定切矴石於故切磓砟仕亞切碑石䂤音附白石也先外切小石碁音其圍碁也亦作棊硪音我砐硪山髙皃初磷也水石䃝口孝切磽䃝也碃千定切石類䃻音霸石也砒房脂扶迷普兮三切石也硬五更切堅硬亦作鞕砑音訝光石也􅭏音迭砲􅭏也砞音未碎石也砩扶勿切石名女交切䂩沙藥也音鬰山石皃也曷切麤石磆音滑磆石也䃙音鹿石也音独石名砯普氷切水擊石声硉郎几切硉矹危石也矹五忽切硉矹都歷切石也􅮄音朴硝石音孰石名碢徒禾切石同上又飛甎戲也砣同上石也音莫沙也䂸音掴擊石也砳力麥切石声磈口罪切礧磈石也礧洛罪切不平也碦音客石堅也硆五合切石硆䃳音臘石墮也砝音劫硬也䂺烏火切䂺石皃五火切石皃音瀆石名礮匹皃切礮石側角切石也礇音郁玉似石張下切石皃女下切石皃䃗音剥石也砄音央石也䂰盧盍切石也音略石也碐力登切又吕升切磩音戚碝磩石次玉也音闕石也音獲切石硬声矷音子石名匹忍切石也砲匹夘切石也又音雹硤侯夾切硤石縣名勒可切山名碋乎可切司馬相如梓桐山賦云磢側兩切石也磖力合切磖磔破物声􅮍巨俱切磫􅮍磬部三百五十二凡九字磬口定切以石為樂噐或作殸籕文又口耕切㲆力京切多声徒到切年九十曰毊巨嬌切尓雅云大磬他曽切声口丁切不可追力冬切声也鏧同上􅎧部三百五十三凡二字􅎧多回切小塊也魚結切髙危也阜部三百五十四凡百九十三字阜扶九切大陸也山无石也盛也肥也厚也長也􅊟同上丘善切小塊八陵力升切大阜也犯也冡也摽也馳也陵遟也或作夌効附扶付切依也近也著也益也說文以附益為坿従此附作歩回切附婁小土山也今作培陰於今切黙也影也水南山北也闇也今作隂陶大刀切丘再成也鬰陶忘思也喜也陶丘有堯成堯居之故号陶唐氏又陶甄亦作匋又音揺陽余章切隂陽二氣也好日也山南水北也傷也清也双也亡俱切陜東縣陂彼皮切澤鄣也池也又碑偽切傾也邪也又普何切陂陀靡迆也陸力竹切厚也道也星也水无路也陸離猶參著也雜乱也籕文古文作䧊苦篤切大阜隙丘㦸切閑也穿穴也璧際也裂也阿烏何切倚也太陵也北也曲也水岸也邸也丘也阽余占切危也陛蒲礼切天子階際子例切接也璧㑹也方也合也降古巷切落也下也㱕也又下江切降伏也亦作夅陾耳升切築牆声陙时均切小阜陪歩回切貳也隨也加也助也益也家臣也䧦為詭許為二切地坂名阮牛逺切山名又関名隖於古切小障陲市規切危也阹去居切依山谷為牛馬圉亦作隃式注式朱二切北陵在鴈門山陚方句切丘也小阜也隈烏回切水曲也䧕胡逼切古域字院胡官切堅也周垣也亦作寏又王眷也䧰胡本切大阜也土山也阞來得切地脉理也隰似立切下濕也同上險義檢切髙也邪也惡也難也危也阻也阪甫晚歩坂二切陂也脅也險也陜諧夾切不廣亦作㣣隴力冢切大坡力罪切磊也陬子侯側流二切隅也尓雅云正月為取隅牛俱切角也陬也阭余剸切髙也地名也䧇於㡬切坂名䦺多庭切丘名陷乎監切墜入地也没也墮也隤也或作錎陮徒罪切陮隗不平也隗午罪切髙也又狄姓之矅切界埸知京切丘名隊池類切從髙隊也失也又徒對切部也陖思俊切險也髙也亦作峻䧢丘俱切﨑䧢或作嶇䦽詞旅切今作序䧎乎大切坑也阬口盎口庚二切虚也埳也地也亦作坑陗七肖切險也隱也亦作峭隕為愍切落也墮也似林切小阜陠普胡切哀也防扶方切備也郭也禁也隄也或作坊隥丁鄧切險阪也仰也或作蹬陊徒可切壞也小崩也䦼普逼切地哀同上隒魚險切重甑也厓也方也又方撿切陋力豆切醜偎也隠小也阸陜也阤除爾切小崩也落也䧁呼矩切郷名古崩字壞也隩烏到切浦隩也水厓也又藏也亦作墺澳陟知直切登也髙也升也丘營切危也亦作傾䧆戸工切也尺善切魯邑名隱於謹切不見也安也度也匿也隤徒回切壞墜也或作頺墤阢五回切崖也亦作峞陌莫百切阡陌䧞亡化切益也陼之與切丘也說文如陼者陼丘中水髙也􅥳午結切危也不安也或作阸於賣切險也塞也隘上同又陋也陜也隵音羲險也除直余直御二切去也開也疾愈也殿階也􅭖徒木切通溝也亦作瀆胡買切小溪亦作澥隁於建切以畜水䧫胡刀切城下道階古諧切登堂道也上也進也梯也級也隓許規切廢也毀也捐也亦作墮隋徒果切落也懈也墮同上又許規切􅖮力侯切縣名阼才故切主階也阼酢東階所以荅酬賔客阺直黎丁兮二切阪也下也其院切何東安邑縣陭於竒切陭氏縣尺熖切䧟也陯力均力昆二切山阜䧟也亦作淪陘下丁切限也山絶也又縣名䧘丈轉切道邊庫垣布木切今作濮丈如切丘也阡青田切阡陌也道也亦作圱障之尚之羊二切隔也或作㢓隔凡戹切塞也障也隚徒郎切今作堂隀音重地名隑巨慨五哀二切梯也企立也不能行也限諧眼切界也度也阻也斉也陴婢支切城上女墻房中切地名陑汝之切地名隧似醉切羡道也掘地通路也或作陜式冉切弘農陜縣在曰隌烏感切闇也与晻同􅴶火哀切地名隅語俱切地名陀大何切陂陀險阻也俗作陁陔古䑓切階也隴也亦作垓丁戈切小堆亦作市征切山地名丑申切地名隄丁兮切塘也又徒兮切䧑古文隍乎光切城下阬无水曰隍阾力凡切与嶺同阪也陻於仁切塞也敶直殄切列也陳除珍切列也布也或作塵古文阠所陳所隀二切東陵也阰婢吏切山名在楚許魚切地名音㚇国名隝丁了丁老二切今作島隯同上隆力中切中央髙也隆盛也隇於帰切隇夷險阻也阷丑眞切丘也如陵切地名以之切地名䧃達堅切地名䧜徒郎切長沙謂堤曰塘䧡弋龍切城牆或作墉音地名音凋山穴名音坡陀不平陫音裴山名陞式陵切上也進也与升同他玷切亭名在京兆䧒力開切階䧒也䧓音周大阜皃䧌音雖地名䦻咨以切地名丁乱切人名或作鍜碬陓於于切陽陓秦薮名音楚阪也䧋呼典切地名陡當口切地名歩等切山也呼嫁切裂也或作鏬㙤陣直鎭切師旅本作陳䧉音里亭名乃礼切地名音兖髙皃徒罪切髙也䧨魚怯切險也危也今作業池爾切地名䧠市兖切地名阧當口切阧峻也隢音遶地名䧝音蚩地名陒巾毀切山名亦作垝毀也口狠切遲也音姑地名音巧地名䧥言惠陲名音峻也隮子計子兮二切登也升也它根切多合皃土禁切䧯也䧔音念遇在岸也䧯仕衘切地名阣音盖又音屹䧛歩浪切附䧛也本作傍䧗符逼切山也􅠵居六切古岸阻壯㪯切險也疑也阯之市时止二切基也或作址􅤦部三百五十五凡四字􅤦扶救切說文兩阜之間似醉切延道也今作隧於懈切陋也今作隘所冀切阜䆕也厽部三百五十六凡三字厽力睡切累塹為牆壁也尚書以參字七貪切垒力揆切累也亦作壘參千含切相謁也分也即三也又所今切星名亦作曑尺楚今切參差也亦作蔘大廣益㑹玉篇卷第二十二
