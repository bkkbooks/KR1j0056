body:
  text: 大廣益會玉篇卷第九凡二十九部言部第九十四百八十二字言魚鞬切言辝也問也我也古文古文談徒甘切論言也戲調也謁於歇切告也白也語魚巨切言説也譬匹臂切喻也請且井疾盈二切問也求也乞也又疾性切謂烏沸切云也道也報也讖楚蔭切讖言也驗也譻於耕切聲也謦枯鼎切聲也詯胡內切瞻氣蒲聲在人之上也又胡市也諒力尚切信也相也助也諷方鳯切誦也譬喻也詩舒之切詩書也誦徐用切暗誦也訌胡東切敗也潰也諍訟相陷人之言詵所陳切衆多也又致言也訰之閏之純二切亂也讀徒鹿切誦也誨呼繢切教示也䛄於万於阮二切慰也從也亦作婉許虛語切進也從也聽也詻魚格切教令嚴也謜魚園切徐語也誎且録切從也呼歷切私訟也恨也內悔也亦作鬩諾那各切答也説文應言也咨子詞切問也謀也謨莫胡切議謀也謨同上譩於熙切不平之聲也恨辝也作噫同詇於竟於仗二切早知也訪孚望切問也謀也詢息遵切咨問也同上譜布魯切屬也牒也布列見其事也撰仕卷切又此專切專教也謹居隱切敬也也誥古到切誥告也察楚黠切與察同詪古恨古很二切難語貌又乎典切訂他丁唐頂二切平議也詁姑五切訓故言也謄逹曽切傳寫也䛢他鹿切詆䛢狡猾詆他狄切詆䛢狡猾也又音底訶也論力昆力困二切言議也諗尸枕切念也告也詥胡答切諧詥也證之盛切諫也謏蘇口切小也又思了切亦作議魚寄切論也法有八議諫柯鴈切正也諍也謠與周切從也謐莫橘切靜也誯𥘉障切導也發歌句亦作唱謷五勞五交二切不肖人一曰哭不止悲聲謷謷譞呼緣切慧也謡與招切徒歌也讃子旦切解也哀也發揚美德也説始恱切言也釋也又音稅談説也又余輟切懌也訒而振切言難也訥奴骨切言難也誧滂古切大言也又匹布切謀也諏子須切問正事也聚謀也警居影切戒也敕也􅨜火吳切喚也諄之閠之淳二切佐也可惡也告曉之熟也同上詳似良切審也又音羊詐也謙苦嫌切遜讓也卦名諦都計切審也諛與朱切諂也訓許運切教也誡也古文識時力切知也始志切記也計居詣切會也算謀也讇丑冉切佞也諂同上誾魚巾切誾誾中正貌又和敬貌訔同上䚮如陵切厚也就也重也諓疾箭疾剪二切巧言訹思聿切訹誘也謺之陟切拾也訊思進切問也辝也古文諶時林市荏二切亦與諶同諶恃林切信也誠也仕亞切暫語也謰力前切繁拏也話胡卦切善言也調也話同上誠是征切審也信也敬也信思刃切明也敬也信古文又作扣嘍洛由切謰嘍也謝詞夜切辝也去也􅒜説文誡居拜切警也命也告也􅢽且送切􅢽詷言急也詷徒貢也􅢽詷也譏居依切嫌也誃舒𥿄直移二切離也脫也謻同上譣虛儉息廉二切問也詖也諰思理切思之意也誑俱放切誑惑也古罵切欺也悖補潰步沒二切亂也逆也同上誓時丗切命也謹也約束也䜋胡退切中止也譯也譖莊賃切譛訴也訕所晏切毀語也訿子尓切不善也毀也訾同上譪於害切止也臣盡力也託他各切寄也依慿也誣武虞切欺罔也誹甫尾切誹謗也䛬道刀切小兒未能正語也䛬同上譮許戒切怒聲也籀文作諙記居意切録也識也詛側助切盟詛也咒丈又切祝也訇呼宏切駭言聲也籕文諈竹恚切託也又諈諉纍也諉女恚切諈諉誤牛故切誤謬也詿古賣切詿誤也噧火界切怒貌又音邁同上誼冝寄切理也人所冝也訖居迄切畢也止也詍余丗切多言也詍同上訛五戈切為也妖言曰訛訛同上詡虛甫切普也偏也人語也謳於侯切齊歌也吟也讗胡麥切疾言貌噭空後切扣也子邪切咨也樂類辝也同上設尸熱切置也陳也合也諍側迸切諫也止也譄子恆切加也諅渠記切忌也讋章葉切言不止也同上訝魚稼切相迎也與迓同詠為命切長言亦作咏呼會切聲也喧虛袁切喧譁也訟似縱切辝爭訟也古文子斜切也側雅切訶貌諺魚建切俗傳言也譁呼瓜切喧也同上訴蘇故切訟也告訴冤枉亦作訴􅬫同上謘直梨直利二切語諄謘詣魚計切往也到也諣呼卦切疾言也徒回切譟也讕落于力但二切誣言相加被也同上詒與支切遺也相欺詒也講古項切習也論也訆公弔切妄言也符真切多言也診除刃之忍二切視驗也侯俗謗補浪切誹也人道其惡也讎視周切匹也用也譎公穴切詐也之耳切計也讄力水切纍功德以祈福也同上愆祛言切過失也籕文愆字下啓切待也囁之涉切多言也囁同上謑胡啓切謑詬恥辱也同上酬時遊切答也職又切詛也譥古弔切大呼痛呼也勿放切相責也訧有求切過也訞於嬌切災也又巧言貌説文謧力支力泥二切慢言也謍余瓊切小聲往來貌詘丘物切枉曲也誳同上譿胡桂切材智也察也譓同上詜他刀切䛬詜言語不節也譊女交切爭也恚呼也諲之神切敬也謖山六切起貌諳烏含切記也知也或作喑同上訮呼田切訶也五間切訟也譟桑到切羣呼煩擾也諻呼撗切音也詅力丁切衒也譅色立切言甚多也同上諞步連符善二切巧言也謲千紺切相怒使也譝視陵切譽也誕徒旱徒旦二切大也天子生曰降誕籀文誻逹合切誻誻語相及誻徒合切誻誻妄語也讜丁勆切直言也譡丁浪切言中也誘余手切引也相勸動也亦作誘同上丑脂丑利二切不知也誺同上又切代切誤也讑羊照切誤言也硤古協切妄語也譀户濫切誕也火鑑切叫怒同上誽女佳切詁誽言不正也諼許圜切忘也詐也䜜以醉切恨言也許亮切不久也諸至如切非一也皆言也又助語詄徒結切天門開詄蕩也謾莫般馬諫二切欺也詝知與切智也必奚切誤也詖彼寄切佞諂也辨論也慧也歡虛元呼丸二切歡嚻聲譺魚記五界二切欺也䛿公核切智慧也䛎呼決切怒訶也課枯過切議也試也又苦訛切誂徒了切弄也説文相呼誘譸竹尤切譸張誑也訄去牛渠牛二切迫也誔逹鼎切詭言也諧胡皆切和也合也調也偶也或作訬楚交切擾也疾也健也誒虛冝切可惡之辝也嘻許其切悲恨聲也堆丁回切謫也譽余怒切稱也聲美也又音余諆居疑切謀也又去其切謔虛虐切喜樂也戲言謈蒲剝切大呼自冤也􅮮力足切謔也詑湯何逹可二切詑謾而不疑訏况俱切大也張口鳴也虛光呼晃二切夢言謬靡幼切誤也亂也譫之閻切多言也謵叱涉丑涉二切謵讋言不正也訐居竭切攻人之隂私也誋渠記切禁也戒也䜏虛規切言相毀也喃女函切語聲也􅒋力官力全二切亂也理也不絶也諯尺絹至緣二切相讓也謓昌仁切怒也今作嗔譴詰戰切責也謫問也昌脂切訶怒也詀陟咸切多言又知陷尺占二切詎其吕渠遽二切止也至也鞫居六切窮也治罪也􅨣大計切􅰾􅨣審諦􅰾於計切􅰾􅨣䛘女林切多言讒仕銜切佞也讞魚列牛箭二切議罪也䛠丁逅切䛠詀誽作㛒同譳奴言切䛠譳也誴殂冬切謀也宅江切質也􅧘普布切諫也詨許教切大叫嗥又呼交切謉居位切慙恥與愧同附夫切詞也諃五林切善言也息移切諒也􅠗如詹切多言訃芳付切告喪也又至也讆為歲切夢言不譓也䛏奴奚切呼人聲䛣匹丁切言也方凡切言急也訸胡戈切平也卑密切止行也本作蹕蹕諤五各切正直之言也宜巾切頑也五駭切謹也陟由切多言也謅𥘉卯切弄人言憝徒對切怨也惡也亦作憝譵直類切怨也或作懟譯余石切傳言也疾歷切靜也䚵他口切䚵誘也䛞何蒲切多言䜈楚交切代人説文與勦同謮側革切怒也讓也誢乎典切諍語也詃古犬切誘也誷無紡切誣也䛰戶衮切謀也謞火角火各二切讒慝也􅦔居宥切禁也助也丑利切笑也之勢切語不正諢五困切弄言也子就切吏也火內切休市也與詯同䚴魚刮切怒也訶也䜗火禁切祝也子禁切怒言也䚿同上啼不止也魚向切止也渠竟切強爭也古文競庀匹示切具也今作它胡切言貌火個切譀也莫駕切多言也詐之訝切詐偽也古蛙五華二切懶也不正奴力切喜也也司夜切話也諎七個切囁也䛍府味也多言也䛾先護切諧䛾也詴烏回切呼人也又户罪切以端切笑貌入善言䚸胡介切善也誎七賜切數諫也七賜切謀也志之吏切記也詉女加切譇詉言不可解也讉以加切譯惡言也謎米閉切隱言也唬火訝切誑也同上𥘉稼切異言也認而振而證二切識認也䚳之豉切不知也快也宴烏見切宴設也胡到切相欺也誆巨妄切狂言也誜所化切俊言也誏郎宕切間言也與勆同矧式忍切况也或作矧詺名聘切詺讜也誟許交切聲也咒職救切咒詚也􅲳力制切言美也諹與章切譽也又余亮切訜筆云切入不知也護胡故切救護也􅏺扶泛切多言訣古穴切死别也兵列切分契也誐五歌切吟也又牛可切訑弋支切訑訑自得也諿七入切和也言翕許及切疾言許縛切妄言居力切訥言諭揚樹切譬也他口切誘也譒補過切敷也謡也詯戶對切胡市也蘇奚切聲振也䛩烏古切相毀貌𧫦於禮切譍聲諟水𥿄切審也諦也訅渠留切安也謀也􅲲蘇戈切佞也動也試始志切用也呼荒烏切人叫也咱巨九切毀也俄寒切山形出貌誗直嚴切言利美也諝相吕切才智之稱詮七全切具也評也欣許殷切樂也喜也訨諸是切訏也謋虎伯切恐也亦作唬䜅以隹子惟二切就也譭許委切謗也怒言也時志切者行之迹諡同上又伊昔切笑貌諡説文胡故切志也認也譇知加切譇拏羞窮也調徒聊切和合大弔切選也競部九十一凡七字競虔仰切競言也譶徒答切疾言也讟徒木切謗讟也痛怨也左傳民無怨讟渠慶切強語也逐也競同上又爭也敵也譱是闡切大也吉也􅵗同上今作善曰部九十二凡十二字曰禹月切言詞也語端也楚革切告也同上籕文替且感切曽也又音潛沓徒答切重疊也多言曷何葛切何也盍也􅔟昨勞切輩羣也曹同上今文暹思廉切進也長也噪部一百五凡三字噪先到切鳥羣鳴又七俏切臿屬今作鐰才心切掘地也又臿屬今作鈂部巧切鈍刀也籥部一百六凡八字籥余酌切樂管五孔以和衆聲今作籥充垂充瑞二切樂人以吹管中氣今作吹龣古學切東方音今作角充尚切導也今作唱篪直離切或作篪和胡戈切今作和胡皆切今作諧思條切今作簫册部一百七凡五字册楚責切立也簡也説文符命也諸侯進受於王也古文嗣似利切續也習也力丁切空也扁補淺切署門戶之文也又音篇音辮㗊部一百八凡一十一字㗊壯立切衆口也噩魚各切驚也囂許朝切喧也又五髙切思唐切亡也古文喪荒貫切呼也與喚同嚚彥陳切愚也古文古弔切大呼也髙聲也荒旦切呼也或作喚器祛記切器皿也器同上俗只部一百九凡二字只之移之爾二切語巳辝也從口象氣下引之形􅠒乎丁切聲也部一百十凡六字奴沒切又女滑如劣二切下聲也言不出口也矞余出切出也况出切飛貌商舒羊切五音又國名籕文古文古文欠部一百十一一百四十八字欠江劒切張口氣悟也欽去金切欽敬也欨泥娛吁禹二切吹欨又笑意也次且吏切敘也近也第也斂呼濫呼甘二切欲也歖欣疑切樂也欮居月切掘也丁錬切呻也同上弞式忍切笑不壞顔又音引㰳於雅切欭㰳驢鳴也丘凡切多智也􅩃子合才六二切嗚也亦作噈又爼敢切菖蒲𦵔也歈大侯切歌也又羊朱切㰥呼丗切欨㰥笑意也許角切嘔吐也嚘於牛切逆氣也㰭虛娛切喜樂也㰢口莖切咳也㰯他走他豆二切㰯唾也㰰呼洽切㰰弞氣逆也弞呼飢切㰰弞客加切出氣也欷呼兮切歎息也􅸅尺脂切笑也㰪於佳切㰪聲又居攜切呵丘睱切大張口笑也戶甘切沆湘人言也助咸切笑也胡沼切丗氣也㰧許來切飲也歅一辛切人名方歅相馬者呼昆切不可知也烏口切吐也於逞切怒氣也飲一錦切古飲字㰴普口切苦言也歄古蛙切歄猶歄􅶩也五瓜切歄居委切疲極也㰝余耳切咳也欳口怪切大息也款思萃切問也五困切又竒逆切氣逆也舒臣切吟也亦作呻詡政切含笑貌去劒切古欠字㰡呼介切聲也㰼苦叶切欲也啜昌恱嘗恱二切大欱也㰫恥南切欣也婪也秦力切汁錯也余六切驚詞㰵子律切吮也欰私律切鳴也丑歷切痛也又知力切欹於宜切欹歎詞也於伯胡陌二切吐聲毗必切吹也古勿切飲聲缼輕歷切吹聲許勿虛記二切急怒聲㰬息均切信也逆氣也許狄切出鼻涕子六切欻悲貌於六切愁貌赥許迪切笑貌歏去靳切又丘云切氣盛去斤切口孕切嚏也年支切匹婢切聲也秦力切錯喉與同火盍切啜也㱌於業切取也歂視專視兖二切口氣引也欴來當切欴㰠貪貌㰠火郎切欣㰠噴普門普悶二切噴氣也食部一百十二凡二百二十字食是力切飯食飲食也説文食􅧮思流切饙也􆁟同上養余掌切育也守也樂也畜也長也又弋尚切供養也飴翼之切餳也同上籀文䬮古文饙甫云切半蒸飯也餴並同上飪如甚切大熟食飪同上饘之延切饘粥糜也􅊡同上飯扶晚切餐飯符萬切食也􅽁飰並同上俗饔於恭切熟食也女又切雜飯也饎充志切酒食也黍稷也同上於革切飽聲也􅰝並同上􅴱式掌切晝食也同上子旦切以羹澆飯䬤古文飽補挍切食充飽蒲也並古文餫于問切野饋也䬼於縣切猒也糊户吾切寄食也或作糊糊同上餔補胡切甲時食亦作脯餱胡溝切乾食曰餱糧飻他結切貪食也餮同上叨敕髙切貪食貪財也籀文䭑力冉切嘰也一曰廉纍餳徒當切飴和饊也饊先但切饊飯也餅卑井切麵餈也饐於利切臭味變也饐古文餉式尚式章二切饋食也饛莫東切盛器蒲貌饁為輒切餉田食餉式亮切饋也䬽始鋭切小餟也又力外切䬽同上饗許掌切設盛禮以飯賔也䭓五恨五寸二切饐也飢几夷切餓也古文飢䬷尸野切䬼飫䬷飽也同上飵在各族故二切食麥也餞自剪切送行設宴也餀呼帶切食臭也䭒胥弋切氣息也餐七安切吞也食也餐同上䬯女兼切相謁而食麥也館古換切舍也逆旅名饉竒振切𬞞不熟秣莫逹切馬食穀䭔丁回切蜀呼蒸餅曰䭔同上䭡於寸於恨二切食欲飽也餤弋廉徒甘二切進也飢紀衣切穀不熟餓五賀切飢也饌士卷切飯饌飯食也饌同上飶蒲結蒲必二切食香也餌如至切食也餅也飼夕恣切食也飼同上飾舒弋切修飾粧飾也餝俗餥甫鬼切餱也又甫違切餾力救切氣蒸也䭐余障切餌也􅦑於勿於月二切䭉也飴和豆也亦作同上餘與居切殘也剩也多也䬵古來切飴曰䬵􅦑餗思榖切鼎實也力丁切餌也饒如燒切多也飽也豐也厚也餘也餲於利於介二切飯臭也䭞余石切祭之明日也餣於劫切餈也餭戶光切乾飴也餟張芮切祭酹也餽也亦作醊䭕子敢切無味也又慙濫切飩徒昆切餛飩食也餛戶昆切餛飩餦豬良切餌也力甑力蒸二切馬食穀多氣流四下也䭉思纍弋纍二切豆屑雜糖糖徒當切糖䬾餌也䬾徒兮切糖䬾普力切飽也餧奴罪切飢也一曰魚敗又於偽切飼也䭢奴耕切又內充實女江切䭢強食也餄公洽切餌也餼虛氣切饋餉也饘記言切粥也飦同上子荏切餂也或作𩝡去善切噍也乾麵餅䬧五丸切餌也䬫徒奚切䬫糊也蒲突切飫也䭘於仰切也䭇於結切食不下或作噎力拾切糝也古文粒䭘乙錦切飽蒲也䭘同上飬金媛切祭也餂逹兼切古文䀨餽居位求位二切遺食也視利切貪欲與嗜同䭖之庶切呼豕食餪奴管切餽女也胡郭切無味也飷子也切無味也膳時戰切食也與膳同飲於錦切咽水亦啜也古文飲亦作飲思敢切羹也苦到切勞也䬿亡鬼切微也飳竹句之句二切祀也饀杜刀切他刀切食也居六切饘也餩於北切噎也餕子殉切熟食也䭂倚及切䭂濕也魚據切以酒食送人䭁之例切臭敗味也視豔切亦贍也飺疾移切嫌食貌飫於據切食過多􅷩同上飧蘇昆切水和飯也莫彼切哺小兒也於元切貪也􅪪莫波切􅪪食也餈疾資切餈糕也同上烏告切妬食也糕古刀切糕糜糕餅也肴胡交切饌也止盈切煮食也䭅戶烏切餅也餇徒紅切食也饋渠位切餉也饞士咸切食不嫌也蜀容切饞也都滕切飽也色求切飯壞也餿同上尺志切酒食多也都獵切食貌奴盍切䬲古侯切牛飽也􅡤杜刀切餌也飫於遇切飽也饆卑吉切饆饠修食也饠洛河切饆饠素回切飯也直知切飴也餜古火切餅子也􅳗口敢切飢也餺浦各切餺飥米食也飥他各切餺飥古回切飽也餒奴罪切飢餓也丑善切長味也郎外切門祭名飣丁定切貯食也餖徒候切飣餖也􅝚於外切飽也饚火蓋切食臭也鋤吏切嗜食也𩛌同上饜於艷切飽也𠣿九右切飽也􆇾居戀切饌也奴倒切熟食也古卧切食也􅿲人又切餾也䬣去毅切食怒也許氣切食怒也䬶五良切餒也而至切祭也力谷切食也􅝚徒屋切粥也直六切食貌胡瞎切飽也餺蒲莫切餅也餑蒲沒切麵餅也飭恥力切謹貌昨結切食也䭆女厄切炙餅餌也􅝽昨糟切食陷也而勇切食也䭃如枕切飽也古洽切餅也􅥪同上粄方蒲切屑米餅也饏徒敢切無味也甘部一百十三凡十二字甘古藍切甘心快意也樂也説文美也説文甘甛徒兼切甘美也猒於豔於鹽二切足也飽也又方冉於甲於涉三切同上甚市荏切孔也劇也古文徒戴切甘也古三紅談二切和也嘗市揚切試也又祭名醰徒紺徒含二切長味也或作醰馦呼兼切香也或作馦旨部一百十四凡四字旨支耳切美味也意也古文古文嘗市羊切口味之也與嘗同涎部一百十五凡五字涎徐仙切説文慕欲口液也亦作涎􅧔􆇊籕文弋之切啜也盜徒到切逃也私利物也羡徐箭切饒也貪欲也部一百十六凡八字女涉切盜不止也所以驚人也一曰大聲也今作幸輔到切酬答也余石切同人也捕罪也生也樂也好也張流切引擊也文盩厔縣名之入切持也守也結也魚距切養馬者又垂也退也禁也使也居六切窮治罪人也同上夲部一百十七凡九字夲丑髙切往來見貌也説文進趣也同上步到切耗也猝也今作暴呼物呼貴二切疾也皋古刀切澤也皋同上􅣡余凖切進也或作允奏子漏切進奏也書也説文奏夰部一百十八凡六字夰公道切放也昦乎老切昦天元氣廣大也昊同上俗居遇切舉自驚然也奡午到切慢也亦作傲臩俱永切驚走也又往來貌大廣益會玉篇卷第九終
