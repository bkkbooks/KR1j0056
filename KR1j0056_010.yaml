body:
  text: 新加偏旁正俗不同例丠丘同几人同􅔣首皆首同􅚀􅋄皆尤同辵辵同肉月同鬥鬪同類隔更音和切嘆敕旦切今他旦切啄丁角切今中角切膘扶小孚小二切今頻小匹小二切大廣益會玉篇卷第十
  hash: sha256:f1fe743f2c97d590f73494c680aaf6f29cafc20996b08de69de08e6ccbd9ec67
