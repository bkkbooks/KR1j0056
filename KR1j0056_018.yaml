body:
  text: 新加偏旁正俗不同例垂同朿刺同音集包音覓壬他井切殳殊音戍越音皿明丙切屮轍音禾五吪切類隔更音和切恥臘切今他臘切罩罩並都教切今中教切房之切今頻之切大廣益會玉篇卷第十八
