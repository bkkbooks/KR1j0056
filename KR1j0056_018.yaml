body:
  text: 新加偏旁正俗不同例垂同朿刺同音集勹音覓壬他井切殳殊音戍越音皿明丙切屮轍音禾五吪切類隔更音和切恥臘切今他臈切罩䍜並都教切今中教切房之切今頻之切大廣益㑹玉篇卷第十八
  hash: sha256:481c295786f440366cbb189f8cfacecbe7909407814053c728334a63c4a0ffbd
