front:
  text: 大廣益㑹玉篇卷第十八凡二十六部金部二百六十九四百七十二字金居音切說文五色金也黄爲長乆薶不生衣百鍊不䡖從革不違西方之行生於土古文銀語巾切尓雅白金謂之銀錫思的切鉛錫又與也鋈烏篤切白金也鐵他結切黒金也䥫俗文銕古文鋚大幺切鐡也又轡首銅也銅徒東切赤金也鏈力仙切鉛鑛也鑿在各切穿也鏨也又子各切同上録力玉切具文說文金色也鋻古田古甸二切堅也銑先典切金也鍊力見切治金也鐐力彫力弔二切尓雅銀美者謂之鐐鑲女羊汝羊二切鉤鑲兵名鐼扶分切鐡也又音訓鑄之樹切鎔鑄也銷思焦切鑠金也鍇器駭古諧二切尓雅九江謂鐵曰鍇鋌逹鼎切說文銅鐡撲也鋞胡經下冷二切温器鑠式灼切銷鑠也鋏古恊切劒也鐸逹洛切所以宣教令文事木鐸武事金鐸鈃胡丁切說文似鍾而頸長鋊余玉余鍾二切銅屑鍜多乱切椎鍊也䥵呼皎切鐡文也鑮旁各切似鍾而大四時之声也又𥙷各切鏕力木切鉅鹿郷名俗作鏕鏏于桂切銅器三足有耳鏡居映切鑑也鋗呼玄切小盆也鎛布各切田器又鎛解獸似人懸鐘横木也䥝於刀切說文温器也䤻大罪大果二切鎋鑊胡郭切鼎鑊鍩他點切取也鏺浦末切溓也兩刃有木柄可以刈草鐎子消切温器有柄也鍾之容切聚也肓也酒器也鐘職容切樂器也銚弋昭切温器也銍知栗切刈也說文穫禾短鎌又之一切鍑方宥切似釡而大也鑴呼規胡圭二切大鑊鍪莫侯切緮属鉶向經切羮器也鈏羊刃切白錫也尓雅曰錫謂之鈏大口切說文酒器亦作銼才戈切銼􅟋鍑也錪他殄切小釡也􅟋力戈切銼􅟋銎去恭切斤斧空也又銎銎擊皃又許顒切鎣余傾切器也又烏定切鍒如周切說文鐡之耎䥩無非切鉤也鉉胡犬切鼎耳也鏦楚江切予也撞也䤸同上錡冝倚切二足釡又渠儀切銶竒休切折也又鑿属鐪力古切釡属鏌靡各切鏌釾劒名釾似蛇切鏌釾鋣同上鑱仕衫仕懴二切刺也鏨也鉅強語切大也今作巨鐅普結切鍫刃銛思廉切銛利也鑒古銜古懴二切察也形也丮也鑑同上錢子踐切田器疾延切財也鐙音登錠也又多鄧切銸女輙切拔髪也鑷同上又車綦也鑗力脂切金属錅同上鈴乎潭巨廉二切耕類也車鎋也鑾力完切鑾和以金爲鈴也鈴力丁切鈴鐸也鈕女九切印鼻也鉹尺尓切說文曲鉹又鬵鼎同上鎭知刃切安也重也壓也鍲眉巾切鍲業也筭稅也鐕子南切无蓋釘錐之惟切鍼也鐆似醉切陽鐆可取火於日中鐩同上鈹普皮切大針也又劒如力裝者鍤且歩楚洽二切長鍼也鉥時橘切長針也鏨才敢切小鑿也鍼之林切說文所以縫又渠廉切針同上鍫七消切鏵臿也鐰同上又才刀切鐵剛折鋸居庻切解截也鉊之姚切鎌也鐮力詹切刘􅧉也鎌同上鉆其沾切鐡鋷也又敕奄切􅎂時計直頼二切鉗也鎎許氣切怒戦也䥯彼皮切􅪢属鉏仕𦵔切田器又仕吕切鋤同上鉗竒炎切以鐵束物又奴所著鏝亡干切泥鏝也大㦸也釣都眺切釣魚也鋽徒弔切燒器也鍥古節切鎌也又口結切䥛同上鑚子乱子丸二切所以穿也鈭于攴子移二切鈭鏎斧也錘直危切稱錘也䤧呼内切金銅也鑢力庶切錯也鋁同上鈀補加切候車也又音加切錙仄飢切八兩爲錙鍰乎関切六兩也銖市朱切十二分也鋝力輟所劣二切量名􆈃同上銴時丗切車樘結又銅生五色鋦君玉切以鐡縛物也鎔弋鍾切鎔鑄也鏐力切紫磨金鈞古純切三十斤也銞古文鐲文角切鉦也形如小鍾又音蜀鐃女交切似鈴无舌鏞弋鍾切大鍾也銿同上說文与鍾同鎗楚庚切金声也錚同上鉦之盈切鐃也鉦以靜之鍠胡觥切鐘声亦作韹鈁甫玉切鍾也鏜他當切鼓声也鐊餘章切鐊馬靣節鍚同上鑋丘并去政二切金声鍃目公切大鑿平木器鋋市然切小矛也鍉小兮切鋒也錬子奚祖奚二切刀利也同上鐔徒言切剱鼻又夕林時占二切鎩所界所點二切長刀矛也鉈市利切矛别名鏑丁狄切矢鋒也鏵胡瓜切鏵鍫也釫同上鈒所及切鋋也又穌合切鏢匹燒切刃削未銅也鎧口伐切甲也釳許乞切鐵孔也鍵竒蹇切壯也又管鑰鑳同上錟大甘切長矛也又他甘切銳徒㑹切矛也又弋稅切釬何旦切說文臂鎧也銲同上又銲器也鍮他侯切鍮石似金也鋀同上鐓大對切鐏也矛㦸下銅也錞同上又市鈎切鐧古鴈切車鐡鏃子木切箭鏃也鏗口耕切鏗鏘金石声也銵同上鐏在困切說文秘下銅也錏乙加切錏鍜頸鎧也鍜下加切錏鍜鑭力旦切金光皃鑈奴頰切堅正也鉩同上䥍先列切田器也椹也又之二切釭古紅古雙二切車釭鏉山逅切箭鏃也􅘜力逓切鏉􅘜也鎻思果切鐵鎻也鏁俗鐉此全切門鉤又所劣切六兩也鉣居業切說文組帶鐵銜下監切馬銜鐵鑣彼苗切馬銜也鋖息咨切平木器鐁同上鈔楚教楚交二切強取也掠也鋃力當切銀鐺鎻也鐺音當鋃鐺人絹切銀也䤹師由切也鎪同上鋂莫回切大鐸一鐸貫二也鍡於罪切鍡鑸不平或作碨鑸力罪切或作礧鑕章溢切鐡鑕砧䥏冝吕切楽器也鋙同上鋪普胡撫俱二切陳也張也鏘七良切鏘鏘行舞皃鎦力牛切古刘字鈍大困切頑鈍也鐱渠驗切金也鋀音豆器也䤨普酌普賜二切裁名鎕徒郎切鎕銻火齊也銻大兮切鎕銻鈋五戈切削也徒對切千斤推錭大刀切鈍也鏷歩梏切鏷􅣏矢名春秋作僕姑􅣏古胡切鏷􅣏公兮切堅也鍏于非切臿也銃尺仲切銎也鉠於良切鈴声鎬胡道切温器也又鎬京釵楚街切婦人𡵨笄也鏔弋脂切㦸無刃鍨渠追切鑚也鍴都丸切鎻也鏸胡桂切銳也鍋占和公禍二切車釭盛膏器錣竹劣竹芮二切針也釨居列切鉤釨也錕公本切車釭也錥余六切温器也鋡胡耽切受也䥸亡攴切青州人呼亦作力刀切鑪鉀也鉀古狎切鉀鑪箭鐹公卧切刈􅧉也鏳仕萌切玉声也鉐音石鍮鉐銅属鎢於胡切鎢錥少釡也鈳於河切鈳䥈小釡也鈷柯魯切鈷䥈釜䥈莫朗切又莫補切方皮切鉏也䤪丁東切鈌也釜扶甫切鍑属亦作鬴釴餘力切鼎附耳外也鏀力古切釜也鈶辝理切亦作耜莫鄧切環也布外切鋒也鉒竹句切器也送死人具也鉿公合古合二切声也鑖亡結切小鋌也䥡大頰切鋌也鐴𥙷狄切犂耳也釤山鑒切大鎌也銗胡釣切鏂銗錏錣鐇甫園切廣刃斧也鈑布綰切鉼金也䥀丑善切長也錜乃頰切小釵也渠月切磨也鏻力丁力仁二切徤皃鉜扶侯切鉜鏂籢飾也鏂於侯切鉜鏂鍝牛于切鋸也鎜歩安切古文盤䤳才夜切鏡䤳也鎒呼髙切除草也又奴豆也鎡子辝切鎡錤也錤渠基切鎡錤也錑力内切平板具䥗口渙切燒鐵久鉎所京切鏉也鏊五髙五到二切餅鏊也䤡而斂切鐡也釧充絹切釵釧也銐除例切除利也鏆古喚切穿也鉌胡戈切鈴也銋如針切廣雅也如甚切鍖銋鍖丑甚切鍖鈓鉟匹眉切刃戈也䤶於劫切椎也鐻渠呂切器名也钀魚傑切鑣也錧公滿切車貝也钃陟玉時嘱二切鉏也仕間切小金也都毒切觼舌也鐶胡関切金鐶也鍸户徒切亦胡字鐍古穴切環有舌与􅬇同鈙魚倚切釡也与䰙同鍔五各切刀刃也鐖居衣切鉤逆鋩鉢𥙷末切器也鉾亡侯切器名鉍彼兾彼密二切矛柄鑘力回切劒首飾也力狄切或作鬲鑰餘灼切関鑰也鐯張略切钁也鉷胡聾切弩牙也鎚都雷切又直追切鐡鎚也䥉於元切鉏頭曲鐵也鉄持桎切古文紩鈮奴礼切古文獮錎户監切古作陷鏒思感切金鏒也銓七全切平木器又銓衡也鏋莫短切金也鏟楚簡切平木器鉵徒冬切鉏大皃鉤古侯切鐡曲也鋐户萌切器也鈿徒練切金花也又音田鍽𥙷輦畢連二切金鍽鍈於卿切鈴声也鋒孚逢切刀刃也鎊普忙切削也錀力屯切金也鏤力俱切属鈁劒名又音漏鐈渠驕切鐈鼎長足者渠離切軸鐵也鑐息臾切鎻鑐也鍗徒奚切鐡名􅣱必申切鐡也鉋蒲矛切平木器又防孝切鍶司龍切鐵器又烏切鈱莫賔切鈱鐡葉古麥切鐡器莫庚切金錢鋿時羊切磨也釘的苓切鈴釘矛名又都定切釩芳犯切拂也鋹丑兩切利也鋩無方切刃端鋼古昴切鍊鐵也鐄胡觥切鍾声鉛役川切黒錫說文青金亦作鈆鎈相可切金光也釚渠牛切弩牙匹犂切箭也鎀宿由切鋋也䤾吐刀切函也鋟七林子廉二切以瓜刻版䤥魚鬼切以捩鋹齒也鑨盧冬切器也鉖徒冬切釣鉖也鈚薄離切鐡也鈽方乎切金版也䤷於蹇切兩刃㦸也鉸古咬古效二切釘鉸鍷五圭切鏟也銈决倪切金也莫羅切金也銂祝由切金刀也鑶昨郎切鋡声也鑅乎觥切鍾声鑇兹犂切切也錂力升切金名䥎殊倫切器也鋑七桓切鋑刀也鉼畢領切尓雅鉼金謂之鈑鈰時以切劒名釨祖里切剛也鋅同上又金皃鉙知駭切金也鏾息讃切弩也鑜舒養切或作鋿磨也鉃食指切箭頭錗竹瑞切器名鏙七回切鏙錯也亡犯切馬首飾釥七小切美金也鈌古穴於穴二切刺也時厠切莊事也鉂色滓切鐶也五罪切金也釲夕次切金也鋺於逺切秤鋺也鑯于廉切鐵器又鑴也釦音口金飾器口也鐌徐兩切金像也鐬火外切鈴声錊子對切鍊也鑛古猛切鑛鐡也鈂直深切耕具说文臿属鍍音度金鍍物也鋥直孟切磨鋥也鏴力故切金路也徒錬切金也鋆乎均切金名鑫呼龍切又許金切尺制切除草器鋠食振切圎鐵而稅切銳鋇本妹切柔鋋鐩辝類切鏡也錝殂聋切金毛也䥨力預切又力魚切鉺如志切鉤也翌怒切錮古路切錮鑄也銏所諫切精金釟補戞切治金也釛胡刻切金也鋉蘇禄切金也鈺五録切堅金䥔思欲切金也銉金律切針也音朔鐶也􅘫區律切􅘫鉞也鉞辛律切金未錬鉘浮勿切飾也鈅魚厥切兵器也鉑蒲各切金鉑也鏼所革切鐵鎗也鈼殂鶴切釜也鍎徒骨切金肥也釞得立切銛也鉻古額切鉤也鎉都盍切金鎉也鈉奴盍切打鐵也䤭舒力切糚也鋜仕朔切鎻足切鈠營歷切器也鐭音噢温器也鎘盧的切釡也鑉他盍切鑉鑪箭也鎰羊質切二十兩曰鎰鋷祖誨切錐屬鑡𥘉角切剗属鍱音葉鐡鍱也䤮時獵切金節也銆莫伯切銆刀軍器也鑞盧甲切錫也鍓祖立切金鍓之釙普剥切金針也鈯徒鶻切鈍也徒兮切器也鎑干劫他盍二切金埾鑭力旦切光也鑺局虞切軍器名鈸音跋鈴也鏚千歷切七鏚鎋下戞切車鎋也䥢七昔力宗二切皷声錨眉遼切器名鈊思林切金也鎞必弓切鎞釵也鎏力由切美金錓口觥切器也錔他荅切器物錔頭也錯七各切鑪也雜也說文金凃也又音庴鏶音集說文鍱也錠徒徑都定二切錫属說文鐙也鉞于月切斧也亦作戊鈇方于方宇二切鈇鉞又剉斫刀也之善切割也銘莫經切周礼凡有功者銘于大常鍭乎溝乎豆二切鏎箭鏃徐專切圎轆櫨也又徐釧切轉軸我器也鈵彼病切固也錍匹迷切說文錍此金斧也又音卑攴部二百七十凡百七十七字攴普角普卜二切小擊皃攵同上啓口礼切說文教也又開發也敏眉隕切疾也莊也敬也孚甫切安也或作抚肇直皎切俗肇字敀布格切附也政之盛切政事也說文正也􅴬舒枝切說文敷也亦作施效胡教切效法也功也敄无禹切強也力米切数也敃眉隕切勉也暋同上芳于切布也陳也亦作敷敳五哀切有所治也攽悲貧切分也敿居表切擊連也赦式夜切置也放也宥也同上敟丁殄切常也書也亦作典孜子詞切說文汲没也而頻切使也㪉公荅切合㑹也視由切計也說文棄也􅪅同上數所屡所缕二切說文計也改公亥切更也換也􅶂徒活切強取也徹丑列切通也明也又直列切古文敞昌掌切髙也明也開也敕丑力切誡也今作敕攸余周切所也敗歩邁切覆也壞也破也又補邁切贁籕文斂力冉切收也又力豔切變碑媛切変化也渙也汷亦攸字㪅古猛切歷也又古衡切代也改也復也今作更斁金石切猒也又都故切敹力幺切簡也擇也􅼿干非切戾也教居孝切敎令也誨也古文並古文敶除珍文刀二切列也亦作迷敵大的切對扺也擊也敭弋章切亦作揚敢古膽切敢果也勇也並篆文岀說文胡怪切毁也又古拜切敦都昆切理也享也竹几切刺也巨云切朋也救居又切助也竹角切擊也􅴛力館切惰也乱也宼口候切暴也冦盗也㪤畢蜜切尽也敒直信切說文理也􅖏徙古切塞也㪣口交切擊也收式由切收拾也說文捕也敜乃頰切閉也或作捻敉武婢切安也抚也鈙巨林切持止也楚革切擊馬也又万切小舂鼔之録切擊也又公户切敂枯苟切擊也或作扣䜴充句切爲也除耕切撞也㪦余刃切擣也㪜𥘉委切試也攷口道切稽也今作考攻古洪切善也治伐也都鈍切亦作頓弋陵切古勝字口皆切摩也波卧切古文播㪤布計布米二切㪏㪒也㪒五雞五礼二切㪏㪒余掌切古文養附俱切今作扶敡式䜴切侮也㪛知今切擣石􅫕火之力之一切說文􆁐也烏切曲也今作枉女角切執也力小切小長皃㪆下礼切隱也㪇先見切散也斀都角切說文去隂之刑也敔魚吕切楽器柷敔也敺丘俱切擊也山丐切攪也㪃口餓切擊也大可切擊也敤口果口卧二切研理也牧莫六切治也畜養也卑緜切速也㪌先孔切㪌擊也扶勿切理也㪠口䧟切貧也畋唐年切平田唐見切受也公幺公的二切擊也㪭力胡切斂也古伯切擊也敊丑叔切㪬敊也㪬丑角切上注他逹切古撻字或作逹攺余止切大印以辟鬼力綜切絞也巨冝切枝也都滕切升擊也䰙武分切磨拭敘徐吕切次弟也陳也斆下孝切教也与斈同賊安切殘也子泥切箭射也側加切取也苦工切控也匹之皮美二切器破也匹玄普文二切擊也音祇弓硬也亦殊切投也徒年切攻也㪓丈乖切邪也㪁丘含切㪁敧也敧丘儀立蟻二切㪁敧路回切㩲也石鄰切擊声也􆂡大何切擊也魯當甚也􅛴十刀切持也亦操字匹胡切屋欲壞匹尸切上同吉安切進也多含切貪也㪮音靈打也故多兼切故腏稱量也㪡口大切伐也擊也洎音切打枝声職由切禦也他果切安也多古切伴也㪐力没切㪐㪁不滑利㩿苦没切上同盧啓切敵也昌尹切動也敼於已切戲也㪋何蒲切漧甚大含切尽也㪑倚輒切㪑􅯹相反也女涉切上同直孟切磨光也職刃切動也武旦切卑也渉陵切召也今作徴丘竒切礼有器他旦切无色也㪨市戦切治也扶勿切破也四卓切打也㪍蒲没切㪍然忽之也㪖力谷力玉二切摇也口八切鼓扣也㪩息六切打声力見切較也市玉切連也㕟口切或從欠義同􅜙女羊息羊二切攘也目雪切枯也故古暮切舊也說文使爲之也放部二百七十一凡四字放甫望切弃也逐也散也去也又甫往切此也效也􅨝五刀切遊也或在出部敖同上敫余灼切光景流也又古了切丌部二百七十二凡十一字丌巨基切說文云下基也卑必未切賜也相付也與也䢋居意切詩也今作記巽先寸切卦名說文具也巺同上古文其巨之切辭也事也亣古文奠大見切定也薦也典丁殄切經籍也顨先困切說文巽也此易顨卦爲長女爲風者左部二百七十三凡四字左子可切助也亮也差楚冝切參差不齊也又楚佳切同上籀文工部二百七十四凡六字工古紅切官也又善其事古文巨渠吕切大也㠪古文巧口卯切巧技也好也善也式尸力切法也格也㠭部二百七十五凡二字㠭知輦切極巧視之也工多也今作展舒也先側切窒也今作塞巫部二百七十六凡五字巫武俱切神降也男爲巫女爲覡古文覡胡的切女巫稱也力容切巫巫稱也靈力丁切神靈也卜部二百七十七凡八字卜布鹿切龜曰卜蓍曰筮兆也卩古文占之塩切候也卜也又去声􅩔呼隤切外卦曰􅩔今作悔貞知京切正也内卦曰貞卦古賣切八卦也兆也市照切卜問也卟公兮切卜以問疑也兆部二百七十八凡二字兆除矯切事先見也形也􅪃同上用部二百七十九凡七字用余共切說文可施行也古文甫方禹切始也大也我也庸余恭切用也常也切也􅴻皮祕切具也今作備甯奴定切所欲也由弋州切若也爻部二百八十凡三字爻户交切易卦爻也說文交也棥扶袁切蕃也茂多也希許衣切摩也散也㸚部二百八十一凡四字㸚力爾切二爻也又力計切爽所兩切明也差也同上爾如𥿄切汝也車部二百八十二二百四十八字車尺奢古魚二切夏時奚仲造車謂車工也一云黄帝巳有車也籀文輕起盈切不重也又去政切輶以帚以周二切輕車輜側飢切輜也軺余招切小車也軿歩丁切部田切以自隱蔽之車輜車衣車軾尺弋切車前又兵車也輼於昆切輼輬車也輬力羊切卧車也軘徒昆切兵車也轛都憒追遂二切車飾也車横軨也軫之忍切車後横木俗作輯㤗入切輯和也集也輣扶萌切兵車䡴昌容切戰車軥渠拘公侯公豆三切說文軛下曲也軸除六切抒木作軸捲軸也眉隕切車伏兎下革䡬无頋切車也輿与諸切車乗也輸式朱切委也更也尽也㵼也輥古混切車轂斉等皃轐歩篤切車伏兎也䡊方逺切車耳也輒竹葉切專也軵如勇切說文反推車令有所付軹之爾切車軸小穿也車犬徒蓋徒計二切轄也輑牛隕切車軸也輻甫鞠切車輻也轘胡串切車裂人也又胡関切輨古緩切轂端鐡也凡足切直䡽縛也輮如酉切車輞也輪力均切車輪也輠胡罪胡瓦二切車榖又音禍軶於革切牛領軶也亦作軛轙魚倚切車衡轡者具榮切輪車也轅禹元切車轅也輅洛故切大車又盧各何格二切軜奴荅切内轡繫軾前者輩布妹切類也比也子丸切直轅也轑力道切車輻也軒虚言切大夫車軒又軒堂同上載子代切年也乗也又才代切範音犯法也害也軌也䡓古縣切車摇也䡾午葛切載髙皃轈仕交切兵車若巢以望敵同上轉如篆知恋二切廻也運也轢力的切車所踐也輖之由切重載也軋於點切輾也較古斈切兵車又古孝切䡈同上軔如振切碾車輪也或作杻軌居美切法也車轍也軭丘方切車尽也輟知劣切止也䡅丑倫切下棺車也輴同上軧丁礼多履二切大車後也轃側詵切大車簀也轚古詣切往也輂居玉切載也軨力丁切車闌也䡼同上軻口左切輱軻也又苦何切轗苦敢切轗軻亦作坎䡔苦礼切礙也懼玉切紡車也轊于歳切車軸頭也軎同上轒祛云切轒軟丘車也䡝於云切車後猒也轞音檻車行声也轔力陳切衆車也軝巨支切轂飾亦作䩚䡋同上輔扶禹切相也弱也輓无阮切引而行也􅭿子孔切輪􅭿也輫歩回切車箱也輈竹留切轅也籀文皮秘扶福二切軾也輰餘章切輰䡵車也䡵似醉切車節也輾猪輦切轉也軏魚厥切車轅端曲木䡇同上䡧烏古切頭中骨也􅤧古紅切車軸亦作釭輁巨㳟切軸也歩音切車也􅹊音拯軺車後登也䡕同上軬扶逺歩本二切車軬也􅱢女展切說文轢也牛向切轎也䡉口莽切䡉也䡮子龍切車跡也同上􅵬古皇切車横木也輞亡往切車輻亦作􆇖巨於切輞也輎山交切兵車也竹利切前頓曰後曰軒輊同上䡭思流切䡭䡜載䘮車轇古爻切轇轕長逺也轕古曷切上注丑教切車弓也輇市專切无福曰輇輲同上輍弋足切車枕前也轓甫袁切車箱名也􅵂九縛切車輞也公弔切車轊也輗五兮切大車輗也同上輆口亥切輆軩不平也軩徒改切上注大頰切車声也䡐大何切車疾馳仕隹切連車也又七移切同上軤火乎切車声又姓也徒郎切大車也居冡切輞也䡚亡校切引也輦力剪切輓車又車輦古文輤此見切或作倩同轍除列切車行迹也古胡切車乆也輱口咸切車声如之切䘮車名也輀同上􅪀力木切􅪀轤汲水也轆同上轆轤也轤力胡切􅪀轤也軳歩毛切戾也􅬉力乆切載柩車也同上輡音坎輡􅸫車行不平也􅸫力感切上注力公切轊也􅨴於近切車声也回切車盛皃同上轎巨召竒朝二切小車肩行軙直鄰切古文陳字軒羽俱切車也厙始夜切人姓也輚仕澗切載柩車也轏同上轠力回切漢書轤不絶䡘徒年切衆車声也􅯶倉紅切車声側耕切車声輷呼萌切車声也轟同上􅬈古禾切車盛膏器亦作息營切車也徒郎切鐵軸也口莖切車鞭也䡆余封切車行也䡥同上䡏古薨切軾中謂之䡏䡩之忍切車皃䡿魯丁切車闌也七留切輻也輭而兖切柔也軟俗文輢於綺巨義二切車輢䡫歩紅切車声軯必萌切車声輘魯鄧切軸也户犬切車弓也同上匹庚薄庚二切車声䡲仕連仕山二切車輞都鄧切車羽也百家切兵車輹房六切塋也􅕈同上䡑莫斌切車伏兎名也䡡户皆切登車也䡒徒年切衆車声軞莫𫀆切車也盧各切車轉声也同上軙吐攴切車木也口光切車也户罪切轉也䡳息移切車也䡤音余切車也似諸切軨也剔鈴切車失也轖所力切車不行也丁礼切輪也軌音范車軾前也而勇切多也􅦫柅夷切軾也力九切車駐也䡢符善切車也輐虞逺切車具也䡹陟利切車重也羊刃切車名軐音震車也輽歩本布㤓二切車也余制切曳車也匹孝切車弃也章移切車器也渠逆切轉也户格切車也側下切車裂之也居援切牽車者轥力刃切車声䡜力六切軸也鄰吉切車也魚厥切車釭也軴中戍切軴車也䡙音郎􅸽䡙軘軨也􅸽音唐上注莫卜切轅也較蒲蓋切祭神道又蒲鉢切轉皃蒲莫切車飾也􅣗力谷切車声也軗上邾切車竿也輳倉豆切輻輳也轄口外切車声也又胡瞎切車鍵也軍居云切兵衆也旅也山貟切車軸也􅼟户圭切車軸也􅞙音歴轉也軼夷秩切車相過也又徒結切䡣音渾軶軥也轂音榖車轂也䡰口耕切車堅也􅮣口盍切車也舟部二百八十三百一十字舟之由切說文船也古者共鼓貨狹刳木爲舟以濟不通象形今或从舟作月同俞弋朱切空木爲舟也又姓船市專切舟船也舽溥江切呉船名舡火江切船也肜余弓切亦雅祭也又丑林切舟行也艒音冐又音目艒䑿船名䑿思六切上注䑴渠恭切小船同上艐祖公切船著不行也又音届至也艖楚加昨多二切小船艇音挺小船艑歩殄切船小也艬仕巖切大船般歩干切大船也又楽也又此潘切運也䒀蒲故切短而深也􅯕丁計切􅯕艡戦船也艡丁浪切上注舶補格切大船􅑳力未切舟名䑬他刀切舟也䑦古侯切䑦􅑳舟名布未切大船艛力侯切舟名䑡音义䒀䑡也口計切舟也􅻽音几舷也艀父尤切小䒀也亦作桴䑴渠之切䑴艃舟名艃力之切上注舷胡田切船舷航何當切船也音濟舟也扶嚴切行舟具也艅弋諸切艅艎船名艎音皇呉舟名舸各可切船也􅿍音礼大舟也􅟊音彫舟也艨莫公切艨艟戰船也艟尺庸切上注丁命切舟行也􅦬力丁切舟行也舲同上小船屋也艚昨糟切小船艗魚狄切舟頭爲艗首將鄰切古文津字同上巨容切船也􅔓徒紅切􅔓船也思由切進也艢疾良切船傍板也舴陟格切舴艋小舟也艋莫梗切上注艆魯堂切海船甫元切舟飾也音遼船也艫力胡切在船後者䑻以周切船帷也艭所江切舽艭也五姑切船名䑯徒礼切船也䑼音鄒船也䑹蘇力切船揔名亦作艘艁徂浩切天子船曰船䑠力鳥切小船音犬舟近也七例切舟危也􅧼音籠舟名艤魚倚切整舟向岸也艣音魯所以進船者韋貴切運船也􅸄音敗蛀船也艜丁大切艇船也音獃船也􅿯直荏切天子自稱又作朕舵徒荷切正船木也居念切舟也䑲真孝切䑲船也䑤巨禁切船也同上舫府望切两船並也䒄音冨船載多也䑶七見切輕船房六切舟也音仡船行也音星船也音胃以竹乗舟也五忽切船不安也䒆色列切舟也舳音逐舳艫也扶勿切大船也音活舟行䑳音倫䑳船也䑪九合切船動皃蘇叶切舟行也吐盍切就舟也音伏舟大也同上䑢五忽切播舟也䑽音榻大船也艧烏縳切節舟也䒁音習子船也音日舟飾也音岌舟行也舠丁勞切小船也尺乆切船名艦音檻板屋舟也方部二百八十四凡四字方甫芒切法術也四方也說文併船也汸同上􅣆何唐切方舟也万俗万字十千謂之万
