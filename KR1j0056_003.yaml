body:
  text: 大廣益會玉篇卷第三凡一十三部人部二十三五百二十一字人而真切書云惟人萬物之靈孔曰天地所生惟人所貴偂則前切又音剪弔丁呌切弔死又音的至也儂奴切吳人自稱我僮徒東切幼迷荒者詩狂僮之狂也廣雅云癡也今為童㑗式神切妊身也儅丁盎切伄儅又丁堂切伄丁呌切伄儅不常也仁而真切鄭玄曰愛人以及物也説文仁親也古文作儒如俱切柔也候胡遘切伺望周禮有候人傑竒哲切英俊又特立傂息移切傂祁地名亦作虒又他爾切直離切傂參差也仜胡東切大腹也仳方止切别也又防脂切侘都稼切丑家切侘傺傺敕厲子例二切侘傺失志貌楚辝云純欎邑余侘傑兮佳革崖切善也仲直衆切詩仲氏任只中也僴下扳切寬大又音簡俟牀史切詩􅟡􅟡俟俟獸趨行貌又候也又音祈虜復姓万俟氏俜普丁切使也倩此見切巧清七性切假倩偰相裂切人名亦作契儠理攝切長壯貌傍蒲當切近也俅渠鳩切詩載辨俅俅恭愼貌賅胡改姑來二切竒賅非常伀容切佂伀懼也佂之成切上同侶力莒切伴侶也㑨牛矩切太也詩碩人㑨㑨容貌大也份彼陳切文質備也亦作彬儇呼緣切利也又慧也玄胡田切佷也同上仕助理切説文學也語學而優則仕僚旅條切官也同官曰僚保補道切安也養也説文保字古文保亦作呆儼宜檢切矜莊貌詩碩大且儼佖皮筆切頻必切威儀也俊子峻切才過千人也俊同上俗作雋偆尺尹切冨也傲五到切書毋嚚象傲慢不友也僷與攝切攝乘不舒展貌偞字書僷字僖虛其切樂也儉渠儼切約也仡語訖切勇壯貌書仡仡勇夫儦被梟切詩未儦儦盛貌健渠建切自強不息偭綿偏切面背也億於力切安也俶尺竹切厚也始也書今終有俶伴蒲滿切侣也又蒲旦切詩無然伴猶跋扈也殉辭俊切疾也字書殉字儐卑刃切出接賔曰儐説文云導也侹他頂切正直貌説文長貌一曰著地一曰代也俺於劒切大也僗力告切伴僗也供居切祭也設也具也又居用切傭恥恭切均也直也詩昊天不傭又音賃也僁桑截切小聲也字書同上偫直理切待也亦與同儲也具也任耳斟切説文保也尓雅佞也又汝切委任也僟居希切精詳也俱矩俞切皆也侙恥力切惕也國語於其心侙然息紫切小貌詩彼有屋本亦作佌音此儕仕皆切類也侔莫侯切齊等也倫力遵切輩也一曰道也書無相奪倫侗吐公敕動二切語曰侗而不願謂未成器之人企去智切舉踵也古文企侐許域切淸淨也詩閟宫有侐或作侐侎武俾切禮小祝掌侎災兵安也本作彌注作敉儧子管切最也俌方輔切輔也俠胡頰切任俠以權力俠輔人也侲之仁之仞二切僮子也方言云燕齊間謂養馬曰侲佮公答切合取也仍如陵切就也時注切説文作伹立也今作樹伽求迦切伽藍也又後漢書云伽倍國在車西侍時至切承也傾口營切側也假居馬切借也又非真也又音格至也仭如震切孔安國曰八尺曰仞鄭玄曰七尺為仞側莊色切傍也侒鳥蘭切宴也代逹賚切更也書天工人其代之便婢仙切爾雅便便辨也書傳便辟足恭也又毗線切仰魚掌切向上也侳子過切安也倌古宦古丸二切小臣也詩命彼倌人僬子矅切曲禮庶人僬僬鄭玄曰行容止貌又昨焦切稱齒繩切與稱同微武非切賤也伸舒鄰切舒也易尺蠖之屈以求伸也儺奴何奴可二切行有節也僝士簡切見也又具也俆詞余切緩也􅥚丈吏切會物也倕是切重也黃帝時巧又人名同上僓他罪切長好貌又胡對切俚良子切賴也聊也伿弋豉切也蘇刀切驕也伊於脂切尓雅伊維也注發話詞古文佶其吉切正也詩既佶且間倬知角切明也大也偽魚貴切詐也仵奚古切偶敵也倓徒甘切靜也恬也説文云安也同上倭於為切順貌烏禾切國名儲直於切偫也儲副也余招切役也徭同上倞渠向渠命二切強也傹同上警羈影切戒也書浲水警豫備皮袐切預也備同上俗古文仿方往切仿佛相似也㑂籕文僾乙賚切唈也詩亦孔之僾偓於嶽切偓促拘之貌侮亡甫切慢也侮古文侮儽力罪切垂貌力追切病也傫同上佛孚勿切仿佛又音勿音弼佺且泉切偓佺仙人㑵秦栗切賊也易以豉切輕也價居薤切善也詩價人維藩價同上偕居骸切俱也詩與子偕老㒤尺涉切心服也畏也仆方遇切傾倒貌仸乙小切旭也符歷切古文辟字同上併補郢必姓二切羅列也仢扶握切流星亦音狄儡力回切相敗也像似兩切象也都田切殞也仆也倒也傎同上傅方務切太傅相夫子也依於祈切助也倚也倚於擬切依倚也紹時昭切紹穆也侃口旱口汗二切樂也強直也侃同上侁所臻切行聲又征夫也佴如志切二也佽也儀語竒切度也丁退切也佚余一切豫也書無教佚欲有邦儃逹安逹亶二切疾也何也作子各切起也造也儥余祝切買也伋居及切子思名近列切武貌詩伯兮兮又其例切句付方務切書皇天既付與也侵千金切漸進也傷也償市亮切報也㑮五昆切姓也傓舒繕切熾也詩艷妻傓方處佸古闊切詩曷其有佸會也瞿龜切左右視也傆牛萬切點也僤大旦切疾也倍步乃切易近市利三倍謂一而兩之也俔苦見切罄也詩俔夫之妹什時立切什物又篇什伉去浪切敵也僑渠消切髙也偏匹研切鄙也不平也書無偏無黨俗似足切習安也風俗也優郁牛切倡也俳也儷吕謂切偶也儷字書同上伎之豉切與也詩鞠人伎忒又梁紀切仔則之切詩佛時仔肩克也媵余證切送也與媵同偩扶九切像也偎烏回切愛也僄匹妙切輕也又僄輕迅也俾必弭切使也書有能俾又使所里切令也又去聲倅倉憒切副也價古訝切價數也傞思何七何二切舞不止貌詩屢舞傞傞僭子念切擬也書大命不僭來丁切使也弄也俯弗武切下首也僨甫運切僵也僵舉良切僨也莊子惟而僵之㒄式善如善二切意急懼也傳儲專儲戀二切授也偋步定切僻也倇於阮切勸也偃乙蹇切仆也語草上之風必偃儔直流切侣也大到切蔽也伹七閭祥閭二切拙也倰力僧切長也佐子賀切助也俘方符切軍所獲也在傳以為俘馘俴才見切淺也詩小戎俴收偄而臠乃亂二切弱也倮力果切赤躰也僂力矩切尪也傴郁禹切僂也左傳再命而傴倀敕良切失道貌又狂也傿於建切引為價也偟胡光切暇也竒龜切使也倠許維切倠南子嫫母仳倠醜靣也佃同年同見二切作田也呼肱切恨也迷惛也擬御理切僣也古載切假主也佾余質切列也語八佾舞于庭僻匹亦切邪也詩民之多僻侊公黃公橫二切大也僸牛錦切仰頭貌侱他井切侄也渠往切遑遽貌楚辝利而南征兮伍吳魯切行伍説文相參伍倜他激切倜儻窮變也佟太冬切姓也各唐切古岡字侑禹救切勸也周禮曰土以樂侑食倪魚雞吾禮二切自然之分也莊子和之以天倪傛與蛬切左傳再命而傴又音勇不安也佝公亘切楚辝直佝愗以自苦亦作怐佻敕聊切偷也詩視民不佻侈昌是式是二切泰也􅫋力庖切盛也僐時演切作姿也倡齒羊切樂也又音唱禮一倡而三歎傷舒掦切創也尓雅憂思也佁丑利夷在二切癡貌魚肓切急也丑咸切癡也俳皮皆切雜戲也漢書談笑類俳倡俑于種切偶人他紅切痛也伾匹眉切有力又衆也思育切古文夙同上儳仕咸切説文儳互不齊也又士鑒切伏扶腹切匿也易坎為隱伏􅵍其虐切僥􅵍受屈也傱先鞏切走貌偡丈減切齊整貌僛丘其切醉舞貌詩屢僛僛仇渠牛切怨也書万姓仇豫俄我多切俄傾須臾也仗直亮切器仗也伈悉枕切恐貌傃桑故切向也孔子曰傃隱行怪僇力救居幼二切癡行貌俙呼旨切解也訟也俹烏訝切俹倚也僦子祐切賃也侀音刑記侀者成也成不可變僔子損切聚也詩僔沓背倄下交切刺也又痛聲低丁泥切垂也同上俗儻他㓪切惆儻不羈又他浪切幸也倦渠眷切厭也説文罷也係何計切繼也又音計俰和卧切和也佊陂髮切邪也偛楚洽切偛􅰊小人一曰偛鬼黠也傪七感切好貌又倉含切促且足切速也迫也佫下各切姓也渠往切載器也襯千刃切至也初吝切裏也或作寴何胡可切克負乎哥切辝也催且回切迫也相搗也佑于究切助也仠何旦切衛也徒感切止也詩髡彼兩髦或作值除利切持也詩值其鷺羽伐扶厥切征伐又矜伐僯力軫切慙恥也嚳苦篤切暴也僜都鄧徒亘二切倰僜不著事也僆里剪力見二切畜雙産也咱公勞渠久二切毀也甫劫切古文去遐雅切古文夏㒈許鑑切逞貌又覱㒈髙危貌蒞力致切臨也詩方叔在止托恥各切寄也亦作託偵恥慶切候也女孝切與閙同偙都計切偙俊儶下桂切偙俊佇除吕切久也詩佇立以泣傮子牢祀牛二切終也但逹亶切語辝偯於豈切哭餘聲仱渠廉切古樂名侇與脂切夷也傖仕衡切吳謂中國人為愴偶吾苟切合也桐人也㑦力計切怒也儈古會切合市也力刀切犬也許驕切傲也借子夜切假也又子亦切仙司連切長生仙去也説文仙字仙聲類云今仙佉去茄切神名㑼力却切神名倯蘇容切謂之倯轉語也佼古爻切交也又音絞倧租宗切仙人侾天交切大貌奴回切偃也息維切偏也僢尺兖切相背也與舛同佩蒲對切大帶佩也僧悉層切師僧也傇而勇切衆也初講切衆齊也傟於項切戾也儢力莒切儢拒心不欲為也僎土卷切具也又音遵筆委切停也㑎奴搗切姓也傊于藴切優也乃里切爾也傀古回切周禮大傀災注猶怪也聲類傀字傒戶禮切待也同上本亦作徯佲彌頂切佲好也同上㒅口禮切開衣領也儋丁談切任他何也㒜羊煮切謹也儛亡甫切摱也佌七𥿄切小舞貌密彼切無麻也倒丁老切仆也書前徒倒戈他吐何切誰也亦作他他逹何切負何也㑯思主切姓也似祥里切像也似同上阡七堅切千人之長曰阡儴尓羊先羊二切因也估居午切估價也倣甫罔切倣學也僥居曉切僥行也㑋去仲切小貌俸補孔切小貌房用切俸祿逼鄙力切迫也與逼同例力丗切類例也信私進切古文信倳側吏切置也㑶許氣切怒㑶也㑜夷丗切亦作䇩合板際佪胡雷切佪佪昏貌胄直宥切胄系也僅巨鎮切才能也余證切鈍也傼呼肝切姓也態他代切意恣與態同儓逹該切左傳僕臣儓儾奴浪切寬儾也胡貫切臣也儙去戰切開也拗乙孝切很拗也僒求敏口窘二切肩傴貌􅚁扶形孚劒二切輕也傔去念切侍從也偌人夜切姓也子何切促也㑍力對切亜也仛丑訝切嬌逸又湯洛切􅮜渠凶切􅮜倯罵也徒混切仙遁也伳私列切伳侈也􅱗火困切老忘也媌莫教切好貌五兮切㑮佯不知貌伆武粉武弗二切離也效胡教切學效也常𥙿切神也傕苦角切姓也仴五切地名僰平勒切屏之逺方曰僰㒓他逹切逃也叛也俗渠戟切倦也㒂張略切姓也風木切未復也知力切古文陟僙胡光切作力貌與趪同侼蒲沒切侼強也佷也㒊師立切不及也俉五顧切迎也俒胡昆切完也仚許延切輕舉貌儜女耕切困也弱也俯無辨切低頭亦作俯偤以周切侍也件其輦切分也儑五甘切不慧也俵彼廟切散也儯徒登切倰儯長貌仂六翼切勒也又音勒丈切惡也儚莫登切迷昏貌倔巨物切倔強咎其久切災也佒於良於郎二切躰不伸叟思口切老也與叟同説文叟㑉音夙傗㑉不伸蕩他莽切直也攀俗攀字個加賀切遍也俗呼為個渠營切持也古煢字倗匹肯切不也又步崩切輔也仯彌小切仯小貌又初教切僀丁計切俊也與偙同偷吐侯切盜也苟且也以余止切用也又為也古作以苦瓜切奢也又安賀切痛呼位于偽切列中庭左右住雉具徴具二切立也佹九委切戾也春秋云晉㑦佹諸僿蘇代式志二切史記小人以僿俾畢吉切止行也本作蹕蹕侻他活切可也輕也㒠下介切俠也楚辝何文肆而質傉奴篤切虜三字姓有庫傉官氏廝息移切賤役也與厮同佯余章似羊二切詳也傋公項切傋􅷗不媚也􅷗母項切傋􅷗佄胡甘切佄酒與酣同儰于詭切儰仡不安也侄之栗切牢也堅也占丁兼切占侸輕薄也侸丁候切占侸幸胡耿切徼幸亦作幸􆂊博堅步堅二切足不正徑午耕牛燕二切急也罵莫亞切齊大夫名僥魚雕切僬僥國名侏諸儒切侏儒短人也㒥孚公切偓僼仙人也仉之養切梁四公子姓􅰊壯救休救二切任身也偳都官他官二切人名佬力雕切侾佬也大貌㒕烏江切㒕降不伏也僪渠出切狂也亦作獝傝他盍切傝􅼾惡也􅼾先盍切傝􅼾不謹貌倛欺忌切倛擬不行􅼽居偃切偃􅼽不伏也倥口貢切倥偬窮困也偬子貢切倥偬㒔時束切㒔㑛動頭貌㑛舒緑切㒔㑛􅿠魚俺切􅿠癡也倱戶本切倱伅四凶名伅徒損切倱伅僕薄沃切僮僕給事者傈力質切廟主本作栗佷户懇切戾也本作很㑻莫刮切㑻傄健也傄呼八切㑻傄傶宗祿切邑名亦姓偉于鬼切大也竒也蒲幸切直也俱也摩葛切佅㒓事濟俖匹亥切不肯誑妄也偲七才切詩其人美且偲才㑛都聾切劣貌亦姓儸力柯切儸健而不德也之車切儸倘地朗切倘然出莊子僝仕山切僝僽惡罵也僽仕救切僝僽僋他紺切貪老無冝適也俕先紺切僋俕佽且利切利也詩次既佽儱力用切儱僮行不止偅章用切上同偠於了切偠㒟細腰也㒟乃了切偠㒟舞貌伯傳陌切長也佰莫白切相干佰也伻普萌切使人也急也傰音朋音倍姓也亦作倗􅲩同上又都何切倢才獵切樂事又音接妤與居切倢妤婦官侜張牛切張狂也兒部二十四凡十字兒而真切仁人也孔子曰人在下故詰屈説文古文竒字人也象形兒如支切孺子也兀五忽切髙而上平也允惟蠢切當也又信也兊徒外切説也又卦名兌説文兊充齒戎切行也蒲也䆓俞轉切州名亮力尚切㓪也信也免靡蹇切去也止也脫也父部二十五凡五字父扶甫切説文父雉也家長率教者也爹屠可切父也又陟斜切爺以遮切俗為父爺也爸蒲可切父也㸙之邪切父稱臣部二十六凡四字臣時人切白虎通臣者繵也屬志目堅固也説文曰牽也事君也廣雅堅也孔子曰仕於公曰臣臦居況切乖也臧則郎切善也籕文臧男部二十七凡四字男奴含切説文云丈夫也字從田力言男力於田也夏書二百里男邦孔子曰男任也任王者事周禮五百里男服禮記王者制祿爵子男五十里巨九切母之兄弟也一作舅甥所庚切姊妹之子也嬲奴曉切戲相擾民部二十八凡二字民彌申切説文衆氓也書后非民罔使氓莫耕切民之詩氓之蚩蚩夫部二十九凡四字夫甫俱切説文丈夫又夫三為屋一家田為一夫也又音扶語助㚘蒲旱切並行也規居支切正圜之器丗本倕作規矩準繩替吐麗切廢也書弗敢替上帝命豫部三十凡三字豫以諸切我也又音與説文推豫前人也胡慢切相詐惑也今作舒式諸切敘也也舒緩也我部三十一凡四字我五可切施身自謂也古文我義魚竒切巳之威儀也又冝寄切仁義也羛墨翟書義字從弗身部三十二二十七字身式神切躬也軀去迂切躰也􅥟同上俗軁力句切屈巳也止移切四躰亦作肢肢只兒切上同耽丁含切俗耽也匹政切俗聘字躬居戎切身也躬同上䠸丘華切䠸以躰柔人也薄彌切上同聵五拜切人名躲丁果切躲身也躰他禮切俗體字體同上躴力當切躿身長貌躿口岡切上同躽於建切怒腹也䡀之善切形也職之力切俗職字􅡭他甘切俗聃字裸力果切赤躰亦作祼䠽下哀切䠽躰長貌力登切身也蒲未切行急也躸居冝切身單貌兄部三十三凡三字兄詡榮切昆也爾雅男子先生者兢兾徴切兢兢戒愼也同上見説文弟部三十四凡五字弟大禮切爾雅男子後生為弟又大例切説文韋東之次第古文第大例切今為第幾也次第罤古昏切説文周人謂兄自罤今作昆同晜同上女部三十五凡四百十八字女尼與切男女也説文婦人也又尼慮切以女妻人曰女姓思正切姓氏姞渠乙切后稷元后姞氏姚俞招切舜姓也媯矩為切水名書云釐降二女于媯亦姓薑居羊切炎帝居薑水以為姓也好呼道切美也呼導切愛也妞呼道切姓也亦作􅤋嬴余征切姓也媞徒奚切安詳也説文承旨切諦也一曰妍黠江淮間謂母曰媞娸去疑切姓也一云醜也婉於逺切婉媚也順也妴同上妭蒲括切天子射擊也説文美婦文字指曰女妭秃無髮娙胡丁五耕二切身長好貌姌如斂切姌嫋長貌嫋奴了如酌二切上同嫇亡丁切小人貌又亡鼎切嫇奵自持也奵丁切嫇奵嫣許乾於建二切長美貌媱余針切喜也私逸也姽牛委切間躰行貌嬛巨營切詩嬛嬛在家道未成也亦孤特􅑱同上㚲尺涉切輕薄又多技藝婆蒲何切婆娑又婆母娑桑多切婆娑舞貌媻蒲寒切媻也往來也説文薄波切奢也孅思廉切細也𡛖乃果五果二切委貌也婐烏果切婐𡛖口賣切難也姕且資子貌二切婦人小物詩屢舞姕姕妌音靜靜也姡胡括戶刮二切多詐也委於詭切屬也又委曲㜘子庶切嬌貌􅙵莫胡切􅙵母鄙醜也亦作嫫娧它外切好貌嬥徒了徒聊二切往來貌妗許兼切􅨺妗美笑貌􅨺丑廉切􅨺妗媵以證實證二切送女從嫁也亦作􅯔作旦切好容貌嫢瞿癸娶惟二切盛也腰䶒阻皆切子奚切也佞奴定切口林也㜷莫奚莫移二切齊人呼母也亦作􅭊姛徒孔切項直貌娭虛基切戲也又婦人賤稱嫡丁歷切女謹又正也妄武况切􅲲也娀息弓切有娀氏女簡狄為帝嚳次妃生契姂房法切婦人貌娓亡利眉鄙二切美又音尾姰息勻切狂也又音縣婞胡頂切很也㜌奴斗切妳異名又古候切取乳也嫙徐緣切好貌媕烏斂切女有心貌又音諳妓其綺切婦人小物也嫸之善切伎也姐兹也切蜀人呼母又祥預切姐也婺亡遇切婦人貌嫥之緣切専一也可愛之貌嬰一盈切頸女曰嬰娺陟切怒也姑古胡切夫母也又父之姊妹又且也魚俱切樂也如仁舒切而也往也若也妝阻良切女字又也妍吾堅切好也嬿於典於見二切女字詩嬿婉之求或作􅈺胡間切􅈺雅也嫧初革二切婩嫧鮮好媟思列切嫚也嬻也同上婧才性疾井子盈三切竦立貌媐吁基切善也娕楚角切謹也又音賴好貌同上娃烏佳切美貌失冉切不媚也前郤二然也娖側角切辨也嬐桑廉牛檢二切敏疾也􅧈之利之立二切至也妜於決切憂妬也嬙在梁切嬪嬙婦官又音色女字也㛥他台切俯伏也嫴公奴切苟且也保任也妎胡計切妒也又音害同上娩無逺亡辨二切婉娩也媚好也妟烏澗切女言也𡛝青旦切三女為又美貌同上見説文㜇縈利切不恱也姘普耕普經二切漢律齊人與妻婢姦曰妌嬗時戰切緩也娽力谷切顓頊妻又隨從也嬖補悌切賤而獲幸者嫼莫勒切奴也姅匹半切博慢切婦人又傷孕姷于救切偶也􅸸力㳘切順也孌力轉切慕也亦同上于厥切輕也姬居之切黃帝居姬水以為姓又弋之切媛為眷切美女也嫉慈栗切妬嫉也妒丹故切妒爭色也妬同上媪烏老切女老稱又烏骨切媪妠小肥匹徑切娶也婼丑略切不從又音兒婼媢莫報切夫妬婦也㛗子戈切主也妻千兮切説文婦與巳齊者也古文孈右爾尤卦二切愚多態媦云貴切楚人呼妹也婎呼維切醜也姺色臻切姓也春秋傳曰啇有姺妚􅺊卑益切母也婱胡連切所望也説文有守嫪力髙力報二切婟也媥匹連切輕也嫷湯卧徒果二切南楚謂好曰嫷媠同上㛍丘叶切得志呼叶切少氣婟胡故切嫪也戀也嬬如殳切下妻也嫽力弔切女字也青徐稱好曰嫽􅸧所交切姊也嫖匹招匹妙二切輕嫖也嫭胡故切好貌或作嫮媅都含切樂也妉同上妖乙嬌切媚也􅯾同上婄妨走蒲回二切婦人貌妨孚方孚放二切害也孎如玉切女謹貌嬯大來切鈍劣也娎許列切喜也先千切誹也嬈奴了切苛也擾戲弄也偷他侯切巧點又偷薄而切媞也媣同上見説文㛪於劒切婢也姤古候切遇也許委切惡也一曰人貌娋所效切小娋侵也嬪毗民切妃嬪也古文㜮力暫切過差也嬇胡內切女字婓方肥切往來貌又大醜也㛆當果切量也揣也知密切短靣貌䆯丁滑切短靣也嬌居搖切嬌姿也嫘力追切嫘祖也嫯五髙五到二切侮慢也嫌胡謙切不平於心也㜤式祍切貪頑也懶力但切惰也方木切昌意妻妙彌照切神妙也妯直六切妯娌敕流切擾也娌良士切妯娌嬋市然切嬋媛也姢於緣切嬋姢妦孚切容好貌妦同上烏廉五感魚檢三切含怒婀烏何切媕婀也嬼力受切姣也媉乙角切好也婘具貟切好貌孉同上妥湯果湯回二切女字又坐嫳匹蔑切易使怒也嬚力兼切清美也媷如欲切懈惰也嬉許依切樂也㛁匹耕切急也婩魚踐切好也午漢切齊也媁於歸切姿也美也婸他㓪切戲婸也胡減切健也充之切侮也婍丘倚切好也娵子俞切少也又娵訾辰名初洽切疾言失次也㛃公節切清也嬆許急切莊嚴也莫江切女神名婽古雅切好也㜗倉含切婪㜗也又七感切婪力男切貪也㜳胡乖切和也妧五館切好也娨下鴈切嫯娨也姴力薛切美也妠奴紺切取也奴答切聚物婁力侯切空也婁務也婁同上出説文古文婁姆音茂女師也娒同上又音畝娘女良切母也又如常切娘女良切少女之號媽莫補切母也於月切肥貌姦公安切亂也奻女間切訟也娝布美切姓也匹才切不肖嫩如切好貌又嫩同姥莫古切老母也娾吾駭切喜樂姦古顔切姦邪也姧同上㛒丁候切㛒譳話誽亦作䛠妹莫葛切妹喜桀妻也直牙切美也娻德紅切國名㛻口蛙切女也婷徒寧切和色娣徒厲切娣姒幼婦曰娣姒徐里切長婦曰姒也姱苦瓜切姱奢貌媈牛昆切女媈也嬁得稜切美女兒妔苦庚切美女惱奴道切有所恨痛亦作孀所莊切弧孀寡婦也㜨女皆切㜨女也博盲切謹也息遊切女名媃如舟切女名娗徒鼎逹丁二切女出病也壻思計切夫壻亦作壻㚴普布切美女媋式勻切女美㜞殂含切女㜞也妚方酉切好貌婠一丸切躰德好也娷竹恚女恚二切飢聲嫐奴好切嬈嫐也孍魚檢切好女貌㛚他重切㛚齊貌妸一何切女字音久女字亦作甫普來二切好貌而煮切魚敗也婇七宰切婇女也㜗七感切好貌同上姨余脂切妻之妹云嬜火含切貪嬜又音歆䧪充陟切女子態㛧毋敢切鄉名嫂蘇老切兄之妻嫂同上俗又作嫂婢步弭切女之卑者愧居位切慙也亦作愧㛦郎感切好貌他同上古亦作姫章引切愼也嫤居隱切好貌嫿呼麥乎麥二切靜好女刮切小兒肥也胡告切女名娍食政切長好貌婭於訝切姻婭也孌力切從也嬭乃弟切母也女蟹切乳也嬭同上必媚切女名也女丗切姥也􅳈疾恣切妬􅳈也姲於鴈切女字嫗烏遇切老嫗母也妃方菲切匹也又音配嫎補曠切妨嫎也㜣奴見切姓也姩奴見切美女也同上姣戶交切也又音狡妖媚婥齒約切婥約好貌舒赤切女也若危切知異也嬣女耕切妌嬣也姿子思切姿態也娥五何切堯女舜妻娥皇也姮胡登切姮娥也媸天之切媱也嫞巿切懶女婺力之切寡婦䎟之切媚也妋方無切貪貌於牛切恨貌娼齒羊切㛫也媱也􆁘於緣切美女姣古巧切古文姣姺色臻切有姺國嫀同上妿古何切女師也又於何切嫜之羊切夫父母也妐之容切大之兄婋火交切女心俊㛺於甘切女不淨古華切女名媌莫飽切好貌又力首切胚普梅切孕也與胚同昌逸切女不謹子列切好也姶於急切婦貌妑柏麻切女名妾七接切接也得接於君者何古切􅳻貪也女立切婦貌妰張略切婦貌嬄於吉切嬄也息節切小貌媊子移昨于二切女媊星名㜯許冝切婦人之稱媚明祕切嫵媚也㛄於希切女字姝尺朱切好也􅩱同上見説文姎烏浪一郎二切女自稱我㛹蒲綿切㛹姢美女貌嬃相俞切女字匹計切妃也嬻徒卜切媟也㜎音奚女隸也嫈烏莖依郎二切小心態匹遙切漢公主名媧古娃切女媧氏籕文媓胡光切母也婜口間切美也娡之侍切鯀娶有莘女曰娡孋力移切孋姬亦作驪婚呼昆切婦家亦作婚籕文音鴛􅾴婏美也嬹許應切恱也於叶切好也又一鹽切媖於京切女人美稱嫄愚袁切薑嫄嚳元妃孁郎丁切女也婤職流切女字姶烏合切女字媒音梅謀也謀台二姓白民切顰眉本作顰媌莫交切好也媨羊久切醜也妣必爾切田為妣籕文始式子切女之初也㛎力與切婦人醜貌同上嬳一縛于故二切奴乃都切奴婢也㚢同上嫁古訝切女適人曰嫁嫵亡甫切美女又媚也嫵同上娠失人之刃二切妊娠也妊汝鴆切懷孕也婀於可切婀娜美貌亦作妸奴可切上同妵他口切女字姻音因壻家女之所因曰姻姻籀文娞乃罪切㛱娞又古文綏字㛱烏罪切㛱娞好貌女省所省切減也妘王分切姓也祝融之後籀文仕切女子先生者妹莫背切女子後生者婦符九切服也姼是支切姼母也又音侈同上妁之若切媒妁又音杓薄切㛶無冝適㛶他旦切上同㜅丑切媚也又許六切㚤音翼婦官奼恥下竹亞二切美女也又音妬姹同上又河上姹女水銀也嬒烏會切女黑色威於韋切威儀也説文云姓也㛅仍吏切女字婻奴紺切美貌又小肥也㜰以灼切美貌又音嫚莫晏切侮也姪徒結切又音怢昆弟子之稱㜼同上婏孚萬切産婏又兔子嬎同上生子齊均也亦同上姪弋質切淫姪也又與姪同嬩以諸切女字妲多辣切姮妀紂妃妀音紀妲妀説文女字媾居候切重婚也媰仕于切又仄鳩切婦人妊身也娶七諭切取婦也嫕一奚切人始生曰嫕婗婗五弓切上同媺音美禮媺周室婕即葉切説文云婕妤婦官也妤以諸切婕妤孂居矣居幼二切竦身大廣益會玉篇卷第三
