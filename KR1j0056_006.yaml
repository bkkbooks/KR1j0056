body:
  text: 大廣益會玉篇卷第六凡十部手部六十六六百四十五字手舒酉切説文拳也手足也古文七咨切拿也掌諸飬切手中也語指其掌掔於換切掌後節中也捥同上同上搴居輦切取也􅠡同上兩手取也㨻山湛切㠼取才甘切暫也􅪴充丗切牽也引縱也摰同上掣同上又昌列切拳渠貟切屈手也㧬居勇切擁也舉居與切對舉也今作舉摯諸二切持也至也挈苦結切提挈也拏尼牙切手拏也撇普切擊也撇同上搬步波步丹二切手不正也擪烏叶切指按亦作㧘疾寄切積也攣力全切攣綴也摩莫羅切硑也攠同上摹莫奴切規摹亦作模􅓲郤間切去賢切固也研魚賢切摩也擘補革切擘裂也攀普姦切援引也扳同上文布間切攘仁尚切揖也汝羊切竊也於勇切抱也亦作擁同上擁古文呼為切指也拿女豬切持也按於旦切止也詩以按徂旅擊經歷切打也扣也揧力葛切研破也許委切壞也子羊切扶也今作將同上控枯洞切引也詩控于大邦􅠎口弔切旁擊曰􅠎拲居勇切恭也居竦切與廾同攬力甘力敢二切手攬取也攬同上捋力活切取也詩薄言捋之摮五爻五髙二切擊貌胡搳切手也指諸視切手指擒渠林切急持衣襟行也擒同上撩力條切手取物又撩理擎渠京切持髙也撑也摳苦溝切挈衣捃居運切拾也擲雉戟切投也棄也擲同上掩衣撿切取也一曰覆也承署陵切奉也受也攓起焉切縮也拱居冡切執也搚吕闔虛業二切摺也拹同上掩於斂切斂也水上曰掩揱色角切相邀切長臂拇莫口切手指拇搏補洛切手擊也攪古巧也擾也亂也捁同上拮居鐡切手口共有所作揖伊入切手著胸曰揖摛恥離切舒也插初治切刺入也摎力周居由二切絞也上同扺子尓子米從氏三切捽也攐丘連切樞衣攐裳也抔步侯切手掬物授時􅋼切付也撻它逹切答也書撻以記之古文搣民烈切摩也莊揃搣拔除撎姻利切拜舉手下手攩他朗切捶打也挋之刃切抑也抨普耕切補耕切撣也拼同上丁計切兩指急持人撿良冉切拱也收也挏逹孔切動也招諸遙切招要也捭補買切兩手擊也擺同上揣初委丁果二切度也捾於活切搯捾也拱也搯他勞切搯捾也接子葉切交也揔子孔切將領也合也捴俗扶防無切持也府俞切側手推出唯它雷二切排也持直之切握也拑渠廉切脅持也抁弋選弋賢一切動也搖也同上操七刀切把持也又倉到切捘子寸子對二切擠也攫九縛切摶也抪卜路切相持也擴古莫切引張之意擴同上擩而專而誰而主三切染也據居豫切依也持也攝書涉切引持也抿亡巾切撫也攕所咸切好手貌詩攕攕好手㨷居焮切清也拭也抩人詹乃含二切併持捫莫昆切持也撣徒安切觸也掇劣都括二切拾也詩薄言掇之捉側角切扼也握也挾戶頰切懷也持也擸吕盍切擇持也提徒兮切挈也拾時立切掇也詩決拾既􆃲拾所以引弦也擢逹卓切引也技舉也攬力甘力敢二切持也握於角切扼特也竹涉切拈也挑他堯切撥也又徒了切挑戰也搗丁道切手推也築也攜戶圭切二也持也把百馬切握也拈乃廉切指取也揭起計起竭渠列三切詩淺則揭謂揭衣也掊蒲溝切把也易君子以掊名益寡掊猶減也亦作裒搖於招切動也搈與種切動搈也攑丘言切力舉也揚與章切舉也摽匹呌孚堯怖交三切摽擊也又符少切落也攈居運切拾也捎所交切除也揆渠癸切度也擬魚理切度也摟力殊切詩弗曳弗摟摟亦曳也本亦作婁又落侯切損孫本切減少也失舒逸切縱逸也挹於入切􅝥也擾如紹切攪亂也披敷羈切開也又彼寄切禮大喪士執披持捾者也又匹美切挺逹鼎切拔也探它含切取也拚皮變切拊手也抃同上掖余石切扶持又臂下小掖門以手持人臂者也撋如專切摧物也掎居蟻切偏引也揮詡歸切動也因於身切就也簎初格疾奕二切禮鱉人掌以時籍魚鱉注謂以杖刺泥中搏取之撼胡感切搖也扞何旦切衛也捍同上搹於責切盈手也又音隔同上抑也塞也抽丑由切引也抽同上同上排薄階切推排摧在回切挫也折也取也直異切當也亦作值抵多禮切擠也扔人蒸切因也括古奪切閉也捇呼號切裂也擠子詣子稽二切排也陷也抎于粉切有所失也技渠綺切藝技也摍所六切蹴引也拙之説切不巧也㧺逹答切韋韜也撮子活七活二切三指取也摘多革切拓果樹實摶徒桓切圜也㨡侯本切手推也救居于切虆也揟相如切取水具掘渠勿其月二切發也開也投徒侯切托也進也挃竹栗切穫禾聲㨖知利切挃也抈午厥切折也挫祖過切摧也扤虞厥切午骨切動也摜古患切習也帶也摷側交切擊也抶丑栗切擊也㨐布垢切擊也榷苦角切敲擊捲渠貟切揭也氣勢也挻丑連式連二切長也掬居六切撮也同上同上挨乙駭切推也抰於掌切以車鞅擊也揫子由切聚也束也摼苦耕切撞也摬乙慶切傷擊也捕蒲布切逐也拫胡根切挽也扺之是切側擊也抵掌也捀扶容扶用二切奉也扚丁激切引也撚乃殄切蹂也拖托何切曳也拖同上俗扜於娛口孤二切持也麾也拯音蒸之上聲救助也撜同上拯同上氶聲類云拚字挂古賣切懸也劈脾益切拊心也亦作辟扛古厖切橫關對舉攎力胡切張也捽存兀切擊也揾烏困切設也捐余專切棄也撤直列切剝也警也治也扮方吻切握也動也掍胡本切同也挍古效切執也拭書翌切清淨也搢子信切插也掫側九子侯二切夜設火備托之石切取也拾也拓同上又他各切摝力榖切振也挴莫改切貪也摫居垂切裁也掠力酌力尚二切劫取財物􅠜亦問切掃除亦作拚擅視戰切自專也㧙扶畢切推擊也㧾苦忽切推擊也摙力剪切運也撏徐林切取也又視占切擐胡慢公患二切貫也搪逹郎切搪揬也摏舒庸切衝也摋蘇割切側手擊攖伊成切結也攤奴旦切按也它丹切開也援禺璠切又音援引也掜吾禮切撫也扒鄙殺切擘也挬蒲骨切拔也掐口洽切瓜按也捌補别切物不捌又音八撝呼皮切裂也又手指挰直丁切舉也㩋所育切繫也攇虛偃切疑也揎先全切引也扢何礙何代二切摩也取也扐陵得切揲蓍歸竒也捻乃叶切指捻也於旅切擊也揈呼宏切擊聲㧦呼縣切擊也押古狎切檢也烏甲切署也搰胡沒切掘也亦作掘抇胡沒切穿也拋普交切擲也㧴吾可切差也抮火典切引戾也扭竹有切按也又音紐手縛捶諸蘂切以杖擊也􅊧色流切數也聚也求也徑疾也搜同上古文抾丘之丘居二切兩手挹也拂撫勿切去出掠也搙女角切揾也抐乃兀切揾抐也抒神旅切挹也又大圭抒上終葵首㩧蒲角切擊也又匹角切撲普鹿切打也又音雹掩於感切藏也摖千計切排取也溉許氣切詩傾筐溉之亦作墍古代切條也摐七凶楚江二切撞也抗可浪切舉也扞也口淮切摩拭也㧡胡改切撼動也揥救細切詩象之揥也所以摘髮又都悌切抴余丗切數也又羊列切拽同上拖也口居切擊也揊普力切擊也撙祖本切曲禮君子恭敬撙節撙猶趍也搎蘇昆切捫猶摸􅟥也捈它胡切同都切卧引子篤切早熟也揬逹骨切衝揬也捆口衮切取也織也抒也組也擡大才切擡起也動振揤子翌𦵔栗二切拭也挮它弟切去涕淚捳吳角切抨也苦八切書擊熾敔所以止樂本亦作戞抹莫葛切抹摋滅也揙甫善甫延二切搏擊􅰐下結切束縛也掝呼麥切掝裂也攙仕銜切攙捔貫刺之也又楚銜切撍側杯切急也疾持也撅居越切手有所把也都􅩌切轉篗也禹鬼切逆追也撓乃飽乃教二切亂也又音蒿􅚹普麥切中物􅚹聲也挌柯額切舉也止也刲苦攜切中鉤也揩可皆切摩拭也搶𥘉庚切攙搶妖星名又七良切㩨俞桂切裂也挂也掤袐矜切所以覆失扏渠鳩切緩也扏同止古文七沒切摩也掓舒育切搭也㩱子藥切掆也捎也扣枯後切擊也又音寇乃鳥切擲也先火切揣擊徒結切摘也捖乎官切摶圎也㩢亡結切㩢揳不方正捷疾葉切尅也勝也扯充野切扯開也搩渠列切猛暴也𢶍先盍切破聲竹略切擊也􅎲古華切引也擊也換胡館切易也貸也㧹它德切拳打也乃結切捻也公殄切拭靣也挸同上擟莫規切擟拘山名撰助臠切數也持也拍普格切拊也捺乃曷切搦也㩩恪潁切竟也乃果切摘也搸子人切琴聲又音臻攍余征切擔也亦作嬴扴公八切刮也寺劣切括也公壞切擾也莫格切擊也㨙下街切挾也扶也拌普槃切棄也又音伴抳尼倚切掎抳也撲普卜切打也㨟下哀切觸也搷逹年切揚也拰如甚女甚二切搦也撈路髙切取也辭也擉初朔切指也塓亡殄切塗也摞力戈切理也挅當果切量度也拸與𥿄與支二切加也攄丑於切發也擬也擷何結切極祍也公壞切毁也擔丁但切拂也挒吕結切捺也㨋諸野尺野二切擊也攡力支切分也張也攢子幹切解也揨它耕切刺也撞也子了切剽截也抦悲景切執持也撨先弔先周二切懌也抆武粉切拭也拒也捶丁回切擲也揕知鴆切也囚絹切長引也苦絞切古文巧㩵五曷切把也擊也擽郎的切捐也舒也次然切遷徙也庋俱為切戴也􅝸古會切收也掅且定切捽也揌先才切掁也擡揌也扽都困切引也撼也捅先孔切引也捧孚勇切兩手持摣側加切取也如勇切推車也􅺭渠列切盡力負也記郤切拘持之也余忍切申布也攏力同切馬攏頭㨑子公切數也㧎客加切將也擔丁甘切負也肩擔也揀力見切又音簡擇也扠楚牙切橫扠也抓側交切抓癢也扶袁切捼也掀許言切舉也摸亡胡切手摸又音莫􅟥也􅟥素各切摸􅟥也摴丑魚切摴捕也許誇切為也㨚息倫切擇也揎息全切捋也抯壯加子野才野三切取也紀善切搌醜長貌搌丑善切搌㧒于筆切㧒擊也揘胡盲切拔也桑孤切摸也挲素何切摩挲亦作莎抵丁弟切抵當也敵也掋同上下取也搓七何切搓挪也挪奴多切搓挪振直庚切也子一子列二切擲也㧆九釁切以巾覆物挳口耕切打也搛力瞻切打鼓也摱莫辨切打也攔力丹切遮也鏗口耕切琴聲與鏗同撖口檻切挂也危也㨏他丹切搬也揁知盈切引也㨂都籠切打也余專切把也挽亡逺切引也與挽同擯卑振切相排斥也􆁗去寄切擊也擂力淮切研物也敷方無切敷張也㧫日之切拿也呼髙切除也或作薅茠㧻知朔切刺木也擊也蒲摩切斂聚也許冝切撝也抷匹眉切披也竹萌切引也捂吾故切受也又斜柱拺初革切馬箠又扶拺抦筆永切執也仄九切執也口切不安收口犯切取也先勇切古悚字敬也抖書由切古收字聚也揰都統切充也方刎切動苦卵切捉也㧪語鬼切懸也折士列切斷也又之舌切摵子育初六二切到也羊水切棄也􅼊許繭切戾也􅋆匹眇切落也苦老切打也掄力昆力均二切擇也掃蘇道切除也作掃同揇奴感切也撔戶猛切橫也丑善切擊也㨚思尹切拒也擨余遮弋之一切擨􅮈輕笑􅮈弋朱切􅮈然笑貌拃側板切摸也芳隴切掬也拆齒隻切擊也捃巨隕切捃束也㧣止臾章喻二切止也挼奴和奴回二切擊也拄張庾切指拄也抧測買切擊也阻色切打也擏居影切拱也攞力多力可二切揀攞也搋丑旨切以拳加人也攪下巧切擾亂也扻苦敢切扻打也採七宰切採摘拗烏狡切折也振之仁切厚也之刃切動也擹他丹切擹蒱賭博也子感切動也拶子葛切逼拶也火講切也摻所斬切執挾也挩徒括兔奪二切解也捨尸社切施也去也扼於責切握也揃子踐切搣也擭黃路切搬也一曰布蒦又乙蒦切撢它甘它酣二切周禮撢人措且故切也置也摕丁計切撮取也搔蘇牢切刮也揄與珠切揚也又抒曰也又音由㨜九山丘山二切相拔掾與絹切公府掾史挶居足切戟持也據據於切戟挶也嬌紀消紀小二切説文舉手一曰嬌擖公八口八二切刮也捷也揗食尹詳遵二切摩也抉一穴切挑也搳枯瞎切擖也抑於陟切意也冤也疑辝也損也按也搦女卓女革二切正也持也拊方武切拍也擊也撞徒江切擊也批普迷切擊也􅔊蒲結普雞二切反手擊也左傳􅔊而擊之捊步溝切引聚也亦作裒抱説文同上今薄保切抲火何切撝也掉徒弔切搖也播輔過切揚也種也書乃胥播天命播棄也如容切而勇切推而搗也擇儲格切簡也選也公鄧切引急也揂子由切聚也捼儒佳奴和二切摧也曰兩手相切摩摺力合之涉二切敗也折也撫孚武切安也循也拉力答切折也㩉同上扱初洽切婦拜扱地手至地也撥補末切治也擺也㩹徒擸切排也收也乃叶切擫同上㩍𥘉責切扶也搕口合切打也力伇切捽也捋也古切掌耳也摑同上古獲切批也揠烏拔切拔也扸星歷切俗析字扟所巾切從上捉也掏徒刀切掏擇也部六十七凡二十六字􅽦居竦切説文竦手也亦作拜􅠐多曽切籕文登公到切古文告弇於檢切古南切蓋也掩也同上古文睪余石切引也給也説文作豬史切古文置呼館切衆多也大廣益會玉篇卷第六
