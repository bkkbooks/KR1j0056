body:
  text: 大廣益㑹玉篇卷第二十六凡十六部羽部四百九凡百二十三字羽于詡切鳥毛羽又此方羽音在冬時又王遇切翁於公切鳥頭下毛又飛皃又老稱或作翨居豉切鳥之強羽猛也同上翺午刀切翶翔翔似良切布翅飛􅨎巨俱切羽曲也又馬後足白又俱禹切翡扶畏切鳥似翠而赤翠七遂切青羽雀岀南方胡公切飛聲羾同上翦子踐切羽生也采羽也齊断也俗作剪翰胡旦胡干二切飛也天雞􅪨它獵切􅪨􅪨飛皃翥之庻切飛㪯皃翬許韋切飛㪯皃翳於計切鳥名鳯属又屏爱也華蓋也障也翟徒的切山雉又樂吏賤者乎溝切羽初生皃莫大羽他盍切髙飛皃尺之切羽盛皃翴力仙切飛皃呼榮切飛皃翹祗姚切㪯也翹翹逺羽皃同上䎙匹仁切飛皃䎉許六切飛走皃䎀許月切飛走皃翧許元切飛也翮諧革切羽本也羽莖也古責切翅也羽也翅升豉切翼也􅢄同上翤同上翲匹姚切飛皃羿胡計牛計二切羽也羿善射人說文羿胡萌切蟲飛余丗切飛皃䎗巨妖切飛皃翷力仁切飛皃翏力㓜力要二切髙飛皃翯胡角切翯翯肥澤皃䍿胡光切羽舞名呼伯切也䎖子登切飛皃翈胡甲切羽翈也翜山立山甲二切捷也飛疾也分勿切舞者所執亡縷切今作舞翿徒到切翿翳也同上同上翕許及切合也聚也炙也翖同上所巾切羽多皃翻孚元切飛也䎂布交切五采羽力竹切今作戮翊余力切飛皃亦輔翊翢徒刀它刀二切纛也䎄計堯切或作䳂翎魯丁切箭羽音孚細毛古文飛字翪子公切竦翅飛也亦作㚇翓乎結切飛上或作頡􅲏許延切飛皃翄巨移切羽也翀直中切飛上天丑俱切飛皃先邀切羽翼敝皃亦作㲖䎕呼横切羣鳥弄翅也音宣切飛皃翗巨何切飛皃䎇織牛切急也芳好切飛也翛尸祝切疾也或作倐又音蕭呼麥切飛皃尺勇切羽也丑夘切毛多五板切飛皃五秦切又音廷奴坎切翮下弱羽禹俱切飛皃或作雩䍾魚典切飛皃火夘切火亂切初巳切飛皃音亥飛皃􅙆胡桂切六翮之未同上翸匹本切飛皃音消羽也䎈羊制切飛皃同上􅡇孚云切􅡇􅡇飛皃力合切飛皃他合切䎋苦到切飛也於劒切羽也匹各切飛翼余力切翹也輔也助也敬也􅛺同上呼乱切飛皃䎌初六切羽音獵飛皃音澀飛皃翣山甲切纛也見礼記䎒莊善切鳥摯擊勢也翐音秩飛皃􅞡音聿飛皃芳切芳逼切飛翽呼外切翽翽羽声衆皃䎘思六切飛皃又飛声音揷飛皃䎎女法切飛皃許劣切小鳥飛翾許縁切小飛皃胡郎切飛髙下皃或作音童又逹貢切飛皃翩匹然切聮翩翍普皮切張也亦作披飛部四百十凡三字飛方違切鳥翥余力切古文翼飜孚元切飛也亦作翻習部四百十一凡三字習似立切飛也串也又詩云習習谷風翫午乱切習也貪悅也盧合切歁不滿皃卂部四百十二凡二字卂思進切疾飛亦作迅㷀具營切单也无兄弟也无依也憂思也或作惸嬛非部四百十三凡六字非方違切不是也下也隱也責也􅩪方奚切􅩪牢也所以拘罪人靡眉𬒳切无也侈靡也䨽孚匪孚利二切别也靠口告巨篤二切靠理相違也䨿在臘切惡也不部四百十四凡三字不甫負府牛二切鳥飛上翔不下來也又弗也詞也古文否方乆切可否又彼僞符彼二切至部四百十五凡三十字至之異切極也通也善也逹也大也到也古文到多報切至也臺徒來切四方髙也閤也烏解切舎也臻側巾切至也及也聚也衆也丑利切忿戾臶才遁切古人名臸而力而吉二切到也音窒毛部四百十六凡七十八字毛莫刀切眉髮屬㲲徒叶切毛布也同上毫胡刀切長毛㲝而勇而允二切衆也聚也氄同上毾他臘切毾㲪席㲪都能切毾㲪㲱力葉切亦作鬛㲗芳俱切乳秏也㲦胡旦切長毛也獸毫也氈之延切以毛爲席􅪭方云切􅪭頭罽毭音豆􅪭也㲔思連切㲔㲍罽㲍之移切㲔㲍毨先殄切毛更生也整理也古牙切㲚胡衣也㲚所加切㲚㲬子姚切兠鍪㲬􅦷孚云切毛落來丁切長毛莫昆切以毳爲罽也數也思録切㲨罽也㲨人鍾切㲨毼胡割切罽也􆈭他卧切落毛也靟妨非切紛也大么切或作䎄䳂㲖先么切㲖㲕力外力拙二切色斑毿先含切毛長皃女於切犬多毛毬巨尤切毛求也㲢扶殄切㲢㲫毛也㲫扶木切㲢㲫音戎細毛音披毛也毥思廵切毛㲟於景切毛氀力于切毛布亦作又力生切巨俱切毹毛席也氍同上毹山于切毹同上毻湯果切毛㲥大當切㲥毦罽曲文者毦仁志切以毛羽爲飾子凶切氍罽毰愽回切毰毢鳯舞皃毢蘇來切毰毢毯他敢切氈毯也凡例切方文者亦作罽布莽切方文者㲰女庚切犬多毛氅昌兩切秋鳥毛㲡奴帶切㲡多毛布蓋切㲡女紅切髮多亦作鬞如羊切被髪亦作鬤土格切毛初生蘇到切毛㲓傷遇切毛􆃑也居拜切細毛音搜氍織毛又素侯切同上音謁多毛毱巨六切毛也音鬪毛音辱氈力才力咨二切強毛亦作㲠䋱㲯汝占切又音藍㲯毿氂音毛音音貓七丙切断也亦作多則切毛少籕文秃字毣亡角莫卜二切思皃一曰毛濕同上毳部四百十七凡二字毳齒芮切罽衣又毛之細䩁芳非切紛也冉部四百十八凡一字冉而琰切又而鹽切毛冉冉也行也進也侵也亦作冄而部四百十九凡二字而人之切語助也乃也能也又頰之毛曰而今作髵耐奴代切能而任也說文辠不至髠也角部四百二十凡百五字角古岳切獸頭上骨岀外也男女未冠笄曰緫角又角力也䚡先來切角中骨觻力的力米二切觻得縣名觠居轉切曲角又音衡乎庚切橫也平也斤兩也持牛令不牴也衡門橫木也又旺衡㪯眉楊目也古文觬午兮切角不正也又縣名䚘仕庚切牛角長竪皃䚦除倚切角中觚古胡礼器觶之豉切酒觴觗同上觭白倚居倚二切生角一俯一仰􅗧丁丸切角􅗧獸似豕䚢丑列切角也楚加切䚢也觢之势切一角仰也或作㸷同上仕角切說文角長皃女卓切握也䚩居小切角不正䚧力悠切角不正斛竒幽居幽二切角皃觩同上觪思營切角弓調利也用角便也居月切角有所觸發䚗聀容切㪯角占伹切㪯角捔助角切攙捔也又古樂切同上觤嬀彼切角不齊也或作觸昌燭切抵也據也觕同上􅠅古文觵古横切兕角爲罰酒爵觥同上䚙欣竒切又欣元切角匕䚝在凡切角初生也䚜方迷切横角牛觟胡无切角皃觴式羊切飲器也實曰觴虚曰籕文觳胡族切尽也盛酒巵也族也䚠胡本切古㮯字􅊦莊限切亦作琖丈爾切獸名觼古亦切環有舌者或作鐍􅬇同上觺五其牛力二切觺觺猶岳岳也觘又校切角上也䚪音角皃似秋切角也䚥女卓切調弓也摩弓也同上觷口角切治角也或作礐又音斈巨炎切觜也音喧揮角音訛角也䚨方味扶沬二切射收繳具同上觖窺瑞古穴二切觖望猶怨望也仕咸切角皃音陀角也音談角也渠語切雞或作距􅟉同上觝丁礼切觸也或作抵䚞多改切角心也音杷角曲也觰竹加切觰拏獸也下大也角上長也或作奓同上徒和切牛無角亦作許記切好角也力兮切角也有勿切角可以吹又卑溢切觱佛濫泉或作滭觱同上彼妖切亦作鑣馬衘也音霸又巴角也解諧買居買二切釋也說文散也又諧懈切接巾也又古隘切署也吴都賦解署碁布言不一𧹞奴版切慙而靣赤本作赧争義切皺皮不伸皺側救切靣皺俗㼱部四百二十二凡四字㼱而兖切柔皮也韋也亦作耎㞋籕文子徇切羽獵韋袴而冡切又人丑切亦作氄革部四百二十三凡二百字革居核切猶皮也去毛也老也改也莗古文鞹去郭切皮去毛鞄普角歩教二切柔革之工􅛘力各切生革縷也䩵禹愠况万二切作鼔工也或作鞣如周切乾革也鞶歩安切大帶鞔莫安亡阮二切履空也靸先盍切履也或作鞼古回巨位二切綉革也亦作繢靪丁令切補履下鞎乎恩切輿革前鞪亡斛切曲轅束也亦作䩒宇夫切䩪内環靻也靳居覲切固也當膺也又戲而相愧曰靳䩛皮畢切車束也靶布訝切㘘革也鞥於合切轡鞥也寵頭繞者䩤呼結切繫牛脛於力切五綵絲絛履下也或作繶呼見切鞥在背韅同上䩶丑井切又丑善切騎具也思危切案邊帶也䩭荆猗切也亦古文羇字絡頭也䩪古緩切車鞁具徒鬪切車靸具布各切車下橐或作轉鞚口送切馬勒也靬居言切乾靬也又去汗切乗矢器著弓衣靷余振切以引軸籕文於台於刧二切車上具也䪁補目切絡牛頭也鞮丁奚切單履䩐呼突切急擷知劣切車具䩽於候切胡矛鞌惡丹切馬鞌今作鞍䩞他篋切鞌䩞也古律切皮器大阿切馬也􅴿古狎切􅴿䩖履䩖所加切履也鞈公洽公匝二切橐也以防捍也徒東切靫具飾䩹牛挌切履頭口間切堅也乃米切轡垂皃􅯍徒外切捕具飾勒理得切馬鑣衘也刻也䩕午唐切絲履也鞮属鞜他匝切鞮也䩡公洽切鞮屬靼多逹之列二切柔革也㼱也同上鞙胡然切大車縳靻也􅨌所倚所解二切鞮屬同上同上鞠居六切推也告也飬也同上鞅於兩切頸靻也強也對心也鞃革薨切軾中靶也同上䩑同上鞀徒刀切如鼔而小有柄鞉同上鞻力鉤力豆二切鞮鞻氏靲巨今切靲鞻也鞬居言切以藏矢同上於元切量物也杼井也又於阮切䩩同上韇徒木切以藏矢或作皾韄乎故切佩刀絲又於虢切􅼳似足切鞮也􆄎呼角切急束也子完切車衡三束也或作同上鞇於人切車中重席亦作茵鞽起嚻切亦作鞧七流切今作緧居委切角不齊䩸如用切毳飾也革也或作緝同上䩨持亮丑亮切弓發亦作韔姑戸切今作鼔籀文䩥大嬾切馬帶亡善切勒靻繫也同上所力切車籍支革亦作於阮切履也鞿居衣切韁在口鞘音宵鞭鞘皮秘房福切車亦作絥鞴同上爲逼切羔裘縫亦作緎䩠他丁切皮帶䩠鞓同上音羊馬頭上靻靴耵戈切靸也亦履也鞾同上靮干狄切韁也所以繫制馬䪈去戰切腰帶䪈其俱切兵器莫隹切鞋也鞵胡街切鞮也革底麻枲鞋同上鞗大么切轡也亦作鋚鞕牛更切堅也亦作硬䩢之逝切刀鞞戸皆切履也所衘切旌旗旒也亦作繆同上鞏居壟切固也以革有所束也以火乾物也或作除霤切今作胃而庾切鞋也古核切也勒也亦作革同上鞞布項切刀室詩曰鞞琫容刀上曰鞞下曰琫又劒削又毗移切鞛必孔切亦作琫䩟音夷之二切蓋桂絲也􅶮同上䪍力丹切藏弩矢服亦作闌胡加切履跟亦作䪗韉音牋鞍韉也同上䩳速侯切軟皮也同上鞲恪侯古侯二切射鞲臂捍思亦切履也亦作舄䩷布剛切䩷鞋鞤布剛切鞋革皮音提常也䩝步包切靺亡逹切靺鞨蕃人出北土鞨胡葛切靺鞨䩼符容切鼔声鞝音掌扇安皮初九切束也同上靯他古切靯􅫜鞇也􅫜歩谷切靯􅫜䩬方奉切軍器怒典切車也布頂切歩礼切鞭卑綿切笞也馬䇿也䩱与朱切餘也孽也方奉切軍人皮古孔切生皮也靿於孝切靴靿靽音半與絆同䩯居力切急也亦作亟鞦七由切車鞦又鞦韆繩戲韆音遷鞦韆奴到切音槐鬼布私閏切靾以勢切以馬贈亡人余制切以鞍贈亡人􅽂許願切覆􅽂旨羊切泥也匹革切静也音養治皮􅤼先各切􅤼􅝿履也􅝿大各切􅤼􅝿履鞁皮彼切鞍上被除利切履底䩚都計切䩚鞋也音歩䩖也靫楚崖楚加二切箭室䪌士咸士蹈二切鞍也䪋以佳以貴二切音伏箭鞫居竹切問鞫所責切堅硬巨支切轂飾亦作軝鞢思叶切䩞鞢鞍貝􅸪音榻兵器鞊音詰皮也韈亡伐切屩韈䩧火結切急繫韁居羊切馬緤亦作繮䩔徒果切履跟縁也同上􅮰音室刀􅮰鞳他合切兵器音决䩿扶分切鼔也或作鼖􆁠戸仁切革帶亦作紳户犬切車也扶封切素回切鞍皮䩙户犬切刀䩙也䪊盧紅切䪊頭也韋部四百二十四五十八字韋于非切說文相背也獸皮之韋可以束枉戾相韋背也又姓古文韣徒木切弓衣也韜也又尺欲切韠卑密切所以蔽前也韍甫勿切今作巿韎莫慨切莫拜切茅蒐染草也又東夷藥名古文韤亡發切足衣也亦作袜韢詞季在丙二切囊網呼歛切胡𬒳子由切似由切收束也堅縛也亦作揫同上䪙扶豆扶武二切㞍衣亦作韝古侯切結也臂沓也䪏奴荅切䪏耎也韜它刀切義也寛也劒衣也韜杠也素回切韏九万切中片也詘也曲也韘尺渉切夹也指沓也䪜尺陳切䪜屏也韐古荅切韎韐也亦作帢又古洽切䪛芳袁切羣䪛酥納切屩也亦作韔它亮持亮二切弓衣于非切戾韛皮拜切韋橐也可以吹火令熾亦作音爻囊韞於昆切裏也赤黄間色也䪗胡加切履根亦作大夘切履俊岵巨貴切緝也同上于非切束也韗吁万于問二切靴也徐醉切囊組各口恩切束也䪔布古切車下䪔同上同上韌如吝切柔也又作肕韒私妙切刀韒䪒音注皮袴平祕切車音荅音域裘也皮祕切又扶卜切車軾也䪕巨竹切裏也居願切音坼下瞎切音亦䪝於白切䪝􅭕刀節􅭕直白切䪝􅭕歩交切䪐音祕弓絏也䪚都盍切熱䪚䪚音弗引棺䋲虚願切作鼓工亦䩵大廣益㑹玉篇卷第二十六
