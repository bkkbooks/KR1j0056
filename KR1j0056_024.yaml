body:
  text: 大廣益會玉篇卷第二十四凡一十三部烏部三百八十六凡四字烏於乎切孝鳥又語聲古文舄七雀切鵲也又思亦切今為履鳥字焉於連切鳥名也安也疑也又矣連切語巳之詞也是也几部三百八十七凡四字几是俞切鳥短羽而飛之忍切新生羽飛也鬒同上今文鳧父俱切鳥名乙部三百八十八凡三字乙於秩切玄鳥或作鳦孔口董切商姓又嘉也甚也竅也通也空也乳如庾切以養子也生也字也鳥之生子曰乳燕部三百八十九凡二字燕於見切乙也白脰鴉也又於先切國名燕俗燕字鳥部三百九十凡四百二十字鳥丁了切飛禽揔名説文長尾禽總名鶴何各切水鳥鷖烏兮切鳧屬鳯俘諷切靈鳥雄曰鳯雌曰凰有五采栖梧桐食竹實鶠於獻切鶠鳯也鵬步崩切大鵬鳥鶖七由切水鳥同上鸞力丸切似雉見則天下安鸑午角切鸑鷟鵉鳯屬鷟仕角切鸑鷟雕丁么切鷲也鶚五角切雕鶚鶪公覓切伯勞鷺來故切白鷺頭有長毛亦音鷺鴩余日切餔鼓鳥鳶以專切鴟類􅧭同上鷮居苖切似雉鵠胡篤切黃鵠仙人所乘鷫思六切鷫鷞西方神鳥同上鷞所良切鷫鷞鳪音卜婎也步丁切烏臼鷚莫彪巨幽二切鷚天鸙鵾古魂切似雞而大於鳥切魚也鴸音朱鳥似雞鴖音珉鳥名同上鴈五諫切大曰鴻小曰鴈鳫同上鴻户工切鴻鴈鸉與章切白鷢似鴈鷢巨月切似鴈尾白鵸竒輢二音鳥名鶩亡附切鴨屬又音目鴨烏甲切水鳥亦作同上鵪古文鸛古亂切鵲屬䳔公六切鳥名鶌九勿切似鵲而小黑色也鴶古黠切鴶鵴即布穀鵴居六切鴶鵴同上鷙之利切猛鳥也同上鶻乎忽切鷹屬又音骨斑鳩鵃止遙丁交二切鶻鵃􅫁音域戴鵀也鸁力戈切飛桑也鷲似又切鳥名同上鳩九牛切鳥名或作勼鴿古合切似鳩而大鳲音尸鳲鳩鴀甫鳩切鳲鳩𪆴巨惟切小鳩䳕音浮䳕鳩鸇之然切鷂屬􅜑並同上鷣以針切鷂屬鷐市真切鷐鸇䳳思律切鳥名子列切小雞鴚古俄切鴈屬鴚鵝鳥也􅛥鴐並同上鵝牛何切鴚屬亦作鵝次栗切鳥名烏道切鳥名􅸭九彼切布榖鵯音匹鵯鶋也亦名鵯烏又音卑鸒羊慮切鴍斯鵯鶋也鷽倚角切山鵲弋拙切水鳥隼思尹切祝鳩也急疾之鳥也或作隼鵽知刮切鵽鳩一名冠雉􅖂布族切􅖂水鳥也同上鴠音旦䳚鴠䳚苦汗苦曷二切䳚鴠似雞晝夜鳴名倒懸鴛於元切鴛鴦匹鳥也鴦烏郎切鴛鴦亦作央鷗烏侯切水鳥䳁皮逹切大鳥鴂古穴切寧鴂一名飛桑一名巧婦奴丹切説文鳥也與同力竹切野鵝也力俱切又音婁鶘戶徒切鵜鶘鵜徒兮切鵜鴮鸅好食魚名陶何鳥鸄古的切似鳥一名唐屠鸊步覓切鸊鷉水鳥鷉天兮切鸊鷉鴧以出切飛疾貌鶡何葛切鳥似雉而大青色有毛角鬪死止鷧郁祕於計二切鸕鷀鸕力乎切鸕鷀水鳥鷀才兹切鸕鷀鷀同上􅯝五俱切似梟人靣四目有耳見則大旱鸍式之亡支二切似而小鳵布老切鳵性不止樹鴝同上鶯於耕切鳥有又䴅必昆切鳥如鵲白身赤尾六足出太行山鴗力及切天狗亦名水狗鵜徒兮切鷩鵜山雞也􅝣唯辟切小鳩步昆切鳩鳥􅠯徒賴切鳥似烏三目音如豕食之亡熱也鷔五髙切有鴜集即大荒國亡鶬千唐切鶬鴰亦作鴰公活切鶬鴰鴳於諫切鶬鴳䳩於遙切鳥如山雞尾長赤身其鳴自呼巨貟切鵒亦鴝鵒鴠且余切于鴡亦作雎鴝具愚切鴝鵒鸜同上古文鵒音浴鴝鵒鸚於耕切記鸚鵡能言不離飛鳥鵡亡禹切鸚鵡鳥鵡同上又亡后切鷕以沼切雉鳴余周切鼠鵵大胡切鳥名􅖥巨於切雍􅖥亦作渠子席切鴒雍􅖥鶺同上鴒力丁切鶺鴒鸗力恭切梟也鸙弋灼切天鸙鸀徒角切嶌又音燭鸀鳿鳥鳿牛欲切鸀鳿巨六切鳩􅟇力唐切鸅鳩千賴切鳩也音婦雀也䳅居是切鳥如烏赤足名䳅鵌鷆大堅切尓雅母也鵐亡俱切雀也古刀切􅟇鳥䳝匹部切鳥名鵺音夜鳥名鵌大吾切鳥鼠同穴又音餘鴷音列斫木也口如錐莫括切鴨也鴄音匹鴨也丑力切溪鷘同上鶤古魂切雞三尺或作鵾蟂徒冬切鳥如雞赤足鶥莫飢切鶥鴰鳺方于切鳺鳩鵂許牛切鵂鶹鶯於耕切黃鳥鷓之夜切鷓鴣常南飛似雉鴣古乎切鴣􅨊􅨊似立切鴣􅨊鶜莫交切鴟也􅣽莫切鴟也鶊古行切鶬鶊鳥鷤逹詣切布榖也又逹兮切鵙古惠古穴二切鷤鵙鷹於陵切鷙鳥鴔皮及切鴔􅟇􅟇北及北涉二切鴔􅟇戴鵀今呼戴勝鵫竹教切白鵫一名曰雉䳑于九切白鵫鴟充尸切鳶屬鵄同上鳽五革五田二切鵁鳽似鳧腳高毛冠鶹力牛切鶹鷅鳥又名鶹􅾶鸝力知切鸝黃又楚雀鵹同上鴜子竒切􅰌鴜􅰌止深切􅰌鴜水鳥似魚虎黑色鷦子姚切巧婦也又鷦鷯亦作鳭鷯力么切鷦鷯小鳥亡消切鷦鷯音原鳥也鷂以招切五色雉也又以照切鷹鷂鶨丑辨徒頓徒困三切癡鳥鴲至几切鳥鷇未生毛鶆力才切鶆鳩也鵚天谷切鵚鶖也鷩必列切鷩雉可為冕又立冬入水化為蛤他口天口二切水鳥黑也鸏莫公切水鳥亦蒙鳩䳻才三切雕也鵏布乎切鵏鶆鳩也鵔思俊切鳥狀如鴟赤足直喙黃文見則旱柯額切䫑又音洛烏􅤛古屑切􅤛􅧗鳧屬同上􅧗古轄切􅤛􅧗鴆除禁切毒鳥食蛇其羽畫酒飲之即死鶭芳往切鶭澤虞常在澤見人輒鳴不去象主守之官見尓雅鴋同上􅠍音冒􅜥􅠍􅜥步千切􅜥􅠍鳥形人靣宵飛晝伏丁么作么二切鷯剖葦似雀靑斑居葦又竹交切鷝比吉切鷝鴋鳥鴱五大切巧婦也鴾莫侯切鴾母即也郭璞云青州呼鴾母鶂午的切水鳥善髙飛又五兮切並同上鷁同上鶗大戾大兮二切鶗鵳應仲春化為鳩鶙同上羊恭切􅖥似鳬一名􅝄􅖥鷇苦亘切鳥母哺子食鶼音兼比翼鳥鷸餘律時律二切鷸似燕生鬱林知天將雨故知天文者冠鷸同上鵁古爻切曰鵁尾如雌雞又鵁鶄鶄子盈切鵁鶄似鴨𪃶户溝切雕也鵩扶服切鳥似鶄而大鸓力追切鼯鼠名飛生又力切籕文知革切雉屬贛鳥也鷼乎間切白鷼亦作鷴䲽市亦切䲽鳥精列也鶟徒忽切鶟胡鳥文留切南方雉名同上鶾何千何旦二切雞肥貌今為翰火丸切鷒鶝鶔鵍同上鷒徒丸切鷒鶇德紅切鵍名美形也同上鳴莫兵切嘷也聲相命也鶢于元切鶢鶋海鳥鶋舉魚切鶢鶋鶱許元切飛舉也鳨音力鳥似鳧而小也同上鳻扶云切鳻雀似梟同上又鳥衆貌飛貌鶞丑倫切鳻鶞春也鴽汝居切鴿也鳸乎古切北鳸鳥名同上鶅壯其壯吏二切東方雉名鷷音遵音移西方雉名鵗許衣切切方雉名䲬巨支切雉别名鷨胡瓜切雉别名鳥光切雉名䴑大頰切如鵲赤黑色兩首四足䳤方列切䳤􅝐鳥也􅝐方于切䳤􅝐大侯切也𨿿雉容切𨿿鳥市羊切𨿿䳐子次切鳥青黃色即鵂鶹􅦵多敢切鳥青黃也􅽑力周切􅽑飛也除切􅽑鳹求炎切鳥啄食䲪乎利切鳥也􅬡才亮切女􅬡巧婦也又名􅬡雀亡結切雀亦巧婦眉筆切􅽑肌繼鶧也鶧於京切鳥名鵲七雀切或作鳷之移切鳥名午胡切鼠或作鼯鷶眉解切鷶􅸭子雋也烏含切鶉鶕同上鶉音淳也鴆大冬切鳥名鶈于兮切鶈鶯東夷鳥名鵀女林切戴勝又音壬鶝方六切戴勝力灼切鳥也烏而切鳥鳴䳟靡京切鳥似鳯􅬹魯甘切􅬹鳥今之郭公音縷􅬹鳥古隨切鳥也式容切鳥名鶲烏紅切鳥也鷭府袁切又音煩􅫫音商􅫫鴹舞則天大雨鴹與章切􅫫鴹時真切風鳥鶓音苗鳥名鶍與章切鳥名居希切鳥也鴘四免切鷹鷂二年色鷾於記切鷾鴯玄鳥也鴯汝施切鷾鴯鵟巨王切鳥有冠鵨失余切鳥也音臾鳥名䴃女交切鳴䴃黃鳥也鵋其記切鵋鶀鳥也鶀去其切鵋鶀亦作鷡音無鷡鴽鳥也弋支切鳥名𩀨在容切鳥名亡奔亡姦二切比翼鳥也鶶徒郎切鶶鷵鳥也鷵大乎切鶶鷵鵓步忽切鵓鳥先兀切鵓女冬切鳥也匹仁切飛貌或作䎙鶷胡逹切鶷􅗾伯勞也􅗾午轄切鶷􅗾鴑音奴鳥名音苔鳥名䳿音然鳥名堆戶工切庸也鳥肥大也鳱古丹切鳱鵲也難奴丹切不易之稱説文亦作􅴥鳥也並古文古文竹教切覆鳥者或作罩鵲七略切鳱仁眷切鷚雞雉直理切野雞又城一丈三尺為雉又陳也理也古文雋徂兖切肥肉又長沙縣名􅨼居彌切子􅨼子䲽鳥子心切雞也罩古迷切谷名古覓切或作弋屬切或作鵒千郎切庚或作鶬集秦立切合也余招切鳥名德紅切鳥名􅵁昌耳切鳥類徐立切鳥名弋去切斯或作鸒隻之石切竒也一枚也五名切禽名䨈音賔小雀也胡廣切田器雌似垂切又音隹雒力各切鵋鵋鳥也奎部三百九十二凡三字奎先進切鳥張羽自奮奎也奪徒活切取也不與也易也怒也諍也奮方愠切翬也飛也動也朋也奮奎也振也舒也萑部三百九十三凡六字萑後官切老兔似鵂鶹有角夜飛食雞鳴人有禍舊巨又切故也又許流切舊鶹今作鵂蒦紆縛於白居莫三切髙視也蘧視貌也度也彠同上呼九切化也雚公換切水鳥今作􅔏瞿部三百九十四凡二字瞿忌俱居遇二切鷹隼之視瞿儉驚懼之貌矍九縛切視而無所依之也鷹隼得逸志也雔部三百九十五凡三字雔市由切雙鳥也又除尤切雙所江切兩也偶也又飛鳥二枚靃呼郭切飛聲又綏被切靃草隨風貌亦作霍雥部三百九十六凡三字雥才市切群鳥也又走合切雧秦立切聚也今作集䨊於蠲切羣魚魚部三百九十七三百二十一字魚語居切水中蟲鮞人之切魚子䲊大果弋水二切魚子巳生籕文魼丘於切魚也亦作又它臘切鱏徐林弋林二切鮪也鰈它臘切比目魚鮙同上才枕才針二切大為鮓小為鱗鱗同上鰥古頑切魚名又老無妻曰鰥􅺗奴答切魚似鱉無甲魶奴臘切鯨也鱒慈損切赤目魚鱦弋證切小魚鱦同上鯢大兮切大魚似鮎四足聲如人鱨市羊切黃鱨魚也力因切魚名鰫弋恭切魚名魴扶方切赤尾魚也鰟籕文鯇戶本切魚似鱒而大鰌七由切如鯉而小䱬思於切魚名鮪為鬼切鮥魚名鮇莫括莫結二切海中魚似鮑鱴同上䱎公登公繒二切䱎鱧鮪也𩶶武登武亘二切䱎鱧説文𩶶鯀古本切大魚鱺力兮切魚似蛇無鱗甲其氣辟蠧蟲也䱤公念切魚也又一音陷鮆前啓切刀魚也短也鯉力耳切今作鯶鱄市臠切魚名鮮思連切生也善也好也思淺切少也鱣知連切鯉也大魚也頷下無鱗同上籕文鮍匹皮切名鰩與照切魚身翼常從西海飛來東海䲚力大切他逹切魚名鰜公嫌胡兼二切也䱾力侯切大青魚䱂於堯切魚䱱大兮切魚四足音如兒食之無疾鱖居月切魚大口細鱗班彩鱀巨既切魚名似鱏鯾卑連切魴魚鯿同上鯥力竹切魚似牛陵居蛇尾有翼出山海經鮮思連切鳥獸新殺亦作鮮魛丁髙切蔑魛魚也鱮似吕切魚名魣同上鱝防吻切盤尾毒魚也口在腹下鱅與恭市恭二切魚似鰱鱲力涉切魚名鮬蒲故切鱖鯞鯞之酉切鱖鯞鱊古八切尓雅鱊鮬鱖婦小魚似鮒子而黑鰒步角切海魚又音伏䱲與專切魚名鮦直壟切鱧魚力啓切鮦也鱧同上䱏它口切魚名鮫古爻切䱜屬皮有文鯧齒楊切魚名鮒扶句切鰿魚巨成切魚名鰱里然切魚名鰼似立切泥鰌鮑步巧切漬魚今謂裛魚鱗力因切魚龍之鱗魠他各切名黃頰鮎乃兼切鰋魚鰋於幰切魚名同上倏徒堯切白鯈魚也似雞赤尾六足四目也又直流切鮷大兮切大鮎鯷大計切鮎也􅱆徐垢切白魚鮸眉辨切魚名魮父脂切魮魚狀如覆銚鳥首魚尾音如磬石出山海經魵逢粉切魚名䲐力古切魚名鰸於于切魚名鯜七援切魚名鱟胡遘切山海經形如車青黑色十二足長五六尺似蟹雌常負雄漁者必得其雙子如麻子南人為醬鱔市演切魚似蛇鱓同上魿力巾力丁二切魚連行也䲌口換切魚撞罩也布賴切魚名鯊所加切魚名䱡居六切魚也同上魧乎郎切魚名又音剛䱋記冡切魚也鱳力各切魿魚鰅娛容切魚名鮊手亞切海魚鮐它才切魚也鱯乎花切似鮎而大鰞音烏鰞鰂魚本作烏鰂疾得切鰞鰂鱡同上鯨渠京切巨魚鯨同上魾步悲切大鱯又敷悲切鱐思六切鮯母鯁古杏切魚骨鮏先丁切魚臭鯹同上鱢先刀切鮏鱢也于貴切魚似蛇四足鮨巨黎切魚名又鮓屬鰭同上鮨古文更白切海魚􅪓步梗切蚌也鮯公市切狀如鯉六足鳥尾下切藏魚也鮓同上籕文鮚巨栗切魚也鰻莫安切魚也鰧大曽切魚似蒼文赤尾蝦何加切魵也長須蟲鰝乎老切大蝦􅠧子亦切鮒魚鰿同上鯽同上鱁雉六切鱁鮧也又魚名鮧音夷鱁鮧􅫛乎瓦切鱧也鱬而朱切鳥似魚鰠先刀切魚似鱣䲃祖道切魚名鯤古門切大魚又魚子䰴居乞切斷魚鮡治矯切大鱯鱵之深切魚名徒括切小鮦䱻胡八切魚如鳥􅱈方娛切􅱈鯕魚也鯕巨基切􅱈鯕鱤公禫切黃魚鰦子夷切黑鰦也鯩力均切魚也䲀之利切魚名鱍市活普活二切尾長貌䱣子律切鯈也鮤才結切鮆魚也䰲於八切魚名逹丁切魚也􅱛所巾切魚尾長鯪力承切鯉有四足鯼子公切石首魚魟呼工切魚名䱢壯耕切魚名鯆夫禹切大魚魺尸多切魚名鮩步杏切白魚又音並尺尸切鮪也鮛户六切鮪也䱝步唯切黑鯉也􅭡方韋切魚似鮒鰑與章切赤鱺也鮋直留市由二切魚名鰲午刀切魚名鱎竒兆切白魚鰹古田切大鮦􅧖於報切小鰌鯔壯其切魚名􅡈普乎切􅡈䱐一名江豚扶各切魚似鯉䱐覆浮切􅡈䱐也鯅式延切魚醬鰬巨連切魚也鮹思么切魚名力當切䱺雄也䱺胡哀切䱺力的切魚名􅱚同上鯛丁么切魚名鮭古迷切魚名鯸胡溝切鯸䱌食其汗殺人䱌亦之切鯸䱌􅷼大當切魚名人用切鮐魚蟹胡買切鮦也鮾奴罪切魚敗力戈切魚有翼見則大水鰪於臘切鰪鱂魚也鱂子羊切鰪鱂鱷午各切魚名鰐同上鰶子裔切魚名鮈記于切􅾾鮈魚名􅾾牛胡切魚名漁語居切捕魚漁同上漁亦同上又作鱸洛乎切魚名􅥸火媯切大魚又音為鮠午戈午回二切魚名鰊洛見切魚名鯬音犂魚名鮀大何切魚名鮀同上俗鮿竹涉切膞魚也鹽漬魚也魤五回切魚屬鮃音平魚名鰍七由切與鰌同鰷音條魚名無非切魚名魽呼井切似蛤有文如瓦屋户岩切魚也䱵烏紅切魚也莫侯切魚也音求魚名音癸魚名魳徒合切又所其切魚也鰤音師魚名鰓相來切魚頰音讎魚也鱑户光切魚名鰡音留魚名噞魚檢切噞鰅魚也鰅魚容切噞鰅于匡切魚也於鬼切魚名上同又音牛鯄音求魚名魡丁呌切亦作釣餌取魚也鱕甫煩切又音煩魚名魨音豚魚名鮼七尋切魚名鱃音羞魚名音乎魚名魪假賣切兩魪比目魚音呼又音無鮶音君蟲似魚也以周切魚名鰄於非切魚也䲑義竒切魚名鰾毗眇切魚鰾可為膠士咸切又音陷子林切魚名魜而真切魚也鮢諸如切魚也鮽與魚切魚也鰴火韋切鰴魚絶有力鯖倉經切魚名又音征旴鬼切魚也莫六切魚名居偃切魚也鰢莫下切魚也魚怯切與四魚同呼以水切又音唯鱌音象魚名魢疾里切魚也音巽魚名􅵐音小魚名營隻切魚也音耶魚似蛇長一丈音寧魚名鰖音妥魚名音唯魚名鱭音齊魚屬䱜倉合切又音錯魵府吻切魚名鰵音慜魚名鮌音鯀魚名魬音販魚名先顯切魚也䱮音額又音頡魚也之利切魚名鮦直勇切魚也時正切魚也魱音互魚名力際切鮣一刃切魚如印也匹亘切大魚音化魚也䱿初陷切魚也鮄音佛海魚音尉魚名鱉并滅切俗鱉字鯡音沸魚子胡幹切魚也􅷀音罽魚名於陷切魚也音奈魚名𩸆於業切鹽漬魚居六切魚也音步魚名布密切魚也鮥音洛大魚鯠洛該切魚也鰏彼力切魚名鮜胡鬪切魚也親悉切魚也䱚力玉切魚也𩼋音業魚盛也鮅卑吉切魚也鯟德紅切魚似鯉也直律切魚也鮇音末魚名䱕莫浮切魚也先了切魚也呼蓋切魚名魮父脂切鳥首魚尾音如磬鮂似由切魚也又作鮋音舟魚名鯶乎衮切魚也都郎都浪二切魚也􅦏部三百九十八凡二字􅦏語居切説文二魚也言居切捕魚也與漁漁同大廣益會玉篇卷之二十四
