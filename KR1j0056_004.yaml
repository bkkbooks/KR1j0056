body:
  text: 大廣益會玉篇卷第四頁部三十六一百九十九字頁下結切説文云頭也頭逹侯切説文首也題逹兮切額也楚辝雕題黑齒顔吾姦切國語天威不違顔咫尺顔謂眉靣之間也魚怨切顚也願同上思也欲也頵於倫切頭頵頵大也亦楚君名頯渠追丘軌二切爾雅蚆博而頯主中央廣兩頭鋭䫟有衮切靣急貌碩市易切大也頒扶云切大首貌一云衆也又音班頜公答切公羊絶其頷口也方言頥頷也説文平感切也胡耽切頥也顄同上又下感切頓都鈍切下首周禮九拜下三頓頡紅結切蒼頡古造書者詩傳飛而上曰頡説文直頡也䫨五髙切髙大也莫佩切昧前也皓胡皓切白貌楚辝云天白皓皓顅苦間居研二切禮注長脰貌説文云頭髮少髮貌䫶防園切大首貌在姓切好貌䫔下計切伺人也又恐也又去結切額雅格切方言中夏謂之額東齊謂之顙釋名鄂也有琅鄂額同上顙酥朗切額也頷户感切莊子驪龍頷下又音含字徒木切顱又徒佫切顱力胡切顱髑髏項胡講切頸後也頸吉徑切頭莖也領良郢切詩傳云頸也周禮注猶理也頥以之切養也也與臣同頂丁領切顚也上也籕文頑五環切鈍也苦昆苦鈍二切頭無髮也一曰甘門䪴諸甚切項也又垂頭貌顚都堅切頂也山顚吉惟切小頭貌同上頗普波切不平也偏也又匹跛切顤牛姚切五弔切髙長頭貌頞惡葛切鼻莖亦作頰居牒切靣旁也顆口火切小頭貌顑苦感呼紺二切飯不飽靣黃起行也顝口骨口回二切相抵觸䫀公典公很二切頰後頍丘婢切舉頭貌頛力罪力頭不正頪力外切廣雅疾也説文難曉一曰鮮白貌頢古活户活二切短靣貌顀直追切上髙骨也䫥五罪切頭不正顮禆仁切憤悶也顡牛既五壞二切癡頭不聰明也莫骨烏骨二切內頭水中薄諧蒲回二切曲頥來感切靣貌脣視均切古脣字䫤莫丁切眉目間也詩猗嗟䫤古本亦作名俯靡卷切低頭説文音俯顩五檢切狹靣鋭頥貌顴距貟切䪼也顠孚紹切髮白貌渠流切恭順貌詩戴辨俅俅或作俅䪼之劣切凖也又之出切䫡五咸切頭靣長貌䯪口倒切大頭也公老切廣大貌頏户郎切詩傳飛而下曰頏又苦浪切咽也䫌匹米切傾首也不正也頒火么切口么切頭大䫆視盈切頸也頔徒激切好也呼憒切靣肥貌又頮同洗靣也有救切顫也病也亦作疚顒魚切頭大也仰也五柯切或作俄五舌切靣醜顯虛典切光也又見也明也覿也著也顫之扇切頭不正也又動也頎渠衣切長貌又佳也䫦公盍切頷車骨胡絹切腮後也助轉切説文選貝也或作僎古作選籲俞注切和也書率籲衆戚五角切靣前䫂丁可切醜也顁都定切題顁也頇許安切頇五旦切頭無髮頇額也䫑丘之切醜也今逐疫有䫑頭郎丁切靣瘦淺貌􅷯扶武切頰骨甫越切古髮字顉牛感切低頭亦作頷又音欽曲頥也蒲何切與皤同老人白也頨緣有矩二切頭妍五各切嚴敬也頽徒回切頰下頃去潁切説文田百畒為一頃户吾切與胡同牛頷垂也顗牛豈切靜也謹莊貌莫邦切頭也五孤切大頭也頳丑盈切赤也本作赬頠五罪牛毁二切靜也五怪切頭蔽也𩑢普眉切大靣䪳余凖切靣不平頧都雷切毋追冠名或作追頤二恩切舉眉視人貌頲他領切直也狹頭也䪾之忍切顔色䪾𩕔愼事也亦作須𩕔來軫切䪾𩕔一曰頭少髮貌亦作顓諸緣切顓頊顓者專也頊者正也言能專正天之道也頊虛玉切顓頊同上又顱諸甚切低頭䫲火感切動首顧古布切瞻也回首曰顧顧同上俗之善切倨視人烏鉤切靣折奴兜切它懶切靣平乙欹切睇盻美容貌􅝋口本口沒二切秃也頄音逵音仇靣顴䭭舒酉切人初産子䫩桑感切動頭也𩕳奴頂切頂𩕳䫖丑甚切䫖噤愞劣貌普經普冷二切頩色許可切頭視貌昌旨切靣大尺勇切充也他頂切頭疾噤距錦切䫖噤又怒也䫵彌仙切雙也又雙生踈兩切醜也滿也頮荒佩切洗靣也息進切頂門同上於紅切頸毛亦作翁􅷵之延切雙也額也頝口交切頝薄不媚也䪻薄變切冠名顂力載切蒙也無沸切靣前憔昨焦切憔悴憂貌亦作憔悴疾醉切憔悴亦作悴預余據切宴也樂也顟力弔切顟顤頭長貌同上䪷火豆切勤也貌孟教切容也與貌同煩扶園切憤悶煩亂也丘飲切醜貌牛飲切醜貌丘耽切醜也䫄丑滑切強貌先全切圎面亦作䫒莫昆切不曉亦作惛頕丁甘切頰緩或儋字胡官切丸也渠公切靣上也呼塊切大首􅲰霍肱切惛也或作頦胡來切頥下又音改髑逹祿切髑髏頭骨髏吕侯切髑髏䫜於交切頭凹也口感切䫡額丘檢切顩不平也顳仁涉切在耳前曰顳莫安切頇大靣腮息來切頰腮䫚古花切短頭也頙初真切正也顃徒含切余占切靣長顬仁于切顳顬耳前動徒困切秃也顐五困切顐秃也顎音愕面髙貌顎同上胡割切呼割切健貌䫢思移切䫢頭不正子廷切䫢蒲結切頰短也爭索切不正力篤切項也頖剖半切頖宫亦作泮䫛胡鉤切䫛䫗言不正䫗胡加切䫛䫗頌與恭切形容也又似用切歌頌籕文順食閏切從也䫈七錦切貌醜頻部三十七凡三字頻毗賔切詩國步斯頻急也説文作水崖也人所賔附蹙不前而止也同上顰音頻顰蹙憂愁不樂之狀易本作頻曰頻復厲無咎注謂頻蹙之貌􅔣部三十八凡二字􅔣舒酉切人頭也象形脜如由切靣和也野王案柔色以藴之是以今為柔字首部三十九凡十字首舒酉切説文與􅔣同古文首也方言云人之初生又書授切自首罪也首同上今文稽苦禮切首至地今作稽諸兖切截也或剸同都冷切顚也今作頂餘之切籕文頥語間切籀文顔甫月切古文髮居牒切靣傍今作頰馘古獲切截也詩攸馘安安馘獲也不服者殺而獻其首曰馘記曰以訊馘告亦或為聝部第四十凡二字古堯切説文倒首也賈侍中曰斷首倒縣也野王謂縣首於竿頭以歸大􅖄秦刑也縣胡涓切繫也今俗作懸又胡絹切周禮四甸為縣鄭玄曰五鄙為縣面部四十一二十九字面彌箭切説文作顔前也䩉扶矩切説文頰也左傳䩉車相作亦作輔烏感切靣醦色也倉感切面貌懡眉可切靣青貌力可切懡䩌在遙切説文面焦枯小楚辝顔色䩌悴䩇竹咸切􆁧小頭貌䩂呼咸切䩇䩂䩍力小切面白貌䩆側板切酢老也女板切䩆又慙愧或作赧䩊於逺切眉目之間美貌詩清揚䩊兮今作婉􅤇火含切面紐貌徒切習也靤蒲貌切靣瘡也音妹面貌靦他典切􅌤姡也又慙貌埤蒼同上字書􅌤字同上蠠彌吉切沒勉也音溺愁面魯且切面長貌在咸切靨於協切靨輔在頰前靧音悔洗靣與頮同䩏彌結切靣小也音活面小色部四十二凡十三字色帥力切采色也又人顔容也艴蒲沒切不恱貌同上俗艵普經普冷二切縹色䒍普郎切䒍無色莫㓪切䒍䒋於丈切氣流貌䒊許奚切黃病色同上靘千定切靘䒌青黑色䒌亡定切靘䒌赩許力切大赤色艷羊念切俗豔字囟部四十三凡四字囟先進切説文云象人頭會腦蓋也或作囟􅮸古文巤涉切毛巤亦作鬛􅴡婢時切説文人臍也從囟從比取其氣所遍也臣部四十四凡三字臣以之切説文臣也篆作頤籀作巸與之切廣臣也長也美也賾仕革切凼深難見也易聖人有以見天地之賾亢部四十五凡五字亢户唐古郎二切人頸也又苦浪切髙也下㓪切直頸莽􅙚丘召切􅙚不安也牛召切􅙚䶳弋灼切仰也鼻部四十六凡二十七字鼻毗至切説文引氣自卑曰虎通鼻者肺之使也齂呼介切鼻息鼾下旦切卧息也嗅喜宥切以鼻就臭亦作嗅齃烏曷切鼻莖與頞同齆烏貢切鼻病也䶍都計切鼻噴氣嚏同上本作嚔子心切髙鼻丘救切􅡩仰鼻鼽渠牛切病寒鼻塞也或鼽字呼几切出息聲齀音瓦仰鼻同上􅡩牛弔牛救二切仰鼻涕他計切鼻涕本作涕齇壯加切鼻上皰䶐烏切喘息也魚小切鼻折也皰傍孝切靣瘡鋤咸切鼻髙貌􅦃呼洽切􅦃皰鼻息也䶎同上齁火侯切􅦃齁齈奴東切鼻齈紐六切鼻血自部四十七凡五字自疾利切鼻也象形又由也從也率也古文臱眉然切不見也臭赤又切惡氣息臰同上俗目部四十八凡三百四十字目莫六切眼目也目者氣之精神也説文人眠象形重瞳子也古文䁵方辨切小兒𥘉生閉目瞦虛之切目瞳子精也眩胡遍胡涓二切目無常生書若藥物瞑眩眼五簡切目也字書眼字眥靜計切目際也又才賜切矏莫緣切目旁也密也盼普莧切黑白分也詩美目盼兮睫子葉切目旁毛睫同上睅何版切丗目貌左睅其目方巾方微二切大目眊莫到莫角二切不明貌孟子眸子眊焉睒式冉切暫視貌䁺式亦切視也䁔胡切大目普又况晚切矕馬板切目矕矕也􅰮莫報莫六二切低月視也又細視盰公旦切目白貌睩盧谷切視貌睴公困切大出目又音混窅烏了烏句二切深目䀛亡拜亡撥二切目冥逺視一曰久也矔光旦切轉目視䁈口戾切窺也睔古遜切大目又盧本切䀣鄙利莫八二切直視眱與脂大奚二切説文目小視南楚謂眄眤古眱字瞻諸廉切視也眅普板普班二切多白眼亡限切䁂目視貌䁂音限䁂瞞眉安切平安也户犬户觸二切目瞳子􅗻同上瞵力辰切目精又視不了矘他朗切目無精直視睨魚計切邪視也眓呼逹切視髙貌去倪胡圭二切蔽人視也一曰直視同上眮大孔大貢二切轉目視耽當含切視近而忘遠睎許機切眄望也眛莫蓋切目不明餘連切相顧視而行同上瞴亡丁亡禹二切瞜瞴微視步安切轉目視也睘瞿井切目驚視􅾛之閠切謹鈍目眄休俱切舉眼亦瞳子同上匹莧切小兒白眼亦視貌睹東魯切見也與覩同䁴止善切視而止同上眽莫革切相視也眽眽姦人視也眿同上瞟匹昭切瞟􅕉明察又音縹􅕉戚細切視也又音察瞤如倫切目動也矉禆身切恨張目眷古援切屬也顧也眷同上敕周他狄二切失意視貌眔大合切目相及也矆許縛切大視也矆同上看苦安苦案二切睎也翰同上眢於桓於元二切目無明睽枯攜切乖也目少精眴胡絹切目搖也眴同上瞑眉田切寐也翕目又音麵眠同上睢許佳切視貌胥維切水名䀩來各來灼二切盼也睦莫六切和也古文眣丑乙逹結二切目不正古文瞀莫遘亡角二切目不明耕懴耕讒二切視也䁲莫佳切小視也瞗下腰切熟視也睵千才子來二切睽也同上相先羊切又先亮切相視也督都谷切正也目痛也瞋昌真切張目也􆈟同上瞪丑庚丑郎二切直視也同上睊公縣切視貌孟睊睊胥讒盻下計吾計二切恨視睗式赤切目疾視一決切目深貌古換古完二切古觀字同上睼士系徒奚二切迎視也瞥匹烈切目瞥見也瞫尸甚切深視貌眙敕吏切直視也䀸丑丗切瞥也又諸裔切晣同上䁊一活女刮二切目深貌睞力代切目瞳子不正眝直旅切張目也睆華綰切出目貌睍下顯切目出貌詩睍睆黃䁙烏澗烏殄二切目相戲眲爾志切耳目不相信􅲺扶未切目不明𥄱同上眕之忍切重也又目有所限而止睺胡鈎胡遘二切半盲也瞚式閠切目動也瞬同上瞬亦同上又式荏切盷徒賢切大戴禮人生三月而盷又胡消切矇莫公切有眸子無見盲莫耕切目無眸子睡殊惴切坐寐也眵充支切目傷眥䒅以證大登二切美目也大視也亦作䁝唯井胡亭二切惑也覘敕驗切視也莫結切目眵也䁾同上俗眚所景切目病生翳也書眚災肆赦眚過也睿余芮切智也明也聖也瞪直耕切怒目直視貌䀗居穴切睊目眛莫逹切目不明眯莫禮切物入目中莊子眯目瞺烏外切眉目間貌眸莫侯切目瞳子䀶理尚切目病貌䀶同上眄莫見切説文目偏合也一曰邪視俗作䀎眳彌頂莫井二切眳晴不恱瞳徒公切目珠子眂上支切視也視時旨切古文視視時至切語也亦作示又承矢切亦古文視睛子盈切目珠又七井切􅻂庾鞠切目明又望也瞷胡間切眄也䁅眉冷切䁅古冷切䁅有餘視也一曰喜也瞡葵季切視也又居悸切𥄗烏哲切目也眺丑弔切望也修易勞切眣也瞰苦暫切視也揚雄解嘲鬼噉其室䀬壯拳目緣二切目瞬眐之盈切獨視貌眥士介切睚眥目柴同上睚五懈切睚眥又裂也又五皆切盯直庚切􅟑盯視貌睳呼圭切瘦貌又目瞢九小切目重瞼睇逹計切傾視䁸女紅切目不明又奴名切怒目也􅟑亡幸切視也又音萌􆉑力佳切視也亦作吕計切視也䀼之忍切眩悶也􅉩呼光切目不明又狼􅉩南夷國名瞲呼聿切目深貌又呼決切並同上眇彌紹切一目小瞽公五切無目也瞭力條切目明也眒書刃切疾貌䁱烏侯口侯二切深目貌口交切窅面不平􅸴蘇走切無眸子瞍同上矎呼玄切直視也瞶居畏切極視也式冉式涉二切目貌䁳莫郎切無一目䁍苦洽切目陷也睉昨戈切小目也盿莫彬切視貌盿同上䁩語居切馬二目白魚亦作睕一阮切小嫵媚也䀨火刮切視也弋照切眩瞎火轄切一目合同上補太普蓋二切不明貌呼換切璽國名䁓了弄切伺視也䀴五令切直視丑亮切失志貌壯立切目出淚眆芳狂切古眆佛見似不諦曖烏蓋切隱也力末切目不正亡結切睥面也睥普計切睥睨也瞸余涉切瞼也􅱏力隄力帝二切視也瞘口侯切又音歐矌苦謗切目無睈丑郢切照視貌矀莫悲切伺視也䁷古學切明也睟思季切視也又潤澤貌弋之切視也力蕩切古㓪字䁇眉力切暫視䁤且切澤眼也䂃子召切目冥也矑力都切視也亦目瞳子瞇莫俾切眇目䁿莫比切聽䁿眑於皎切幽靜也睂莫飢切目上毛眉今睂字睋吳哥切公羊傳注望也眶去王切眼眶火決切瞛七恭切目光也縈歷切視也羽向切視也都侯切瞘目深也之曳切目明瞔爭革切張目也䁽離怙切目暗渠句切共置也具同上今文䁤許季許癸二切恚視也匹表切視也古花切眼也䀵矢其切眗也䁧無盰切張目也睃子迅切視也都侯切眵目汁疑火貢切瞢也䁐於京切深目也䁣市專切目動祖困切赤目也火麥切目病眪筆血孚血二切親也薄異切眥也􅲹莫江切目盺許斤切喜也䁗苦改切明也眰真日切視也於顯於見二切仰視匹徑切視也古花切眼尼六切視也九羽切視也䁏於皎切逺視丘郎切眏目貌眏於郎切目不明􅮃自廉切閉目睶尺尹切大目瞜力頭切視也災葉切目睱胡駕切間睱視也眘食刃切古文慎䁥女栗切小目眨側洽切目動䀷居業切急視眖許往切視也省思井切視也所景切署也古文盶魚逺切目視䀯卜古切視也古嶽切目動息咨切姧視逹雞切視也或作眀莫兵切視也答合切困悶眼瞌苦合切眼瞌也睲息頂切視也瞨普角切眼暗摩筆切不可測卧輔木切目骨許乙切視也莫卑切眇目䁘余昭切美目而緣切目垂矒莫公切默鄧切目他田他佃二切仰視䁢詞緣切好貌䂀虛儀切目動居韋切目也徒領切目出他則切䁿欲卧也睷古言切數也子規切眭所緘切見也矃乃頂切視也矖色滓切視也丁結切惡貌眧齒沼切眧目弄人多佞切見也危委切目瞼九儉切眼瞼也瞉古例切久視䁎丈莖切安審視也𥉻七例切視也古鐙切日起翳於計切眼疾䂁助咸切怒視䁆烏感切目也眗古于切左右視也瞱于劫切怒視火或切睡目貌耕責切目不正眭胥規切人姓又下圭切目深惡貌􅸵許決切許聿切直視呼革切目赤䁻舒灼切美目􆈝七歷切也眻余向余章二切美目又眉間曰眻聉牛乙五滑二切無知意胡骨切耳聲又地名聵五怪切聾也國語聾聵不可使聽同上耷丁盍切大耳也􅫣五滑切聾甚也又無耳者聰青公切聰明也察也聰同上俗耵都領切耵聹耳垢聹乃頂切耵聹丘古切耳也聝古獲切截斷耳亦作馘聽他丁他定二切耳察聙子盈切聽聰也䎼力木切䎼聽似蜥蜴先口切聰揔名䏂同上聱五苞魚幽二切不入人話䏇匹妙切聽裁聞也聭俱位切與愧同慙也子由切耳嗚古活切無知貌同上奴陸切慙也説文作恧耹其林其廉二切地名聑丁篋切安也耳垂也去竒切側耳聠匹名切耳閉都郎切耳䎶如志切以牲告神欲神聽䎺諸裔切聞也亦作晣聎他刀他凋二切耳鳴聕胡老切耳聞耶羊遮切俗邪字桑經切聰也䏄知力丁米二切不聽也䏆才焦才髙二切耳鳴自焦切耳鳴聖古莖切神名古紅切耳聞鬼聄之忍切聽也䎷之付切䎷也源也聲也力雕力髙二切耳鳴匡主切目往也於檢切耳也縛無切望也子小切耳鳴聶如獵女陟二切附耳小語耾侯萌切聾也耳語也耺禹君切耳中聲聐儀黠切聐也烏鴈切耳戲也所切人姓聧苦圭切耳不相聽又私叶䎿才周子由二切耳鳴胡殺切耳聲之涉切耳也聻尼上切指物貌古霍切大耳他最切癡也又五刮切大廣益會玉篇卷第四
