body:
  text: 大廣益㑹玉篇卷第一凡八部一部第一凡八字一於逸切說文曰惟初太始道立於一造分天地化成萬物道徳經云昔之得一者天得一以清地得一以寜神得一以靈谷得一以盈萬物得一以生侯王得一以爲天下正王弼曰一者數之始也物之極也又同也少也初也或作壹弌古文天他前切說文曰天顚也至髙無上从一大爾雅曰春爲蒼天夏爲昊天秋爲旻天冬爲上天詩傳曰尊而君之則稱皇天元氣廣大則稱昊天仁覆閔下則稱旻天自上降監則稱上天據逺視之蒼蒼然則稱蒼天吕氏春秋云天有九野東方蒼東南方陽南方炎西南方朱西方顥西北方幽北方玄東北方變中央鈞太玄經曰九天一爲中二爲羡三爲從四爲更五爲脺六爲廓七爲減八爲沈九爲成釋名曰天豫司兖冀以舌腹言之天顯也在上髙顯也青徐以舌頭言之天坦也坦然髙而逺也􆂑古文􅔹古文元五袁切說文曰元始也易曰元者善之長也春秋傳曰狄人歸其元元首也韓詩曰元長也公羊傳曰元年春者何君之始年也何休云變一言元元者氣也左氏傳注曰凡人君即位欲其體元以居正故不言一年一月也漢書曰勸元元師古曰元元善意丕普邳切虞書曰嘉乃丕績孔安國曰丕大也或作㔻吏力致切說文曰治人者也夏書曰天吏逸徳烈于猛火周禮八則三曰廢置以馭其吏左傳王使委於三吏杜預曰三吏三公也記曰五官之長曰伯其擯於天子也曰天子之吏竹瓦切上部第二凡九字上市讓切說文曰髙也又居也易曰本乎天者親上虞書曰正月上日孔安國曰上日朔日也老子曰太上下知有之王弼曰太上大人也漢書云望於太上如淳曰太上猶天子也又市掌切登也升也丄古文帝丁計切說文云諦也王天下之號也爾雅君也白虎通德合天者稱帝商書惟皇上帝孔曰上帝天帝也周禮兆五帝於四郊鄭玄曰五帝蒼日靈威仰太昊食焉赤日赤熛怒炎帝食焉黃日含樞紐黃帝食焉白日白招拒少昊食焉黒日叶光紀顓頊食焉古文旁歩郎切旁猶側也邊也非一方也說文作㫄溥也雱籕文古文古文下何雅切易曰化成天下下者對上之稱也說文曰底也詩云下武維周箋云下猶後也禮記曰揖讓而升下而飲鄭玄曰下降也杜預注左傳云下猶賤也爾雅曰下落也又何稼切行下也易曰以貴下賤是也示部第三凡一百四十五字示時至切說文天垂象見吉凶所以示人易夫乾確然示人易矣夫坤隤然示人簡矣示者語也以事吿人曰示古文神市人切神祗說文天神引岀萬物者也夏書乃聖乃神孔安國云聖無所不通神妙無方易隂陽不測之謂神王弼云神也者變化之極大戴禮云陽之精氣曰神隂之精氣曰靈爾雅云神重也治也愼也廣雅云神弘也祇巨支切地之神也易曰無祇悔注云大也周禮作示祕悲冀切說文神也廣雅曰勞也密也藏也祖子古切父之父也始也道祭也禷力季切祭也爾雅曰是禷是禡師祭也或作祭子滯切薦也祭祀又側界切周大夫邑名祠似司切公羊傳春祭曰祠祠者食也䄛力侯切飲食祭也冀州八月楚俗二月亦作膢䄍仕駕切報祭也古之臘曰䄍亦作蜡祜胡古切詩云受天之祜箋云祐福也禊胡契切史記漢武禊霸上注三月上巳臨水祓除也祾力矜力登二切祭名神靈之威福也䄟昌芮切數祭也重祭也又此芮切祲子鴆切周禮眡祲注隂陽氣相侵左傳見赤黑之祲杜預曰妖氣也齋側皆切易聖人以此齋戒注洗心曰齋又敬也籕文䃾必利切說文以豚祠司命祐于救切助也易曰自天祐之吉無不利或作佑祀徐里切周書八政三曰祀爾雅云祭也又年也禩同上禔之移切福也安也又音祅於驕切天反時爲灾地反物爲祅說文作䄏禋於神切敬也說文絜祀也一曰精意以享爲禋同上祈巨衣切禱也報也吿也音亦祭之明日又祭殷曰肜周曰亦作繹祡仕佳切燒祡樊燎祭天神亦作柴又祭天燔柴古文除霤切祝又力救切禲音厲無後鬼也鬼有所歸及不爲禲􅤶布庚切祭說文門内祭先祖所以徬徨亦作祊同上禱丁老切請也謝也求福也籕文古文禎音貞吉祥也礿餘灼切夏祭曰礿禴同上祥似羊切妖怪也福也善也禘徒計切大祭也諦也祫何夾切合祭也禨居衣切祥也祺巨基切吉也又徴祥也禥籕文祰口老公篤二切禱也吿祭禛之仁切以眞受福也禧許其切福也古穴切不祥也禰年禮切父廟也同上福方伏切禄命也祐也禄音鹿賞賜也福禄也祉丑里切福也䄜力之切福祥也禮力底切體也理也礼古文禪市戰切祭名巿然切静也禜音詠風雨不時祭名禠息離切福也祘蘇換切明視也社市者切土地神主也古文禦魚舉切禁也又當也䄆胡括切祀也又法也於栁切福也匹角切乆視也祧他幺切逺廟也古文禡莫駕切師祭又馬上祭禳而羊切郤變異也䃽質夷切福也私吕切祭具也禍胡果切害也神不福也同上祳時忍切祭社生肉又爼實禕於冝切羙皃又歎辝祹徒勞切福也禂丁道切馬祭也祟思遂切神禍也籕文禓與章書羊二切道祭強鬼祴古來切祴夏樂章名禑音福也禖莫回切求子祭禬胡外古外二切除災害也㑹福祭也祤于矩切祋祤縣名又音詡祗諸時切敬也俗作祗音福也昨坦切祭也禁記鴆切止也錮也又記林切息淺切狄田祭也與獮同祏殊亦切廟主石室也所交切祐也古典切祗也祓孚物切除災求福也又方吠切福也礽而陵切福也就也亦作仍祪居毁切毁廟之祖也丑歷切福也祽子内切祭名莫伯切神也䃿方無切祭䟽也禗息兹切不安也欲去意也祼古換切祼鬯吿神也䄂恥霤切古文祝之六切祭詞也所冝切祭名禯尼龍切厚祭也祣力煑切祭名論語作旅祔扶付切視也合葬也祙音媚即鬼魅也䄐丘倦切祀也禟徒郎切祐也去言切祭也禉以乆以州二切燎祡祭天祚才故切禄也保也䄄音因成就也於琰切禳也禭詞類切祭名祌音仲神也􅳊側慮切祝也亦作詛祱始銳切博雅云祭也䄉音俄盛皃或作娥市救切乆年也符容切神名䄚才召切豕祭也禫徒感切除服祭名也祩之俞切呪詛又音注力大切墮壞也力弔切與同祅阿憐切胡神也祻音固祭也䄌竹芮切祭名亦作醊䄃於畺切禍也古文殃䄎乞喜切好皃䄁翌制切祭也􅰩音弗除殃祭也禚之若切齊地名子誚切祭名或作醮欣居切耗鬼與同䄅居倦切祭名本作飬䄓户光切䄘䄓祭也䄝丑江切祭壇不毁也音畢竈上祭也二部第四凡十四字二而至切說文曰地之數也易曰天一地二弍古文亖古文四思縁切求也今宣从亘恒何登切常也易曰恒乆也同上古文亝祖兮切古文齊音圍亟居力切疾也丘致切数也凡扶嚴切凡計数也又非一也說文最括也廣雅輕也皆也竺丁沃切厚也又音竹弋之切陽氣也力持切古文老三部第五凡二字三思甘切說文天地人道老子道生二生二二生三三生万物弎古文王部第六凡五字王禹方切說文云天下所歸往董仲舒曰古之造文三畫而運其中謂之王三者天地人而參通之者王也孔子曰一貫三爲王古文閏如舜切閏餘也餘分之月三年一閏五歳再閏十九年七閏爲一章皇胡光切大也匡也君也論語曰皇皇后帝注謂大天帝也儀禮賔入門皇自莊盛也古文玉部第七凡二百七十七字玉魚録切記曰君子比德於玉焉温潤而澤仁也縝宻以粟知也廉而不劌義也垂之如隊禮也叩之其声清越而長其終詘然樂也瑕不揜堬瑜不揜瑕忠也孚筠旁逹信也氣如白虹天也精神見于山川地也圭璋特逹徳也古文玉欣救思六二切玉工亦姓璙力弔力小二切玉名瓘古喚切玉名璥居影切玉名琠它典切玉名古文璇似宣切美石次玉亦作琁瑾竒鎮切瑾瑜美玉也玘去里切玉名瓕弭規切玉名奴刀切玉名郎敵切玉名瓄徒木切史崐山出瓄玉璵弋居切璵璠美玉皃璐力故切美玉也力才切玉屬珦虚亮切玉名㻝力逹切玉名珵除荆切美玉也埋六寸光自輝璠方袁房袁二切美玉琳力金切玉名㻒竒隕切齊玉也瑅大兮切玉名瑭徒郎切玉也珙居容居勇二切大璧也玒古邦古紅二切玉名㻽似睡切玉名琛敕今切琛寳也瑗爲眷切玉名璜胡光切半璧也瓃力追切玉器也又力回切瓊渠營切赤玉也璚同上瓗同上又音畦又羊水切美玉皃琁同上又徐宣切瑜弋朱切瑜玉不揜瑕玉中美也記丗子佩瑜玉琬於逺切琬珪也􅋒巨基切飾弁也璂同上見說文琪巨基切玉属瑁莫到切珪長四寸天子執之又莫對切瑇瑁也㺺古文瑇徒戴切瑇瑁或作玳璬公了切玉佩也珤古文寳字琮才宗切琮玉八角象地說文瑞玉八寸似車缸琚紀余切玉也璩其於切玉名市六切玉器也璹同上環下関切繞也又玉環尓雅肉好若一謂之環􅶨莫骨切玉名㻆胡犬切玉皃力髙切玉名玼且禮切王色鮮理力紀切治玉也正也事也道也從也治獄官也瑝胡光切玉聲瑣思果切玉聲璅子道切石次玉璡子鄰切石似玉瓉才但才旦二切珪頭爲器可挹鬯灌礼記云瓉形如槃容五升璁倉公切石似玉胡到切石似玉胡戛切石似玉㻨烏灌切石似玉瑩烏定爲名二切玉色詩充耳琇瑩傳曰石之次玉又於坰切􅊅思恊切石似玉玽音狗石似玉琂語鞬切石似玉璶疾刄切石似玉碧彼㦸切山海經啇山下多青碧郭璞云亦玉類說文石清美者琟弋佳切石似玉㺨息咨切石似玉瑂明丕切石似玉璒得滕切石似玉靈力經切以玉事神與靈同大戴禮隂氣爲靈靈祐也玗有俱切玉屬珣思旬切玉屬琨古䰟切石美者瑻說文同上居逸切埤蒼云垂地名出美玉春秋作棘瑎户皆切黒玉瓐力胡切碧玉璑武俱切三采玉㻾於龍切玉器瓏力恭切禱旱龍文玉又音籠珍瓏謂玉聲也璄於景切玉光采璟同上又俱永切􅴯力徳切玉名玏同上瑒雉杏切珪尺二寸有瓉瓉以祀天地又音暢玹胡㳙切玉色珫齒融切珫耳也瑔絶縁切具名璔則僧切玉皃瑋禹鬼切以貴切埤蒼云瑰瑋珍琦或作偉玢方貧切玉名㻌他胡切美玉封古切玉器璝古回切玉也璧俾亦切瑞玉圜以象天也璿似縁切書璿㙨美玉籕文古文珮歩軰切玉佩本作佩或从玉琥呼古切瑞玉發兵爲虎文琰弋冉切璧上起美色球巨周切玉磬也璆竒樛切美玉也瑬力牛切垂王也冕飾亦作鏐美金琡齒育切璋大八寸曰琡璋之陽切半玤也明也珪古攜切古圭字珹時盈切玉名珕力智力許二切佩刀飾蜃属瑞市惴切信節諸侯之珪玠音界珪長尺二寸也古回切與傀同大也億魚切玉名玟莫柸切火齊珠又石之美者玦居穴切玉佩如環缺不連瓛胡官切公執瓛珪珿𥘉六切寸也齊也琿户昆切玉名瑌如兖切美石白者如氷半有赤色珩下庚切佩玉以節行歩也珽它鼎切大圭長三尺珻莫杯切玉名瑫它牢切玉名璣渠氣居沂二切說文珠不圎者也玩五貫切戲也弄也或作貦瑱它見切以玉充石珥仁志切珠在耳璼盧談切玉名琲蒲漑蒲愷二切珠五百枚也亦作蜚珍張陳切宝也貴也重也珎同上俗珒子新切玉名古文珒珊思安切珊瑚色赤生於海亦生於山琖仄簡切玉爵亦作盞􅊦琫布孔切佩刀下飾也珌卑宻切佩刀上飾古文珂丘何切石次玉亦碼碯白如雪者一云螺属珈古遐切笄飾之最盛者璏雉例切劒鼻又音衞㺲女乆切印鼻本作鈕珖古方切珖琯也思律切珂老鵰入海所化璲徐醉切玉璲以玉爲佩璫多郎切穿耳施珠也玸縛無切玉名珆土來切玉名璯苦話切晉陽秋有呉興錢璯乱琩尺羊切琩玩蛮夷充耳瑑持轉切珪有折鄂也瓔於盈切瓔琅石似玉亡凡切玉也奴倒切俗以馬碯作玷丁占切缺也或作瑵壯巧切車蓋玉瑵也瑶余招切瓊玉之美者玵五甘切美玉也㺩踈逸切玉器也又巨幼切瑹式余切美玉瑹班並笏也璪作道切玉飾如水藻余制切石之似玉者瑺時羊切玉也珷亡甫切石似玉與碔同琱多么切治玉也又石似玉瑚河孤切瑚璉或作璉力展切瑚璉或作槤㻓阻由切玉名琭力木切老子云琭琭如玉瑳且我切玉鮮白又七河切琦渠箕切瑰瑋珍琦珠之俞切蚌之隂精瓅力的切玓瓅瑰古回切玫瑰一曰珠圜又音回瓌同上璱所乙切玉華相帶如琴弦琗廣蒼同上珧於柖切蜃珧蚌属瑡色切玉名玭蒲蠲蒲賔二切珠也書作蠙琕同上琯古蒲切西王母献舜白琯璺亡奮切器破而未離玓典歷切玓瓅明珠色璃力支切瑠璃音留璧也石之有光亦作瑠同上􅛁力質切玉英華羅列秩秩瑮同上玻普波切玻瓈玉瓈力堤切上同瑴古岳切杜預曰雙玉曰瑴亦作與珇作土切美也琮玉之琢也璽思比切天子諸侯印昱朱切石似玉璾節而切石似玉璗徙黨切尓雅黄金謂之盪郭璞云金别名瑛於京切水精謂之玉瑛璞普角切玉未治者琢陟角切治玉也玶皮明切玉名余周余九二切說文遺玉也玤布孔歩講二切石之次玉璊莫昆切玉䞓色也玧同上又以蠢切㺭借里切玉名琙于洫切漢記玄莵太守公孫域異之切石次玉又五色石琤楚耕切玉声或作錚瓖息將切馬上飾珘之由切玉也珝吁羽切呉志薛琮字珝珢居恨魚巾二切石次玉也瑕胡加切過也玉病也瑲且楊切說文玉声璮它旦切玉也㺷思聿切玉名珂㺷與珬同㻸側金才心二切石似玉玎都廷切竹耕切玉声珉靡豳切石似玉本亦作䃉或作玟瑉同上禮記君子貴玉而賤珉瑦於古於都二切石似玉瑀于矩切石之似玉者㻍五胡切琨㻍劒名又石次玉與珸同珸同上石次玉亦山名出利金瑊古咸切瑊美石次玉也玪同上瑽七㳟切瑽瑢佩玉皃瑢余㳟切瑽瑢也㻂毗名切玉也㻵仕患切玉也玞甫紆切珷玞石似玉琈扶留切琈筍玉采色吐胡切琈胡古切玉也琽得魯切玉名息進切玉名琇思救餘受二切琇瑩美石璓說文琇古銜切玉名玳音袋俗以瑇瑁作玳㻑扄位切玉也玔𥘉卷切玉玔也玖居栁切石次玉黒色者玲力經切瓏玲金玉聲琀胡紺切送終口中玉璨七旦切玉光也璦烏代切美玉也玐班戛切玉声璘力神切璘㻞文皃又玉色㻞鄙鄰切上同瑄宿縁切璧大六寸珨胡甲切玉珨亦蜃器珛許敕切杇玉也珀普百切琥珀也琅力當切琅玕石似玉似珠玕古寒切琅玕也古文㺪匹角切玉未成器玥五厥切珠名璛思六切姓也㻶彬律切青白玉琯也璀七罪切璀璨玉光㻠徒骨切玉瑱也㺴補戛切左神名瓙徒到切玉名珞郎各切纓珞頸飾瑯魯當切瑯琊郡名正作琅瑘以遮切瑯瑘正作琊與部第八凡四字與古岳切二玉爲一與或作㲄斑補間切布文斑白者􅕈扶福切說文車笭間皮篋古者使奉玉所以盛之班布還切說文分瑞玉也又班次也班賦也大廣益㑹玉篇卷第一
